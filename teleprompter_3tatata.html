<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="3TaTaTa Prompter">
<title>3TaTaTa Teleprompter</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --text: #f0ede6;
    --accent: #c8a96e;
    --accent2: #7eb8c9;
    --dim: #3a3a3a;
    --panel: #111111;
    --border: #222222;
    --speed: 60px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Serif Display', Georgia, serif;
    height: 100%;
    overflow: hidden;
    touch-action: manipulation;
  }

  /* ======= MENU SCREEN ======= */
  #menu-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center;
    padding: 60px 40px 40px;
    overflow-y: auto;
    z-index: 100;
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .menu-title {
    font-size: clamp(36px, 8vw, 64px);
    color: var(--text);
    text-align: center;
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .menu-subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.2em;
    color: #666;
    text-transform: uppercase;
    margin-bottom: 50px;
  }

  .story-list {
    width: 100%;
    max-width: 700px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .story-item {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 20px 24px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s ease;
    text-decoration: none;
    color: inherit;
  }

  .story-item:active {
    background: #1a1a1a;
    border-color: var(--accent);
    transform: scale(0.99);
  }

  .story-num {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    min-width: 28px;
    letter-spacing: 0.05em;
  }

  .story-info { flex: 1; }

  .story-name {
    font-size: 18px;
    color: var(--text);
    margin-bottom: 3px;
    line-height: 1.2;
  }

  .story-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #555;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .story-arrow {
    color: #333;
    font-size: 20px;
    transition: color 0.15s;
  }

  .story-item:active .story-arrow { color: var(--accent); }

  /* ======= PROMPTER SCREEN ======= */
  #prompter-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: none;
    flex-direction: column;
  }

  /* TOP BAR */
  #top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 56px;
    background: linear-gradient(to bottom, rgba(10,10,10,1) 70%, rgba(10,10,10,0));
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 50;
  }

  #back-btn {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.15em;
    color: #555;
    text-transform: uppercase;
    background: none; border: none;
    cursor: pointer;
    padding: 10px 0;
    display: flex; align-items: center; gap: 8px;
  }
  #back-btn:active { color: var(--accent); }

  #story-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: #444;
    text-transform: uppercase;
    text-align: center;
    flex: 1;
    padding: 0 20px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #font-btn {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: #555;
    background: none; border: none;
    cursor: pointer;
    padding: 10px 0;
    letter-spacing: 0.1em;
  }
  #font-btn:active { color: var(--accent); }

  /* SCROLL CONTAINER */
  #scroll-container {
    flex: 1;
    overflow: hidden;
    position: relative;
    cursor: pointer;
  }

  #scroll-inner {
    padding: 80px 5vw 70vh;
    will-change: transform;
  }

  /* Reading guide line */
  #guide-line {
    position: fixed;
    top: 38%;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--accent) 20%, var(--accent) 80%, transparent);
    opacity: 0.25;
    pointer-events: none;
    z-index: 10;
  }

  /* Top/bottom fade */
  #scroll-container::before,
  #scroll-container::after {
    content: '';
    position: fixed;
    left: 0; right: 0;
    height: 120px;
    pointer-events: none;
    z-index: 5;
  }
  #scroll-container::before {
    top: 56px;
    background: linear-gradient(to bottom, var(--bg), transparent);
  }
  #scroll-container::after {
    bottom: 80px;
    background: linear-gradient(to top, var(--bg), transparent);
  }

  /* TEXT STYLING */
  .prompt-title {
    font-size: clamp(22px, 5vw, 36px);
    color: var(--accent);
    text-align: center;
    margin-bottom: 8px;
    line-height: 1.2;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .prompt-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #444;
    text-align: center;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 60px;
  }

  .prompt-section {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    text-align: center;
    margin: 40px 0 20px;
    opacity: 0.7;
  }

  .prompt-line {
    font-size: clamp(28px, 5.5vw, 52px);
    text-align: center;
    line-height: 1.45;
    color: var(--text);
    padding: 8px 0;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .prompt-sep {
    text-align: center;
    color: var(--dim);
    font-size: 18px;
    padding: 24px 0;
    letter-spacing: 0.5em;
  }

  /* CONTROLS BAR */
  #controls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    background: linear-gradient(to top, rgba(10,10,10,1) 80%, transparent);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 0 24px;
    z-index: 50;
  }

  .ctrl-group {
    display: flex;
    align-items: center;
    gap: 0;
    background: #161616;
    border: 1px solid #222;
    border-radius: 8px;
    overflow: hidden;
  }

  .ctrl-btn {
    background: none;
    border: none;
    color: #777;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 12px 18px;
    cursor: pointer;
    transition: all 0.1s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    min-width: 56px;
    border-right: 1px solid #1e1e1e;
  }
  .ctrl-btn:last-child { border-right: none; }
  .ctrl-btn:active { background: #1e1e1e; color: var(--accent); }
  .ctrl-btn .icon { font-size: 18px; line-height: 1; }
  .ctrl-btn .label { font-size: 9px; opacity: 0.6; letter-spacing: 0.15em; }

  #play-btn .icon { font-size: 22px; }
  #play-btn { color: var(--text); }
  #play-btn.playing .icon::before { content: '⏸'; }
  #play-btn:not(.playing) .icon::before { content: '▶'; }
  #play-btn .icon::before { }

  /* Speed display */
  #speed-display {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    min-width: 36px;
    text-align: center;
  }

  /* FONT SIZE control */
  .font-size-sm { --line-fs: clamp(20px, 4vw, 38px); }
  .font-size-md { --line-fs: clamp(28px, 5.5vw, 52px); }
  .font-size-lg { --line-fs: clamp(36px, 7vw, 68px); }
  .font-size-xl { --line-fs: clamp(44px, 9vw, 86px); }

  .font-size-sm .prompt-line  { font-size: var(--line-fs, clamp(20px,4vw,38px)); }
  .font-size-md .prompt-line  { font-size: var(--line-fs, clamp(28px,5.5vw,52px)); }
  .font-size-lg .prompt-line  { font-size: var(--line-fs, clamp(36px,7vw,68px)); }
  .font-size-xl .prompt-line  { font-size: var(--line-fs, clamp(44px,9vw,86px)); }

  /* Progress bar */
  #progress-bar {
    position: fixed;
    top: 56px; left: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0.4;
    width: 0%;
    z-index: 51;
    transition: width 0.3s ease;
  }

  /* HIDDEN */
  .hidden { display: none !important; }

  /* Touch zones */
  #tap-left, #tap-right {
    position: fixed;
    top: 56px; bottom: 80px;
    width: 30%;
    z-index: 20;
  }
  #tap-left { left: 0; }
  #tap-right { right: 0; }
</style>
</head>
<body>

<!-- MENU -->
<div id="menu-screen">
  <div class="logo">3TaTaTa</div>
  <h1 class="menu-title">Teleprompter</h1>
  <p class="menu-subtitle">Wybierz opowiadanie</p>
  <div class="story-list" id="story-list"></div>
</div>

<!-- PROMPTER -->
<div id="prompter-screen">
  <div id="top-bar">
    <button id="back-btn" onclick="goBack()">← MENU</button>
    <div id="story-label"></div>
    <button id="font-btn" onclick="cycleFont()">Aa</button>
  </div>

  <div id="progress-bar"></div>
  <div id="guide-line"></div>

  <div id="scroll-container" onclick="togglePlay()">
    <div id="scroll-inner"></div>
  </div>

  <div id="tap-left" onclick="slowDown(); event.stopPropagation();"></div>
  <div id="tap-right" onclick="speedUp(); event.stopPropagation();"></div>

  <div id="controls" onclick="event.stopPropagation()">
    <div class="ctrl-group">
      <button class="ctrl-btn" onclick="slowDown()">
        <span class="icon">−</span>
        <span class="label">WOLNIEJ</span>
      </button>
      <button class="ctrl-btn" id="play-btn" onclick="togglePlay()">
        <span class="icon"></span>
        <span class="label">PLAY</span>
      </button>
      <button class="ctrl-btn" onclick="speedUp()">
        <span class="icon">+</span>
        <span class="label">SZYBCIEJ</span>
      </button>
      <button class="ctrl-btn" onclick="resetScroll()">
        <span class="icon">↩</span>
        <span class="label">RESET</span>
      </button>
    </div>
  </div>
</div>

      { type: "line", text: "ostatni kawałek chleba," },
      { type: "line", text: "to ktoś musi mu przypomnieć," },
      { type: "line", text: "że na świecie istnieje" },
      { type: "line", text: "jeszcze sprawiedliwość." },
      { type: "sep" },
      { type: "line", text: "Jeszcze tej samej nocy" },
      { type: "line", text: "ruszyli w dół doliny." },
      { type: "sep" },
      { type: "line", text: "Nie przyszli tam po zemstę." },
      { type: "line", text: "Gdy jeden z towarzyszy" },
      { type: "line", text: "chciał rozbić meble," },
      { type: "line", text: "Ondraszek zatrzymał go" },
      { type: "line", text: "jednym ruchem ręki." },
      { type: "sep" },
      { type: "line", text: "— Nie po to tu jesteśmy —" },
      { type: "line", text: "powiedział cicho." },
      { type: "line", text: "— Nie wolno nam stać się takimi," },
      { type: "line", text: "jak ci, przeciw którym występujemy." },
      { type: "sep" },
      { type: "line", text: "Nad ranem w kilku wsiach" },
      { type: "line", text: "pod drzwiami biednych chałup" },
      { type: "line", text: "leżały worki z mąką." },
      { type: "line", text: "Na progach znajdowano sakiewki." },
      { type: "sep" },
      { type: "line", text: "Ludzie szeptali tylko jedno imię:" },
      { type: "line", text: "Ondraszek." },
      { type: "sep" },
      { type: "line", text: "— Lepiej żyć krótko," },
      { type: "line", text: "ale po swojemu —" },
      { type: "line", text: "miał powiedzieć —" },
      { type: "line", text: "niż długo i w hańbie." },
      { type: "sep" },
      { type: "line", text: "Ondraszek stał się symbolem odwagi," },
      { type: "line", text: "wolności i sprzeciwu wobec krzywdy." },
      { type: "sep" },
      { type: "line", text: "Do dziś, gdy w beskidzkich lasach" },
      { type: "line", text: "zapada zmierzch," },
      { type: "line", text: "ktoś zawsze wspomni o Ondraszku —" },
      { type: "line", text: "o zbójniku z gór," },
      { type: "line", text: "który potrafił stanąć" },
      { type: "line", text: "po stronie słabszych." },
      { type: "section", text: "— OUTRO —" },
      { type: "line", text: "To była Legenda o Ondraszku." },
      { type: "line", text: "Na podstawie klasycznej śląskiej legendy." },
      { type: "line", text: "Tłumaczenie i opracowanie — 3TaTaTa." },
      { type: "line", text: "Dobranoc." },
    ]
  },
  {
    id: 3,
    title: "Legenda o Utopku",
    tag: "Legenda śląska",
    sections: [
      { type: "title", text: "Legenda o Utopku" },
      { type: "meta", text: "3TaTaTa · Legenda śląska" },
      { type: "section", text: "— INTRO —" },
      { type: "line", text: "3TaTaTa prezentuje." },
      { type: "line", text: "Legenda o Utopku." },
      { type: "line", text: "Na podstawie klasycznej śląskiej legendy." },
      { type: "line", text: "Tłumaczenie i opracowanie — 3TaTaTa." },
      { type: "sep" },
      { type: "section", text: "— LEGENDA —" },
      { type: "line", text: "Dawno temu," },
      { type: "line", text: "gdy nad śląskimi stawami" },
      { type: "line", text: "częściej niż dziś snuły się mgły," },
      { type: "line", text: "ludzie opowiadali sobie o Utopku." },
      { type: "sep" },
      { type: "line", text: "Nie był on człowiekiem" },
      { type: "line", text: "ani zwyczajnym zwierzęciem." },
      { type: "line", text: "Mówiono, że to duch wody —" },
      { type: "line", text: "stary jak bagna," },
      { type: "line", text: "cichy jak głębina." },
      { type: "sep" },
      { type: "line", text: "Jedni twierdzili," },
      { type: "line", text: "że widzieli go o świcie," },
      { type: "line", text: "jak siedział na kamieniu przy brzegu" },
      { type: "line", text: "i czesał mokre, zielone włosy." },
      { type: "sep" },
      { type: "line", text: "Starzy rybacy mówili o nim" },
      { type: "line", text: "z czymś więcej niż strachem." },
      { type: "line", text: "Mówili z szacunkiem." },
      { type: "sep" },
      { type: "line", text: "W jednej ze śląskich wsi" },
      { type: "line", text: "żył młody parobek imieniem Jędrek." },
      { type: "line", text: "Był silny, szybki" },
      { type: "line", text: "i pewny siebie aż nadto." },
      { type: "sep" },
      { type: "line", text: "Pewnego letniego wieczoru" },
      { type: "line", text: "skrócił sobie drogę" },
      { type: "line", text: "przez groblę między stawami." },
      { type: "sep" },
      { type: "line", text: "Splunął do wody i zawołał głośno," },
      { type: "line", text: "że jeśli Utopek naprawdę istnieje," },
      { type: "line", text: "to niech się pokaże." },
      { type: "sep" },
      { type: "line", text: "W tej samej chwili wszystko ucichło." },
      { type: "line", text: "Żaby umilkły. Wiatr zgasł." },
      { type: "line", text: "Nawet trzciny znieruchomiały." },
      { type: "sep" },
      { type: "line", text: "Z mroku przy brzegu" },
      { type: "line", text: "wynurzyła się niewysoka postać." },
      { type: "line", text: "Mokra i dziwnie lśniąca." },
      { type: "line", text: "Na jej twarzy nie było złości —" },
      { type: "line", text: "tylko zimna, głęboka powaga." },
      { type: "sep" },
      { type: "line", text: "Utopek wyciągnął rękę" },
      { type: "line", text: "i skinął, jakby zapraszał bliżej." },
      { type: "sep" },
      { type: "line", text: "Parobek cofnął się gwałtownie," },
      { type: "line", text: "ale grobla była śliska." },
      { type: "line", text: "Noga obsunęła mu się w błoto." },
      { type: "sep" },
      { type: "line", text: "Serce biło mu jak młot." },
      { type: "line", text: "Pierwszy raz w życiu" },
      { type: "line", text: "naprawdę się przestraszył." },
      { type: "sep" },
      { type: "line", text: "— Daruj —" },
      { type: "line", text: "wyszeptał Jędrek." },
      { type: "line", text: "— Nie chciałem szydzić. Daruj." },
      { type: "sep" },
      { type: "line", text: "Utopek przechylił głowę," },
      { type: "line", text: "jakby słuchał czegoś bardzo dalekiego." },
      { type: "line", text: "Po chwili opuścił rękę." },
      { type: "sep" },
      { type: "line", text: "Wiatr wrócił. Trzciny zaszeleściły." },
      { type: "line", text: "A przy brzegu nie było już nikogo." },
      { type: "sep" },
      { type: "line", text: "Od tamtej nocy Jędrek" },
      { type: "line", text: "zmienił się nie do poznania." },
      { type: "line", text: "Mówił, że są miejsca," },
      { type: "line", text: "gdzie człowiek powinien pamiętać," },
      { type: "line", text: "że nie wszystko do niego należy." },
      { type: "sep" },
      { type: "line", text: "Nad śląską wodą" },
      { type: "line", text: "trzeba zachować pokorę." },
      { type: "line", text: "Bo tam, gdzie człowiek" },
      { type: "line", text: "widzi tylko ciemną taflę," },
      { type: "line", text: "ktoś inny może właśnie" },
      { type: "line", text: "patrzeć z głębiny." },
      { type: "section", text: "— OUTRO —" },
      { type: "line", text: "To była Legenda o Utopku." },
      { type: "line", text: "Na podstawie klasycznej śląskiej legendy." },
      { type: "line", text: "Tłumaczenie i opracowanie — 3TaTaTa." },
      { type: "line", text: "Dobranoc." },
    ]
  },
  {
    id: 4,
    title: "Kopciuszek",
    tag: "Baśń klasyczna",
    sections: [
      { type: "title", text: "Kopciuszek" },
      { type: "meta", text: "3TaTaTa · Baśń klasyczna" },
      { type: "section", text: "— INTRO —" },
      { type: "line", text: "3TaTaTa prezentuje." },
      { type: "line", text: "Kopciuszek." },
      { type: "line", text: "Na podstawie klasycznej baśni." },
      { type: "line", text: "Tłumaczenie i opracowanie — 3TaTaTa." },
      { type: "sep" },
      { type: "section", text: "— BAŚŃ —" },
      { type: "line", text: "Dawno temu," },
      { type: "line", text: "w dużym domu na skraju miasta," },
      { type: "line", text: "mieszkała dobra i łagodna dziewczynka." },
      { type: "sep" },
      { type: "line", text: "Najpierw straciła matkę," },
      { type: "line", text: "a po kilku latach także ojca." },
      { type: "line", text: "Opiekę nad nią przejęła macocha —" },
      { type: "line", text: "kobieta chłodna i dumna." },
      { type: "sep" },
      { type: "line", text: "Obie przyrodnie siostry" },
      { type: "line", text: "były próżne i leniwe." },
      { type: "line", text: "Dziewczynce przypadła" },
      { type: "line", text: "najcięższa praca w domu." },
      { type: "sep" },
      { type: "line", text: "Siostry zaczęły przezywać ją" },
      { type: "line", text: "Kopciuszkiem." },
      { type: "line", text: "Ona jednak pozostawała" },
      { type: "line", text: "cierpliwa, cicha i uprzejma." },
      { type: "sep" },
      { type: "line", text: "Pewnego dnia po całym królestwie" },
      { type: "line", text: "rozeszła się wielka wiadomość." },
      { type: "line", text: "W pałacu miał odbyć się bal." },
      { type: "sep" },
      { type: "line", text: "W domu macochy zawrzało." },
      { type: "line", text: "Kopciuszek zapytał cicho," },
      { type: "line", text: "czy on także mógłby pojechać." },
      { type: "sep" },
      { type: "line", text: "— Ty? W sadzy i z popiołem?" },
      { type: "line", text: "— powiedziała macocha." },
      { type: "line", text: "— Zostań tutaj." },
      { type: "sep" },
      { type: "line", text: "Kiedy kareta odjechała," },
      { type: "line", text: "Kopciuszek usiadł przy kominku" },
      { type: "line", text: "i po raz pierwszy od dawna" },
      { type: "line", text: "zapłakał otwarcie." },
      { type: "sep" },
      { type: "line", text: "Wtedy pojawiła się" },
      { type: "line", text: "dobra wróżka chrzestna." },
      { type: "sep" },
      { type: "line", text: "— Nie płacz, moje dziecko —" },
      { type: "line", text: "powiedziała." },
      { type: "line", text: "— Pojedziesz na bal." },
      { type: "sep" },
      { type: "line", text: "Wróżka zamieniła dynię" },
      { type: "line", text: "w złocistą karetę." },
      { type: "line", text: "Myszy stały się rączymi końmi." },
      { type: "sep" },
      { type: "line", text: "Na nodze Kopciuszka" },
      { type: "line", text: "zabłysły pantofelki" },
      { type: "line", text: "lekkie i kruche jak szkło." },
      { type: "sep" },
      { type: "line", text: "— Pamiętaj —" },
      { type: "line", text: "rzekła wróżka —" },
      { type: "line", text: "czar przestanie działać o północy." },
      { type: "line", text: "Musisz wrócić przed" },
      { type: "line", text: "ostatnim uderzeniem dzwonu." },
      { type: "sep" },
      { type: "line", text: "Kiedy nieznajoma weszła na salę," },
      { type: "line", text: "rozmowy ucichły." },
      { type: "line", text: "Sam książę podszedł do niej" },
      { type: "line", text: "i poprosił ją do tańca." },
      { type: "sep" },
      { type: "line", text: "Dopiero gdy zegar" },
      { type: "line", text: "zaczął wybijać północ," },
      { type: "line", text: "serce zabiło Kopciuszkowi gwałtownie." },
      { type: "sep" },
      { type: "line", text: "Zbiegając po schodach," },
      { type: "line", text: "zgubił jeden pantofelek." },
      { type: "sep" },
      { type: "line", text: "Nazajutrz słudzy" },
      { type: "line", text: "przyszli z pantofelkiem." },
      { type: "line", text: "Z kąta odezwał się" },
      { type: "line", text: "spokojny głos Kopciuszka:" },
      { type: "sep" },
      { type: "line", text: "— Czy ja także mogę spróbować?" },
      { type: "sep" },
      { type: "line", text: "Pantofelek pasował idealnie." },
      { type: "sep" },
      { type: "line", text: "Mówi się, że Kopciuszek" },
      { type: "line", text: "nie nosił w sercu urazy." },
      { type: "line", text: "W tym właśnie tkwiła jego siła." },
      { type: "sep" },
      { type: "line", text: "Czasem najpiękniejsze przemiany" },
      { type: "line", text: "zaczynają się nie od czarów," },
      { type: "line", text: "lecz od serca," },
      { type: "line", text: "które mimo trudów pozostaje czyste." },
      { type: "section", text: "— OUTRO —" },
      { type: "line", text: "To był Kopciuszek." },
      { type: "line", text: "Na podstawie klasycznej baśni." },
      { type: "line", text: "Tłumaczenie i opracowanie — 3TaTaTa." },
      { type: "line", text: "Dobranoc." },
    ]
  },
  {
    id: 5,
    title: "Bazyliszek",
    tag: "Legenda polska",
    sections: [
      { type: "title", text: "Bazyliszek" },
      { type: "meta", text: "3TaTaTa · Legenda polska" },
      { type: "section", text: "— INTRO —" },
      { type: "line", text: "3TaTaTa prezentuje." },
      { type: "line", text: "Bazyliszek." },
      { type: "line", text: "Na podstawie klasycznej polskiej legendy." },
      { type: "line", text: "Tłumaczenie i opracowanie — 3TaTaTa." },
      { type: "sep" },
      { type: "section", text: "— LEGENDA —" },
      { type: "line", text: "Dawno temu, w starej Warszawie," },
      { type: "line", text: "szeptano o potworze," },
      { type: "line", text: "którego lepiej było nie szukać." },
      { type: "sep" },
      { type: "line", text: "Mówiono, że głęboko pod miastem" },
      { type: "line", text: "mieszka Bazyliszek —" },
      { type: "line", text: "stwór tak straszny," },
      { type: "line", text: "że jeden jego wzrok" },
      { type: "line", text: "zamieniał ludzi w kamień." },
      { type: "sep" },
      { type: "line", text: "Wtedy zgłosił się" },
      { type: "line", text: "młody czeladnik." },
      { type: "line", text: "Nie był rycerzem ani możnym panem." },
      { type: "line", text: "Miał jednak coś cenniejszego —" },
      { type: "line", text: "chłodny umysł" },
      { type: "line", text: "i serce, które nie pozwalało" },
      { type: "line", text: "przejść obojętnie obok krzywdy." },
      { type: "sep" },
      { type: "line", text: "Stary rzemieślnik" },
      { type: "line", text: "dał mu wypolerowaną tarczę," },
      { type: "line", text: "lśniącą niczym lustro." },
      { type: "sep" },
      { type: "line", text: "— Nie patrz mu prosto w oczy —" },
      { type: "line", text: "ostrzegł." },
      { type: "line", text: "— Niech sam spotka" },
      { type: "line", text: "własne spojrzenie." },
      { type: "sep" },
      { type: "line", text: "W komnacie czeladnik" },
      { type: "line", text: "zobaczył kształty przy ścianach." },
      { type: "line", text: "To nie były posągi —" },
      { type: "line", text: "to byli ludzie zamienieni w kamień." },
      { type: "sep" },
      { type: "line", text: "Na środku leżał Bazyliszek." },
      { type: "line", text: "Miał ciało ogromnego gada," },
      { type: "line", text: "koguci grzebień" },
      { type: "line", text: "i ślepia połyskujące złowrogim blaskiem." },
      { type: "sep" },
      { type: "line", text: "Czeladnik podniósł tarczę" },
      { type: "line", text: "tak, by patrzeć" },
      { type: "line", text: "nie na potwora," },
      { type: "line", text: "lecz na jego odbicie." },
      { type: "sep" },
      { type: "line", text: "Bazyliszek zatrzymał się nagle," },
      { type: "line", text: "jakby sam przeraził się" },
      { type: "line", text: "tego, co zobaczył." },
      { type: "sep" },
      { type: "line", text: "Potwór zesztywniał." },
      { type: "line", text: "Jego ciało skamieniało." },
      { type: "line", text: "Groza, która przez tyle lat" },
      { type: "line", text: "wisiała nad miastem," },
      { type: "line", text: "właśnie dobiegła końca." },
      { type: "sep" },
      { type: "line", text: "Czeladnik nie zwyciężył siłą," },
      { type: "line", text: "lecz odwagą, sprytem" },
      { type: "line", text: "i spokojem" },
      { type: "line", text: "w chwili największego zagrożenia." },
      { type: "sep" },
      { type: "line", text: "Bywają w życiu takie potwory," },
      { type: "line", text: "z którymi nie wygrywa" },
      { type: "line", text: "ten, kto jest najsilniejszy," },
      { type: "line", text: "lecz ten, kto potrafi zachować" },
      { type: "line", text: "rozum i odwagę." },
      { type: "section", text: "— OUTRO —" },
      { type: "line", text: "To była Legenda o Bazyliszku." },
      { type: "line", text: "Na podstawie klasycznej polskiej legendy." },
      { type: "line", text: "Tłumaczenie i opracowanie — 3TaTaTa." },
      { type: "line", text: "Dobranoc." },
    ]
  },
  {
    id: 6,
    title: "GieKSik i BazalBub",
    tag: "Opowieść o przyjaźni",
    sections: [
      { type: "title", text: "GieKSik i BazalBub" },
      { type: "meta", text: "3TaTaTa · Opowieść o przyjaźni" },
      { type: "section", text: "— INTRO —" },
      { type: "line", text: "3TaTaTa prezentuje." },
      { type: "line", text: "GieKSik i BazalBub." },
      { type: "line", text: "Opowieść o przyjaźni, pamięci i braterstwie." },
      { type: "line", text: "Tekst i opracowanie — 3TaTaTa." },
      { type: "sep" },
      { type: "section", text: "— OPOWIEŚĆ —" },
      { type: "line", text: "Dawno temu," },
      { type: "line", text: "tam gdzie ziemia była czarna od węgla," },
      { type: "line", text: "istniały dwa miasta." },
      { type: "sep" },
      { type: "line", text: "W jednym z nich mieszkał GieKSik —" },
      { type: "line", text: "mały strażnik o wielkim sercu." },
      { type: "sep" },
      { type: "line", text: "W drugim mieście," },
      { type: "line", text: "po drugiej stronie wzgórz," },
      { type: "line", text: "żył BazalBub." },
      { type: "line", text: "Miał oczy błyszczące" },
      { type: "line", text: "jak dwa węgliki w ciemności." },
      { type: "sep" },
      { type: "line", text: "Przez długi czas" },
      { type: "line", text: "obaj nie wiedzieli" },
      { type: "line", text: "o swoim istnieniu." },
      { type: "sep" },
      { type: "line", text: "Ale pewnej jesiennej nocy" },
      { type: "line", text: "z głębi ziemi" },
      { type: "line", text: "wypłynęło ciche drżenie." },
      { type: "sep" },
      { type: "line", text: "To Serce Czarnego Kamienia" },
      { type: "line", text: "przebudziło się" },
      { type: "line", text: "po wielu latach snu." },
      { type: "sep" },
      { type: "line", text: "GieKSik usłyszał to drżenie pierwszy." },
      { type: "line", text: "Przyłożył dłoń do ziemi" },
      { type: "line", text: "i poczuł, że ktoś daleko" },
      { type: "line", text: "robi dokładnie to samo." },
      { type: "sep" },
      { type: "line", text: "BazalBub wyszeptał:" },
      { type: "line", text: "— Ktoś mnie woła." },
      { type: "sep" },
      { type: "line", text: "Obaj ruszyli za głosem ziemi." },
      { type: "sep" },
      { type: "line", text: "Spotkali się o świcie" },
      { type: "line", text: "na wzgórzu między dwoma miastami." },
      { type: "sep" },
      { type: "line", text: "Nie padło wtedy wiele słów." },
      { type: "line", text: "Czasem największe rzeczy" },
      { type: "line", text: "zaczynają się właśnie od ciszy." },
      { type: "sep" },
      { type: "line", text: "— Jeśli naprawdę jesteśmy braćmi" },
      { type: "line", text: "z jednej opowieści," },
      { type: "line", text: "ten kamień rozgrzeje się" },
      { type: "line", text: "w naszych dłoniach —" },
      { type: "line", text: "powiedział GieKSik." },
      { type: "sep" },
      { type: "line", text: "Kamień rozbłysł złotym światłem." },
      { type: "line", text: "Ciepłym i spokojnym," },
      { type: "line", text: "takim jak ogień w piecu" },
      { type: "line", text: "zimową nocą." },
      { type: "sep" },
      { type: "line", text: "Z tego światła uniósł się głos:" },
      { type: "line", text: "— Prawdziwa przyjaźń" },
      { type: "line", text: "nie rodzi się z przypadku." },
      { type: "line", text: "Rodzi się z podobnych serc." },
      { type: "sep" },
      { type: "line", text: "Gdy nad jednym miastem" },
      { type: "line", text: "zbierały się ciężkie chmury," },
      { type: "line", text: "drugi przybywał z lampą," },
      { type: "line", text: "by rozświetlić mrok." },
      { type: "sep" },
      { type: "line", text: "Gdy świat próbował im wmówić," },
      { type: "line", text: "że dzielą ich granice," },
      { type: "line", text: "oni odpowiadali," },
      { type: "line", text: "że ziemia pod stopami" },
      { type: "line", text: "jest starsza od każdej kreski na mapie." },
      { type: "sep" },
      { type: "line", text: "Dorośli powtarzali sobie:" },
      { type: "line", text: "— Skoro GieKSik i BazalBub" },
      { type: "line", text: "trzymają się razem," },
      { type: "line", text: "i my damy radę." },
      { type: "sep" },
      { type: "line", text: "Serce Czarnego Kamienia" },
      { type: "line", text: "odezwało się po raz ostatni:" },
      { type: "sep" },
      { type: "line", text: "— Trzydzieści lat temu" },
      { type: "line", text: "powstała przyjaźń." },
      { type: "line", text: "Dziś stała się legendą." },
      { type: "line", text: "A legenda, którą nosi się w sercu," },
      { type: "line", text: "nigdy nie umiera." },
      { type: "sep" },
      { type: "line", text: "Bo prawdziwa przyjaźń, ta największa," },
      { type: "line", text: "nie kończy się nigdy." },
      { type: "line", text: "Ona tylko z roku na rok" },
      { type: "line", text: "staje się piękniejszą bajką." },
      { type: "section", text: "— OUTRO —" },
      { type: "line", text: "To była opowieść" },
      { type: "line", text: "o GieKSiku i BazalBubie." },
      { type: "line", text: "Tekst i opracowanie — 3TaTaTa." },
      { type: "line", text: "Dobranoc." },
    ]
  },
  {

    title: "Klara i telefon do taty",
    tag: "Opowiadanie",
    sections: [
      { type: "title", text: "Klara i telefon do taty" },
      { type: "meta", text: "3TaTaTa · Opowiadanie" },
      { type: "section", text: "— INTRO —" },
      { type: "line", text: "3TaTaTa prezentuje." },
      { type: "line", text: "Klara i telefon do taty." },
      { type: "line", text: "Tekst i opracowanie — 3TaTaTa." },
      { type: "sep" },
      { type: "section", text: "— OPOWIADANIE —" },
      { type: "line", text: "Klara miała siedem lat" },
      { type: "line", text: "i od samego rana" },
      { type: "line", text: "czuła w brzuchu coś dziwnego." },
      { type: "sep" },
      { type: "line", text: "Tego dnia Klara była zaproszona" },
      { type: "line", text: "na urodziny do Jasia." },
      { type: "sep" },
      { type: "line", text: "Jasiu miał już dziesięć lat." },
      { type: "line", text: "Był szybki, głośny," },
      { type: "line", text: "lubił piłkę nożną." },
      { type: "sep" },
      { type: "line", text: "Na urodzinach" },
      { type: "line", text: "byli prawie sami starsi chłopcy." },
      { type: "line", text: "Wysocy, hałaśliwi, pewni siebie." },
      { type: "sep" },
      { type: "line", text: "Jeden z nich powiedział głośno:" },
      { type: "line", text: "— Ej, gramy tylko starsi, dobra?" },
      { type: "sep" },
      { type: "line", text: "Nie powiedział tego złośliwie." },
      { type: "line", text: "Ale dla Klary te słowa" },
      { type: "line", text: "zabrzmiały jak zamknięcie drzwi." },
      { type: "sep" },
      { type: "line", text: "Usiadła cichutko na brzegu kanapy." },
      { type: "line", text: "Wstydziła się odezwać." },
      { type: "line", text: "Wstydziła się podejść." },
      { type: "sep" },
      { type: "line", text: "W jej głowie pojawiła się myśl:" },
      { type: "line", text: "Chcę do domu." },
      { type: "sep" },
      { type: "line", text: "W końcu poszła do łazienki." },
      { type: "line", text: "Zamknęła za sobą drzwi" },
      { type: "line", text: "i oparła się o chłodną ścianę." },
      { type: "sep" },
      { type: "line", text: "Spojrzała na swoje odbicie w lustrze." },
      { type: "line", text: "— Nie chcę tu być —" },
      { type: "line", text: "szepnęła sama do siebie." },
      { type: "sep" },
      { type: "line", text: "Przypomniała sobie coś," },
      { type: "line", text: "co tata mówił jej wiele razy." },
      { type: "sep" },
      { type: "line", text: "Jak coś cię przerasta," },
      { type: "line", text: "jak czujesz się źle albo niepewnie," },
      { type: "line", text: "zawsze możesz zadzwonić." },
      { type: "line", text: "Zawsze." },
      { type: "sep" },
      { type: "line", text: "Klara wyjęła telefon." },
      { type: "line", text: "Palce trochę jej drżały." },
      { type: "line", text: "Nacisnęła zieloną słuchawkę." },
      { type: "sep" },
      { type: "line", text: "Tata odebrał prawie od razu." },
      { type: "sep" },
      { type: "line", text: "— Klarcia?" },
      { type: "sep" },
      { type: "line", text: "— Tato…" },
      { type: "line", text: "ja nie chcę tu być." },
      { type: "sep" },
      { type: "line", text: "— Dobrze, że dzwonisz —" },
      { type: "line", text: "odpowiedział tata łagodnie." },
      { type: "sep" },
      { type: "line", text: "— Czy możesz po mnie przyjechać?" },
      { type: "sep" },
      { type: "line", text: "— Oczywiście —" },
      { type: "line", text: "powiedział tata." },
      { type: "line", text: "— Już jadę." },
      { type: "sep" },
      { type: "line", text: "— Jestem z ciebie dumny," },
      { type: "line", text: "że zadzwoniłaś" },
      { type: "line", text: "i powiedziałaś, jak się czujesz." },
      { type: "sep" },
      { type: "line", text: "Kiedy tata przyszedł," },
      { type: "line", text: "Klara wybiegła do niego" },
      { type: "line", text: "i wtuliła się mocno." },
      { type: "sep" },
      { type: "line", text: "— Przepraszam… —" },
      { type: "line", text: "szepnęła." },
      { type: "sep" },
      { type: "line", text: "Tata pokręcił głową." },
      { type: "line", text: "— Nie przeprasza się" },
      { type: "line", text: "za własne uczucia." },
      { type: "sep" },
      { type: "line", text: "Nad jeziorem tata powiedział:" },
      { type: "sep" },
      { type: "line", text: "— Klaro." },
      { type: "line", text: "Jestem dumny nie z tego," },
      { type: "line", text: "że zawsze sobie radzisz." },
      { type: "line", text: "Jestem dumny z tego," },
      { type: "line", text: "że mówisz prawdę." },
      { type: "line", text: "Nawet wtedy, kiedy się boisz." },
      { type: "sep" },
      { type: "line", text: "Czasem dzielność" },
      { type: "line", text: "to wejść do pokoju" },
      { type: "line", text: "pełnego obcych głosów." },
      { type: "sep" },
      { type: "line", text: "A czasem dzielność" },
      { type: "line", text: "to wyjąć telefon drżącą ręką" },
      { type: "line", text: "i zadzwonić do taty." },
      { type: "section", text: "— OUTRO —" },
      { type: "line", text: "To była opowieść" },
      { type: "line", text: "Klara i telefon do taty." },
      { type: "line", text: "Tekst i opracowanie — 3TaTaTa." },
      { type: "line", text: "Dobranoc." },
    ]
  },
  {
    id: 8,
    title: "Lech, Czech i Rus",
    tag: "Legenda polska",
    sections: [
      { type: "title", text: "Lech, Czech i Rus" },
      { type: "meta", text: "3TaTaTa · Legenda polska" },
      { type: "section", text: "— INTRO —" },
      { type: "line", text: "3TaTaTa prezentuje." },
      { type: "line", text: "Legenda o Lechu, Czechu i Rusie." },
      { type: "line", text: "Na podstawie klasycznej polskiej legendy." },
      { type: "line", text: "Tłumaczenie i opracowanie — 3TaTaTa." },
      { type: "sep" },
      { type: "section", text: "— LEGENDA —" },
      { type: "line", text: "Dawno, bardzo dawno temu," },
      { type: "line", text: "żyło trzech braci." },
      { type: "sep" },
      { type: "line", text: "Nazywali się Lech, Czech i Rus." },
      { type: "sep" },
      { type: "line", text: "Bracia wędrowali długo," },
      { type: "line", text: "szukając miejsca," },
      { type: "line", text: "w którym ich lud" },
      { type: "line", text: "mógłby zbudować bezpieczny dom." },
      { type: "sep" },
      { type: "line", text: "Czech był rozważny i spokojny." },
      { type: "line", text: "Rus był dumny, czujny i wytrwały." },
      { type: "line", text: "Lech zaś miał serce" },
      { type: "line", text: "otwarte na znaki świata." },
      { type: "sep" },
      { type: "line", text: "Czech spojrzał na południe" },
      { type: "line", text: "i powiedział, że właśnie tam" },
      { type: "line", text: "poprowadzi swój lud." },
      { type: "line", text: "Rus wybrał rozległe tereny na wschodzie." },
      { type: "sep" },
      { type: "line", text: "Lech jednak" },
      { type: "line", text: "jeszcze się nie poruszył." },
      { type: "sep" },
      { type: "line", text: "Jego wzrok padł na potężny dąb." },
      { type: "line", text: "Na szczycie znajdowało się gniazdo." },
      { type: "line", text: "A w tym gnieździe siedział" },
      { type: "line", text: "biały orzeł," },
      { type: "line", text: "dumny i spokojny," },
      { type: "line", text: "skąpany w blasku zachodzącego słońca." },
      { type: "sep" },
      { type: "line", text: "— To jest miejsce dla nas —" },
      { type: "line", text: "powiedział Lech." },
      { type: "line", text: "— Tu zbudujemy nasz gród." },
      { type: "line", text: "Tu zapuścimy korzenie." },
      { type: "sep" },
      { type: "line", text: "— Ten biały orzeł" },
      { type: "line", text: "będzie odtąd naszym znakiem —" },
      { type: "line", text: "symbolem siły, odwagi i wolności." },
      { type: "sep" },
      { type: "line", text: "— A ponieważ ujrzeliśmy go przy gnieździe," },
      { type: "line", text: "nazwiemy to miejsce Gnieznem." },
      { type: "sep" },
      { type: "line", text: "Właśnie dlatego biały orzeł" },
      { type: "line", text: "stał się symbolem ziemi Lecha," },
      { type: "line", text: "a później całego polskiego narodu." },
      { type: "sep" },
      { type: "line", text: "Ilekroć spoglądamy na białego orła," },
      { type: "line", text: "możemy pomyśleć o tamtym wieczorze," },
      { type: "line", text: "o czerwonym niebie," },
      { type: "line", text: "o trzech braciach" },
      { type: "line", text: "stojących u progu nowych dziejów." },
      { type: "section", text: "— OUTRO —" },
      { type: "line", text: "To była Legenda" },
      { type: "line", text: "o Lechu, Czechu i Rusie." },
      { type: "line", text: "Na podstawie klasycznej polskiej legendy." },
      { type: "line", text: "Tłumaczenie i opracowanie — 3TaTaTa." },
      { type: "line", text: "Dobranoc." },
    ]
  },
  {
    id: 9,
    title: "Wars i Sawa",

    sections: [
      { type: "title", text: "Wars i Sawa" },
      { type: "meta", text: "3TaTaTa · Legenda polska" },
      { type: "section", text: "— INTRO —" },
      { type: "line", text: "3TaTaTa prezentuje." },
      { type: "line", text: "Legenda o Warsie i Sawie." },
      { type: "line", text: "Na podstawie klasycznej polskiej legendy." },
      { type: "line", text: "Tłumaczenie i opracowanie — 3TaTaTa." },
      { type: "sep" },
      { type: "section", text: "— LEGENDA —" },
      { type: "line", text: "Dawno temu," },
      { type: "line", text: "zanim w miejscu wielkiego miasta" },
      { type: "line", text: "stanęły domy, mosty i ulice," },
      { type: "line", text: "nad szeroką Wisłą" },
      { type: "line", text: "rozciągały się gęste lasy." },
      { type: "sep" },
      { type: "line", text: "Nad jej brzegiem mieszkał" },
      { type: "line", text: "młody rybak imieniem Wars." },
      { type: "sep" },
      { type: "line", text: "Wars był człowiekiem" },
      { type: "line", text: "pracowitym, uczciwym i pogodnym." },
      { type: "sep" },
      { type: "line", text: "Pewnego wieczoru" },
      { type: "line", text: "Wars usłyszał śpiew." },
      { type: "line", text: "Nie był to śpiew ptaka ani człowieka." },
      { type: "sep" },
      { type: "line", text: "Rybak popłynął za tym głosem." },
      { type: "line", text: "Tam, pośród sitowia," },
      { type: "line", text: "ujrzał niezwykłą postać." },
      { type: "sep" },
      { type: "line", text: "Była to młoda dziewczyna" },
      { type: "line", text: "o długich włosach i jasnym spojrzeniu." },
      { type: "line", text: "Nazywała się Sawa." },
      { type: "sep" },
      { type: "line", text: "Rozmawiali długo," },
      { type: "line", text: "jakby znali się od wielu lat." },
      { type: "line", text: "Między nimi rosło uczucie" },
      { type: "line", text: "ciche, dobre i prawdziwe." },
      { type: "sep" },
      { type: "line", text: "Wieść o Sawie dotarła jednak" },
      { type: "line", text: "do chciwego księcia." },
      { type: "line", text: "Zapragnął ją schwytać." },
      { type: "sep" },
      { type: "line", text: "Sawa nie uciekła ze strachu." },
      { type: "line", text: "Stanęła przy brzegu dumna i spokojna." },
      { type: "line", text: "Jej głos popłynął nad wodą," },
      { type: "line", text: "mocny i jasny." },
      { type: "sep" },
      { type: "line", text: "Fale uderzyły o łodzie napastników." },
      { type: "line", text: "Słudzy księcia w popłochu" },
      { type: "line", text: "uciekli z powrotem na ląd." },
      { type: "sep" },
      { type: "line", text: "Z czasem wokół ich domu" },
      { type: "line", text: "zaczęli osiedlać się inni ludzie." },
      { type: "line", text: "Powstała osada," },
      { type: "line", text: "która rosła z roku na rok." },
      { type: "sep" },
      { type: "line", text: "Mówiono, że to miejsce" },
      { type: "line", text: "wyrastało z odwagi Warsa" },
      { type: "line", text: "i z mądrości Sawy." },
      { type: "sep" },
      { type: "line", text: "I właśnie od ich imion" },
      { type: "line", text: "wzięła się nazwa miasta —" },
      { type: "line", text: "Warszawa." },
      { type: "section", text: "— OUTRO —" },
      { type: "line", text: "To była Legenda o Warsie i Sawie." },
      { type: "line", text: "Na podstawie klasycznej polskiej legendy." },
      { type: "line", text: "Tłumaczenie i opracowanie — 3TaTaTa." },
      { type: "line", text: "Dobranoc." },
    ]
  },

      { type: "line", text: "Dawno, dawno temu" },

      { type: "line", text: "która bardzo pragnęła mieć dziecko." },
      { type: "sep" },
      { type: "line", text: "Czarodziejka dała jej ziarenko" },
      { type: "line", text: "i rzekła:" },
      { type: "line", text: "— Zasadź je w doniczce," },
      { type: "line", text: "a potem cierpliwie czekaj." },
      { type: "sep" },
      { type: "line", text: "Z kwiatu wyszła maleńka dziewczynka." },
      { type: "line", text: "Nie miała więcej" },
      { type: "line", text: "niż długość ludzkiego kciuka." },
      { type: "line", text: "Dlatego nazwano ją Calineczką." },
      { type: "sep" },
      { type: "line", text: "Pewnej nocy" },
      { type: "line", text: "przez rozbitą szybę wskoczyła ropucha." },
      { type: "line", text: "Chwyciła łupinkę" },
      { type: "line", text: "wraz ze śpiącą dziewczynką." },
      { type: "sep" },
      { type: "line", text: "Małe rybki" },
      { type: "line", text: "usłyszały płacz Calineczki." },
      { type: "line", text: "Przegryzły łodygę." },
      { type: "line", text: "Liść oderwał się i popłynął." },
      { type: "sep" },
      { type: "line", text: "Przez całe lato" },
      { type: "line", text: "Calineczka mieszkała w lesie." },
      { type: "line", text: "Piła rosę z kwiatów" },
      { type: "line", text: "i jadła słodki pyłek." },
      { type: "sep" },
      { type: "line", text: "Kiedy przyszła zima," },
      { type: "line", text: "w tunelu leżała martwa jaskółka." },
      { type: "line", text: "Calineczka rozsunęła miękkie pióra." },
      { type: "line", text: "Ptak nie był martwy." },
      { type: "line", text: "Był tylko zamarznięty." },
      { type: "sep" },
      { type: "line", text: "Przez całą zimę" },
      { type: "line", text: "potajemnie opiekowała się jaskółką." },
      { type: "sep" },
      { type: "line", text: "— Uratowałaś mi życie —" },

      { type: "line", text: "— Chodź ze mną —" },

      { type: "line", text: "Im dalej na południe," },
      { type: "line", text: "tym cieplej." },

      { type: "line", text: "W samym środku kwiatu" },
      { type: "line", text: "siedział maleńki człowiek" },
      { type: "line", text: "z złotą koroną na głowie." },
      { type: "sep" },
      { type: "line", text: "— Jesteś najpiękniejsza ze wszystkich —" },
      { type: "line", text: "powiedział." },
      { type: "line", text: "— Czy zostaniesz moją królową?" },
      { type: "sep" },
      { type: "line", text: "Ci, którzy byli dobrzy," },
      { type: "line", text: "odważni i wierni swojemu sercu," },
      { type: "line", text: "odnajdują w końcu" },
      { type: "line", text: "własne miejsce na świecie." },
      { type: "section", text: "— OUTRO —" },
      { type: "line", text: "To była Calineczka." },

// ===================== APP STATE =====================
let currentStory = null;
let scrollY = 0;
let isPlaying = false;
let scrollSpeed = 1.2; // px per frame
let animFrame = null;
let totalHeight = 0;
let fontSizeIndex = 1; // 0=sm,1=md,2=lg,3=xl
const fontSizes = ['font-size-sm','font-size-md','font-size-lg','font-size-xl'];
const fontLabels = ['S','M','L','XL'];

// ===================== MENU BUILD =====================
function buildMenu() {
  const list = document.getElementById('story-list');
  list.innerHTML = '';
  STORIES.forEach((story, i) => {
    const item = document.createElement('div');
    item.className = 'story-item';
    item.innerHTML = `
      <span class="story-num">${String(i).padStart(2,'0')}</span>
      <div class="story-info">
        <div class="story-name">${story.title}</div>
        <div class="story-tag">${story.tag}</div>
      </div>
      <span class="story-arrow">›</span>
    `;
    item.addEventListener('click', () => openStory(story));
    list.appendChild(item);
  });
}

// ===================== STORY OPEN =====================
function openStory(story) {
  currentStory = story;
  scrollY = 0;
  isPlaying = false;

  document.getElementById('story-label').textContent = story.title.toUpperCase();
  document.getElementById('menu-screen').style.display = 'none';
  document.getElementById('prompter-screen').style.display = 'flex';

  renderStory(story);
  updatePlayBtn();
  updateProgress();
  applyFontSize();
}

function renderStory(story) {
  const inner = document.getElementById('scroll-inner');
  inner.innerHTML = '';

  story.sections.forEach(item => {
    let el;
    if (item.type === 'title') {
      el = document.createElement('div');
      el.className = 'prompt-title';
      el.textContent = item.text;
    } else if (item.type === 'meta') {
      el = document.createElement('div');
      el.className = 'prompt-meta';
      el.textContent = item.text;
    } else if (item.type === 'section') {
      el = document.createElement('div');
      el.className = 'prompt-section';
      el.textContent = item.text;
    } else if (item.type === 'line') {
      el = document.createElement('div');
      el.className = 'prompt-line';
      el.textContent = item.text;
    } else if (item.type === 'sep') {
      el = document.createElement('div');
      el.className = 'prompt-sep';
      el.textContent = '· · ·';
    }
    if (el) inner.appendChild(el);
  });

  // measure after render
  requestAnimationFrame(() => {
    totalHeight = inner.scrollHeight - document.getElementById('scroll-container').clientHeight;
    applyScroll();
  });
}

// ===================== SCROLL =====================
function applyScroll() {
  const inner = document.getElementById('scroll-inner');
  inner.style.transform = `translateY(${-scrollY}px)`;
  updateProgress();
}

function updateProgress() {
  const pct = totalHeight > 0 ? (scrollY / totalHeight) * 100 : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function scrollLoop() {
  if (!isPlaying) return;
  scrollY += scrollSpeed;
  if (scrollY >= totalHeight) {
    scrollY = totalHeight;
    isPlaying = false;
    updatePlayBtn();
  }
  applyScroll();
  animFrame = requestAnimationFrame(scrollLoop);
}

// ===================== CONTROLS =====================
function togglePlay() {
  isPlaying = !isPlaying;
  updatePlayBtn();
  if (isPlaying) {
    if (scrollY >= totalHeight) { scrollY = 0; applyScroll(); }
    animFrame = requestAnimationFrame(scrollLoop);
  } else {
    cancelAnimationFrame(animFrame);
  }
}

function updatePlayBtn() {
  const btn = document.getElementById('play-btn');
  if (isPlaying) {
    btn.classList.add('playing');
    btn.querySelector('.label').textContent = 'PAUZA';
    btn.querySelector('.icon').textContent = '⏸';
  } else {
    btn.classList.remove('playing');
    btn.querySelector('.label').textContent = 'PLAY';
    btn.querySelector('.icon').textContent = '▶';
  }
}

function speedUp() {
  scrollSpeed = Math.min(scrollSpeed + 0.3, 6);
  flashSpeed();
}

function slowDown() {
  scrollSpeed = Math.max(scrollSpeed - 0.3, 0.3);
  flashSpeed();
}

function flashSpeed() {
  // Visual feedback — briefly show speed on label
  const btn = document.getElementById('play-btn');
  const orig = btn.querySelector('.label').textContent;
  btn.querySelector('.label').textContent = Math.round(scrollSpeed * 10) + '%';
  setTimeout(() => {
    btn.querySelector('.label').textContent = isPlaying ? 'PAUZA' : 'PLAY';
  }, 700);
}

function resetScroll() {
  cancelAnimationFrame(animFrame);
  isPlaying = false;
  scrollY = 0;
  applyScroll();
  updatePlayBtn();
}

function goBack() {
  cancelAnimationFrame(animFrame);
  isPlaying = false;
  document.getElementById('prompter-screen').style.display = 'none';
  document.getElementById('menu-screen').style.display = 'flex';
}

function cycleFont() {
  fontSizeIndex = (fontSizeIndex + 1) % fontSizes.length;
  applyFontSize();
}

function applyFontSize() {
  const inner = document.getElementById('scroll-inner');
  fontSizes.forEach(f => inner.classList.remove(f));
  inner.classList.add(fontSizes[fontSizeIndex]);
  document.getElementById('font-btn').textContent = 'Aa ' + fontLabels[fontSizeIndex];
  // recalculate height
  requestAnimationFrame(() => {
    totalHeight = inner.scrollHeight - document.getElementById('scroll-container').clientHeight;
  });
}

// Touch scroll on prompter
let touchStartY = 0;
let touchStartScrollY = 0;
let isTouching = false;

document.getElementById('scroll-container').addEventListener('touchstart', (e) => {
  // Only handle if it's a swipe (multi-touch ignored)
  if (e.touches.length === 1) {
    touchStartY = e.touches[0].clientY;
    touchStartScrollY = scrollY;
    isTouching = true;
  }
}, { passive: true });

document.getElementById('scroll-container').addEventListener('touchmove', (e) => {
  if (!isTouching) return;
  const dy = touchStartY - e.touches[0].clientY;
  scrollY = Math.max(0, Math.min(totalHeight, touchStartScrollY + dy));
  applyScroll();
}, { passive: true });

document.getElementById('scroll-container').addEventListener('touchend', () => {
  isTouching = false;
});

// Prevent default touch on controls to avoid accidental scroll
document.getElementById('controls').addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// Init
buildMenu();
</script>
