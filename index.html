      {
        "type": "line",
        "text": "stojące przy ścianach."
      },
      {
        "type": "line",
        "text": "Gdy zbliżył pochodnię, serce zabiło mu"
      },
      {
        "type": "line",
        "text": "mocniej —"
      },
      {
        "type": "line",
        "text": "to nie były posągi, lecz ludzie"
      },
      {
        "type": "line",
        "text": "zamienieni w kamień."
      },
      {
        "type": "line",
        "text": "Ich twarze zastygły w przerażeniu, jakby"
      },
      {
        "type": "line",
        "text": "ostatnią rzeczą, jaką zobaczyli, był sam"
      },
      {
        "type": "line",
        "text": "potwór."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Im głębiej szedł, tym bardziej czuł,"
      },
      {
        "type": "line",
        "text": "że zbliża się do czegoś strasznego."
      },
      {
        "type": "line",
        "text": "W końcu dotarł do wielkiej podziemnej"
      },
      {
        "type": "line",
        "text": "komnaty."
      },
      {
        "type": "line",
        "text": "Na środku, pośród kości i rozbitych"
      },
      {
        "type": "line",
        "text": "naczyń, leżał Bazyliszek."
      },
      {
        "type": "line",
        "text": "Miał ciało podobne do ogromnego gada,"
      },
      {
        "type": "line",
        "text": "ostre szpony, koguci grzebień i ślepia"
      },
      {
        "type": "line",
        "text": "połyskujące złowrogim blaskiem."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Stwór poruszył się i uniósł łeb."
      },
      {
        "type": "line",
        "text": "W komnacie rozległ się syk, od"
      },
      {
        "type": "line",
        "text": "którego po plecach przebiegł czeladnikowi dreszcz."
      },
      {
        "type": "line",
        "text": "Wiedział, że jeden nierozważny ruch może"
      },
      {
        "type": "line",
        "text": "go zgubić."
      },
      {
        "type": "line",
        "text": "Podniósł więc tarczę tak, by patrzeć"
      },
      {
        "type": "line",
        "text": "nie na potwora, lecz na jego"
      },
      {
        "type": "line",
        "text": "odbicie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Bazyliszek ruszył naprzód."
      },
      {
        "type": "line",
        "text": "Jego pazury zgrzytnęły po kamieniu."
      },
      {
        "type": "line",
        "text": "Oczy błysnęły jeszcze mocniej, jakby chciał"
      },
      {
        "type": "line",
        "text": "samym spojrzeniem odebrać odwagę temu, kto"
      },
      {
        "type": "line",
        "text": "stanął mu na drodze."
      },
      {
        "type": "line",
        "text": "Ale czeladnik nie ustąpił."
      },
      {
        "type": "line",
        "text": "Cofając się powoli, obracał tarczę tak,"
      },
      {
        "type": "line",
        "text": "by potwór widział w niej własne"
      },
      {
        "type": "line",
        "text": "oczy."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Wtedy stało się coś niezwykłego."
      },
      {
        "type": "line",
        "text": "Bazyliszek zatrzymał się nagle, jakby sam"
      },
      {
        "type": "line",
        "text": "przeraził się tego, co zobaczył."
      },
      {
        "type": "line",
        "text": "Wydał przeciągły, wściekły syk, poderwał łeb"
      },
      {
        "type": "line",
        "text": "jeszcze wyżej i spojrzał prosto w"
      },
      {
        "type": "line",
        "text": "błyszczącą powierzchnię."
      },
      {
        "type": "line",
        "text": "W tej samej chwili moc jego"
      },
      {
        "type": "line",
        "text": "spojrzenia obróciła się przeciw niemu samemu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Potwór zesztywniał."
      },
      {
        "type": "line",
        "text": "Jego łuski pociemniały, ciało skamieniało i"
      },
      {
        "type": "line",
        "text": "po kilku oddechach w miejscu żywego"
      },
      {
        "type": "line",
        "text": "stwora stał już tylko kamienny posąg"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "zimny, martwy i bezsilny."
      },
      {
        "type": "line",
        "text": "Groza, która przez tyle lat wisiała"
      },
      {
        "type": "line",
        "text": "nad miastem, właśnie dobiegła końca."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "W głębi komnaty czeladnik odnalazł zaginioną"
      },
      {
        "type": "line",
        "text": "dziewczynę."
      },
      {
        "type": "line",
        "text": "Była przerażona, lecz żywa."
      },
      {
        "type": "line",
        "text": "Ukryła się w bocznym przejściu i"
      },
      {
        "type": "line",
        "text": "tylko cudem uniknęła spojrzenia potwora."
      },
      {
        "type": "line",
        "text": "Gdy zobaczyła, że Bazyliszek nie żyje,"
      },
      {
        "type": "line",
        "text": "rozpłakała się z ulgi."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Czeladnik wyprowadził ją z podziemi."
      },
      {
        "type": "line",
        "text": "Kiedy wyszli na światło dzienne, mieszkańcy"
      },
      {
        "type": "line",
        "text": "Warszawy nie mogli uwierzyć własnym oczom."
      },
      {
        "type": "line",
        "text": "Najpierw zobaczyli dziewczynę, potem młodzieńca z"
      },
      {
        "type": "line",
        "text": "osmoloną pochodnią i tarczą w dłoniach."
      },
      {
        "type": "line",
        "text": "A gdy usłyszeli, że Bazyliszek został"
      },
      {
        "type": "line",
        "text": "pokonany, na ulicach wybuchła radość."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Matka przytuliła córkę tak mocno, jakby"
      },
      {
        "type": "line",
        "text": "już nigdy nie chciała jej wypuścić."
      },
      {
        "type": "line",
        "text": "Mieszczanie dziękowali czeladnikowi, a jego imię"
      },
      {
        "type": "line",
        "text": "długo powtarzano z wdzięcznością."
      },
      {
        "type": "line",
        "text": "Nie zwyciężył bowiem siłą, lecz odwagą,"
      },
      {
        "type": "line",
        "text": "sprytem i spokojem w chwili największego"
      },
      {
        "type": "line",
        "text": "zagrożenia."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Od tamtej pory legenda o Bazyliszku"
      },
      {
        "type": "line",
        "text": "była przekazywana z pokolenia na pokolenie."
      },
      {
        "type": "line",
        "text": "Przypominała ludziom, że nawet największy strach"
      },
      {
        "type": "line",
        "text": "można pokonać, jeśli nie pozwoli się"
      },
      {
        "type": "line",
        "text": "mu zawładnąć sercem."
      },
      {
        "type": "line",
        "text": "Bo bywają w życiu takie potwory,"
      },
      {
        "type": "line",
        "text": "z którymi nie wygrywa ten, kto"
      },
      {
        "type": "line",
        "text": "jest najsilniejszy, lecz ten, kto potrafi"
      },
      {
        "type": "line",
        "text": "zachować rozum i odwagę."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "I dlatego do dziś, gdy ktoś"
      },
      {
        "type": "line",
        "text": "spaceruje po Starym Mieście w Warszawie"
      },
      {
        "type": "line",
        "text": "i słyszy opowieść o ciemnych piwnicach"
      },
      {
        "type": "line",
        "text": "oraz kamiennym potworze, wie, że to"
      },
      {
        "type": "line",
        "text": "nie tylko legenda o grozie."
      },
      {
        "type": "line",
        "text": "To także historia o mądrości, która"
      },
      {
        "type": "line",
        "text": "potrafi zwyciężyć nawet najbardziej przerażające zło."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OUTRO —"
      },
      {
        "type": "line",
        "text": "To była Legenda o Bazyliszku."
      },
      {
        "type": "line",
        "text": "Na podstawie klasycznej polskiej legendy."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i opracowanie — 3TaTaTa."
      },
      {
        "type": "line",
        "text": "Dobranoc."
      }
    ]

        "text": "— INTRO —"

      {
        "type": "line",
        "text": "3TaTaTa prezentuje."
      },
      {
        "type": "line",
        "text": "GieKSik i BazalBub."
      },
      {
        "type": "line",
        "text": "Opowieść o przyjaźni, pamięci i braterstwie."
      },
      {
        "type": "line",
        "text": "Tekst i opracowanie — 3TaTaTa."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OPOWIEŚĆ —"
      },
      {
        "type": "line",
        "text": "Dawno temu, tam gdzie ziemia była"
      },
      {
        "type": "line",
        "text": "czarna od węgla, a wieczorne niebo"
      },
      {
        "type": "line",
        "text": "rozświetlały ognie hut i lampy w"
      },
      {
        "type": "line",
        "text": "oknach, istniały dwa miasta."
      },
      {
        "type": "line",
        "text": "Nie były zwyczajne, bo pod ich"
      },
      {
        "type": "line",
        "text": "ulicami spały stare opowieści, a w"
      },
      {
        "type": "line",
        "text": "murach domów słychać było echo dawnych"
      },
      {
        "type": "line",
        "text": "pieśni."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "W jednym z tych miast mieszkał"
      },
      {
        "type": "line",
        "text": "GieKSik —"
      },
      {
        "type": "line",
        "text": "mały strażnik o wielkim sercu."
      },
      {
        "type": "line",
        "text": "Nosił w sobie odwagę, upór i"
      },
      {
        "type": "line",
        "text": "ciepło wszystkich ludzi, którzy umieli trzymać"
      },
      {
        "type": "line",
        "text": "się razem nawet wtedy, gdy nadchodziły"
      },
      {
        "type": "line",
        "text": "ciężkie dni."
      },
      {
        "type": "line",
        "text": "Potrafił słuchać, gdy wiatr mówił przez"
      },
      {
        "type": "line",
        "text": "kominy, i rozumiał język iskier tańczących"
      },
      {
        "type": "line",
        "text": "nocą nad dachami."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "W drugim mieście, nieco dalej, po"
      },
      {
        "type": "line",
        "text": "drugiej stronie wzgórz i granic wyrysowanych"
      },
      {
        "type": "line",
        "text": "ręką człowieka, żył BazalBub."
      },
      {
        "type": "line",
        "text": "Był istotą tajemniczą i pogodną zarazem"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "trochę duchem starych murów, trochę opiekunem"
      },
      {
        "type": "line",
        "text": "ulic, a trochę snem tych, którzy"
      },
      {
        "type": "line",
        "text": "nigdy nie zapominali, skąd pochodzą."
      },
      {
        "type": "line",
        "text": "Miał oczy błyszczące jak dwa węgliki"
      },
      {
        "type": "line",
        "text": "w ciemności i śmiech, który rozganiał"
      },
      {
        "type": "line",
        "text": "nawet najgęstszą mgłę."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Przez długi czas obaj nie wiedzieli"
      },
      {
        "type": "line",
        "text": "o swoim istnieniu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Ale pewnej jesiennej nocy, dokładnie wtedy,"
      },
      {
        "type": "line",
        "text": "gdy księżyc zawisł nisko nad kominami,"
      },
      {
        "type": "line",
        "text": "a wiatr niósł zapach deszczu, wydarzyło"
      },
      {
        "type": "line",
        "text": "się coś niezwykłego."
      },
      {
        "type": "line",
        "text": "Z głębi ziemi, z dawnych tuneli"
      },
      {
        "type": "line",
        "text": "pod miastami, wypłynęło ciche drżenie."
      },
      {
        "type": "line",
        "text": "Najstarsi ludzie mówili potem, że to"
      },
      {
        "type": "line",
        "text": "Serce Czarnego Kamienia przebudziło się po"
      },
      {
        "type": "line",
        "text": "wielu latach snu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Kamień ten był bardzo stary."
      },
      {
        "type": "line",
        "text": "Pamiętał czasy, gdy nie było jeszcze"
      },
      {
        "type": "line",
        "text": "granic, a ludzie bardziej wierzyli w"
      },
      {
        "type": "line",
        "text": "słowo dane przy ogniu niż w"
      },
      {
        "type": "line",
        "text": "pieczęcie i dokumenty."
      },
      {
        "type": "line",
        "text": "Według legendy Serce budziło się tylko"
      },
      {
        "type": "line",
        "text": "wtedy, gdy gdzieś blisko siebie żyły"
      },
      {
        "type": "line",
        "text": "dwa duchy podobne do siebie bardziej,"
      },
      {
        "type": "line",
        "text": "niż same o tym wiedziały."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "GieKSik usłyszał to drżenie pierwszy."
      },
      {
        "type": "line",
        "text": "Przyłożył dłoń do ziemi i poczuł,"
      },
      {
        "type": "line",
        "text": "że ktoś daleko robi dokładnie to"
      },
      {
        "type": "line",
        "text": "samo."
      },
      {
        "type": "line",
        "text": "W tym samym momencie BazalBub położył"
      },
      {
        "type": "line",
        "text": "się na starym bruku, zamknął oczy"
      },
      {
        "type": "line",
        "text": "i wyszeptał:"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Ktoś mnie woła."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Obaj ruszyli za głosem ziemi."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Szli przez mokre ulice, przez kopalniane"
      },
      {
        "type": "line",
        "text": "ścieżki, przez lasy pachnące jesienią."
      },
      {
        "type": "line",
        "text": "Nie potrzebowali map, bo prowadziło ich"
      },
      {
        "type": "line",
        "text": "coś starszego niż drogowskazy —"
      },
      {
        "type": "line",
        "text": "cicha pewność, że na końcu drogi"
      },
      {
        "type": "line",
        "text": "czeka ktoś bliski."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Spotkali się o świcie na wzgórzu"
      },
      {
        "type": "line",
        "text": "między dwoma miastami."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Nie padło wtedy wiele słów."
      },
      {
        "type": "line",
        "text": "Czasem największe rzeczy zaczynają się właśnie"
      },
      {
        "type": "line",
        "text": "od ciszy."
      },
      {
        "type": "line",
        "text": "GieKSik spojrzał na BazalBuba, a BazalBub"
      },
      {
        "type": "line",
        "text": "spojrzał na GieKSika, i od razu"
      },
      {
        "type": "line",
        "text": "wiedzieli."
      },
      {
        "type": "line",
        "text": "W ich sercach była ta sama"
      },
      {
        "type": "line",
        "text": "iskra: miłość do swoich ludzi, szacunek"
      },
      {
        "type": "line",
        "text": "dla przeszłości i wierność, której nie"
      },
      {
        "type": "line",
        "text": "łamie ani czas, ani odległość."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Między nimi leżał mały, czarny kamień."
      },
      {
        "type": "line",
        "text": "Ten sam, który obudził ich obu."
      },
      {
        "type": "line",
        "text": "GieKSik podniósł go ostrożnie i powiedział:"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Jeśli naprawdę jesteśmy braćmi z jednej"
      },
      {
        "type": "line",
        "text": "opowieści, ten kamień rozgrzeje się w"
      },
      {
        "type": "line",
        "text": "naszych dłoniach."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "BazalBub położył na nim swoją łapę."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "I wtedy stało się coś, czego"
      },
      {
        "type": "line",
        "text": "nie zapomniano przez następne trzydzieści lat."
      },
      {
        "type": "line",
        "text": "Kamień rozbłysł złotym światłem."
      },
      {
        "type": "line",
        "text": "Nie oślepiającym, lecz ciepłym, spokojnym, takim,"
      },
      {
        "type": "line",
        "text": "które przypomina ogień w piecu zimową"
      },
      {
        "type": "line",
        "text": "nocą."
      },
      {
        "type": "line",
        "text": "Z tego światła uniósł się stary"
      },
      {
        "type": "line",
        "text": "głos ziemi:"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Prawdziwa przyjaźń nie rodzi się z"
      },
      {
        "type": "line",
        "text": "przypadku."
      },
      {
        "type": "line",
        "text": "Rodzi się z podobnych serc."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Od tamtej chwili GieKSik i BazalBub"
      },
      {
        "type": "line",
        "text": "stali się nierozłączni."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Gdy nad jednym miastem zbierały się"
      },
      {
        "type": "line",
        "text": "ciężkie chmury, drugi przybywał z lampą,"
      },
      {
        "type": "line",
        "text": "by rozświetlić mrok."
      },
      {
        "type": "line",
        "text": "Gdy komuś brakowało sił, drugi przynosił"
      },
      {
        "type": "line",
        "text": "pieśń, śmiech i otuchę."
      },
      {
        "type": "line",
        "text": "Gdy świat próbował im wmówić, że"
      },
      {
        "type": "line",
        "text": "dzielą ich granice, oni odpowiadali, że"
      },
      {
        "type": "line",
        "text": "ziemia pod stopami jest starsza od"
      },
      {
        "type": "line",
        "text": "każdej kreski na mapie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Z czasem ich przyjaźń stała się"
      },
      {
        "type": "line",
        "text": "tak wielka, że zaczęły o niej"
      },
      {
        "type": "line",
        "text": "mówić kominy, szyby kopalniane i stare"
      },
      {
        "type": "line",
        "text": "kamienice."
      },
      {
        "type": "line",
        "text": "Dzieci zasypiały, słuchając opowieści o dwóch"
      },
      {
        "type": "line",
        "text": "strażnikach czarnej ziemi."
      },
      {
        "type": "line",
        "text": "Dorośli, kiedy robiło się naprawdę trudno,"
      },
      {
        "type": "line",
        "text": "powtarzali sobie:"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Skoro GieKSik i BazalBub trzymają się"
      },
      {
        "type": "line",
        "text": "razem, i my damy radę."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Mijały lata."
      },
      {
        "type": "line",
        "text": "Były zimy siarczyste i lata gorące."
      },
      {
        "type": "line",
        "text": "Były dni jasne jak poranek i"
      },
      {
        "type": "line",
        "text": "noce ciężkie jak żelazo."
      },
      {
        "type": "line",
        "text": "Lecz przyjaźń rosła."
      },
      {
        "type": "line",
        "text": "Nie była krucha jak szkło ani"
      },
      {
        "type": "line",
        "text": "lekka jak dym."
      },
      {
        "type": "line",
        "text": "Była mocna jak kamień, z którego"
      },
      {
        "type": "line",
        "text": "zbudowano domy, ulice i ludzkie charaktery."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Na trzydziestą rocznicę ich spotkania wydarzył"
      },
      {
        "type": "line",
        "text": "się jeszcze jeden cud."
      },
      {
        "type": "line",
        "text": "Tam, na tym samym wzgórzu, gdzie"
      },
      {
        "type": "line",
        "text": "poznali się przed laty, znów zapłonęło"
      },
      {
        "type": "line",
        "text": "złote światło."
      },
      {
        "type": "line",
        "text": "GieKSik i BazalBub stanęli obok siebie,"
      },
      {
        "type": "line",
        "text": "już starsi, mądrzejsi, lecz z tym"
      },
      {
        "type": "line",
        "text": "samym blaskiem w oczach."
      },
      {
        "type": "line",
        "text": "Serce Czarnego Kamienia odezwało się po"
      },
      {
        "type": "line",
        "text": "raz ostatni:"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Trzydzieści lat temu powstała przyjaźń."
      },
      {
        "type": "line",
        "text": "Dziś stała się legendą."
      },
      {
        "type": "line",
        "text": "A legenda, którą nosi się w"
      },
      {
        "type": "line",
        "text": "sercu, nigdy nie umiera."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Wtedy wiatr poniósł tę wiadomość do"
      },
      {
        "type": "line",
        "text": "obu miast."
      },
      {
        "type": "line",
        "text": "W oknach zapłonęły światła."
      },
      {
        "type": "line",
        "text": "Na ulicach zrobiło się cieplej, choć"
      },
      {
        "type": "line",
        "text": "była noc."
      },
      {
        "type": "line",
        "text": "I każdy, kto spojrzał w niebo,"
      },
      {
        "type": "line",
        "text": "mógł przysiąc, że między gwiazdami widać"
      },
      {
        "type": "line",
        "text": "dwa małe cienie —"
      },
      {
        "type": "line",
        "text": "jeden podobny do GieKSika, drugi do"
      },
      {
        "type": "line",
        "text": "BazalBuba —"
      },
      {
        "type": "line",
        "text": "jakby czuwali nad wszystkimi, którzy wierzą"
      },
      {
        "type": "line",
        "text": "w wierność, pamięć i braterstwo."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "A gdy czasem późnym wieczorem usłyszysz,"
      },
      {
        "type": "line",
        "text": "jak wiatr nuci coś cicho przy"
      },
      {
        "type": "line",
        "text": "kominie, wiedz, że to oni wciąż"
      },
      {
        "type": "line",
        "text": "rozmawiają."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Bo prawdziwa przyjaźń, ta największa, nie"
      },
      {
        "type": "line",
        "text": "kończy się nigdy."
      },
      {
        "type": "line",
        "text": "Ona tylko z roku na rok"
      },
      {
        "type": "line",
        "text": "staje się piękniejszą bajką."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OUTRO —"
      },
      {
        "type": "line",
        "text": "To była opowieść o GieKSiku i BazalBubie."
      },
      {
        "type": "line",
        "text": "Tekst i opracowanie — 3TaTaTa."
      },
      {
        "type": "line",
        "text": "Dobranoc."
      }
    ]
  },
  {
    "id": 7,
    "title": "Klara i telefon do taty",
    "tag": "Opowiadanie",
    "sections": [
      {
        "type": "title",
        "text": "Klara i telefon do taty"
      },
      {
        "type": "meta",
        "text": "3TaTaTa · Opowiadanie"
      },
      {
        "type": "section",
        "text": "— INTRO —"
      },
      {
        "type": "line",
        "text": "3TaTaTa prezentuje."
      },
      {
        "type": "line",
        "text": "Klara i telefon do taty."
      },
      {
        "type": "line",
        "text": "Tekst i opracowanie — 3TaTaTa."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OPOWIEŚĆ —"
      },
      {
        "type": "line",
        "text": "Klara miała siedem lat i od"
      },
      {
        "type": "line",
        "text": "samego rana czuła w brzuchu coś"
      },
      {
        "type": "line",
        "text": "dziwnego."
      },
      {
        "type": "line",
        "text": "To nie był zwykły ból brzucha,"
      },
      {
        "type": "line",
        "text": "ani głód, ani nawet zdenerwowanie przed"
      },
      {
        "type": "line",
        "text": "klasówką."
      },
      {
        "type": "line",
        "text": "To było takie delikatne ściskanie, jakby"
      },
      {
        "type": "line",
        "text": "w środku siedział mały ptaszek i"
      },
      {
        "type": "line",
        "text": "poruszał skrzydłami."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Tego dnia Klara była zaproszona na"
      },
      {
        "type": "line",
        "text": "urodziny do Jasia."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Jasiu mieszkał dwa bloki dalej i"
      },
      {
        "type": "line",
        "text": "chodził do tej samej szkoły, choć"
      },
      {
        "type": "line",
        "text": "był starszy od Klary."
      },
      {
        "type": "line",
        "text": "Miał już dziesięć lat."
      },
      {
        "type": "line",
        "text": "Był szybki, głośny, lubił piłkę nożną"
      },
      {
        "type": "line",
        "text": "i śmiał się tak donośnie, że"
      },
      {
        "type": "line",
        "text": "czasem było go słychać jeszcze na"
      },
      {
        "type": "line",
        "text": "klatce schodowej."
      },
      {
        "type": "line",
        "text": "Klara znała go tylko trochę."
      },
      {
        "type": "line",
        "text": "Czasami widywali się na podwórku, czasami"
      },
      {
        "type": "line",
        "text": "mówili sobie cześć, a raz Jasiu"
      },
      {
        "type": "line",
        "text": "pomógł jej dosięgnąć latawca, który zaplątał"
      },
      {
        "type": "line",
        "text": "się w niski krzak."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Kiedy więc dostała zaproszenie, trochę się"
      },
      {
        "type": "line",
        "text": "ucieszyła, a trochę przestraszyła."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Mamo, a kto tam będzie?"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "zapytała rano, poprawiając kokardkę przy sukience."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Pewnie koledzy Jasia —"
      },
      {
        "type": "line",
        "text": "odpowiedziała mama."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Ale to nie znaczy, że nie"
      },
      {
        "type": "line",
        "text": "będzie miło."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Klara skinęła głową."
      },
      {
        "type": "line",
        "text": "Chciała być dzielna."
      },
      {
        "type": "line",
        "text": "Naprawdę chciała."
      },
      {
        "type": "line",
        "text": "Wzięła prezent, pięknie zapakowany w papier"
      },
      {
        "type": "line",
        "text": "w małe żółte gwiazdki, i ruszyła."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Na początku wszystko wyglądało zwyczajnie."
      },
      {
        "type": "line",
        "text": "W mieszkaniu pachniało ciastem czekoladowym i"
      },
      {
        "type": "line",
        "text": "pizzą."
      },
      {
        "type": "line",
        "text": "Na stole stały miseczki z chrupkami,"
      },
      {
        "type": "line",
        "text": "owocami i cukierkami."
      },
      {
        "type": "line",
        "text": "W salonie wisiały balony, a Jasiu"
      },
      {
        "type": "line",
        "text": "od progu zawołał:"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Hej!"
      },
      {
        "type": "line",
        "text": "Klara przyszła!"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Klara uśmiechnęła się nieśmiało i podała"
      },
      {
        "type": "line",
        "text": "prezent."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Wszystkiego najlepszego —"
      },
      {
        "type": "line",
        "text": "powiedziała cicho."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Dzięki!"
      },
      {
        "type": "line",
        "text": "Chodź, pokażę ci mój nowy tor"
      },
      {
        "type": "line",
        "text": "samochodowy —"
      },
      {
        "type": "line",
        "text": "odpowiedział Jasiu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Ale zaraz z drugiego pokoju dobiegły"
      },
      {
        "type": "line",
        "text": "okrzyki: —"
      },
      {
        "type": "line",
        "text": "Jasiu!"
      },
      {
        "type": "line",
        "text": "Gramy!"
      },
      {
        "type": "line",
        "text": "Dawaj już!"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "I wtedy Klara zobaczyła, że na"
      },
      {
        "type": "line",
        "text": "urodzinach są prawie sami starsi chłopcy."
      },
      {
        "type": "line",
        "text": "Wysocy, hałaśliwi, pewni siebie."
      },
      {
        "type": "line",
        "text": "Mieli po dziesięć lat, a może"
      },
      {
        "type": "line",
        "text": "niektórzy nawet trochę więcej."
      },
      {
        "type": "line",
        "text": "Mówili szybko, przekrzykiwali się, biegali z"
      },
      {
        "type": "line",
        "text": "pokoju do pokoju, a śmiech odbijał"
      },
      {
        "type": "line",
        "text": "się od ścian jak piłeczka."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Klara stanęła przy framudze drzwi i"
      },
      {
        "type": "line",
        "text": "nagle poczuła, że ten mały ptaszek"
      },
      {
        "type": "line",
        "text": "w brzuchu wcale nie macha już"
      },
      {
        "type": "line",
        "text": "spokojnie skrzydłami."
      },
      {
        "type": "line",
        "text": "Teraz trzepotał szybko i niespokojnie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Chłopcy rozmawiali o grach, o piłce,"
      },
      {
        "type": "line",
        "text": "o jakimś meczu i o czymś,"
      },
      {
        "type": "line",
        "text": "czego Klara zupełnie nie rozumiała."
      },
      {
        "type": "line",
        "text": "Jeden z nich powiedział głośno:"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Ej, gramy tylko starsi, dobra?"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Nie powiedział tego złośliwie."
      },
      {
        "type": "line",
        "text": "Powiedział to tak po prostu, jakby"
      },
      {
        "type": "line",
        "text": "to było coś całkiem normalnego."
      },
      {
        "type": "line",
        "text": "Ale dla Klary te słowa zabrzmiały"
      },
      {
        "type": "line",
        "text": "jak zamknięcie drzwi."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Usiadła cichutko na brzegu kanapy."
      },
      {
        "type": "line",
        "text": "Nikt jej nie wyganiał, ale też"
      },
      {
        "type": "line",
        "text": "nikt specjalnie jej nie zauważał."
      },
      {
        "type": "line",
        "text": "Przez chwilę próbowała patrzeć, jak grają."
      },
      {
        "type": "line",
        "text": "Potem wzięła do ręki soczek."
      },
      {
        "type": "line",
        "text": "Potem odstawiła go z powrotem."
      },
      {
        "type": "line",
        "text": "Zaczęła przesuwać palcem po kokardce na"
      },
      {
        "type": "line",
        "text": "sukience."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Wstydziła się."
      },
      {
        "type": "line",
        "text": "Wstydziła się odezwać."
      },
      {
        "type": "line",
        "text": "Wstydziła się podejść."
      },
      {
        "type": "line",
        "text": "Wstydziła się nawet wstać, żeby nie"
      },
      {
        "type": "line",
        "text": "zwrócić na siebie uwagi."
      },
      {
        "type": "line",
        "text": "Miała wrażenie, że jest za mała,"
      },
      {
        "type": "line",
        "text": "za cicha i zupełnie nie na"
      },
      {
        "type": "line",
        "text": "miejscu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "W jej głowie pojawiła się myśl:"
      },
      {
        "type": "line",
        "text": "Chcę do domu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Ale zaraz za nią przyszła druga:"
      },
      {
        "type": "line",
        "text": "Może powinnam zostać."
      },
      {
        "type": "line",
        "text": "Może powinnam wytrzymać."
      },
      {
        "type": "line",
        "text": "Może powinnam dać radę."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Klara siedziała tak jeszcze kilka minut."
      },
      {
        "type": "line",
        "text": "Dla dorosłych to było tylko kilka"
      },
      {
        "type": "line",
        "text": "minut."
      },
      {
        "type": "line",
        "text": "Dla niej —"
      },
      {
        "type": "line",
        "text": "bardzo dużo."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "W końcu poszła do łazienki."
      },
      {
        "type": "line",
        "text": "Zamknęła za sobą drzwi i oparła"
      },
      {
        "type": "line",
        "text": "się plecami o chłodną ścianę."
      },
      {
        "type": "line",
        "text": "W łazience było cicho."
      },
      {
        "type": "line",
        "text": "Słychać było tylko stłumione okrzyki chłopców"
      },
      {
        "type": "line",
        "text": "zza drzwi i delikatne kapanie wody"
      },
      {
        "type": "line",
        "text": "z kranu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Klara spojrzała na swoje odbicie w"
      },
      {
        "type": "line",
        "text": "lustrze."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Nie chcę tu być —"
      },
      {
        "type": "line",
        "text": "szepnęła sama do siebie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "I wtedy przypomniała sobie coś, co"
      },
      {
        "type": "line",
        "text": "tata mówił jej wiele razy."
      },
      {
        "type": "line",
        "text": "Jak coś cię przerasta, jak czujesz"
      },
      {
        "type": "line",
        "text": "się źle albo niepewnie, zawsze możesz"
      },
      {
        "type": "line",
        "text": "zadzwonić."
      },
      {
        "type": "line",
        "text": "Zawsze."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "To słowo zawsze było w jej"
      },
      {
        "type": "line",
        "text": "pamięci bardzo wyraźne."
      },
      {
        "type": "line",
        "text": "Ciepłe i mocne."
      },
      {
        "type": "line",
        "text": "Jak miękki koc, którym można się"
      },
      {
        "type": "line",
        "text": "przykryć."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Klara włożyła rękę do małej torebki."
      },
      {
        "type": "line",
        "text": "Miała tam dziecięcy telefon, ten, który"
      },
      {
        "type": "line",
        "text": "dostawała na ważniejsze wyjścia."
      },
      {
        "type": "line",
        "text": "Palce trochę jej drżały."
      },
      {
        "type": "line",
        "text": "Przez chwilę patrzyła na ekran."
      },
      {
        "type": "line",
        "text": "Nagle pomyślała, że może przesadza."
      },
      {
        "type": "line",
        "text": "Może tata uzna, że jest niemądra."
      },
      {
        "type": "line",
        "text": "Może powie, żeby spróbowała jeszcze trochę"
      },
      {
        "type": "line",
        "text": "posiedzieć."
      },
      {
        "type": "line",
        "text": "Może będzie zawiedziony."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Ale potem znów poczuła ścisk w"
      },
      {
        "type": "line",
        "text": "brzuchu."
      },
      {
        "type": "line",
        "text": "Nacisnęła zieloną słuchawkę."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Tata odebrał prawie od razu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Klarcia?"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Klara przez moment nic nie mówiła."
      },
      {
        "type": "line",
        "text": "Usłyszała jego głos i od razu"
      },
      {
        "type": "line",
        "text": "oczy zrobiły jej się mokre."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Tato… —"
      },
      {
        "type": "line",
        "text": "powiedziała bardzo cicho."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Ja… ja nie chcę tu być."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Po drugiej stronie zapadła krótka cisza,"
      },
      {
        "type": "line",
        "text": "ale nie była to zła cisza."
      },
      {
        "type": "line",
        "text": "To była cisza uważna, spokojna, taka,"
      },
      {
        "type": "line",
        "text": "w której ktoś naprawdę słucha."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Dobrze, że dzwonisz —"
      },
      {
        "type": "line",
        "text": "odpowiedział tata łagodnie."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Co się dzieje, kochanie?"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Są sami starsi chłopcy… i ja"
      },
      {
        "type": "line",
        "text": "się bardzo wstydzę… i oni się"
      },
      {
        "type": "line",
        "text": "bawią sami… i próbowałam, ale nie"
      },
      {
        "type": "line",
        "text": "umiem… Czy możesz po mnie przyjechać?"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Oczywiście —"
      },
      {
        "type": "line",
        "text": "powiedział tata."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Już jadę."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Naprawdę?"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Naprawdę."
      },
      {
        "type": "line",
        "text": "Jestem z ciebie dumny, że zadzwoniłaś"
      },
      {
        "type": "line",
        "text": "i powiedziałaś, jak się czujesz."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Klara zamrugała."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Dumny?"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Bardzo."
      },
      {
        "type": "line",
        "text": "Trzeba odwagi, żeby to powiedzieć."
      },
      {
        "type": "line",
        "text": "Poczekaj spokojnie, dobrze?"
      },
      {
        "type": "line",
        "text": "Zaraz będę."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Kiedy się rozłączyła, przez chwilę stała"
      },
      {
        "type": "line",
        "text": "jeszcze w łazience i patrzyła na"
      },
      {
        "type": "line",
        "text": "telefon."
      },
      {
        "type": "line",
        "text": "Czuła, że w środku nie jest"
      },
      {
        "type": "line",
        "text": "już aż tak ciasno."
      },
      {
        "type": "line",
        "text": "Jakby ten mały ptaszek w brzuchu"
      },
      {
        "type": "line",
        "text": "usiadł wreszcie spokojnie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Po kilku minutach zadzwonił domofon."
      },
      {
        "type": "line",
        "text": "Mama Jasia poszła otworzyć, a po"
      },
      {
        "type": "line",
        "text": "chwili w przedpokoju stanął tata Klary."
      },
      {
        "type": "line",
        "text": "Miał na sobie granatową kurtkę i"
      },
      {
        "type": "line",
        "text": "ten sam spokojny wyraz twarzy, który"
      },
      {
        "type": "line",
        "text": "zawsze miał wtedy, kiedy chciał, żeby"
      },
      {
        "type": "line",
        "text": "wszystko od razu stało się prostsze."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Klara wybiegła do niego i wtuliła"
      },
      {
        "type": "line",
        "text": "się mocno."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Hej, Kropko —"
      },
      {
        "type": "line",
        "text": "powiedział cicho, gładząc ją po włosach."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Przepraszam… —"
      },
      {
        "type": "line",
        "text": "szepnęła."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Tata odsunął się trochę i spojrzał"
      },
      {
        "type": "line",
        "text": "jej w oczy."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Za co?"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Klara nie wiedziała."
      },
      {
        "type": "line",
        "text": "Właściwie nie miała odpowiedzi."
      },
      {
        "type": "line",
        "text": "Po prostu wydawało jej się, że"
      },
      {
        "type": "line",
        "text": "może powinna przeprosić za to, że"
      },
      {
        "type": "line",
        "text": "nie dała rady."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Za to, że chciałam wracać."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Tata pokręcił głową."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Nie przeprasza się za własne uczucia."
      },
      {
        "type": "line",
        "text": "Zwłaszcza kiedy umie się o nich"
      },
      {
        "type": "line",
        "text": "powiedzieć."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Mama Jasia podeszła bliżej."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Wszystko w porządku?"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "zapytała życzliwie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Klara schowała twarz w rękawie taty,"
      },
      {
        "type": "line",
        "text": "więc to on odpowiedział: —"
      },
      {
        "type": "line",
        "text": "Tak, po prostu Klara nie czuje"
      },
      {
        "type": "line",
        "text": "się dziś swobodnie."
      },
      {
        "type": "line",
        "text": "Zabieram ją do domu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Mama Jasia uśmiechnęła się ciepło."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "To żaden problem."
      },
      {
        "type": "line",
        "text": "Klaro, dziękuję, że przyszłaś."
      },
      {
        "type": "line",
        "text": "Jasiowi będzie bardzo miło z prezentu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Klara skinęła lekko głową."
      },
      {
        "type": "line",
        "text": "Jasiu też wybiegł do przedpokoju."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Już idziesz?"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "zapytał zdziwiony."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Tak —"
      },
      {
        "type": "line",
        "text": "powiedziała Klara."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Wszystkiego najlepszego jeszcze raz."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Dzięki —"
      },
      {
        "type": "line",
        "text": "odpowiedział Jasiu."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "To pa."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "I tyle."
      },
      {
        "type": "line",
        "text": "Bez złości."
      },
      {
        "type": "line",
        "text": "Bez śmiechu."
      },
      {
        "type": "line",
        "text": "Bez niczego strasznego."
      },
      {
        "type": "line",
        "text": "Czasem najtrudniejsze rzeczy w naszej głowie"
      },
      {
        "type": "line",
        "text": "okazują się mniejsze, kiedy już się"
      },
      {
        "type": "line",
        "text": "wydarzą."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Na dworze powietrze było chłodne i"
      },
      {
        "type": "line",
        "text": "pachniało wieczorem."
      },
      {
        "type": "line",
        "text": "Słońce zaczynało zachodzić, malując niebo na"
      },
      {
        "type": "line",
        "text": "różowo i pomarańczowo."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Jedziemy od razu do domu?"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "zapytała Klara, kiedy wsiedli do auta."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Tata uśmiechnął się lekko."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Mam lepszy pomysł."
      },
      {
        "type": "line",
        "text": "Zabierzemy Rurka i pojedziemy nad jezioro."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Rurek był ich psem."
      },
      {
        "type": "line",
        "text": "Kudłatym, wesołym mieszańcem z uszami, które"
      },
      {
        "type": "line",
        "text": "nigdy nie potrafiły zdecydować, czy mają"
      },
      {
        "type": "line",
        "text": "sterczeć, czy opadać."
      },
      {
        "type": "line",
        "text": "Kochał spacery bardziej niż cokolwiek na"
      },
      {
        "type": "line",
        "text": "świecie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Nad jeziorem było cicho i szeroko."
      },
      {
        "type": "line",
        "text": "Woda miała kolor ciemnego srebra, a"
      },
      {
        "type": "line",
        "text": "po jej powierzchni przesuwały się długie"
      },
      {
        "type": "line",
        "text": "smugi wiatru."
      },
      {
        "type": "line",
        "text": "W trzcinach coś szeleściło, z oddali"
      },
      {
        "type": "line",
        "text": "dobiegał głos ptaka, a ścieżka wokół"
      },
      {
        "type": "line",
        "text": "jeziora była prawie pusta."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Rurek pobiegł pierwszy, wąchając każdy kamień,"
      },
      {
        "type": "line",
        "text": "każdą kępkę trawy i każdy patyk,"
      },
      {
        "type": "line",
        "text": "jakby wszystkie kryły największą tajemnicę świata."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Klara szła obok taty."
      },
      {
        "type": "line",
        "text": "Najpierw milczeli."
      },
      {
        "type": "line",
        "text": "To było dobre milczenie."
      },
      {
        "type": "line",
        "text": "Takie, w którym nic nie trzeba"
      },
      {
        "type": "line",
        "text": "mówić od razu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "W końcu tata odezwał się spokojnie:"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Wiesz, co mi się dziś najbardziej"
      },
      {
        "type": "line",
        "text": "podobało?"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Klara spojrzała na niego."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Co?"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "To, że posłuchałaś siebie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Szli jeszcze kilka kroków."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Nie zawsze trzeba zostać gdzieś tylko"
      },
      {
        "type": "line",
        "text": "dlatego, że się przyszło —"
      },
      {
        "type": "line",
        "text": "mówił dalej tata."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Czasem odwaga nie polega na tym,"
      },
      {
        "type": "line",
        "text": "żeby wytrzymać za wszelką cenę."
      },
      {
        "type": "line",
        "text": "Czasem odwaga polega na tym, żeby"
      },
      {
        "type": "line",
        "text": "powiedzieć: to nie jest dla mnie."
      },
      {
        "type": "line",
        "text": "Chcę wracać."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Klara patrzyła na jezioro, po którym"
      },
      {
        "type": "line",
        "text": "biegły małe fale."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Myślałam, że będziesz zawiedziony —"
      },
      {
        "type": "line",
        "text": "przyznała."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Tata zatrzymał się i przykucnął, żeby"
      },
      {
        "type": "line",
        "text": "być na wysokości jej oczu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Klaro."
      },
      {
        "type": "line",
        "text": "Jestem dumny nie z tego, że"
      },
      {
        "type": "line",
        "text": "zawsze sobie radzisz."
      },
      {
        "type": "line",
        "text": "Jestem dumny z tego, że mówisz"
      },
      {
        "type": "line",
        "text": "prawdę."
      },
      {
        "type": "line",
        "text": "Nawet wtedy, kiedy się boisz."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Klara poczuła, że robi jej się"
      },
      {
        "type": "line",
        "text": "ciepło w środku."
      },
      {
        "type": "line",
        "text": "Zupełnie inaczej niż wcześniej."
      },
      {
        "type": "line",
        "text": "Nie jak ścisk, tylko jak mała"
      },
      {
        "type": "line",
        "text": "lampka, która właśnie się zapaliła."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Potem spacerowali jeszcze długo."
      },
      {
        "type": "line",
        "text": "Klara zbierała gładkie kamyki do kieszeni."
      },
      {
        "type": "line",
        "text": "Tata rzucał Rurkowi patyk."
      },
      {
        "type": "line",
        "text": "Niebo robiło się coraz ciemniejsze, ale"
      },
      {
        "type": "line",
        "text": "wciąż było jasne przy samym horyzoncie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Kiedy wracali do samochodu, Klara była"
      },
      {
        "type": "line",
        "text": "już zmęczona, ale spokojna."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Tato?"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "zapytała sennie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Tak?"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Następnym razem może będzie mi łatwiej."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Możliwe —"
      },
      {
        "type": "line",
        "text": "odpowiedział."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "A jeśli nie, to też dobrze."
      },
      {
        "type": "line",
        "text": "Nauczysz się siebie jeszcze lepiej."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Klara przytuliła policzek do miękkiego futra"
      },
      {
        "type": "line",
        "text": "Rurka."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Tego wieczoru, kiedy leżała już w"
      },
      {
        "type": "line",
        "text": "łóżku, pomyślała, że ten dzień wcale"
      },
      {
        "type": "line",
        "text": "nie był porażką."
      },
      {
        "type": "line",
        "text": "Choć rano tak bardzo chciała być"
      },
      {
        "type": "line",
        "text": "dzielna, wieczorem zrozumiała, że dzielność może"
      },
      {
        "type": "line",
        "text": "wyglądać inaczej, niż się wydaje."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Czasem dzielność to wejść do pokoju"
      },
      {
        "type": "line",
        "text": "pełnego obcych głosów."
      },
      {
        "type": "line",
        "text": "A czasem dzielność to wyjąć telefon"
      },
      {
        "type": "line",
        "text": "drżącą ręką i zadzwonić do taty."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "I warto zawsze mówić prawdę o"
      },
      {
        "type": "line",
        "text": "tym, co czuje serce."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OUTRO —"
      },
      {
        "type": "line",
        "text": "To była opowieść Klara i telefon do taty."
      },
      {
        "type": "line",
        "text": "Tekst i opracowanie — 3TaTaTa."
      },
      {
        "type": "line",
        "text": "Dobranoc."
      }
    ]
  },
  {

    "sections": [
      {

      },
      {

      },
      {
        "type": "section",
        "text": "— INTRO —"
      },
      {
        "type": "line",
        "text": "3TaTaTa prezentuje."
      },
      {
        "type": "line",
        "text": "Legenda o Lechu, Czechu i Rusie."
      },
      {
        "type": "line",
        "text": "Na podstawie klasycznej polskiej legendy."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i opracowanie — 3TaTaTa."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OPOWIEŚĆ —"
      },
      {
        "type": "line",
        "text": "Dawno, bardzo dawno temu, gdy ziemie"
      },
      {
        "type": "line",
        "text": "Europy pokrywały nieprzebyte lasy, szerokie rzeki"
      },
      {
        "type": "line",
        "text": "i dzikie równiny, żyło trzech braci."
      },
      {
        "type": "line",
        "text": "Nazywali się Lech, Czech i Rus."
      },
      {
        "type": "line",
        "text": "Byli odważni, silni i mądrzy, a"
      },
      {
        "type": "line",
        "text": "ich lud podążał za nimi z"
      },
      {
        "type": "line",
        "text": "ufnością, szukając miejsca, w którym mógłby"
      },
      {
        "type": "line",
        "text": "zbudować bezpieczny dom."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Bracia wędrowali długo."
      },
      {
        "type": "line",
        "text": "Przemierzali ciemne bory, przechodzili przez wzgórza,"
      },
      {
        "type": "line",
        "text": "przeprawiali się przez strumienie i rzeki."
      },
      {
        "type": "line",
        "text": "Dni były gorące, noce chłodne, a"
      },
      {
        "type": "line",
        "text": "droga często trudna."
      },
      {
        "type": "line",
        "text": "Mimo to nie tracili nadziei."
      },
      {
        "type": "line",
        "text": "Wiedzieli, że gdzieś przed nimi czeka"
      },
      {
        "type": "line",
        "text": "ziemia, na której ich lud będzie"
      },
      {
        "type": "line",
        "text": "mógł żyć spokojnie, pracować i wychowywać"
      },
      {
        "type": "line",
        "text": "dzieci bez lęku."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Każdy z braci miał inny charakter."
      },
      {
        "type": "line",
        "text": "Czech był rozważny i spokojny."
      },
      {
        "type": "line",
        "text": "Rus był dumny, czujny i wytrwały."
      },
      {
        "type": "line",
        "text": "Lech zaś miał serce otwarte na"
      },
      {
        "type": "line",
        "text": "znaki świata."
      },
      {
        "type": "line",
        "text": "Uważnie patrzył na niebo, wsłuchiwał się"
      },
      {
        "type": "line",
        "text": "w szum drzew i wierzył, że"
      },
      {
        "type": "line",
        "text": "natura potrafi wskazać człowiekowi właściwą drogę."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Pewnego poranka wędrowcy dotarli do rozległej"
      },
      {
        "type": "line",
        "text": "krainy."
      },
      {
        "type": "line",
        "text": "Wokół rozciągały się zielone równiny, a"
      },
      {
        "type": "line",
        "text": "między nimi lśniły wody jezior i"
      },
      {
        "type": "line",
        "text": "rzek."
      },
      {
        "type": "line",
        "text": "Powietrze było czyste, ziemia żyzna, a"
      },
      {
        "type": "line",
        "text": "lasy pełne zwierzyny."
      },
      {
        "type": "line",
        "text": "Bracia zatrzymali się, by odpocząć i"
      },
      {
        "type": "line",
        "text": "zastanowić się, czy to właśnie tutaj"
      },
      {
        "type": "line",
        "text": "nie warto zostać na dłużej."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Czech spojrzał na południe i ujrzał"
      },
      {
        "type": "line",
        "text": "łagodne wzgórza oraz miejsca dogodne do"
      },
      {
        "type": "line",
        "text": "osiedlenia."
      },
      {
        "type": "line",
        "text": "Powiedział wtedy, że właśnie tam poprowadzi"
      },
      {
        "type": "line",
        "text": "swój lud."
      },
      {
        "type": "line",
        "text": "Rus z kolei wybrał rozległe tereny"
      },
      {
        "type": "line",
        "text": "na wschodzie, gdzie ziemia wydawała się"
      },
      {
        "type": "line",
        "text": "szeroka i pełna obietnic."
      },
      {
        "type": "line",
        "text": "Obaj czuli, że ich drogi prowadzą"
      },
      {
        "type": "line",
        "text": "dalej, ku własnemu przeznaczeniu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Lech jednak jeszcze się nie poruszył."
      },
      {
        "type": "line",
        "text": "Stał przez chwilę w milczeniu, jakby"
      },
      {
        "type": "line",
        "text": "nasłuchiwał czegoś, czego inni nie mogli"
      },
      {
        "type": "line",
        "text": "usłyszeć."
      },
      {
        "type": "line",
        "text": "Wtem jego wzrok padł na potężny"
      },
      {
        "type": "line",
        "text": "dąb stojący pośród polany."
      },
      {
        "type": "line",
        "text": "Na samym jego szczycie znajdowało się"
      },
      {
        "type": "line",
        "text": "wielkie gniazdo."
      },
      {
        "type": "line",
        "text": "A w tym gnieździe siedział biały"
      },
      {
        "type": "line",
        "text": "orzeł, dumny i spokojny, skąpany w"
      },
      {
        "type": "line",
        "text": "blasku zachodzącego słońca."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Niebo miało wtedy barwę ognia."
      },
      {
        "type": "line",
        "text": "Czerwienie i złoto rozlewały się po"
      },
      {
        "type": "line",
        "text": "chmurach, a białe pióra orła jaśniały"
      },
      {
        "type": "line",
        "text": "na tle nieba niczym znak zesłany"
      },
      {
        "type": "line",
        "text": "z wysoka."
      },
      {
        "type": "line",
        "text": "Lech patrzył na ten widok z"
      },
      {
        "type": "line",
        "text": "zapartym tchem."
      },
      {
        "type": "line",
        "text": "Poczuł, że to nie jest zwykły"
      },
      {
        "type": "line",
        "text": "ptak ani zwykły moment."
      },
      {
        "type": "line",
        "text": "Serce podpowiadało mu, że właśnie tutaj"
      },
      {
        "type": "line",
        "text": "powinien się zatrzymać."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "To jest miejsce dla nas —"
      },
      {
        "type": "line",
        "text": "powiedział cicho, ale pewnie."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Tu zbudujemy nasz gród."
      },
      {
        "type": "line",
        "text": "Tu zapuścimy korzenie."
      },
      {
        "type": "line",
        "text": "Ten biały orzeł będzie odtąd naszym"
      },
      {
        "type": "line",
        "text": "znakiem, symbolem siły, odwagi i wolności."
      },
      {
        "type": "line",
        "text": "A ponieważ ujrzeliśmy go przy gnieździe,"
      },
      {
        "type": "line",
        "text": "nazwiemy to miejsce Gnieznem."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Lud Lecha przyjął te słowa z"
      },
      {
        "type": "line",
        "text": "radością."
      },
      {
        "type": "line",
        "text": "Wszyscy czuli, że znaleźli ziemię obiecaną."
      },
      {
        "type": "line",
        "text": "Zabrali się więc do pracy."
      },
      {
        "type": "line",
        "text": "Karczowali las, stawiali pierwsze chaty, umacniali"
      },
      {
        "type": "line",
        "text": "osadę i rozpalali ogniska, przy których"
      },
      {
        "type": "line",
        "text": "wieczorami opowiadano o dalekiej drodze i"
      },
      {
        "type": "line",
        "text": "o znaku białego orła, który sprowadził"
      },
      {
        "type": "line",
        "text": "ich do nowego domu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Tymczasem Czech pożegnał brata i ruszył"
      },
      {
        "type": "line",
        "text": "na południe, gdzie według legendy dał"
      },
      {
        "type": "line",
        "text": "początek narodowi czeskiemu."
      },
      {
        "type": "line",
        "text": "Rus zaś skierował się na wschód"
      },
      {
        "type": "line",
        "text": "i tam zaczął budować własną przyszłość."
      },
      {
        "type": "line",
        "text": "Choć ich drogi się rozeszły, więź"
      },
      {
        "type": "line",
        "text": "między braćmi nie zniknęła."
      },
      {
        "type": "line",
        "text": "Każdy z nich niósł w sercu"
      },
      {
        "type": "line",
        "text": "pamięć wspólnej wędrówki i dni, w"
      },
      {
        "type": "line",
        "text": "których razem szukali miejsca na ziemi."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Z czasem gród Lecha rósł i"
      },
      {
        "type": "line",
        "text": "stawał się coraz silniejszy."
      },
      {
        "type": "line",
        "text": "Wieść o białym orle rozchodziła się"
      },
      {
        "type": "line",
        "text": "szeroko."
      },
      {
        "type": "line",
        "text": "Ludzie opowiadali o przywódcy, który potrafił"
      },
      {
        "type": "line",
        "text": "odczytać znak natury i zaufać temu,"
      },
      {
        "type": "line",
        "text": "co podpowiadało serce."
      },
      {
        "type": "line",
        "text": "Właśnie dlatego biały orzeł stał się"
      },
      {
        "type": "line",
        "text": "symbolem ziemi Lecha, a później całego"
      },
      {
        "type": "line",
        "text": "polskiego narodu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Legenda mówi, że od Lecha mieli"
      },
      {
        "type": "line",
        "text": "wywodzić się Polanie —"
      },
      {
        "type": "line",
        "text": "lud zamieszkujący równiny, z którego zrodziła"
      },
      {
        "type": "line",
        "text": "się później Polska."
      },
      {
        "type": "line",
        "text": "A choć historycy badają dzieje inaczej"
      },
      {
        "type": "line",
        "text": "niż dawni bajarze, ta opowieść do"
      },
      {
        "type": "line",
        "text": "dziś przypomina o wspólnych korzeniach, odwadze"
      },
      {
        "type": "line",
        "text": "w szukaniu własnej drogi i o"
      },
      {
        "type": "line",
        "text": "tym, że czasem jeden obraz potrafi"
      },
      {
        "type": "line",
        "text": "odmienić los całego narodu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Ilekroć więc spoglądamy na białego orła,"
      },
      {
        "type": "line",
        "text": "możemy pomyśleć o tamtym wieczorze, o"
      },
      {
        "type": "line",
        "text": "czerwonym niebie, o trzech braciach stojących"
      },
      {
        "type": "line",
        "text": "u progu nowych dziejów."
      },
      {
        "type": "line",
        "text": "O chwili, w której jeden z"
      },
      {
        "type": "line",
        "text": "nich rozpoznał swój znak i powiedział:"
      },
      {
        "type": "line",
        "text": "tu będzie nasz dom."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OUTRO —"
      },
      {
        "type": "line",
        "text": "To była Legenda o Lechu, Czechu i Rusie."
      },
      {
        "type": "line",
        "text": "Na podstawie klasycznej polskiej legendy."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i opracowanie — 3TaTaTa."
      },
      {
        "type": "line",
        "text": "Dobranoc."
      }
    ]
  },

        "type": "line",

      },

        "type": "line",
        "text": "Dawno temu, zanim w miejscu wielkiego"

        "type": "line",

      },
      {

      {
