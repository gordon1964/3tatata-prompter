<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="3TaTaTa Prompter">
<title>3TaTaTa Teleprompter</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --text: #f0ede6;
    --accent: #c8a96e;
    --accent2: #7eb8c9;
    --dim: #3a3a3a;
    --panel: #111111;
    --border: #222222;
    --speed: 60px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Serif Display', Georgia, serif;
    height: 100%;
    overflow: hidden;
    touch-action: manipulation;
  }

  /* ======= MENU SCREEN ======= */
  #menu-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center;
    padding: 60px 40px 40px;
    overflow-y: auto;
    z-index: 100;
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .menu-title {
    font-size: clamp(36px, 8vw, 64px);
    color: var(--text);
    text-align: center;
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .menu-subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.2em;
    color: #666;
    text-transform: uppercase;
    margin-bottom: 50px;
  }

  .story-list {
    width: 100%;
    max-width: 700px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .story-item {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 20px 24px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s ease;
    text-decoration: none;
    color: inherit;
  }

  .story-item:active {
    background: #1a1a1a;
    border-color: var(--accent);
    transform: scale(0.99);
  }

  .story-num {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    min-width: 28px;
    letter-spacing: 0.05em;
  }

  .story-info { flex: 1; }

  .story-name {
    font-size: 18px;
    color: var(--text);
    margin-bottom: 3px;
    line-height: 1.2;
  }

  .story-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #555;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .story-arrow {
    color: #333;
    font-size: 20px;
    transition: color 0.15s;
  }

  .story-item:active .story-arrow { color: var(--accent); }

  /* ======= PROMPTER SCREEN ======= */
  #prompter-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: none;
    flex-direction: column;
  }

  /* TOP BAR */
  #top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 56px;
    background: linear-gradient(to bottom, rgba(10,10,10,1) 70%, rgba(10,10,10,0));
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 50;
  }

  #back-btn {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.15em;
    color: #555;
    text-transform: uppercase;
    background: none; border: none;
    cursor: pointer;
    padding: 10px 0;
    display: flex; align-items: center; gap: 8px;
  }
  #back-btn:active { color: var(--accent); }

  #story-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: #444;
    text-transform: uppercase;
    text-align: center;
    flex: 1;
    padding: 0 20px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #font-btn {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: #555;
    background: none; border: none;
    cursor: pointer;
    padding: 10px 0;
    letter-spacing: 0.1em;
  }
  #font-btn:active { color: var(--accent); }

  /* SCROLL CONTAINER */
  #scroll-container {
    flex: 1;
    overflow: hidden;
    position: relative;
    cursor: pointer;
  }

  #scroll-inner {
    padding: 80px 5vw 70vh;
    will-change: transform;
  }

  /* Reading guide line */
  #guide-line {
    position: fixed;
    top: 38%;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--accent) 20%, var(--accent) 80%, transparent);
    opacity: 0.25;
    pointer-events: none;
    z-index: 10;
  }

  /* Top/bottom fade */
  #scroll-container::before,
  #scroll-container::after {
    content: '';
    position: fixed;
    left: 0; right: 0;
    height: 120px;
    pointer-events: none;
    z-index: 5;
  }
  #scroll-container::before {
    top: 56px;
    background: linear-gradient(to bottom, var(--bg), transparent);
  }
  #scroll-container::after {
    bottom: 80px;
    background: linear-gradient(to top, var(--bg), transparent);
  }

  /* TEXT STYLING */
  .prompt-title {
    font-size: clamp(22px, 5vw, 36px);
    color: var(--accent);
    text-align: center;
    margin-bottom: 8px;
    line-height: 1.2;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .prompt-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #444;
    text-align: center;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 60px;
  }

  .prompt-section {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    text-align: center;
    margin: 40px 0 20px;
    opacity: 0.7;
  }

  .prompt-line {
    font-size: clamp(28px, 5.5vw, 52px);
    text-align: center;
    line-height: 1.45;
    color: var(--text);
    padding: 8px 0;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .prompt-sep {
    text-align: center;
    color: var(--dim);
    font-size: 18px;
    padding: 24px 0;
    letter-spacing: 0.5em;
  }

  /* CONTROLS BAR */
  #controls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    background: linear-gradient(to top, rgba(10,10,10,1) 80%, transparent);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 0 24px;
    z-index: 50;
  }

  .ctrl-group {
    display: flex;
    align-items: center;
    gap: 0;
    background: #161616;
    border: 1px solid #222;
    border-radius: 8px;
    overflow: hidden;
  }

  .ctrl-btn {
    background: none;
    border: none;
    color: #777;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 12px 18px;
    cursor: pointer;
    transition: all 0.1s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    min-width: 56px;
    border-right: 1px solid #1e1e1e;
  }
  .ctrl-btn:last-child { border-right: none; }
  .ctrl-btn:active { background: #1e1e1e; color: var(--accent); }
  .ctrl-btn .icon { font-size: 18px; line-height: 1; }
  .ctrl-btn .label { font-size: 9px; opacity: 0.6; letter-spacing: 0.15em; }

  #play-btn .icon { font-size: 22px; }
  #play-btn { color: var(--text); }
  #play-btn.playing .icon::before { content: '⏸'; }
  #play-btn:not(.playing) .icon::before { content: '▶'; }
  #play-btn .icon::before { }

  /* Speed display */
  #speed-display {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    min-width: 36px;
    text-align: center;
  }

  /* FONT SIZE control */
  .font-size-sm { --line-fs: clamp(20px, 4vw, 38px); }
  .font-size-md { --line-fs: clamp(28px, 5.5vw, 52px); }
  .font-size-lg { --line-fs: clamp(36px, 7vw, 68px); }
  .font-size-xl { --line-fs: clamp(44px, 9vw, 86px); }

  .font-size-sm .prompt-line  { font-size: var(--line-fs, clamp(20px,4vw,38px)); }
  .font-size-md .prompt-line  { font-size: var(--line-fs, clamp(28px,5.5vw,52px)); }
  .font-size-lg .prompt-line  { font-size: var(--line-fs, clamp(36px,7vw,68px)); }
  .font-size-xl .prompt-line  { font-size: var(--line-fs, clamp(44px,9vw,86px)); }

  /* Progress bar */
  #progress-bar {
    position: fixed;
    top: 56px; left: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0.4;
    width: 0%;
    z-index: 51;
    transition: width 0.3s ease;
  }

  /* HIDDEN */
  .hidden { display: none !important; }

  /* Touch zones */
  #tap-left, #tap-right {
    position: fixed;
    top: 56px; bottom: 80px;
    width: 30%;
    z-index: 20;
  }
  #tap-left { left: 0; }
  #tap-right { right: 0; }
</style>
</head>
<body>

<!-- MENU -->
<div id="menu-screen">
  <div class="logo">3TaTaTa</div>
  <h1 class="menu-title">Teleprompter</h1>
  <p class="menu-subtitle">Wybierz opowiadanie</p>
  <div class="story-list" id="story-list"></div>
</div>

<!-- PROMPTER -->
<div id="prompter-screen">
  <div id="top-bar">
    <button id="back-btn" onclick="goBack()">← MENU</button>
    <div id="story-label"></div>
    <button id="font-btn" onclick="cycleFont()">Aa</button>
  </div>

  <div id="progress-bar"></div>
  <div id="guide-line"></div>

  <div id="scroll-container" onclick="togglePlay()">
    <div id="scroll-inner"></div>
  </div>

  <div id="tap-left" onclick="slowDown(); event.stopPropagation();"></div>
  <div id="tap-right" onclick="speedUp(); event.stopPropagation();"></div>

  <div id="controls" onclick="event.stopPropagation()">
    <div class="ctrl-group">
      <button class="ctrl-btn" onclick="slowDown()">
        <span class="icon">−</span>
        <span class="label">WOLNIEJ</span>
      </button>
      <button class="ctrl-btn" id="play-btn" onclick="togglePlay()">
        <span class="icon"></span>
        <span class="label">PLAY</span>
      </button>
      <button class="ctrl-btn" onclick="speedUp()">
        <span class="icon">+</span>
        <span class="label">SZYBCIEJ</span>
      </button>
      <button class="ctrl-btn" onclick="resetScroll()">
        <span class="icon">↩</span>
        <span class="label">RESET</span>
      </button>
    </div>
  </div>
</div>

      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Wreszcie Jonek dotarł do niewielkiej komory."
      },
      {
        "type": "line",
        "text": "Na środku stał niski, siwy górnik"
      },
      {
        "type": "line",
        "text": "z lampką w dłoni."
      },
      {
        "type": "line",
        "text": "Nie pracował, nie mówił, tylko patrzył"
      },
      {
        "type": "line",
        "text": "spokojnie."
      },
      {
        "type": "line",
        "text": "Jego twarz była surowa, lecz nie"
      },
      {
        "type": "line",
        "text": "zła."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Kogo szukasz?"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "zapytał cichym głosem."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Jonek drgnął."
      },
      {
        "type": "line",
        "text": "Chciał odpowiedzieć odważnie, ale głos ugrzązł"
      },
      {
        "type": "line",
        "text": "mu w gardle."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Ja..."
      },
      {
        "type": "line",
        "text": "tylko sprawdzam korytarz —"
      },
      {
        "type": "line",
        "text": "wymamrotał w końcu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Siwy górnik skinął głową, jakby znał"
      },
      {
        "type": "line",
        "text": "prawdę lepiej od niego samego."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Nie każdy blask prowadzi do skarbu"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "powiedział."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Czasem prowadzi do próby."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Jonek poczuł chłód na karku."
      },
      {
        "type": "line",
        "text": "Nagle przypomniał sobie wszystkie opowieści, z"
      },
      {
        "type": "line",
        "text": "których jeszcze niedawno kpił."
      },
      {
        "type": "line",
        "text": "Chciał zrobić krok w tył, lecz"
      },
      {
        "type": "line",
        "text": "wtedy rozległ się głuchy trzask."
      },
      {
        "type": "line",
        "text": "Z góry posypał się pył, a"
      },
      {
        "type": "line",
        "text": "z boku osunęły się kamienie."
      },
      {
        "type": "line",
        "text": "Młody górnik zrozumiał, że wszedł w"
      },
      {
        "type": "line",
        "text": "niebezpieczne miejsce."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Ratunku!"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "zawołał, ale jego głos zginął w"
      },
      {
        "type": "line",
        "text": "podziemiach."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Kiedy spojrzał znów przed siebie, siwy"
      },
      {
        "type": "line",
        "text": "górnik stał już bliżej."
      },
      {
        "type": "line",
        "text": "Lampka w jego dłoni świeciła jaśniej"
      },
      {
        "type": "line",
        "text": "niż przedtem."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Idź za mną."
      },
      {
        "type": "line",
        "text": "Powoli."
      },
      {
        "type": "line",
        "text": "I bez pychy —"
      },
      {
        "type": "line",
        "text": "powiedział."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Jonek posłuchał."
      },
      {
        "type": "line",
        "text": "Szedł krok za krokiem, niemal stawiając"
      },
      {
        "type": "line",
        "text": "stopy w śladach tajemniczego przewodnika."
      },
      {
        "type": "line",
        "text": "Kilka razy usłyszał za plecami szmer"
      },
      {
        "type": "line",
        "text": "osuwającego się kamienia."
      },
      {
        "type": "line",
        "text": "Gdyby zboczył choć trochę, mógłby zostać"
      },
      {
        "type": "line",
        "text": "zasypany."
      },
      {
        "type": "line",
        "text": "Ale lampka przed nim prowadziła pewnie,"
      },
      {
        "type": "line",
        "text": "jak gwiazda w nocnej ciemności."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Po dłuższej chwili zobaczył w oddali"
      },
      {
        "type": "line",
        "text": "światła innych górników."
      },
      {
        "type": "line",
        "text": "Usłyszał wołania i tupot biegnących ludzi."
      },
      {
        "type": "line",
        "text": "Kiedy wybiegł z niebezpiecznego korytarza, koledzy"

      {
        "type": "line",
        "text": "chwycili go za ramiona."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Gdzieś ty był, Jonku?"
      },
      {
        "type": "line",
        "text": "Szukaliśmy cię!"
      },
      {
        "type": "line",
        "text": "—"

        "type": "line",
        "text": "zawołał sztygar."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Jeszcze chwila i strop całkiem by"

        "type": "line",
        "text": "się zawalił."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Jonek obejrzał się za siebie."
      },
      {
        "type": "line",
        "text": "Chciał pokazać wszystkim siwego górnika z"
      },
      {
        "type": "line",
        "text": "lampą."
      },
      {
        "type": "line",
        "text": "Ale za nim nie było nikogo."
      },
      {
        "type": "line",
        "text": "Korytarz tonął w mroku, jakby nikt"
      },
      {
        "type": "line",
        "text": "przed chwilą nim nie szedł."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Tego dnia Jonek nic już nie"
      },
      {
        "type": "line",
        "text": "powiedział."
      },
      {
        "type": "line",
        "text": "Dopiero wieczorem, kiedy wyjechał na powierzchnię"
      },
      {
        "type": "line",
        "text": "i poczuł na twarzy chłodne powietrze,"
      },
      {
        "type": "line",
        "text": "długo patrzył w niebo."
      },
      {
        "type": "line",
        "text": "Wiedział już, że pod ziemią nie"
      },
      {
        "type": "line",
        "text": "jest się panem wszystkiego."
      },
      {
        "type": "line",
        "text": "Że są miejsca, w których trzeba"
      },
      {
        "type": "line",
        "text": "zachować nie tylko odwagę, ale także"
      },
      {
        "type": "line",
        "text": "pokorę."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Od tej pory nigdy więcej nie"
      },
      {
        "type": "line",
        "text": "śmiał się z dawnych opowieści."
      },
      {
        "type": "line",
        "text": "Szanował kopalnię, słuchał starszych i nie"
      },
      {
        "type": "line",
        "text": "oddalał się samowolnie od towarzyszy."
      },
      {
        "type": "line",
        "text": "A gdy młodsi górnicy zaczynali żartować"
      },
      {
        "type": "line",
        "text": "ze Skarbnika, Jonek mówił tylko jedno:"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Lepiej pracować uczciwie i z rozwagą."
      },
      {
        "type": "line",
        "text": "Bo w ciemności ktoś czasem patrzy,"
      },
      {
        "type": "line",
        "text": "czy człowiek pamięta, kim jest."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "I tak w śląskich kopalniach jeszcze"
      },
      {
        "type": "line",
        "text": "przez długie lata opowiadano o Skarbniku"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "strażniku podziemi."
      },
      {
        "type": "line",
        "text": "Jedni mówili, że ostrzegał przed tąpnięciem."
      },
      {
        "type": "line",
        "text": "Inni, że prowadził zagubionych do bezpiecznego"
      },
      {
        "type": "line",
        "text": "wyjścia."
      },
      {
        "type": "line",
        "text": "A wszyscy zgodnie wierzyli, że pomaga"
      },
      {
        "type": "line",
        "text": "tym, którzy szanują pracę, ziemię i"
      },
      {
        "type": "line",
        "text": "drugiego człowieka."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Dlatego do dziś, kiedy mówi się"

      {
        "type": "line",
        "text": "na Śląsku o dawnych kopalnianych opowieściach,"
      },
      {
        "type": "line",
        "text": "imię Skarbnika wypowiada się cicho, z"
      },

        "type": "line",
        "text": "powagą i z szacunkiem."

      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OUTRO —"

      {
        "type": "line",
        "text": "To była Legenda o Skarbniku."

        "text": "Na podstawie klasycznej śląskiej legendy."

        "type": "line",
        "text": "Nosił ciemny kapelusz, ciupagę przy pasie"

      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Nie po to tu jesteśmy —"
      },
      {
        "type": "line",
        "text": "powiedział cicho."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Nie wolno nam stać się takimi"
      },
      {
        "type": "line",
        "text": "jak ci, przeciw którym występujemy."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Nad ranem w kilku beskidzkich wsiach"
      },
      {
        "type": "line",
        "text": "wydarzyło się coś, czego nikt nie"
      },
      {
        "type": "line",
        "text": "potrafił wyjaśnić."
      },
      {
        "type": "line",
        "text": "Pod drzwiami biednych chałup leżały worki"
      },
      {
        "type": "line",
        "text": "z mąką."
      },
      {
        "type": "line",
        "text": "Na progach znajdowano sakiewki z pieniędzmi."
      },
      {
        "type": "line",
        "text": "A obok, na kawałku drewna lub"
      },
      {
        "type": "line",
        "text": "kartce, pojawiał się czasem prosty znak"
      },
      {
        "type": "line",
        "text": "ciupagi."
      },
      {
        "type": "line",
        "text": "Ludzie patrzyli po sobie z niedowierzaniem"
      },
      {
        "type": "line",
        "text": "i szeptali tylko jedno imię: Ondraszek."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Od tej chwili legenda rosła jeszcze"
      },
      {
        "type": "line",
        "text": "szybciej."
      },
      {
        "type": "line",
        "text": "Dla jednych był cieniem z gór."
      },
      {
        "type": "line",
        "text": "Dla innych obrońcą skrzywdzonych."
      },
      {
        "type": "line",
        "text": "Dzieci słuchały o nim wieczorami przy"
      },
      {
        "type": "line",
        "text": "piecu, a starzy górale kiwali głowami"
      },
      {
        "type": "line",
        "text": "i mówili, że góry lubią ludzi"
      },
      {
        "type": "line",
        "text": "twardych, ale nie bez serca."
      },
      {
        "type": "line",
        "text": "Ondraszek miał podobno jedno i drugie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Im bardziej był sławny, tym bardziej"
      },
      {
        "type": "line",
        "text": "chcieli go schwytać możni."
      },
      {
        "type": "line",
        "text": "Wysyłano za nim straże."
      },
      {
        "type": "line",
        "text": "Obiecywano nagrody."
      },
      {
        "type": "line",
        "text": "Szukano go w lasach, na halach,"
      },
      {
        "type": "line",
        "text": "przy potokach i w górskich schronieniach."
      },
      {
        "type": "line",
        "text": "Lecz Ondraszek za każdym razem wymykał"
      },
      {
        "type": "line",
        "text": "się z obławy."
      },
      {
        "type": "line",
        "text": "Raz ostrzegł go pasterz, innym razem"
      },
      {
        "type": "line",
        "text": "wierny druh, a czasem zdawało się,"
      },
      {
        "type": "line",
        "text": "że same góry ukrywają go przed"
      },
      {
        "type": "line",
        "text": "niebezpieczeństwem."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Pewnej jesieni, gdy liście miały już"
      },
      {
        "type": "line",
        "text": "barwę miedzi i złota, Ondraszek zatrzymał"
      },
      {
        "type": "line",
        "text": "się na chwilę wysoko nad doliną."
      },
      {
        "type": "line",
        "text": "Spojrzał na dym unoszący się z"
      },
      {
        "type": "line",
        "text": "kominów, na ścieżki wijące się między"
      },
      {
        "type": "line",
        "text": "wzgórzami i na dalekie lasy, które"
      },
      {
        "type": "line",
        "text": "znał od dziecka."
      },
      {
        "type": "line",
        "text": "Wiedział, że nie będzie tak żył"
      },
      {
        "type": "line",
        "text": "wiecznie."
      },
      {
        "type": "line",
        "text": "Tacy ludzie jak on rzadko dożywają"
      },
      {
        "type": "line",
        "text": "spokojnej starości."
      },
      {
        "type": "line",
        "text": "Mimo to nie żałował swej drogi."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Lepiej żyć krótko, ale po swojemu"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "miał powiedzieć —"
      },
      {
        "type": "line",
        "text": "niż długo i w hańbie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Czy naprawdę wypowiedział te słowa?"
      },
      {
        "type": "line",
        "text": "Tego już nikt nie wie."
      },
      {
        "type": "line",
        "text": "W legendach prawda splata się z"
      },
      {
        "type": "line",
        "text": "pamięcią, a pamięć z marzeniem."
      },
      {
        "type": "line",
        "text": "Jedno jest jednak pewne: w sercach"
      },
      {
        "type": "line",
        "text": "wielu ludzi Ondraszek nie został zwykłym"
      },
      {
        "type": "line",
        "text": "zbójnikiem."
      },
      {
        "type": "line",
        "text": "Stał się symbolem odwagi, wolności i"
      },
      {
        "type": "line",
        "text": "sprzeciwu wobec krzywdy."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Do dziś, gdy w beskidzkich lasach"
      },
      {
        "type": "line",
        "text": "zapada zmierzch, a wiatr przechodzi między"
      },
      {
        "type": "line",
        "text": "drzewami jak cichy szept, starsi ludzie"
      },
      {
        "type": "line",
        "text": "mówią czasem, że to góry przypominają"
      },
      {
        "type": "line",
        "text": "dawne historie."
      },
      {
        "type": "line",
        "text": "A kiedy ogień trzaska w kominku"
      },
      {
        "type": "line",
        "text": "i noc staje się głęboka, ktoś"
      },
      {
        "type": "line",
        "text": "zawsze wspomni o Ondraszku —"
      },
      {
        "type": "line",
        "text": "o zbójniku z gór, który potrafił"
      },
      {
        "type": "line",
        "text": "stanąć po stronie słabszych."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OUTRO —"
      },
      {
        "type": "line",
        "text": "To była Legenda o Ondraszku."
      },
      {
        "type": "line",
        "text": "Na podstawie klasycznej śląskiej legendy."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i opracowanie — 3TaTaTa."
      },
      {
        "type": "line",
        "text": "Dobranoc."
      }

      {
        "type": "line",
        "text": "Legenda o Utopku."
      },
      {
        "type": "line",
        "text": "Na podstawie klasycznej śląskiej legendy."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i opracowanie — 3TaTaTa."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OPOWIEŚĆ —"
      },
      {
        "type": "line",
        "text": "Dawno temu, gdy nad śląskimi stawami"
      },
      {
        "type": "line",
        "text": "częściej niż dziś snuły się mgły,"
      },

        "type": "line",
        "text": "a sitowie szeleściło nawet wtedy, gdy"
      },

        "type": "line",
        "text": "wiatr milkł, ludzie opowiadali sobie o"
      },
      {
        "type": "line",
        "text": "Utopku."
      },
      {
        "type": "line",
        "text": "Nie był on człowiekiem ani zwyczajnym"
      },
      {
        "type": "line",
        "text": "zwierzęciem."
      },
      {
        "type": "line",
        "text": "Mówiono, że to duch wody —"
      },
      {
        "type": "line",
        "text": "stary jak bagna, cichy jak głębina"
      },
      {
        "type": "line",
        "text": "i nieprzewidywalny jak nurt po wielkiej"
      },
      {
        "type": "line",
        "text": "burzy."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Jedni twierdzili, że widzieli go o"
      },
      {
        "type": "line",
        "text": "świcie, jak siedział na kamieniu przy"
      },
      {
        "type": "line",
        "text": "brzegu i czesał mokre, zielone włosy."
      },
      {
        "type": "line",
        "text": "Inni przysięgali, że słyszeli jego śmiech"
      },
      {
        "type": "line",
        "text": "w trzcinach, kiedy ktoś zbyt odważnie"
      },
      {
        "type": "line",
        "text": "zbliżał się do wirującej wody."
      },
      {
        "type": "line",
        "text": "Dzieci straszono nim po zmroku, ale"
      },
      {
        "type": "line",
        "text": "starzy rybacy mówili o nim z"
      },
      {
        "type": "line",
        "text": "czymś więcej niż strachem."
      },
      {
        "type": "line",
        "text": "Mówili z szacunkiem."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Bo Utopek, jak głosiła legenda, nie"
      },
      {
        "type": "line",
        "text": "szkodził każdemu."
      },
      {
        "type": "line",
        "text": "Bywał groźny dla pyszałków, dla tych,"
      },
      {
        "type": "line",
        "text": "którzy z wody szydzili, którzy brudzili"
      },
      {
        "type": "line",
        "text": "staw albo wchodzili do niego bez"
      },
      {
        "type": "line",
        "text": "rozwagi."
      },
      {
        "type": "line",
        "text": "Lecz wobec ludzi pokornych, ostrożnych i"
      },
      {
        "type": "line",
        "text": "uczciwych potrafił być jedynie przestrogą —"

      {
        "type": "line",
        "text": "cieniem, który przypominał, że przyroda ma"

      {
        "type": "line",
        "text": "swoje prawa."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "W jednej ze śląskich wsi żył"

      {
        "type": "line",
        "text": "młody parobek imieniem Jędrek."
      },
      {
        "type": "line",
        "text": "Był silny, szybki i pewny siebie"

        "type": "line",
        "text": "aż nadto."

      {
        "type": "line",
        "text": "Gdy starsi ostrzegali go, by po"

        "text": "zachodzie słońca nie chodził samotnie nad"

      {
        "type": "line",
        "text": "stawy, śmiał się tylko i mówił,"

        "type": "line",
        "text": "że żadnych duchów nie ma, a"

        "type": "line",
        "text": "wszystkie opowieści wymyślili sobie ci, którzy"

      {
        "type": "line",
        "text": "boją się ciemności."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Pewnego letniego wieczoru wracał z karczmy"
      },
      {
        "type": "line",
        "text": "później niż zwykle."
      },
      {
        "type": "line",
        "text": "Księżyc świecił blado, droga była pusta,"
      },
      {
        "type": "line",
        "text": "a z daleka słychać było tylko"
      },
      {
        "type": "line",
        "text": "rechot żab."
      },
      {
        "type": "line",
        "text": "Jędrek, zamiast pójść bezpieczną ścieżką przez"

      {
        "type": "line",
        "text": "wieś, skrócił sobie drogę przez groblę"

      {
        "type": "line",
        "text": "między stawami."
      },
      {
        "type": "line",
        "text": "Gdy stanął pośrodku, splunął do wody"

      {
        "type": "line",
        "text": "i zawołał głośno, że jeśli Utopek"
      },
      {
        "type": "line",
        "text": "naprawdę istnieje, to niech się pokaże."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "W tej samej chwili wszystko ucichło."

      {
        "type": "line",
        "text": "Żaby umilkły."
      },
      {
        "type": "line",
        "text": "Wiatr zgasł."
      },
      {
        "type": "line",
        "text": "Nawet trzciny znieruchomiały, jakby cały świat"

      {
        "type": "line",
        "text": "nagle wstrzymał oddech."

      {
        "type": "line",
        "text": "Z mroku przy brzegu wynurzyła się"

        "type": "line",
        "text": "niewysoka postać."

      {
        "type": "line",
        "text": "Była skulona, mokra i dziwnie lśniąca."

      {
        "type": "line",
        "text": "Miała długie palce, oczy błyszczące jak"

        "text": "krople na mule i twarz, na"

        "type": "line",
        "text": "tylko zimna, głęboka powaga."

      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Jędrek chciał się roześmiać, lecz śmiech"

        "type": "line",
        "text": "ugrzązł mu w gardle."
      },
      {
        "type": "line",
        "text": "Postać zrobiła krok, potem drugi."

      {
        "type": "line",
        "text": "Woda przy jej stopach nawet nie"

      {
        "type": "line",
        "text": "chlupnęła."
      },
      {
        "type": "line",
        "text": "Utopek patrzył na chłopaka tak, jak"

        "type": "line",

        "text": "że może ją zlekceważyć."
      },
      {
        "type": "line",
        "text": "Potem wyciągnął rękę i skinął, jakby"

      {
        "type": "line",
        "text": "zapraszał Jędrka bliżej."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Parobek cofnął się gwałtownie, ale grobla"
      },
      {
        "type": "line",
        "text": "była śliska."
      },
      {
        "type": "line",
        "text": "Noga obsunęła mu się w błoto"
      },
      {
        "type": "line",
        "text": "i chłopak runął na kolana."
      },
      {
        "type": "line",
        "text": "Zobaczył wtedy, jak tuż obok niego"
      },
      {
        "type": "line",
        "text": "wiruje ciemna woda."
      },
      {
        "type": "line",
        "text": "Jeszcze chwila, a wpadłby do stawu."
      },
      {
        "type": "line",
        "text": "Serce biło mu jak młot."
      },
      {
        "type": "line",
        "text": "Pierwszy raz w życiu naprawdę się"
      },
      {
        "type": "line",
        "text": "przestraszył."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Daruj —"
      },
      {
        "type": "line",
        "text": "wyszeptał, nie wiedząc nawet, do kogo"
      },
      {
        "type": "line",
        "text": "dokładnie mówi."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Nie chciałem szydzić."
      },
      {
        "type": "line",
        "text": "Daruj."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Utopek nie odpowiedział ani słowem."
      },
      {
        "type": "line",
        "text": "Przechylił tylko głowę, jakby słuchał czegoś"
      },
      {
        "type": "line",
        "text": "bardzo dalekiego."
      },
      {
        "type": "line",
        "text": "Po chwili opuścił rękę."
      },
      {
        "type": "line",
        "text": "Wiatr wrócił."
      },
      {
        "type": "line",
        "text": "Trzciny zaszeleściły."
      },
      {
        "type": "line",
        "text": "A gdy Jędrek odważył się podnieść"

      {
        "type": "line",
        "text": "wzrok, przy brzegu nie było już"
      },
      {
        "type": "line",
        "text": "nikogo."
      },
      {
        "type": "line",
        "text": "Pozostały jedynie kręgi na wodzie i"
      },
      {
        "type": "line",
        "text": "chłód, który długo nie schodził mu"
      },
      {
        "type": "line",
        "text": "z karku."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Od tamtej nocy Jędrek zmienił się"
      },
      {
        "type": "line",
        "text": "nie do poznania."
      },
      {
        "type": "line",
        "text": "Już nigdy nie śmiał się z"
      },
      {
        "type": "line",
        "text": "dawnych opowieści."
      },
      {
        "type": "line",
        "text": "Gdy przechodził obok stawu, zdejmował czapkę"
      },
      {
        "type": "line",
        "text": "i szedł ciszej."
      },
      {
        "type": "line",
        "text": "Upominał też innych, by nie hałasowali"
      },
      {
        "type": "line",
        "text": "przy wodzie, nie rzucali do niej"
      },
      {
        "type": "line",
        "text": "śmieci i nie wchodzili do bagna"
      },
      {
        "type": "line",
        "text": "bez potrzeby."
      },
      {
        "type": "line",
        "text": "Mówił, że są miejsca, gdzie człowiek"
      },
      {
        "type": "line",
        "text": "powinien pamiętać, iż nie wszystko do"
      },
      {
        "type": "line",
        "text": "niego należy."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "We wsi długo pytano go, co"
      },
      {
        "type": "line",
        "text": "naprawdę zobaczył tamtej nocy."
      },
      {
        "type": "line",
        "text": "A on odpowiadał tylko, że nad"
      },
      {
        "type": "line",
        "text": "wodą można spotkać coś starszego od"
      },
      {
        "type": "line",
        "text": "ludzkiej pychy."
      },
      {
        "type": "line",
        "text": "Coś, co nie lubi krzyku, drwin"
      },
      {
        "type": "line",
        "text": "i lekkomyślności."
      },
      {
        "type": "line",
        "text": "Coś, co przypomina, że staw, rzeka"
      },
      {
        "type": "line",
        "text": "i bagno żyją własnym życiem."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "I tak legenda o Utopku trwała"
      },
      {
        "type": "line",
        "text": "dalej —"
      },
      {
        "type": "line",
        "text": "przekazywana z ust do ust przy"
      },
      {
        "type": "line",
        "text": "piecach, na ławach przed domami i"
      },
      {
        "type": "line",
        "text": "podczas jesiennych wieczorów."
      },
      {
        "type": "line",
        "text": "Jedni wciąż wierzyli, inni powątpiewali."
      },
      {
        "type": "line",
        "text": "Ale wszyscy wiedzieli jedno: nad śląską"
      },
      {
        "type": "line",
        "text": "wodą trzeba zachować pokorę."
      },
      {
        "type": "line",
        "text": "Bo tam, gdzie człowiek widzi tylko"
      },
      {
        "type": "line",
        "text": "ciemną taflę, ktoś inny może właśnie"
      },
      {
        "type": "line",
        "text": "patrzeć z głębiny."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OUTRO —"
      },
      {
        "type": "line",
        "text": "To była Legenda o Utopku."
      },
      {
        "type": "line",
        "text": "Na podstawie klasycznej śląskiej legendy."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i opracowanie — 3TaTaTa."
      },
      {
        "type": "line",
        "text": "Dobranoc."
      }
    ]

  {
    "id": 4,
    "title": "Kopciuszek",
    "tag": "Baśń klasyczna",
    "sections": [
      {
        "type": "title",
        "text": "Kopciuszek"
      },
      {
        "type": "meta",
        "text": "3TaTaTa · Baśń klasyczna"
      },
      {
        "type": "section",
        "text": "— INTRO —"
      },
      {
        "type": "line",
        "text": "3TaTaTa prezentuje."
      },
      {
        "type": "line",
        "text": "Kopciuszek."
      },
      {
        "type": "line",
        "text": "Na podstawie klasycznej baśni."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i opracowanie — 3TaTaTa."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OPOWIEŚĆ —"
      },
      {
        "type": "line",
        "text": "Dawno temu, w dużym domu stojącym"
      },
      {
        "type": "line",
        "text": "na skraju miasta, mieszkała dobra i"
      },
      {
        "type": "line",
        "text": "łagodna dziewczynka."
      },
      {
        "type": "line",
        "text": "Jej dzieciństwo nie trwało jednak długo"
      },
      {
        "type": "line",
        "text": "w szczęściu."
      },
      {
        "type": "line",
        "text": "Najpierw straciła matkę, a po kilku"
      },
      {
        "type": "line",
        "text": "latach także ojca."
      },
      {
        "type": "line",
        "text": "Gdy została sama, opiekę nad nią"
      },
      {
        "type": "line",
        "text": "przejęła macocha —"
      },
      {
        "type": "line",
        "text": "kobieta chłodna, dumna i zapatrzona wyłącznie"
      },
      {
        "type": "line",
        "text": "w siebie oraz swoje dwie córki."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Obie przyrodnie siostry były próżne i"
      },
      {
        "type": "line",
        "text": "leniwe."
      },
      {
        "type": "line",
        "text": "Godzinami przeglądały się w lustrach, poprawiały"
      },
      {
        "type": "line",
        "text": "wstążki, przymierzały suknie i rozmawiały tylko"
      },
      {
        "type": "line",
        "text": "o tym, jak zrobić wrażenie na"
      },
      {
        "type": "line",
        "text": "innych."
      },
      {
        "type": "line",
        "text": "Dziewczynce przypadła w domu najcięższa praca."
      },
      {
        "type": "line",
        "text": "To ona wstawała najwcześniej, rozniecała ogień,"
      },
      {
        "type": "line",
        "text": "nosiła wodę, szorowała podłogi, czyściła garnki"
      },
      {
        "type": "line",
        "text": "i zamiatała popiół przy kominku."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Ponieważ często była ubrudzona sadzą i"
      },
      {
        "type": "line",
        "text": "popiołem, siostry zaczęły przezywać ją Kopciuszkiem."
      },
      {
        "type": "line",
        "text": "Myślały, że to imię ją upokorzy."
      },
      {
        "type": "line",
        "text": "Lecz ona, choć nieraz bolało ją"
      },
      {
        "type": "line",
        "text": "serce, nie odpowiadała złością."
      },
      {
        "type": "line",
        "text": "Pozostawała cierpliwa, cicha i uprzejma."
      },
      {
        "type": "line",
        "text": "Miała bowiem w sobie coś, czego"
      },
      {
        "type": "line",
        "text": "nie miały ani jej siostry, ani"
      },
      {
        "type": "line",
        "text": "sama macocha —"
      },
      {
        "type": "line",
        "text": "prawdziwą dobroć."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Kiedy kończyła wszystkie obowiązki, siadała przy"
      },
      {
        "type": "line",
        "text": "wygasającym palenisku i marzyła."
      },
      {
        "type": "line",
        "text": "Patrzyła w płomień, jakby chciała odnaleźć"
      },
      {
        "type": "line",
        "text": "w nim dawny spokój domu, który"
      },
      {
        "type": "line",
        "text": "pamiętała z dzieciństwa."
      },
      {
        "type": "line",
        "text": "Czasem szeptała do siebie, że gdzieś"
      },
      {
        "type": "line",
        "text": "na świecie musi istnieć miejsce, w"
      },
      {
        "type": "line",
        "text": "którym człowiek jest kochany nie za"
      },
      {
        "type": "line",
        "text": "bogactwo i nie za strój, lecz"
      },
      {
        "type": "line",
        "text": "za serce."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Pewnego dnia po całym królestwie rozeszła"
      },
      {
        "type": "line",
        "text": "się wielka wiadomość."
      },
      {
        "type": "line",
        "text": "W pałacu miał odbyć się uroczysty"
      },
      {
        "type": "line",
        "text": "bal."
      },
      {
        "type": "line",
        "text": "Książę, młody i mądry, pragnął poznać"
      },
      {
        "type": "line",
        "text": "ludzi ze swego kraju, a szczególnie"
      },
      {
        "type": "line",
        "text": "wybrać spośród panien tę, która zostanie"
      },
      {
        "type": "line",
        "text": "jego żoną."
      },
      {
        "type": "line",
        "text": "Zaproszenie otrzymali wszyscy możni i szanowani"
      },
      {
        "type": "line",
        "text": "mieszkańcy miasta wraz z rodzinami."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "W domu macochy zawrzało od przygotowań."
      },
      {
        "type": "line",
        "text": "Siostry niemal oszalały z przejęcia."
      },
      {
        "type": "line",
        "text": "Jedna chciała mieć suknię w kolorze"
      },
      {
        "type": "line",
        "text": "szafiru, druga marzyła o rękawach obszytych"
      },
      {
        "type": "line",
        "text": "koronką."
      },
      {
        "type": "line",
        "text": "Obie wydawały rozkazy Kopciuszkowi od rana"
      },
      {
        "type": "line",
        "text": "do nocy."
      },
      {
        "type": "line",
        "text": "Przynieś tasiemkę."
      },
      {
        "type": "line",
        "text": "Podaj bucik."
      },
      {
        "type": "line",
        "text": "Zapnij haftkę."
      },
      {
        "type": "line",
        "text": "Wyprasuj falbanę."
      },
      {
        "type": "line",
        "text": "Rozczesz włosy."
      },
      {
        "type": "line",
        "text": "Nie było końca ich wymaganiom."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Kopciuszek pomagał bez skargi."
      },
      {
        "type": "line",
        "text": "Czyścił buty tak długo, aż lśniły"
      },
      {
        "type": "line",
        "text": "jak lustro."
      },
      {
        "type": "line",
        "text": "Prasował suknie ostrożnie, by nie przypalić"
      },
      {
        "type": "line",
        "text": "najdrobniejszego brzegu."
      },
      {
        "type": "line",
        "text": "Układał wstążki, przytrzymywał grzebienie i podawał"
      },
      {
        "type": "line",
        "text": "pachnidła."
      },
      {
        "type": "line",
        "text": "Gdy siostry zobaczyły w zwierciadle swoje"
      },
      {
        "type": "line",
        "text": "stroje, uznały się za najpiękniejsze w"
      },
      {
        "type": "line",
        "text": "całym mieście."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Wtedy Kopciuszek zebrał się na odwagę"
      },
      {
        "type": "line",
        "text": "i cicho zapytał, czy on także"
      },
      {
        "type": "line",
        "text": "mógłby pojechać z nimi choćby tylko"
      },
      {
        "type": "line",
        "text": "po to, by z daleka zobaczyć"
      },
      {
        "type": "line",
        "text": "pałacowe światła."
      },
      {
        "type": "line",
        "text": "Siostry wybuchnęły śmiechem, a macocha spojrzała"
      },
      {
        "type": "line",
        "text": "na niego z zimną drwiną."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Ty?"
      },
      {
        "type": "line",
        "text": "W sadzy i z popiołem na"
      },
      {
        "type": "line",
        "text": "rękach?"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "powiedziała."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Kto wpuściłby cię na królewski bal?"
      },
      {
        "type": "line",
        "text": "Zostań tutaj."
      },
      {
        "type": "line",
        "text": "Dom sam się nie posprząta."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Kiedy kareta odjechała, w domu zrobiło"
      },
      {
        "type": "line",
        "text": "się nagle cicho."
      },
      {
        "type": "line",
        "text": "Za oknami wieczór był łagodny, a"
      },
      {
        "type": "line",
        "text": "na niebie świeciły pierwsze gwiazdy."
      },
      {
        "type": "line",
        "text": "Kopciuszek usiadł przy kominku i po"
      },
      {
        "type": "line",
        "text": "raz pierwszy od dawna zapłakał otwarcie."
      },
      {
        "type": "line",
        "text": "Nie płakał jednak z zazdrości o"
      },
      {
        "type": "line",
        "text": "stroje czy klejnoty, ale z tęsknoty"
      },
      {
        "type": "line",
        "text": "za tym, by choć raz ktoś"
      },
      {
        "type": "line",
        "text": "spojrzał na niego z życzliwością i"
      },
      {
        "type": "line",
        "text": "pozwolił mu poczuć, że też do"
      },
      {
        "type": "line",
        "text": "czegoś pięknego należy."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Wtedy stało się coś niezwykłego."
      },
      {
        "type": "line",
        "text": "W blasku księżyca, który wpadał przez"
      },
      {
        "type": "line",
        "text": "okno, pojawiła się dobra wróżka chrzestna."
      },
      {
        "type": "line",
        "text": "Nie przybyła z hukiem ani błyskawicą."
      },
      {
        "type": "line",
        "text": "Przyszła cicho, jak przychodzi nadzieja."
      },
      {
        "type": "line",
        "text": "Miała łagodny głos i spojrzenie pełne"
      },
      {
        "type": "line",
        "text": "zrozumienia."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Nie płacz, moje dziecko —"
      },
      {
        "type": "line",
        "text": "powiedziała."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Pojedziesz na bal."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Kopciuszek spojrzał na nią z niedowierzaniem."
      },
      {
        "type": "line",
        "text": "Wróżka rozejrzała się po kuchni i"
      },
      {
        "type": "line",
        "text": "poprosiła, by przyniesiono jej dynię z"
      },
      {
        "type": "line",
        "text": "ogrodu, kilka myszy z pułapki, szczura"
      },
      {
        "type": "line",
        "text": "z piwnicy i jaszczurki, które wygrzewały"
      },
      {
        "type": "line",
        "text": "się przy murze."
      },
      {
        "type": "line",
        "text": "Gdy wszystko stanęło przed nią, dotknęła"
      },
      {
        "type": "line",
        "text": "każdego przedmiotu swoją różdżką."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "W jednej chwili dynia zamieniła się"
      },
      {
        "type": "line",
        "text": "w piękną złocistą karetę."
      },
      {
        "type": "line",
        "text": "Myszy stały się rączymi końmi, szczur"
      },
      {
        "type": "line",
        "text": "przeobraził się w poważnego stangreta, a"
      },
      {
        "type": "line",
        "text": "jaszczurki w zgrabnych lokajów."
      },
      {
        "type": "line",
        "text": "Na końcu wróżka dotknęła różdżką samego"
      },
      {
        "type": "line",
        "text": "Kopciuszka."
      },
      {
        "type": "line",
        "text": "Ubranie robocze zniknęło, a w jego"
      },
      {
        "type": "line",
        "text": "miejsce pojawiła się suknia delikatna jak"
      },
      {
        "type": "line",
        "text": "poranna mgła, wyszywana srebrnym blaskiem."
      },
      {
        "type": "line",
        "text": "Na nogach zabłysły pantofelki lekkie i"
      },
      {
        "type": "line",
        "text": "kruche jak szkło."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Pamiętaj —"
      },
      {
        "type": "line",
        "text": "rzekła —"
      },
      {
        "type": "line",
        "text": "czar przestanie działać o północy."
      },
      {
        "type": "line",
        "text": "Gdy zegar wybije dwunastą, kareta znów"
      },
      {
        "type": "line",
        "text": "stanie się dynią, konie myszami, a"
      },
      {
        "type": "line",
        "text": "ty odzyskasz dawne ubranie."
      },
      {
        "type": "line",
        "text": "Musisz wrócić przed ostatnim uderzeniem dzwonu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Kopciuszek obiecał, że będzie ostrożny."
      },
      {
        "type": "line",
        "text": "Wsiadł do karety, a konie ruszyły"
      },
      {
        "type": "line",
        "text": "miękko po kamiennej drodze."
      },
      {
        "type": "line",
        "text": "Gdy dotarł do pałacu, wszystko wokół"
      },
      {
        "type": "line",
        "text": "tonęło w świetle świec."
      },
      {
        "type": "line",
        "text": "Z okien płynęła muzyka."
      },
      {
        "type": "line",
        "text": "Na schodach stali słudzy w bogatych"
      },
      {
        "type": "line",
        "text": "strojach, a w salach wirowały najpiękniejsze"
      },
      {
        "type": "line",
        "text": "suknie całego królestwa."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Kiedy nieznajoma weszła na salę balową,"
      },
      {
        "type": "line",
        "text": "rozmowy ucichły."
      },
      {
        "type": "line",
        "text": "Wszyscy zwrócili ku niej wzrok."
      },
      {
        "type": "line",
        "text": "Było w niej coś niezwykłego —"
      },
      {
        "type": "line",
        "text": "nie tylko piękno stroju, lecz spokój,"
      },
      {
        "type": "line",
        "text": "skromność i światło bijące z twarzy."
      },
      {
        "type": "line",
        "text": "Sam książę podszedł do niej z"
      },
      {
        "type": "line",
        "text": "szacunkiem, jakby od razu przeczuł, że"
      },
      {
        "type": "line",
        "text": "ma przed sobą kogoś wyjątkowego."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Poprosił ją do tańca."
      },
      {
        "type": "line",
        "text": "Orkiestra zagrała, a para ruszyła po"
      },
      {
        "type": "line",
        "text": "sali lekko jak sen."
      },
      {
        "type": "line",
        "text": "Książę nie odstępował jej już na"
      },
      {
        "type": "line",
        "text": "krok."
      },
      {
        "type": "line",
        "text": "Rozmawiał z nią o drobnych rzeczach,"
      },
      {
        "type": "line",
        "text": "lecz słuchał tak uważnie, jakby każde"
      },
      {
        "type": "line",
        "text": "jej słowo miało znaczenie."
      },
      {
        "type": "line",
        "text": "Czuł, że przy tej nieznajomej świat"
      },
      {
        "type": "line",
        "text": "staje się prostszy i prawdziwszy."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Siostry Kopciuszka, które także były na"
      },
      {
        "type": "line",
        "text": "balu, patrzyły na tajemniczą damę z"
      },
      {
        "type": "line",
        "text": "zachwytem i zazdrością, ale nie rozpoznały"
      },
      {
        "type": "line",
        "text": "w niej dziewczyny z własnego domu."
      },
      {
        "type": "line",
        "text": "Były zbyt zajęte sobą, by dostrzec,"
      },
      {
        "type": "line",
        "text": "że prawdziwe piękno potrafi ukrywać się"
      },
      {
        "type": "line",
        "text": "tam, gdzie nikt się go nie"
      },
      {
        "type": "line",
        "text": "spodziewa."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Czas płynął szybko."
      },
      {
        "type": "line",
        "text": "Rozmowy, muzyka i taniec sprawiły, że"
      },
      {
        "type": "line",
        "text": "Kopciuszek niemal zapomniał o ostrzeżeniu wróżki."
      },
      {
        "type": "line",
        "text": "Dopiero gdy pałacowy zegar zaczął wybijać"
      },
      {
        "type": "line",
        "text": "północ, serce zabiło mu gwałtownie."
      },
      {
        "type": "line",
        "text": "Jedenasta..."
      },
      {
        "type": "line",
        "text": "dwunasta..."
      },
      {
        "type": "line",
        "text": "Zrozumiał, że musi uciekać."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Skłonił się pospiesznie księciu i wybiegł"
      },
      {
        "type": "line",
        "text": "z sali."
      },
      {
        "type": "line",
        "text": "Zbiegając po schodach, zgubił jeden pantofelek."
      },
      {
        "type": "line",
        "text": "Nie zatrzymał się jednak ani na"
      },
      {
        "type": "line",
        "text": "chwilę."
      },
      {
        "type": "line",
        "text": "Musiał wrócić przed końcem czaru."
      },
      {
        "type": "line",
        "text": "Książę pobiegł za nim, lecz gdy"
      },
      {
        "type": "line",
        "text": "dobiegł do bramy, zobaczył już tylko"
      },
      {
        "type": "line",
        "text": "oddalającą się postać i maleńki, lśniący"
      },
      {
        "type": "line",
        "text": "bucik pozostawiony na kamiennym stopniu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Nazajutrz całe królestwo mówiło o zagadkowej"
      },
      {
        "type": "line",
        "text": "damie z balu."
      },
      {
        "type": "line",
        "text": "Książę oznajmił, że odnajdzie ją, choćby"
      },
      {
        "type": "line",
        "text": "miał objechać wszystkie miasta i wsie."
      },
      {
        "type": "line",
        "text": "Jedyną wskazówką był szklany pantofelek."
      },
      {
        "type": "line",
        "text": "Rozkazał więc, by każda panna w"
      },
      {
        "type": "line",
        "text": "królestwie przymierzyła bucik."
      },
      {
        "type": "line",
        "text": "Ta, na którą będzie pasował, miała"
      },
      {
        "type": "line",
        "text": "zostać jego wybranką."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Wieść dotarła także do domu macochy."
      },
      {
        "type": "line",
        "text": "Siostry znów wpadły w gorączkę przygotowań."
      },
      {
        "type": "line",
        "text": "Poprawiały fryzury, ściskały stopy, ćwiczyły dworskie"
      },
      {
        "type": "line",
        "text": "ukłony i szeptały między sobą, że"
      },
      {
        "type": "line",
        "text": "los wreszcie się do nich uśmiechnie."
      },
      {
        "type": "line",
        "text": "Gdy książęcy słudzy przybyli z pantofelkiem,"
      },
      {
        "type": "line",
        "text": "obie rzuciły się do przymierzania."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Jedna próbowała wsunąć stopę na siłę,"
      },
      {
        "type": "line",
        "text": "druga wstrzymywała oddech, jakby to miało"
      },
      {
        "type": "line",
        "text": "pomóc."
      },
      {
        "type": "line",
        "text": "Lecz pantofelek ani drgnął."
      },
      {
        "type": "line",
        "text": "Był zbyt mały dla obu sióstr."
      },
      {
        "type": "line",
        "text": "Macocha próbowała obrócić wszystko w żart"
      },
      {
        "type": "line",
        "text": "i już chciała odprawić gości, gdy"
      },
      {
        "type": "line",
        "text": "z kąta odezwał się spokojny głos"
      },
      {
        "type": "line",
        "text": "Kopciuszka."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Czy ja także mogę spróbować?"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Siostry wyśmiały ten pomysł, lecz słudzy"
      },
      {
        "type": "line",
        "text": "mieli rozkaz nie pomijać nikogo."
      },
      {
        "type": "line",
        "text": "Pantofelek podano Kopciuszkowi."
      },
      {
        "type": "line",
        "text": "Dziewczyna usiadła, wsunęła stopę —"
      },
      {
        "type": "line",
        "text": "i bucik pasował idealnie."
      },
      {
        "type": "line",
        "text": "W tej samej chwili wyjęła drugi"
      },
      {
        "type": "line",
        "text": "pantofelek, który zachowała od tamtej nocy."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "W domu zapadła cisza tak wielka,"
      },
      {
        "type": "line",
        "text": "że słychać było tylko przyspieszone oddechy."
      },
      {
        "type": "line",
        "text": "Wtedy, jakby potwierdzając prawdę, znów pojawiła"
      },
      {
        "type": "line",
        "text": "się wróżka."
      },
      {
        "type": "line",
        "text": "Jednym ruchem różdżki przywróciła Kopciuszkowi piękną"
      },
      {
        "type": "line",
        "text": "suknię z balu."
      },
      {
        "type": "line",
        "text": "Siostry patrzyły oniemiałe."
      },
      {
        "type": "line",
        "text": "Dopiero teraz zrozumiały, że przez cały"
      },
      {
        "type": "line",
        "text": "czas żyły obok kogoś znacznie piękniejszego"
      },
      {
        "type": "line",
        "text": "od nich —"
      },
      {
        "type": "line",
        "text": "nie twarzą, lecz sercem."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Kiedy książę ujrzał dziewczynę w pałacowym"
      },
      {
        "type": "line",
        "text": "stroju i zobaczył, jak łagodnie patrzy"
      },
      {
        "type": "line",
        "text": "na wszystkich nawet po doznanych krzywdach,"
      },
      {
        "type": "line",
        "text": "nie miał już żadnych wątpliwości."
      },
      {
        "type": "line",
        "text": "To właśnie ona była tajemniczą damą"
      },
      {
        "type": "line",
        "text": "z balu."
      },
      {
        "type": "line",
        "text": "Lecz ważniejsze jeszcze było to, że"
      },
      {
        "type": "line",
        "text": "była osobą, której dobroć nie zgasła"
      },
      {
        "type": "line",
        "text": "mimo ciężkiego losu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Książę poprosił Kopciuszka, by pojechała z"
      },
      {
        "type": "line",
        "text": "nim do pałacu."
      },
      {
        "type": "line",
        "text": "Wkrótce odbył się ślub, o którym"
      },
      {
        "type": "line",
        "text": "mówiono w całym królestwie."
      },
      {
        "type": "line",
        "text": "Był to jednak nie tylko ślub"
      },
      {
        "type": "line",
        "text": "bogaty i wystawny, lecz przede wszystkim"
      },
      {
        "type": "line",
        "text": "radosny."
      },
      {
        "type": "line",
        "text": "Wreszcie bowiem ktoś, kto przez długi"
      },
      {
        "type": "line",
        "text": "czas był poniżany i niezauważany, został"
      },
      {
        "type": "line",
        "text": "dostrzeżony takim, jakim naprawdę był."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Mówi się, że Kopciuszek nie nosił"
      },
      {
        "type": "line",
        "text": "w sercu urazy."
      },
      {
        "type": "line",
        "text": "Pamiętał swój ból, ale nie chciał,"
      },
      {
        "type": "line",
        "text": "by zamienił się on w gorycz."
      },
      {
        "type": "line",
        "text": "W tym właśnie tkwiła jego siła."
      },
      {
        "type": "line",
        "text": "A ludzie, którzy słyszeli tę historię,"
      },
      {
        "type": "line",
        "text": "powtarzali sobie potem przez lata, że"
      },
      {
        "type": "line",
        "text": "dobroć może być cicha i skromna,"
      },
      {
        "type": "line",
        "text": "lecz ma w sobie większą moc"
      },
      {
        "type": "line",
        "text": "niż pycha, szyderstwo i chłód."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "I dlatego opowieść o Kopciuszku trwa"
      },
      {
        "type": "line",
        "text": "do dziś."
      },
      {
        "type": "line",
        "text": "Przypomina, że czasem najpiękniejsze przemiany zaczynają"
      },
      {
        "type": "line",
        "text": "się nie od czarów, lecz od"
      },
      {
        "type": "line",
        "text": "serca, które mimo trudów pozostaje czyste."
      },
      {
        "type": "line",
        "text": "A kiedy przychodzi odpowiedni moment, to"
      },
      {
        "type": "line",
        "text": "właśnie to serce rozpoznaje się najłatwiej"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "nawet pośród blasku pałacowych sal i"
      },
      {
        "type": "line",
        "text": "dźwięku królewskich fanfar."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OUTRO —"
      },
      {
        "type": "line",
        "text": "To był Kopciuszek."
      },
      {
        "type": "line",
        "text": "Na podstawie klasycznej baśni."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i opracowanie — 3TaTaTa."
      },
      {
        "type": "line",
        "text": "Dobranoc."
      }
    ]

        "text": "3TaTaTa prezentuje."

      {
        "type": "line",
        "text": "Bazyliszek."
      },
      {
        "type": "line",
        "text": "Na podstawie klasycznej polskiej legendy."

      {
        "type": "line",
        "text": "Tłumaczenie i opracowanie — 3TaTaTa."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OPOWIEŚĆ —"
      },
      {
        "type": "line",
        "text": "Dawno temu, w starej Warszawie, między"
      },
      {
        "type": "line",
        "text": "wąskimi uliczkami i wysokimi kamienicami, szeptano"

        "text": "o potworze, którego lepiej było nie"

      {

        "text": "szukać."
      },
      {
        "type": "line",
        "text": "Mówiono, że głęboko pod miastem, w"

      {
        "type": "line",
        "text": "ciemnych piwnicach, mieszka Bazyliszek —"
      },
      {
        "type": "line",
        "text": "stwór tak straszny, że jeden jego"
      },
      {
        "type": "line",
        "text": "wzrok zamieniał ludzi w kamień."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Nikt nie wiedział dokładnie, skąd się"
      },
      {
        "type": "line",
        "text": "wziął."
      },
      {
        "type": "line",
        "text": "Jedni twierdzili, że wykluł się z"
      },
      {
        "type": "line",
        "text": "jaja zniesionego przez czarnego koguta."
      },
      {
        "type": "line",
        "text": "Inni mówili, że narodził się z"

      {
        "type": "line",
        "text": "dawnej klątwy."
      },
      {
        "type": "line",
        "text": "Wszyscy jednak byli zgodni co do"
      },
      {
        "type": "line",
        "text": "jednego: lepiej było omijać ruiny starej"
      },
      {
        "type": "line",
        "text": "kamienicy, pod którą prowadziło wejście do"
      },
      {
        "type": "line",
        "text": "podziemnych lochów."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Przez długi czas mieszkańcy bali się"
      },
      {
        "type": "line",
        "text": "nawet wypowiadać jego imię po zmroku."
      },
      {
        "type": "line",
        "text": "A gdy ktoś znikał bez śladu,"
      },

        "text": "od razu szeptano, że pewnie zapuścił"

      {
        "type": "line",
        "text": "się tam, gdzie nie powinien."
      },
      {
        "type": "line",
        "text": "Zdarzało się bowiem, że chciwi śmiałkowie"

      {
        "type": "line",
        "text": "schodzili do piwnic, licząc na ukryte"
      },
      {
        "type": "line",
        "text": "skarby."
      },
      {
        "type": "line",
        "text": "Nigdy jednak nie wracali."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Pewnego dnia po mieście rozeszła się"

      {
        "type": "line",
        "text": "wieść o młodej dziewczynie, która zaginęła"

        "text": "Była córką ubogiej wdowy i podobno"

        "type": "line",
        "text": "Zrozpaczona matka chodziła od domu do"

        "text": "domu, prosząc o pomoc."

      {
        "type": "line",
        "text": "Niestety, choć wielu jej współczuło, nikt"

        "text": "nie miał odwagi zejść do podziemi."

      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Wtedy zgłosił się młody czeladnik, ubogi,"
      },

        "type": "line",
        "text": "ale odważny i rozsądny."
      },
      {
        "type": "line",
        "text": "Nie był rycerzem ani możnym panem."
      },
      {
        "type": "line",
        "text": "Nie miał zbroi ze złota ani"

      {
        "type": "line",
        "text": "miecza wysadzanego klejnotami."
      },
      {
        "type": "line",
        "text": "Miał jednak coś cenniejszego —"
      },
      {
        "type": "line",
        "text": "chłodny umysł i serce, które nie"
      },
      {
        "type": "line",
        "text": "pozwalało mu przejść obojętnie obok cudzej"

      {
        "type": "line",
        "text": "krzywdy."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Pójdę tam —"
      },
      {
        "type": "line",
        "text": "powiedział."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Jeśli dziewczyna jeszcze żyje, trzeba ją"

        "type": "line",
        "text": "odnaleźć."

      {
        "type": "line",
        "text": "A jeśli w tych lochach naprawdę"

        "type": "line",
        "text": "czai się potwór, trzeba położyć kres"

      {
        "type": "line",
        "text": "jego grozie."

        "type": "sep"
      },
      {
        "type": "line",
        "text": "Ludzie patrzyli na niego z niedowierzaniem."

        "type": "line",
        "text": "Jedni próbowali go odwieść, inni żegnali"

        "type": "line",
        "text": "Stary rzemieślnik poradził mu jednak, by"

        "type": "line",
        "text": "Dał mu wypolerowaną tarczę, lśniącą niczym"

      {
        "type": "sep"
      },

        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Nie patrz mu prosto w oczy"

      {
        "type": "line",
        "text": "—"
      },

        "type": "line",
        "text": "ostrzegł."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Jeśli legenda mówi prawdę, niech sam"
      },
      {
        "type": "line",
        "text": "spotka własne spojrzenie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Czeladnik podziękował, wziął pochodnię i ostrożnie"
      },
      {
        "type": "line",
        "text": "ruszył ku starej kamienicy."
      },
      {
        "type": "line",
        "text": "Gdy zszedł po kamiennych schodach w"
      },
      {
        "type": "line",
        "text": "dół, ogarnął go chłód i wilgoć."
      },
      {
        "type": "line",
        "text": "Powietrze było ciężkie, a cisza tak"

      {

        "text": "głuchym echem od ścian."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Lochy ciągnęły się długo."
      },
      {
        "type": "line",
        "text": "Mijał popękane mury, zardzewiałe kraty i"
      },

        "type": "line",
        "text": "porzucone skrzynie."
      },

        "type": "line",
        "text": "W pewnej chwili zobaczył dziwne kształty"
