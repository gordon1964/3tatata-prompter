// ===================== MENU BUILD =====================
function buildMenu() {
  const list = document.getElementById('story-list');
  list.innerHTML = '';
  STORIES.forEach((story, i) => {
    const item = document.createElement('div');
    item.className = 'story-item';
    item.innerHTML = `
      <span class="story-num">${String(i).padStart(2,'0')}</span>
      <div class="story-info">
        <div class="story-name">${story.title}</div>
        <div class="story-tag">${story.tag}</div>
      </div>
      <span class="story-arrow">›</span>
    `;
    item.addEventListener('click', () => openStory(story));
    list.appendChild(item);
  });
}

// ===================== STORY OPEN =====================
function openStory(story) {
  currentStory = story;
  scrollY = 0;
  isPlaying = false;

  document.getElementById('story-label').textContent = story.title.toUpperCase();
  document.getElementById('menu-screen').style.display = 'none';
  document.getElementById('prompter-screen').style.display = 'flex';

  renderStory(story);
  updatePlayBtn();
  updateProgress();
  applyFontSize();
}

function renderStory(story) {
  const inner = document.getElementById('scroll-inner');
  inner.innerHTML = '';

  story.sections.forEach(item => {
    let el;
    if (item.type === 'title') {
      el = document.createElement('div');
      el.className = 'prompt-title';
      el.textContent = item.text;
    } else if (item.type === 'meta') {
      el = document.createElement('div');
      el.className = 'prompt-meta';
      el.textContent = item.text;
    } else if (item.type === 'section') {
      el = document.createElement('div');
      el.className = 'prompt-section';
      el.textContent = item.text;
    } else if (item.type === 'line') {
      el = document.createElement('div');
      el.className = 'prompt-line';
      el.textContent = item.text;
    } else if (item.type === 'sep') {
      el = document.createElement('div');
      el.className = 'prompt-sep';
      el.textContent = '· · ·';
    }
    if (el) inner.appendChild(el);
  });

  // measure after render
  requestAnimationFrame(() => {
    totalHeight = inner.scrollHeight - document.getElementById('scroll-container').clientHeight;
    applyScroll();
  });
}

// ===================== SCROLL =====================
function applyScroll() {
  const inner = document.getElementById('scroll-inner');
  inner.style.transform = `translateY(${-scrollY}px)`;
  updateProgress();
}

function updateProgress() {
  const pct = totalHeight > 0 ? (scrollY / totalHeight) * 100 : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function scrollLoop() {
  if (!isPlaying) return;
  scrollY += scrollSpeed;
  if (scrollY >= totalHeight) {
    scrollY = totalHeight;
    isPlaying = false;
    updatePlayBtn();
  }
  applyScroll();
  animFrame = requestAnimationFrame(scrollLoop);
}

// ===================== CONTROLS =====================
function togglePlay() {
  isPlaying = !isPlaying;
  updatePlayBtn();
  if (isPlaying) {
    if (scrollY >= totalHeight) { scrollY = 0; applyScroll(); }
    animFrame = requestAnimationFrame(scrollLoop);
  } else {
    cancelAnimationFrame(animFrame);
  }
}

function updatePlayBtn() {
  const btn = document.getElementById('play-btn');
  if (isPlaying) {
    btn.classList.add('playing');
    btn.querySelector('.label').textContent = 'PAUZA';
    btn.querySelector('.icon').textContent = '⏸';
  } else {
    btn.classList.remove('playing');
    btn.querySelector('.label').textContent = 'PLAY';
    btn.querySelector('.icon').textContent = '▶';
  }
}

function speedUp() {
  scrollSpeed = Math.min(scrollSpeed + 0.3, 6);
  flashSpeed();
}

function slowDown() {
  scrollSpeed = Math.max(scrollSpeed - 0.3, 0.3);
  flashSpeed();
}

function flashSpeed() {
  const btn = document.getElementById('play-btn');
  btn.querySelector('.label').textContent = Math.round(scrollSpeed * 10) + '%';
  setTimeout(() => {
    btn.querySelector('.label').textContent = isPlaying ? 'PAUZA' : 'PLAY';
  }, 700);
}

function resetScroll() {
  cancelAnimationFrame(animFrame);
  isPlaying = false;
  scrollY = 0;
  applyScroll();
  updatePlayBtn();
}

function goBack() {
  cancelAnimationFrame(animFrame);
  isPlaying = false;
  document.getElementById('prompter-screen').style.display = 'none';
  document.getElementById('menu-screen').style.display = 'flex';
}

function cycleFont() {
  fontSizeIndex = (fontSizeIndex + 1) % fontSizes.length;
  applyFontSize();
}

function applyFontSize() {
  const inner = document.getElementById('scroll-inner');
  fontSizes.forEach(f => inner.classList.remove(f));
  inner.classList.add(fontSizes[fontSizeIndex]);
  document.getElementById('font-btn').textContent = 'Aa ' + fontLabels[fontSizeIndex];
  requestAnimationFrame(() => {
    totalHeight = inner.scrollHeight - document.getElementById('scroll-container').clientHeight;
  });
}

// Touch scroll on prompter
let touchStartY = 0;
let touchStartScrollY = 0;
let isTouching = false;

document.getElementById('scroll-container').addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    touchStartY = e.touches[0].clientY;
    touchStartScrollY = scrollY;
    isTouching = true;
  }
}, { passive: true });

document.getElementById('scroll-container').addEventListener('touchmove', (e) => {
  if (!isTouching) return;
  const dy = touchStartY - e.touches[0].clientY;
  scrollY = Math.max(0, Math.min(totalHeight, touchStartScrollY + dy));
  applyScroll();
}, { passive: true });

document.getElementById('scroll-container').addEventListener('touchend', () => {
  isTouching = false;
});

document.getElementById('controls').addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// Init
buildMenu();
</script>
