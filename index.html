głosem. Cokolwiek zobaczycie, nie biegnijcie za światłem. A jeśli zobaczycie bramę tam, gdzie przed chwilą był piasek, odwróćcie wzrok."},{"type":"line","text":"Junus przełknął ślinę."},{"type":"line","text":"— Czy ty kiedyś widziałeś to miasto? — zapytał."},{"type":"line","text":"Rahim spojrzał na czerwony księżyc."},{"type":"line","text":"— Nie. I dzięki temu wciąż jestem Rahimem."},{"type":"line","text":"Nie wyjaśnił, co to znaczy."},{"type":"line","text":"Noc była długa."},{"type":"line","text":"Ludzie siedzieli blisko ognia."},{"type":"line","text":"Nikt nie opowiadał dowcipów."},{"type":"line","text":"Nikt nie śpiewał."},{"type":"line","text":"Nawet kupcy, którzy zwykle kłócili się o ceny i trasy, milczeli."},{"type":"line","text":"Junus siedział obok ojca."},{"type":"line","text":"Malik pisał coś na małej tabliczce, choć światło ognia drżało i litery wychodziły nierówne."},{"type":"line","text":"— Co zapisujesz? — zapytał chłopiec."},{"type":"line","text":"— Imiona ludzi w karawanie — odpowiedział ojciec."},{"type":"line","text":"— Po co?"},{"type":"line","text":"Malik uśmiechnął się smutno."},{"type":"line","text":"— Żeby pamiętać, że jesteśmy razem. Strach lubi robić z ludzi samotne wyspy."},{"type":"line","text":"Junus zapamiętał to zdanie."},{"type":"line","text":"Wtedy usłyszał dźwięk."},{"type":"line","text":"Bardzo daleki."},{"type":"line","text":"Jak dzwonek."},{"type":"line","text":"Potem drugi."},{"type":"line","text":"Potem szmer wielu głosów."},{"type":"line","text":"Chłopiec podniósł głowę."},{"type":"line","text":"Za czarnymi skałami zobaczył światło."},{"type":"line","text":"Nie ogień."},{"type":"line","text":"Nie gwiazdę."},{"type":"line","text":"Światło okien."},{"type":"line","text":"Wstał powoli."},{"type":"line","text":"— Junusie — powiedział ojciec ostrzegawczo."},{"type":"line","text":"Ale chłopiec już patrzył."},{"type":"line","text":"Między wydmami stała brama."},{"type":"line","text":"Wielka."},{"type":"line","text":"Czerwona."},{"type":"line","text":"Z kamienia, którego wcześniej tam nie było."},{"type":"line","text":"Za bramą widać było ulicę, lampy, dachy i cienie ludzi przechodzących przez plac."},{"type":"line","text":"Miasto Amar."},{"type":"line","text":"Nie wyglądało jak ruina."},{"type":"line","text":"Nie wyglądało jak sen."},{"type":"line","text":"Wyglądało prawdziwie."},{"type":"line","text":"Tak prawdziwie, że aż bolały oczy."},{"type":"line","text":"— Nie patrz — syknął Rahim."},{"type":"line","text":"Junus chciał się odwrócić."},{"type":"line","text":"Naprawdę chciał."},{"type":"line","text":"Wtedy usłyszał płacz dziecka."},{"type":"line","text":"Cichy."},{"type":"line","text":"Przerażony."},{"type":"line","text":"Dochodził z bramy."},{"type":"line","text":"Junus zamarł."},{"type":"line","text":"— Tam jest ktoś mały — powiedział."},{"type":"line","text":"— W tym mieście wszystko jest pułapką — odparł Rahim."},{"type":"line","text":"Płacz powtórzył się."},{"type":"line","text":"Malik chwycił syna za ramię."},{"type":"line","text":"— Nie możesz iść."},{"type":"line","text":"Junus spojrzał na ojca."},{"type":"line","text":"— A jeśli to prawdziwe dziecko?"},{"type":"line","text":"To pytanie zawisło między nimi ciężko jak kamień."},{"type":"line","text":"Malik zamknął oczy."},{"type":"line","text":"Był człowiekiem rozsądnym."},{"type":"line","text":"Wiedział, że legenda może kusić."},{"type":"line","text":"Wiedział, że noc może oszukiwać."},{"type":"line","text":"Ale całe życie uczył syna, że słowa i czyny mają znaczenie."},{"type":"line","text":"Jak miał teraz powiedzieć: nie pomagaj, bo się boisz?"},{"type":"line","text":"— Idę z tobą — powiedział w końcu."},{"type":"line","text":"Rahim zaklął pod nosem."},{"type":"line","text":"— Szaleńcy."},{"type":"line","text":"Ale wziął kij i ruszył za nimi."},{"type":"line","text":"We trzech podeszli do bramy."},{"type":"line","text":"Gdy ją przekroczyli, świat za nimi ucichł."},{"type":"line","text":"Ogień karawany zniknął."},{"type":"line","text":"Nie było widać wielbłądów, ludzi ani skał."},{"type":"line","text":"Przed nimi rozciągało się miasto."},{"type":"line","text":"Amar żył."},{"type":"line","text":"Ulice były wybrukowane czerwonym kamieniem."},{"type":"line","text":"W oknach paliły się lampy."},{"type":"line","text":"Na targu stały stragany z owocami, tkaninami i miedzianymi naczyniami."},{"type":"line","text":"Ludzie chodzili, rozmawiali, targowali się i śmiali."},{"type":"line","text":"A jednak było w nich coś dziwnego."},{"type":"line","text":"Nikt nie patrzył sobie w oczy."},{"type":"line","text":"Nikt nie zatrzymywał się przy drugim człowieku."},{"type":"line","text":"Każdy poruszał się tak, jakby wykonywał powtarzany od stu lat gest."},{"type":"line","text":"Junus zobaczył kobietę, której rozsypały się daktyle."},{"type":"line","text":"Przechodnie omijali ją bez słowa."},{"type":"line","text":"Zobaczył starca siedzącego przy studni z pustą miską."},{"type":"line","text":"Ludzie przechodzili obok niego, niosąc dzbany pełne wody."},{"type":"line","text":"Zobaczył małego chłopca przy murze."},{"type":"line","text":"To on płakał."},{"type":"line","text":"Miał może pięć lat."},{"type":"line","text":"Trzymał pęknięty kubek."},{"type":"line","text":"Junus podbiegł do niego."},{"type":"line","text":"— Dlaczego płaczesz?"},{"type":"line","text":"Chłopiec spojrzał na niego, jakby widział kogoś z innego świata."},{"type":"line","text":"— Zgubiłem mamę — powiedział. — I nikt mnie nie słyszy."},{"type":"line","text":"Malik uklęknął przy dziecku."},{"type":"line","text":"— Jak masz na imię?"},{"type":"line","text":"— Sami."},{"type":"line","text":"Rahim rozejrzał się nerwowo."},{"type":"line","text":"— Musimy wyjść. Brama może zniknąć przed świtem."},{"type":"line","text":"Junus spojrzał na ulicę."},{"type":"line","text":"— Najpierw znajdziemy jego mamę."},{"type":"line","text":"Rahim chciał zaprotestować, ale nie zdążył."},{"type":"line","text":"Z głębi miasta dobiegł dźwięk bębna."},{"type":"line","text":"Wszyscy mieszkańcy zamarli."},{"type":"line","text":"Potem, jak na znak, zaczęli iść w stronę głównego placu."},{"type":"line","text":"Junus, Malik, Rahim i mały Sami ruszyli za nimi."},{"type":"line","text":"Plac był ogromny."},{"type":"line","text":"Pośrodku stała wyschnięta fontanna."},{"type":"line","text":"Na jej brzegu leżał kamienny dzban."},{"type":"line","text":"Nad placem górował pałac starszyzny."},{"type":"line","text":"Na balkonie pojawiło się siedmiu ludzi w bogatych szatach."},{"type":"line","text":"Ich twarze były nieruchome."},{"type":"line","text":"Najstarszy z nich przemówił głosem suchym jak piasek:"},{"type":"line","text":"— Woda jest własnością miasta. Cień jest własnością miasta. Chleb jest własnością miasta. Obcy nie mają prawa prosić."},{"type":"line","text":"Tłum powtórzył bez życia:"},{"type":"line","text":"— Obcy nie mają prawa prosić."},{"type":"line","text":"Junus poczuł zimno."},{"type":"line","text":"Sami ścisnął jego rękę."},{"type":"line","text":"— Oni mówią to każdej nocy — wyszeptał chłopiec."},{"type":"line","text":"— Każdej?"},{"type":"line","text":"— Tak. Odkąd pamiętam. A ja pamiętam tylko tę noc."},{"type":"line","text":"Malik spojrzał na Rahima."},{"type":"line","text":"— Oni są uwięzieni w chwili swojej winy."},{"type":"line","text":"Rahim skinął głową."},{"type":"line","text":"— I jeśli zostaniemy tu do świtu, możemy zostać razem z nimi."},{"type":"line","text":"Junus popatrzył na wyschniętą fontannę."},{"type":"line","text":"Na kamienny dzban."},{"type":"line","text":"Na ludzi z pustymi twarzami."},{"type":"line","text":"I nagle zrozumiał coś ważnego."},{"type":"line","text":"To miasto nie potrzebowało miecza."},{"type":"line","text":"Nie potrzebowało zaklęcia."},{"type":"line","text":"Potrzebowało jednego czynu innego niż wszystkie powtarzane przez sto lat."},{"type":"line","text":"— Gdzie jest woda? — zapytał Samiego."},{"type":"line","text":"Chłopiec wskazał w stronę pałacu."},{"type":"line","text":"— W cysternach pod wieżą. Ale strażnicy nikogo nie wpuszczają."},{"type":"line","text":"Junus spojrzał na ojca."},{"type":"line","text":"Malik nie musiał pytać, co syn chce zrobić."},{"type":"line","text":"Widział to w jego oczach."},{"type":"line","text":"— To niebezpieczne — powiedział cicho."},{"type":"line","text":"— Wiem."},{"type":"line","text":"— I może nic nie zmienić."},{"type":"line","text":"— Ale jeśli nic nie zrobimy, na pewno nic się nie zmieni."},{"type":"line","text":"Rahim westchnął ciężko."},{"type":"line","text":"— Dzieci z dobrym sercem są bardziej uparte niż stare osły."},{"type":"line","text":"Poprowadził ich boczną ulicą, bo znał układ dawnych miast lepiej, niż sam chciał przyznać."},{"type":"line","text":"Dotarli do pałacowej wieży."},{"type":"line","text":"Przy wejściu stało dwóch strażników."},{"type":"line","text":"Nie wyglądali jak żywi ludzie."},{"type":"line","text":"Ich zbroje były pokryte czerwonym pyłem, a oczy mieli puste."},{"type":"line","text":"Rahim rzucił kamień w przeciwną stronę."},{"type":"line","text":"Strażnicy odwrócili głowy."},{"type":"line","text":"Malik, Junus i Sami przemknęli do środka."},{"type":"line","text":"Schody prowadziły w dół."},{"type":"line","text":"Powietrze robiło się chłodne."},{"type":"line","text":"W końcu znaleźli cysternę."},{"type":"line","text":"Była pełna wody."},{"type":"line","text":"Czystej."},{"type":"line","text":"Ciemnej."},{"type":"line","text":"Spokojnej."},{"type":"line","text":"Na ścianie wisiały dzbany."},{"type":"line","text":"Junus napełnił jeden."},{"type":"line","text":"Był ciężki, ale uniósł go obiema rękami."},{"type":"line","text":"Kiedy wracali na plac, bęben uderzył ponownie."},{"type":"line","text":"Mieszkańcy nadal stali wokół fontanny."},{"type":"line","text":"Starszyzna powtarzała:"},{"type":"line","text":"— Woda jest własnością miasta."},{"type":"line","text":"Junus wszedł na brzeg fontanny."},{"type":"line","text":"Był mały wśród dorosłych, ale czerwone światło księżyca padło prosto na niego."},{"type":"line","text":"— Nieprawda! — zawołał."},{"type":"line","text":"Tłum drgnął."},{"type":"line","text":"Starszyzna odwróciła głowy."},{"type":"line","text":"Junusowi trzęsły się ręce, ale mówił dalej:"},{"type":"line","text":"— Woda nie należy do tego, kto zamyka bramę. Woda ratuje życie. A życie jest ważniejsze niż strach."},{"type":"line","text":"Podszedł do starego człowieka z pustą miską i nalał mu wody."},{"type":"line","text":"Starzec spojrzał na miskę."},{"type":"line","text":"Jego twarz zadrżała."},{"type":"line","text":"Jakby po stu latach przypomniała sobie, jak wygląda zdumienie."},{"type":"line","text":"Potem Junus podał wodę Samiemu."},{"type":"line","text":"Chłopiec wypił łyk."},{"type":"line","text":"W tej samej chwili po placu przeszedł szmer."},{"type":"line","text":"Nie zwykły."},{"type":"line","text":"Głęboki."},{"type":"line","text":"Jak pęknięcie w kamieniu."},{"type":"line","text":"Jedna z kobiet w tłumie krzyknęła:"},{"type":"line","text":"— Sami!"},{"type":"line","text":"Chłopiec odwrócił się."},{"type":"line","text":"— Mama!"},{"type":"line","text":"Kobieta wybiegła z tłumu i porwała go w ramiona."},{"type":"line","text":"Twarz miała mokrą od łez."},{"type":"line","text":"Ale to były prawdziwe łzy."},{"type":"line","text":"Pierwsze prawdziwe łzy w mieście, które przez sto lat powtarzało tylko własny błąd."},{"type":"line","text":"Fontanna zadrżała."},{"type":"line","text":"Z jej dna dobiegł bulgot."},{"type":"line","text":"Najpierw mały."},{"type":"line","text":"Potem większy."},{"type":"line","text":"Woda wytrysnęła cienkim strumieniem, a potem szerokim łukiem popłynęła w górę, srebrna i czerwona w świetle księżyca."},{"type":"line","text":"Ludzie zaczęli się budzić."},{"type":"line","text":"Jedni płakali."},{"type":"line","text":"Inni rozglądali się wokół, jakby po długim śnie zobaczyli miejsce, w którym stoją."},{"type":"line","text":"Starszyzna na balkonie cofnęła się."},{"type":"line","text":"Ich bogate szaty rozsypywały się w czerwony pył."},{"type":"line","text":"Najstarszy z nich zawołał:"},{"type":"line","text":"— Bramy mają pozostać zamknięte!"},{"type":"line","text":"Ale nikt już nie powtórzył jego słów."},{"type":"line","text":"Zamiast tego ktoś otworzył bramę."},{"type":"line","text":"Potem drugą."},{"type":"line","text":"Potem trzecią."},{"type":"line","text":"Do miasta wpadł wiatr."},{"type":"line","text":"Pierwszy prawdziwy wiatr od stu lat."},{"type":"line","text":"Lampy zamigotały."},{"type":"line","text":"Czerwony księżyc pobladł."},{"type":"line","text":"Rahim chwycił Junusa za ramię."},{"type":"line","text":"— Teraz! Musimy wracać!"},{"type":"line","text":"Malik, Junus i Rahim pobiegli ku bramie, przez którą weszli."},{"type":"line","text":"Sami i jego matka stali przy fontannie."},{"type":"line","text":"— Chodźcie z nami! — zawołał Junus."},{"type":"line","text":"Kobieta uśmiechnęła się smutno."},{"type":"line","text":"— My należymy do tej pamięci. Ale teraz ona może odpocząć."},{"type":"line","text":"Sami pomachał mu pękniętym kubkiem."},{"type":"line","text":"Miasto zaczęło jaśnieć."},{"type":"line","text":"Nie jak pożar."},{"type":"line","text":"Jak świt."},{"type":"line","text":"Mury robiły się przezroczyste."},{"type":"line","text":"Wieże rozpływały się w czerwonym blasku."},{"type":"line","text":"Targ, fontanna, pałac i ludzie zmieniali się w drobne iskry, które unosiły się ku niebu."},{"type":"line","text":"Junus biegł, czując, że grunt pod stopami staje się miękki jak piasek."},{"type":"line","text":"W ostatniej chwili wybiegli przez bramę."},{"type":"line","text":"Upadli obok dogasającego ogniska karawany."},{"type":"line","text":"Ludzie zerwali się z krzykiem."},{"type":"line","text":"Dla nich minęła tylko chwila."},{"type":"line","text":"Może kilka oddechów."},{"type":"line","text":"Za nimi nie było już miasta."},{"type":"line","text":"Nie było bramy."},{"type":"line","text":"Nie było murów."},{"type":"line","text":"Tylko pustynia pod bladym, prawie zwyczajnym księżycem."},{"type":"line","text":"Junus leżał na piasku i oddychał ciężko."},{"type":"line","text":"W dłoni trzymał coś twardego."},{"type":"line","text":"Spojrzał."},{"type":"line","text":"To był pęknięty kubek Samiego."},{"type":"line","text":"Malik dotknął ramienia syna."},{"type":"line","text":"— Wróciłeś."},{"type":"line","text":"Rahim usiadł na piasku i długo milczał."},{"type":"line","text":"W końcu powiedział:"},{"type":"line","text":"— Nie znam wielu ludzi, którzy weszli do legendy i wyszli z niej z kubkiem."},{"type":"line","text":"Nad ranem ruszyli dalej."},{"type":"line","text":"Kiedy słońce wzeszło, Rahim zatrzymał karawanę na niewielkim wzniesieniu."},{"type":"line","text":"W miejscu, gdzie nocą było miasto, zobaczyli coś niezwykłego."},{"type":"line","text":"Pośrodku pustyni wyrósł mały krąg zieleni."},{"type":"line","text":"Kilka źdźbeł trawy."},{"type":"line","text":"Jedna drobna roślina."},{"type":"line","text":"I cienki ślad wilgoci w piasku."},{"type":"line","text":"— Amar odpoczął — powiedział Malik."},{"type":"line","text":"Junus uklęknął i wbił pęknięty kubek w ziemię obok zieleni."},{"type":"line","text":"Nie jako znak zwycięstwa."},{"type":"line","text":"Jako pamięć."},{"type":"line","text":"Od tamtej pory karawany przejeżdżające tym szlakiem zawsze zostawiały tam trochę wody."},{"type":"line","text":"Nie dużo."},{"type":"line","text":"Tyle, ile można było oddać bez narażania siebie."},{"type":"line","text":"Dla ptaka."},{"type":"line","text":"Dla wędrowca."},{"type":"line","text":"Dla kogoś, kto może nadejść później."},{"type":"line","text":"Po latach w tym miejscu wyrosła mała studnia."},{"type":"line","text":"Nie tak wielka jak cysterny Amaru."},{"type":"line","text":"Nie ozdobna."},{"type":"line","text":"Nie bogata."},{"type":"line","text":"Prosta."},{"type":"line","text":"Kamienna."},{"type":"line","text":"A nad nią ktoś wyrył słowa:"},{"type":"line","text":"„Woda nie jest bogactwem, jeśli nie ratuje pragnącego”."},{"type":"line","text":"Junus dorósł i został skrybą jak ojciec."},{"type":"line","text":"Ale oprócz umów, rachunków i listów zaczął spisywać także opowieści."},{"type":"line","text":"Zapisywał je dla tych, którzy uważali, że legendy są tylko bajaniem przy ognisku."},{"type":"line","text":"Bo Junus wiedział, że legenda czasem jest pamięcią miejsca, które prosi, żeby ludzie nie powtórzyli dawnego błędu."},{"type":"line","text":"A gdy ktoś pytał go, czy naprawdę widział miasto pod czerwonym księżycem, nie odpowiadał od razu."},{"type":"line","text":"Wyjmował z małej szkatułki ziarenko czerwonego piasku, które znalazł kiedyś w pękniętym kubku."},{"type":"line","text":"Kładł je na dłoni pytającego i mówił:"},{"type":"line","text":"— Niektóre miasta znikają z mapy. Ale jeśli człowiek dobrze posłucha, może usłyszeć, o czym nadal próbują opowiedzieć."},{"type":"section","text":"— ZAKOŃCZENIE PODCASTOWE —"},{"type":"line","text":"I tak kończy się dzisiejsza opowieść: „Miasto pod czerwonym księżycem”."},{"type":"line","text":"To historia o miejscu, które zniknęło, bo zapomniało o współczuciu."},{"type":"line","text":"O chłopcu, który wszedł tam, gdzie dorośli bali się spojrzeć."},{"type":"line","text":"I o jednej misce wody, która okazała się silniejsza niż stuletnia klątwa."},{"type":"line","text":"Jeśli ta historia została z tobą choć na chwilę, zabierz jej mały kawałek do snu."},{"type":"line","text":"Może będzie to czerwony księżyc nad pustynią."},{"type":"line","text":"Może brama, której nie było na mapie."},{"type":"line","text":"A może proste zdanie:"},{"type":"line","text":"to, czym się dzielisz, czasem ocala więcej, niż myślisz."},{"type":"line","text":"Więcej bajek, legend i tajemniczych opowieści znajdziesz na stronie 3tatata.pl."},{"type":"line","text":"Możesz nas także słuchać na Spotify i oglądać na YouTube."},{"type":"line","text":"Zostaw follow albo subskrypcję, żeby nie przegapić kolejnych historii."},{"type":"line","text":"Dobranoc — i do usłyszenia w następnej bajce."}]},{"id":12,"title":"LAMPA BEZ DŻINA","tag":"Opowieść","sections":[{"type":"title","text":"LAMPA BEZ DŻINA"},{"type":"meta","text":"3TaTaTa — Opowieści z dalekich krain"},{"type":"section","text":"— WSTĘP DO ODCINKA —"},{"type":"line","text":"W wielu opowieściach stara lampa oznacza jedno."},{"type":"line","text":"Magia."},{"type":"line","text":"Dym."},{"type":"line","text":"Dżin większy od domu."},{"type":"line","text":"Trzy życzenia."},{"type":"line","text":"Złoto, pałace, latające dywany i skarby, które pojawiają się szybciej, niż człowiek zdąży mrugnąć."},{"type":"line","text":"Ale co, jeśli pewnego dnia ktoś znajduje lampę, pociera ją... i nic się nie dzieje?"},{"type":"line","text":"Żadnego dymu."},{"type":"line","text":"Żadnego głosu."},{"type":"line","text":"Żadnego dżina."},{"type":"line","text":"Tylko cisza."},{"type":"line","text":"Czasem właśnie cisza jest najdziwniejszą magią ze wszystkich."},{"type":"line","text":"Bo w ciszy człowiek zaczyna słyszeć to, czego zwykle nie chce usłyszeć."},{"type":"line","text":"Dzisiaj opowiem ci historię chłopca, który znalazł lampę bez dżina."},{"type":"line","text":"I odkrył, że nie każde życzenie powinno zostać spełnione od razu."},{"type":"line","text":"LAMPA BEZ DŻINA"},{"type":"line","text":"Dawno temu, w mieście pachnącym kardamonem, kurzem i słodkimi daktylami, mieszkał chłopiec imieniem Amir."},{"type":"line","text":"Miasto było głośne od świtu do nocy."},{"type":"line","text":"Rano budziły je nawoływania sprzedawców, stukot kół, beczenie kóz i śmiech dzieci biegnących między straganami."},{"type":"line","text":"W południe powietrze drżało od upału."},{"type":"line","text":"Wieczorem, kiedy słońce opadało za dachy, z małych kuchni wypływał zapach pieczonego chleba, soczewicy i miodu."},{"type":"line","text":"Amir mieszkał z matką w domu tak małym, że gdy padał deszcz, wszystkie garnki, miski i kubki ustawiano pod przeciekającym dachem jak orkiestrę czekającą na pierwszy dźwięk."},{"type":"line","text":"Nie byli bogaci."},{"type":"line","text":"Nie mieli służby."},{"type":"line","text":"Nie mieli dywanów z dalekich krain ani skrzyń pełnych monet."},{"type":"line","text":"Mieli za to stary stół, dwa gliniane kubki, piec, który czasem dymił bardziej niż grzał, i matkę Amira, która potrafiła z najprostszego posiłku zrobić coś, co pachniało domem."},{"type":"line","text":"Matka chłopca miała na imię Safija."},{"type":"line","text":"Szyła i naprawiała ubrania."},{"type":"line","text":"Jej palce znały igłę lepiej niż niektórzy ludzie znają własne myśli. Potrafiła załatać rozdartą szatę tak, że ślad po dziurze wyglądał jak wzór. Potrafiła skrócić rękawy, zszyć torbę, obszyć chustę i przerobić starą tkaninę na coś, co mogło jeszcze długo służyć."},{"type":"line","text":"Amir często jej pomagał."},{"type":"line","text":"Nawlekał nici."},{"type":"line","text":"Podawał guziki."},{"type":"line","text":"Zanosił gotowe rzeczy klientom."},{"type":"line","text":"Ale w głębi serca marzył o czymś innym."},{"type":"line","text":"Marzył o bogactwie."},{"type":"line","text":"Nie takim małym."},{"type":"line","text":"Nie o kilku monetach więcej."},{"type":"line","text":"Marzył o bogactwie wielkim, błyszczącym i natychmiastowym."},{"type":"line","text":"Chciał mieć dom z fontanną."},{"type":"line","text":"Chciał jeść pistacje, kiedy tylko przyjdzie mu ochota."},{"type":"line","text":"Chciał nosić buty, które nie będą po starszym kuzynie."},{"type":"line","text":"Chciał, żeby ludzie na targu patrzyli na niego z podziwem."},{"type":"line","text":"A najbardziej chciał, żeby jego matka nigdy więcej nie siedziała nocą przy lampce oliwnej, mrużąc zmęczone oczy nad cudzą szatą."},{"type":"line","text":"— Gdybym miał magiczną lampę — mówił czasem — poprosiłbym o pałac."},{"type":"line","text":"Safija uśmiechała się wtedy łagodnie."},{"type":"line","text":"— A potem?"},{"type":"line","text":"— Potem o złoto."},{"type":"line","text":"— A potem?"},{"type":"line","text":"— O jeszcze więcej złota."},{"type":"line","text":"Matka odkładała igłę i patrzyła na niego uważnie."},{"type":"line","text":"— Złoto jest ciężkie, synu. Człowiek, który chce go za dużo, często zapomina, po co w ogóle zaczął je zbierać."},{"type":"line","text":"Amir wzruszał ramionami."},{"type":"line","text":"— To dlatego, że nigdy nie mieliśmy go dużo."},{"type":"line","text":"Safija nie gniewała się."},{"type":"line","text":"Wiedziała, że bieda potrafi szeptać do dziecka bardzo przekonująco."},{"type":"line","text":"Pewnego dnia Amir został wysłany na stary targ za południową bramą miasta."},{"type":"line","text":"Nie był to główny bazar, pełen barwnych tkanin i głośnych kupców."},{"type":"line","text":"Stary targ był cichszy."},{"type":"line","text":"Sprzedawano tam rzeczy używane, pęknięte, zapomniane albo takie, których nikt już nie potrafił nazwać."},{"type":"line","text":"Leżały tam stare klucze bez zamków, zegary bez wskazówek, srebrne łyżeczki, których srebro dawno pociemniało, lusterka z popękanym szkłem, figurki zwierząt, księgi bez okładek i lampy oliwne różnej wielkości."},{"type":"line","text":"Amir miał odebrać od farbiarza kawałek granatowej tkaniny dla matki."},{"type":"line","text":"Załatwił sprawę szybko, ale zamiast wracać od razu, zaczął chodzić między straganami."},{"type":"line","text":"Lubił stare przedmioty."},{"type":"line","text":"Każdy wyglądał, jakby znał historię, której nikt już nie opowiada."},{"type":"line","text":"Na końcu targu, pod płóciennym daszkiem, siedział bardzo stary handlarz."},{"type":"line","text":"Miał białą brodę, wąskie dłonie i oczy tak spokojne, jakby przez całe życie nie musiał się spieszyć."},{"type":"line","text":"Przed nim leżało tylko kilka rzeczy: pusta szkatułka, mosiężny kompas bez igły, mały dzwonek i stara lampa."},{"type":"line","text":"Amir zatrzymał się przy lampie."},{"type":"line","text":"Była brudna."},{"type":"line","text":"Ciemna."},{"type":"line","text":"Prawie czarna od sadzy i czasu."},{"type":"line","text":"Ale miała piękny kształt."},{"type":"line","text":"Smukły dzióbek, szeroki brzusiec i uchwyt wygięty jak ogon ptaka."},{"type":"line","text":"Chłopiec poczuł nagłe ukłucie w sercu."},{"type":"line","text":"Lampa."},{"type":"line","text":"Stara lampa."},{"type":"line","text":"A jeśli..."},{"type":"line","text":"Handlarz podniósł wzrok."},{"type":"line","text":"— Podoba ci się?"},{"type":"line","text":"— Ile kosztuje? — zapytał Amir."},{"type":"line","text":"— Tyle, ile masz."},{"type":"line","text":"Chłopiec zmarszczył brwi."},{"type":"line","text":"— Nie wiesz, ile mam."},{"type":"line","text":"— Wiem, że jeśli pytasz o tę lampę w taki sposób, nie masz wiele."},{"type":"line","text":"Amir poczerwieniał."},{"type":"line","text":"Wysypał na dłoń trzy małe monety."},{"type":"line","text":"Miał je przeznaczyć na chleb."},{"type":"line","text":"Handlarz spojrzał na monety, potem na chłopca."},{"type":"line","text":"— Możesz ją wziąć."},{"type":"line","text":"— Za trzy monety?"},{"type":"line","text":"— Za trzy monety i jedną obietnicę."},{"type":"line","text":"Amir cofnął rękę."},{"type":"line","text":"— Jaką obietnicę?"},{"type":"line","text":"— Że jeśli ją potrzesz, a ona nie da ci tego, czego chcesz, nie wyrzucisz jej od razu."},{"type":"line","text":"Chłopiec nie zrozumiał."},{"type":"line","text":"— Dlaczego miałbym ją wyrzucać?"},{"type":"line","text":"Handlarz uśmiechnął się lekko."},{"type":"line","text":"— Ludzie często wyrzucają rzeczy, które nie spełniają ich oczekiwań. Nawet jeśli mają im do zaoferowania coś innego."},{"type":"line","text":"Amir był zbyt podekscytowany, żeby zastanawiać się nad tym długo."},{"type":"line","text":"— Obiecuję."},{"type":"line","text":"Wziął lampę, oddał monety i pobiegł do domu tak szybko, że granatowa tkanina trzepotała mu pod pachą jak flaga."},{"type":"line","text":"W domu matka siedziała przy stole i cerowała płaszcz."},{"type":"line","text":"— Kupiłeś chleb? — zapytała."},{"type":"line","text":"Amir zamarł."},{"type":"line","text":"Dopiero wtedy przypomniał sobie, na co były monety."},{"type":"line","text":"— Nie — powiedział cicho."},{"type":"line","text":"Safija spojrzała na niego."},{"type":"line","text":"— Co kupiłeś?"},{"type":"line","text":"Chłopiec położył lampę na stole."},{"type":"line","text":"Matka przez chwilę nic nie mówiła."},{"type":"line","text":"Potem westchnęła."},{"type":"line","text":"Nie ciężko."},{"type":"line","text":"Nie gniewnie."},{"type":"line","text":"Raczej tak, jak wzdycha ktoś, kto widzi dziecko biegnące za mirażem."},{"type":"line","text":"— Amirze..."},{"type":"line","text":"— Poczekaj! — zawołał chłopiec. — To może być magiczna lampa."},{"type":"line","text":"Safija chciała coś powiedzieć, ale zobaczyła w jego oczach tyle nadziei, że zamilkła."},{"type":"line","text":"Amir chwycił szmatkę i zaczął pocierać lampę."},{"type":"line","text":"Raz."},{"type":"line","text":"Drugi."},{"type":"line","text":"Trzeci."},{"type":"line","text":"Nic."},{"type":"line","text":"Potarł mocniej."},{"type":"line","text":"Nic."},{"type":"line","text":"Jeszcze mocniej."},{"type":"line","text":"Lampa zgrzytnęła cicho pod szmatką."},{"type":"line","text":"Nie pojawił się dym."},{"type":"line","text":"Nie rozległ się głos."},{"type":"line","text":"Nie zadrżały ściany."},{"type":"line","text":"Nie wyszedł dżin."},{"type":"line","text":"Tylko z brudnej powierzchni starła się warstwa sadzy, ukazując kawałek mosiądzu."},{"type":"line","text":"Amir poczuł, jak nadzieja opada w nim jak przekłuty bukłak."},{"type":"line","text":"— To zwykły złom — powiedział gorzko."},{"type":"line","text":"Już chciał zepchnąć lampę ze stołu, ale przypomniał sobie obietnicę daną handlarzowi."},{"type":"line","text":"Nie wyrzucisz jej od razu."},{"type":"line","text":"Zacisnął zęby i postawił lampę na półce."},{"type":"line","text":"Wieczorem zjedli skromną kolację: trochę zupy i resztkę placka z poprzedniego dnia."},{"type":"line","text":"Amir jadł w milczeniu."},{"type":"line","text":"Safija nie wypominała mu monet."},{"type":"line","text":"To było gorsze, niż gdyby krzyczała."},{"type":"line","text":"W nocy chłopiec obudził się nagle."},{"type":"line","text":"W domu było ciemno."},{"type":"line","text":"Matka spała na posłaniu przy ścianie."},{"type":"line","text":"Przez małe okno wpadał pasek księżycowego światła."},{"type":"line","text":"Amir usłyszał dźwięk."},{"type":"line","text":"Cichy."},{"type":"line","text":"Bardzo cichy."},{"type":"line","text":"Jak oddech."},{"type":"line","text":"Spojrzał na półkę."},{"type":"line","text":"Stara lampa lekko lśniła."},{"type":"line","text":"Nie jasno."},{"type":"line","text":"Nie magicznie."},{"type":"line","text":"Raczej tak, jakby odbijała światło księżyca od środka."},{"type":"line","text":"Chłopiec wstał ostrożnie i podszedł bliżej."},{"type":"line","text":"— Halo? — szepnął."},{"type":"line","text":"Cisza."},{"type":"line","text":"— Jest tam ktoś?"},{"type":"line","text":"Cisza."},{"type":"line","text":"Amir dotknął lampy."},{"type":"line","text":"Była chłodna."},{"type":"line","text":"I wtedy usłyszał coś dziwnego."},{"type":"line","text":"Nie głos."},{"type":"line","text":"Nie słowa."},{"type":"line","text":"Ciszę."},{"type":"line","text":"Ale nie zwykłą ciszę."},{"type":"line","text":"Ciszę tak głęboką, że nagle usłyszał własne myśli."},{"type":"line","text":"Nie te głośne, które krzyczały: chcę pałacu, chcę złota, chcę wszystkiego."},{"type":"line","text":"Inne."},{"type":"line","text":"Cichsze."},{"type":"line","text":"Te, które zwykle ukrywały się pod marzeniami."},{"type":"line","text":"„Chcę, żeby mama odpoczęła”."},{"type":"line","text":"„Chcę, żeby nie martwiła się o chleb”."},{"type":"line","text":"„Chcę być kimś, kto potrafi jej pomóc”."},{"type":"line","text":"Amir cofnął rękę."},{"type":"line","text":"Serce biło mu mocno."},{"type":"line","text":"— To nie jest magia — szepnął do lampy."},{"type":"line","text":"Ale nie był już tego pewien."},{"type":"line","text":"Następnego dnia poszedł na targ odnaleźć starego handlarza."},{"type":"line","text":"Stragan na końcu bazaru stał pusty."},{"type":"line","text":"Nie było szkatułki."},{"type":"line","text":"Nie było kompasu."},{"type":"line","text":"Nie było dzwonka."},{"type":"line","text":"Nie było starca."},{"type":"line","text":"Sprzedawca z sąsiedniego straganu powiedział, że nigdy nie widział tam żadnego starego handlarza."},{"type":"line","text":"— Tu od miesięcy nikt nie siedzi — mruknął. — Może pomyliłeś alejkę."},{"type":"line","text":"Amir wiedział, że nie pomylił."},{"type":"line","text":"Wrócił do domu jeszcze bardziej zaniepokojony."},{"type":"line","text":"Przez kilka kolejnych dni próbował odkryć tajemnicę lampy."},{"type":"line","text":"Pocierał ją o świcie."},{"type":"line","text":"Nic."},{"type":"line","text":"Pocierał ją wieczorem."},{"type":"line","text":"Nic."},{"type":"line","text":"Szeptał życzenia."},{"type":"line","text":"Nic."},{"type":"line","text":"Wkładał do środka świeczkę."},{"type":"line","text":"Zgasła."},{"type":"line","text":"Nalewał oliwy."},{"type":"line","text":"Lampa świeciła zwyczajnym płomykiem."},{"type":"line","text":"Ale za każdym razem, gdy płomień palił się przez chwilę, wokół robiło się dziwnie spokojnie."},{"type":"line","text":"Amir zaczynał wtedy słyszeć rzeczy, których wcześniej nie zauważał."},{"type":"line","text":"Westchnienie matki, kiedy myślała, że nikt nie słucha."},{"type":"line","text":"Skrzypienie dachu."},{"type":"line","text":"Kroki sąsiadki niosącej wodę."},{"type":"line","text":"Własne kłamstewka, które opowiadał samemu sobie."},{"type":"line","text":"Pewnego wieczoru Safija zasnęła przy szyciu."},{"type":"line","text":"Igła wypadła jej z palców."},{"type":"line","text":"Amir siedział obok lampy i patrzył na jej twarz."},{"type":"line","text":"Zobaczył zmarszczki przy oczach."},{"type":"line","text":"Zobaczył dłonie pokłute igłą."},{"type":"line","text":"Zobaczył, jak bardzo jest zmęczona."},{"type":"line","text":"Nie jak ktoś z bajki."},{"type":"line","text":"Nie jak biedna matka z opowieści, która zawsze się uśmiecha."},{"type":"line","text":"Jak prawdziwy człowiek."},{"type":"line","text":"Jego człowiek."},{"type":"line","text":"Amir wstał cicho, wziął niedokończoną szatę i spróbował szyć."},{"type":"line","text":"Szło mu źle."},{"type":"line","text":"Bardzo źle."},{"type":"line","text":"Nić się plątała."},{"type":"line","text":"Ścieg był krzywy."},{"type":"line","text":"Dwa razy ukłuł się w palec."},{"type":"line","text":"Ale pracował."},{"type":"line","text":"Rano Safija obudziła się i zobaczyła fragment szwu."},{"type":"line","text":"Nie był piękny."},{"type":"line","text":"Nie był równy."},{"type":"line","text":"Ale był zrobiony z wysiłkiem."},{"type":"line","text":"— Ty to zrobiłeś? — zapytała."},{"type":"line","text":"Amir spuścił głowę."},{"type":"line","text":"— Chciałem pomóc."},{"type":"line","text":"Matka uśmiechnęła się tak, jak nie uśmiechała się od dawna."},{"type":"line","text":"— To najładniejszy krzywy szew, jaki widziałam."},{"type":"line","text":"Od tamtego dnia Amir zaczął uczyć się szycia naprawdę."},{"type":"line","text":"Nie dlatego, że przestał marzyć."},{"type":"line","text":"Marzenia nadal w nim były."},{"type":"line","text":"Ale zmieniły kształt."},{"type":"line","text":"Nie chciał już tylko dostać pałacu."},{"type":"line","text":"Chciał umieć zbudować lepsze życie, choćby zaczynając od jednego prostego ściegu."},{"type":"line","text":"Po kilku tygodniach potrafił już cerować torby."},{"type":"line","text":"Potem obszywać chusty."},{"type":"line","text":"Potem naprawiać rękawy."},{"type":"line","text":"Pracował wolno, ale uważnie."},{"type":"line","text":"Lampa stała na stole i świeciła wieczorami małym, spokojnym płomieniem."},{"type":"line","text":"Pewnego dnia do ich domu przyszła stara kobieta z sąsiedztwa."},{"type":"line","text":"Niosła płaszcz rozdarty na plecach."},{"type":"line","text":"— Safijo — powiedziała — czy możesz naprawić go tanio? Mój wnuk potrzebuje płaszcza na chłodne noce, a ja nie mam wiele monet."},{"type":"line","text":"Safija była bardzo zajęta pilnym zamówieniem."},{"type":"line","text":"Amir spojrzał na płaszcz."},{"type":"line","text":"— Ja spróbuję — powiedział."},{"type":"line","text":"Kobieta zawahała się."},{"type":"line","text":"— Ty?"},{"type":"line","text":"— Jeśli nie będzie dobrze, nie zapłacisz."},{"type":"line","text":"Usiadł przy stole."},{"type":"line","text":"Zapalił lampę."},{"type":"line","text":"Przez chwilę patrzył na rozdarcie."},{"type":"line","text":"Nie spieszył się."},{"type":"line","text":"W ciszy, którą dawała lampa, usłyszał coś więcej niż tylko własne myśli."},{"type":"line","text":"Zobaczył, że tkanina jest słaba przy krawędziach."},{"type":"line","text":"Gdyby zszył ją prosto, pękłaby znowu."},{"type":"line","text":"Wyciął więc kawałek mocniejszego materiału z resztek, podszył od spodu i dopiero wtedy wykonał ścieg."},{"type":"line","text":"Nie był idealny."},{"type":"line","text":"Ale był mocny."},{"type":"line","text":"Stara kobieta obejrzała płaszcz i uśmiechnęła się."},{"type":"line","text":"— Będzie trzymać."},{"type":"line","text":"Dała mu dwie monety."},{"type":"line","text":"Pierwsze monety zarobione jego własnymi rękami."},{"type":"line","text":"Amir trzymał je długo na dłoni."},{"type":"line","text":"Były małe."},{"type":"line","text":"Nie błyszczały jak skarb."},{"type":"line","text":"A jednak poczuł dumę większą niż wtedy, gdy marzył o pałacu."},{"type":"line","text":"Wieczorem położył jedną monetę przed matką."},{"type":"line","text":"— Na chleb — powiedział."},{"type":"line","text":"Drugą położył obok lampy."},{"type":"line","text":"— A ta? — zapytała Safija."},{"type":"line","text":"— Za tamte trzy monety, które zmarnowałem."},{"type":"line","text":"Matka dotknęła jego włosów."},{"type":"line","text":"— Nie zmarnowałeś ich całkiem."},{"type":"line","text":"Amir spojrzał na lampę."},{"type":"line","text":"Nie był pewien, czy płomień zamigotał, czy tylko tak mu się wydawało."},{"type":"line","text":"Mijały miesiące."},{"type":"line","text":"Wieść o chłopcu, który dobrze naprawia stare rzeczy, zaczęła krążyć po dzielnicy."},{"type":"line","text":"Najpierw przychodzili sąsiedzi."},{"type":"line","text":"Potem ludzie z dalszych ulic."},{"type":"line","text":"Potem nawet kupcy z targu przynosili torby, pasy i płótna do naprawy."},{"type":"line","text":"Amir odkrył, że lubi przywracać rzeczom użyteczność."},{"type":"line","text":"Stara torba nie musiała trafić na śmietnik."},{"type":"line","text":"Rozdarta chusta mogła znów chronić przed słońcem."},{"type":"line","text":"Pęknięty pasek mógł służyć jeszcze wiele miesięcy."},{"type":"line","text":"Było w tym coś pięknego."},{"type":"line","text":"Coś cichszego niż magia, ale trwalszego."},{"type":"line","text":"Pewnego popołudnia do warsztatu Safiji przyszedł bogaty kupiec."},{"type":"line","text":"Miał szeroką szatę, pachniał drogimi olejkami i trzymał w rękach małą jedwabną sakiewkę."},{"type":"line","text":"— Podobno chłopiec dobrze naprawia rzeczy — powiedział."},{"type":"line","text":"Amir wstał."},{"type":"line","text":"— Staram się."},{"type":"line","text":"Kupiec położył sakiewkę na stole."},{"type":"line","text":"Była rozdarta przy zapięciu."},{"type":"line","text":"— To sakiewka mojej córki. Płakała, kiedy się rozerwała. Napraw ją tak, żeby nie było śladu."},{"type":"line","text":"Amir obejrzał materiał."},{"type":"line","text":"Jedwab był delikatny."},{"type":"line","text":"Zbyt delikatny."},{"type":"line","text":"Rozdarcie dało się zaszyć, ale ślad musiał zostać."},{"type":"line","text":"— Mogę ją naprawić mocno — powiedział. — Mogę też zrobić z tego miejsca wzór. Ale nie mogę sprawić, że rozdarcie nigdy nie istniało."},{"type":"line","text":"Kupiec zmarszczył brwi."},{"type":"line","text":"— Zapłacę więcej."},{"type":"line","text":"— To nie zmieni tkaniny."},{"type":"line","text":"— Chcę, żeby była jak nowa."},{"type":"line","text":"Amir spojrzał na lampę stojącą na półce."},{"type":"line","text":"Przypomniał sobie swoje dawne życzenia."},{"type":"line","text":"Jak bardzo chciał, żeby rzeczy stawały się inne natychmiast, tylko dlatego, że on tego pragnął."},{"type":"line","text":"— Nie wszystko może być jak dawniej — powiedział spokojnie. — Ale może być dobre inaczej."},{"type":"line","text":"Kupiec milczał."},{"type":"line","text":"W końcu westchnął."},{"type":"line","text":"— Zrób wzór."},{"type":"line","text":"Amir naszył wokół rozdarcia małe srebrne gwiazdki."},{"type":"line","text":"Kiedy skończył, sakiewka nie wyglądała jak nowa."},{"type":"line","text":"Wyglądała lepiej."},{"type":"line","text":"Jak rzecz z historią."},{"type":"line","text":"Córka kupca zachwyciła się nią tak bardzo, że następnego dnia przysłała więcej drobnych przedmiotów do ozdobienia."},{"type":"line","text":"Tak zaczęła się nowa praca Amira."},{"type":"line","text":"Nie tylko naprawiał."},{"type":"line","text":"Zmieniając ślady zniszczenia we wzory, uczył ludzi, że pęknięcie nie zawsze musi być ukryte."},{"type":"line","text":"Czasem można je przemienić w coś pięknego."},{"type":"line","text":"A lampa?"},{"type":"line","text":"Stała wciąż na stole."},{"type":"line","text":"Ludzie pytali czasem:"},{"type":"line","text":"— Skąd ją masz?"},{"type":"line","text":"Amir odpowiadał:"},{"type":"line","text":"— Kupiłem za trzy monety."},{"type":"line","text":"— Jest magiczna?"},{"type":"line","text":"Chłopiec uśmiechał się."},{"type":"line","text":"— Nie ma w niej dżina."},{"type":"line","text":"— Więc po co ją trzymasz?"},{"type":"line","text":"— Bo pomaga mi słuchać."},{"type":"line","text":"Nie wszyscy rozumieli."},{"type":"line","text":"Ale nie musieli."},{"type":"line","text":"Pewnej nocy, długo po zamknięciu warsztatu, Amir usiadł przy lampie sam."},{"type":"line","text":"Matka spała."},{"type":"line","text":"Miasto ucichło."},{"type":"line","text":"Chłopiec miał już więcej monet niż kiedyś, ale nie był bogaty. Nie miał pałacu, fontanny ani skrzyń złota."},{"type":"line","text":"Miał za to pracę, której się uczył."},{"type":"line","text":"Matkę, która odpoczywała częściej."},{"type":"line","text":"Dom, w którym dach nadal czasem przeciekał, ale na stole częściej leżał chleb."},{"type":"line","text":"I serce spokojniejsze niż dawniej."},{"type":"line","text":"Amir dotknął lampy."},{"type":"line","text":"— Czy naprawdę nie ma w tobie dżina? — szepnął."},{"type":"line","text":"Cisza odpowiedziała mu po swojemu."},{"type":"line","text":"Nie słowami."},{"type":"line","text":"Nie dymem."},{"type":"line","text":"Ale wspomnieniem wszystkich rzeczy, które się wydarzyły od dnia, gdy kupił lampę."},{"type":"line","text":"Pierwszego krzywego szwu."},{"type":"line","text":"Pierwszych zarobionych monet."},{"type":"line","text":"Pierwszego płaszcza naprawionego dla sąsiadki."},{"type":"line","text":"Sakiewki ze srebrnymi gwiazdami."},{"type":"line","text":"Uśmiechu matki."},{"type":"line","text":"Amir zrozumiał wtedy coś, co trudno było ująć w jedno zdanie."},{"type":"line","text":"Może lampa nie spełniała życzeń."},{"type":"line","text":"Może robiła coś trudniejszego."},{"type":"line","text":"Pokazywała, które życzenia naprawdę należą do serca, a które są tylko hałasem."},{"type":"line","text":"Następnego dnia Amir znów poszedł na stary targ."},{"type":"line","text":"Stragan starego handlarza nadal był pusty."},{"type":"line","text":"Ale na kamieniu, dokładnie tam, gdzie kiedyś leżała lampa, zobaczył mały dzwonek."},{"type":"line","text":"Ten sam, który widział tamtego dnia obok kompasu i szkatułki."},{"type":"line","text":"Pod dzwonkiem leżał skrawek papieru."},{"type":"line","text":"Amir rozwinął go."},{"type":"line","text":"Było na nim zapisane jedno zdanie:"},{"type":"line","text":"„Nie każda lampa ma dżina. Niektóre mają miejsce na twoje własne światło”."},{"type":"line","text":"Chłopiec długo patrzył na te słowa."},{"type":"line","text":"Potem zabrał dzwonek do domu i powiesił go nad drzwiami warsztatu."},{"type":"line","text":"Dzwonił cicho za każdym razem, gdy ktoś wchodził."},{"type":"line","text":"Nie magicznie."},{"type":"line","text":"Zwyczajnie."},{"type":"line","text":"Ale Amir lubił ten dźwięk."},{"type":"line","text":"Przypominał mu, że prawdziwa zmiana nie zawsze przychodzi z hukiem, dymem i wielkim zaklęciem."},{"type":"line","text":"Czasem wchodzi przez drzwi cicho."},{"type":"line","text":"W rozdartej szacie."},{"type":"line","text":"W zmęczonych dłoniach."},{"type":"line","text":"W małej pracy wykonanej dobrze."},{"type":"line","text":"Po latach warsztat Safiji i Amira stał się znany w całym mieście."},{"type":"line","text":"Nie dlatego, że był największy."},{"type":"line","text":"Dlatego, że ludzie przynosili tam rzeczy, których nie chcieli jeszcze stracić."},{"type":"line","text":"Płaszcze po ojcach."},{"type":"line","text":"Chusty po matkach."},{"type":"line","text":"Torby z podróży."},{"type":"line","text":"Zasłony z domów, w których dorastały dzieci."},{"type":"line","text":"Amir naprawiał je uważnie."},{"type":"line","text":"A jeśli nie dało się ukryć śladu, zamieniał go w wzór."},{"type":"line","text":"Czasem złotą nicią."},{"type":"line","text":"Czasem srebrną."},{"type":"line","text":"Czasem zwykłą, ale poprowadzoną tak starannie, że wyglądała jak mała droga."},{"type":"line","text":"Na półce zawsze stała stara lampa."},{"type":"line","text":"Czysta już teraz, wypolerowana, ale nadal prosta."},{"type":"line","text":"Bez dżina."},{"type":"line","text":"Bez dymu."},{"type":"line","text":"Bez wielkich obietnic."},{"type":"line","text":"Dawała tylko światło."},{"type":"line","text":"A to, jak Amir zrozumiał, było całkiem dużo."},{"type":"section","text":"— ZAKOŃCZENIE PODCASTOWE —"},{"type":"line","text":"I tak kończy się dzisiejsza opowieść: „Lampa bez dżina”."},{"type":"line","text":"To historia o chłopcu, który marzył o magii, ale znalazł coś cichszego."},{"type":"line","text":"O lampie, która nie spełniała życzeń, lecz pomagała usłyszeć te najważniejsze."},{"type":"line","text":"I o tym, że czasem największy cud nie polega na tym, że ktoś daje nam wszystko od razu."},{"type":"line","text":"Czasem największy cud zaczyna się wtedy, gdy sami robimy pierwszy mały krok."},{"type":"line","text":"Jeśli ta historia została z tobą choć na chwilę, zabierz jej mały kawałek do snu."},{"type":"line","text":"Może będzie to stara lampa na drewnianym stole."},{"type":"line","text":"Może srebrne gwiazdki naszyte na rozdarciu."},{"type":"line","text":"A może jedno zdanie:"},{"type":"line","text":"nie każda magia przychodzi z dżinem."},{"type":"line","text":"Czasem magia zaczyna się od pracy twoich własnych rąk."},{"type":"line","text":"Więcej bajek, legend i tajemniczych opowieści znajdziesz na stronie 3tatata.pl."},{"type":"line","text":"Możesz nas także słuchać na Spotify i oglądać na YouTube."},{"type":"line","text":"Zostaw follow albo subskrypcję, żeby nie przegapić kolejnych historii."},{"type":"line","text":"Dobranoc — i do usłyszenia w następnej bajce."}]},{"id":13,"title":"KSIĘGA, KTÓRA SAMA PRZEWRACAŁA STRONY","tag":"Opowieść","sections":[{"type":"title","text":"KSIĘGA, KTÓRA SAMA PRZEWRACAŁA STRONY"},{"type":"meta","text":"3TaTaTa — Opowieści z dalekich krain"},{"type":"section","text":"— WSTĘP DO ODCINKA —"},{"type":"line","text":"Są książki, które czytamy od pierwszej strony."},{"type":"line","text":"Są takie, które otwieramy w środku, bo szukamy obrazka, mapy albo jednego tajemniczego zdania."},{"type":"line","text":"Są też książki, które leżą latami na półce i czekają, aż ktoś wreszcie je zauważy."},{"type":"line","text":"Ale w dalekim mieście, w bibliotece starego kalifa, istniała księga inna niż wszystkie."},{"type":"line","text":"Nie dało się jej przeczytać od początku do końca."},{"type":"line","text":"Nie dało się zaznaczyć w niej miejsca."},{"type":"line","text":"Nie dało się zmusić, by pokazała to, czego chciał czytelnik."},{"type":"line","text":"Bo ta księga sama przewracała strony."},{"type":"line","text":"I zawsze otwierała się tam, gdzie ukryta była opowieść, której człowiek najbardziej potrzebował."},{"type":"line","text":"Nie ta, której pragnął."},{"type":"line","text":"Ta, której potrzebował."},{"type":"line","text":"KSIĘGA, KTÓRA SAMA PRZEWRACAŁA STRONY"},{"type":"line","text":"Dawno temu, w mieście o błękitnych kopułach i wąskich uliczkach pełnych cienia, panował kalif imieniem Harun."},{"type":"line","text":"Nie był już młody."},{"type":"line","text":"Broda posiwiała mu przy skroniach, a dłonie, które kiedyś pewnie trzymały miecz podczas polowań, teraz częściej spoczywały na poręczach tronu."},{"type":"line","text":"Harun był władcą sprawiedliwym, choć czasem zbyt surowym."},{"type":"line","text":"Lubił porządek."},{"type":"line","text":"Lubił jasne odpowiedzi."},{"type":"line","text":"Lubił, kiedy dokumenty leżały równo, decyzje zapadały szybko, a ludzie mówili dokładnie to, co mieli na myśli."},{"type":"line","text":"Najbardziej jednak kalif kochał księgi."},{"type":"line","text":"W jego pałacu znajdowała się biblioteka większa niż niejeden targ."},{"type":"line","text":"Były tam księgi oprawione w skórę gazeli, zwoje na jedwabiu, tabliczki z gliny, mapy mórz, atlasy gwiazd, kroniki królów, traktaty lekarzy, pieśni poetów i baśnie opowiadane dawniej przy ogniskach karawan."},{"type":"line","text":"Biblioteka miała siedem sal."},{"type":"line","text":"Pierwsza była salą historii."},{"type":"line","text":"Druga — salą gwiazd."},{"type":"line","text":"Trzecia — salą lekarzy."},{"type":"line","text":"Czwarta — salą poetów."},{"type":"line","text":"Piąta — salą map."},{"type":"line","text":"Szósta — salą języków, których prawie nikt już nie rozumiał."},{"type":"line","text":"A siódma sala była zamknięta."},{"type":"line","text":"Nie na wielką kłódkę."},{"type":"line","text":"Nie na żelazne łańcuchy."},{"type":"line","text":"Na mały srebrny klucz, który kalif nosił zawsze przy sercu."},{"type":"line","text":"W tej siódmej sali leżała księga bez tytułu."},{"type":"line","text":"Była ogromna."},{"type":"line","text":"Tak wielka, że nie dało się jej podnieść jedną ręką."},{"type":"line","text":"Okładkę miała z ciemnej skóry, gładkiej i chłodnej, bez zdobień. Na grzbiecie nie było napisu. Na pierwszej stronie nie było imienia autora."},{"type":"line","text":"Mówiono, że księgę podarował kiedyś pradziadowi kalifa wędrowny mędrzec, który przyszedł do pałacu w noc burzy piaskowej."},{"type":"line","text":"Mędrzec miał powiedzieć:"},{"type":"line","text":"— Ta księga nie służy do zbierania wiedzy. Ona służy do odnajdywania prawdy."},{"type":"line","text":"Potem zniknął przed świtem."},{"type":"line","text":"Od tamtej pory księga przechodziła z kalifa na kalifa."},{"type":"line","text":"Niektórzy bali się jej otwierać."},{"type":"line","text":"Inni próbowali ją oszukać."},{"type":"line","text":"Jeszcze inni twierdzili, że to tylko stary tom pełen pustych kartek."},{"type":"line","text":"Ale Harun wiedział, że to nieprawda."},{"type":"line","text":"Kiedy był młody, otworzył ją raz."},{"type":"line","text":"Miał wtedy dwadzieścia lat i był przekonany, że wie wszystko."},{"type":"line","text":"Księga pokazała mu historię księcia, który mówił najmądrzej ze wszystkich, ale nigdy nikogo nie słuchał. Harun rozgniewał się wtedy, zamknął księgę i przez wiele lat do niej nie wracał."},{"type":"line","text":"Bo niektóre lustra są zbyt dokładne."},{"type":"line","text":"A ta księga była właśnie takim lustrem."},{"type":"line","text":"W pałacu kalifa mieszkał chłopiec imieniem Nadim."},{"type":"line","text":"Nie był księciem."},{"type":"line","text":"Nie był synem dostojnika."},{"type":"line","text":"Był pomocnikiem bibliotekarza."},{"type":"line","text":"Jego matka pracowała w kuchni pałacowej, a ojciec zmarł, gdy Nadim był mały. Chłopiec dorastał więc między zapachem chleba, atramentu i starego papieru."},{"type":"line","text":"Nadim kochał bibliotekę."},{"type":"line","text":"Nie dlatego, że rozumiał wszystkie księgi."},{"type":"line","text":"Nie rozumiał."},{"type":"line","text":"Niektóre były zbyt trudne."},{"type":"line","text":"Inne zapisano językami, których nikt go nie nauczył."},{"type":"line","text":"Ale lubił sam fakt, że każda księga zawierała czyjś ślad."},{"type":"line","text":"Czyjąś myśl."},{"type":"line","text":"Czyjeś pytanie."},{"type":"line","text":"Czyjąś próbę zrozumienia świata."},{"type":"line","text":"Stary bibliotekarz, Umar, uczył go ostrożności."},{"type":"line","text":"— Książki nie są martwe — mówił. — Nawet jeśli milczą, przechowują głosy."},{"type":"line","text":"Nadim codziennie ścierał kurz z półek, układał zwoje, przynosił wodę uczonym i pilnował, żeby nikt nie jadł daktyli nad manuskryptami."},{"type":"line","text":"Był szybki, uważny i ciekawy."},{"type":"line","text":"Może trochę zbyt ciekawy."},{"type":"line","text":"Najbardziej interesowała go siódma sala."},{"type":"line","text":"Ta zamknięta."},{"type":"line","text":"Za każdym razem, gdy przechodził obok jej drzwi, czuł chłód na karku."},{"type":"line","text":"Nie strach."},{"type":"line","text":"Raczej zaproszenie."},{"type":"line","text":"Jakby coś po drugiej stronie wiedziało, że przechodzi obok, i cierpliwie czekało."},{"type":"line","text":"Pewnego dnia do pałacu przybyło trzech ludzi z bardzo trudną sprawą."},{"type":"line","text":"Pierwszy był starym garncarzem."},{"type":"line","text":"Drugi młodym kupcem."},{"type":"line","text":"Trzecia kobietą w czarnej chuście, wdową po zmarłym podróżniku."},{"type":"line","text":"Przynieśli małą szkatułkę z kości słoniowej."},{"type":"line","text":"W środku znajdował się kamień."},{"type":"line","text":"Nie był wielki."},{"type":"line","text":"Miał kolor zielonego ognia i świecił delikatnie nawet w cieniu."},{"type":"line","text":"— To szmaragd z Doliny Wiatru — powiedział kupiec. — Należy do mnie."},{"type":"line","text":"— Nieprawda — odparł garncarz. — To zapłata za dzbany, które mój syn sprzedał ojcu tego kupca."},{"type":"line","text":"— Kłamiecie obaj — powiedziała wdowa spokojnie. — Ten kamień był własnością mojego męża. Zgubił go podczas podróży, a wy znaleźliście go i teraz próbujecie sobie przywłaszczyć."},{"type":"line","text":"Sprawa trafiła przed kalifa."},{"type":"line","text":"Harun wysłuchał wszystkich."},{"type":"line","text":"Każdy mówił przekonująco."},{"type":"line","text":"Każdy miał część dowodu."},{"type":"line","text":"Każdy oskarżał pozostałych."},{"type":"line","text":"Kalif zadawał pytania, ale im więcej słuchał, tym mniej był pewien."},{"type":"line","text":"Nie lubił tego uczucia."},{"type":"line","text":"Niepewność była dla niego jak piasek w oku."},{"type":"line","text":"Po naradzie z doradcami wciąż nie znalazł rozwiązania."},{"type":"line","text":"Wtedy stary bibliotekarz Umar powiedział cicho:"},{"type":"line","text":"— Panie, może warto zapytać siódmą salę."},{"type":"line","text":"W komnacie zapadła cisza."},{"type":"line","text":"Kalif spojrzał na niego ostro."},{"type":"line","text":"— Księga nie jest sądem."},{"type":"line","text":"— Nie — odparł Umar. — Ale czasem pomaga człowiekowi zobaczyć to, co sądzący sam ukrywa przed sobą."},{"type":"line","text":"Harun przez długą chwilę milczał."},{"type":"line","text":"Wreszcie sięgnął pod szatę i wyjął srebrny klucz."},{"type":"line","text":"— Przygotuj salę."},{"type":"line","text":"Nadim usłyszał o tym przypadkiem."},{"type":"line","text":"Niósł właśnie stos pustych kart dla skrybów, gdy zobaczył Umara idącego w stronę zamkniętej sali."},{"type":"line","text":"Serce chłopca zabiło szybciej."},{"type":"line","text":"Nie powinien iść za nim."},{"type":"line","text":"Wiedział o tym."},{"type":"line","text":"Ale ciekawość potrafi chodzić cicho."},{"type":"line","text":"Nadim ukrył się za półką z mapami i patrzył, jak kalif otwiera drzwi."},{"type":"line","text":"Z siódmej sali wypłynął zapach chłodnego kamienia, starego atramentu i deszczu, choć od miesięcy nie padało."},{"type":"line","text":"Kalif wszedł do środka."},{"type":"line","text":"Za nim Umar."},{"type":"line","text":"Drzwi nie domknęły się do końca."},{"type":"line","text":"Została szczelina."},{"type":"line","text":"Mała."},{"type":"line","text":"Wystarczająca dla oka chłopca."},{"type":"line","text":"Nadim zajrzał."},{"type":"line","text":"Sala była okrągła."},{"type":"line","text":"Nie miała okien."},{"type":"line","text":"Pośrodku stał niski kamienny pulpit, a na nim leżała księga bez tytułu."},{"type":"line","text":"Kalif podszedł do niej powoli."},{"type":"line","text":"— Pokaż mi prawdę o szmaragdzie — powiedział."},{"type":"line","text":"Przez chwilę nic się nie działo."},{"type":"line","text":"Potem strony księgi poruszyły się same."},{"type":"line","text":"Najpierw jedna."},{"type":"line","text":"Potem kilka."},{"type":"line","text":"Potem wiele naraz, coraz szybciej, jakby wiatr przewracał je od środka."},{"type":"line","text":"W końcu księga zatrzymała się."},{"type":"line","text":"Kalif pochylił się nad tekstem."},{"type":"line","text":"Jego twarz stężała."},{"type":"line","text":"— Co tam jest, panie? — zapytał Umar."},{"type":"line","text":"Kalif czytał głośno."},{"type":"line","text":"Ale ku zdziwieniu Nadima nie była to odpowiedź o szmaragdzie."},{"type":"line","text":"Była to opowieść."},{"type":"line","text":"O królu, który miał rozstrzygnąć spór między trzema braćmi o dzban wody podczas suszy. Król przez cały dzień pytał, kto ma prawo do dzbana, aż w końcu woda wyparowała, a trzej bracia zostali z pustym naczyniem i jeszcze większą nienawiścią."},{"type":"line","text":"Kalif zamknął księgę gwałtownie."},{"type":"line","text":"— Bezużyteczne — powiedział."},{"type":"line","text":"Umar nie odpowiedział."},{"type":"line","text":"— Potrzebuję faktów, nie przypowieści."},{"type":"line","text":"— Może przypowieść mówi, że pytanie jest źle postawione — rzekł bibliotekarz."},{"type":"line","text":"Kalif wyszedł z sali rozgniewany."},{"type":"line","text":"Nadim ledwo zdążył ukryć się za regałem."},{"type":"line","text":"Tej nocy chłopiec nie mógł zasnąć."},{"type":"line","text":"Myślał o księdze."},{"type":"line","text":"O stronach poruszających się bez dotyku."},{"type":"line","text":"O historii z dzbanem wody."},{"type":"line","text":"O szmaragdzie."},{"type":"line","text":"Następnego dnia spór trwał dalej."},{"type":"line","text":"Kupiec przyniósł dokument."},{"type":"line","text":"Garncarz świadka."},{"type":"line","text":"Wdowa stary list męża."},{"type":"line","text":"Każdy dowód coś wyjaśniał i coś zaciemniał."},{"type":"line","text":"Kalif był coraz bardziej zniecierpliwiony."},{"type":"line","text":"Nadim, stojąc z boku z dzbankiem wody dla uczonych, nagle zauważył coś dziwnego."},{"type":"line","text":"Wszyscy patrzyli na szmaragd jak na rzecz."},{"type":"line","text":"Ale nikt nie zapytał, dlaczego był tak ważny."},{"type":"line","text":"Nie ile kosztował."},{"type":"line","text":"Nie skąd pochodził."},{"type":"line","text":"Dlaczego każdy z nich tak bardzo go potrzebował."},{"type":"line","text":"Wieczorem Nadim odważył się zrobić coś zakazanego."},{"type":"line","text":"Kiedy biblioteka opustoszała, odnalazł zapasowy klucz Umara."},{"type":"line","text":"Nie był to srebrny klucz kalifa, ale stary bibliotekarz miał własny, używany do wietrzenia sali i sprawdzania wilgoci."},{"type":"line","text":"Nadim trzymał go w dłoni tak mocno, że aż bolały go palce."},{"type":"line","text":"— Tylko zajrzę — szepnął sam do siebie."},{"type":"line","text":"To było kłamstwo, choć jeszcze niewielkie."},{"type":"line","text":"Otworzył drzwi siódmej sali."},{"type":"line","text":"W środku panowała cisza."},{"type":"line","text":"Księga leżała na pulpicie."},{"type":"line","text":"Ogromna."},{"type":"line","text":"Ciemna."},{"type":"line","text":"Czekająca."},{"type":"line","text":"Nadim podszedł powoli."},{"type":"line","text":"— Nie jestem kalifem — powiedział cicho. — Nie wiem, czy wolno mi pytać."},{"type":"line","text":"Księga milczała."},{"type":"line","text":"— Ale chcę zrozumieć."},{"type":"line","text":"Położył dłoń na okładce."},{"type":"line","text":"Była chłodna."},{"type":"line","text":"Nagle strony zaczęły się przewracać."},{"type":"line","text":"Nadim cofnął rękę, ale księga nie przestała."},{"type":"line","text":"Kartki szeleściły szybko, potem wolniej, aż w końcu zatrzymały się na stronie zapisanej drobnym, ciemnoniebieskim pismem."},{"type":"line","text":"Chłopiec zaczął czytać."},{"type":"line","text":"Była to opowieść o trzech ludziach, którzy znaleźli na drodze lampę."},{"type":"line","text":"Pierwszy chciał ją sprzedać."},{"type":"line","text":"Drugi chciał ją zachować."},{"type":"line","text":"Trzeci chciał odnaleźć tego, kto ją zgubił."},{"type":"line","text":"Kłócili się tak długo, aż lampa zgasła, bo nikt nie dolał oliwy."},{"type":"line","text":"Na dole strony widniało zdanie:"},{"type":"line","text":"„Czasem przedmiot nie szuka właściciela. Czasem szuka zadania”."},{"type":"line","text":"Nadim przeczytał je kilka razy."},{"type":"line","text":"Nie rozumiał wszystkiego."},{"type":"line","text":"Ale poczuł, że księga nie pomyliła się przypadkiem."},{"type":"line","text":"Następnego ranka chłopiec odważył się podejść do Umara."},{"type":"line","text":"— Mistrzu — powiedział — czy mogę zadać pytanie?"},{"type":"line","text":"Bibliotekarz spojrzał na niego znad manuskryptu."},{"type":"line","text":"— Możesz."},{"type":"line","text":"— Czy rzecz zawsze musi należeć do tego, kto ma do niej prawo?"},{"type":"line","text":"Umar odłożył pióro."},{"type":"line","text":"— To pytanie brzmi, jakbyś był w miejscu, w którym nie powinno cię być."},{"type":"line","text":"Nadim pobladł."},{"type":"line","text":"Bibliotekarz westchnął."},{"type":"line","text":"— Nie odpowiadaj. Twoja twarz już odpowiedziała."},{"type":"line","text":"Chłopiec spuścił głowę."},{"type":"line","text":"— Przepraszam."},{"type":"line","text":"— Księga pokazała ci opowieść?"},{"type":"line","text":"— Tak."},{"type":"line","text":"— Jaką?"},{"type":"line","text":"Nadim opowiedział."},{"type":"line","text":"Umar słuchał uważnie."},{"type":"line","text":"Nie krzyczał."},{"type":"line","text":"Nie groził."},{"type":"line","text":"Kiedy chłopiec skończył, bibliotekarz powiedział:"},{"type":"line","text":"— Skoro księga przemówiła, trzeba posłuchać. Ale następnym razem nie kradnij klucza do prawdy. Prawda nie lubi zaczynać od kradzieży."},{"type":"line","text":"Nadim skinął głową."},{"type":"line","text":"Tego dnia Umar poprosił kalifa, by pozwolił zadać każdej ze stron jedno dodatkowe pytanie."},{"type":"line","text":"Harun był zmęczony sporem, ale się zgodził."},{"type":"line","text":"Do sali sprowadzono garncarza, kupca i wdowę."},{"type":"line","text":"Umar wskazał na Nadima."},{"type":"line","text":"— To chłopiec zada pytania."},{"type":"line","text":"Wszyscy spojrzeli na niego zdumieni."},{"type":"line","text":"Kalif także."},{"type":"line","text":"— Chłopiec? — zapytał surowo."},{"type":"line","text":"— Czasem ktoś mały widzi pytanie, które duzi ominęli — odpowiedział Umar."},{"type":"line","text":"Harun skrzyżował ręce."},{"type":"line","text":"— Dobrze. Ale krótko."},{"type":"line","text":"Nadim podszedł najpierw do kupca."},{"type":"line","text":"— Dlaczego chcesz szmaragd?"},{"type":"line","text":"Kupiec uniósł brwi."},{"type":"line","text":"— Bo jest mój."},{"type":"line","text":"— Ale dlaczego go potrzebujesz?"},{"type":"line","text":"Mężczyzna zawahał się."},{"type":"line","text":"— Mam długi. Jeśli go sprzedam, uratuję sklep ojca."},{"type":"line","text":"Nadim skinął głową."},{"type":"line","text":"Potem zwrócił się do garncarza."},{"type":"line","text":"— A ty?"},{"type":"line","text":"Stary człowiek ścisnął czapkę w dłoniach."},{"type":"line","text":"— Mój syn zmarł w podróży. Zawsze mówił, że kiedy wróci, kupi mi piec lepszy niż stary. Ten szmaragd miał być zapłatą za jego ostatnie dzbany. Jeśli go odzyskam, postawię piec i będę czuł, jakby dotrzymał obietnicy."},{"type":"line","text":"W sali zrobiło się ciszej."},{"type":"line","text":"Nadim podszedł do wdowy."},{"type":"line","text":"— A ty, pani?"},{"type":"line","text":"Wdowa patrzyła na szkatułkę."},{"type":"line","text":"— Mój mąż nosił ten kamień przy sobie przez wiele lat. Nie po to, by go sprzedać. W środku, pod złotą oprawą, jest mała skrytka. Przechowywał tam kosmyk włosów naszej córki, która umarła jako dziecko. To ostatnia rzecz, która mi po niej została."},{"type":"line","text":"Kupiec i garncarz spojrzeli na nią zaskoczeni."},{"type":"line","text":"Nikt wcześniej nie wiedział o skrytce."},{"type":"line","text":"Kalif kazał jubilerowi obejrzeć szmaragd."},{"type":"line","text":"Rzeczywiście, oprawa kryła maleńkie zamknięcie."},{"type":"line","text":"W środku znajdował się cienki kosmyk jasnych włosów, zawinięty w kawałek jedwabiu."},{"type":"line","text":"Wdowa zakryła usta dłonią."},{"type":"line","text":"Kupiec spuścił głowę."},{"type":"line","text":"Garncarz otarł oczy rękawem."},{"type":"line","text":"Kalif milczał długo."},{"type":"line","text":"Potem powiedział:"},{"type":"line","text":"— Kamień wróci do wdowy, bo przechowuje pamięć jej dziecka. Kupiec otrzyma z mojego skarbca pożyczkę bez odsetek na uratowanie sklepu, którą spłaci uczciwą pracą. Garncarz dostanie nowy piec, ale pod warunkiem, że przez rok będzie uczył swojego rzemiosła sieroty z miasta, aby obietnica jego syna stała się dobrem dla innych."},{"type":"line","text":"Trzy osoby patrzyły na kalifa zdumione."},{"type":"line","text":"To nie był wyrok, którego się spodziewali."},{"type":"line","text":"Ale był mądrzejszy niż zwykłe: „ten wygrał, tamci przegrali”."},{"type":"line","text":"Umar uśmiechnął się lekko."},{"type":"line","text":"Nadim poczuł, jakby ciężar spadł z całej sali."},{"type":"line","text":"Tego wieczoru kalif sam poszedł do siódmej sali."},{"type":"line","text":"Nie wezwał doradców."},{"type":"line","text":"Nie zabrał straży."},{"type":"line","text":"Poprosił tylko Umara i Nadima."},{"type":"line","text":"Chłopiec bał się, że zostanie ukarany za wejście do zakazanej sali."},{"type":"line","text":"Kalif stanął przed księgą."},{"type":"line","text":"— Otworzyłeś ją bez pozwolenia — powiedział do Nadima."},{"type":"line","text":"— Tak, panie."},{"type":"line","text":"— To było nieposłuszeństwo."},{"type":"line","text":"— Tak, panie."},{"type":"line","text":"— I odwaga."},{"type":"line","text":"Nadim nie wiedział, co odpowiedzieć."},{"type":"line","text":"Kalif położył dłoń na księdze."},{"type":"line","text":"— Dziś zrozumiałem opowieść o dzbanie wody. Pytałem, do kogo należy szmaragd, a powinienem zapytać, czemu ma służyć prawda o nim. Gdybym dalej rozstrzygał tylko własność, ktoś wyszedłby z sali zwycięzcą, ale wszyscy pozostaliby spragnieni."},{"type":"line","text":"Księga poruszyła stronami."},{"type":"line","text":"Tym razem sama, choć nikt jej nie prosił."},{"type":"line","text":"Otworzyła się przed kalifem."},{"type":"line","text":"Na stronie znajdowało się tylko jedno zdanie:"},{"type":"line","text":"„Mądry władca nie pyta wyłącznie, kto ma rację. Pyta także, co uleczy ranę”."},{"type":"line","text":"Harun przeczytał zdanie i długo milczał."},{"type":"line","text":"Potem zamknął księgę delikatnie."},{"type":"line","text":"Nie jak przedmiot."},{"type":"line","text":"Jak czyjąś dłoń."},{"type":"line","text":"Od tego dnia siódma sala nie była już miejscem całkiem zamkniętym."},{"type":"line","text":"Nie otwarto jej dla wszystkich, bo nie każda prawda powinna być oglądana z ciekawości."},{"type":"line","text":"Ale kalif pozwolił, by raz w miesiącu przychodzili tam ludzie, którzy mieli trudne pytania i gotowe serca."},{"type":"line","text":"Nie po łatwe odpowiedzi."},{"type":"line","text":"Po właściwe opowieści."},{"type":"line","text":"Nadim został uczniem Umara."},{"type":"line","text":"Uczył się języków, kaligrafii, historii i cierpliwości."},{"type":"line","text":"Najtrudniejsza była cierpliwość."},{"type":"line","text":"Księga czasem nie otwierała się wcale."},{"type":"line","text":"Czasem pokazywała historię, która wydawała się bez sensu."},{"type":"line","text":"Czasem przewracała strony tak długo, że pytający zaczynał płakać ze złości."},{"type":"line","text":"Ale Nadim z czasem zrozumiał, że księga nigdy się nie spieszy."},{"type":"line","text":"Bo prawda, która przychodzi za szybko, często nie ma gdzie się zatrzymać."},{"type":"line","text":"Pewnego dnia, wiele lat później, gdy Umar był już bardzo stary, a Nadim sam prowadził bibliotekę, do siódmej sali przyszła mała dziewczynka."},{"type":"line","text":"Trzymała w dłoniach pękniętą figurkę ptaka."},{"type":"line","text":"— Chcę wiedzieć, kto ją zbił — powiedziała."},{"type":"line","text":"Nadim otworzył księgę."},{"type":"line","text":"Strony zaszeleściły."},{"type":"line","text":"Zatrzymały się na opowieści o dziecku, które tak bardzo bało się przyznać do błędu, że ukryło pęknięty kubek pod łóżkiem, a potem przez trzy dni bało się własnego pokoju."},{"type":"line","text":"Dziewczynka przeczytała historię."},{"type":"line","text":"Potem rozpłakała się."},{"type":"line","text":"— To ja zbiłam ptaka — wyszeptała. — Ale bałam się powiedzieć babci."},{"type":"line","text":"Nadim podał jej chustkę."},{"type":"line","text":"— W takim razie księga odpowiedziała."},{"type":"line","text":"— Ale ja pytałam, kto to zrobił."},{"type":"line","text":"— I już wiesz."},{"type":"line","text":"Dziewczynka spojrzała na pękniętą figurkę."},{"type":"line","text":"— Czy babcia będzie zła?"},{"type":"line","text":"— Może. Ale krócej, niż gdyby musiała odkryć kłamstwo."},{"type":"line","text":"Dziewczynka przytuliła figurkę i pobiegła."},{"type":"line","text":"Nadim został sam z księgą."},{"type":"line","text":"Położył dłoń na okładce."},{"type":"line","text":"— Dziwna jesteś — powiedział cicho."},{"type":"line","text":"Strony poruszyły się lekko, jakby księga oddychała albo śmiała się bez głosu."},{"type":"line","text":"Nadim uśmiechnął się."},{"type":"line","text":"Wiedział już wtedy, że największe księgi nie są wielkie dlatego, że mają dużo stron."},{"type":"line","text":"Są wielkie dlatego, że potrafią otworzyć w człowieku stronę, której sam bał się dotknąć."},{"type":"line","text":"A księga, która sama przewracała strony?"},{"type":"line","text":"Leży podobno w siódmej sali do dziś."},{"type":"line","text":"Nie każdy ją znajdzie."},{"type":"line","text":"Nie każdemu się otworzy."},{"type":"line","text":"Ale jeśli kiedyś trafisz do biblioteki, w której nagle poczujesz zapach deszczu, choć za oknem świeci słońce, i zobaczysz drzwi z małym srebrnym kluczem w zamku, pamiętaj:"},{"type":"line","text":"nie pytaj księgi o to, co chcesz usłyszeć."},{"type":"line","text":"Zapytaj o to, co jesteś gotów zrozumieć."},{"type":"section","text":"— ZAKOŃCZENIE PODCASTOWE —"},{"type":"line","text":"I tak kończy się dzisiejsza opowieść: „Księga, która sama przewracała strony”."},{"type":"line","text":"To historia o bibliotece starego kalifa, o chłopcu imieniem Nadim i o księdze, która nie dawała prostych odpowiedzi."},{"type":"line","text":"Bo czasem najważniejsze nie jest to, kto wygra spór."},{"type":"line","text":"Najważniejsze jest to, co może uleczyć ranę."},{"type":"line","text":"Jeśli ta historia została z tobą choć na chwilę, zabierz jej mały kawałek do snu."},{"type":"line","text":"Może będzie to siódma sala biblioteki."},{"type":"line","text":"Może księga bez tytułu."},{"type":"line","text":"A może jedno zdanie:"},{"type":"line","text":"nie każda odpowiedź przychodzi wprost — czasem przychodzi jako opowieść."},{"type":"line","text":"Więcej bajek, legend i tajemniczych opowieści znajdziesz na stronie 3tatata.pl."},{"type":"line","text":"Możesz nas także słuchać na Spotify i oglądać na YouTube."},{"type":"line","text":"Zostaw follow albo subskrypcję, żeby nie przegapić kolejnych historii."},{"type":"line","text":"Dobranoc — i do usłyszenia w następnej bajce."}]},{"id":14,"title":"PERŁA Z DNA MORZA CIEMNOŚCI","tag":"Opowieść","sections":[{"type":"title","text":"PERŁA Z DNA MORZA CIEMNOŚCI"},{"type":"meta","text":"3TaTaTa — Opowieści z dalekich krain"},{"type":"section","text":"— WSTĘP DO ODCINKA —"},{"type":"line","text":"Są morza jasne."},{"type":"line","text":"Błękitne."},{"type":"line","text":"Ciepłe."},{"type":"line","text":"Takie, które w słońcu wyglądają jak rozlane szkło."},{"type":"line","text":"Ale są też morza, o których rybacy mówią ciszej."},{"type":"line","text":"Morza, gdzie fale są ciemne nawet w południe."},{"type":"line","text":"Gdzie kompas drży, gwiazdy wydają się dalsze, a głębina nie odbija światła."},{"type":"line","text":"Takie było Morze Ciemności."},{"type":"line","text":"Mówiono, że na jego dnie leży perła większa od ludzkiego serca."},{"type":"line","text":"Nie biała."},{"type":"line","text":"Nie srebrna."},{"type":"line","text":"Czarna."},{"type":"line","text":"Lśniąca od środka."},{"type":"line","text":"Perła, która spełnia jedno życzenie, ale tylko temu, kto zdoła zejść po nią bez chciwości."},{"type":"line","text":"Dzisiaj opowiem ci historię młodego nurka, który naprawdę odnalazł tę perłę."},{"type":"line","text":"I musiał zdecydować, czy największy skarb świata powinien należeć do człowieka."},{"type":"section","text":"— PERŁA Z DNA MORZA CIEMNOŚCI —"},{"type":"line","text":"Dawno temu, w rybackiej osadzie na końcu skalistego wybrzeża, mieszkał chłopiec imieniem Tarik."},{"type":"line","text":"Osada nazywała się Mina."},{"type":"line","text":"Nie była duża."},{"type":"line","text":"Kilka białych domów stało na zboczu nad zatoką. Dachy miały płaskie, ściany popękane od soli, a drzwi malowane na niebiesko, bo ludzie wierzyli, że niebieski kolor uspokaja morze."},{"type":"line","text":"Rankiem cała Mina pachniała rybami, mokrymi linami, dymem z palenisk i chlebem pieczonym na kamieniu."},{"type":"line","text":"Wieczorem pachniała wodorostami, oliwą i opowieściami."},{"type":"line","text":"Bo w Minie opowiadano dużo."},{"type":"line","text":"Rybacy opowiadali o burzach."},{"type":"line","text":"Starcy o statkach, które nie wróciły."},{"type":"line","text":"Matki o duchach siedzących na skałach podczas mgły."},{"type":"line","text":"A dzieci o tym, kto widział największą meduzę albo kto najdłużej wytrzymał pod wodą."},{"type":"line","text":"Tarik był najlepszym nurkiem wśród dzieci."},{"type":"line","text":"Potrafił zanurzyć się głęboko, otworzyć oczy w słonej wodzie i wydobyć z dna muszlę, zanim inni zdążyli doliczyć do dziesięciu."},{"type":"line","text":"Nie robił tego, żeby się chwalić."},{"type":"line","text":"Po prostu w wodzie czuł się inaczej niż na lądzie."},{"type":"line","text":"Na lądzie był synem biednej wdowy."},{"type":"line","text":"Chłopcem w za krótkiej tunice."},{"type":"line","text":"Kimś, komu często mówiono: „poczekaj”, „nie teraz”, „to nie dla ciebie”."},{"type":"line","text":"Pod wodą był wolny."},{"type":"line","text":"Cisza otulała go ze wszystkich stron."},{"type":"line","text":"Świat zwalniał."},{"type":"line","text":"A serce biło mu spokojnie, jakby rozumiało rytm fal lepiej niż rytm ludzkich rozmów."},{"type":"line","text":"Matka Tarika miała na imię Samira."},{"type":"line","text":"Była kobietą szczupłą, silną i zmęczoną w taki sposób, który nie odbiera dobroci, ale zostawia cień pod oczami."},{"type":"line","text":"Jej mąż, ojciec Tarika, zginął na morzu trzy lata wcześniej."},{"type":"line","text":"Wypłynął podczas spokojnego poranka."},{"type":"line","text":"Nie wrócił."},{"type":"line","text":"Morze oddało tylko fragment wiosła i kawałek czerwonej tkaniny z jego pasa."},{"type":"line","text":"Od tamtej pory Samira sama naprawiała sieci, suszyła ryby, sprzedawała je na targu i pilnowała, by syn nie dorastał z gniewem zamiast serca."},{"type":"line","text":"— Morze zabrało twojego ojca — mówiła czasem — ale nie wolno ci nienawidzić morza. Ono nie jest człowiekiem. Nie krzywdzi z powodu złości."},{"type":"line","text":"Tarik milczał wtedy."},{"type":"line","text":"Nie był pewien, czy potrafi tak myśleć."},{"type":"line","text":"Kochał morze i bał się go."},{"type":"line","text":"Tęsknił za ojcem i czasem miał wrażenie, że każda fala wie coś, czego jemu nie chce powiedzieć."},{"type":"line","text":"Pewnego lata do Miny przybył statek z południa."},{"type":"line","text":"Był większy niż łodzie rybaków, z ciemnym żaglem i dziobem wyrzeźbionym w kształt ptaka."},{"type":"line","text":"Na pokładzie stał kupiec imieniem Safwan."},{"type":"line","text":"Nosił szaty z cienkiej wełny, miał brodę przyciętą równo i pierścień z granatem na palcu."},{"type":"line","text":"Przywiózł sól, daktyle, naczynia z miedzi i wiadomość, która zelektryzowała całą osadę."},{"type":"line","text":"— Sułtan szuka perły z dna Morza Ciemności — oznajmił na placu. — Kto ją znajdzie i przyniesie do pałacu, otrzyma sto sakiewek złota, dom w mieście i tytuł nadwornego nurka."},{"type":"line","text":"Ludzie zaczęli szeptać."},{"type":"line","text":"Perła z Morza Ciemności była legendą."},{"type":"line","text":"Starszą niż Mina."},{"type":"line","text":"Mówiono, że spoczywa w muszli wielkiej jak kołyska, na dnie miejsca, gdzie światło nie dociera nigdy."},{"type":"line","text":"Jedni twierdzili, że perły strzeże morski smok."},{"type":"line","text":"Inni, że sama perła śni sny wszystkich, którzy utonęli."},{"type":"line","text":"Jeszcze inni, że nie jest klejnotem, lecz okiem starego morza."},{"type":"line","text":"Safwan rozwinął pergamin z pieczęcią sułtana."},{"type":"line","text":"— Nagroda jest prawdziwa — powiedział. — Potrzebuję nurków odważnych i zdolnych. Kto spróbuje?"},{"type":"line","text":"Kilku młodych rybaków wystąpiło od razu."},{"type":"line","text":"Tarik też zrobił krok."},{"type":"line","text":"Matka chwyciła go za ramię."},{"type":"line","text":"— Nie."},{"type":"line","text":"— Matko..."},{"type":"line","text":"— Nie, Tariku."},{"type":"line","text":"— Jestem dobrym nurkiem."},{"type":"line","text":"— Jesteś dzieckiem."},{"type":"line","text":"— Mam dwanaście lat."},{"type":"line","text":"— Właśnie."},{"type":"line","text":"Tarik spojrzał na pergamin, potem na morze."},{"type":"line","text":"Sto sakiewek złota."},{"type":"line","text":"Dom w mieście."},{"type":"line","text":"Żadnych połatanych sieci."},{"type":"line","text":"Żadnych dni, kiedy matka udaje, że nie jest głodna, żeby on mógł zjeść więcej."},{"type":"line","text":"— Moglibyśmy zmienić życie — powiedział cicho."},{"type":"line","text":"Samira uklękła przed nim, żeby patrzeć mu prosto w oczy."},{"type":"line","text":"— Nie chcę życia kupionego twoją śmiercią."},{"type":"line","text":"To zdanie zamknęło mu usta."},{"type":"line","text":"Safwan jednak słyszał rozmowę."},{"type":"line","text":"Podszedł bliżej i przyjrzał się chłopcu."},{"type":"line","text":"— To twój syn?"},{"type":"line","text":"Samira wstała."},{"type":"line","text":"— Tak."},{"type":"line","text":"— Mówią, że świetnie nurkuje."},{"type":"line","text":"— Ludzie dużo mówią."},{"type":"line","text":"Kupiec uśmiechnął się uprzejmie."},{"type":"line","text":"— Nie zamierzam zabierać dziecka na głębiny bez zgody matki. Ale jeśli będziecie potrzebować pieniędzy, moja oferta pozostaje otwarta."},{"type":"line","text":"Odszedł."},{"type":"line","text":"Tarik poczuł złość."},{"type":"line","text":"Nie na kupca."},{"type":"line","text":"Nie na matkę."},{"type":"line","text":"Na wszystko naraz."},{"type":"line","text":"Na biedę."},{"type":"line","text":"Na morze."},{"type":"line","text":"Na własny wiek."},{"type":"line","text":"Na to, że świat czasem pokazuje człowiekowi drzwi, a potem mówi: nie wolno ci ich otworzyć."},{"type":"line","text":"Tej nocy chłopiec nie spał."},{"type":"line","text":"Leżał na dachu domu, słuchał fal uderzających o skały i patrzył w gwiazdy."},{"type":"line","text":"W końcu wstał."},{"type":"line","text":"Nie zamierzał uciekać na statek."},{"type":"line","text":"Nie aż tak."},{"type":"line","text":"Chciał tylko pójść nad wodę."},{"type":"line","text":"Usiadł na brzegu zatoki, tam gdzie kamienie były gładkie od przypływów."},{"type":"line","text":"Księżyc odbijał się w wodzie."},{"type":"line","text":"Wtedy usłyszał śpiew."},{"type":"line","text":"Cichy."},{"type":"line","text":"Bardzo daleki."},{"type":"line","text":"Jakby ktoś nucił pod powierzchnią morza."},{"type":"line","text":"Tarik rozejrzał się."},{"type":"line","text":"Na skale kilka kroków dalej siedziała kobieta."},{"type":"line","text":"Nie zauważył, kiedy się pojawiła."},{"type":"line","text":"Miała długie włosy ciemne jak mokre wodorosty i płaszcz utkany z czegoś, co błyszczało jak rybie łuski."},{"type":"line","text":"Nie wyglądała jak mieszkanka Miny."},{"type":"line","text":"Nie wyglądała też jak ktoś z karawany czy statku."},{"type":"line","text":"— Nie powinieneś słuchać obietnic ludzi, którzy znają morze tylko z mapy — powiedziała."},{"type":"line","text":"Tarik zamarł."},{"type":"line","text":"— Kim jesteś?"},{"type":"line","text":"Kobieta uśmiechnęła się."},{"type":"line","text":"— Kimś, kto słucha fal dłużej niż ty żyjesz."},{"type":"line","text":"— Jesteś duchem?"},{"type":"line","text":"— Może dla ciebie."},{"type":"line","text":"Chłopiec nie uciekł."},{"type":"line","text":"Ciekawość była silniejsza niż strach."},{"type":"line","text":"— Wiesz coś o perle?"},{"type":"line","text":"Kobieta spojrzała na wodę."},{"type":"line","text":"— Wiem, że istnieje."},{"type":"line","text":"Tarik poczuł, jak serce uderza mu mocniej."},{"type":"line","text":"— Gdzie?"},{"type":"line","text":"— Na dnie Morza Ciemności, tam gdzie śpią stare prądy. Ale perła nie jest nagrodą dla tego, kto najgłębiej zanurzy ciało. Jest próbą dla tego, kto najgłębiej potrafi zajrzeć w siebie."},{"type":"line","text":"Tarik zmarszczył brwi."},{"type":"line","text":"— Nie rozumiem."},{"type":"line","text":"— Większość ludzi nie rozumie, dopóki nie jest za późno."},{"type":"line","text":"Kobieta wstała."},{"type":"line","text":"— Jeśli naprawdę chcesz jej szukać, zapamiętaj trzy rzeczy. Po pierwsze: nie schodź w głębinę z gniewem. Gniew jest cięższy od kamienia. Pociągnie cię na dno. Po drugie: nie ufaj światł
