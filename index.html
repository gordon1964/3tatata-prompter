ko wyjął je spod płaszcza."},{"type":"line","text":"Sułtan wstał z tronu."},{"type":"line","text":"Dżalal i Karim zamilkli."},{"type":"line","text":"— Złoty ptak — wyszeptał sułtan. — To on kradnie moje jabłka."},{"type":"line","text":"Przez chwilę patrzył na pióro z zachwytem."},{"type":"line","text":"A potem w jego oczach pojawiło się pragnienie."},{"type":"line","text":"— Chcę go mieć — powiedział."},{"type":"line","text":"Samir poczuł niepokój."},{"type":"line","text":"— Ojcze, może on ma powód, by zabierać jabłka."},{"type":"line","text":"— Powód? — Sułtan odwrócił się gwałtownie. — To moje drzewo. Mój ogród. Moje jabłka."},{"type":"line","text":"Samir spuścił wzrok."},{"type":"line","text":"Wiedział, że nie przekona ojca jednym zdaniem."},{"type":"line","text":"Sułtan rozkazał synom odnaleźć złotego ptaka i sprowadzić go do pałacu."},{"type":"line","text":"Pierwszy wyruszył Dżalal."},{"type":"line","text":"Dostał najlepszego konia, miecz i sakwy pełne pieniędzy."},{"type":"line","text":"Jechał szybko, przekonany, że zwycięstwo należy do niego."},{"type":"line","text":"Na skraju pustyni spotkał starego lisa."},{"type":"line","text":"Lis miał srebrny pysk, oczy mądre i ogon postrzępiony, jakby wiele razy wymykał się śmierci."},{"type":"line","text":"— Książę — powiedział lis — jeśli szukasz złotego ptaka, posłuchaj rady. Nie jedź szeroką drogą do miasta śmiechu i muzyki. Wybierz wąską ścieżkę przez skały. Nie zatrzymuj się w gospodzie z czerwonymi lampami."},{"type":"line","text":"Dżalal roześmiał się."},{"type":"line","text":"— Odkąd to lisy dają rady książętom?"},{"type":"line","text":"Popędził szeroką drogą."},{"type":"line","text":"Wieczorem dotarł do miasta pełnego muzyki, śmiechu i zapachu pieczonego mięsa. Zobaczył gospodę z czerwonymi lampami."},{"type":"line","text":"„Tylko na chwilę” — pomyślał."},{"type":"line","text":"Ta chwila trwała wiele dni."},{"type":"line","text":"Dżalal zapomniał o ptaku."},{"type":"line","text":"Potem wyruszył Karim."},{"type":"line","text":"Spotkał tego samego lisa."},{"type":"line","text":"— Książę — powiedział lis — nie jedź szeroką drogą. Nie zatrzymuj się w gospodzie z czerwonymi lampami. A jeśli znajdziesz złotego ptaka, weź go w drewnianej klatce, nie w złotej."},{"type":"line","text":"Karim był sprytniejszy od brata, więc udawał, że słucha."},{"type":"line","text":"— Dziękuję, lisie — powiedział."},{"type":"line","text":"Ale kiedy zobaczył szeroką drogę, uznał, że szybciej dotrze właśnie nią. A kiedy zobaczył gospodę z czerwonymi lampami, pomyślał, że odpoczynek nikomu nie zaszkodzi."},{"type":"line","text":"Jego chwila także trwała wiele dni."},{"type":"line","text":"W końcu do drogi przygotował się Samir."},{"type":"line","text":"Nie wziął najlepszego konia."},{"type":"line","text":"Wybrał wytrzymałego."},{"type":"line","text":"Nie wziął najbogatszych szat."},{"type":"line","text":"Wybrał wygodne."},{"type":"line","text":"Nie napełnił sakiewek złotem po brzegi."},{"type":"line","text":"Wziął tyle, ile trzeba."},{"type":"line","text":"Na skraju pustyni spotkał lisa."},{"type":"line","text":"— Książę — powiedział lis — wiem, dokąd idziesz."},{"type":"line","text":"Samir zsiadł z konia."},{"type":"line","text":"Nie dlatego, że musiał."},{"type":"line","text":"Dlatego, że łatwiej rozmawia się z kimś, gdy nie patrzy się na niego z góry."},{"type":"line","text":"— Szukam złotego ptaka — powiedział."},{"type":"line","text":"— W takim razie posłuchaj. Nie jedź szeroką drogą. Nie zatrzymuj się w gospodzie z czerwonymi lampami. Wybierz ścieżkę przez skały. Gdy dotrzesz do zamku na końcu doliny, znajdziesz ptaka w sali z dwoma klatkami. Jedna będzie złota, druga drewniana. Ptak siedzi w drewnianej. Nie przekładaj go do złotej, choćby wydawało ci się, że złoty ptak zasługuje na złoto."},{"type":"line","text":"Samir skinął głową."},{"type":"line","text":"— Dlaczego mi pomagasz?"},{"type":"line","text":"Lis zamrugał."},{"type":"line","text":"— Bo jako pierwszy zapytałeś."},{"type":"line","text":"Samir pojechał wąską ścieżką przez skały."},{"type":"line","text":"Droga była trudna."},{"type":"line","text":"Koń potykał się na kamieniach."},{"type":"line","text":"Słońce paliło kark."},{"type":"line","text":"W ustach brakowało wody."},{"type":"line","text":"Ale Samir nie zawrócił."},{"type":"line","text":"Minął miasto śmiechu i muzyki z daleka. Słyszał bębny, pieśni i nawoływania, ale nie zatrzymał się."},{"type":"line","text":"Po trzech dniach dotarł do zamku na końcu doliny."},{"type":"line","text":"Zamek był cichy."},{"type":"line","text":"Nie strzegli go żołnierze."},{"type":"line","text":"Nie było mostu zwodzonego."},{"type":"line","text":"Brama stała uchylona."},{"type":"line","text":"To właśnie sprawiało, że wyglądał niebezpiecznie."},{"type":"line","text":"Samir wszedł do środka."},{"type":"line","text":"Przeszedł przez pusty dziedziniec, potem przez korytarz z marmuru, potem przez salę pełną luster. W każdym lustrze widział siebie trochę inaczej: raz jako króla, raz jako wojownika, raz jako bogacza, raz jako starca."},{"type":"line","text":"Nie zatrzymał się."},{"type":"line","text":"W końcu dotarł do sali z dwiema klatkami."},{"type":"line","text":"W pierwszej, drewnianej, siedział złoty ptak."},{"type":"line","text":"W drugiej, złotej, nie było nic."},{"type":"line","text":"Drewniana klatka była prosta, trochę krzywa i zwyczajna."},{"type":"line","text":"Złota klatka lśniła klejnotami."},{"type":"line","text":"Samir podszedł do ptaka."},{"type":"line","text":"Ten patrzył na niego spokojnie."},{"type":"line","text":"Książę przypomniał sobie słowa lisa."},{"type":"line","text":"„Nie przekładaj go do złotej klatki”."},{"type":"line","text":"Wyciągnął rękę po drewnianą klatkę."},{"type":"line","text":"Już miał odejść."},{"type":"line","text":"Ale wtedy pomyślał:"},{"type":"line","text":"„Ojciec zobaczy złotego ptaka w starej drewnianej klatce i uzna, że nie okazałem mu szacunku. Przecież ptakowi nic się nie stanie, jeśli będzie w piękniejszej klatce”."},{"type":"line","text":"To była bardzo mała myśl."},{"type":"line","text":"Taka, która brzmi rozsądnie."},{"type":"line","text":"A jednak czasem właśnie małe, rozsądnie brzmiące myśli prowadzą człowieka w pułapkę."},{"type":"line","text":"Samir otworzył drewnianą klatkę i przełożył ptaka do złotej."},{"type":"line","text":"W tej samej chwili ptak krzyknął."},{"type":"line","text":"Był to dźwięk jasny i ostry jak pękające szkło."},{"type":"line","text":"Zamek obudził się."},{"type":"line","text":"Drzwi zatrzasnęły się."},{"type":"line","text":"Strażnicy wybiegli z ukrytych przejść."},{"type":"line","text":"Samir został schwytany."},{"type":"line","text":"Zaprowadzono go przed króla zamku."},{"type":"line","text":"Był to władca surowy, z twarzą nieruchomą jak maska."},{"type":"line","text":"— Przyszedłeś ukraść mojego ptaka — powiedział."},{"type":"line","text":"— Mój ojciec pragnie go mieć — odrzekł Samir. — Ale nie chciałem krzywdy."},{"type":"line","text":"— Kradzież ubrana w dobre słowa nadal jest kradzieżą — powiedział król."},{"type":"line","text":"Samir spuścił głowę."},{"type":"line","text":"Nie miał odpowiedzi."},{"type":"line","text":"Król zamku przyjrzał mu się długo."},{"type":"line","text":"— Dam ci szansę. Jeśli przyprowadzisz mi złotego konia z zamku na Szklanej Górze, otrzymasz ptaka."},{"type":"line","text":"Samir został wypuszczony."},{"type":"line","text":"Za bramą czekał lis."},{"type":"line","text":"Nie wyglądał na zdziwionego."},{"type":"line","text":"— Przełożyłeś ptaka do złotej klatki — powiedział."},{"type":"line","text":"Samir westchnął."},{"type":"line","text":"— Tak."},{"type":"line","text":"— Ostrzegałem."},{"type":"line","text":"— Wiem."},{"type":"line","text":"— To dobrze — powiedział lis."},{"type":"line","text":"— Dobrze?"},{"type":"line","text":"— Dobrze, że mówisz „wiem”, a nie szukasz winy w klatce, ptaku albo we mnie."},{"type":"line","text":"Lis pokazał mu drogę do Szklanej Góry."},{"type":"line","text":"— Tam znajdziesz złotego konia. Będzie stał między dwoma siodłami. Jedno będzie zwykłe, skórzane. Drugie złote i wysadzane kamieniami. Weź konia ze zwykłym siodłem. Nie zakładaj złotego."},{"type":"line","text":"Samir obiecał."},{"type":"line","text":"Dotarł do zamku na Szklanej Górze."},{"type":"line","text":"Zamek błyszczał tak mocno, że trzeba było mrużyć oczy."},{"type":"line","text":"W stajni stał złoty koń."},{"type":"line","text":"Nie posąg."},{"type":"line","text":"Żywy koń o sierści lśniącej jak poranne słońce."},{"type":"line","text":"Obok wisiały dwa siodła."},{"type":"line","text":"Zwykłe."},{"type":"line","text":"I złote."},{"type":"line","text":"Samir położył rękę na zwykłym siodle."},{"type":"line","text":"Potem spojrzał na konia."},{"type":"line","text":"„Taki koń zasługuje na najpiękniejsze siodło” — pomyślał."},{"type":"line","text":"I znowu posłuchał małej myśli, która brzmiała rozsądnie."},{"type":"line","text":"Założył złote siodło."},{"type":"line","text":"Koń zarżał."},{"type":"line","text":"Stajnia wypełniła się alarmem."},{"type":"line","text":"Samir znów został schwytany."},{"type":"line","text":"Władca Szklanej Góry powiedział:"},{"type":"line","text":"— Chcesz mojego konia? Przyprowadź mi księżniczkę z Pałacu Nad Błękitnym Jeziorem."},{"type":"line","text":"Samir wyszedł z zamku jeszcze smutniejszy niż poprzednio."},{"type":"line","text":"Lis czekał na niego w cieniu skały."},{"type":"line","text":"— Złote siodło? — zapytał."},{"type":"line","text":"Samir skinął głową."},{"type":"line","text":"— Złote siodło."},{"type":"line","text":"Lis usiadł i owinął ogon wokół łap."},{"type":"line","text":"— Książę, piękno nie zawsze potrzebuje więcej piękna. Czasem potrzebuje wolności."},{"type":"line","text":"Samir zapamiętał te słowa."},{"type":"line","text":"Ruszył do Pałacu Nad Błękitnym Jeziorem."},{"type":"line","text":"Droga była długa, ale tym razem książę nie myślał o nagrodzie dla ojca."},{"type":"line","text":"Myślał o ptaku, koniu, księżniczce i o tym, ile razy człowiek potrafi pomylić szacunek z posiadaniem."},{"type":"line","text":"Pałac nad jeziorem był najcichszym miejscem, jakie kiedykolwiek widział."},{"type":"line","text":"Woda była gładka jak szkło."},{"type":"line","text":"Białe kolumny odbijały się w niej bez drżenia."},{"type":"line","text":"W ogrodzie siedziała księżniczka Leila."},{"type":"line","text":"Nie była zamknięta w wieży."},{"type":"line","text":"Nie była przykuta do ściany."},{"type":"line","text":"A jednak w jej oczach mieszkała tęsknota."},{"type":"line","text":"Samir podszedł i skłonił się."},{"type":"line","text":"— Przysłano mnie, by cię zabrać — powiedział szczerze. — Ale nie chcę porywać człowieka jak rzeczy. Powiedz, czego ty chcesz."},{"type":"line","text":"Leila patrzyła na niego długo."},{"type":"line","text":"— Chcę zobaczyć świat poza tym jeziorem — odpowiedziała. — Chcę sama zdecydować, dokąd pójdę. Jeśli obiecasz, że nie oddasz mnie nikomu wbrew mojej woli, pojadę z tobą."},{"type":"line","text":"— Obiecuję — powiedział Samir."},{"type":"line","text":"I tym razem dotrzymał słowa bez żadnej poprawki, bez żadnego „ale”, bez żadnej małej myśli, która udawała rozsądek."},{"type":"line","text":"Gdy wrócili do lisa, ten uśmiechnął się po lisiemu."},{"type":"line","text":"— Teraz posłuchaj dokładnie — powiedział. — Możesz odzyskać wszystko, jeśli będziesz pamiętał, że nie wolno oddawać żywych istot jak przedmiotów."},{"type":"line","text":"Lis ułożył plan."},{"type":"line","text":"Samir przyprowadził Leilę do władcy Szklanej Góry, ale w ostatniej chwili, korzystając z zamieszania, odjechał z nią i ze złotym koniem — tym razem w zwykłym siodle."},{"type":"line","text":"Potem pojechał do króla zamku z ptakiem. Pokazał mu konia, ale nie oddał go. Dzięki pomocy lisa odzyskał złotego ptaka w drewnianej klatce i uciekł, zanim ktokolwiek zdołał ich zatrzymać."},{"type":"line","text":"Wreszcie miał wszystko:"},{"type":"line","text":"złotego ptaka,"},{"type":"line","text":"złotego konia,"},{"type":"line","text":"i Leilę, która nie była zdobyczą, lecz towarzyszką podróży."},{"type":"line","text":"Lis prowadził ich przez pustkowia."},{"type":"line","text":"Przed rozstajem dróg zatrzymał się."},{"type":"line","text":"— Teraz uważaj, książę — powiedział. — Nie wykupuj nikogo z biedy, jeśli zobaczysz ludzi ukaranych za własne wybory. I nie siadaj na brzegu studni."},{"type":"line","text":"Samir zmarszczył brwi."},{"type":"line","text":"— To dziwne rady."},{"type":"line","text":"— Najważniejsze rady często brzmią dziwnie, dopóki nie jest za późno."},{"type":"line","text":"Ruszyli dalej."},{"type":"line","text":"Niedaleko miasta Samir zobaczył tłum."},{"type":"line","text":"W środku stali jego bracia, Dżalal i Karim."},{"type":"line","text":"Przez lenistwo, długi i oszustwa stracili wszystko. Mieli zostać ukarani."},{"type":"line","text":"Samir nie potrafił przejść obok."},{"type":"line","text":"Wykupił ich."},{"type":"line","text":"Bracia dziękowali mu, ale w ich oczach zamiast wdzięczności pojawiła się zazdrość."},{"type":"line","text":"Zobaczyli złotego ptaka."},{"type":"line","text":"Złotego konia."},{"type":"line","text":"Księżniczkę Leilę."},{"type":"line","text":"I zrozumieli, że najmłodszy brat wróci do ojca jako zwycięzca."},{"type":"line","text":"Kiedy odpoczywali przy starej studni, Dżalal powiedział:"},{"type":"line","text":"— Samirze, usiądź. Należy ci się chwila odpoczynku."},{"type":"line","text":"Samir zapomniał o radzie lisa."},{"type":"line","text":"Usiadł na brzegu studni."},{"type":"line","text":"Bracia popchnęli go."},{"type":"line","text":"Wpadł w ciemność."},{"type":"line","text":"Leili zagrozili, że jeśli powie prawdę, spotka ją ten sam los. Zabrali ptaka i konia, po czym wrócili do pałacu jako bohaterowie."},{"type":"line","text":"Ale złoty ptak nie śpiewał."},{"type":"line","text":"Złoty koń nie jadł."},{"type":"line","text":"Leila milczała."},{"type":"line","text":"A ogród sułtana, mimo powrotu skarbów, nie rozświetlał się już blaskiem jak dawniej."},{"type":"line","text":"Tymczasem Samir żył."},{"type":"line","text":"Na dnie studni była płytka woda i wąski tunel."},{"type":"line","text":"Siedział tam długo, aż usłyszał znajomy głos."},{"type":"line","text":"— Mówiłem, żebyś nie siadał na brzegu studni — powiedział lis."},{"type":"line","text":"Samir, mimo bólu, uśmiechnął się słabo."},{"type":"line","text":"— Wiem."},{"type":"line","text":"Lis pomógł mu wydostać się tunelem na powierzchnię."},{"type":"line","text":"Książę wrócił do pałacu w przebraniu wędrowca."},{"type":"line","text":"Nikt go nie poznał od razu."},{"type":"line","text":"Wszedł do ogrodu."},{"type":"line","text":"Złoty ptak, który od wielu dni milczał, nagle zaśpiewał."},{"type":"line","text":"Był to śpiew tak piękny, że ludzie zatrzymali się w miejscu."},{"type":"line","text":"Złoty koń zarżał i pochylił głowę."},{"type":"line","text":"Leila wybiegła z komnat i zawołała jego imię."},{"type":"line","text":"Wtedy prawda wyszła na jaw."},{"type":"line","text":"Dżalal i Karim spuścili głowy."},{"type":"line","text":"Sułtan zrozumiał wszystko."},{"type":"line","text":"Nie tylko zdradę starszych synów."},{"type":"line","text":"Także własny błąd."},{"type":"line","text":"Bo to jego pragnienie posiadania złotego ptaka rozpoczęło całą drogę."},{"type":"line","text":"— Synu — powiedział do Samira — chciałem mieć piękno dla siebie. A piękno zamknięte tylko dla jednego człowieka przestaje być światłem."},{"type":"line","text":"Samir otworzył drewnianą klatkę."},{"type":"line","text":"Złoty ptak usiadł na gałęzi drzewa złotych jabłek."},{"type":"line","text":"Nie uciekł."},{"type":"line","text":"Od tej pory przylatywał każdej nocy i zjadał jedno jabłko, ale rano zostawiał jedno pióro, które świeciło w ogrodzie przez cały dzień."},{"type":"line","text":"Sułtan nie kazał go więzić."},{"type":"line","text":"Zrozumiał, że niektóre cuda można podziwiać tylko wtedy, kiedy pozwala się im być wolnymi."},{"type":"line","text":"Leila została w pałacu tak długo, jak sama chciała. Z czasem pokochała Samira, a on pokochał ją — nie dlatego, że ją zdobył, lecz dlatego, że od początku pozwolił jej wybierać."},{"type":"line","text":"A lis?"},{"type":"line","text":"Pewnego wieczoru przyszedł do Samira pod cyprys."},{"type":"line","text":"— Mam jeszcze jedną prośbę — powiedział."},{"type":"line","text":"— Jakąkolwiek — odparł książę."},{"type":"line","text":"— Jeśli naprawdę jesteś mi wdzięczny, dotknij mojego czoła złotym piórem."},{"type":"line","text":"Samir zrobił to."},{"type":"line","text":"W tej samej chwili lis zadrżał."},{"type":"line","text":"Jego sierść rozbłysła srebrnym światłem, ciało wyprostowało się, a przed Samirem stanął młody książę."},{"type":"line","text":"— Dawno temu zostałem zaklęty — powiedział. — Tylko ktoś, kto nauczy się różnicy między posiadaniem a szacunkiem, mógł mnie uwolnić."},{"type":"line","text":"Samir uścisnął go jak brata."},{"type":"line","text":"I odtąd ogród sułtana był jeszcze piękniejszy."},{"type":"line","text":"Nie dlatego, że miał więcej złota."},{"type":"line","text":"Dlatego, że było w nim więcej mądrości."},{"type":"section","text":"— ZAKOŃCZENIE PODCASTOWE —"},{"type":"line","text":"I tak kończy się dzisiejsza opowieść: „Złoty ptak z ogrodu sułtana”."},{"type":"line","text":"To historia o cudach, które świecą najmocniej wtedy, gdy nie zamyka się ich na siłę."},{"type":"line","text":"O radach, których warto słuchać."},{"type":"line","text":"O błędach, do których trzeba umieć się przyznać."},{"type":"line","text":"I o tym, że piękno nie zawsze chce należeć do nas."},{"type":"line","text":"Czasem chce po prostu być blisko."},{"type":"line","text":"Jeśli ta historia została z tobą choć na chwilę, zabierz jej mały kawałek do snu."},{"type":"line","text":"Może będzie to złote pióro."},{"type":"line","text":"Może ogród tuż przed świtem."},{"type":"line","text":"Może ptak, który świeci w ciemności jak małe słońce."},{"type":"line","text":"A może jedno zdanie:"},{"type":"line","text":"nie wszystko, co kochamy, musimy posiadać."},{"type":"line","text":"Więcej bajek, legend i tajemniczych opowieści znajdziesz na stronie 3tatata.pl."},{"type":"line","text":"Możesz nas także słuchać na Spotify i oglądać na YouTube."},{"type":"line","text":"Zostaw follow albo subskrypcję, żeby nie przegapić kolejnych historii."},{"type":"line","text":"Dobranoc — i do usłyszenia w następnej bajce."}]},{"id":9,"title":"KUPIEC I TAJEMNICA PUSTYNNEJ STUDNI","tag":"Opowieść","sections":[{"type":"title","text":"KUPIEC I TAJEMNICA PUSTYNNEJ STUDNI"},{"type":"meta","text":"3TaTaTa — Opowieści z dalekich krain"},{"type":"section","text":"— WSTĘP DO ODCINKA —"},{"type":"line","text":"Wyobraź sobie pustynię nocą."},{"type":"line","text":"Nie tę z obrazków, gorącą i złotą."},{"type":"line","text":"Tylko nocną."},{"type":"line","text":"Srebrną."},{"type":"line","text":"Cichą."},{"type":"line","text":"Taką, w której piasek stygnie powoli, gwiazdy wiszą nisko nad głową, a każdy dźwięk wydaje się większy, niż powinien."},{"type":"line","text":"Gdzieś daleko idzie karawana."},{"type":"line","text":"Wielbłądy stawiają miękkie kroki."},{"type":"line","text":"Dzwoneczki przy jukach dźwięczą cicho."},{"type":"line","text":"Ludzie mówią szeptem, bo na pustyni po zmroku nawet odwaga zaczyna słuchać uważniej."},{"type":"line","text":"A pośrodku tej pustyni stoi stara studnia."},{"type":"line","text":"Nikt nie wie, kto ją wykopał."},{"type":"line","text":"Nikt nie wie, dlaczego nigdy nie wysycha."},{"type":"line","text":"Ale wszyscy wiedzą jedno:"},{"type":"line","text":"nocą nie wolno zaglądać do jej wnętrza, jeśli usłyszy się własne imię."},{"type":"line","text":"To historia kupca, który usłyszał głos ze studni."},{"type":"line","text":"I musiał zdecydować, czy uciec, czy odpowiedzieć."},{"type":"section","text":"— KUPIEC I TAJEMNICA PUSTYNNEJ STUDNI —"},{"type":"line","text":"Dawno temu, w mieście leżącym na granicy piasków, mieszkał kupiec imieniem Farid."},{"type":"line","text":"Nie był najbogatszy w całym mieście, ale nikt nie nazwałby go biednym."},{"type":"line","text":"Miał sklep z tkaninami przy głównej bramie targowej."},{"type":"line","text":"Sprzedawał jedwabie z Samarkandy, płótna z dalekich wybrzeży, barwione chusty, dywany, cienkie zasłony i pasy wyszywane srebrną nicią."},{"type":"line","text":"Jego sklep pachniał kurzem drogi, lawendą, skórzanymi sakwami i dalekimi krajami."},{"type":"line","text":"Farid znał się na handlu."},{"type":"line","text":"Wiedział, kiedy targować się długo, a kiedy ustąpić."},{"type":"line","text":"Wiedział, który klient tylko udaje, że odejdzie, a który naprawdę zaraz zniknie za rogiem."},{"type":"line","text":"Wiedział też, że na świecie są trzy rzeczy, których kupiec musi pilnować bardziej niż pieniędzy: słowo, miara i zaufanie."},{"type":"line","text":"Tak uczył go ojciec."},{"type":"line","text":"— Złoto można stracić i odzyskać — mówił stary kupiec. — Ale jeśli stracisz dobre imię, będziesz biedny nawet z pełną sakiewką."},{"type":"line","text":"Farid zapamiętał te słowa."},{"type":"line","text":"Przez wiele lat starał się żyć uczciwie."},{"type":"line","text":"Ale człowiek, nawet dobry, nie zawsze jest doskonały."},{"type":"line","text":"A czasem jeden mały błąd wędruje za nim przez życie jak cień."},{"type":"line","text":"Pewnego lata do miasta przybył posłaniec z królestwa po drugiej stronie pustyni."},{"type":"line","text":"Przyniósł zamówienie na tkaniny dla pałacu: sto bel jedwabiu, dwadzieścia dywanów, zasłony do sali tronowej i zielony materiał na szaty dla młodego księcia."},{"type":"line","text":"Było to zamówienie tak wielkie, że mogło zapewnić Faridowi bogactwo na wiele lat."},{"type":"line","text":"Kupiec zebrał więc najlepszy towar, opłacił ludzi, najął wielbłądy i przygotował karawanę."},{"type":"line","text":"Wyruszyli przed świtem."},{"type":"line","text":"Było ich dwunastu ludzi i trzydzieści wielbłądów."},{"type":"line","text":"Przewodnikiem był stary Beduin imieniem Salim, którego twarz miała tyle zmarszczek, ile pustynia ma wydm."},{"type":"line","text":"Salim znał drogę po gwiazdach, po kierunku wiatru i po zapachu piasku."},{"type":"line","text":"Potrafił powiedzieć, czy burza nadchodzi, zanim na niebie pojawiła się pierwsza ciemna smuga."},{"type":"line","text":"Potrafił znaleźć cień tam, gdzie inni widzieli tylko kamień."},{"type":"line","text":"I potrafił milczeć tak długo, że młodsi ludzie zaczynali mówić tylko po to, by sprawdzić, czy świat nadal istnieje."},{"type":"line","text":"Przez pierwsze dni podróż była spokojna."},{"type":"line","text":"Rankiem szli, dopóki słońce nie stawało się zbyt ostre."},{"type":"line","text":"W południe odpoczywali pod płóciennymi osłonami."},{"type":"line","text":"Wieczorem znów ruszali."},{"type":"line","text":"Nocą rozpalali mały ogień, pili gorzką herbatę i słuchali, jak wiatr przesuwa piasek po piasku."},{"type":"line","text":"Piątego dnia Salim zatrzymał karawanę wcześniej niż zwykle."},{"type":"line","text":"— Dzisiaj przenocujemy przy studni — powiedział."},{"type":"line","text":"Farid spojrzał przed siebie."},{"type":"line","text":"W oddali, między niskimi skałami, zobaczył okrągły mur z jasnego kamienia."},{"type":"line","text":"Studnia wyglądała zwyczajnie."},{"type":"line","text":"Staro."},{"type":"line","text":"Trochę krzywo."},{"type":"line","text":"Jak wiele pustynnych studni, które ratowały życie podróżnym od setek lat."},{"type":"line","text":"A jednak ludzie w karawanie ucichli."},{"type":"line","text":"Nawet wielbłądy szły wolniej."},{"type":"line","text":"— Co to za miejsce? — zapytał Farid."},{"type":"line","text":"Salim długo nie odpowiadał."},{"type":"line","text":"Dopiero gdy dotarli do studni i rozsiodłali zwierzęta, powiedział:"},{"type":"line","text":"— Nazywają ją Studnią Głosów."},{"type":"line","text":"Jeden z młodych pomocników Farida przełknął ślinę."},{"type":"line","text":"— Dlaczego?"},{"type":"line","text":"Salim usiadł na kamieniu, nalał sobie wody do małej czarki i spojrzał w ciemniejące niebo."},{"type":"line","text":"— Bo nocą czasem mówi."},{"type":"line","text":"Ktoś nerwowo się zaśmiał."},{"type":"line","text":"Salim nie uśmiechnął się nawet odrobinę."},{"type":"line","text":"— Nie żartuję. Ta studnia nie zawsze daje tylko wodę. Czasem oddaje człowiekowi coś, co kiedyś do niej wrzucił."},{"type":"line","text":"— Przecież nikt nie wrzuca głosu do studni — powiedział Farid."},{"type":"line","text":"— Owszem — odparł Salim. — Ludzie wrzucają do ciemności różne rzeczy. Kłamstwa. Obietnice. Strach. Żal. Czasem nawet prawdę, której nie chcą wypowiedzieć na powierzchni."},{"type":"line","text":"Zapadła cisza."},{"type":"line","text":"Ogień trzaskał cicho."},{"type":"line","text":"Niebo robiło się coraz ciemniejsze, a pierwsze gwiazdy pojawiały się nad pustynią jak małe dziurki w granatowej tkaninie."},{"type":"line","text":"Salim mówił dalej:"},{"type":"line","text":"— Jest jedna zasada. Jeśli nocą usłyszysz ze studni głos, nie zaglądaj do środka. Jeśli usłyszysz swoje imię, nie odpowiadaj od razu. Najpierw zapytaj własne serce, czy jest gotowe usłyszeć prawdę."},{"type":"line","text":"Farid uznał, że to stara pustynna opowieść, jedna z tych, które przewodnicy opowiadają młodym, żeby nie oddalali się po zmroku."},{"type":"line","text":"Ale tej nocy nie mógł zasnąć."},{"type":"line","text":"Leżał na dywanie, pod cienkim kocem, i patrzył w gwiazdy."},{"type":"line","text":"Wszyscy wokół oddychali spokojnie."},{"type":"line","text":"Wielbłądy poruszały pyskami, jakby przeżuwały sny."},{"type":"line","text":"Ogień dogasał."},{"type":"line","text":"Wtedy Farid usłyszał szept."},{"type":"line","text":"Najpierw myślał, że to wiatr."},{"type":"line","text":"Potem, że ktoś z ludzi mówi przez sen."},{"type":"line","text":"Ale szept powtórzył się wyraźniej."},{"type":"line","text":"— Faridzie..."},{"type":"line","text":"Kupiec znieruchomiał."},{"type":"line","text":"Serce uderzyło mu mocniej."},{"type":"line","text":"Nie ruszał się."},{"type":"line","text":"— Faridzie..."},{"type":"line","text":"Głos dochodził ze studni."},{"type":"line","text":"Nie był głośny."},{"type":"line","text":"Nie był groźny."},{"type":"line","text":"Był cichy, zmęczony i znajomy w sposób, którego Farid nie umiał nazwać."},{"type":"line","text":"Kupiec usiadł powoli."},{"type":"line","text":"Spojrzał na Salima."},{"type":"line","text":"Stary przewodnik spał albo udawał, że śpi."},{"type":"line","text":"Farid wstał."},{"type":"line","text":"Zrobił krok w stronę studni."},{"type":"line","text":"Potem drugi."},{"type":"line","text":"Kamienie były zimne pod stopami."},{"type":"line","text":"— Faridzie — powiedział głos po raz trzeci."},{"type":"line","text":"Kupiec zatrzymał się przy murze studni."},{"type":"line","text":"Przypomniał sobie ostrzeżenie Salima."},{"type":"line","text":"Nie zaglądaj."},{"type":"line","text":"Nie odpowiadaj od razu."},{"type":"line","text":"Zapytaj własne serce."},{"type":"line","text":"Farid zamknął oczy."},{"type":"line","text":"I wtedy przypomniał sobie coś, o czym starał się nie myśleć od wielu lat."},{"type":"line","text":"Był młodym kupcem."},{"type":"line","text":"Dopiero zaczynał samodzielny handel."},{"type":"line","text":"Pewnego dnia kupił od ubogiej wdowy skrzynię tkanin po jej zmarłym mężu. Kobieta nie znała ich wartości. Farid znał. Wiedział, że jedna z bel jest prawdziwym jedwabiem z dalekiego miasta i warta jest dziesięć razy więcej, niż wdowa sądziła."},{"type":"line","text":"Mógł powiedzieć prawdę."},{"type":"line","text":"Mógł zapłacić uczciwie."},{"type":"line","text":"Ale tego nie zrobił."},{"type":"line","text":"Zapłacił mało."},{"type":"line","text":"Bardzo mało."},{"type":"line","text":"Potem sprzedał tkaninę z ogromnym zyskiem."},{"type":"line","text":"Przez jakiś czas tłumaczył sobie, że taki jest handel."},{"type":"line","text":"Że kobieta sama podała cenę."},{"type":"line","text":"Że nie ukradł."},{"type":"line","text":"Ale kiedy ojciec powiedział mu później: „Pilnuj słowa, miary i zaufania”, Farid poczuł wtedy ukłucie tak ostre, że zapamiętał je na całe życie."},{"type":"line","text":"Nigdy nie odnalazł tej wdowy."},{"type":"line","text":"Nigdy nie naprawił błędu."},{"type":"line","text":"A teraz, po latach, jego imię wołała studnia."},{"type":"line","text":"— Kim jesteś? — zapytał cicho Farid."},{"type":"line","text":"Ze studni dobiegł szmer, jakby głęboko pod ziemią poruszyła się woda."},{"type":"line","text":"— Jestem tym, co zostawiłeś w ciemności."},{"type":"line","text":"Farid poczuł zimno w dłoniach."},{"type":"line","text":"— Czego chcesz?"},{"type":"line","text":"— Tego, co należy do prawdy."},{"type":"line","text":"Kupiec cofnął się o pół kroku."},{"type":"line","text":"W tej chwili obudził się Salim."},{"type":"line","text":"A może wcale nie spał."},{"type":"line","text":"Usiadł powoli i spojrzał na Farida."},{"type":"line","text":"— Słyszałeś? — zapytał."},{"type":"line","text":"Farid skinął głową."},{"type":"line","text":"— Tak."},{"type":"line","text":"— Odpowiedziałeś?"},{"type":"line","text":"— Tak."},{"type":"line","text":"Salim westchnął."},{"type":"line","text":"— W takim razie studnia pójdzie z tobą, dopóki nie zrozumiesz, po co cię zawołała."},{"type":"line","text":"— Studnia pójdzie ze mną? — Farid spróbował się roześmiać, ale śmiech ugrzązł mu w gardle."},{"type":"line","text":"— Nie kamienie — powiedział Salim. — Głos."},{"type":"line","text":"Następnego ranka karawana ruszyła dalej."},{"type":"line","text":"Studnia została za nimi."},{"type":"line","text":"Ale głos nie zniknął."},{"type":"line","text":"Farid słyszał go w skrzypieniu siodeł."},{"type":"line","text":"W szmerze przesypującego się piasku."},{"type":"line","text":"W bulgotaniu wody, gdy nalewał ją do kubka."},{"type":"line","text":"Nie mówił już jego imienia."},{"type":"line","text":"Powtarzał tylko jedno zdanie:"},{"type":"line","text":"— Oddaj miarę."},{"type":"line","text":"Farid starał się zachowywać normalnie."},{"type":"line","text":"Doglądał towaru."},{"type":"line","text":"Sprawdzał juki."},{"type":"line","text":"Rozmawiał z ludźmi."},{"type":"line","text":"Ale z każdym dniem zdanie wracało częściej."},{"type":"line","text":"Oddaj miarę."},{"type":"line","text":"Oddaj miarę."},{"type":"line","text":"Oddaj miarę."},{"type":"line","text":"Siódmego dnia podróży zerwała się burza piaskowa."},{"type":"line","text":"Niebo zniknęło."},{"type":"line","text":"Świat stał się żółtą ścianą."},{"type":"line","text":"Salim krzyczał rozkazy, ale wiatr porywał słowa."},{"type":"line","text":"Ludzie zasłaniali twarze."},{"type":"line","text":"Wielbłądy ryczały."},{"type":"line","text":"Karawana zatrzymała się i zbiła w ciasny krąg."},{"type":"line","text":"Burza trwała wiele godzin."},{"type":"line","text":"Kiedy ucichła, okazało się, że część juków została uszkodzona, a kilka bel tkanin zasypał piasek."},{"type":"line","text":"Farid kazał wszystko sprawdzić."},{"type":"line","text":"Wtedy odkrył, że jedna z najcenniejszych bel jedwabiu zniknęła."},{"type":"line","text":"Ta przeznaczona na szaty młodego księcia."},{"type":"line","text":"Bez niej zamówienie nie było pełne."},{"type":"line","text":"Bez niej cały kontrakt mógł przepaść."},{"type":"line","text":"Ludzie szukali do zmroku."},{"type":"line","text":"Bez skutku."},{"type":"line","text":"Farid był blady ze złości i lęku."},{"type":"line","text":"— Musimy zawrócić — powiedział."},{"type":"line","text":"Salim pokręcił głową."},{"type":"line","text":"— Jeśli zawrócimy, zabraknie nam wody."},{"type":"line","text":"— Jeśli pojedziemy dalej, nie dostarczę pełnego zamówienia."},{"type":"line","text":"— Może właśnie o to chodzi — odparł Salim."},{"type":"line","text":"Farid spojrzał na niego ostro."},{"type":"line","text":"— O co?"},{"type":"line","text":"Stary przewodnik wskazał na puste miejsce w jukach."},{"type":"line","text":"— Studnia powiedziała: oddaj miarę. Może teraz ty wiesz, jak to jest, gdy brakuje tego, co powinno być."},{"type":"line","text":"Kupiec nie odpowiedział."},{"type":"line","text":"Gniew zagotował się w nim szybko."},{"type":"line","text":"Ale pod gniewem było coś innego."},{"type":"line","text":"Wstyd."},{"type":"line","text":"Nocą znów usłyszał głos."},{"type":"line","text":"Tym razem nie z prawdziwej studni, bo wokół była tylko pustynia."},{"type":"line","text":"Głos przyszedł z bukłaka z wodą."},{"type":"line","text":"— Oddaj miarę."},{"type":"line","text":"Farid wstał i odszedł kawałek od obozu."},{"type":"line","text":"Usiadł na piasku."},{"type":"line","text":"Przez długi czas patrzył w ciemność."},{"type":"line","text":"Wreszcie powiedział:"},{"type":"line","text":"— Nie wiem, jak mam oddać. Tamtej kobiety już pewnie nie znajdę. To było dawno. Nie wiem, gdzie mieszka. Nie wiem, czy żyje."},{"type":"line","text":"Piasek poruszył się lekko, choć nie było wiatru."},{"type":"line","text":"Głos odpowiedział:"},{"type":"line","text":"— Prawda nie zawsze żąda tej samej dłoni. Czasem żąda tego samego dobra."},{"type":"line","text":"Farid nie spał do rana."},{"type":"line","text":"Kiedy słońce wzeszło, kazał otworzyć własną skrzynię."},{"type":"line","text":"Była w niej tkanina, której nie zamierzał sprzedawać."},{"type":"line","text":"Najpiękniejszy jedwab, jaki posiadał."},{"type":"line","text":"Granatowy, tak głęboki, że wyglądał jak noc nad pustynią, z delikatnym srebrnym haftem przypominającym gwiazdy."},{"type":"line","text":"Miał go zachować dla siebie."},{"type":"line","text":"Na szatę, którą założy kiedyś podczas najważniejszej uczty swojego życia."},{"type":"line","text":"Farid wyjął materiał i podał go słudze."},{"type":"line","text":"— Zastąpi brakującą belę — powiedział."},{"type":"line","text":"Pomocnik aż otworzył usta."},{"type":"line","text":"— Panie, ale to twój prywatny skarb."},{"type":"line","text":"— Już nie."},{"type":"line","text":"Salim patrzył na niego uważnie, ale nic nie powiedział."},{"type":"line","text":"Karawana ruszyła dalej."},{"type":"line","text":"Głos ucichł."},{"type":"line","text":"Przez dwa dni Farid go nie słyszał."},{"type":"line","text":"Pomyślał, że sprawa dobiegła końca."},{"type":"line","text":"Mylił się."},{"type":"line","text":"Gdy dotarli do królestwa po drugiej stronie pustyni, przyjęto ich na wielkim dziedzińcu pałacowym."},{"type":"line","text":"Urzędnicy sprawdzali towar."},{"type":"line","text":"Mierzyli tkaniny."},{"type":"line","text":"Liczyli bele."},{"type":"line","text":"Oglądali dywany."},{"type":"line","text":"Wszystko się zgadzało."},{"type":"line","text":"Granatowy jedwab wzbudził zachwyt."},{"type":"line","text":"— Ten materiał jest piękniejszy niż zamówiony — powiedział nadworny zarządca. — Młody książę będzie wyglądał w nim jak noc pełna gwiazd."},{"type":"line","text":"Farid powinien poczuć ulgę."},{"type":"line","text":"Poczuł ją."},{"type":"line","text":"Ale nie tylko."},{"type":"line","text":"Gdy patrzył, jak słudzy niosą tkaniny do pałacu, zobaczył przy bocznej bramie kobietę."},{"type":"line","text":"Starą."},{"type":"line","text":"Ubraną skromnie."},{"type":"line","text":"Stała z koszem nici i igieł, czekając, aż ktoś pozwoli jej wejść."},{"type":"line","text":"Farid nie wiedział dlaczego, ale serce ścisnęło mu się nagle."},{"type":"line","text":"Podszedł do zarządcy."},{"type":"line","text":"— Kim jest ta kobieta?"},{"type":"line","text":"Zarządca spojrzał."},{"type":"line","text":"— To stara Hafsa. Szyje dla pałacu drobne rzeczy. Dawniej jej mąż handlował tkaninami, ale zmarł wiele lat temu. Podobno straciła wtedy prawie wszystko."},{"type":"line","text":"Farid poczuł, jak ziemia usuwa mu się spod stóp."},{"type":"line","text":"— Hafsa? — powtórzył."},{"type":"line","text":"Imię wróciło do niego jak kamień rzucony z przeszłości."},{"type":"line","text":"Tak miała na imię wdowa."},{"type":"line","text":"Ta sama."},{"type":"line","text":"Albo niemożliwie podobna."},{"type":"line","text":"Farid podszedł do kobiety."},{"type":"line","text":"— Pani — powiedział ostrożnie — czy wiele lat temu sprzedałaś młodemu kupcowi skrzynię tkanin po swoim mężu?"},{"type":"line","text":"Kobieta zmrużyła oczy."},{"type":"line","text":"Przyjrzała mu się długo."},{"type":"line","text":"— Sprzedałam — powiedziała. — Byłam wtedy głupia z rozpaczy. Nie znałam wartości tego, co oddaję. Młody kupiec zapłacił mało. Za mało. Ale taka była moja cena."},{"type":"line","text":"Farid spuścił głowę."},{"type":"line","text":"— To byłem ja."},{"type":"line","text":"Hafsa milczała."},{"type":"line","text":"Jej twarz nie zmieniła się od razu."},{"type":"line","text":"Tylko palce mocniej zacisnęły się na uchwycie kosza."},{"type":"line","text":"— Wiem — powiedziała po chwili."},{"type":"line","text":"Farid podniósł wzrok."},{"type":"line","text":"— Wiedziałaś?"},{"type":"line","text":"— Poznałam cię, gdy tylko wszedłeś na dziedziniec. Ludzie się starzeją, ale niektóre spojrzenia zostają takie same. Twoje wtedy uciekało przed moim. Dzisiaj też."},{"type":"line","text":"Kupiec poczuł, że nie ma gdzie się schować."},{"type":"line","text":"Nie było studni."},{"type":"line","text":"Nie było ciemności."},{"type":"line","text":"Było południe, pałacowy dziedziniec i prawda stojąca przed nim w postaci starej kobiety."},{"type":"line","text":"— Skrzywdziłem cię — powiedział Farid. — Nie ukradłem, ale wiedziałem więcej niż ty i użyłem tej wiedzy przeciwko tobie. Przez lata udawałem, że to był tylko handel. To nieprawda. To była nieuczciwość."},{"type":"line","text":"Hafsa patrzyła na niego bez uśmiechu."},{"type":"line","text":"— Dlaczego mówisz to teraz?"},{"type":"line","text":"Farid opowiedział jej o studni."},{"type":"line","text":"O głosie."},{"type":"line","text":"O burzy."},{"type":"line","text":"O utraconej beli."},{"type":"line","text":"O granatowym jedwabiu, który oddał zamiast niej."},{"type":"line","text":"Kobieta słuchała długo."},{"type":"line","text":"— Pustynia ma dziwne sposoby — powiedziała w końcu. — Ale nie studnia mnie skrzywdziła. Ty mnie skrzywdziłeś. Więc to nie studni powinieneś oddać miarę."},{"type":"line","text":"Farid skinął głową."},{"type":"line","text":"Zdjął z pasa sakiewkę."},{"type":"line","text":"Nie jedną."},{"type":"line","text":"Potem drugą, ukrytą pod szatą."},{"type":"line","text":"Potem wyjął dokumenty z zapłatą za zamówienie."},{"type":"line","text":"Na oczach zarządcy i ludzi z karawany przekazał Hafsie tyle złota, ile warta była tamta tkanina wraz z zyskiem, który dzięki niej osiągnął."},{"type":"line","text":"A potem dodał jeszcze więcej."},{"type":"line","text":"— To nie cofnie lat — powiedział. — Nie naprawi wszystkiego. Ale jest uczciwszą miarą niż ta, którą dałem ci wtedy."},{"type":"line","text":"Hafsa nie wzięła pieniędzy od razu."},{"type":"line","text":"Patrzyła na niego, jakby ważyła nie złoto, lecz jego słowa."},{"type":"line","text":"W końcu przyjęła sakiewki."},{"type":"line","text":"— Nie wiem, czy ci wybaczam — powiedziała. — Wybaczenie nie jest monetą, którą podaje się od razu za ladą. Ale widzę, że przestałeś uciekać. To już coś."},{"type":"line","text":"Farid skłonił głowę."},{"type":"line","text":"— Dziękuję."},{"type":"line","text":"Tego wieczoru pałac wyprawił ucztę z okazji dostarczenia tkanin."},{"type":"line","text":"Młody książę otrzymał granatową szatę uszytą z jedwabiu Farida."},{"type":"line","text":"Kiedy wszedł do sali, ludzie westchnęli z zachwytu. Materiał wyglądał jak nocne niebo, które ktoś zarzucił na ramiona człowieka."},{"type":"line","text":"Farid patrzył na to spokojnie."},{"type":"line","text":"Dawniej bolałoby go, że nie ma tej tkaniny dla siebie."},{"type":"line","text":"Teraz czuł coś innego."},{"type":"line","text":"Lekkość."},{"type":"line","text":"Jakby z jego własnych ramion zdjęto płaszcz, którego ciężaru przez lata nie zauważał."},{"type":"line","text":"W drodze powrotnej karawana znów zatrzymała się przy Studni Głosów."},{"type":"line","text":"Ludzie rozbijali obóz ostrożnie, z szacunkiem."},{"type":"line","text":"Farid podszedł do kamiennego kręgu."},{"type":"line","text":"Tym razem sam."},{"type":"line","text":"Noc była jasna."},{"type":"line","text":"Gwiazdy odbijały się w ciemnej wodzie głęboko na dole."},{"type":"line","text":"Kupiec stanął przy studni, ale nie zaglądał długo."},{"type":"line","text":"— Oddałem miarę — powiedział."},{"type":"line","text":"Przez chwilę nie było odpowiedzi."},{"type":"line","text":"Potem ze studni dobiegł cichy dźwięk."},{"type":"line","text":"Nie głos."},{"type":"line","text":"Nie szept."},{"type":"line","text":"Raczej westchnienie wody."},{"type":"line","text":"Jakby coś, co długo było napięte, wreszcie mogło odpocząć."},{"type":"line","text":"Farid zrozumiał, że głos nie wróci."},{"type":"line","text":"Salim stanął obok niego."},{"type":"line","text":"— I czego nauczyła cię studnia? — zapytał."},{"type":"line","text":"Farid pomyślał chwilę."},{"type":"line","text":"— Że człowiek może zakopać prawdę bardzo głęboko. Ale jeśli jest naprawdę jego, rozpozna jego imię nawet po latach."},{"type":"line","text":"Salim uśmiechnął się pod wąsem."},{"type":"line","text":"— Dobra odpowiedź."},{"type":"line","text":"Rankiem Farid nabrał wody ze studni do bukłaka."},{"type":"line","text":"Była zimna, czysta i słodka."},{"type":"line","text":"Najlepsza, jaką pił w życiu."},{"type":"line","text":"Po powrocie do miasta Farid zmienił kilka rzeczy w swoim sklepie."},{"type":"line","text":"Nie wielkich."},{"type":"line","text":"Nie takich, o których krzyczy się na targu."},{"type":"line","text":"Po prostu odtąd przy każdej transakcji mówił więcej prawdy niż było wygodnie."},{"type":"line","text":"Jeśli ktoś nie znał wartości towaru, wyjaśniał ją."},{"type":"line","text":"Jeśli materiał miał wadę, pokazywał ją od razu."},{"type":"line","text":"Jeśli ktoś płacił za dużo z niewiedzy, oddawał nadmiar."},{"type":"line","text":"Niektórzy kupcy śmiali się z niego."},{"type":"line","text":"— W ten sposób nie zostaniesz najbogatszy — mówili."},{"type":"line","text":"Farid odpowiadał:"},{"type":"line","text":"— Może. Ale będę spał spokojniej."},{"type":"line","text":"A to, jak odkrył na pustyni, bywa warte więcej niż złoto."},{"type":"line","text":"Podobno wiele lat później, kiedy Farid sam był już stary i uczył handlu młodych uczniów, zawsze powtarzał im trzy zasady ojca:"},{"type":"line","text":"Pilnuj słowa."},{"type":"line","text":"Pilnuj miary."},{"type":"line","text":"Pilnuj zaufania."},{"type":"line","text":"A potem dodawał czwartą — swoją własną:"},{"type":"line","text":"Jeśli kiedyś usłyszysz, że prawda woła cię po imieniu, nie uciekaj."},{"type":"line","text":"Bo prawda może przestraszyć."},{"type":"line","text":"Może zaboleć."},{"type":"line","text":"Może zabrać ci coś, co bardzo chciałeś zatrzymać."},{"type":"line","text":"Ale kiedy już ją wypowiesz, serce robi się lżejsze."},{"type":"line","text":"I nawet pustynna noc przestaje być taka ciemna."},{"type":"section","text":"— ZAKOŃCZENIE PODCASTOWE —"},{"type":"line","text":"I tak kończy się dzisiejsza opowieść: „Kupiec i tajemnica pustynnej studni”."},{"type":"line","text":"To historia o człowieku, który przez wiele lat niósł w sobie niewypowiedzianą prawdę."},{"type":"line","text":"O studni, która nie dawała tylko wody."},{"type":"line","text":"I o tym, że uczciwość nie zawsze zaczyna się wtedy, gdy jest łatwo."},{"type":"line","text":"Czasem zaczyna się dopiero wtedy, gdy trzeba wrócić do własnego błędu i powiedzieć:"},{"type":"line","text":"to byłem ja."},{"type":"line","text":"Jeśli ta historia została z tobą choć na chwilę, zabierz jej mały kawałek do snu."},{"type":"line","text":"Może będzie to pustynna studnia pod gwiazdami."},{"type":"line","text":"Może karawana idąca przez noc."},{"type":"line","text":"A może jedno zdanie:"},{"type":"line","text":"pilnuj słowa, miary i zaufania."},{"type":"line","text":"Więcej bajek, legend i tajemniczych opowieści znajdziesz na stronie 3tatata.pl."},{"type":"line","text":"Możesz nas także słuchać na Spotify i oglądać na YouTube."},{"type":"line","text":"Zostaw follow albo subskrypcję, żeby nie przegapić kolejnych historii."},{"type":"line","text":"Dobranoc — i do usłyszenia w następnej bajce."}]},{"id":10,"title":"DZIEWCZYNKA, KTÓRA SŁYSZAŁA PIASEK","tag":"Opowieść","sections":[{"type":"title","text":"DZIEWCZYNKA, KTÓRA SŁYSZAŁA PIASEK"},{"type":"meta","text":"3TaTaTa — Opowieści z dalekich krain"},{"type":"section","text":"— WSTĘP DO ODCINKA —"},{"type":"line","text":"Czy piasek może mówić?"},{"type":"line","text":"Większość ludzi odpowie, że nie."},{"type":"line","text":"Piasek może szeleścić pod stopami."},{"type":"line","text":"Może przesypywać się między palcami."},{"type":"line","text":"Może skrzypieć pod kołami wozu albo tańczyć na wietrze."},{"type":"line","text":"Ale mówić?"},{"type":"line","text":"Nie."},{"type":"line","text":"A jednak są miejsca, w których pustynia pamięta więcej niż ludzie."},{"type":"line","text":"Pamięta kroki karawan."},{"type":"line","text":"Pamięta głosy tych, którzy zgubili drogę."},{"type":"line","text":"Pamięta śmiech dzieci, modlitwy podróżnych i tajemnice schowane pod wydmami."},{"type":"line","text":"Tylko trzeba umieć słuchać."},{"type":"line","text":"Dzisiaj opowiem ci o dziewczynce, która słyszała piasek."},{"type":"line","text":"Nie dlatego, że miała magiczne uszy."},{"type":"line","text":"Dlatego, że jako jedna z niewielu naprawdę słuchała świata."},{"type":"line","text":"DZIEWCZYNKA, KTÓRA SŁYSZAŁA PIASEK"},{"type":"line","text":"Dawno temu, na skraju wielkiej pustyni, istniała mała osada zbudowana z gliny, drewna palmowego i cierpliwości."},{"type":"line","text":"Nazywała się Ajra."},{"type":"line","text":"W dzień jej domy miały kolor gorącego miodu."},{"type":"line","text":"Wieczorem robiły się różowe."},{"type":"line","text":"A nocą, gdy księżyc wschodził nad wydmami, wyglądały tak, jakby ktoś ulepił je z samego światła gwiazd."},{"type":"line","text":"W Ajrze mieszkali ludzie, którzy znali pustynię."},{"type":"line","text":"Wiedzieli, kiedy wiatr niesie burzę."},{"type":"line","text":"Wiedzieli, gdzie szukać cienia."},{"type":"line","text":"Wiedzieli, jak oszczędzać wodę i jak prowadzić wielbłąda, żeby nie zmęczyć go przed zachodem słońca."},{"type":"line","text":"Każde dziecko w osadzie uczyło się szybko, że pustynia nie jest pusta."},{"type":"line","text":"Jest pełna znaków."},{"type":"line","text":"Tylko większość z nich nie krzyczy."},{"type":"line","text":"Trzeba je zauważyć."},{"type":"line","text":"W tej osadzie mieszkała dziewczynka o imieniu Lajla."},{"type":"line","text":"Miała dziewięć lat, ciemne włosy, oczy uważne jak oczy małego ptaka i zwyczaj siadania w miejscach, gdzie nikt inny nie chciał siedzieć."},{"type":"line","text":"Na progu domu."},{"type":"line","text":"Pod starym tamaryszkiem."},{"type":"line","text":"Przy wyschniętym korycie rzeki."},{"type":"line","text":"Na skraju wydmy, kiedy wieczorny wiatr przesuwał po niej cienkie zmarszczki."},{"type":"line","text":"Lajla lubiła ciszę."},{"type":"line","text":"Nie taką pustą."},{"type":"line","text":"Taką, w której można coś usłyszeć."},{"type":"line","text":"Inne dzieci biegały, śmiały się, grały kamykami i chowały między koszami z daktylami."},{"type":"line","text":"Lajla czasem bawiła się z nimi, ale często odchodziła kawałek dalej i przykładała dłoń do piasku."},{"type":"line","text":"— Co ty robisz? — pytał jej młodszy brat, Sami."},{"type":"line","text":"— Słucham — odpowiadała."},{"type":"line","text":"— Czego?"},{"type":"line","text":"— Piasku."},{"type":"line","text":"Sami wybuchał śmiechem."},{"type":"line","text":"— Piasek nie mówi."},{"type":"line","text":"Lajla nie kłóciła się."},{"type":"line","text":"Nie dlatego, że nie miała odpowiedzi."},{"type":"line","text":"Dlatego, że niektórych rzeczy nie da się udowodnić komuś, kto już zdecydował, że ich nie ma."},{"type":"line","text":"Ojciec Lajli był przewodnikiem karawan."},{"type":"line","text":"Nazywał się Harun i miał twarz spaloną słońcem, dłonie twarde od lin i głos spokojny nawet wtedy, gdy inni zaczynali się bać."},{"type":"line","text":"Prowadził ludzi przez pustynię od wielu lat."},{"type":"line","text":"Znał gwiazdy, suche doliny, ukryte studnie i miejsca, których lepiej było unikać po zmroku."},{"type":"line","text":"Matka Lajli, Nura, tkała dywany."},{"type":"line","text":"Na jej dywanach pustynia nigdy nie była tylko żółta."},{"type":"line","text":"Była czerwona o świcie, biała w południe, fioletowa o zmierzchu i granatowa nocą."},{"type":"line","text":"— Świat ma więcej kolorów, niż widzą ludzie spieszący się za bardzo — mawiała."},{"type":"line","text":"Lajla bardzo lubiła to zdanie."},{"type":"line","text":"Pewnego roku nadeszła długa susza."},{"type":"line","text":"Nie była pierwsza."},{"type":"line","text":"Ludzie pustyni znają suszę tak, jak rybacy znają sztorm."},{"type":"line","text":"Ale ta trwała za długo."},{"type":"line","text":"Studnie robiły się płytkie."},{"type":"line","text":"Kozy dawały mniej mleka."},{"type":"line","text":"Daktyle na palmach były mniejsze."},{"type":"line","text":"Dzieciom kazano pić wodę powoli i nie wylewać nawet kropli."},{"type":"line","text":"W osadzie zaczęto mówić ciszej."},{"type":"line","text":"Nie dlatego, że brakowało głosów."},{"type":"line","text":"Dlatego, że każdy czuł, iż zbliża się trudny czas."},{"type":"line","text":"Pewnego wieczoru do Ajry przybyła karawana."},{"type":"line","text":"Była większa niż zwykle."},{"type":"line","text":"Miała kilkanaście wielbłądów, wozy przykryte płótnem i ludzi zmęczonych tak bardzo, jakby szli od końca świata."},{"type":"line","text":"Na jej czele jechał kupiec imieniem Baszar."},{"type":"line","text":"Miał bogate szaty, szeroki pas, pierścienie na palcach i oczy człowieka, który przywykł wydawać polecenia."},{"type":"line","text":"— Potrzebujemy przewodnika — powiedział do starszyzny osady. — Chcemy przejść przez Morze Wydm i dotrzeć do miasta Nadżar przed pełnią księżyca."},{"type":"line","text":"Ludzie spojrzeli po sobie."},{"type":"line","text":"Morze Wydm było najniebezpieczniejszą częścią pustyni."},{"type":"line","text":"Wydmy przesuwały się tam po każdej burzy."},{"type":"line","text":"Dawne drogi znikały."},{"type":"line","text":"Nowe wyglądały jak stare."},{"type":"line","text":"Nawet doświadczeni przewodnicy unikali tego miejsca, jeśli nie musieli tam iść."},{"type":"line","text":"Harun, ojciec Lajli, wysłuchał kupca uważnie."},{"type":"line","text":"— Teraz nie jest dobry czas — powiedział. — Wiatr zmienia kierunek. Piasek jest niespokojny."},{"type":"line","text":"Baszar skrzywił się."},{"type":"line","text":"— Piasek zawsze jest piaskiem."},{"type":"line","text":"W osadzie zrobiło się cicho."},{"type":"line","text":"Takie zdanie na pustyni brzmiało jak obraza."},{"type":"line","text":"Harun nie uniósł głosu."},{"type":"line","text":"— Piasek bywa drogą, zasłoną albo grobem. Zależy, czy człowiek go szanuje."},{"type":"line","text":"Kupiec westchnął niecierpliwie."},{"type":"line","text":"— Zapłacę podwójnie."},{"type":"line","text":"To zmieniło rozmowę."},{"type":"line","text":"Osada potrzebowała pieniędzy, jedzenia, nowych bukłaków i zapasów z miasta."},{"type":"line","text":"Po długiej naradzie Harun zgodził się poprowadzić karawanę, ale pod warunkiem, że wyruszą o świcie i będą słuchać jego poleceń."},{"type":"line","text":"Baszar zgodził się szybko."},{"type":"line","text":"Zbyt szybko."},{"type":"line","text":"Lajla słyszała całą rozmowę, siedząc za ścianą z suszonej gliny."},{"type":"line","text":"Tej nocy nie mogła zasnąć."},{"type":"line","text":"Wyszła przed dom."},{"type":"line","text":"Pustynia leżała nieruchomo pod gwiazdami."},{"type":"line","text":"Dziewczynka usiadła na chłodnym piasku i położyła na nim dłoń."},{"type":"line","text":"Przez chwilę nie działo się nic."},{"type":"line","text":"Potem usłyszała szept."},{"type":"line","text":"Nie uszami."},{"type":"line","text":"Nie tak, jak słyszy się głos człowieka."},{"type":"line","text":"Raczej gdzieś pod skórą."},{"type":"line","text":"Jakby drobne ziarenka piasku poruszały się w jej dłoni, układając w znaczenie."},{"type":"line","text":"Nie idźcie starą drogą."},{"type":"line","text":"Lajla wstrzymała oddech."},{"type":"line","text":"Szept powtórzył się."},{"type":"line","text":"Nie idźcie starą drogą."},{"type":"line","text":"Dziewczynka zerwała się i pobiegła do ojca."},{"type":"line","text":"Harun siedział przy lampie oliwnej i sprawdzał mapę wykonaną na wyprawionej skórze."},{"type":"line","text":"— Tato — powiedziała Lajla — pustynia mówi, żebyście nie szli starą drogą."},{"type":"line","text":"Ojciec podniósł wzrok."},{"type":"line","text":"Nie roześmiał się."},{"type":"line","text":"Nie skarcił jej."},{"type":"line","text":"Harun był człowiekiem pustyni i wiedział, że dzieci czasem słyszą rzeczy, które dorośli gubią pod ciężarem własnej pewności."},{"type":"line","text":"— Co dokładnie usłyszałaś?"},{"type":"line","text":"— Żeby nie iść starą drogą."},{"type":"line","text":"Harun spojrzał na mapę."},{"type":"line","text":"Stara droga przez Morze Wydm była najkrótsza."},{"type":"line","text":"Niebezpieczna, ale znana."},{"type":"line","text":"— Czy piasek powiedział coś jeszcze?"},{"type":"line","text":"Lajla zamknęła oczy, próbując przypomnieć sobie szept."},{"type":"line","text":"— Brzmiał... jakby coś było pod spodem. Jakby puste miejsce."},{"type":"line","text":"Ojciec długo milczał."},{"type":"line","text":"— Dziękuję, córko."},{"type":"line","text":"Następnego ranka Harun oznajmił karawanie, że pójdą dłuższą trasą, łukiem przy kamiennych wzgórzach."},{"type":"line","text":"Baszar zaprotestował natychmiast."},{"type":"line","text":"— To strata czasu! Zapłaciłem za przejście do Nadżaru przed pełnią."},{"type":"line","text":"— Zapłaciłeś za to, żebym doprowadził cię żywego — odpowiedział Harun. — Nie za to, żebym udawał, że pustynia słucha twoich terminów."},{"type":"line","text":"Kupiec poczerwieniał."},{"type":"line","text":"Ale ludzie karawany poparli przewodnika."},{"type":"line","text":"Wyruszyli więc dłuższą drogą."},{"type":"line","text":"Lajla patrzyła, jak ojciec znika za pierwszą wydmą."},{"type":"line","text":"Czuła niepokój."},{"type":"line","text":"Nie taki jak wtedy, gdy boi się burzy."},{"type":"line","text":"Inny."},{"type":"line","text":"Jakby opowieść dopiero zaczęła się otwierać."},{"type":"line","text":"Przez dwa dni z osady nie było żadnych wieści."},{"type":"line","text":"Trzeciego dnia wiatr zmienił kierunek."},{"type":"line","text":"Najpierw delikatnie."},{"type":"line","text":"Potem gwałtownie."},{"type":"line","text":"Nad południowym horyzontem pojawiła się żółta smuga."},{"type":"line","text":"Starsi wyszli przed domy."},{"type":"line","text":"Nura, matka Lajli, ścisnęła córkę za ramię."},{"type":"line","text":"— Burza piaskowa — powiedziała."},{"type":"line","text":"Wszyscy zabezpieczali drzwi, przykrywali studnie, wiązali zwierzęta i wnosili do domów wszystko, co mógł porwać wiatr."},{"type":"line","text":"Burza nadeszła przed wieczorem."},{"type":"line","text":"Niebo zniknęło."},{"type":"line","text":"Słońce zgasło w żółtej ciemności."},{"type":"line","text":"Piasek uderzał w ściany jak tysiące małych palców."},{"type":"line","text":"Lajla siedziała w domu z matką i bratem, ale przez cały czas słyszała coś pod wyciem wiatru."},{"type":"line","text":"Szept."},{"type":"line","text":"Nie słowa."},{"type":"line","text":"Jeszcze nie."},{"type":"line","text":"Raczej wołanie."},{"type":"line","text":"Po kilku godzinach burza ucichła."},{"type":"line","text":"Osada była zasypana piaskiem po progi."},{"type":"line","text":"Ludzie wyszli sprawdzać szkody."},{"type":"line","text":"Wtedy od strony pustyni nadbiegł wielbłąd."},{"type":"line","text":"Sam."},{"type":"line","text":"Bez jeźdźca."},{"type":"line","text":"Miał zerwaną uprząż i ślady paniki w oczach."},{"type":"line","text":"Lajla rozpoznała go od razu."},{"type":"line","text":"To był wielbłąd jej ojca."},{"type":"line","text":"Nura pobladła."},{"type":"line","text":"Mężczyźni z osady zebrali się szybko."},{"type":"line","text":"— Karawana mogła zostać rozdzielona — powiedział jeden."},{"type":"line","text":"— Mogli ukryć się przy skałach — powiedział drugi, ale w jego głosie nie było pewności."},{"type":"line","text":"Lajla podeszła do wielbłąda i położyła dłoń na jego szyi."},{"type":"line","text":"Zwierzę drżało."},{"type":"line","text":"Na jego sierści, między ziarnami piasku, dziewczynka zobaczyła drobny, szary pył."},{"type":"line","text":"Nie taki jak zwykły piasek."},{"type":"line","text":"Bardziej jak sproszkowany kamień."},{"type":"line","text":"Lajla uklękła."},{"type":"line","text":"Dotknęła ziemi."},{"type":"line","text":"I znów usłyszała pustynię."},{"type":"line","text":"Pod starą drogą otworzyła się jama."},{"type":"line","text":"Głos był cichy, ale wyraźny."},{"type":"line","text":"Lajla zerwała się."},{"type":"line","text":"— Oni są przy starej drodze!"},{"type":"line","text":"Jeden ze starszych mężczyzn zmarszczył brwi."},{"type":"line","text":"— Skąd wiesz?"},{"type":"line","text":"— Piasek powiedział."},{"type":"line","text":"Kilku ludzi spojrzało po sobie."},{"type":"line","text":"W trudnych chwilach dorośli często boją się uwierzyć dziecku, bo wtedy musieliby przyznać, że sami nie mają odpowiedzi."},{"type":"line","text":"Nura uklękła przy córce."},{"type":"line","text":"— Jesteś pewna?"},{"type":"line","text":"Lajla zamknęła oczy."},{"type":"line","text":"Słuchała."},{"type":"line","text":"Wiatr już ucichł, ale pod ziemią, pod ciszą, drobne ziarenka mówiły dalej."},{"type":"line","text":"Nie wszyscy."},{"type":"line","text":"Ale ktoś żyje."},{"type":"line","text":"— Tak — powiedziała. — Musimy iść teraz."},{"type":"line","text":"Starszyzna wahała się."},{"type":"line","text":"Wtedy odezwał się Salih, najstarszy człowiek w osadzie, który od lat prawie nie wychodził poza cień swojego domu."},{"type":"line","text":"— Kiedy byłem dzieckiem, moja babka mówiła, że niektórzy rodzą się z uchem dla pustyni — powiedział. — Nie lekceważcie tego. Pustynia zabiera szybko, ale czasem ostrzega wcześniej. Jeśli dziewczynka słyszy, idźcie za nią."},{"type":"line","text":"Zebrano grupę ratunkową."},{"type":"line","text":"Nura nie chciała puścić córki, ale Lajla znała kierunek tylko wtedy, gdy dotykała piasku."},{"type":"line","text":"Poszła więc z nimi."},{"type":"line","text":"Dostała chustę na twarz, mały bukłak wody i polecenie, by ani na krok nie oddalać się od dorosłych."},{"type":"line","text":"Ruszyli przed świtem."},{"type":"line","text":"Pustynia po burzy była inna."},{"type":"line","text":"Wydmy zmieniły kształt."},{"type":"line","text":"Znane ścieżki zniknęły."},{"type":"line","text":"Tam, gdzie wcześniej była płaska równina, leżały nowe pagórki."},{"type":"line","text":"Tam, gdzie wczoraj wznosiła się wydma, teraz ciągnął się niski grzbiet piasku."},{"type":"line","text":"Lajla szła powoli."},{"type":"line","text":"Co jakiś czas klękała i przykładała dłoń do ziemi."},{"type":"line","text":"Piasek nie mówił zdaniami cały czas."},{"type":"line","text":"Czasem pokazywał kierunek uczuciem ciepła."},{"type":"line","text":"Czasem cichym szelestem."},{"type":"line","text":"Czasem obrazem, który pojawiał się w jej głowie: pęknięty kamień, zerwana lina, przewrócony bukłak."},{"type":"line","text":"Po kilku godzinach dotarli do miejsca, gdzie zaczynała się stara droga przez Morze Wydm."},{"type":"line","text":"Harun miał nią nie iść."},{"type":"line","text":"A jednak ślady karawany prowadziły właśnie tam."},{"type":"line","text":"— Dlaczego? — wyszeptała Lajla."},{"type":"line","text":"Jeden z mężczyzn obejrzał ślady."},{"type":"line","text":"— Ktoś zawrócił z dłuższej trasy."},{"type":"line","text":"Lajla zrozumiała."},{"type":"line","text":"Baszar."},{"type":"line","text":"Kupiec musiał wymusić na karawanie krótszą drogę albo poprowadzić część ludzi inaczej."},{"type":"line","text":"Weszli głębiej między wydmy."},{"type":"line","text":"W końcu zobaczyli wielką dziurę w ziemi."},{"type":"line","text":"Nie wyglądała jak zwykłe zapadlisko."},{"type":"line","text":"Była szeroka, o poszarpanych brzegach, jakby pustynia otworzyła usta."},{"type":"line","text":"Na dole leżały połamane skrzynie, worki, fragmenty uprzęży i jeden przewrócony wóz."},{"type":"line","text":"Lajla sercem poczuła strach tak mocny, że przez chwilę nie mogła oddychać."},{"type":"line","text":"— Tato! — krzyknęła."},{"type":"line","text":"Echo odpowiedziało jej z głębi."},{"type":"line","text":"Przez moment nic."},{"type":"line","text":"Potem usłyszeli słaby głos."},{"type":"line","text":"— Tutaj!"},{"type":"line","text":"To był Harun."},{"type":"line","text":"Żył."},{"type":"line","text":"Mężczyźni rzucili liny."},{"type":"line","text":"Ostrożnie schodzili w dół."},{"type":"line","text":"W jamie znaleźli kilku ludzi z karawany, rannych, wyczerpanych, ale żywych."},{"type":"line","text":"Harun miał skaleczone ramię i twarz pokrytą pyłem, ale kiedy zobaczył córkę, w jego oczach pojawiła się ulga."},{"type":"line","text":"— Wiedziałem, że usłyszysz — powiedział cicho."},{"type":"line","text":"Lajla chciała go objąć, ale najpierw trzeba było wydostać wszystkich."},{"type":"line","text":"— Gdzie Baszar? — zapytał jeden z ratowników."},{"type":"line","text":"Harun wskazał ciemniejszą część jamy."},{"type":"line","text":"— Tam. Żyje, ale jest uwięziony pod belką."},{"type":"line","text":"Kupiec, który tak bardzo się spieszył, leżał blady i przerażony."},{"type":"line","text":"Nie wyglądał już jak człowiek wydający rozkazy."},{"type":"line","text":"Wyglądał jak ktoś, kto zrozumiał, że pustynia nie pyta o bogactwo, zanim postanowi kogoś zatrzymać."},{"type":"line","text":"— Pomocy — wyszeptał."},{"type":"line","text":"Mężczyźni zaczęli usuwać belkę, ale ziemia pod nimi osuwała się niebezpiecznie."},{"type":"line","text":"Lajla uklękła i przyłożyła dłoń do piasku."},{"type":"line","text":"Pustynia szeptała szybko."},{"type":"line","text":"Za szybko."},{"type":"line","text":"Nie tam."},{"type":"line","text":"Pod spodem pusto."},{"type":"line","text":"Prawa strona."},{"type":"line","text":"Kamień trzyma."},{"type":"line","text":"— Nie stawajcie tam! — krzyknęła dziewczynka. — Z prawej strony! Przy kamieniu!"},{"type":"line","text":"Mężczyźni posłuchali."},{"type":"line","text":"Chwilę później miejsce, w którym przedtem chcieli stanąć, zapadło się z sykiem piasku."},{"type":"line","text":"Nikt już nie pytał, skąd Lajla wie."},{"type":"line","text":"Wydobyli Baszara."},{"type":"line","text":"Potem, jednego po drugim, wyciągnęli ocalałych."},{"type":"line","text":"Gdy ostatni człowiek znalazł się na powierzchni, jama osunęła się częściowo i zasypała resztę wozu."},{"type":"line","text":"Gdyby przyszli godzinę później, mogłoby nie być kogo ratować."},{"type":"line","text":"W drodze powrotnej Baszar milczał."},{"type":"line","text":"Nie narzekał na stracony towar."},{"type":"line","text":"Nie mówił o terminie."},{"type":"line","text":"Nie pytał o pieniądze."},{"type":"line","text":"Dopiero wieczorem, kiedy zatrzymali się przy małych skałach, poprosił, żeby zaniesiono go do Haruna i Lajli."},{"type":"line","text":"Usiadł z trudem."},{"type":"line","text":"— To moja wina — powiedział."},{"type":"line","text":"Harun patrzył na niego spokojnie."},{"type":"line","text":"— Poszedłeś starą drogą."},{"type":"line","text":"Baszar spuścił głowę."},{"type":"line","text":"— Kazałem ludziom zawrócić. Powiedziałem, że nie zapłacę, jeśli nie dotrzemy szybciej. Myślałem, że pustynia to przeszkoda. Że można ją pokonać uporem."},{"type":"line","text":"Lajla siedziała obok ojca i słuchała."},{"type":"line","text":"Kupiec spojrzał na nią."},{"type":"line","text":"— A ty ją usłyszałaś."},{"type":"line","text":"— Ona mówi bardzo cicho — odpowiedziała dziewczynka."},{"type":"line","text":"Baszar przez chwilę milczał."},{"type":"line","text":"— Czy... czy ona jest zła?"},{"type":"line","text":"Lajla położyła dłoń na piasku."},{"type":"line","text":"Słuchała."},{"type":"line","text":"Potem pokręciła głową."},{"type":"line","text":"— Nie. Jest stara. I nie lubi, kiedy ludzie udają, że jej nie ma."},{"type":"line","text":"Kupiec zamknął oczy."},{"type":"line","text":"To zdanie zostało z nim na długo."},{"type":"line","text":"Gdy wrócili do Ajry, osada przyjęła ich z radością i płaczem."},{"type":"line","text":"Nura objęła Haruna, potem Lajlę, a potem znów Haruna, jakby musiała policzyć ich własnymi ramionami."},{"type":"line","text":"Przez wiele dni opatrywano rannych, naprawiano sprzęt i dzielono zapasy."},{"type":"line","text":"Baszar, choć stracił część towarów, zapłacił ludziom więcej, niż obiecał."},{"type":"line","text":"Oddał też osadzie część jedzenia i bukłaków."},{"type":"line","text":"— To za to, że uratowaliście moje życie — powiedział."},{"type":"line","text":"Harun skinął głową."},{"type":"line","text":"— Życie ratuje się dlatego, że jest życiem. Nie dlatego, że ktoś zapłaci."},{"type":"line","text":"Baszar przyjął te słowa bez urazy."},{"type":"line","text":"Coś w nim zmieniło się pod ziemią."},{"type":"line","text":"A Lajla?"},{"type":"line","text":"Od tego dnia ludzie patrzyli na nią inaczej."},{"type":"line","text":"Nie jak na dziwną dziewczynkę, która słucha piasku."},{"type":"line","text":"Jak na kogoś, kto ma dar."},{"type":"line","text":"Ale dar nie zawsze jest łatwy."},{"type":"line","text":"Czasem dzieci podbiegały do niej i prosiły:"},{"type":"line","text":"— Powiedz, co mówi piasek!"},{"type":"line","text":"— Czy jutro będzie burza?"},{"type":"line","text":"— Czy mój brat wróci z miasta?"},{"type":"line","text":"— Czy znajdę zgubiony pierścień?"},{"type":"line","text":"Lajla nie potrafiła odpowiadać na wszystko."},{"type":"line","text":"Piasek nie był sługą."},{"type":"line","text":"Nie był zabawką."},{"type":"line","text":"Nie mówił na zawołanie."},{"type":"line","text":"Mówił wtedy, kiedy miał coś ważnego do powiedzenia."},{"type":"line","text":"Pewnego wieczoru Lajla poszła z ojcem na skraj wydm."},{"type":"line","text":"Słońce zachodziło."},{"type":"line","text":"Piasek miał kolor miedzi."},{"type":"line","text":"Harun usiadł obok córki."},{"type":"line","text":"— Boisz się tego daru? — zapytał."},{"type":"line","text":"Lajla pomyślała chwilę."},{"type":"line","text":"— Trochę."},{"type":"line","text":"— To dobrze."},{"type":"line","text":"Spojrzała na niego zdziwiona."},{"type":"line","text":"— Dobrze?"},{"type":"line","text":"— Jeśli ktoś wcale nie boi się daru, może zacząć używać go bez szacunku. A każdy prawdziwy dar potrzebuje szacunku."},{"type":"line","text":"Lajla przesypała garść piasku między palcami."},{"type":"line","text":"— Czasem chciałabym być zwyczajna."},{"type":"line","text":"Harun uśmiechnął się łagodnie."},{"type":"line","text":"— Każdy jest zwyczajny przez większość dnia. Nawet człowiek, który zna gwiazdy, musi zawiązać sandał. Nawet dziewczynka, która słyszy piasek, musi zjeść kolację i posprzątać po sobie miskę."},{"type":"line","text":"Lajla roześmiała się cicho."},{"type":"line","text":"Potem oboje długo siedzieli w milczeniu."},{"type":"line","text":"Po pewnym czasie wiatr przesunął się po wydmie."},{"type":"line","text":"Piasek zaszeleścił."},{"type":"line","text":"Lajla zamknęła oczy."},{"type":"line","text":"Tym razem nie usłyszała ostrzeżenia."},{"type":"line","text":"Nie usłyszała strachu."},{"type":"line","text":"Usłyszała coś jak opowieść."},{"type":"line","text":"Bardzo starą."},{"type":"line","text":"O rzece, która kiedyś płynęła przez to miejsce."},{"type":"line","text":"O rybach błyszczących w słońcu."},{"type":"line","text":"O dzieciach biegających po brzegu."},{"type":"line","text":"O ludziach, którzy budowali domy tam, gdzie dziś były tylko wydmy."},{"type":"line","text":"Pustynia pamiętała, że kiedyś nie była pustynią."},{"type":"line","text":"Lajla otworzyła oczy."},{"type":"line","text":"— Tato — powiedziała — piasek pamięta wodę."},{"type":"line","text":"Harun spojrzał na daleki horyzont."},{"type":"line","text":"— Wszystko coś pamięta — odparł. — Ludzie, kamienie, drzewa, pustynia. Tylko nie wszystko umie opowiedzieć to tak, żebyśmy zrozumieli."},{"type":"line","text":"Od tamtej pory Lajla uczyła się słuchać mądrzej."},{"type":"line","text":"Nie tylko piasku."},{"type":"line","text":"Ludzi też."},{"type":"line","text":"Słuchała matki, kiedy opowiadała o kolorach ukrytych w tkaninach."},{"type":"line","text":"Słuchała ojca, kiedy mówił o gwiazdach."},{"type":"line","text":"Słuchała młodszego brata, nawet gdy mówił rzeczy szybkie, pomieszane i pełne dziecięcych pomysłów."},{"type":"line","text":"Odkryła, że każdy człowiek ma w sobie jakiś piasek — małe ziarenka wspomnień, lęków, marzeń i cichych próśb."},{"type":"line","text":"I że często wystarczy usiąść obok kogoś spokojnie, żeby usłyszeć więcej, niż mówi jego głos."},{"type":"line","text":"Po latach Lajla została przewodniczką."},{"type":"line","text":"Nie taką samą jak ojciec."},{"type":"line","text":"Inną."},{"type":"line","text":"Ludzie przychodzili do niej, gdy bali się drogi."},{"type":"line","text":"Gdy szukali zaginionych studni."},{"type":"line","text":"Gdy chcieli przejść przez miejsca, których nie było już na mapach."},{"type":"line","text":"Lajla zawsze przed wyprawą klękała na piasku i kładła na nim dłoń."},{"type":"line","text":"Nie pytała: „Którędy będzie najkrócej?”."},{"type":"line","text":"Pytała: „Którędy będzie prawdziwie?”."},{"type":"line","text":"Bo nauczyła się, że najkrótsza droga nie zawsze prowadzi do celu."},{"type":"line","text":"Czasem prowadzi prosto w zapadlisko."},{"type":"line","text":"A droga dłuższa, cichsza i trudniejsza może ocalić życie."},{"type":"line","text":"Podobno kiedy była już dorosła, dzieci z Ajry siadały wokół niej wieczorami i prosiły:"},{"type":"line","text":"— Opowiedz, co mówi pustynia."},{"type":"line","text":"Lajla uśmiechała się wtedy, nabierała garść piasku i pozwalała ziarenkom spływać powoli z dłoni."},{"type":"line","text":"— Pustynia mówi wiele rzeczy — odpowiadała. — Ale najpierw musicie nauczyć się ciszy."},{"type":"line","text":"Dzieci milkły."},{"type":"line","text":"Wiatr przesuwał się po wydmach."},{"type":"line","text":"Gwiazdy pojawiały się nad osadą."},{"type":"line","text":"A jeśli ktoś słuchał naprawdę uważnie, mógł usłyszeć delikatny szept."},{"type":"line","text":"Nie głośny."},{"type":"line","text":"Nie wyraźny."},{"type":"line","text":"Ale obecny."},{"type":"line","text":"Jakby tysiące ziarenek piasku opowiadały sobie nawzajem historie starsze niż wszystkie miasta."},{"type":"line","text":"I może właśnie dlatego pustynia nie jest pusta."},{"type":"line","text":"Może jest pełna opowieści, które czekają, aż ktoś przestanie hałasować i wreszcie je usłyszy."},{"type":"section","text":"— ZAKOŃCZENIE PODCASTOWE —"},{"type":"line","text":"I tak kończy się dzisiejsza opowieść: „Dziewczynka, która słyszała piasek”."},{"type":"line","text":"To historia o Lajli, która odkryła, że świat mówi ciszej, niż nam się wydaje."},{"type":"line","text":"O pustyni, która nie była pusta."},{"type":"line","text":"O błędzie człowieka, który chciał iść najkrótszą drogą."},{"type":"line","text":"I o tym, że czasem największą mądrością nie jest powiedzieć coś głośno, lecz usiąść spokojnie i posłuchać."},{"type":"line","text":"Jeśli ta historia została z tobą choć na chwilę, zabierz jej mały kawałek do snu."},{"type":"line","text":"Może będzie to wydma pod gwiazdami."},{"type":"line","text":"Może dłoń położona na chłodnym piasku."},{"type":"line","text":"A może jedno zdanie:"},{"type":"line","text":"świat mówi do tych, którzy potrafią słuchać."},{"type":"line","text":"Więcej bajek, legend i tajemniczych opowieści znajdziesz na stronie 3tatata.pl."},{"type":"line","text":"Możesz nas także słuchać na Spotify i oglądać na YouTube."},{"type":"line","text":"Zostaw follow albo subskrypcję, żeby nie przegapić kolejnych historii."},{"type":"line","text":"Dobranoc — i do usłyszenia w następnej bajce."}]},{"id":11,"title":"MIASTO POD CZERWONYM KSIĘŻYCEM","tag":"Opowieść","sections":[{"type":"title","text":"MIASTO POD CZERWONYM KSIĘŻYCEM"},{"type":"meta","text":"3TaTaTa — Opowieści z dalekich krain"},{"type":"section","text":"— WSTĘP DO ODCINKA —"},{"type":"line","text":"Są miasta, które można znaleźć na mapie."},{"type":"line","text":"Są takie, do których prowadzą drogi, bramy, mosty i znaki ustawione przy trakcie."},{"type":"line","text":"Ale są też miasta inne."},{"type":"line","text":"Takie, które nie czekają na każdego."},{"type":"line","text":"Takie, które pojawiają się tylko wtedy, gdy niebo robi się czerwone, wiatr milknie, a noc wygląda, jakby ktoś przykrył świat starym, ciemnym płótnem."},{"type":"line","text":"Mówią, że raz na sto lat, podczas czerwonego księżyca, na pustyni pojawia się miasto."},{"type":"line","text":"Nie widać go rano."},{"type":"line","text":"Nie ma go w południe."},{"type":"line","text":"Nie zostawia murów, śladów ani kamieni."},{"type":"line","text":"Zostaje po nim tylko pytanie:"},{"type":"line","text":"czy naprawdę tam byłeś, czy tylko przyśniła ci się cudza pamięć?"},{"type":"line","text":"Dzisiaj opowiem ci o chłopcu, który wszedł do miasta pod czerwonym księżycem."},{"type":"line","text":"I wrócił z czymś, czego nie da się kupić na żadnym targu."},{"type":"line","text":"MIASTO POD CZERWONYM KSIĘŻYCEM"},{"type":"line","text":"Dawno temu, na szlaku między trzema pustynnymi królestwami, jechała karawana."},{"type":"line","text":"Nie była największa."},{"type":"line","text":"Nie miała setek wielbłądów ani skrzyń pełnych złota."},{"type":"line","text":"Była zwyczajną karawaną kupiecką, taką, która przewoziła tkaniny, sól, przyprawy, suszone figi, miedziane naczynia i wiadomości z miasta do miasta."},{"type":"line","text":"Bo trzeba wiedzieć, że dawniej karawany woziły nie tylko towary."},{"type":"line","text":"Woziły także opowieści."},{"type":"line","text":"Ktoś w jednym mieście usłyszał o narodzinach księcia."},{"type":"line","text":"Ktoś inny o wielkiej burzy na morzu."},{"type":"line","text":"Jeszcze ktoś o studni, która nagle wyschła, choć przez dwieście lat nigdy nie zabrakło w niej wody."},{"type":"line","text":"I wszystkie te wieści wędrowały razem z wielbłądami, dzwoneczkami i kurzem."},{"type":"line","text":"W tej karawanie podróżował chłopiec imieniem Junus."},{"type":"line","text":"Miał jedenaście lat i był synem skryby."},{"type":"line","text":"Jego ojciec, Malik, nie nosił miecza."},{"type":"line","text":"Nie prowadził wielbłądów."},{"type":"line","text":"Nie targował się o cenę pieprzu."},{"type":"line","text":"Siedział zwykle wieczorami przy małej lampie i zapisywał umowy, listy, rachunki oraz imiona ludzi, którzy obiecali coś oddać albo dostarczyć."},{"type":"line","text":"Malik mówił, że słowa zapisane uczciwie są jak most."},{"type":"line","text":"Można po nich przejść z jednego człowieka do drugiego, nawet jeśli dzieli ich wiele dni drogi."},{"type":"line","text":"Junus pomagał ojcu."},{"type":"line","text":"Czyścił pióra."},{"type":"line","text":"Nosił tabliczki."},{"type":"line","text":"Pilnował woreczka z atramentem."},{"type":"line","text":"Ale najbardziej lubił słuchać rozmów przy ognisku."},{"type":"line","text":"W karawanie był stary przewodnik imieniem Rahim."},{"type":"line","text":"Miał jedno oko jaśniejsze od drugiego i twierdził, że stracił jego kolor podczas burzy piaskowej, w której niebo przez chwilę zrobiło się zielone."},{"type":"line","text":"Nikt nie wiedział, czy to prawda."},{"type":"line","text":"Ale wszyscy słuchali Rahima, bo znał pustynię tak dobrze, jak inni znają własny próg."},{"type":"line","text":"Pewnego wieczoru, gdy karawana zatrzymała się w miejscu osłoniętym przez czarne skały, Rahim długo patrzył w niebo."},{"type":"line","text":"Księżyc był prawie pełny."},{"type":"line","text":"Miał dziwny, miedziany odcień."},{"type":"line","text":"— Jutro noc czerwonego księżyca — powiedział."},{"type":"line","text":"Ludzie ucichli."},{"type":"line","text":"Jeden z kupców splunął przez ramię."},{"type":"line","text":"Drugi poprawił amulet na szyi."},{"type":"line","text":"Junus nachylił się bliżej ognia."},{"type":"line","text":"— Co to znaczy? — zapytał."},{"type":"line","text":"Rahim spojrzał na niego powoli."},{"type":"line","text":"— To znaczy, że pustynia przypomni sobie coś, o czym ludzie woleliby zapomnieć."},{"type":"line","text":"— Co takiego?"},{"type":"line","text":"Stary przewodnik wziął łyk herbaty."},{"type":"line","text":"— Miasto."},{"type":"line","text":"Junus czekał."},{"type":"line","text":"Rahim lubił pauzy."},{"type":"line","text":"Uważał, że opowieść bez pauzy jest jak chleb bez soli."},{"type":"line","text":"— Dawno temu — zaczął — na środku tej pustyni stało miasto. Nazywało się Amar. Było bogate, piękne i dumne. Miało mury z czerwonego kamienia, wieże z niebieskimi dachami i targ, na którym sprzedawano wszystko: od zwykłej soczewicy po szkło cienkie jak skrzydło ważki."},{"type":"line","text":"— Co się z nim stało? — spytał Junus."},{"type":"line","text":"— Zniknęło."},{"type":"line","text":"— Jak miasto może zniknąć?"},{"type":"line","text":"Rahim uśmiechnął się bez radości."},{"type":"line","text":"— Tak samo jak człowiek może zgubić własne serce. Powoli, a potem nagle."},{"type":"line","text":"Ludzie przy ogniu poruszyli się niespokojnie."},{"type":"line","text":"Rahim mówił dalej:"},{"type":"line","text":"— Mieszkańcy Amaru byli kiedyś gościnni. Każdy podróżny dostawał wodę, cień i chleb. Ale z czasem miasto bogaciło się coraz bardziej. Kupcy zaczęli zamykać bramy przed biednymi. Strażnicy żądali zapłaty za wodę. Starszyzna mówiła: „To nasze studnie, nasze mury i nasze szczęście. Obcy niech radzą sobie sami”."},{"type":"line","text":"Malik, ojciec Junusa, westchnął cicho."},{"type":"line","text":"— Zła droga — powiedział."},{"type":"line","text":"— Bardzo zła — potwierdził Rahim. — Pewnej nocy do bram miasta zapukała kobieta z dzieckiem. Prosiła tylko o wodę. Strażnicy ją odpędzili. Wtedy podobno spojrzała na czerwony księżyc i powiedziała: „Skoro wasze serca są zamknięte, niech wasze miasto zamknie się samo w sobie”."},{"type":"line","text":"— Była czarodziejką? — spytał Junus."},{"type":"line","text":"— Może. A może była tylko kimś, komu odmówiono ostatniej kropli wody. Czasem to wystarczy, by niebo zapamiętało."},{"type":"line","text":"Rahim dorzucił gałązkę do ognia."},{"type":"line","text":"Iskry uniosły się w ciemność."},{"type":"line","text":"— Następnego ranka miasta już nie było. Pustynia była gładka. Żadnych murów. Żadnych dachów. Żadnych ludzi. Tylko piasek."},{"type":"line","text":"— Wszyscy zginęli? — zapytał cicho Junus."},{"type":"line","text":"— Nie wiadomo. Legenda mówi, że Amar nie umarł. Został uwięziony w jednej nocy, która wraca raz na sto lat, gdy księżyc robi się czerwony. Kto wtedy wejdzie do miasta, może zobaczyć to, czego mieszkańcy nie chcieli widzieć."},{"type":"line","text":"Junus nie spał długo po tej opowieści."},{"type":"line","text":"Leżał pod kocem, patrzył w niebo i myślał o mieście, które zgubiło serce."},{"type":"line","text":"Następnego dnia karawana ruszyła wolniej niż zwykle."},{"type":"line","text":"Rahim kazał trzymać się blisko skał i nie oddalać od grupy."},{"type":"line","text":"Powietrze było dziwne."},{"type":"line","text":"Nie wiał wiatr."},{"type":"line","text":"Nie krążyły ptaki."},{"type":"line","text":"Wielbłądy szły cicho, jakby ich miękkie stopy bały się obudzić coś pod piaskiem."},{"type":"line","text":"Pod wieczór księżyc wstał nad horyzontem."},{"type":"line","text":"Był czerwony."},{"type":"line","text":"Nie lekko pomarańczowy."},{"type":"line","text":"Nie złoty."},{"type":"line","text":"Czerwony jak granat przecięty nożem."},{"type":"line","text":"Cała pustynia zmieniła kolor."},{"type":"line","text":"Piasek stał się ciemny, skały wyglądały jak żarzące się węgle, a twarze ludzi przybrały barwę starej miedzi."},{"type":"line","text":"Rahim zatrzymał karawanę."},{"type":"line","text":"— Dzisiaj nikt nie odchodzi od ogniska — powiedział. — Cokolwiek usłyszycie, nie idźcie za
