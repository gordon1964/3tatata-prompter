 był królem."},{"type":"line","text":"Nadal miał władzę, szaty i straże."},{"type":"line","text":"Ale w jego oczach nie było już tamtej zimnej pustki."},{"type":"line","text":"Był w nich smutek."},{"type":"line","text":"Był w nich wstyd."},{"type":"line","text":"Była w nich pamięć."},{"type":"line","text":"I było w nich coś jeszcze — człowieczeństwo, które wracało powoli, krok po kroku, przez tysiąc i jedną noc."},{"type":"line","text":"— Szeherezado — powiedział król."},{"type":"line","text":"Nie powiedział „kobieto”."},{"type":"line","text":"Nie powiedział „opowiadaj”."},{"type":"line","text":"Powiedział jej imię."},{"type":"line","text":"— Tak, panie?"},{"type":"line","text":"— Przez tysiąc i jedną noc opowiadałaś mi historie o innych ludziach. O ich błędach, winach, odwadze i przemianie. A ja słuchałem, myśląc, że słucham o nich."},{"type":"line","text":"Przerwał."},{"type":"line","text":"Jego głos zadrżał."},{"type":"line","text":"— Dopiero teraz rozumiem, że przez cały ten czas słuchałem także o sobie."},{"type":"line","text":"Szeherezada milczała."},{"type":"line","text":"Nie chciała mu pomagać w wypowiedzeniu prawdy."},{"type":"line","text":"Czasem człowiek musi powiedzieć ją sam, żeby naprawdę ją usłyszeć."},{"type":"line","text":"Król wstał."},{"type":"line","text":"Zszedł z tronu."},{"type":"line","text":"Stanął przed nią nie jako władca nad poddaną, lecz jako człowiek przed człowiekiem."},{"type":"line","text":"— Skrzywdziłem wielu ludzi — powiedział. — Mój ból stał się mieczem, a ja pozwoliłem mu ciąć niewinnych. Nie mogę cofnąć tego, co zrobiłem. Ale mogę przestać. Mogę naprawiać tyle, ile zdołam. Mogę uczyć się być innym królem."},{"type":"line","text":"Szeherezada spuściła głowę."},{"type":"line","text":"W jej oczach błysnęły łzy."},{"type":"line","text":"Nie triumfu."},{"type":"line","text":"Ulgi."},{"type":"line","text":"— To początek dobrej opowieści — powiedziała cicho."},{"type":"line","text":"Król uśmiechnął się smutno."},{"type":"line","text":"— A czy znasz jej zakończenie?"},{"type":"line","text":"Szeherezada spojrzała na niego spokojnie."},{"type":"line","text":"— Nie. Tę opowieść musisz napisać sam, panie. Każdego dnia."},{"type":"line","text":"Od tamtej nocy w królestwie zaczęły się zmiany."},{"type":"line","text":"Król Szahrijar nie stał się od razu idealny."},{"type":"line","text":"Nikt nie staje się dobry jednym zdaniem."},{"type":"line","text":"Ale zaczął słuchać."},{"type":"line","text":"Zaczął pytać."},{"type":"line","text":"Zaczął oddawać sprawiedliwość tam, gdzie wcześniej rozdawał strach."},{"type":"line","text":"Wezyr odzyskał spokój."},{"type":"line","text":"Dunjazada śmiała się znowu tak, jak śmieją się młode osoby, które nie muszą szeptać z lęku."},{"type":"line","text":"A Szeherezada?"},{"type":"line","text":"Szeherezada została królową nie dlatego, że była najpiękniejsza."},{"type":"line","text":"Nie dlatego, że potrafiła opowiadać najwięcej historii."},{"type":"line","text":"Została królową, bo miała odwagę wejść tam, gdzie wszyscy widzieli tylko ciemność, i zapalić w niej światło słowem."},{"type":"line","text":"Podobno przez wiele lat w pałacu istniała komnata pełna ksiąg."},{"type":"line","text":"Nie była zamknięta."},{"type":"line","text":"Każdy mógł do niej wejść."},{"type":"line","text":"Dzieci, kupcy, służący, uczeni, podróżnicy, a nawet strażnicy po skończonej służbie."},{"type":"line","text":"Nad wejściem do tej komnaty wyryto zdanie:"},{"type":"line","text":"„Opowieść nie zmienia świata od razu. Najpierw zmienia serce jednego człowieka”."},{"type":"line","text":"A to, jak wiadomo, czasem wystarcza, by zaczął zmieniać się cały świat."},{"type":"section","text":"— ZAKOŃCZENIE PODCASTOWE —"},{"type":"line","text":"I tak kończy się dzisiejsza opowieść: „Szeherezada”."},{"type":"line","text":"To historia o dziewczynie, która ocaliła życie nie siłą, lecz mądrością."},{"type":"line","text":"Nie krzykiem, lecz spokojem."},{"type":"line","text":"Nie walką, lecz słowem."},{"type":"line","text":"Pamiętaj: opowieści nie są tylko po to, żeby zasnąć."},{"type":"line","text":"Czasem są po to, żeby obudzić w nas coś dobrego."},{"type":"line","text":"Jeśli ta historia została z tobą choć na chwilę, zabierz jej mały kawałek do snu."},{"type":"line","text":"Może będzie to pałac pod księżycem."},{"type":"line","text":"Może głos Szeherezady płynący przez noc."},{"type":"line","text":"A może jedno zdanie:"},{"type":"line","text":"słowo też może być odwagą."},{"type":"line","text":"Więcej bajek, legend i tajemniczych opowieści znajdziesz na stronie 3tatata.pl."},{"type":"line","text":"Możesz nas także słuchać na Spotify i oglądać na YouTube."},{"type":"line","text":"Zostaw follow albo subskrypcję, żeby nie przegapić kolejnych historii."},{"type":"line","text":"Dobranoc — i do usłyszenia w następnej bajce."}]},{"id":5,"title":"ALI BABA I CZTERDZIESTU ROZBÓJNIKÓW","tag":"Opowieść","sections":[{"type":"title","text":"ALI BABA I CZTERDZIESTU ROZBÓJNIKÓW"},{"type":"meta","text":"3TaTaTa — Opowieści z dalekich krain"},{"type":"section","text":"— WSTĘP DO ODCINKA —"},{"type":"line","text":"Wyobraź sobie górską drogę."},{"type":"line","text":"Po jednej stronie rosną suche krzewy, po drugiej stoją skały tak wysokie, jakby ktoś ustawił je tam na straży."},{"type":"line","text":"Słońce grzeje mocno."},{"type":"line","text":"Powietrze pachnie kurzem, drewnem i daleką pustynią."},{"type":"line","text":"A między kamieniami idzie człowiek z osłem."},{"type":"line","text":"Nie jest królem."},{"type":"line","text":"Nie jest wojownikiem."},{"type":"line","text":"Nie ma pałacu ani wielkiego majątku."},{"type":"line","text":"Jest zwykłym drwalem."},{"type":"line","text":"Ma na imię Ali Baba."},{"type":"line","text":"Tego dnia chce tylko nazbierać drewna."},{"type":"line","text":"Ale czasem zwykły dzień prowadzi człowieka do miejsca, którego nie ma na żadnej mapie."},{"type":"line","text":"Do miejsca, gdzie skała otwiera się na słowa."},{"type":"line","text":"Do miejsca, w którym czeka skarb."},{"type":"line","text":"I niebezpieczeństwo."},{"type":"section","text":"— ALI BABA I CZTERDZIESTU ROZBÓJNIKÓW —"},{"type":"line","text":"Dawno temu, w mieście leżącym na skraju pustyni, mieszkało dwóch braci."},{"type":"line","text":"Starszy nazywał się Kasim."},{"type":"line","text":"Młodszy nazywał się Ali Baba."},{"type":"line","text":"Kasim był bogaty."},{"type":"line","text":"Miał duży dom, piękne dywany, srebrne misy i służbę, która codziennie wnosiła do jego komnat tace pełne jedzenia. Nosił szaty z kosztownych tkanin i lubił, kiedy ludzie kłaniali mu się trochę niżej, niż było trzeba."},{"type":"line","text":"Ali Baba był biedny."},{"type":"line","text":"Mieszkał w małym domu z żoną i każdego dnia wyruszał za miasto, żeby zbierać drewno. Potem sprzedawał je na targu i z tego utrzymywał rodzinę."},{"type":"line","text":"Nie miał wiele."},{"type":"line","text":"Ale nie narzekał głośno."},{"type":"line","text":"Znał cenę chleba, znał ciężar pracy i wiedział, że nawet najprostszy dzień można przeżyć uczciwie."},{"type":"line","text":"Pewnego ranka Ali Baba wstał przed świtem."},{"type":"line","text":"Niebo było jeszcze ciemnoniebieskie, a nad dachami miasta świeciły ostatnie gwiazdy. Żona podała mu kawałek placka i bukłak z wodą."},{"type":"line","text":"— Wróć przed zmrokiem — powiedziała."},{"type":"line","text":"— Wrócę — odparł Ali Baba."},{"type":"line","text":"Wziął linę, siekierę, poprowadził osły i ruszył w stronę wzgórz."},{"type":"line","text":"Pracował długo."},{"type":"line","text":"Słońce wspięło się wysoko, a potem zaczęło powoli opadać. Ali Baba związał już kilka porządnych wiązek drewna i właśnie chciał odpocząć w cieniu skał, kiedy usłyszał odległy tętent."},{"type":"line","text":"Najpierw pomyślał, że to burza."},{"type":"line","text":"Ale niebo było czyste."},{"type":"line","text":"Potem uznał, że to karawana."},{"type":"line","text":"Lecz karawany poruszają się wolniej, a ten dźwięk był szybki, ciężki i groźny."},{"type":"line","text":"Ali Baba wspiął się na niewielką skałę i spojrzał w dół."},{"type":"line","text":"Zobaczył jeźdźców."},{"type":"line","text":"Było ich wielu."},{"type":"line","text":"Pędzili na koniach, a każdy z nich miał przy boku broń. Ich twarze częściowo zasłaniały chusty, a przy siodłach wisiały skórzane worki wypchane tak mocno, jakby były pełne kamieni."},{"type":"line","text":"Ali Baba poczuł chłód na plecach, mimo że dzień był gorący."},{"type":"line","text":"To nie byli kupcy."},{"type":"line","text":"To nie byli podróżnicy."},{"type":"line","text":"To byli rozbójnicy."},{"type":"line","text":"Nie czekał ani chwili."},{"type":"line","text":"Wciągnął osły za głazy, a sam wspiął się na drzewo rosnące między skałami. Ukrył się wśród liści i stamtąd patrzył, starając się nawet nie oddychać zbyt głośno."},{"type":"line","text":"Rozbójnicy zatrzymali się przed ogromną, gładką skałą."},{"type":"line","text":"Ich przywódca zsiadł z konia."},{"type":"line","text":"Był wysoki, szeroki w ramionach i poruszał się pewnie, jak ktoś, kto od dawna nie zna strachu."},{"type":"line","text":"Stanął przed skałą, uniósł rękę i powiedział wyraźnie:"},{"type":"line","text":"— Sezamie, otwórz się!"},{"type":"line","text":"Wtedy stało się coś, czego Ali Baba nigdy wcześniej nie widział."},{"type":"line","text":"Skała zadrżała."},{"type":"line","text":"Przez jej środek przebiegła cienka szczelina."},{"type":"line","text":"Potem szczelina rozszerzyła się, a kamień rozsunął na boki, odsłaniając wejście do ciemnej jaskini."},{"type":"line","text":"Rozbójnicy wprowadzili konie do środka."},{"type":"line","text":"Jeden po drugim znikali w skale."},{"type":"line","text":"Ali Baba siedział nieruchomo na drzewie."},{"type":"line","text":"Serce biło mu tak mocno, że bał się, iż usłyszą je nawet przez kamień."},{"type":"line","text":"Po pewnym czasie rozbójnicy wyszli z jaskini."},{"type":"line","text":"Ich worki były lżejsze."},{"type":"line","text":"Przywódca stanął przed wejściem i powiedział:"},{"type":"line","text":"— Sezamie, zamknij się!"},{"type":"line","text":"Skała posłusznie zsunęła się i znów wyglądała jak zwykła ściana kamienia."},{"type":"line","text":"Rozbójnicy wsiedli na konie i odjechali tak szybko, jak przybyli."},{"type":"line","text":"Długo po tym, jak tętent ucichł, Ali Baba nadal siedział na drzewie."},{"type":"line","text":"Nie dlatego, że chciał."},{"type":"line","text":"Dlatego, że nogi odmówiły mu posłuszeństwa."},{"type":"line","text":"W końcu zszedł ostrożnie."},{"type":"line","text":"Podszedł do skały."},{"type":"line","text":"Przez chwilę patrzył na nią w milczeniu."},{"type":"line","text":"Była gładka, nieruchoma i zupełnie zwyczajna."},{"type":"line","text":"A jednak Ali Baba wiedział, co widział."},{"type":"line","text":"Wiedział też, jakie słowa usłyszał."},{"type":"line","text":"Przełknął ślinę i powiedział cicho:"},{"type":"line","text":"— Sezamie, otwórz się."},{"type":"line","text":"Skała zadrżała."},{"type":"line","text":"Otworzyła się."},{"type":"line","text":"Ali Baba cofnął się o krok."},{"type":"line","text":"Z jaskini powiało chłodem, kurzem i zapachem starych skarbów — takim zapachem, jaki mogłyby mieć monety, które przez wiele lat nie widziały słońca."},{"type":"line","text":"Wszedł do środka."},{"type":"line","text":"Najpierw nic nie widział."},{"type":"line","text":"Potem jego oczy przyzwyczaiły się do półmroku."},{"type":"line","text":"I wtedy zobaczył skarb."},{"type":"line","text":"Nie jeden worek."},{"type":"line","text":"Nie jedną skrzynię."},{"type":"line","text":"Całe góry skarbów."},{"type":"line","text":"Złote monety leżały w kopcach wysokich jak stoły."},{"type":"line","text":"Srebrne dzbany stały jeden przy drugim."},{"type":"line","text":"Były tam szkatuły pełne pereł, misy z rubinami, szaty przetykane złotem, miecze w ozdobnych pochwach i naszyjniki tak piękne, że wyglądały jak zamknięte w metalu promienie słońca."},{"type":"line","text":"Ali Baba stał bez ruchu."},{"type":"line","text":"Nie był człowiekiem zachłannym, ale był biedny."},{"type":"line","text":"A bieda sprawia, że nawet uczciwe serce zaczyna szybciej bić na widok możliwości, której nigdy wcześniej nie miało."},{"type":"line","text":"W końcu powiedział sam do siebie:"},{"type":"line","text":"— Wezmę tylko tyle, ile uniosą osły. Nie więcej."},{"type":"line","text":"Nie dotykał kosztowności dla ozdoby."},{"type":"line","text":"Nie oglądał klejnotów dla przyjemności."},{"type":"line","text":"Nabrał złotych monet do worków, starannie je związał i przykrył drewnem, żeby nikt nie zobaczył, co wiezie."},{"type":"line","text":"Potem stanął przy wejściu."},{"type":"line","text":"— Sezamie, zamknij się — powiedział."},{"type":"line","text":"Skała zamknęła się bezszelestnie."},{"type":"line","text":"Ali Baba wrócił do domu późnym popołudniem."},{"type":"line","text":"Żona zobaczyła ciężkie worki i pobladła."},{"type":"line","text":"— Co to jest?"},{"type":"line","text":"— Złoto — odpowiedział Ali Baba cicho. — Ale mów ciszej. To złoto nie przyszło do nas zwyczajną drogą."},{"type":"line","text":"Opowiedział jej wszystko."},{"type":"line","text":"O rozbójnikach."},{"type":"line","text":"O zaklęciu."},{"type":"line","text":"O jaskini."},{"type":"line","text":"O skarbach."},{"type":"line","text":"Żona słuchała z otwartymi ustami."},{"type":"line","text":"— Musimy je policzyć — powiedziała w końcu."},{"type":"line","text":"— Nie — odparł Ali Baba. — Nie będziemy liczyć. Schowamy je. Im mniej będziemy się tym chwalić, tym dłużej będziemy żyć."},{"type":"line","text":"Ale żona, choć dobra, była ciekawa. Chciała chociaż zważyć monety, żeby wiedzieć, ile ich jest. Poszła więc po miarkę do domu Kasima, bogatego brata Ali Baby."},{"type":"line","text":"Żona Kasima była sprytna i podejrzliwa."},{"type":"line","text":"Zdziwiło ją, że biedna bratowa chce pożyczyć miarkę."},{"type":"line","text":"„Co oni mogą mierzyć?” — pomyślała."},{"type":"line","text":"Na dno naczynia przykleiła więc odrobinę wosku."},{"type":"line","text":"Kiedy żona Ali Baby zwróciła miarkę, do wosku przyklejona była złota moneta."},{"type":"line","text":"Żona Kasima od razu pobiegła do męża."},{"type":"line","text":"— Twój biedny brat mierzy złoto — powiedziała. — Nie liczy. Mierzy."},{"type":"line","text":"Kasim poczerwieniał z gniewu i zazdrości."},{"type":"line","text":"Następnego dnia zjawił się u Ali Baby."},{"type":"line","text":"— Bracie — powiedział, choć w jego głosie nie było braterskiego ciepła — wiem, że masz złoto. Powiedz mi skąd. Jeśli nie powiesz, pójdę do sędziego i oskarżę cię o kradzież."},{"type":"line","text":"Ali Baba zrozumiał, że tajemnica już nie jest bezpieczna."},{"type":"line","text":"Opowiedział więc Kasimowi o jaskini i zaklęciu."},{"type":"line","text":"Kasim słuchał, a w jego oczach rosło coś ciemnego."},{"type":"line","text":"Nie zachwyt."},{"type":"line","text":"Nie wdzięczność."},{"type":"line","text":"Chciwość."},{"type":"line","text":"Następnego ranka Kasim wziął dziesięć mułów i ruszył do jaskini."},{"type":"line","text":"Stanął przed skałą i powiedział:"},{"type":"line","text":"— Sezamie, otwórz się!"},{"type":"line","text":"Skała otworzyła się natychmiast."},{"type":"line","text":"Kasim wszedł do środka i zobaczył skarby."},{"type":"line","text":"I wtedy stracił rozsądek."},{"type":"line","text":"Ładował złoto do worków, śmiał się sam do siebie, dotykał klejnotów, przymierzał naszyjniki i myślał tylko o tym, że będzie bogatszy od wszystkich kupców w mieście."},{"type":"line","text":"Gdy wreszcie chciał wyjść, stanął przed zamkniętą skałą i otworzył usta."},{"type":"line","text":"I zamarł."},{"type":"line","text":"Zapomniał słowa."},{"type":"line","text":"— Pszenico, otwórz się!"},{"type":"line","text":"Nic."},{"type":"line","text":"— Jęczmieniu, otwórz się!"},{"type":"line","text":"Nic."},{"type":"line","text":"— Ryżu, otwórz się!"},{"type":"line","text":"Skała milczała."},{"type":"line","text":"Kasim zaczął się pocić."},{"type":"line","text":"— Proso, otwórz się! Grochu, otwórz się! Soczewico, otwórz się!"},{"type":"line","text":"Nic."},{"type":"line","text":"W swojej chciwości zapomniał najprostszego słowa."},{"type":"line","text":"Sezam."},{"type":"line","text":"Tymczasem nadeszli rozbójnicy."},{"type":"line","text":"Gdy zobaczyli przed jaskinią muły, od razu zrozumieli, że ktoś odkrył ich kryjówkę."},{"type":"line","text":"Weszli do środka i znaleźli Kasima."},{"type":"line","text":"Nie będziemy opowiadać szczegółów tego, co stało się potem, bo nie jest to historia o okrucieństwie."},{"type":"line","text":"Wystarczy wiedzieć, że Kasim nie wrócił do domu."},{"type":"line","text":"Kiedy nie pojawił się wieczorem, jego żona pobiegła do Ali Baby."},{"type":"line","text":"Ali Baba zrozumiał wszystko."},{"type":"line","text":"Nocą poszedł do jaskini, wypowiedział zaklęcie i odnalazł brata."},{"type":"line","text":"Było już za późno, by go uratować."},{"type":"line","text":"Ale nie było za późno, by zabrać go do domu i pochować z godnością."},{"type":"line","text":"Ali Baba wrócił więc z ciężkim sercem."},{"type":"line","text":"Od tej chwili wiedział, że rozbójnicy będą szukać człowieka, który zna tajemnicę jaskini."},{"type":"line","text":"I rzeczywiście — szukali."},{"type":"line","text":"Ich przywódca przybył do miasta przebrany za kupca oliwy."},{"type":"line","text":"Prowadził wiele mułów, a na każdym z nich wisiały ogromne dzbany."},{"type":"line","text":"W jednym z dzbanów naprawdę była oliwa."},{"type":"line","text":"W pozostałych ukryli się rozbójnicy, każdy z bronią i oddechem wstrzymanym w ciemności."},{"type":"line","text":"Przywódca zatrzymał się przed domem Ali Baby."},{"type":"line","text":"— Dobry człowieku — powiedział uprzejmie — jestem kupcem w podróży. Czy pozwolisz mi przenocować na dziedzińcu? Moje muły są zmęczone, a noc już blisko."},{"type":"line","text":"Ali Baba nie rozpoznał go."},{"type":"line","text":"Był gościnny, jak nakazywał zwyczaj."},{"type":"line","text":"— Wejdź — powiedział. — Mój dom jest skromny, ale gość nie powinien spać pod gołym niebem."},{"type":"line","text":"W domu Ali Baby mieszkała także młoda służąca imieniem Morgiana."},{"type":"line","text":"Była mądra, uważna i szybka w myśleniu."},{"type":"line","text":"Tego wieczoru, przygotowując posiłek, zauważyła, że zabrakło oliwy do lampy."},{"type":"line","text":"Wyszła więc na dziedziniec, by nabrać trochę z dzbanów kupca."},{"type":"line","text":"Podeszła do pierwszego dzbana."},{"type":"line","text":"Wtedy z wnętrza dobiegł cichy szept:"},{"type":"line","text":"— Czy już czas?"},{"type":"line","text":"Morgiana zamarła."},{"type":"line","text":"Nie krzyknęła."},{"type":"line","text":"Nie upuściła naczynia."},{"type":"line","text":"Nie uciekła."},{"type":"line","text":"To właśnie odróżnia ludzi naprawdę odważnych: strach nie odbiera im rozumu."},{"type":"line","text":"Pochyliła się nad dzbanem i szepnęła głosem tak podobnym do głosu przywódcy, jak tylko potrafiła:"},{"type":"line","text":"— Jeszcze nie."},{"type":"line","text":"Podeszła do kolejnego dzbana."},{"type":"line","text":"— Czy już czas? — spytał następny głos."},{"type":"line","text":"— Jeszcze nie — odpowiedziała."},{"type":"line","text":"I tak przy każdym dzbanie."},{"type":"line","text":"Morgiana zrozumiała, że dom Ali Baby jest otoczony nie przez oliwę, ale przez niebezpieczeństwo."},{"type":"line","text":"Nie mogła czekać."},{"type":"line","text":"Nie mogła też pobiec po straż, bo rozbójnicy mogli w każdej chwili wyskoczyć z ukrycia."},{"type":"line","text":"Działała szybko."},{"type":"line","text":"Ostrzegła zaufanego domownika, przygotowała plan i dopilnowała, by rozbójnicy nie mogli zaatakować. Tej nocy ich zasadzka się nie udała."},{"type":"line","text":"Kiedy przywódca rozbójników zrozumiał, że został przechytrzony, uciekł w ciemność."},{"type":"line","text":"Ale nie zrezygnował."},{"type":"line","text":"Po pewnym czasie wrócił do miasta w nowym przebraniu."},{"type":"line","text":"Tym razem udawał bogatego kupca i zaprzyjaźnił się z synem Ali Baby. Był uprzejmy, hojny i tak przekonujący, że zaproszono go na kolację."},{"type":"line","text":"Morgiana znów mu się przyglądała."},{"type":"line","text":"Nie ufała mu."},{"type":"line","text":"Było w nim coś zbyt gładkiego."},{"type":"line","text":"Zbyt spokojnego."},{"type":"line","text":"Zbyt przygotowanego."},{"type":"line","text":"Podczas uczty zauważyła pod jego szatą ukryty sztylet."},{"type":"line","text":"Zrozumiała, że niebezpieczeństwo wróciło."},{"type":"line","text":"Nie zrobiła jednak alarmu."},{"type":"line","text":"Nie pozwoliła, by strach zdradził jej myśli."},{"type":"line","text":"Wykonała taniec z szablą, taki, jaki czasem pokazywano gościom dla rozrywki. Poruszała się lekko, jak cień lampy na ścianie. Goście patrzyli z zachwytem."},{"type":"line","text":"A kiedy znalazła się blisko fałszywego kupca, jednym szybkim ruchem rozbroiła go i odsłoniła jego prawdziwe zamiary."},{"type":"line","text":"Ali Baba zerwał się z miejsca."},{"type":"line","text":"Rozpoznał przywódcę rozbójników."},{"type":"line","text":"Tym razem zło nie miało już gdzie się ukryć."},{"type":"line","text":"Wezwano straż, a sprawiedliwość zajęła się resztą."},{"type":"line","text":"Ali Baba zrozumiał, że życie zawdzięcza Morgianie."},{"type":"line","text":"Nie tylko raz."},{"type":"line","text":"Dwa razy."},{"type":"line","text":"Stanął przed nią i powiedział:"},{"type":"line","text":"— Morgiano, byłaś mądrzejsza niż my wszyscy. Uratowałaś mój dom, moją rodzinę i moje życie. Od dziś nie będziesz służącą. Będziesz częścią naszej rodziny."},{"type":"line","text":"Tak też się stało."},{"type":"line","text":"A jaskinia?"},{"type":"line","text":"Ali Baba znał jej tajemnicę do końca życia."},{"type":"line","text":"Nie używał skarbu bezmyślnie."},{"type":"line","text":"Nie rozrzucał złota, nie pysznił się nim i nie pozwolił, by bogactwo zmieniło jego serce w serce Kasima."},{"type":"line","text":"Pomagał rodzinie."},{"type":"line","text":"Pomagał biednym."},{"type":"line","text":"Naprawił dom."},{"type":"line","text":"Zadbał o tych, którzy kiedyś dzielili z nim trudne dni."},{"type":"line","text":"Bo skarb sam w sobie nie jest ani dobry, ani zły."},{"type":"line","text":"Dopiero serce człowieka decyduje, czym się stanie."},{"type":"line","text":"Dla jednego może być początkiem zguby."},{"type":"line","text":"Dla drugiego — szansą, by uczynić trochę dobra."},{"type":"line","text":"Podobno wiele lat później Ali Baba zabrał swojego syna w góry."},{"type":"line","text":"Stanęli przed tą samą skałą."},{"type":"line","text":"Wiatr poruszał suchymi krzewami."},{"type":"line","text":"Słońce zachodziło nad pustynią."},{"type":"line","text":"— Ojcze — zapytał syn — czy naprawdę wystarczy powiedzieć jedno słowo, żeby otworzyć skarb?"},{"type":"line","text":"Ali Baba uśmiechnął się lekko."},{"type":"line","text":"— Nie — odpowiedział. — Słowo otwiera tylko skałę. Prawdziwy skarb otwiera się rozsądkiem."},{"type":"line","text":"A potem wypowiedział cicho:"},{"type":"line","text":"— Sezamie, otwórz się."},{"type":"line","text":"Skała zadrżała."},{"type":"line","text":"I otworzyła się po raz ostatni w tej opowieści."},{"type":"section","text":"— ZAKOŃCZENIE PODCASTOWE —"},{"type":"line","text":"I tak kończy się dzisiejsza opowieść: „Ali Baba i czterdziestu rozbójników”."},{"type":"line","text":"To historia o skarbie, który można znaleźć przypadkiem, ale którego nie wolno używać bez mądrości."},{"type":"line","text":"O chciwości, która potrafi zamknąć człowieka w ciemności."},{"type":"line","text":"I o odwadze Morgiany, która zauważyła to, czego inni nie widzieli."},{"type":"line","text":"Jeśli ta historia została z tobą choć na chwilę, zabierz jej mały kawałek do snu."},{"type":"line","text":"Może będzie to tajemna skała."},{"type":"line","text":"Może słowo wypowiedziane szeptem."},{"type":"line","text":"A może myśl, że największym skarbem nie zawsze jest złoto."},{"type":"line","text":"Czasem największym skarbem jest rozsądek."},{"type":"line","text":"Więcej bajek, legend i tajemniczych opowieści znajdziesz na stronie 3tatata.pl."},{"type":"line","text":"Możesz nas także słuchać na Spotify i oglądać na YouTube."},{"type":"line","text":"Zostaw follow albo subskrypcję, żeby nie przegapić kolejnych historii."},{"type":"line","text":"Dobranoc — i do usłyszenia w następnej bajce."}]},{"id":6,"title":"CZARODZIEJSKI KOŃ Z HEBANU","tag":"Opowieść","sections":[{"type":"title","text":"CZARODZIEJSKI KOŃ Z HEBANU"},{"type":"meta","text":"3TaTaTa — Opowieści z dalekich krain"},{"type":"section","text":"— WSTĘP DO ODCINKA —"},{"type":"line","text":"Wyobraź sobie pałac."},{"type":"line","text":"Nie zwykły pałac, ale taki, którego mury o zachodzie słońca robią się złote, a nocą wyglądają, jakby zbudowano je z cienia i księżycowego światła."},{"type":"line","text":"Na dziedzińcu gra muzyka."},{"type":"line","text":"W ogrodach pachną róże."},{"type":"line","text":"Kupcy z dalekich krain rozkładają swoje towary: jedwabie, klejnoty, przyprawy i przedmioty tak dziwne, że trudno powiedzieć, czy są zabawkami, czy zaklęciami."},{"type":"line","text":"Wśród nich stoi jeden przedmiot."},{"type":"line","text":"Czarny koń."},{"type":"line","text":"Nie żywy."},{"type":"line","text":"Wyrzeźbiony z hebanu."},{"type":"line","text":"Gładki."},{"type":"line","text":"Piękny."},{"type":"line","text":"Tajemniczy."},{"type":"line","text":"A jednak ten koń potrafi coś, czego nie potrafi żaden prawdziwy rumak."},{"type":"line","text":"Potrafi wzbić się ponad chmury."},{"type":"line","text":"I zanieść człowieka tam, gdzie zaczyna się przygoda."},{"type":"section","text":"— CZARODZIEJSKI KOŃ Z HEBANU —"},{"type":"line","text":"Dawno temu, w krainie bogatej i słonecznej, panował król, który miał trzech synów."},{"type":"line","text":"Najstarszy był silny i lubił mówić o wojnie."},{"type":"line","text":"Średni był dumny i lubił mówić o bogactwie."},{"type":"line","text":"Najmłodszy nazywał się Firus."},{"type":"line","text":"Był spokojniejszy od braci."},{"type":"line","text":"Nie dlatego, że brakowało mu odwagi."},{"type":"line","text":"Po prostu zanim coś powiedział, najpierw myślał."},{"type":"line","text":"A zanim czegoś zapragnął, zastanawiał się, czy naprawdę jest mu to potrzebne."},{"type":"line","text":"Król kochał wszystkich synów, ale to właśnie na Firusa patrzył czasem z największą ciekawością. W najmłodszym księciu było coś, czego nie da się nauczyć z ksiąg ani kupić za złoto: uważność."},{"type":"line","text":"Pewnego roku, w dniu wielkiego święta wiosny, do stolicy przybyli kupcy, uczeni, rzemieślnicy i wynalazcy z całego świata."},{"type":"line","text":"Miasto od rana było pełne śmiechu i muzyki."},{"type":"line","text":"Na targu sprzedawano daktyle w miodzie, szafran, granaty, jedwabne pasy i małe lampki z kolorowego szkła."},{"type":"line","text":"Na placu przed pałacem rozstawiono namioty, a każdy przybysz mógł pokazać królowi coś niezwykłego."},{"type":"line","text":"Jeden człowiek przyniósł zwierciadło, w którym można było zobaczyć twarz osoby oddalonej o sto mil."},{"type":"line","text":"Inny pokazał srebrnego pawia, który poruszał ogonem, kiedy słońce dotykało jego skrzydeł."},{"type":"line","text":"Jeszcze inny miał zegar wodny, który wybijał godziny głosem małego ptaka."},{"type":"line","text":"Król oglądał wszystko z zachwytem."},{"type":"line","text":"Ale pod koniec dnia na plac wszedł stary Pers."},{"type":"line","text":"Miał długą siwą brodę, ciemne oczy i szatę tak prostą, że wielu dworzan uznało go za kogoś mało ważnego."},{"type":"line","text":"Za nim dwóch służących prowadziło coś przykrytego czarną tkaniną."},{"type":"line","text":"— Panie — powiedział Pers, kłaniając się królowi — przybyłem z darem, jakiego nie ma żaden władca na świecie."},{"type":"line","text":"Dworzanie zaczęli szeptać."},{"type":"line","text":"Król uniósł brwi."},{"type":"line","text":"— Pokaż."},{"type":"line","text":"Pers skinął dłonią."},{"type":"line","text":"Służący zdjęli tkaninę."},{"type":"line","text":"Na środku placu stał koń."},{"type":"line","text":"Był naturalnej wielkości, ale nie oddychał, nie poruszał uszami i nie uderzał kopytem o kamień."},{"type":"line","text":"Wykonano go z hebanu — czarnego drewna tak gładkiego i głębokiego, że wyglądało jak noc, którą ktoś wypolerował do połysku."},{"type":"line","text":"Miał oczy z dwóch zielonych kamieni."},{"type":"line","text":"Siodło ze skóry."},{"type":"line","text":"Uzdy ze srebra."},{"type":"line","text":"A na jego szyi, po obu stronach, znajdowały się dwie małe gałki z kości słoniowej."},{"type":"line","text":"Najstarszy książę zaśmiał się pod nosem."},{"type":"line","text":"— To ma być cud? Drewniany koń?"},{"type":"line","text":"Średni książę prychnął."},{"type":"line","text":"— Piękna zabawka dla dziecka."},{"type":"line","text":"Pers nie odpowiedział im ani słowem."},{"type":"line","text":"Spojrzał tylko na króla."},{"type":"line","text":"— Ten koń — powiedział spokojnie — nie je, nie śpi i nie męczy się. Nie potrzebuje stajni ani owsa. A kiedy jeździec przekręci jedną z tych gałek, koń wzbija się w powietrze i leci szybciej niż wiatr."},{"type":"line","text":"Na placu zapadła cisza."},{"type":"line","text":"Taka cisza, jaka pojawia się zawsze wtedy, gdy ludzie nie wiedzą, czy właśnie usłyszeli prawdę, czy szaleństwo."},{"type":"line","text":"Król pochylił się do przodu."},{"type":"line","text":"— Udowodnij."},{"type":"line","text":"Pers dosiadł konia."},{"type":"line","text":"Wyglądało to dziwnie, bo koń stał nieruchomo jak posąg."},{"type":"line","text":"Stary człowiek położył dłoń na jednej z gałek."},{"type":"line","text":"Przekręcił ją lekko."},{"type":"line","text":"I wtedy drewniany koń uniósł się w powietrze."},{"type":"line","text":"Najpierw powoli, na wysokość człowieka."},{"type":"line","text":"Potem wyżej."},{"type":"line","text":"Nad głowy dworzan."},{"type":"line","text":"Nad pałacowe mury."},{"type":"line","text":"Nad kopuły miasta."},{"type":"line","text":"A chwilę później był już tylko czarną kropką na złotym niebie."},{"type":"line","text":"Tłum krzyknął z zachwytu."},{"type":"line","text":"Król zerwał się z tronu."},{"type":"line","text":"Książęta zamilkli."},{"type":"line","text":"Po pewnym czasie Pers wrócił."},{"type":"line","text":"Koń opadł miękko na plac, jakby schodził po niewidzialnych schodach."},{"type":"line","text":"— Ile chcesz za tego konia? — zapytał król."},{"type":"line","text":"Pers skłonił głowę."},{"type":"line","text":"— Panie, nie chcę złota."},{"type":"line","text":"Król uśmiechnął się."},{"type":"line","text":"— Więc chcesz klejnotów?"},{"type":"line","text":"— Nie."},{"type":"line","text":"— Ziemi?"},{"type":"line","text":"— Nie."},{"type":"line","text":"— Tytułu?"},{"type":"line","text":"— Nie."},{"type":"line","text":"— Czego więc żądasz?"},{"type":"line","text":"Pers spojrzał w stronę królewskiej rodziny."},{"type":"line","text":"— Ręki księżniczki, twojej córki."},{"type":"line","text":"Na placu znów zrobiło się cicho."},{"type":"line","text":"Tym razem była to cisza chłodna."},{"type":"line","text":"Król zmarszczył brwi."},{"type":"line","text":"Księżniczka, siostra Firusa, pobladła."},{"type":"line","text":"Najstarszy książę zacisnął pięści."},{"type":"line","text":"Średni spojrzał na Persa z oburzeniem."},{"type":"line","text":"A Firus, najmłodszy, patrzył uważnie na czarnego konia i na oczy starego człowieka."},{"type":"line","text":"W tych oczach było coś nieprzyjemnego."},{"type":"line","text":"Nie tylko pragnienie nagrody."},{"type":"line","text":"Była w nich pewność, że jeśli ktoś posiada przedmiot niezwykły, może żądać wszystkiego."},{"type":"line","text":"Król nie chciał obrazić wynalazcy, ale nie chciał też oddać córki człowiekowi, którego nie znał."},{"type":"line","text":"— To zbyt wielka cena — powiedział ostrożnie."},{"type":"line","text":"Pers wzruszył ramionami."},{"type":"line","text":"— Wielka moc wymaga wielkiej zapłaty."},{"type":"line","text":"Firus wystąpił krok do przodu."},{"type":"line","text":"— Panie ojcze — powiedział — pozwól mi obejrzeć konia."},{"type":"line","text":"Król skinął głową."},{"type":"line","text":"Firus podszedł do hebanowego rumaka."},{"type":"line","text":"Dotknął szyi."},{"type":"line","text":"Drewno było ciepłe, choć przez cały dzień stało w cieniu."},{"type":"line","text":"Dotknął siodła."},{"type":"line","text":"Było solidne."},{"type":"line","text":"Spojrzał na dwie gałki z kości słoniowej."},{"type":"line","text":"— Jedna służy do wznoszenia się? — spytał Persa."},{"type":"line","text":"— Tak."},{"type":"line","text":"— A druga?"},{"type":"line","text":"Pers uśmiechnął się lekko."},{"type":"line","text":"— Do powrotu na ziemię."},{"type":"line","text":"— Pokaż mi, która jest która."},{"type":"line","text":"— To bardzo proste — odparł Pers zbyt szybko. — Zrozumiesz, gdy wsiądziesz."},{"type":"line","text":"Firus nie był głupi."},{"type":"line","text":"Ale był młody."},{"type":"line","text":"A młodość czasem lubi sprawdzić coś sama, nawet jeśli serce szepcze: poczekaj."},{"type":"line","text":"Książę wskoczył na konia."},{"type":"line","text":"Król uniósł rękę."},{"type":"line","text":"— Firusie, ostrożnie!"},{"type":"line","text":"Najmłodszy książę przekręcił pierwszą gałkę."},{"type":"line","text":"Koń drgnął."},{"type":"line","text":"A potem wystrzelił w niebo."},{"type":"line","text":"Nie uniósł się łagodnie jak wtedy, gdy prowadził go Pers."},{"type":"line","text":"Nie."},{"type":"line","text":"Pomknął w górę tak gwałtownie, że plac, pałac, miasto i ludzie zmienili się w kolorową plamę."},{"type":"line","text":"Wiatr uderzył Firusa w twarz."},{"type":"line","text":"Szatę porwało mu do tyłu."},{"type":"line","text":"Serce skoczyło mu do gardła."},{"type":"line","text":"— Zatrzymaj się! — krzyknął."},{"type":"line","text":"Ale koń był z drewna."},{"type":"line","text":"Nie słuchał krzyków."},{"type":"line","text":"Firus chwycił uzdę, potem szyję, potem siodło."},{"type":"line","text":"Ziemia znikała pod nim."},{"type":"line","text":"Chmury były coraz bliżej."},{"type":"line","text":"Miasto stało się małe jak zabawka."},{"type":"line","text":"Książę spojrzał na drugą gałkę."},{"type":"line","text":"„To musi być ta” — pomyślał."},{"type":"line","text":"Przekręcił ją."},{"type":"line","text":"Nic."},{"type":"line","text":"Koń wciąż leciał."},{"type":"line","text":"Przekręcił mocniej."},{"type":"line","text":"Koń poleciał jeszcze szybciej."},{"type":"line","text":"Wtedy Firus zrozumiał, że Pers go oszukał albo przynajmniej nie powiedział mu wszystkiego."},{"type":"line","text":"Zaczął szukać ukrytego mechanizmu."},{"type":"line","text":"Dłońmi przesuwał po szyi konia, po siodle, po metalowych ozdobach."},{"type":"line","text":"Wiatr wyciskał mu łzy z oczu."},{"type":"line","text":"Słońce zniżało się ku zachodowi."},{"type":"line","text":"W dole przesuwały się góry, pustynie, rzeki i miasta, których nazw nie znał."},{"type":"line","text":"Po długim czasie, gdy niebo zaczęło ciemnieć, Firus znalazł pod grzywą mały, prawie niewidoczny kołek."},{"type":"line","text":"Przekręcił go ostrożnie."},{"type":"line","text":"Koń zwolnił."},{"type":"line","text":"Firus odetchnął."},{"type":"line","text":"Przekręcił odrobinę bardziej."},{"type":"line","text":"Koń zaczął opadać."},{"type":"line","text":"Nie prosto."},{"type":"line","text":"Nie bezpiecznie."},{"type":"line","text":"Ale jednak opadał."},{"type":"line","text":"Pod księciem rozciągał się ogród."},{"type":"line","text":"Ogromny, ciemnozielony, otoczony murem."},{"type":"line","text":"Na jego środku stał pałac z białego kamienia."},{"type":"line","text":"Firus skierował konia ku płaskiemu dachowi jednej z wież."},{"type":"line","text":"Wylądował niezgrabnie, ale cały."},{"type":"line","text":"Przez chwilę leżał na zimnych płytach, obejmując szyję hebanowego konia, jakby był to żywy przyjaciel, który ocalił mu życie."},{"type":"line","text":"Noc zapadła szybko."},{"type":"line","text":"W pałacu poniżej świeciły lampy."},{"type":"line","text":"Firus wiedział, że jest w obcym kraju."},{"type":"line","text":"Nie wiedział, jak daleko od domu."},{"type":"line","text":"Nie wiedział, czy umie wrócić."},{"type":"line","text":"Ale wiedział jedno: musi zachować spokój."},{"type":"line","text":"Ukrył konia na dachu za wysokim murem, a sam zszedł schodami do wnętrza pałacu."},{"type":"line","text":"Korytarze były ciche."},{"type":"line","text":"Pachniało jaśminem, drewnem sandałowym i czymś słodkim, może miodem."},{"type":"line","text":"W jednej z komnat zobaczył światło."},{"type":"line","text":"Zajrzał ostrożnie."},{"type":"line","text":"Przy oknie siedziała młoda księżniczka."},{"type":"line","text":"Miała na imię Parizada."},{"type":"line","text":"Nie spała."},{"type":"line","text":"Patrzyła w noc tak uważnie, jakby czekała na znak z nieba."},{"type":"line","text":"Kiedy zobaczyła obcego, nie krzyknęła."},{"type":"line","text":"Położyła tylko dłoń na sercu."},{"type":"line","text":"— Kim jesteś? — zapytała."},{"type":"line","text":"Firus uklęknął, żeby pokazać, że nie przyszedł jako wróg."},{"type":"line","text":"— Księciem, który popełnił głupi błąd — odpowiedział. — Dosiadłem konia, którego nie rozumiałem, i wylądowałem w twoim pałacu."},{"type":"line","text":"Parizadzie drgnęły kąciki ust."},{"type":"line","text":"— To najdziwniejsze wyjaśnienie, jakie słyszałam."},{"type":"line","text":"— Niestety prawdziwe."},{"type":"line","text":"Księżniczka kazała mu opowiedzieć wszystko."},{"type":"line","text":"Firus mówił o święcie, starym Persie, hebanowym koniu i niebie, które prawie go połknęło."},{"type":"line","text":"Parizada słuchała uważnie."},{"type":"line","text":"Nie śmiała się z niego."},{"type":"line","text":"Nie patrzyła z góry."},{"type":"line","text":"A gdy skończył, powiedziała:"},{"type":"line","text":"— Skoro przybyłeś tu z nieba, może nie jest to przypadek."},{"type":"line","text":"Firus nie wiedział, co odpowiedzieć."},{"type":"line","text":"Przez kolejne dni książę pozostał w pałacu Parizady."},{"type":"line","text":"Uczył się działania hebanowego konia."},{"type":"line","text":"Tym razem powoli."},{"type":"line","text":"Bez pychy."},{"type":"line","text":"Bez pośpiechu."},{"type":"line","text":"Odkrył, który mechanizm unosi konia, który go opuszcza, który skręca, a który zatrzymuje lot. Zrozumiał, że magia nie była w samym drewnie, lecz w wiedzy ukrytej w mechanizmie."},{"type":"line","text":"A wiedza, której nie rozumiesz, jest jak miecz trzymany za ostrze."},{"type":"line","text":"Może cię zranić, zanim zdołasz cokolwiek z nią zrobić."},{"type":"line","text":"Firus i Parizada coraz częściej rozmawiali."},{"type":"line","text":"O swoich krainach."},{"type":"line","text":"O rodzinach."},{"type":"line","text":"O obowiązkach."},{"type":"line","text":"O tym, czy człowiek urodzony w pałacu naprawdę jest wolny."},{"type":"line","text":"Parizada była mądra i odważna."},{"type":"line","text":"Nie chciała być tylko ozdobą czyjegoś dworu. Chciała sama decydować o swoim losie."},{"type":"line","text":"Firus rozumiał ją lepiej, niż się spodziewał."},{"type":"line","text":"Pewnego poranka powiedział:"},{"type":"line","text":"— Muszę wrócić do ojca. Na pewno myśli, że zginąłem."},{"type":"line","text":"Parizada spuściła wzrok."},{"type":"line","text":"— Wiem."},{"type":"line","text":"— Chciałbym, żebyś poleciała ze mną. Nie jako zdobycz. Nie jako obietnica. Jako gość. A jeśli zechcesz wrócić, odwiozę cię."},{"type":"line","text":"Księżniczka spojrzała mu prosto w oczy."},{"type":"line","text":"— Obiecujesz?"},{"type":"line","text":"— Obiecuję."},{"type":"line","text":"Tego samego dnia, kiedy pałac spał w południowym upale, Firus i Parizada wsiedli na hebanowego konia."},{"type":"line","text":"Książę poruszył właściwą gałką."},{"type":"line","text":"Koń wzbił się w powietrze."},{"type":"line","text":"Tym razem łagodnie."},{"type":"line","text":"Miasto Parizady oddalało się pod nimi."},{"type":"line","text":"Nad nimi płynęły chmury."},{"type":"line","text":"Przed nimi leżała droga powrotna."},{"type":"line","text":"Lot trwał długo, ale Firus panował już nad koniem."},{"type":"line","text":"Kiedy wreszcie nad horyzontem pojawiły się wieże jego rodzinnego miasta, serce zabiło mu mocniej."},{"type":"line","text":"Na dziedzińcu pałacu zapanował krzyk."},{"type":"line","text":"Ludzie wybiegali z sal, strażnicy podnosili głowy, a król, który przez wiele dni opłakiwał syna, wyszedł na schody i nie mógł uwierzyć własnym oczom."},{"type":"line","text":"Firus wrócił."},{"type":"line","text":"Żywy."},{"type":"line","text":"A z nim księżniczka z dalekiej krainy."},{"type":"line","text":"Król objął syna mocno."},{"type":"line","text":"Tak mocno, że przez chwilę Firus znów poczuł się jak małe dziecko."},{"type":"line","text":"— Myślałem, że cię straciłem — powiedział król."},{"type":"line","text":"— Prawie mnie straciłeś — odparł Firus. — Ale wróciłem mądrzejszy."},{"type":"line","text":"Stary Pers został tymczasem uwięziony, bo król podejrzewał, że celowo naraził księcia na śmierć."},{"type":"line","text":"Gdy dowiedział się o powrocie Firusa i zobaczył Parizadę, w jego oczach pojawił się gniew."},{"type":"line","text":"Pragnął konia."},{"type":"line","text":"Pragnął nagrody."},{"type":"line","text":"Pragnął władzy, którą dawał taki wynalazek."},{"type":"line","text":"Udało mu się oszukać strażników i odzyskać dostęp do hebanowego konia."},{"type":"line","text":"A kiedy nikt nie patrzył, porwał Parizadę i odleciał."},{"type":"line","text":"Firus odkrył to zbyt późno."},{"type":"line","text":"Na dziedzińcu została tylko cisza."},{"type":"line","text":"I ślad po kopytach drewnianego konia na piasku."},{"type":"line","text":"Tym razem książę nie rzucił się bezmyślnie w pościg."},{"type":"line","text":"Nie miał konia."},{"type":"line","text":"Nie miał skrzydeł."},{"type":"line","text":"Miał za to coś, czego wcześniej często mu brakowało: cierpliwość."},{"type":"line","text":"Wyruszył w drogę zwyczajnie — konno, pieszo, z karawanami, przez miasta i pustynie."},{"type":"line","text":"Pytał kupców, wędrowców i strażników bram."},{"type":"line","text":"Po wielu dniach dowiedział się o dziwnym starcu, który przybył do pewnego miasta z piękną księżniczką i czarnym drewnianym koniem, twierdząc, że dziewczyna jest jego żoną."},{"type":"line","text":"Firus dotarł tam o zmierzchu."},{"type":"line","text":"Miasto było obce."},{"type":"line","text":"Język brzmiał inaczej."},{"type":"line","text":"Ale ludzkie kłamstwo wszędzie ma podobny zapach."},{"type":"line","text":"Pers próbował przekonać miejscowego władcę, że Parizada należy do niego."},{"type":"line","text":"Księżniczka jednak odmówiła jedzenia, rozmowy i uśmiechu. Udawała chorą, żeby zyskać czas."},{"type":"line","text":"Władca, zaniepokojony jej stanem, ogłosił, że nagrodzi każdego lekarza, który zdoła jej pomóc."},{"type":"line","text":"Firus przebrał się więc za wędrownego medyka."},{"type":"line","text":"Twarz zasłonił chustą."},{"type":"line","text":"Do pałacu wszedł spokojnie, choć serce biło mu jak bęben."},{"type":"line","text":"Gdy znalazł się przy Parizadzie, powiedział cicho:"},{"type":"line","text":"— Nie bój się. To ja."},{"type":"line","text":"Księżniczka nawet nie drgnęła, ale w jej oczach pojawiło się światło."},{"type":"line","text":"Firus zwrócił się do władcy:"},{"type":"line","text":"— Panie, ta księżniczka nie jest chora na ciele. Została dotknięta złą mocą przedmiotu, na którym ją tu przywieziono. Trzeba zaprowadzić ją do konia. Tam odprawię leczenie."},{"type":"line","text":"Pers zbladł."},{"type":"line","text":"— To oszustwo! — krzyknął."},{"type":"line","text":"Ale władca kazał spełnić prośbę lekarza."},{"type":"line","text":"Na placu ustawiono hebanowego konia."},{"type":"line","text":"Zgromadzili się dworzanie, strażnicy i ciekawi mieszkańcy miasta."},{"type":"line","text":"Firus pomógł Parizadzie podejść bliżej."},{"type":"line","text":"Potem nagle wskoczył na konia, wciągnął ją za sobą i przekręcił właściwą gałkę."},{"type":"line","text":"Koń wzbił się w niebo."},{"type":"line","text":"Pers rzucił się naprzód, ale złapał tylko powietrze."},{"type":"line","text":"Ludzie krzyknęli."},{"type":"line","text":"Władca patrzył z otwartymi ustami."},{"type":"line","text":"A Firus i Parizada lecieli już ponad dachami miasta, ku wolności."},{"type":"line","text":"Tym razem nikt ich nie zatrzymał."},{"type":"line","text":"Wrócili do rodzinnego królestwa Firusa, gdzie przyjęto ich z radością."},{"type":"line","text":"Stary Pers został ukarany za oszustwa i chciwość. Nie dlatego, że stworzył niezwykłego konia, lecz dlatego, że chciał używać niezwykłości, by odbierać innym wolność."},{"type":"line","text":"Hebanowy koń trafił do królewskiej skarbca."},{"type":"line","text":"Nie zamknięto go jednak tylko jako ozdoby."},{"type":"line","text":"Firus rozkazał, by uczeni dokładnie zbadali jego mechanizmy, opisali je i zabezpieczyli, aby nikt więcej nie wzbił się w niebo bez wiedzy, jak wrócić na ziemię."},{"type":"line","text":"Po pewnym czasie Firus i Parizada pobrali się."},{"type":"line","text":"Ale w ich historii najważniejsze nie było wesele."},{"type":"line","text":"Najważniejsze było to, czego nauczył ich czarny koń."},{"type":"line","text":"Że cudowny przedmiot może dać człowiekowi wielką moc."},{"type":"line","text":"Ale moc bez wiedzy jest niebezpieczna."},{"type":"line","text":"Wiedza bez pokory jest ślepa."},{"type":"line","text":"A podróż, nawet najdalsza, nie ma sensu, jeśli po drodze człowiek nie staje się mądrzejszy."},{"type":"line","text":"Podobno wiele lat później, gdy Firus został królem, czasem wychodził nocą na dach pałacu."},{"type":"line","text":"Patrzył w gwiazdy i wspominał pierwszy lot."},{"type":"line","text":"Ten straszny."},{"type":"line","text":"Ten gwałtowny."},{"type":"line","text":"Ten, który porwał go z domu i rzucił w nieznane."},{"type":"line","text":"A potem uśmiechał się lekko."},{"type":"line","text":"Bo wiedział już, że niektóre błędy są jak drzwi."},{"type":"line","text":"Bolesne, niebezpieczne i ciężkie."},{"type":"line","text":"Ale jeśli człowiek przejdzie przez nie mądrze, może po drugiej stronie znaleźć samego siebie."},{"type":"section","text":"— ZAKOŃCZENIE PODCASTOWE —"},{"type":"line","text":"I tak kończy się dzisiejsza opowieść: „Czarodziejski koń z hebanu”."},{"type":"line","text":"To historia o niezwykłym wynalazku, który potrafił latać wyżej niż ptaki."},{"type":"line","text":"Ale także o tym, że nie wolno używać mocy, której się nie rozumie."},{"type":"line","text":"I że prawdziwa odwaga nie polega na tym, by wzbić się wysoko."},{"type":"line","text":"Prawdziwa odwaga polega na tym, by umieć wrócić na ziemię."},{"type":"line","text":"Jeśli ta historia została z tobą choć na chwilę, zabierz jej mały kawałek do snu."},{"type":"line","text":"Może będzie to czarny koń stojący na pałacowym dachu."},{"type":"line","text":"Może lot ponad chmurami."},{"type":"line","text":"A może jedno zdanie:"},{"type":"line","text":"zanim dotkniesz magii, naucz się jej słuchać."},{"type":"line","text":"Więcej bajek, legend i tajemniczych opowieści znajdziesz na stronie 3tatata.pl."},{"type":"line","text":"Możesz nas także słuchać na Spotify i oglądać na YouTube."},{"type":"line","text":"Zostaw follow albo subskrypcję, żeby nie przegapić kolejnych historii."},{"type":"line","text":"Dobranoc — i do usłyszenia w następnej bajce."}]},{"id":7,"title":"KSIĄŻĘ AHMED I WRÓŻKA PERI-BANU","tag":"Opowieść","sections":[{"type":"title","text":"KSIĄŻĘ AHMED I WRÓŻKA PERI-BANU"},{"type":"meta","text":"3TaTaTa — Opowieści z dalekich krain"},{"type":"section","text":"— WSTĘP DO ODCINKA —"},{"type":"line","text":"Wyobraź sobie trzech braci."},{"type":"line","text":"Każdy z nich jest księciem."},{"type":"line","text":"Każdy mieszka w pałacu."},{"type":"line","text":"Każdy ma piękne szaty, dobre konie i przyszłość, o której inni mogą tylko marzyć."},{"type":"line","text":"A jednak pewnego dnia wszyscy trzej muszą opuścić dom."},{"type":"line","text":"Nie po to, żeby walczyć."},{"type":"line","text":"Nie po to, żeby zdobyć złoto."},{"type":"line","text":"Wyruszają, by znaleźć coś najcenniejszego na świecie."},{"type":"line","text":"Jeden szuka przedmiotu, który widzi dalej niż oczy."},{"type":"line","text":"Drugi znajduje owoc, który potrafi ocalić życie."},{"type":"line","text":"Trzeci wypuszcza strzałę tak daleko, że sam los musi za nią podążyć."},{"type":"line","text":"I właśnie ta strzała zaprowadzi go do miejsca ukrytego przed ludzkim wzrokiem."},{"type":"line","text":"Do krainy, w której mieszka wróżka Peri-Banu."},{"type":"line","text":"KSIĄŻĘ AHMED I WRÓŻKA PERI-BANU"},{"type":"line","text":"Dawno temu, w królestwie bogatym i spokojnym, żył sułtan, który miał trzech synów."},{"type":"line","text":"Najstarszy nazywał się Husajn."},{"type":"line","text":"Był poważny, rozważny i lubił wszystko planować z wyprzedzeniem."},{"type":"line","text":"Średni syn miał na imię Ali."},{"type":"line","text":"Był szybki w myśleniu, ciekawy świata i zawsze pierwszy zadawał pytania."},{"type":"line","text":"Najmłodszy nazywał się Ahmed."},{"type":"line","text":"Nie był najsilniejszy."},{"type":"line","text":"Nie był najgłośniejszy."},{"type":"line","text":"Nie lubił popisywać się przed dworem."},{"type":"line","text":"Ale miał serce ciche, uważne i wierne."},{"type":"line","text":"Ludzie, którzy znali go dobrze, mówili, że Ahmed słucha tak, jakby każde słowo było małym darem."},{"type":"line","text":"W tym samym pałacu mieszkała księżniczka Nurunnisa."},{"type":"line","text":"Była córką krewnego sułtana i od dzieciństwa wychowywała się razem z książętami."},{"type":"line","text":"Kiedy byli mali, bawili się w ogrodach, budowali z piasku miasta, uciekali przed nauczycielami i wspinali się na drzewa granatowca."},{"type":"line","text":"Lata mijały."},{"type":"line","text":"Dzieci stały się dorosłe."},{"type":"line","text":"I wtedy stało się coś, co często zdarza się w baśniach, choć w prawdziwym życiu bywa znacznie trudniejsze: wszyscy trzej bracia pokochali tę samą osobę."},{"type":"line","text":"Pokochali Nurunnisę."},{"type":"line","text":"Każdy inaczej."},{"type":"line","text":"Husajn z powagą i wielkimi obietnicami."},{"type":"line","text":"Ali z zachwytem i błyskiem w oczach."},{"type":"line","text":"Ahmed z ciszą, która nie potrzebowała wielu słów."},{"type":"line","text":"Księżniczka była mądra i dobra, ale nie chciała wybierać sercem pod przymusem. Sułtan także nie chciał skrzywdzić żadnego z synów."},{"type":"line","text":"Przez wiele dni myślał, aż w końcu wezwał trzech książąt do sali tronowej."},{"type":"line","text":"Sala była wysoka, pełna światła i zapachu kadzidła. Na ścianach wisiały tkaniny przedstawiające dawne zwycięstwa rodu. Sułtan siedział na tronie, a jego twarz była poważna."},{"type":"line","text":"— Moi synowie — powiedział — każdy z was pragnie poślubić Nurunnisę. Nie chcę rozstrzygać tej sprawy pochopnie. Wyruszycie więc w świat. Każdy z was ma odnaleźć najrzadszy i najcenniejszy przedmiot. Kto przyniesie dar najwspanialszy, ten otrzyma prawo do ręki księżniczki."},{"type":"line","text":"Bracia skłonili się ojcu."},{"type":"line","text":"Nie byli zachwyceni."},{"type":"line","text":"Nie byli też spokojni."},{"type":"line","text":"Ale rozkaz sułtana był jasny."},{"type":"line","text":"Następnego ranka wyruszyli razem za miasto."},{"type":"line","text":"Przez trzy dni jechali jedną drogą, aż dotarli do wielkiego rozstaju."},{"type":"line","text":"Stał tam kamienny słup."},{"type":"line","text":"Jedna droga prowadziła ku górom."},{"type":"line","text":"Druga ku morzu."},{"type":"line","text":"Trzecia przez pustynię."},{"type":"line","text":"Husajn spojrzał na braci."},{"type":"line","text":"— Spotkamy się tutaj za rok — powiedział."},{"type":"line","text":"— Za rok — potwierdził Ali."},{"type":"line","text":"Ahmed położył dłoń na sercu."},{"type":"line","text":"— Niech każdy z nas wróci bezpiecznie."},{"type":"line","text":"Uściskali się."},{"type":"line","text":"Potem każdy ruszył w swoją stronę."},{"type":"line","text":"Husajn wybrał drogę ku górom."},{"type":"line","text":"Ali pojechał ku morzu."},{"type":"line","text":"Ahmed skierował konia na pustynię."},{"type":"line","text":"Najstarszy brat, Husajn, dotarł po wielu tygodniach do miasta leżącego między skalistymi szczytami."},{"type":"line","text":"Miasto było zimne, ale bogate. Kupcy sprzedawali tam futra, srebro, szkło i kamienie wydobywane głęboko pod ziemią."},{"type":"line","text":"Pewnego dnia Husajn zobaczył na targu człowieka trzymającego zwykły z pozoru dywan."},{"type":"line","text":"Dywan nie był wielki."},{"type":"line","text":"Nie wyglądał szczególnie pięknie."},{"type":"line","text":"Ale sprzedawca żądał za niego takiej ceny, jakby był utkany z gwiazd."},{"type":"line","text":"— Dlaczego tyle? — spytał książę."},{"type":"line","text":"Sprzedawca uśmiechnął się tajemniczo."},{"type":"line","text":"— Bo to nie jest zwykły dywan. Ten, kto na nim usiądzie i wypowie miejsce, do którego chce dotrzeć, znajdzie się tam szybciej, niż ptak zdąży machnąć skrzydłem."},{"type":"line","text":"Husajn nie uwierzył od razu."},{"type":"line","text":"Zażądał próby."},{"type":"line","text":"Usiedli razem na dywanie."},{"type":"line","text":"Sprzedawca wypowiedział nazwę pobliskiej wieży."},{"type":"line","text":"Świat zawirował."},{"type":"line","text":"Zanim Husajn zdążył mrugnąć, siedzieli na szczycie wieży, a pod nimi rozciągało się całe miasto."},{"type":"line","text":"Książę zapłacił wysoką cenę."},{"type":"line","text":"Kupił latający dywan i uznał, że znalazł dar nie do pokonania."},{"type":"line","text":"Średni brat, Ali, po długiej podróży dotarł do miasta portowego."},{"type":"line","text":"Było tam głośno od krzyków marynarzy, skrzypienia masztów i języków z całego świata."},{"type":"line","text":"Na jednym ze straganów zobaczył małą tubę z kości słoniowej, ozdobioną cienkimi złotymi liniami."},{"type":"line","text":"— Co to jest? — zapytał."},{"type":"line","text":"— Cudowna luneta — odpowiedział kupiec. — Kto przez nią spojrzy, zobaczy wybraną osobę albo miejsce, choćby znajdowały się na końcu świata."},{"type":"line","text":"Ali poprosił o dowód."},{"type":"line","text":"Przyłożył lunetę do oka i pomyślał o ojcu."},{"type":"line","text":"Natychmiast zobaczył sułtana siedzącego w ogrodzie pałacowym. Widział nawet, jak ojciec przesuwa dłonią po brodzie, tak jak robił zawsze, kiedy o czymś rozmyślał."},{"type":"line","text":"Ali zadrżał z zachwytu."},{"type":"line","text":"Kupił lunetę i był pewien, że jego dar jest najcenniejszy."},{"type":"line","text":"Najmłodszy Ahmed jechał przez pustynię."},{"type":"line","text":"Dni były gorące."},{"type":"line","text":"Noce zimne."},{"type":"line","text":"Czasem wydawało mu się, że piasek śpiewa pod kopytami konia."},{"type":"line","text":"Po wielu tygodniach dotarł do miasta słynącego z ogrodów, lekarzy i uczonych."},{"type":"line","text":"Tam, w cieniu wysokiej bramy, zobaczył starą kobietę sprzedającą jabłko."},{"type":"line","text":"Nie kosz jabłek."},{"type":"line","text":"Jedno jabłko."},{"type":"line","text":"Było złote, ale nie z metalu."},{"type":"line","text":"Jego skórka świeciła delikatnie, jakby owoc pamiętał słońce nawet w cieniu."},{"type":"line","text":"— Ile kosztuje? — zapytał Ahmed."},{"type":"line","text":"Kobieta podała cenę tak ogromną, że książę aż się cofnął."},{"type":"line","text":"— To tylko jabłko."},{"type":"line","text":"— Nie — powiedziała staruszka. — To jabłko życia. Kto powącha jego zapach, może zostać uzdrowiony z ciężkiej choroby, jeśli jego czas jeszcze nie dobiegł końca."},{"type":"line","text":"Ahmed spojrzał na owoc uważnie."},{"type":"line","text":"Nie myślał o zwycięstwie."},{"type":"line","text":"Pomyślał o ludziach, którzy cierpią."},{"type":"line","text":"O dzieciach gorączkujących nocą."},{"type":"line","text":"O matkach modlących się przy łóżkach."},{"type":"line","text":"O ojcach, którzy nie wiedzą, jak pomóc."},{"type":"line","text":"Kupił jabłko."},{"type":"line","text":"Nie dlatego, że chciał wygrać."},{"type":"line","text":"Dlatego, że taki przedmiot nie powinien pozostać tam, gdzie może go kupić ktoś bez serca."},{"type":"line","text":"Minął rok."},{"type":"line","text":"Trzej bracia spotkali się przy kamiennym słupie na rozstaju dróg."},{"type":"line","text":"Każdy opowiedział o swoim darze."},{"type":"line","text":"Husajn pokazał dywan."},{"type":"line","text":"Ali pokazał lunetę."},{"type":"line","text":"Ahmed pokazał jabłko życia."},{"type":"line","text":"Zaczęli się spierać, który przedmiot jest najwspanialszy."},{"type":"line","text":"Wtedy Ali powiedział:"},{"type":"line","text":"— Sprawdźmy, co dzieje się w domu."},{"type":"line","text":"Przyłożył lunetę do oka i pomyślał o Nurunnisie."},{"type":"line","text":"Nagle pobladł."},{"type":"line","text":"— Ona jest chora — wyszeptał. — Bardzo chora. Leży w pałacu, a lekarze stoją bezradni."},{"type":"line","text":"Bracia nie tracili czasu."},{"type":"line","text":"Usiedli na dywanie Husajna."},{"type":"line","text":"— Do pałacu ojca! — zawołał najstarszy."},{"type":"line","text":"Świat zawirował."},{"type":"line","text":"Chwilę później znaleźli się w komnacie księżniczki."},{"type":"line","text":"Nurunnisa leżała blada i nieruchoma."},{"type":"line","text":"Lekarze spuszczali głowy."},{"type":"line","text":"Sułtan siedział przy jej łóżku, jakby w jednej nocy postarzał się o wiele lat."},{"type":"line","text":"Ahmed podszedł do księżniczki."},{"type":"line","text":"Wyjął jabłko życia."},{"type":"line","text":"Delikatnie zbliżył je do jej twarzy."},{"type":"line","text":"Zapach owocu rozszedł się po komnacie — ciepły, słodki i świeży, jak pierwszy poranek po długiej zimie."},{"type":"line","text":"Nurunnisa poruszyła palcami."},{"type":"line","text":"Potem otworzyła oczy."},{"type":"line","text":"Kolor wrócił na jej policzki."},{"type":"line","text":"Oddech stał się spokojny."},{"type":"line","text":"Księżniczka została ocalona."},{"type":"line","text":"Wszyscy cieszyli się ogromnie, ale zaraz potem pojawiło się pytanie: który z braci przyniósł najcenniejszy dar?"},{"type":"line","text":"Bez lunety Alego nie wiedzieliby, że Nurunnisa umiera."},{"type":"line","text":"Bez dywanu Husajna nie zdążyliby wrócić na czas."},{"type":"line","text":"Bez jabłka Ahmeda nie dałoby się jej uzdrowić."},{"type":"line","text":"Sułtan długo rozmyślał."},{"type":"line","text":"W końcu powiedział:"},{"type":"line","text":"— Każdy dar był konieczny. Żaden nie był ważniejszy od pozostałych. Musimy więc znaleźć inny sposób."},{"type":"line","text":"Kazał przynieść łuki."},{"type":"line","text":"— Każdy z was wypuści strzałę — oznajmił. — Ten, którego strzała poleci najdalej, poślubi Nurunnisę."},{"type":"line","text":"Najpierw strzelał Husajn."},{"type":"line","text":"Jego strzała poleciała daleko, ponad murami ogrodu, aż wylądowała na suchym polu."},{"type":"line","text":"Potem strzelał Ali."},{"type":"line","text":"Jego strzała poleciała jeszcze dalej i spadła za wzgórzem."},{"type":"line","text":"Na końcu stanął Ahmed."},{"type":"line","text":"Naciągnął łuk."},{"type":"line","text":"Nie prosił losu o zwycięstwo."},{"type":"line","text":"Poprosił tylko w sercu, by stało się to, co ma się stać."},{"type":"line","text":"Wypuścił strzałę."},{"type":"line","text":"Poleciała tak daleko, że nikt nie zobaczył, gdzie spadła."},{"type":"line","text":"Szukano jej cały dzień."},{"type":"line","text":"Szukano następnego dnia."},{"type":"line","text":"Nie znaleziono."},{"type":"line","text":"Sułtan uznał więc, że wygrał Ali, którego strzała była najdalszą odnalezioną."},{"type":"line","text":"Nurunnisa została jego żoną."},{"type":"line","text":"Husajn, zraniony i zmęczony pragnieniami, odszedł do klasztoru mędrców w górach."},{"type":"line","text":"A Ahmed?"},{"type":"line","text":"Ahmed nie czuł gniewu."},{"type":"line","text":"Nie czuł też radości."},{"type":"line","text":"Czuł tylko dziwne, ciche wołanie."},{"type":"line","text":"Jakby jego strzała nie zginęła."},{"type":"line","text":"Jakby zapraszała go, by ruszył za nią."},{"type":"line","text":"Wyruszył sam."},{"type":"line","text":"Przez wiele dni przeszukiwał pustkowia, doliny i skały."},{"type":"line","text":"Wreszcie, w miejscu, gdzie kamienne zbocze wyglądało zupełnie zwyczajnie, zobaczył swoją strzałę."},{"type":"line","text":"Tkwiła w ziemi przed niewielką szczeliną w skale."},{"type":"line","text":"Ahmed podszedł bliżej."},{"type":"line","text":"Szczelina rozszerzyła się nagle, jakby kamień od dawna czekał właśnie na niego."},{"type":"line","text":"Za nią znajdowały się schody prowadzące w dół."},{"type":"line","text":"Książę zszedł ostrożnie."},{"type":"line","text":"Nie było ciemno."},{"type":"line","text":"Ściany świeciły łagodnym blaskiem, a powietrze pachniało różą, deszczem i czymś tak pięknym, że nie umiał tego nazwać."},{"type":"line","text":"Schody doprowadziły go do pałacu ukrytego pod ziemią."},{"type":"line","text":"Nie był ponury."},{"type":"line","text":"Był jasny."},{"type":"line","text":"Kolumny wyglądały jak utkane z perłowego światła, fontanny śpiewały cicho, a po ogrodach spacerowały ptaki, których pióra mieniły się jak zorza."},{"type":"line","text":"Na środku sali stała kobieta niezwykłej urody."},{"type":"line","text":"Miała oczy spokojne i głębokie, jakby widziała więcej niż zwykli ludzie."},{"type":"line","text":"— Witaj, Ahmedzie — powiedziała."},{"type":"line","text":"Książę skłonił się."},{"type":"line","text":"— Znasz moje imię?"},{"type":"line","text":"— Znam imię tego, którego sprowadziła strzała."},{"type":"line","text":"— Kim jesteś?"},{"type":"line","text":"— Nazywam się Peri-Banu. Jestem z rodu peri — istot, które ludzie nazywają wróżkami, duchami powietrza albo córkami światła."},{"type":"line","text":"Ahmed milczał, zdumiony."},{"type":"line","text":"Peri-Banu uśmiechnęła się łagodnie."},{"type":"line","text":"— Twoja strzała nie zginęła. Została poprowadzona. Nie po to, byś przegrał, ale po to, byś znalazł drogę przeznaczoną dla ciebie."},{"type":"line","text":"Ahmed został w ukrytym pałacu."},{"type":"line","text":"Nie jako więzień."},{"type":"line","text":"Nie jako zdobywca."},{"type":"line","text":"Jako gość."},{"type":"line","text":"Z dnia na dzień poznawał Peri-Banu. Była mądra, dobra i silna w sposób, który nie potrzebował krzyku. Jej królestwo było piękne, ale nie puste. Żyły tam istoty, które znały języki wiatru, ruch gwiazd i sekrety roślin rosnących pod ziemią."},{"type":"line","text":"Ahmed, który stracił nadzieję na jedną miłość, odkrył coś innego."},{"type":"line","text":"Nie nagrodę pocieszenia."},{"type":"line","text":"Nie zastępstwo."},{"type":"line","text":"Prawdziwe uczucie, które rosło spokojnie, bez przymusu i bez rywalizacji."},{"type":"line","text":"Po pewnym czasie Ahmed i Peri-Banu pobrali się."},{"type":"line","text":"Książę był szczęśliwy."},{"type":"line","text":"Jednak nie zapomniał o ojcu."},{"type":"line","text":"Co miesiąc odwiedzał sułtana, przywożąc mu niezwykłe dary: tkaniny lekkie jak mgła, owoce słodsze niż miód i kamienie świecące nocą bez ognia."},{"type":"line","text":"Sułtan cieszył się z wizyt syna, ale z czasem w jego sercu pojawił się niepokój."},{"type":"line","text":"Skąd Ahmed ma te bogactwa?"},{"type":"line","text":"Gdzie mieszka?"},{"type":"line","text":"Kto mu pomaga?"},{"type":"line","text":"Na dworze była stara czarownica, która udawała doradczynię i wróżbitkę. Jej serce nie lubiło cudzej radości."},{"type":"line","text":"Podsunęła sułtanowi podejrzenie."},{"type":"line","text":"— Panie — szeptała — może twój syn ma moc większą niż ty. Może pewnego dnia zechce odebrać ci tron."},{"type":"line","text":"Sułtan nie chciał w to wierzyć."},{"type":"line","text":"Ale podejrzenie jest jak ziarenko piasku w bucie. Nawet jeśli jest małe, potrafi ranić przy każdym kroku."},{"type":"line","text":"Wezwał więc Ahmeda i zaczął stawiać mu niemożliwe żądania."},{"type":"line","text":"Najpierw kazał mu przynieść namiot, który zmieści się w dłoni, ale po rozstawieniu przykryje całą armię."},{"type":"line","text":"Ahmed wrócił smutny do Peri-Banu."},{"type":"line","text":"— Ojciec mnie kocha — powiedział — ale ktoś zatruwa jego myśli."},{"type":"line","text":"Peri-Banu wysłuchała go spokojnie."},{"type":"line","text":"— Jeśli prosi o namiot, dostanie namiot."},{"type":"line","text":"Dała mu mały zwinięty kawałek tkaniny."},{"type":"line","text":"Wyglądał jak chusteczka."},{"type":"line","text":"Gdy Ahmed rozłożył go przed sułtanem, namiot urósł tak ogromny, że mógł pomieścić tysiące żołnierzy, konie, kuchnie i całe zapasy."},{"type":"line","text":"Dwór zaniemówił."},{"type":"line","text":"Ale czarownica nie zamilkła."},{"type":"line","text":"Podsunęła sułtanowi kolejną próbę."},{"type":"line","text":"Tym razem zażądał wody z Lwiej Fontanny, której strzegły potwory."},{"type":"line","text":"Peri-Banu dała Ahmedowi wskazówki, odwagę i magiczną ochronę."},{"type":"line","text":"Książę zdobył wodę i wrócił cały."},{"type":"line","text":"Sułtan powinien był wtedy zrozumieć, że syn nie działa przeciw niemu."},{"type":"line","text":"Ale lęk, karmiony szeptami, rośnie szybko."},{"type":"line","text":"W końcu czarownica wymyśliła najtrudniejsze żądanie."},{"type":"line","text":"— Poproś syna — powiedziała — by przyprowadził człowieka niskiego wzrostu, z brodą długą na wiele łokci, który nosi żelazną maczugę cięższą niż stu wojowników."},{"type":"line","text":"Ahmed, słysząc to, nie wiedział, co powiedzieć."},{"type":"line","text":"Peri-Banu jednak uśmiechnęła się po raz pierwszy z odrobiną rozbawienia."},{"type":"line","text":"— To mój brat — powiedziała. — Nazywa się Szajbar. Jest mały, ale nie radzę nikomu go lekceważyć."},{"type":"line","text":"Szajbar przybył następnego dnia."},{"type":"line","text":"Był rzeczywiście niski, ale jego broda ciągnęła się niemal po ziemi, a maczugę niósł tak lekko, jak dziecko niesie patyk."},{"type":"line","text":"Kiedy stanął przed sułtanem, spojrzał na niego przenikliwie."},{"type":"line","text":"— Kto kazał ci żądać rzeczy, których nie rozumiesz? — zapytał głosem mocnym jak uderzenie w bramę."},{"type":"line","text":"Sułtan zadrżał."},{"type":"line","text":"Czarownica próbowała uciec, ale prawda była szybsza."},{"type":"line","text":"Jej kłamstwa wyszły na jaw."},{"type":"line","text":"Sułtan zrozumiał, że dał się prowadzić lękowi, a nie miłości."},{"type":"line","text":"Było mu wstyd."},{"type":"line","text":"Bardzo wstyd."},{"type":"line","text":"Kiedy Ahmed stanął przed nim, ojciec zszedł z tronu i objął syna."},{"type":"line","text":"— Przebacz mi — powiedział. — Uwierzyłem szeptom bardziej niż twojemu sercu."},{"type":"line","text":"Ahmed odpowiedział:"},{"type":"line","text":"— Ojcze, wróciłem nie po władzę. Wróciłem, bo syn nie powinien zapominać drogi do domu."},{"type":"line","text":"Od tamtej pory sułtan nie słuchał już ludzi, którzy karmili go strachem."},{"type":"line","text":"Ahmed i Peri-Banu żyli szczęśliwie w swoim ukrytym królestwie, ale często odwiedzali pałac na powierzchni."},{"type":"line","text":"A sułtan, kiedy tylko patrzył na syna, przypominał sobie, że nie każda przegrana jest końcem."},{"type":"line","text":"Czasem strzała, której nie można znaleźć, nie ginie wcale."},{"type":"line","text":"Czasem leci tam, gdzie człowiek sam nigdy by nie poszedł."},{"type":"line","text":"I czeka, aż będzie gotów za nią podążyć."},{"type":"section","text":"— ZAKOŃCZENIE PODCASTOWE —"},{"type":"line","text":"I tak kończy się dzisiejsza opowieść: „Książę Ahmed i wróżka Peri-Banu”."},{"type":"line","text":"To historia o trzech darach, trzech braciach i jednej strzale, która poleciała dalej, niż ktokolwiek potrafił zobaczyć."},{"type":"line","text":"Ale najważniejsze nie było to, kto wygrał."},{"type":"line","text":"Najważniejsze było to, że czasem droga, która wygląda jak porażka, prowadzi człowieka do miejsca przeznaczonego właśnie dla niego."},{"type":"line","text":"Jeśli ta historia została z tobą choć na chwilę, zabierz jej mały kawałek do snu."},{"type":"line","text":"Może będzie to latający dywan."},{"type":"line","text":"Może złote jabłko życia."},{"type":"line","text":"Może ukryty pałac Peri-Banu."},{"type":"line","text":"A może jedno zdanie:"},{"type":"line","text":"nie każda zgubiona strzała naprawdę się gubi."},{"type":"line","text":"Więcej bajek, legend i tajemniczych opowieści znajdziesz na stronie 3tatata.pl."},{"type":"line","text":"Możesz nas także słuchać na Spotify i oglądać na YouTube."},{"type":"line","text":"Zostaw follow albo subskrypcję, żeby nie przegapić kolejnych historii."},{"type":"line","text":"Dobranoc — i do usłyszenia w następnej bajce."}]},{"id":8,"title":"ZŁOTY PTAK Z OGRODU SUŁTANA","tag":"Opowieść","sections":[{"type":"title","text":"ZŁOTY PTAK Z OGRODU SUŁTANA"},{"type":"meta","text":"3TaTaTa — Opowieści z dalekich krain"},{"type":"section","text":"— WSTĘP DO ODCINKA —"},{"type":"line","text":"Wyobraź sobie ogród tak piękny, że ludzie mówili o nim szeptem."},{"type":"line","text":"Nie dlatego, że było w nim strasznie."},{"type":"line","text":"Dlatego, że w niektórych miejscach nawet głos powinien zachowywać się ostrożnie."},{"type":"line","text":"W tym ogrodzie rosły drzewa granatowca, palmy daktylowe i krzewy róż, które pachniały najmocniej tuż przed świtem."},{"type":"line","text":"Pośrodku ogrodu stało jedno niezwykłe drzewo."},{"type":"line","text":"Nie było najwyższe."},{"type":"line","text":"Nie miało najgrubszych gałęzi."},{"type":"line","text":"Ale rodziło złote jabłka."},{"type":"line","text":"Każdej nocy dojrzewało jedno."},{"type":"line","text":"Każdego ranka jedno znikało."},{"type":"line","text":"Strażnicy niczego nie widzieli."},{"type":"line","text":"Psy nie szczekały."},{"type":"line","text":"A sułtan, który nie lubił tajemnic we własnym pałacu, postanowił odkryć prawdę."},{"type":"line","text":"Tak zaczyna się historia o złotym ptaku, trzech braciach i chłopcu, który nauczył się, że nie każdą piękną rzecz trzeba od razu chwytać w dłonie."},{"type":"section","text":"— ZŁOTY PTAK Z OGRODU SUŁTANA —"},{"type":"line","text":"Dawno temu, za siedmioma pustyniami i trzema rzekami, stało miasto z białego kamienia."},{"type":"line","text":"W dzień było jasne jak muszla."},{"type":"line","text":"W nocy srebrzyło się pod księżycem."},{"type":"line","text":"W samym środku miasta znajdował się pałac sułtana."},{"type":"line","text":"Miał wysokie wieże, błękitne kopuły i bramy tak szerokie, że mogła przez nie przejechać cała karawana wielbłądów."},{"type":"line","text":"Ale największym skarbem pałacu nie były marmury, jedwabie ani złote naczynia."},{"type":"line","text":"Największym skarbem był ogród."},{"type":"line","text":"Sułtan kochał ten ogród bardziej niż wszystkie klejnoty w skarbcu."},{"type":"line","text":"W ogrodzie rosły cyprysy proste jak świece, drzewa pomarańczowe, figowce, jaśmin i róże w kolorze zachodzącego słońca. Wąskie strumyki przecinały alejki, a fontanny śpiewały od rana do wieczora."},{"type":"line","text":"Na samym środku ogrodu rosło drzewo złotych jabłek."},{"type":"line","text":"Nikt nie wiedział, skąd się wzięło."},{"type":"line","text":"Jedni mówili, że wyrosło z nasiona przyniesionego przez wiatr z krainy dżinów."},{"type":"line","text":"Inni szeptali, że zasadziła je dawno temu wróżka, która zakochała się w człowieku i zostawiła mu owoc światła na pamiątkę."},{"type":"line","text":"Drzewo było niewysokie, ale piękne."},{"type":"line","text":"Liście miało ciemnozielone i błyszczące."},{"type":"line","text":"Kora była gładka, lekko srebrna."},{"type":"line","text":"A na jednej z gałęzi, każdej nocy, dojrzewało złote jabłko."},{"type":"line","text":"Prawdziwie złote."},{"type":"line","text":"Nie żółte."},{"type":"line","text":"Nie błyszczące jak złoto."},{"type":"line","text":"Złote."},{"type":"line","text":"Kiedy wisiało wśród liści, cały ogród rozświetlał się łagodnym blaskiem, jakby ktoś ukrył między gałęziami małe słońce."},{"type":"line","text":"Sułtan był z tego drzewa bardzo dumny."},{"type":"line","text":"Każdego poranka przychodził do ogrodu, dotykał jabłka i oddawał je do skarbca, gdzie leżały już inne złote owoce."},{"type":"line","text":"Aż pewnego ranka jabłko zniknęło."},{"type":"line","text":"Sułtan stanął pod drzewem i zmarszczył brwi."},{"type":"line","text":"— Kto je zerwał? — zapytał ogrodników."},{"type":"line","text":"Ogrodnicy padli na kolana."},{"type":"line","text":"— Panie, nikt z nas."},{"type":"line","text":"— Kto wszedł nocą do ogrodu?"},{"type":"line","text":"— Nikt, panie. Bramy były zamknięte. Strażnicy czuwali."},{"type":"line","text":"Sułtan nie lubił odpowiedzi, które niczego nie wyjaśniały."},{"type":"line","text":"Rozkazał więc podwoić straże."},{"type":"line","text":"Następnej nocy przy każdej bramie stało po dwóch ludzi."},{"type":"line","text":"Przy murach chodziły psy."},{"type":"line","text":"Na dachach czuwały łucznicy."},{"type":"line","text":"A jednak rano jabłka znów nie było."},{"type":"line","text":"Trzeciej nocy strażników było jeszcze więcej."},{"type":"line","text":"Niektórzy stali za krzewami."},{"type":"line","text":"Inni ukryli się przy fontannach."},{"type":"line","text":"Najwierniejszy dowódca straży czuwał tuż obok drzewa."},{"type":"line","text":"Ale kiedy przyszło najciemniejsze miejsce nocy — ta krótka chwila przed świtem, kiedy nawet czujne oczy zaczynają być ciężkie — coś musiało się wydarzyć."},{"type":"line","text":"Rano złote jabłko zniknęło."},{"type":"line","text":"Sułtan wpadł w gniew."},{"type":"line","text":"Nie był to gniew człowieka, który stracił tylko kosztowny owoc."},{"type":"line","text":"Był to gniew kogoś, kto zrozumiał, że w jego pałacu istnieje tajemnica silniejsza niż rozkazy."},{"type":"line","text":"Sułtan miał trzech synów."},{"type":"line","text":"Najstarszy nazywał się Dżalal."},{"type":"line","text":"Był odważny, ale zbyt pewny siebie."},{"type":"line","text":"Średni miał na imię Karim."},{"type":"line","text":"Był sprytny, ale lubił wybierać drogę najłatwiejszą."},{"type":"line","text":"Najmłodszy nazywał się Samir."},{"type":"line","text":"Nie był tak silny jak Dżalal ani tak przebiegły jak Karim."},{"type":"line","text":"Miał jednak coś, co często okazuje się ważniejsze: umiał czekać."},{"type":"line","text":"Tego dnia sułtan wezwał synów do sali tronowej."},{"type":"line","text":"— Kto odkryje, kto kradnie złote jabłka — powiedział — ten otrzyma moją największą wdzięczność i prawo wyboru nagrody."},{"type":"line","text":"Dżalal wystąpił pierwszy."},{"type":"line","text":"— Ojcze, pozwól mi czuwać tej nocy. Jeśli złodziej przyjdzie, pochwycę go."},{"type":"line","text":"Sułtan zgodził się."},{"type":"line","text":"Noc była ciepła."},{"type":"line","text":"Księżyc stał wysoko."},{"type":"line","text":"Dżalal założył zbroję, wziął miecz i usiadł pod drzewem."},{"type":"line","text":"Przez pierwszą godzinę patrzył uważnie."},{"type":"line","text":"Przez drugą chodził wokół pnia."},{"type":"line","text":"Przez trzecią zaczął myśleć, że cała sprawa jest prostsza, niż wszyscy mówią."},{"type":"line","text":"„Żaden złodziej nie odważy się przyjść, kiedy ja tu jestem” — pomyślał."},{"type":"line","text":"Oparł się o drzewo."},{"type":"line","text":"Tylko na chwilę."},{"type":"line","text":"A chwila nocą potrafi stać się snem."},{"type":"line","text":"Kiedy obudził się o świcie, jabłka nie było."},{"type":"line","text":"Sułtan nie powiedział wiele."},{"type":"line","text":"Jego milczenie było gorsze niż krzyk."},{"type":"line","text":"Następnej nocy czuwał Karim."},{"type":"line","text":"Nie wziął ciężkiej zbroi."},{"type":"line","text":"Nie usiadł pod drzewem."},{"type":"line","text":"Uznał, że trzeba być sprytniejszym."},{"type":"line","text":"Rozłożył wokół drzewa cienkie sznurki z małymi dzwoneczkami. Posypał ziemię jasnym pyłem, by rano zobaczyć ślady. Ukrył się w altanie i czekał."},{"type":"line","text":"Przez pierwsze godziny był zadowolony ze swojego planu."},{"type":"line","text":"Potem noc zrobiła się chłodna."},{"type":"line","text":"Potem cicha."},{"type":"line","text":"Potem monotonna."},{"type":"line","text":"Dzwoneczki milczały."},{"type":"line","text":"Liście poruszały się lekko."},{"type":"line","text":"Fontanna pluskała jednostajnie."},{"type":"line","text":"Karim zamknął oczy tylko po to, by chwilę odpoczęły."},{"type":"line","text":"Rano obudził go ogrodnik."},{"type":"line","text":"Złotego jabłka nie było."},{"type":"line","text":"Dzwoneczki nie zadzwoniły."},{"type":"line","text":"Na pyle nie było śladów."},{"type":"line","text":"Trzeciej nocy przed sułtanem stanął Samir."},{"type":"line","text":"— Ojcze, pozwól mi spróbować."},{"type":"line","text":"Dżalal parsknął."},{"type":"line","text":"— Ty? Skoro mnie się nie udało?"},{"type":"line","text":"Karim uśmiechnął się krzywo."},{"type":"line","text":"— Może zapytasz złodzieja grzecznie, czy zechce oddać jabłko?"},{"type":"line","text":"Samir nie odpowiedział braciom."},{"type":"line","text":"Spojrzał tylko na ojca."},{"type":"line","text":"Sułtan był zmęczony, ale skinął głową."},{"type":"line","text":"— Idź."},{"type":"line","text":"Samir nie wziął zbroi."},{"type":"line","text":"Nie rozłożył pułapek."},{"type":"line","text":"Nie kazał nikomu ukrywać się w krzakach."},{"type":"line","text":"Wziął tylko ciepły płaszcz, miskę wody i mały nóż, którym można było obrać owoc albo przyciąć sznurek."},{"type":"line","text":"Usiadł nie pod drzewem, lecz kilka kroków dalej, w cieniu cyprysu."},{"type":"line","text":"Nie patrzył bez przerwy na jabłko."},{"type":"line","text":"Patrzył na cały ogród."},{"type":"line","text":"Na mur."},{"type":"line","text":"Na fontannę."},{"type":"line","text":"Na cień liści."},{"type":"line","text":"Na niebo."},{"type":"line","text":"Wiedział, że jeśli człowiek wpatruje się w jedno miejsce zbyt długo, przestaje widzieć resztę świata."},{"type":"line","text":"Noc mijała wolno."},{"type":"line","text":"Samir poczuł senność, więc zanurzył palce w misce z zimną wodą."},{"type":"line","text":"Potem przetarł twarz."},{"type":"line","text":"Potem wstał i przeszedł się bezszelestnie między krzewami."},{"type":"line","text":"Kiedy nadeszła najciemniejsza chwila przed świtem, ogród nagle ucichł."},{"type":"line","text":"Nie tak jak zwykle."},{"type":"line","text":"Fontanna jakby przytłumiła swój śpiew."},{"type":"line","text":"Liście przestały szeleścić."},{"type":"line","text":"Nawet owady zamilkły."},{"type":"line","text":"Samir uniósł głowę."},{"type":"line","text":"Wysoko nad ogrodem pojawiło się światło."},{"type":"line","text":"Najpierw myślał, że to spadająca gwiazda."},{"type":"line","text":"Potem zobaczył skrzydła."},{"type":"line","text":"Do drzewa przyleciał ptak."},{"type":"line","text":"Był większy od sokoła, ale poruszał się lekko jak iskra."},{"type":"line","text":"Pióra miał złote."},{"type":"line","text":"Nie żółte."},{"type":"line","text":"Nie rude."},{"type":"line","text":"Złote jak jabłko, które co noc znikało z drzewa."},{"type":"line","text":"Kiedy usiadł na gałęzi, cały ogród rozświetlił się ciepłym blaskiem."},{"type":"line","text":"Ptak pochylił głowę, delikatnie dotknął dziobem owocu i zerwał go tak ostrożnie, jakby nie kradł, lecz zabierał coś, co do niego należało."},{"type":"line","text":"Samir mógł rzucić nożem."},{"type":"line","text":"Mógł krzyknąć."},{"type":"line","text":"Mógł wezwać straż."},{"type":"line","text":"Ale nie zrobił tego."},{"type":"line","text":"Było w tym ptaku coś tak pięknego, że przemoc wydawała się nagle zbyt ciężka."},{"type":"line","text":"Samir wyciągnął tylko rękę i chwycił jedno pióro, które oderwało się z ogona ptaka."},{"type":"line","text":"Ptak drgnął."},{"type":"line","text":"Spojrzał na chłopca."},{"type":"line","text":"Ich oczy spotkały się na krótką chwilę."},{"type":"line","text":"Potem złoty ptak wzbił się w powietrze i zniknął nad murem ogrodu."},{"type":"line","text":"Rano Samir przyniósł ojcu pióro."},{"type":"line","text":"Sala tronowa wypełniła się światłem, gdy tyl
