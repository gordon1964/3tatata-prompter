<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="3TaTaTa Prompter">
<title>3TaTaTa Teleprompter</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --text: #f0ede6;
    --accent: #c8a96e;
    --accent2: #7eb8c9;
    --dim: #3a3a3a;
    --panel: #111111;
    --border: #222222;
    --speed: 60px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Serif Display', Georgia, serif;
    height: 100%;
    overflow: hidden;
    touch-action: manipulation;
  }

  /* ======= MENU SCREEN ======= */
  #menu-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center;
    padding: 60px 40px 40px;
    overflow-y: auto;
    z-index: 100;
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .menu-title {
    font-size: clamp(36px, 8vw, 64px);
    color: var(--text);
    text-align: center;
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .menu-subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.2em;
    color: #666;
    text-transform: uppercase;
    margin-bottom: 50px;
  }

  .story-list {
    width: 100%;
    max-width: 700px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .story-item {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 20px 24px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s ease;
    text-decoration: none;
    color: inherit;
  }

  .story-item:active {
    background: #1a1a1a;
    border-color: var(--accent);
    transform: scale(0.99);
  }

  .story-num {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    min-width: 28px;
    letter-spacing: 0.05em;
  }

  .story-info { flex: 1; }

  .story-name {
    font-size: 18px;
    color: var(--text);
    margin-bottom: 3px;
    line-height: 1.2;
  }

  .story-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #555;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .story-arrow {
    color: #333;
    font-size: 20px;
    transition: color 0.15s;
  }

  .story-item:active .story-arrow { color: var(--accent); }

  /* ======= PROMPTER SCREEN ======= */
  #prompter-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: none;
    flex-direction: column;
  }

  /* TOP BAR */
  #top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 56px;
    background: linear-gradient(to bottom, rgba(10,10,10,1) 70%, rgba(10,10,10,0));
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 50;
  }

  #back-btn {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.15em;
    color: #555;
    text-transform: uppercase;
    background: none; border: none;
    cursor: pointer;
    padding: 10px 0;
    display: flex; align-items: center; gap: 8px;
  }
  #back-btn:active { color: var(--accent); }

  #story-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: #444;
    text-transform: uppercase;
    text-align: center;
    flex: 1;
    padding: 0 20px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #font-btn {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: #555;
    background: none; border: none;
    cursor: pointer;
    padding: 10px 0;
    letter-spacing: 0.1em;
  }
  #font-btn:active { color: var(--accent); }

  /* SCROLL CONTAINER */
  #scroll-container {
    flex: 1;
    overflow: hidden;
    position: relative;
    cursor: pointer;
  }

  #scroll-inner {
    padding: 80px 5vw 70vh;
    will-change: transform;
  }

  /* Reading guide line */
  #guide-line {
    position: fixed;
    top: 38%;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--accent) 20%, var(--accent) 80%, transparent);
    opacity: 0.25;
    pointer-events: none;
    z-index: 10;
  }

  /* Top/bottom fade */
  #scroll-container::before,
  #scroll-container::after {
    content: '';
    position: fixed;
    left: 0; right: 0;
    height: 120px;
    pointer-events: none;
    z-index: 5;
  }
  #scroll-container::before {
    top: 56px;
    background: linear-gradient(to bottom, var(--bg), transparent);
  }
  #scroll-container::after {
    bottom: 80px;
    background: linear-gradient(to top, var(--bg), transparent);
  }

  /* TEXT STYLING */
  .prompt-title {
    font-size: clamp(22px, 5vw, 36px);
    color: var(--accent);
    text-align: center;
    margin-bottom: 8px;
    line-height: 1.2;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .prompt-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #444;
    text-align: center;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 60px;
  }

  .prompt-section {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    text-align: center;
    margin: 40px 0 20px;
    opacity: 0.7;
  }

  .prompt-line {
    font-size: clamp(28px, 5.5vw, 52px);
    text-align: center;
    line-height: 1.45;
    color: var(--text);
    padding: 8px 0;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .prompt-sep {
    text-align: center;
    color: var(--dim);
    font-size: 18px;
    padding: 24px 0;
    letter-spacing: 0.5em;
  }

  /* CONTROLS BAR */
  #controls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    background: linear-gradient(to top, rgba(10,10,10,1) 80%, transparent);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 0 24px;
    z-index: 50;
  }

  .ctrl-group {
    display: flex;
    align-items: center;
    gap: 0;
    background: #161616;
    border: 1px solid #222;
    border-radius: 8px;
    overflow: hidden;
  }

  .ctrl-btn {
    background: none;
    border: none;
    color: #777;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 12px 18px;
    cursor: pointer;
    transition: all 0.1s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    min-width: 56px;
    border-right: 1px solid #1e1e1e;
  }
  .ctrl-btn:last-child { border-right: none; }
  .ctrl-btn:active { background: #1e1e1e; color: var(--accent); }
  .ctrl-btn .icon { font-size: 18px; line-height: 1; }
  .ctrl-btn .label { font-size: 9px; opacity: 0.6; letter-spacing: 0.15em; }

  #play-btn .icon { font-size: 22px; }
  #play-btn { color: var(--text); }
  #play-btn.playing .icon::before { content: '⏸'; }
  #play-btn:not(.playing) .icon::before { content: '▶'; }
  #play-btn .icon::before { }

  /* Speed display */
  #speed-display {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    min-width: 36px;
    text-align: center;
  }

  /* FONT SIZE control */
  .font-size-sm { --line-fs: clamp(20px, 4vw, 38px); }
  .font-size-md { --line-fs: clamp(28px, 5.5vw, 52px); }
  .font-size-lg { --line-fs: clamp(36px, 7vw, 68px); }
  .font-size-xl { --line-fs: clamp(44px, 9vw, 86px); }

  .font-size-sm .prompt-line  { font-size: var(--line-fs, clamp(20px,4vw,38px)); }
  .font-size-md .prompt-line  { font-size: var(--line-fs, clamp(28px,5.5vw,52px)); }
  .font-size-lg .prompt-line  { font-size: var(--line-fs, clamp(36px,7vw,68px)); }
  .font-size-xl .prompt-line  { font-size: var(--line-fs, clamp(44px,9vw,86px)); }

  /* Progress bar */
  #progress-bar {
    position: fixed;
    top: 56px; left: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0.4;
    width: 0%;
    z-index: 51;
    transition: width 0.3s ease;
  }

  /* HIDDEN */
  .hidden { display: none !important; }

  /* Touch zones */
  #tap-left, #tap-right {
    position: fixed;
    top: 56px; bottom: 80px;
    width: 30%;
    z-index: 20;
  }
  #tap-left { left: 0; }
  #tap-right { right: 0; }
</style>
</head>
<body>

<!-- MENU -->
<div id="menu-screen">
  <div class="logo">3TaTaTa</div>
  <h1 class="menu-title">Teleprompter</h1>
  <p class="menu-subtitle">Wybierz opowiadanie</p>
  <div class="story-list" id="story-list"></div>
</div>

<!-- PROMPTER -->
<div id="prompter-screen">
  <div id="top-bar">
    <button id="back-btn" onclick="goBack()">← MENU</button>
    <div id="story-label"></div>
    <button id="font-btn" onclick="cycleFont()">Aa</button>
  </div>

  <div id="progress-bar"></div>
  <div id="guide-line"></div>

  <div id="scroll-container" onclick="togglePlay()">
    <div id="scroll-inner"></div>
  </div>

  <div id="tap-left" onclick="slowDown(); event.stopPropagation();"></div>
  <div id="tap-right" onclick="speedUp(); event.stopPropagation();"></div>

  <div id="controls" onclick="event.stopPropagation()">
    <div class="ctrl-group">
      <button class="ctrl-btn" onclick="slowDown()">
        <span class="icon">−</span>
        <span class="label">WOLNIEJ</span>
      </button>
      <button class="ctrl-btn" id="play-btn" onclick="togglePlay()">
        <span class="icon"></span>
        <span class="label">PLAY</span>
      </button>
      <button class="ctrl-btn" onclick="speedUp()">
        <span class="icon">+</span>
        <span class="label">SZYBCIEJ</span>
      </button>
      <button class="ctrl-btn" onclick="resetScroll()">
        <span class="icon">↩</span>
        <span class="label">RESET</span>
      </button>
    </div>
  </div>
</div>

      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Wreszcie Jonek dotarł do niewielkiej komory."
      },
      {
        "type": "line",
        "text": "Na środku stał niski, siwy górnik"
      },
      {
        "type": "line",
        "text": "z lampką w dłoni."
      },
      {
        "type": "line",
        "text": "Nie pracował, nie mówił, tylko patrzył"
      },
      {
        "type": "line",
        "text": "spokojnie."
      },
      {
        "type": "line",
        "text": "Jego twarz była surowa, lecz nie"

      {
        "type": "line",
        "text": "zła."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Kogo szukasz?"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "zapytał cichym głosem."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Jonek drgnął."
      },
      {
        "type": "line",
        "text": "Chciał odpowiedzieć odważnie, ale głos ugrzązł"

      {
        "type": "line",
        "text": "mu w gardle."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Ja..."
      },
      {
        "type": "line",
        "text": "tylko sprawdzam korytarz —"

      {
        "type": "line",
        "text": "wymamrotał w końcu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Siwy górnik skinął głową, jakby znał"

      {
        "type": "line",
        "text": "prawdę lepiej od niego samego."

      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Nie każdy blask prowadzi do skarbu"

      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "powiedział."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Czasem prowadzi do próby."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Jonek poczuł chłód na karku."
      },
      {
        "type": "line",
        "text": "Nagle przypomniał sobie wszystkie opowieści, z"
      },
      {
        "type": "line",
        "text": "których jeszcze niedawno kpił."
      },
      {
        "type": "line",
        "text": "Chciał zrobić krok w tył, lecz"
      },
      {
        "type": "line",
        "text": "wtedy rozległ się głuchy trzask."
      },
      {
        "type": "line",
        "text": "Z góry posypał się pył, a"
      },
      {
        "type": "line",
        "text": "z boku osunęły się kamienie."
      },
      {
        "type": "line",
        "text": "Młody górnik zrozumiał, że wszedł w"

      {
        "type": "line",
        "text": "niebezpieczne miejsce."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Ratunku!"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "zawołał, ale jego głos zginął w"

      {
        "type": "line",
        "text": "podziemiach."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Kiedy spojrzał znów przed siebie, siwy"

      {
        "type": "line",
        "text": "górnik stał już bliżej."
      },
      {
        "type": "line",
        "text": "Lampka w jego dłoni świeciła jaśniej"

        "type": "line",

      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Idź za mną."
      },
      {
        "type": "line",
        "text": "Powoli."

      {
        "type": "line",
        "text": "I bez pychy —"

      {
        "type": "line",
        "text": "powiedział."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Jonek posłuchał."
      },
      {
        "type": "line",
        "text": "Szedł krok za krokiem, niemal stawiając"

      {
        "type": "line",
        "text": "stopy w śladach tajemniczego przewodnika."

      {
        "type": "line",
        "text": "Kilka razy usłyszał za plecami szmer"

        "type": "line",
        "text": "osuwającego się kamienia."

      {
        "type": "line",
        "text": "Gdyby zboczył choć trochę, mógłby zostać"

        "type": "line",
        "text": "zasypany."

      {
        "type": "line",
        "text": "Ale lampka przed nim prowadziła pewnie,"

        "type": "line",

      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Po dłuższej chwili zobaczył w oddali"

      {
        "type": "line",
        "text": "światła innych górników."

      {
        "type": "line",
        "text": "Usłyszał wołania i tupot biegnących ludzi."

      {
        "type": "line",
        "text": "Kiedy wybiegł z niebezpiecznego korytarza, koledzy"

      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Gdzieś ty był, Jonku?"

        "type": "line",
        "text": "Szukaliśmy cię!"

        "text": "zawołał sztygar."

        "type": "line",
        "text": "—"
      },

        "type": "line",
        "text": "Jeszcze chwila i strop całkiem by"

        "type": "line",
        "text": "Jonek obejrzał się za siebie."

        "type": "line",

        "type": "sep"
      },
      {
        "type": "line",
        "text": "Tego dnia Jonek nic już nie"
      },
      {
        "type": "line",
        "text": "powiedział."
      },
      {
        "type": "line",
        "text": "Dopiero wieczorem, kiedy wyjechał na powierzchnię"

        "type": "line",
        "text": "i poczuł na twarzy chłodne powietrze,"

        "type": "line",

      {
        "type": "line",
        "text": "Wiedział już, że pod ziemią nie"

        "type": "line",

        "type": "line",
        "text": "Że są miejsca, w których trzeba"

      {
        "type": "line",
        "text": "Szanował kopalnię, słuchał starszych i nie"

      {
        "type": "line",
        "text": "A gdy młodsi górnicy zaczynali żartować"

      {
        "type": "line",
        "text": "Bo w ciemności ktoś czasem patrzy,"

        "type": "sep"
      },
      {
        "type": "line",
        "text": "I tak w śląskich kopalniach jeszcze"

        "type": "line",
        "text": "—"
      },

        "type": "line",
        "text": "strażniku podziemi."
      },
      {
        "type": "line",
        "text": "Jedni mówili, że ostrzegał przed tąpnięciem."

        "type": "line",
        "text": "wyjścia."

        "type": "line",
        "text": "A wszyscy zgodnie wierzyli, że pomaga"

      {
        "type": "line",
        "text": "nad brzegiem rzeki"
      },
      {
        "type": "line",
        "text": "nie było już groźnego potwora."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Mieszkańcy Krakowa wybiegli z domów."
      },
      {
        "type": "line",
        "text": "Radość ogarnęła całe miasto."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Książę kazał sprowadzić Skubę"
      },
      {
        "type": "line",
        "text": "przed swoje oblicze."
      },
      {
        "type": "line",
        "text": "Wszyscy patrzyli na niego z podziwem."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Bo oto nie miecz, nie siła ramion,"
      },
      {
        "type": "line",
        "text": "lecz rozum, odwaga i spokój"
      },
      {
        "type": "line",
        "text": "zwyciężyły smoka."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Od tamtej pory Kraków"
      },
      {
        "type": "line",
        "text": "mógł oddychać spokojnie."
      },
      {
        "type": "line",
        "text": "I choć minęły całe wieki,"
      },
      {
        "type": "line",
        "text": "ludzie nadal pamiętają o smoku wawelskim"
      },
      {
        "type": "line",
        "text": "i o tym, że nawet największe zagrożenie"
      },
      {
        "type": "line",
        "text": "można pokonać mądrością."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OUTRO —"
      },
      {
        "type": "line",
        "text": "To była Legenda o Smoku Wawelskim."
      },
      {
        "type": "line",
        "text": "Na podstawie polskiej legendy ludowej."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i Adaptacja 3TATATA."
      },
      {
        "type": "line",
        "text": "Dobranoc."
      }
    ]
  },

    "tag": "Legenda śląska",
    "sections": [
      {
        "type": "title",
        "text": "Legenda o Ondraszku"
      },
      {
        "type": "meta",
        "text": "3TaTaTa · Legenda śląska"
      },
      {
        "type": "section",
        "text": "— INTRO —"
      },
      {
        "type": "line",
        "text": "3TaTaTa prezentuje."
      },
      {
        "type": "line",
        "text": "Legenda o Ondraszku."
      },
      {
        "type": "line",
        "text": "Na podstawie klasycznej śląskiej legendy."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i opracowanie — 3TaTaTa."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OPOWIEŚĆ —"
      },
      {
        "type": "line",
        "text": "Dawno temu, wysoko w Beskidach, między"
      },
      {
        "type": "line",
        "text": "ciemnymi lasami, stromymi ścieżkami i pasterskimi"
      },
      {
        "type": "line",
        "text": "halami, ludzie opowiadali o młodym zbójniku,"
      },
      {
        "type": "line",
        "text": "którego imię znał niemal każdy."
      },
      {
        "type": "line",
        "text": "Nazywał się Ondraszek."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Mówiono, że Ondraszek był szybki jak"
      },
      {
        "type": "line",
        "text": "wiatr w górach, czujny jak wilk"
      },
      {
        "type": "line",
        "text": "i odważny jak nikt inny."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Lecz najwięcej opowiadano o tym, że"
      },
      {
        "type": "line",
        "text": "Ondraszek nie napadał na biednych."
      },
      {
        "type": "line",
        "text": "Mówiono więc, że to zbójnik, ale"
      },
      {
        "type": "line",
        "text": "sprawiedliwy."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Jeśli silny zabiera słabym ostatni kawałek"
      },
      {
        "type": "line",
        "text": "chleba, to ktoś musi mu przypomnieć,"
      },
      {
        "type": "line",
        "text": "że na świecie istnieje jeszcze sprawiedliwość."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Lepiej żyć krótko, ale po swojemu"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "niż długo i w hańbie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "W sercach wielu ludzi Ondraszek nie został"
      },
      {
        "type": "line",
        "text": "zwykłym zbójnikiem."
      },
      {
        "type": "line",
        "text": "Stał się symbolem odwagi, wolności i"
      },
      {
        "type": "line",
        "text": "sprzeciwu wobec krzywdy."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OUTRO —"
      },
      {
        "type": "line",
        "text": "To była Legenda o Ondraszku."
      },
      {
        "type": "line",
        "text": "Na podstawie klasycznej śląskiej legendy."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i opracowanie — 3TaTaTa."
      },
      {
        "type": "line",
        "text": "Dobranoc."
      }
    ]
  },
  {
    "id": 4,
    "title": "Legenda o Utopku",
    "tag": "Legenda śląska",
    "sections": [
      {
        "type": "title",
        "text": "Legenda o Utopku"
      },
      {
        "type": "meta",
        "text": "3TaTaTa · Legenda śląska"
      },
      {
        "type": "section",
        "text": "— INTRO —"
      },
      {
        "type": "line",
        "text": "3TaTaTa prezentuje."
      },
      {
        "type": "line",
        "text": "Legenda o Utopku."
      },
      {
        "type": "line",
        "text": "Na podstawie klasycznej śląskiej legendy."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i opracowanie — 3TaTaTa."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OPOWIEŚĆ —"
      },
      {
        "type": "line",
        "text": "Dawno temu, gdy nad śląskimi stawami"
      },
      {
        "type": "line",
        "text": "częściej niż dziś snuły się mgły,"
      },
      {
        "type": "line",
        "text": "ludzie opowiadali sobie o Utopku."
      },
      {
        "type": "line",
        "text": "Nie był on człowiekiem ani zwyczajnym"
      },
      {
        "type": "line",
        "text": "zwierzęciem."
      },
      {
        "type": "line",
        "text": "Mówiono, że to duch wody —"
      },
      {
        "type": "line",
        "text": "stary jak bagna, cichy jak głębina"
      },
      {
        "type": "line",
        "text": "i nieprzewidywalny jak nurt po wielkiej"
      },
      {
        "type": "line",
        "text": "burzy."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Bo Utopek, jak głosiła legenda, nie"
      },
      {
        "type": "line",
        "text": "szkodził każdemu."
      },
      {
        "type": "line",
        "text": "Bywał groźny dla pyszałków, dla tych,"
      },
      {
        "type": "line",
        "text": "którzy z wody szydzili."
      },
      {
        "type": "line",
        "text": "Lecz wobec ludzi pokornych i uczciwych"
      },
      {
        "type": "line",
        "text": "potrafił być jedynie przestrogą."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Daruj —"
      },
      {
        "type": "line",
        "text": "wyszeptał Jędrek."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Nie chciałem szydzić."
      },
      {
        "type": "line",
        "text": "Daruj."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Od tamtej nocy Jędrek zmienił się"
      },
      {
        "type": "line",
        "text": "nie do poznania."
      },
      {
        "type": "line",
        "text": "Mówił, że nad wodą można spotkać"
      },
      {
        "type": "line",
        "text": "coś starszego od ludzkiej pychy."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Nad śląską wodą trzeba zachować pokorę."
      },
      {
        "type": "line",
        "text": "Bo tam, gdzie człowiek widzi tylko"
      },
      {
        "type": "line",
        "text": "ciemną taflę, ktoś inny może właśnie"
      },
      {
        "type": "line",
        "text": "patrzeć z głębiny."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OUTRO —"
      },
      {
        "type": "line",
        "text": "To była Legenda o Utopku."
      },
      {
        "type": "line",
        "text": "Na podstawie klasycznej śląskiej legendy."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i opracowanie — 3TaTaTa."
      },
      {
        "type": "line",
        "text": "Dobranoc."
      }
    ]

  {
    "id": 5,
    "title": "Kopciuszek",
    "tag": "Baśń klasyczna",
    "sections": [
      {
        "type": "title",
        "text": "Kopciuszek"
      },
      {
        "type": "meta",
        "text": "3TaTaTa · Baśń klasyczna"
      },
      {
        "type": "section",
        "text": "— INTRO —"
      },
      {
        "type": "line",
        "text": "3TaTaTa prezentuje."
      },
      {
        "type": "line",
        "text": "Kopciuszek."
      },
      {
        "type": "line",
        "text": "Na podstawie klasycznej baśni."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i opracowanie — 3TaTaTa."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OPOWIEŚĆ —"
      },
      {
        "type": "line",
        "text": "Dawno temu, w dużym domu stojącym"
      },
      {
        "type": "line",
        "text": "na skraju miasta, mieszkała dobra i"
      },
      {
        "type": "line",
        "text": "łagodna dziewczynka."
      },
      {
        "type": "line",
        "text": "Jej dzieciństwo nie trwało jednak długo"
      },
      {
        "type": "line",
        "text": "w szczęściu."
      },
      {
        "type": "line",
        "text": "Najpierw straciła matkę, a po kilku"
      },
      {
        "type": "line",
        "text": "latach także ojca."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Ponieważ często była ubrudzona sadzą i"
      },
      {
        "type": "line",
        "text": "popiołem, siostry zaczęły przezywać ją Kopciuszkiem."
      },
      {
        "type": "line",
        "text": "Pozostawała cierpliwa, cicha i uprzejma."
      },
      {
        "type": "line",
        "text": "Miała bowiem w sobie coś, czego"
      },
      {
        "type": "line",
        "text": "nie miały ani jej siostry, ani"
      },
      {
        "type": "line",
        "text": "sama macocha —"
      },
      {
        "type": "line",
        "text": "prawdziwą dobroć."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Ty?"
      },
      {
        "type": "line",
        "text": "W sadzy i z popiołem na"
      },
      {
        "type": "line",
        "text": "rękach?"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Kto wpuściłby cię na królewski bal?"
      },
      {
        "type": "line",
        "text": "Zostań tutaj."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Nie płacz, moje dziecko —"
      },
      {
        "type": "line",
        "text": "powiedziała wróżka."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Pojedziesz na bal."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Pamiętaj —"
      },
      {
        "type": "line",
        "text": "rzekła —"
      },
      {
        "type": "line",
        "text": "czar przestanie działać o północy."
      },
      {
        "type": "line",
        "text": "Musisz wrócić przed ostatnim uderzeniem dzwonu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Czy ja także mogę spróbować?"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Pantofelek podano Kopciuszkowi."
      },
      {
        "type": "line",
        "text": "Dziewczyna usiadła, wsunęła stopę —"
      },
      {
        "type": "line",
        "text": "i bucik pasował idealnie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Mówi się, że Kopciuszek nie nosił"
      },
      {
        "type": "line",
        "text": "w sercu urazy."
      },
      {
        "type": "line",
        "text": "W tym właśnie tkwiła jego siła."
      },
      {
        "type": "line",
        "text": "Dobroć może być cicha i skromna,"
      },
      {
        "type": "line",
        "text": "lecz ma w sobie większą moc"
      },
      {
        "type": "line",
        "text": "niż pycha, szyderstwo i chłód."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OUTRO —"
      },
      {
        "type": "line",
        "text": "To był Kopciuszek."
      },
      {
        "type": "line",
        "text": "Na podstawie klasycznej baśni."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i opracowanie — 3TaTaTa."
      },
      {
        "type": "line",
        "text": "Dobranoc."
      }
    ]
  },

        "type": "line",
        "text": "którego lepiej było nie szukać."
      },
      {
        "type": "line",
        "text": "Mówiono, że głęboko pod miastem,"
      },
      {
        "type": "line",
        "text": "w ciemnych piwnicach, mieszka Bazyliszek —"
      },

        "type": "line",
        "text": "stwór tak straszny,"

        "text": "że jeden jego wzrok zamieniał ludzi w kamień."

      {

      },

      {
        "type": "line",
        "text": "powiedział czeladnik."
      },

        "type": "line",

        "type": "line",
        "text": "Jeśli dziewczyna jeszcze żyje, trzeba ją"

      },

        "type": "sep"
      },

      },

        "type": "line",

      },
      {
        "type": "line",
        "text": "Niech sam spotka własne spojrzenie."

        "type": "sep"
      },
      {
        "type": "line",
        "text": "Bazyliszek zesztywniał."
      },
      {
        "type": "line",
        "text": "Jego łuski pociemniały, ciało skamieniało"
      },
      {
        "type": "line",
        "text": "i po kilku oddechach"
      },
      {
        "type": "line",
        "text": "w miejscu żywego stwora stał już"
      },
      {
        "type": "line",
        "text": "tylko kamienny posąg —"

        "text": "zimny, martwy i bezsilny."
      },

        "type": "sep"

      {
        "type": "line",
        "text": "Nie zwyciężył bowiem siłą, lecz odwagą,"
      },
      {
        "type": "line",
        "text": "sprytem i spokojem w chwili największego"

        "type": "line",

      },
      {
        "type": "sep"
      },

      {
        "type": "line",
        "text": "Dawno temu, tam gdzie ziemia była"
      },
      {
        "type": "line",
        "text": "czarna od węgla, a wieczorne niebo"
      },
      {
        "type": "line",
        "text": "rozświetlały ognie hut i lampy w"
      },
      {
        "type": "line",
        "text": "oknach, istniały dwa miasta."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Prawdziwa przyjaźń nie rodzi się z"
      },
      {
        "type": "line",
        "text": "przypadku."
      },
      {
        "type": "line",
        "text": "Rodzi się z podobnych serc."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Trzydzieści lat temu powstała przyjaźń."
      },
      {
        "type": "line",
        "text": "Dziś stała się legendą."
      },
      {
        "type": "line",
        "text": "A legenda, którą nosi się w"
      },
      {
        "type": "line",
        "text": "sercu, nigdy nie umiera."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Bo prawdziwa przyjaźń, ta największa, nie"
      },
      {
        "type": "line",
        "text": "kończy się nigdy."
      },
      {
        "type": "line",
        "text": "Ona tylko z roku na rok"
      },
      {
        "type": "line",
        "text": "staje się piękniejszą bajką."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OUTRO —"
      },
      {
        "type": "line",
        "text": "To była opowieść o GieKSiku i BazalBubie."
      },
      {
        "type": "line",
        "text": "Tekst i opracowanie — 3TaTaTa."
      },
      {
        "type": "line",
        "text": "Dobranoc."
      }
    ]
  },
  {
    "id": 8,
    "title": "Klara i telefon do taty",
    "tag": "Opowiadanie",
    "sections": [
      {
        "type": "title",
        "text": "Klara i telefon do taty"
      },
      {
        "type": "meta",
        "text": "3TaTaTa · Opowiadanie"
      },
      {
        "type": "section",
        "text": "— INTRO —"
      },
      {
        "type": "line",
        "text": "3TaTaTa prezentuje."
      },
      {
        "type": "line",
        "text": "Klara i telefon do taty."
      },
      {
        "type": "line",
        "text": "Tekst i opracowanie — 3TaTaTa."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OPOWIEŚĆ —"
      },
      {
        "type": "line",
        "text": "Klara miała siedem lat i od"
      },
      {
        "type": "line",
        "text": "samego rana czuła w brzuchu coś"
      },
      {
        "type": "line",
        "text": "dziwnego."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Tato… —"
      },
      {
        "type": "line",
        "text": "powiedziała bardzo cicho."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Ja… ja nie chcę tu być."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Dobrze, że dzwonisz —"
      },
      {
        "type": "line",
        "text": "odpowiedział tata łagodnie."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Już jadę."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Jestem z ciebie dumny, że zadzwoniłaś"
      },
      {
        "type": "line",
        "text": "i powiedziałaś, jak się czujesz."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Klaro."
      },
      {
        "type": "line",
        "text": "Jestem dumny nie z tego, że"
      },
      {
        "type": "line",
        "text": "zawsze sobie radzisz."
      },
      {
        "type": "line",
        "text": "Jestem dumny z tego, że mówisz"
      },
      {
        "type": "line",
        "text": "prawdę."
      },
      {
        "type": "line",
        "text": "Nawet wtedy, kiedy się boisz."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Czasem dzielność to wejść do pokoju"
      },
      {
        "type": "line",
        "text": "pełnego obcych głosów."
      },
      {
        "type": "line",
        "text": "A czasem dzielność to wyjąć telefon"
      },
      {
        "type": "line",
        "text": "drżącą ręką i zadzwonić do taty."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OUTRO —"
      },
      {
        "type": "line",
        "text": "To była opowieść Klara i telefon do taty."
      },
      {
        "type": "line",
        "text": "Tekst i opracowanie — 3TaTaTa."
      },
      {
        "type": "line",
        "text": "Dobranoc."
      }

  {
    "id": 9,
    "title": "O Lechu, Czechu i Rusie",
    "tag": "Legenda polska · 3TATATA",
    "sections": [
      {
        "type": "title",
        "text": "O Lechu, Czechu i Rusie"
      },
      {
        "type": "meta",
        "text": "3TATATA · Na podstawie polskiej legendy ludowej"
      },
      {
        "type": "section",
        "text": "— INTRO —"
      },
      {
        "type": "line",
        "text": "3TATATA prezentuje."
      },
      {
        "type": "line",
        "text": "O Lechu, Czechu i Rusie."
      },
      {
        "type": "line",
        "text": "Na podstawie polskiej legendy ludowej."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i Adaptacja 3TATATA."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OPOWIEŚĆ —"
      },
      {
        "type": "line",
        "text": "Dawno, bardzo dawno temu,"
      },
      {
        "type": "line",
        "text": "gdy ziemie porastały nieprzebyte puszcze,"
      },
      {
        "type": "line",
        "text": "a rzeki płynęły szeroko i dziko,"
      },
      {
        "type": "line",
        "text": "żyli trzej bracia."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Nazywali się Lech, Czech i Rus."
      },
      {
        "type": "line",
        "text": "Byli odważni, silni i mądrzy,"
      },
      {
        "type": "line",
        "text": "a ludzie, którzy wędrowali z nimi,"
      },
      {
        "type": "line",
        "text": "ufali im jak gwiazdom na nocnym niebie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Przez długi czas trzymali się razem,"
      },
      {
        "type": "line",
        "text": "prowadząc swój lud przez lasy,"
      },
      {
        "type": "line",
        "text": "doliny i otwarte równiny,"
      },
      {
        "type": "line",
        "text": "w poszukiwaniu miejsca do życia."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Lech był z braci najbardziej zamyślony."
      },
      {
        "type": "line",
        "text": "Czech szukał krain bezpiecznych i żyznych."
      },
      {
        "type": "line",
        "text": "Rus zaś ciągnęło ku szerokim przestrzeniom,"
      },
      {
        "type": "line",
        "text": "gdzie wiatr mógł pędzić bez przeszkód."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Pewnego wieczoru przy ogniu"
      },
      {
        "type": "line",
        "text": "Czech powiedział, że jego serce"
      },
      {
        "type": "line",
        "text": "skłania się ku południu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Rus spojrzał na wschód"
      },
      {
        "type": "line",
        "text": "i wyznał, że właśnie tam"
      },
      {
        "type": "line",
        "text": "czuje wołanie przestrzeni."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Lech zaś długo milczał,"
      },
      {
        "type": "line",
        "text": "a potem powiedział spokojnie,"
      },
      {
        "type": "line",
        "text": "że jego droga prowadzi ku zachodowi."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Rankiem nadszedł czas pożegnania."
      },
      {
        "type": "line",
        "text": "Nie było w nim gniewu ani smutku."
      },
      {
        "type": "line",
        "text": "Bracia objęli się mocno"
      },
      {
        "type": "line",
        "text": "i przyrzekli, że pamięć"
      },
      {
        "type": "line",
        "text": "o wspólnym pochodzeniu przetrwa na zawsze."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Czech zabrał swój lud na południe."
      },
      {
        "type": "line",
        "text": "Rus poprowadził swoich na wschód."
      },
      {
        "type": "line",
        "text": "A Lech poszedł w swoją stronę."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Droga Lecha wiodła przez rozległe lasy."
      },
      {
        "type": "line",
        "text": "Im dalej szli,"
      },
      {
        "type": "line",
        "text": "tym bardziej Lech czuł,"
      },
      {
        "type": "line",
        "text": "że zbliża się do miejsca szczególnego."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Pewnego dnia wędrowcy dotarli"
      },
      {
        "type": "line",
        "text": "do szerokiej polany."
      },
      {
        "type": "line",
        "text": "W samym jej środku wyrastał potężny dąb."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Lech zatrzymał konia i spojrzał w górę."
      },
      {
        "type": "line",
        "text": "Wśród konarów zobaczył wielkie gniazdo."
      },
      {
        "type": "line",
        "text": "Był to biały orzeł."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Jego pióra lśniły w świetle zachodzącego słońca."
      },
      {
        "type": "line",
        "text": "Ptak siedział dumnie i spokojnie,"
      },
      {
        "type": "line",
        "text": "jak strażnik tego miejsca."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "A kiedy po chwili rozwinął skrzydła,"
      },
      {
        "type": "line",
        "text": "niebo nad polaną rozjarzyło się czerwienią wieczoru."
      },
      {
        "type": "line",
        "text": "Na tle tego blasku sylwetka orła"
      },
      {
        "type": "line",
        "text": "wyglądała jak znak zesłany z wysokości."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Lech odwrócił się do swojego ludu"
      },
      {
        "type": "line",
        "text": "i powiedział,"
      },
      {
        "type": "line",
        "text": "że nie trzeba iść dalej."
      },
      {
        "type": "line",
        "text": "To jest miejsce, którego szukali."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Lech nadał nowej osadzie nazwę Gniezno,"
      },
      {
        "type": "line",
        "text": "od gniazda, które ujrzał na dębie."
      },
      {
        "type": "line",
        "text": "A białego orła przyjął za znak swego ludu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Właśnie dlatego"
      },
      {
        "type": "line",
        "text": "w herbie przyszłego państwa"
      },
      {
        "type": "line",
        "text": "pojawił się biały orzeł na czerwonym tle."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Tymczasem Czech odnalazł swoją ziemię na południu,"
      },
      {
        "type": "line",
        "text": "a Rus na wschodzie."
      },
      {
        "type": "line",
        "text": "Choć rozdzieleni przez lasy i czas,"
      },
      {
        "type": "line",
        "text": "pozostali związani pamięcią wspólnego początku."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Legenda o Lechu, Czechu i Rusie"
      },
      {
        "type": "line",
        "text": "mówi o tym, że czasem trzeba wyruszyć daleko,"
      },
      {
        "type": "line",
        "text": "by odnaleźć swoje miejsce."
      },
      {
        "type": "line",
        "text": "Że różne drogi nie muszą oznaczać wrogości."
      },
      {
        "type": "line",
        "text": "I że znaki prowadzące człowieka"
      },
      {
        "type": "line",
        "text": "nie zawsze objawiają się w wielkich słowach."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OUTRO —"
      },
      {
        "type": "line",
        "text": "To było O Lechu, Czechu i Rusie."
      },
      {
        "type": "line",
        "text": "Na podstawie polskiej legendy ludowej."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i Adaptacja 3TATATA."
      },
      {
        "type": "line",
        "text": "Dobranoc."
      }
    ]
  },

      {

      },

        "text": "3TaTaTa prezentuje."
      },
      {
        "type": "line",
        "text": "Legenda o Warsie i Sawie."
      },
      {
        "type": "line",
        "text": "Na podstawie klasycznej polskiej legendy."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i opracowanie — 3TaTaTa."
      },
      {

      },

        "type": "section",
        "text": "— OPOWIEŚĆ —"
      },
      {
        "type": "line",
        "text": "Dawno temu, nad szeroką Wisłą,"

      {
        "type": "line",
        "text": "o imieniu Wars."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Między nimi rosło uczucie ciche, dobre"
      },
      {
        "type": "line",
        "text": "i prawdziwe."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Mówiono, że miejsce to wyrastało z"
      },
      {
        "type": "line",
        "text": "odwagi Warsa i z mądrości Sawy."
      },
      {
        "type": "line",
        "text": "Jedno dawało siłę, drugie serce."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "W końcu zaczęto mówić, że to"
      },
      {
        "type": "line",
        "text": "właśnie od ich imion wzięła się"
      },
      {
        "type": "line",
        "text": "nazwa miasta —"
      },
      {
        "type": "line",
        "text": "Warszawa."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
