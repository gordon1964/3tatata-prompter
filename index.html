<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>3TaTaTa Teleprompter</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: #2e2e2e;
    --accent: #c8a96e;
    --text: #f0ece4;
    --text-dim: #888;
    --green: #4caf7d;
    --red: #e05c5c;
    --blue: #5c9fe0;
    --btn-h: 64px;
    --ctrl-font: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; overflow: hidden; }

  /* ===== MENU ===== */
  #menu-screen {
    height: 100vh; overflow-y: auto;
    padding: 24px 20px 40px;
    display: flex; flex-direction: column; align-items: center;
  }
  .logo { font-family: 'Playfair Display', serif; font-size: 2.4rem; color: var(--accent); letter-spacing: 0.05em; margin-bottom: 4px; }
  .menu-title { font-size: 0.85rem; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 28px; }
  .series-heading { font-family: 'Playfair Display', serif; font-size: 0.95rem; color: var(--accent); letter-spacing: 0.1em; margin: 20px 0 10px; width: 100%; max-width: 560px; text-align: left; padding-left: 4px; }
  .story-list { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 8px; }
  .story-item {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    min-height: 60px; transition: border-color 0.15s, background 0.15s;
  }
  .story-item:active { background: var(--surface2); }
  .story-item:hover { border-color: var(--accent); }
  .story-num { font-size: 0.7rem; color: var(--text-dim); margin-right: 12px; min-width: 20px; }
  .story-item-title { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--text); flex: 1; }
  .story-item-tag { font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); font-weight: 600; white-space: nowrap; margin-left: 10px; }

  /* GitHub panel */
  .github-panel { width: 100%; max-width: 560px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 20px; }
  .github-panel summary { cursor: pointer; font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); font-weight: 600; user-select: none; }
  .github-panel summary:hover { color: var(--accent); }
  .github-fields { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
  .github-fields input { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 1rem; padding: 10px 12px; height: 46px; width: 100%; }
  .github-fields input:focus { outline: none; border-color: var(--accent); }
  .btn-sync { height: 46px; background: var(--accent); color: #0d0d0d; border: none; border-radius: 8px; font-family: 'Barlow', sans-serif; font-size: 0.85rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; width: 100%; }
  .btn-sync:active { opacity: 0.8; }
  #sync-status { font-size: 0.75rem; color: var(--text-dim); margin-top: 6px; min-height: 16px; }

  /* ===== PROMPTER ===== */
  #prompter-screen { display: none; height: 100vh; flex-direction: column; position: relative; background: var(--bg); }
  #prompter-screen.active { display: flex; }
  #top-bar { display: flex; align-items: center; justify-content: space-between; padding: 0 12px; height: 56px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 10; }
  #back-btn, #font-btn { height: 44px; min-width: 44px; padding: 0 14px; border: 1px solid var(--border); background: transparent; color: var(--text); border-radius: 8px; font-family: 'Barlow', sans-serif; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.08em; cursor: pointer; white-space: nowrap; }
  #back-btn:active, #font-btn:active { background: var(--surface2); }
  #story-label { font-family: 'Playfair Display', serif; font-size: 0.95rem; color: var(--accent); text-align: center; flex: 1; padding: 0 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #progress-bar { height: 3px; background: var(--accent); width: 0%; flex-shrink: 0; z-index: 9; transition: width 0.15s ease; }
  #guide-line { position: absolute; top: 50%; left: 0; right: 0; height: 2px; background: rgba(200,169,110,0.2); z-index: 5; pointer-events: none; }
  #scroll-container { flex: 1; overflow: hidden; position: relative; cursor: pointer; }
  #scroll-inner { padding: 60vh 28px 60vh; line-height: 1.6; }

  .line-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--accent); text-align: center; margin-bottom: 8px; display: block; }
  .line-meta { font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); text-align: center; margin-bottom: 20px; display: block; }
  .line-section { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin: 24px 0 10px; display: block; border-left: 3px solid var(--accent); padding-left: 10px; }
  .line-text { display: block; font-size: 1.5rem; font-weight: 300; color: var(--text); margin-bottom: 10px; transition: color 0.3s; }
  .line-sep { display: block; height: 2px; background: var(--border); margin: 20px 0; }
  .line-text.active { color: #ffffff; font-weight: 400; }

  #tap-left, #tap-right { position: absolute; top: 56px; bottom: 92px; width: 22%; z-index: 20; }
  #tap-left { left: 0; }
  #tap-right { right: 0; }

  /* ===== CONTROLS ===== */
  #controls { background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; z-index: 10; padding: 10px 12px 12px; }
  .ctrl-row-main { display: flex; gap: 8px; margin-bottom: 10px; }
  .ctrl-btn { flex: 1; height: var(--btn-h); border: none; border-radius: 10px; font-family: 'Barlow', sans-serif; font-size: var(--ctrl-font); font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; transition: opacity 0.1s, transform 0.1s; user-select: none; -webkit-user-select: none; }
  .ctrl-btn:active { opacity: 0.75; transform: scale(0.97); }
  .ctrl-btn .icon { font-size: 1.3rem; line-height: 1; }
  .ctrl-btn .label { font-size: 0.7rem; letter-spacing: 0.12em; }
  .btn-slower { background: #2a3a4a; color: #7ec8f0; border: 1px solid #3a5a7a; }
  .btn-play   { background: var(--accent); color: #0d0d0d; flex: 1.4; }
  .btn-play.playing { background: var(--red); color: #fff; }
  .btn-faster { background: #2a3a2a; color: #7ef0a0; border: 1px solid #3a7a4a; }
  .btn-reset  { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); flex: 0.8; }
  .ctrl-row-inputs { display: flex; gap: 8px; }
  .ctrl-field { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .ctrl-field label { font-size: 0.63rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); text-align: center; }
  .ctrl-field input[type="number"] { width: 100%; height: 48px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 1.2rem; font-weight: 600; text-align: center; padding: 0 4px; cursor: pointer; }
  .ctrl-field input[type="number"]:focus { outline: none; border-color: var(--accent); background: var(--surface); }
  .ctrl-field input[type="number"]::-webkit-inner-spin-button,
  .ctrl-field input[type="number"]::-webkit-outer-spin-button { opacity: 1; height: 44px; width: 28px; cursor: pointer; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="menu-screen">
  <div class="logo">3TaTaTa</div>
  <div class="menu-title">Teleprompter</div>

  <details class="github-panel">
    <summary>⚙ Synchronizacja z GitHub</summary>
    <div class="github-fields">
      <input type="text" id="gh-user" placeholder="Użytkownik GitHub (np. gordon1964)">
      <input type="text" id="gh-repo" placeholder="Repozytorium (np. 3tatata-prompter)">
      <input type="text" id="gh-path" placeholder="Ścieżka do plików (np. stories)">
      <button class="btn-sync" onclick="syncFromGitHub()">↓ Pobierz bajki z GitHub</button>
      <div id="sync-status"></div>
    </div>
  </details>

  <div class="story-list" id="story-list"></div>
</div>

<div id="prompter-screen">
  <div id="top-bar">
    <button id="back-btn" onclick="goBack()">← MENU</button>
    <div id="story-label"></div>
    <button id="font-btn" onclick="cycleFont()">Aa</button>
  </div>
  <div id="progress-bar"></div>
  <div id="guide-line"></div>
  <div id="scroll-container" onclick="togglePlay()">
    <div id="scroll-inner"></div>
  </div>
  <div id="tap-left"  onclick="slowDown(); event.stopPropagation();"></div>
  <div id="tap-right" onclick="speedUp();  event.stopPropagation();"></div>
  <div id="controls" onclick="event.stopPropagation()">
    <div class="ctrl-row-main">
      <button class="ctrl-btn btn-slower" onclick="slowDown()"><span class="icon">−</span><span class="label">Wolniej</span></button>
      <button class="ctrl-btn btn-play" id="play-btn" onclick="togglePlay()"><span class="icon" id="play-icon">▶</span><span class="label" id="play-label">PLAY</span></button>
      <button class="ctrl-btn btn-faster" onclick="speedUp()"><span class="icon">+</span><span class="label">Szybciej</span></button>
      <button class="ctrl-btn btn-reset" onclick="resetScroll()"><span class="icon">↩</span><span class="label">Reset</span></button>
    </div>
    <div class="ctrl-row-inputs">
      <div class="ctrl-field"><label>Prędkość</label><input type="number" id="speed-input" value="2" min="0.1" max="20" step="0.1" onchange="onSpeedInput()" oninput="onSpeedInput()"></div>
      <div class="ctrl-field"><label>Czcionka</label><input type="number" id="font-input" value="24" min="14" max="60" step="2" onchange="onFontInput()" oninput="onFontInput()"></div>
    </div>
  </div>
</div>

<script>
const STORIES = [{"id":0,"title":"INTRO SERII","tag":"Intro serii","sections":[{"type":"title","text":"INTRO SERII"},{"type":"meta","text":"3TaTaTa — Opowieści z dalekich krain"},{"type":"line","text":"Posłuchaj…"},{"type":"line","text":"Daleko stąd, tam gdzie kończą się znane drogi, a zaczynają piaski pustyni, ciemne morza i miasta ukryte pod księżycem, żyją opowieści starsze niż niejeden pałac."},{"type":"line","text":"Są tam lampy, które nie zawsze spełniają życzenia."},{"type":"line","text":"Dżiny, które muszą nauczyć się wdzięczności."},{"type":"line","text":"Karawany, które nie zostawiają śladów."},{"type":"line","text":"Księgi, które same przewracają strony."},{"type":"line","text":"I dzieci, które słyszą więcej niż dorośli."},{"type":"line","text":"To są „Opowieści z dalekich krain” — baśnie pełne tajemnic, odwagi, magii i cichych prawd ukrytych między słowami."},{"type":"line","text":"Niektóre zabiorą cię na pustynię."},{"type":"line","text":"Inne na dno Morza Ciemności."},{"type":"line","text":"Jeszcze inne do pałaców, ogrodów, bibliotek i miast, których nie ma na żadnej mapie."},{"type":"line","text":"Usiądź wygodnie."},{"type":"line","text":"Zamknij oczy, jeśli chcesz."},{"type":"line","text":"Niech świat za oknem zrobi się trochę cichszy."},{"type":"line","text":"A gdy usłyszysz pierwszy szelest piasku, pierwszy dźwięk dzwoneczka przy wielbłądzie albo pierwszy szept starej księgi…"},{"type":"line","text":"będziesz wiedzieć, że podróż właśnie się zaczyna."},{"type":"line","text":"3TATATA.PL przedstawia:"},{"type":"line","text":"„Opowieści z dalekich krain”."},{"type":"line","text":"Baśnie dla dzieci, które lubią zasypiać z odrobiną tajemnicy."}]},{"id":1,"title":"SINDBAD ŻEGLARZ","tag":"Opowieść","sections":[{"type":"title","text":"SINDBAD ŻEGLARZ"},{"type":"meta","text":"3TaTaTa — Opowieści z dalekich krain"},{"type":"section","text":"— WSTĘP DO ODCINKA —"},{"type":"line","text":"Posłuchaj."},{"type":"line","text":"Słyszysz to?"},{"type":"line","text":"To szum morza."},{"type":"line","text":"Nie, nie — nie wyobrażaj sobie morza. Naprawdę posłuchaj. Zamknij oczy i może... może usłyszysz fale."},{"type":"line","text":"Dzisiaj opowiem ci historię człowieka, który przepłynął więcej mórz, niż ty zdążysz policzyć gwiazd."},{"type":"line","text":"Człowieka, który widział wyspy-bestie i ptaki wielkie jak chmury."},{"type":"line","text":"Który tonął i wracał."},{"type":"line","text":"Który ginął i żył."},{"type":"line","text":"Nazywał się Sindbad."},{"type":"line","text":"I zanim skończysz słuchać, zrozumiesz, że wcale nie został żeglarzem przez przypadek."},{"type":"line","text":"SINDBAD ŻEGLARZ"},{"type":"line","text":"Opowiem ci o siódmej podróży Sindbada — tej, o której sam Sindbad mówił najciszej."},{"type":"line","text":"I najrzadziej."},{"type":"line","text":"Sindbad był już stary, kiedy ta historia miała swój początek."},{"type":"line","text":"Siedział w pałacu własnego budowania, w mieście Basra, otoczony jedwabnymi poduszkami, perskimi dywanami i muzyką, która grała mu od rana do wieczora."},{"type":"line","text":"Na rękach miał blizny."},{"type":"line","text":"Nie dwie."},{"type":"line","text":"Nie trzy."},{"type":"line","text":"Tyle, że przestał je liczyć wiele lat temu."},{"type":"line","text":"Każda blizna była innym dniem, inną wyspą, innym stworzeniem, innym momentem, kiedy śmierć była o krok. Może o dwa."},{"type":"line","text":"Ta przy kciuku — od liny statku podczas sztormu przy wyspie Waq-Waq."},{"type":"line","text":"Ta długa na przedramieniu — od kłów stworzenia, które okazało się wyspą-rybą i zanurkowało, kiedy marynarze rozpalili na nim ogień."},{"type":"line","text":"Tamta mała, okrągła, blada — od jaja olbrzymiego ptaka Rukh, z którego Sindbad uciekał owinięty w turban."},{"type":"line","text":"Ale o bliźnie na lewej dłoni — tej jednej, szczególnej, starej i zagojonej bez śladu, oprócz cieniutkiej linii — Sindbad nie opowiadał nigdy."},{"type":"line","text":"Aż do tej nocy."},{"type":"line","text":"Siedziała przy nim mała dziewczynka."},{"type":"line","text":"Miała osiem lat, oczy wielkie jak talerze i pytania, których nie dało się zignorować, bo zadawała je z niewinną precyzją dziecka, które jeszcze nie wie, że pewnych pytań dorośli czasem boją się usłyszeć."},{"type":"line","text":"— Skąd ta blizna? — spytała, wskazując palcem wprost na lewą dłoń Sindbada."},{"type":"line","text":"Sindbad spojrzał na nią."},{"type":"line","text":"Potem na swoją dłoń."},{"type":"line","text":"Potem znowu na nią."},{"type":"line","text":"Przez długą chwilę milczał — a Sindbad, który potrafił opowiadać o każdej z sześciu poprzednich podróży przez całą noc bez przerwy, w tym jednym milczeniu był jak skała."},{"type":"line","text":"A potem zaczął mówić."},{"type":"line","text":"— Siódma podróż — powiedział — nie zaczęła się na morzu. Zaczęła się od rozkazu."},{"type":"line","text":"Kalif w Bagdadzie wezwał mnie do swojego pałacu i rzekł:"},{"type":"line","text":"— Sindbadzie, popłyniesz na wschód. Miniesz Morze Ciemności i przekażesz mój list oraz dar królowi Serendybu, wyspy szczęśliwości."},{"type":"line","text":"Miałem już dość morza."},{"type":"line","text":"Naprawdę — dość."},{"type":"line","text":"Miałem dość kołysania pokładu pod stopami, smaku soli na wargach i tej szczególnej ciszy, która poprzedza sztorm o kilka godzin."},{"type":"line","text":"Ale kalifowi nie odmawia się łatwo, bo kalif jest cieniem Boga na ziemi i takie były wtedy prawa."},{"type":"line","text":"Zebrałem więc towary, wziąłem dary, wsiadłem na statek i odpłynąłem."},{"type":"line","text":"Statek był dobry — nowy, z cedru libańskiego, z żaglami gładkimi jak skóra."},{"type":"line","text":"Kapitan był stary i doświadczony, z twarzą tak pobrużdżoną przez wiatr, że wyglądała jak mapa przybrzeżna."},{"type":"line","text":"Załoga była sprawna i milcząca w sposób, w jaki milczą ludzie, którzy szanują morze za bardzo, żeby mówić o nim lekko."},{"type":"line","text":"Przez trzy tygodnie wszystko było zbyt dobre."},{"type":"line","text":"I właśnie to powinno mnie ostrzec."},{"type":"line","text":"Kiedy morze jest zbyt spokojne, zbyt długo spokojne, czai się w nim coś, co jeszcze nie zdecydowało, czy zaatakować."},{"type":"line","text":"Ósmego dnia czwartego tygodnia niebo zrobiło się żółte."},{"type":"line","text":"Nie pomarańczowe jak zachód słońca."},{"type":"line","text":"Nie szare jak deszcz."},{"type":"line","text":"Żółte — jak stary pergamin, jak skóra chorego człowieka, jak świat, który właśnie traci coś ważnego i nie umie jeszcze powiedzieć co."},{"type":"line","text":"— Wszyscy na pokład! — wrzasnął kapitan głosem, który przez trzydzieści lat ścinał mrozy."},{"type":"line","text":"Za późno."},{"type":"line","text":"Woda pod nami zaczęła się kręcić."},{"type":"line","text":"Najpierw powoli."},{"type":"line","text":"Zauważył to pierwszy bosman, bo miał zwyczaj obserwować, jak niebo odbija się w wodzie. I nagle niebo w wodzie zaczęło wirować, a prawdziwe niebo stało nieruchomo."},{"type":"line","text":"Potem szybciej."},{"type":"line","text":"Potem tak szybko, że całe morze wyglądało jak garnek zupy gotowanej przez niewidzialną rękę."},{"type":"line","text":"Bąbelki."},{"type":"line","text":"Piana."},{"type":"line","text":"Wir."},{"type":"line","text":"Wielki jak miasto."},{"type":"line","text":"Głęboki jak..."},{"type":"line","text":"Nie wiem jak głęboki."},{"type":"line","text":"Tego dna nikt żywy nie oglądał."},{"type":"line","text":"Statek się kręcił, kręcił, kręcił — i zniknął."},{"type":"line","text":"Dosłownie rozpadł się jak zabawka w rękach niecierpliwego dziecka: na deski, liny, żagle i ludzkie krzyki. Wszystko razem wciągnęło pod wodę."},{"type":"line","text":"A ja trzymałem się deski — jednej cedrowej deski, gładkiej i szerokiej."},{"type":"line","text":"Trzymałem się mocno."},{"type":"line","text":"Nie wiem, dlaczego przeżyłem."},{"type":"line","text":"Ale żyłem, bo morze bywa łaskawe bez powodu, tak samo jak bywa okrutne bez powodu."},{"type":"line","text":"Kiedy się obudziłem, leżałem twarzą w piasku."},{"type":"line","text":"Piasek był biały jak mąka i ciepły jak skóra."},{"type":"line","text":"Dookoła rozciągał się ocean, spokojny teraz, jak gdyby nigdy nic, błyszczący w słońcu niewinnie."},{"type":"line","text":"Wstałem."},{"type":"line","text":"Otrzepałem się."},{"type":"line","text":"Spojrzałem dookoła."},{"type":"line","text":"Wyspa."},{"type":"line","text":"Duża wyspa, z palmami, zaroślami i pagórkami."},{"type":"line","text":"Wyglądała normalnie — tak normalnie, że poczułem niepokój, bo rzeczy zbyt normalne po czymś zbyt nienormalnym nigdy nie są tak proste, jak wyglądają."},{"type":"line","text":"I ptaki na tej wyspie milczały."},{"type":"line","text":"Kompletnie."},{"type":"line","text":"A ptaki milczą tylko wtedy, gdy w pobliżu jest drapieżnik."},{"type":"line","text":"Albo coś gorszego niż drapieżnik."},{"type":"line","text":"Poszedłem w głąb wyspy, przez zarośla pachnące dzikim pieprzem i kwiatami, których nie umiałem nazwać."},{"type":"line","text":"Po godzinie marszu zobaczyłem miasto."},{"type":"line","text":"Piękne miasto, z kolumnami z białego marmuru, bramami ze złoconego drewna i fontanną pośrodku rynku. Woda biła w niej wysoko i opadała z muzyką."},{"type":"line","text":"Miasto było zupełnie puste."},{"type":"line","text":"Absolutnie, całkowicie puste."},{"type":"line","text":"Nie było ludzi."},{"type":"line","text":"Nie było zwierząt."},{"type":"line","text":"Nie było żadnego dźwięku oprócz wiatru, który chodził między domami jak ktoś, kto czegoś szuka i nie może znaleźć."},{"type":"line","text":"W sklepach stały nieruszone towary."},{"type":"line","text":"W kuchniach stały garnki — wystudzone, ale nie zgniłe."},{"type":"line","text":"W szkole stały ławki z otwartymi książkami."},{"type":"line","text":"Na środku głównego placu stał tron z kości słoniowej. Był wypolerowany i czysty, jakby ktoś dopiero co przetarł go dłonią."},{"type":"line","text":"A na jego rzeźbionych poręczach, zakończonych głowami lwów, leżał zwitek pergaminu."},{"type":"line","text":"Sindbad wziął pergamin."},{"type":"line","text":"Nie był zapisany w żadnym języku, który znał."},{"type":"line","text":"Nie po arabsku."},{"type":"line","text":"Nie po persku."},{"type":"line","text":"Nie po chińsku."},{"type":"line","text":"Nie w żadnym z siedmiu języków, których nauczył się podczas sześciu poprzednich podróży."},{"type":"line","text":"A jednak, kiedy dotykał pergaminu, rozumiał."},{"type":"line","text":"Tak jakby słowa wchodziły do niego przez palce, omijając oczy, uszy i głowę, trafiając wprost do miejsca, gdzie mieszka rozumienie."},{"type":"line","text":"„Kto tu dotrze, ten wie, że świat jest większy niż wszystkie mapy razem wzięte. Kto to wie, ten jest wolny. Ale wiedza ma cenę”."},{"type":"line","text":"I właśnie wtedy — trzask."},{"type":"line","text":"Pułapka."},{"type":"line","text":"Zacisnęła się na lewej dłoni Sindbada jak żelazne szczęki."},{"type":"line","text":"Ale nie była metalowa."},{"type":"line","text":"Była ze światła — twardego jak diament i ciepłego jak ogień."},{"type":"line","text":"Nie bolała."},{"type":"line","text":"Ale trzymała mocno."},{"type":"line","text":"I wtedy rozległ się głos."},{"type":"line","text":"Skąd?"},{"type":"line","text":"Zewsząd?"},{"type":"line","text":"Z fontanny?"},{"type":"line","text":"Ze ścian?"},{"type":"line","text":"Z samego powietrza?"},{"type":"line","text":"Głos powiedział bez złości, bez groźby, spokojnie:"},{"type":"line","text":"„Zanim odejdziesz z tą wiedzą, musisz zostawić coś w zamian”."},{"type":"line","text":"Sindbad stał i myślał."},{"type":"line","text":"Złoto?"},{"type":"line","text":"Miał przy sobie złoto i kamienie. Zawsze zabierał je w podróż."},{"type":"line","text":"Ale coś mu mówiło, że nie o to chodzi."},{"type":"line","text":"Czas?"},{"type":"line","text":"Nie wiadomo, jak oddać czas."},{"type":"line","text":"Historię?"},{"type":"line","text":"Ale komu ją tu opowiedzieć, skoro nikogo nie ma?"},{"type":"line","text":"Na koniec Sindbad spojrzał na pułapkę ze światła i powiedział spokojnie:"},{"type":"line","text":"— Niech blizna będzie zapłatą za lekcję, którą mi dałeś."},{"type":"line","text":"Pułapka zniknęła."},{"type":"line","text":"Nie boleśnie."},{"type":"line","text":"Nie gwałtownie."},{"type":"line","text":"Po prostu przestała być."},{"type":"line","text":"Na lewej dłoni, dokładnie tam, gdzie przed chwilą była światłość, została cienka, blada linia."},{"type":"line","text":"Blizna bez historii."},{"type":"line","text":"Albo raczej blizna, której historia była zbyt duża, żeby opowiadać ją przy każdej okazji."},{"type":"line","text":"Sindbad wrócił do domu."},{"type":"line","text":"Sam."},{"type":"line","text":"Bez statku."},{"type":"line","text":"W sposób, o którym naprawdę nie opowiadał, bo nie wszystkie drogi powrotne nadają się do opowiadania."},{"type":"line","text":"Dziewczynka siedziała nieruchomo przez długą chwilę po tym, jak skończył."},{"type":"line","text":"— I co to była za lekcja? — spytała w końcu bardzo cicho."},{"type":"line","text":"Sindbad uśmiechnął się."},{"type":"line","text":"Nie tym uśmiechem na pokaz, który miał dla kupców, sułtanów i kalifów."},{"type":"line","text":"Tym prawdziwym, małym, niedbałym."},{"type":"line","text":"— Że warto płynąć — powiedział. — Nawet jeśli człowiek się topi. Nawet jeśli się gubi. Nawet jeśli trafia na wyspy, których nie ma na żadnej mapie. Bo każde zagubienie może stać się nową mapą. I każda blizna może być historią, którą nosisz w sobie nawet wtedy, kiedy nie ma komu jej opowiedzieć."},{"type":"line","text":"Dziewczynka patrzyła na bladą linię na jego dłoni."},{"type":"line","text":"— Czy żałujesz? — spytała."},{"type":"line","text":"Sindbad zastanowił się długo."},{"type":"line","text":"Tak długo, że muzyka w pałacu zdążyła zmienić melodię dwa razy."},{"type":"line","text":"— Nie — odrzekł w końcu. — Wiedza zawsze warta jest ceny. Ważne tylko, żeby wiedzieć, co się płaci i za co."},{"type":"section","text":"— ZAKOŃCZENIE PODCASTOWE —"},{"type":"line","text":"I tak kończy się dzisiejsza opowieść: „Sindbad Żeglarz”."},{"type":"line","text":"Jeśli ta historia została z tobą choć na chwilę, zabierz jej mały kawałek do snu."},{"type":"line","text":"Może będzie to obraz."},{"type":"line","text":"Może jedno zdanie."},{"type":"line","text":"A może pytanie, które wróci jutro rano."},{"type":"line","text":"Więcej bajek, legend i tajemniczych opowieści znajdziesz na stronie 3tatata.pl."},{"type":"line","text":"Możesz nas także słuchać na Spotify i oglądać na YouTube."},{"type":"line","text":"Zostaw follow albo subskrypcję, żeby nie przegapić kolejnych historii."},{"type":"line","text":"Dobranoc — i do usłyszenia w następnej bajce."}]},{"id":2,"title":"RYBAK I DŻIN","tag":"Opowieść","sections":[{"type":"title","text":"RYBAK I DŻIN"},{"type":"meta","text":"3TaTaTa — Opowieści z dalekich krain"},{"type":"section","text":"— WSTĘP DO ODCINKA —"},{"type":"line","text":"Hej."},{"type":"line","text":"Mam do ciebie pytanie, zanim zacznę."},{"type":"line","text":"Jedno, tylko jedno."},{"type":"line","text":"Czy kiedykolwiek znalazłeś coś, o czym nie wiedziałeś, czym naprawdę jest?"},{"type":"line","text":"Kamień, który dziwnie świecił."},{"type":"line","text":"Pudełko bez wieczka."},{"type":"line","text":"Butelkę z korkiem, którą ktoś wyrzucił albo zgubił."},{"type":"line","text":"I czy zastanawiałeś się wtedy: otworzyć czy nie?"},{"type":"line","text":"Dzisiaj opowiem ci historię starego rybaka, który wyciągnął z morza coś, czego nie zamawiał. Coś, co nie było rybą. Coś, czego nie powinno być w jego sieci."},{"type":"line","text":"I właśnie wtedy musiał podjąć jedną z najtrudniejszych decyzji swojego życia."},{"type":"line","text":"Uwaga — ta bajka zadaje na końcu pytanie, na które musisz odpowiedzieć sam."},{"type":"line","text":"RYBAK I DŻIN"},{"type":"line","text":"Stary rybak nazywał się Mustafa i miał jedną zasadę: każdego ranka trzy razy rzucał sieć."},{"type":"line","text":"Nie cztery."},{"type":"line","text":"Nie dwie."},{"type":"line","text":"Nie pięć w dobre dni i dwie w złe."},{"type":"line","text":"Zawsze trzy."},{"type":"line","text":"Tyle, co palce na jednej ręce, jeśli odliczyć kciuk."},{"type":"line","text":"Trzy rzuty i koniec."},{"type":"line","text":"Tak powiedział mu ojciec. A ojcu — jego ojciec. I był w tej trójce jakiś spokój, jakiś porządek, na którym można się oprzeć, kiedy morze jest nieprzewidywalne i kapryśne jak kot w deszczu."},{"type":"line","text":"Mustafa miał już tyle lat, że nie pamiętał dokładnie ile."},{"type":"line","text":"Tyle, żeby wiedzieć, że morze jest starsze od niego i mądrzejsze."},{"type":"line","text":"Tyle, żeby rozumieć, że człowiek może się z morzem przyjaźnić albo może z nim walczyć, ale wygrać — nigdy."},{"type":"line","text":"Więc Mustafa wybrał przyjaźń."},{"type":"line","text":"Wychodził na morze z szacunkiem, rozmawiał z falami jak z sąsiadami i każdego wieczoru dziękował za to, co złowił — czy było tego dużo, czy mało."},{"type":"line","text":"Jego łódź była mała i stara, pomalowana na niebiesko, z białymi falami namalowanymi wzdłuż burty."},{"type":"line","text":"Te fale namalował dawno temu jego syn, który potem wyrósł i wyjechał do miasta."},{"type":"line","text":"Wiosła były wytarte do gładkości przez tysiące godzin pracy. Sieć była cerowana w co najmniej czternastu miejscach, a każde łatanie pochodziło z innego roku."},{"type":"line","text":"Tego dnia — w dzień mglisty, kiedy morze było białe jak mleko i nie widać było granicy między wodą a niebem, jakby cały świat zrobiono z jednego materiału — Mustafa wyszedł przed świtem, tak jak zawsze."},{"type":"line","text":"Pierwsze dwa rzuty przyniosły mu szkielet konia i stary but bez pary."},{"type":"line","text":"Szkielet konia w morzu?"},{"type":"line","text":"Skąd się tam wziął, tego Mustafa nie wiedział i nie pytał. Morze ma swoje sprawy."},{"type":"line","text":"But bez pary?"},{"type":"line","text":"To się zdarza. Gdzieś istnieje drugi but, na jakimś innym brzegu. Może daleko, może blisko. Taka jest natura rzeczy."},{"type":"line","text":"Trzeci rzut był ciężki."},{"type":"line","text":"Znacznie cięższy niż poprzednie."},{"type":"line","text":"Mustafa poczuł to w rękach od razu. To nie było napięcie sieci takie jak przy rybie. Nie takie jak przy kamieniu. I nie takie jak przy drewnianych szczątkach."},{"type":"line","text":"Ciężar był jednostajny, zwarty i okrągły."},{"type":"line","text":"Ciągnął więc i ciągnął, zastanawiając się, co znalazł."},{"type":"line","text":"Wielkiego kraba?"},{"type":"line","text":"Żółwia morskiego?"},{"type":"line","text":"A może jakąś metalową figurkę wyrzuconą z zatopionego statku?"},{"type":"line","text":"W końcu wyciągnął z wody miedzianą butelkę."},{"type":"line","text":"Była zakorkowana i zapieczętowana ołowiem. Na ołowiu odciśnięto okrągłą pieczęć z symbolami, których Mustafa nie umiał czytać, ale których wiek czuł pod palcami tak wyraźnie, jak czuje się wiek drzewa po słojach."},{"type":"line","text":"To była stara pieczęć."},{"type":"line","text":"Bardzo stara."},{"type":"line","text":"Starsza niż on."},{"type":"line","text":"Starsza niż jego ojciec, dziadek i pradziadek razem wzięci."},{"type":"line","text":"Mustafa postawił butelkę na dnie łodzi i patrzył na nią przez chwilę."},{"type":"line","text":"Morze chlupotało cicho przy burcie."},{"type":"line","text":"Mgła falowała leniwie."},{"type":"line","text":"Gdzieś daleko, niewidoczny w mlecznej bieli, krzyczał ptak morski."},{"type":"line","text":"W głowie Mustafy odezwały się trzy głosy."},{"type":"line","text":"Pierwszy był głosem ciekawości."},{"type":"line","text":"Powiedział: otwórz. Musisz wiedzieć, co jest w środku. Musisz wiedzieć, dlaczego ta butelka znalazła się właśnie tutaj."},{"type":"line","text":"Drugi był głosem ostrożności."},{"type":"line","text":"Powiedział: nie otwieraj. Skoro ktoś zapieczętował ją tak dawno temu, musiał mieć powód. A powody do zamykania rzeczy bywają różne. Nie wszystkie dobre."},{"type":"line","text":"Trzeci głos był najcichszy."},{"type":"line","text":"Ten, który mówi rzadko, ale kiedy już się odzywa, warto go posłuchać."},{"type":"line","text":"Powiedział tylko:"},{"type":"line","text":"Co by było, gdyby?"},{"type":"line","text":"Mustafa siedział z tymi trzema głosami przez dłuższą chwilę."},{"type":"line","text":"Słońce — niewidoczne za mgłą, ale wyczuwalne w cieple powietrza — podnosiło się powoli nad horyzont."},{"type":"line","text":"W końcu Mustafa wziął butelkę, obejrzał pieczęć jeszcze raz, powąchał korek — pachniał solą i czymś starszym niż sól — i powiedział głośno, do nikogo albo do wszystkiego:"},{"type":"line","text":"— Cóż. Zobaczymy."},{"type":"line","text":"I otworzył."},{"type":"line","text":"Najpierw nie stało się nic."},{"type":"line","text":"Potem pojawił się dym."},{"type":"line","text":"Nie dym z ogniska."},{"type":"line","text":"Nie dym z fajki."},{"type":"line","text":"Inny."},{"type":"line","text":"Gęsty, czarny jak atrament, pachnący jednocześnie morzem po burzy i bardzo starą, zakurzoną biblioteką."},{"type":"line","text":"Dym wychodził powoli, leniwym kłębem, jakby po tysiącach lat wcale nie musiał się spieszyć."},{"type":"line","text":"A potem pojawił się kształt."},{"type":"line","text":"Rosnący."},{"type":"line","text":"Coraz większy."},{"type":"line","text":"Większy od Mustafy."},{"type":"line","text":"Większy od jego łodzi."},{"type":"line","text":"A kiedy skończył rosnąć, sięgał chmur ukrytych we mgle i Mustafa musiał zadrzeć głowę, żeby zobaczyć twarz."},{"type":"line","text":"To był dżin."},{"type":"line","text":"Wielki jak wzgórze."},{"type":"line","text":"Z twarzą wyrzeźbioną z czerwonego kamienia — albo z czegoś, co tylko wyglądało jak kamień."},{"type":"line","text":"Jego oczy płonęły jak dwa ogniska rozpalone w środku skały. Ramiona miał grube jak pnie starych dębów. A kiedy w końcu przemówił, jego głos zabrzmiał jak grzmot słyszany spod wody."},{"type":"line","text":"— Wolny! — wrzasnął dżin, a ten wrzask rozniósł się po całej mgle. Gdzieś daleko mewy odpowiedziały strachem. — Wolny po tysiącu lat!"},{"type":"line","text":"Mustafa siedział spokojnie na dnie łodzi, z rękami opartymi na kolanach, i czekał."},{"type":"line","text":"Wiedział, że wielkim rzeczom trzeba pozwolić skończyć się cieszyć."},{"type":"line","text":"Dżin kręcił się, wyciągał ręce, oddychał głęboko morzem i mgłą."},{"type":"line","text":"Trwało to chwilę."},{"type":"line","text":"A potem spojrzał w dół."},{"type":"line","text":"W dół, tam gdzie na małej łódce siedział mały, stary rybak."},{"type":"line","text":"Dżin zmrużył płonące oczy."},{"type":"line","text":"— Jesteś tym, który mnie uwolnił?"},{"type":"line","text":"— Tak — odrzekł Mustafa spokojnie, tym samym tonem, którym zwykle mówił do morza."},{"type":"line","text":"— Posłuchaj — powiedział dżin."},{"type":"line","text":"Jego głos był już trochę cichszy, jakby ktoś przykręcił głośność burzy."},{"type":"line","text":"— Przez pierwsze pięćset lat zamknięcia składałem sobie obietnice. Obiecywałem, że ten, kto mnie uwolni, dostanie skarby, złoto, mądrość i wszystko, czego zapragnie. Miałem wiele czasu, żeby wymyślić szczegóły. Byłem wtedy jeszcze pełen wdzięczności."},{"type":"line","text":"— Rozumiem — powiedział Mustafa."},{"type":"line","text":"— Ale przez drugie pięćset lat stałem się zły — ciągnął dżin. — Bardzo zły. Ciemność, ciasnota i tysiąc lat bez ruchu robią z każdym coś innego, niż był wcześniej. Obiecałem sobie wtedy, że tego, kto mnie uwolni, zabiję. Bo złość szukała ujścia."},{"type":"line","text":"Mustafa pokiwał głową powoli, jakby usłyszał informację o pogodzie — ważną, ale nie zaskakującą."},{"type":"line","text":"— I co teraz wybierzesz? — spytał."},{"type":"line","text":"Dżin otworzył usta."},{"type":"line","text":"Zamknął je."},{"type":"line","text":"Otworzył znowu."},{"type":"line","text":"Zmrużył oczy."},{"type":"line","text":"To było pytanie, którego się nie spodziewał."},{"type":"line","text":"— Co... mówisz? — zapytał."},{"type":"line","text":"— Mówię, że złożyłeś sobie dwie różne obietnice w dwóch różnych momentach — powiedział Mustafa spokojnie. — Ale żadna z nich nie została złożona teraz, tutaj, mnie. Obie złożyłeś samemu sobie, w ciemności, zanim mnie poznałeś. Pytam więc: kim jesteś teraz? Dżinem z pierwszych pięciuset lat — tym pełnym wdzięczności? Czy dżinem z drugich pięciuset lat — tym pełnym złości?"},{"type":"line","text":"Zapadła cisza."},{"type":"line","text":"Taka cisza, że Mustafa usłyszał własne serce."},{"type":"line","text":"Usłyszał fale uderzające o burtę, każdą osobno."},{"type":"line","text":"Usłyszał nawet mgłę — bo mgła ma dźwięk, jeśli słucha się wystarczająco uważnie. Taki cichy, mokry szelest."},{"type":"line","text":"Dżin patrzył na starego rybaka i po raz pierwszy od tysiąca lat naprawdę myślał."},{"type":"line","text":"Nie reagował."},{"type":"line","text":"Nie groził."},{"type":"line","text":"Nie powtarzał dawnych słów."},{"type":"line","text":"Myślał."},{"type":"line","text":"Bo nikt nigdy — przez tysiąc lat, przez sześć wcześniejszych razy, kiedy był uwalniany i cofany z powrotem do butelki — nikt nie zadał mu takiego pytania."},{"type":"line","text":"— Nie wiem — powiedział w końcu dżin."},{"type":"line","text":"I w tym „nie wiem” była prawda tak duża, że powietrze zadrżało od niej."},{"type":"line","text":"— To jest dobra odpowiedź — odrzekł Mustafa. — Kto nie wie, ten może się dowiedzieć. Kto uważa, że wie już wszystko, jest zamknięty tak samo jak ty byłeś zamknięty w tej butelce."},{"type":"line","text":"Dżin usiadł na wodzie."},{"type":"line","text":"Dosłownie."},{"type":"line","text":"Jakby woda była ławką."},{"type":"line","text":"Patrzył na rybaka z czymś nowym w płonących oczach."},{"type":"line","text":"Nie ze złością."},{"type":"line","text":"Nie z wdzięcznością."},{"type":"line","text":"Z ciekawością."},{"type":"line","text":"— Czego chcesz? — spytał w końcu. — Mam potęgę. Mogę dać ci złoto, pałac, długie życie. Mogę przenieść cię na koniec świata. Mogę zamienić tę łódź w galeon ze stu wiosłami."},{"type":"line","text":"Mustafa zastanowił się przez chwilę."},{"type":"line","text":"— Chciałbym mieć jutro tyle ryb, ile potrzeba — powiedział. — Nie więcej. Żeby starczyło na życie i żeby zostało trochę dla tych, którzy mają mniej."},{"type":"line","text":"Dżin patrzył na niego długo."},{"type":"line","text":"— Tylko tyle?"},{"type":"line","text":"— Tylko tyle."},{"type":"line","text":"— Nie chcesz złota? Nie chcesz pałacu? Nie chcesz..."},{"type":"line","text":"— Chcę ryb na jutro — przerwał mu spokojnie Mustafa. — Bo pojutrze znowu wyjdę na morze. I tak każdego dnia, dopóki będę miał siłę wiosłować. To jest moje życie. Nie potrzebuję zamieniać go na inne."},{"type":"line","text":"Dżin milczał bardzo długo."},{"type":"line","text":"A potem powiedział cicho:"},{"type":"line","text":"— Wiesz co? Przez tysiąc lat byłem uwalniany sześć razy. Za każdym razem ten, kto mnie uwolnił, prosił o wszystko. Zawsze o wszystko. I zawsze to wszystko ich niszczyło, bo wszystko to za dużo dla jednego człowieka. Ty jesteś pierwszy, który powiedział: wystarczy."},{"type":"line","text":"— Bo wszystko by mnie utopiło — odrzekł Mustafa. — Tak jak ciebie utopiła butelka. Za mała przestrzeń na za dużą moc."},{"type":"line","text":"I wtedy dżin — po tysiącu lat zamknięcia i sześciu wcześniejszych nieudanych uwolnieniach — po raz pierwszy naprawdę się roześmiał."},{"type":"line","text":"Nie śmiechem złości."},{"type":"line","text":"Nie śmiechem triumfu."},{"type":"line","text":"Śmiechem kogoś, kto właśnie zrozumiał coś ważnego."},{"type":"line","text":"Następnego ranka Mustafa wypłynął na morze jak zawsze."},{"type":"line","text":"Nie miał pałacu."},{"type":"line","text":"Nie miał złotych kufrów."},{"type":"line","text":"Nie miał łodzi większej od portu."},{"type":"line","text":"Miał tę samą starą sieć, te same wiosła i tę samą niebieską łódź z białymi falami namalowanymi przez syna."},{"type":"line","text":"Rzucił sieć pierwszy raz."},{"type":"line","text":"Wróciła pełna."},{"type":"line","text":"Rzucił drugi raz."},{"type":"line","text":"Wróciła pełna."},{"type":"line","text":"Rzucił trzeci raz."},{"type":"line","text":"Wróciła pełna dokładnie tyle, ile trzeba."},{"type":"line","text":"Nie za mało."},{"type":"line","text":"Nie za dużo."},{"type":"line","text":"Mustafa spojrzał na morze, uśmiechnął się i powiedział:"},{"type":"line","text":"— Dziękuję."},{"type":"line","text":"A gdzie był dżin?"},{"type":"line","text":"Tego nikt nie wie."},{"type":"line","text":"Może siedział na dalekiej chmurze i uczył się, czym jest wdzięczność."},{"type":"line","text":"Może płynął pod wodą obok wielorybów, które znają sekrety starsze niż ludzkie miasta."},{"type":"line","text":"A może stał gdzieś na brzegu, niewidzialny dla ludzi, i patrzył, jak stary rybak wraca do domu z siecią pełną ryb — wystarczająco pełną."},{"type":"line","text":"Mustafa nigdy nie opowiedział tej historii wszystkim."},{"type":"line","text":"Ale podobno raz, wiele lat później, kiedy jego wnuk poprosił wieczorem o bajkę, stary rybak spojrzał przez okno na morze i powiedział:"},{"type":"line","text":"— Dobrze. Opowiem ci o butelce, której lepiej było nie otwierać... a jednak trzeba było ją otworzyć."},{"type":"section","text":"— ZAKOŃCZENIE PODCASTOWE —"},{"type":"line","text":"I tak kończy się dzisiejsza opowieść: „Rybak i dżin”."},{"type":"line","text":"A teraz pytanie, które obiecałem na początku."},{"type":"line","text":"Gdybyś ty znalazł taką butelkę — otworzyłbyś ją?"},{"type":"line","text":"A jeśli tak, czego byś zażądał?"},{"type":"line","text":"Pomyśl przez chwilę."},{"type":"line","text":"Bo odpowiedź naprawdę dużo mówi o tym, kim jesteś."},{"type":"line","text":"Jeśli ta historia została z tobą choć na chwilę, zabierz jej mały kawałek do snu."},{"type":"line","text":"Może będzie to obraz starej łodzi we mgle."},{"type":"line","text":"Może dżin siedzący na wodzie jak na ławce."},{"type":"line","text":"A może jedno proste słowo:"},{"type":"line","text":"wystarczy."},{"type":"line","text":"Więcej bajek, legend i tajemniczych opowieści znajdziesz na stronie 3tatata.pl."},{"type":"line","text":"Możesz nas także słuchać na Spotify i oglądać na YouTube."},{"type":"line","text":"Zostaw follow albo subskrypcję, żeby nie przegapić kolejnych historii."},{"type":"line","text":"Dobranoc — i do usłyszenia w następnej bajce."}]},{"id":3,"title":"ALADYN I CUDOWNA LAMPA","tag":"Opowieść","sections":[{"type":"title","text":"ALADYN I CUDOWNA LAMPA"},{"type":"meta","text":"3TaTaTa — Opowieści z dalekich krain"},{"type":"section","text":"— WSTĘP DO ODCINKA —"},{"type":"line","text":"Zanim zaczniemy, wyobraź sobie starą uliczkę."},{"type":"line","text":"Wąską, ciepłą od słońca i pełną zapachów: przypraw, świeżego chleba, kurzu, pomarańczy i dymu z małych kuchennych palenisk."},{"type":"line","text":"Wyobraź sobie targ, na którym kupcy przekrzykują się od rana do wieczora."},{"type":"line","text":"Jedni sprzedają daktyle."},{"type":"line","text":"Inni tkaniny miękkie jak chmury."},{"type":"line","text":"Ktoś potrząsa bransoletami, które dzwonią jak małe dzwonki."},{"type":"line","text":"A między tym wszystkim biegnie chłopiec."},{"type":"line","text":"Zwyczajny chłopiec."},{"type":"line","text":"Trochę leniwy."},{"type":"line","text":"Trochę marzyciel."},{"type":"line","text":"Trochę zagubiony."},{"type":"line","text":"Ma na imię Aladyn."},{"type":"line","text":"Nie wie jeszcze, że pewnego dnia zejdzie pod ziemię, znajdzie starą lampę i przekona się, że największa magia nie zawsze mieszka w czarach."},{"type":"line","text":"Czasem mieszka w sercu człowieka, który dopiero uczy się być dobry."},{"type":"section","text":"— ALADYN I CUDOWNA LAMPA —"},{"type":"line","text":"Dawno temu, w jednym z wielkich miast Dalekiego Wschodu, żył chłopiec imieniem Aladyn."},{"type":"line","text":"Miasto było ogromne."},{"type":"line","text":"Rankiem budził je śpiew muezinów, stukot kopyt, nawoływania kupców i skrzypienie drewnianych kół. W południe powietrze drżało od upału, a wieczorem całe ulice pachniały jedzeniem, kurzem i jaśminem."},{"type":"line","text":"Aladyn mieszkał z matką w niewielkim domu na końcu jednej z bocznych uliczek."},{"type":"line","text":"Dom był skromny."},{"type":"line","text":"Miał spękane ściany, małe okno i drzwi, które trzeba było podnosić za klamkę, żeby dobrze się zamknęły."},{"type":"line","text":"Matka Aladyna pracowała ciężko od rana do nocy. Przędła, szyła, reperowała stare ubrania i robiła wszystko, co mogła, żeby w domu nigdy nie zabrakło choć kawałka chleba."},{"type":"line","text":"Aladyn natomiast nie był zbyt pracowity."},{"type":"line","text":"Nie był zły."},{"type":"line","text":"Nie był okrutny."},{"type":"line","text":"Nie miał serca z kamienia."},{"type":"line","text":"Ale był lekkomyślny."},{"type":"line","text":"Wolał biegać po targu, słuchać opowieści podróżników, zaglądać do straganów i marzyć o bogactwie, niż pomagać matce w codziennych obowiązkach."},{"type":"line","text":"— Aladynie — mówiła czasem matka, zmęczonym, ale ciepłym głosem — życie nie zmieni się od samego marzenia."},{"type":"line","text":"— Wiem, matko — odpowiadał chłopiec."},{"type":"line","text":"Ale tak naprawdę nie wiedział."},{"type":"line","text":"Jeszcze nie."},{"type":"line","text":"Pewnego dnia, kiedy Aladyn siedział przy fontannie i obserwował gołębie pijące wodę z kamiennej misy, podszedł do niego nieznajomy."},{"type":"line","text":"Był ubrany jak bogaty kupiec."},{"type":"line","text":"Miał ciemną szatę obszytą złotą nicią, turban z drogocenną broszą i laskę z końcówką z kości słoniowej."},{"type":"line","text":"Jego twarz była uprzejma, ale oczy... oczy miał zbyt nieruchome."},{"type":"line","text":"Takie oczy mają ludzie, którzy uśmiechają się ustami, ale nie sercem."},{"type":"line","text":"— Czy ty jesteś Aladyn? — zapytał nieznajomy."},{"type":"line","text":"Chłopiec spojrzał na niego ostrożnie."},{"type":"line","text":"— A kto pyta?"},{"type":"line","text":"Nieznajomy westchnął, jakby ogarnęło go wielkie wzruszenie."},{"type":"line","text":"— Jestem twoim stryjem. Bratem twojego zmarłego ojca. Przez wiele lat podróżowałem po świecie, ale teraz wróciłem, żeby odnaleźć rodzinę."},{"type":"line","text":"Aladyn zamarł."},{"type":"line","text":"O ojcu pamiętał niewiele. Tylko dłonie, głos i zapach drewna, bo ojciec był krawcem i często pracował przy małym stole pod oknem."},{"type":"line","text":"— Moim stryjem? — powtórzył niepewnie."},{"type":"line","text":"— Tak, mój chłopcze — powiedział nieznajomy i położył rękę na sercu. — Krew z krwi. Rodzina."},{"type":"line","text":"Aladyn zaprowadził go do domu."},{"type":"line","text":"Matka przyjęła gościa ostrożnie, ale niegrzecznie byłoby wyrzucić człowieka, który mówił, że jest krewnym zmarłego męża."},{"type":"line","text":"Nieznajomy przyniósł jedzenie, pieniądze i piękne obietnice."},{"type":"line","text":"Mówił, że pomoże Aladynowi stać się porządnym kupcem."},{"type":"line","text":"Mówił, że nauczy go handlu."},{"type":"line","text":"Mówił, że chłopiec ma przed sobą wielką przyszłość."},{"type":"line","text":"A kiedy człowiek ubogi słyszy takie słowa, bardzo chce w nie uwierzyć."},{"type":"line","text":"Następnego ranka nieznajomy zabrał Aladyna za miasto."},{"type":"line","text":"Szli długo."},{"type":"line","text":"Najpierw przez gwarne ulice, potem przez bramę miejską, dalej między ogrodami, polami i suchymi wzgórzami, aż dotarli do miejsca, gdzie nie rosło prawie nic oprócz kolczastych krzewów."},{"type":"line","text":"Słońce stało wysoko."},{"type":"line","text":"Powietrze było gorące i nieruchome."},{"type":"line","text":"— Tutaj — powiedział nieznajomy."},{"type":"line","text":"— Tutaj co? — zapytał Aladyn."},{"type":"line","text":"Mężczyzna nie odpowiedział."},{"type":"line","text":"Zamiast tego wyjął z fałd szaty mały woreczek z proszkiem, rozsypał go na ziemi i wypowiedział słowa, których Aladyn nie rozumiał."},{"type":"line","text":"Nagle ziemia zadrżała."},{"type":"line","text":"Nie mocno."},{"type":"line","text":"Nie jak podczas trzęsienia ziemi."},{"type":"line","text":"Raczej tak, jakby coś głęboko pod spodem przeciągało się po bardzo długim śnie."},{"type":"line","text":"Piasek rozsunął się powoli, a spod ziemi wyłoniła się kamienna płyta z żelaznym pierścieniem."},{"type":"line","text":"Aladyn cofnął się o krok."},{"type":"line","text":"— Co to jest?"},{"type":"line","text":"Nieznajomy odwrócił się do niego."},{"type":"line","text":"Teraz jego twarz nie była już taka łagodna."},{"type":"line","text":"— Wejście — powiedział. — A ty zejdziesz na dół."},{"type":"line","text":"— Ja?"},{"type":"line","text":"— Ty. Tylko młody człowiek może przekroczyć ten próg. Ja nie mogę wejść. Tak mówi zaklęcie."},{"type":"line","text":"Aladyn przełknął ślinę."},{"type":"line","text":"— A co jest na dole?"},{"type":"line","text":"Nieznajomy uśmiechnął się."},{"type":"line","text":"— Ogród skarbów. Drzewa rodzące kamienie szlachetne. Złoto. Srebro. Klejnoty. Ale ty masz przynieść tylko jedno: starą lampę."},{"type":"line","text":"— Lampę?"},{"type":"line","text":"— Starą, brudną, zwyczajną lampę oliwną. Nic więcej. Pamiętaj: nic nie dotykaj, zanim nie weźmiesz lampy. I nie bój się."},{"type":"line","text":"Powiedział to takim głosem, jakim zwykle mówi się komuś, kto ma bardzo dobry powód, żeby się bać."},{"type":"line","text":"Nieznajomy wsunął Aladynowi na palec pierścień."},{"type":"line","text":"— To cię ochroni — powiedział. — A teraz idź."},{"type":"line","text":"Kamienna płyta odsunęła się z głuchym pomrukiem."},{"type":"line","text":"Pod nią zobaczył Aladyn schody prowadzące w dół."},{"type":"line","text":"Były wąskie."},{"type":"line","text":"Ciemne."},{"type":"line","text":"I tak stare, że wyglądały, jakby pamiętały czasy, kiedy świat dopiero uczył się być światem."},{"type":"line","text":"Aladyn zszedł."},{"type":"line","text":"Jeden stopień."},{"type":"line","text":"Drugi."},{"type":"line","text":"Trzeci."},{"type":"line","text":"Za jego plecami światło dnia stawało się coraz mniejsze, aż w końcu zostało tylko jasnym kwadratem daleko nad głową."},{"type":"line","text":"Na dole czekał tunel."},{"type":"line","text":"Ściany lśniły delikatnie, jakby w kamieniu uwięziono światło księżyca."},{"type":"line","text":"Aladyn szedł powoli, z sercem bijącym tak głośno, że przez chwilę myślał, iż ktoś idzie obok niego."},{"type":"line","text":"Po chwili tunel otworzył się nagle i chłopiec stanął w miejscu, którego nigdy nie zapomniał."},{"type":"line","text":"Był to ogród pod ziemią."},{"type":"line","text":"Nie powinno tam być ogrodu."},{"type":"line","text":"A jednak był."},{"type":"line","text":"Rosły w nim drzewa o srebrnych pniach i liściach cienkich jak jedwab. Na gałęziach wisiały owoce, ale nie były to jabłka ani figi. To były rubiny, szafiry, szmaragdy i perły, wielkie jak śliwki."},{"type":"line","text":"Na ziemi zamiast rosy błyszczały drobne diamenty."},{"type":"line","text":"Strumyk płynął przez środek ogrodu, a jego woda świeciła delikatnie błękitnym blaskiem."},{"type":"line","text":"Aladyn zapomniał o strachu."},{"type":"line","text":"Przez chwilę stał z otwartymi ustami, patrząc na cuda, których nie widział żaden chłopiec z jego ulicy."},{"type":"line","text":"Potem przypomniał sobie słowa nieznajomego."},{"type":"line","text":"Lampa."},{"type":"line","text":"Miał znaleźć lampę."},{"type":"line","text":"Na końcu ogrodu, za trzema niskimi arkadami, stała mała kamienna komnata."},{"type":"line","text":"W środku, na prostym stopniu, leżała stara lampa oliwna."},{"type":"line","text":"Była brudna."},{"type":"line","text":"Pociemniała."},{"type":"line","text":"Niepozorna."},{"type":"line","text":"Tak zwyczajna, że przy drzewach pełnych klejnotów wyglądała prawie śmiesznie."},{"type":"line","text":"Aladyn wziął ją do ręki."},{"type":"line","text":"Nic się nie stało."},{"type":"line","text":"Żaden grzmot."},{"type":"line","text":"Żaden błysk."},{"type":"line","text":"Żaden głos."},{"type":"line","text":"Tylko chłodny metal pod palcami."},{"type":"line","text":"Kiedy wracał, zerwał kilka klejnotów z gałęzi. Nie dlatego, że rozumiał ich wartość. Dla niego wyglądały jak piękne, kolorowe owoce. Wsunął je za koszulę i poszedł dalej."},{"type":"line","text":"Wreszcie dotarł do schodów."},{"type":"line","text":"Wysoko nad nim czekał nieznajomy."},{"type":"line","text":"— Masz lampę? — zawołał."},{"type":"line","text":"— Mam! — odpowiedział Aladyn. — Pomóż mi wyjść!"},{"type":"line","text":"— Najpierw podaj lampę!"},{"type":"line","text":"Aladyn spojrzał w górę."},{"type":"line","text":"Coś w głosie mężczyzny sprawiło, że chłopiec mocniej zacisnął palce na lampie."},{"type":"line","text":"— Najpierw pomóż mi wyjść — powiedział."},{"type":"line","text":"Twarz nieznajomego zmieniła się w jednej chwili."},{"type":"line","text":"Zniknęła uprzejmość."},{"type":"line","text":"Zniknął uśmiech."},{"type":"line","text":"Został gniew."},{"type":"line","text":"— Dawaj lampę! — wrzasnął."},{"type":"line","text":"— Nie! — krzyknął Aladyn. — Pomóż mi wyjść!"},{"type":"line","text":"Nieznajomy zawył ze złości."},{"type":"line","text":"Wypowiedział zaklęcie, rzucił proszek na ziemię i kamienna płyta zamknęła się nad głową Aladyna."},{"type":"line","text":"Ciemność spadła na niego jak gruba tkanina."},{"type":"line","text":"— Hej! — krzyczał chłopiec. — Otwórz! Otwórz!"},{"type":"line","text":"Ale nikt nie odpowiedział."},{"type":"line","text":"Nieznajomy nie był jego stryjem."},{"type":"line","text":"Nie był kupcem."},{"type":"line","text":"Był czarnoksiężnikiem, który przybył z daleka, bo wiedział o lampie i o mocy ukrytej w jej wnętrzu."},{"type":"line","text":"Aladyn został sam pod ziemią."},{"type":"line","text":"Płakał."},{"type":"line","text":"Wołał."},{"type":"line","text":"Uderzał pięściami w kamień."},{"type":"line","text":"Ale kamień nie słuchał dziecięcych próśb."},{"type":"line","text":"W końcu, zmęczony i przestraszony, usiadł na stopniu i objął kolana rękami."},{"type":"line","text":"Wtedy przypadkiem potarł pierścień, który czarnoksiężnik wsunął mu na palec."},{"type":"line","text":"Z pierścienia buchnął dym."},{"type":"line","text":"Aladyn krzyknął i odskoczył."},{"type":"line","text":"Dym skręcił się, zgęstniał i przybrał kształt ogromnej postaci."},{"type":"line","text":"— Jestem sługą pierścienia — powiedział głos głęboki jak studnia. — Czego żądasz?"},{"type":"line","text":"Aladyn zadrżał."},{"type":"line","text":"— Chcę... chcę wrócić do domu."},{"type":"line","text":"Nie zdążył powiedzieć nic więcej."},{"type":"line","text":"Świat zawirował."},{"type":"line","text":"Kamienne ściany zniknęły."},{"type":"line","text":"Ciemność pękła."},{"type":"line","text":"A chwilę później Aladyn leżał na podłodze własnego domu, z lampą w dłoni i klejnotami rozsypanymi wokół siebie."},{"type":"line","text":"Matka krzyknęła, uklękła przy nim i objęła go tak mocno, jakby chciała upewnić się, że nie jest snem."},{"type":"line","text":"Przez kilka dni Aladyn odpoczywał."},{"type":"line","text":"Opowiedział matce wszystko, a ona słuchała z przerażeniem i niedowierzaniem."},{"type":"line","text":"Klejnoty schowała do starej misy, bo oboje nie rozumieli, jak bardzo są cenne."},{"type":"line","text":"Lampa natomiast była brudna, więc pewnego ranka matka postanowiła ją wyczyścić i sprzedać na targu."},{"type":"line","text":"— Może dostaniemy za nią choć kilka monet — powiedziała."},{"type":"line","text":"Potarła lampę szmatką."},{"type":"line","text":"I wtedy dom wypełnił się dymem."},{"type":"line","text":"Nie takim jak z ogniska."},{"type":"line","text":"Gęstym."},{"type":"line","text":"Złotym."},{"type":"line","text":"Pachnącym deszczem na gorącym kamieniu."},{"type":"line","text":"Z dymu wyłonił się dżin — większy niż drzwi, wyższy niż sufit, a jednak mieszczący się w izbie tak, jak magia mieści się tam, gdzie chce."},{"type":"line","text":"Matka Aladyna upuściła lampę i zemdlała."},{"type":"line","text":"Aladyn pobladł, ale tym razem nie uciekł."},{"type":"line","text":"— Jestem sługą lampy — powiedział dżin. — Służę temu, kto ją posiada. Czego żądasz?"},{"type":"line","text":"Aladyn był głodny."},{"type":"line","text":"Matka była biedna."},{"type":"line","text":"Dom był pusty."},{"type":"line","text":"Więc powiedział najprościej, jak umiał:"},{"type":"line","text":"— Chcemy jeść."},{"type":"line","text":"Dżin skłonił głowę."},{"type":"line","text":"W jednej chwili przed nimi pojawiły się misy pełne ryżu z migdałami, pieczone mięso, owoce, miód, chleb, mleko i słodkie placki pachnące cynamonem."},{"type":"line","text":"Od tego dnia życie Aladyna zaczęło się zmieniać."},{"type":"line","text":"Ale nie od razu stał się mądry."},{"type":"line","text":"Magia rzadko uczy szybko."},{"type":"line","text":"Na początku Aladyn używał lampy ostrożnie."},{"type":"line","text":"Prosił o jedzenie."},{"type":"line","text":"O ubrania."},{"type":"line","text":"O pieniądze."},{"type":"line","text":"Pomagał matce."},{"type":"line","text":"A potem, pewnego dnia, zobaczył księżniczkę Badr al-Budur."},{"type":"line","text":"Szła do łaźni w otoczeniu służek, a całe miasto zatrzymało się na jej widok."},{"type":"line","text":"Nie dlatego, że kazano ludziom patrzeć."},{"type":"line","text":"Dlatego, że nie sposób było nie patrzeć."},{"type":"line","text":"Księżniczka była piękna, ale nie tylko pięknością zapadła Aladynowi w pamięć. Szła spokojnie, z godnością, jak ktoś, kto zna swoją wartość, ale nie musi nikomu jej udowadniać."},{"type":"line","text":"Aladyn wrócił do domu blady i cichy."},{"type":"line","text":"— Matko — powiedział — chcę poślubić księżniczkę."},{"type":"line","text":"Matka prawie upuściła miskę."},{"type":"line","text":"— Aladynie, synu mój, czy ty oszalałeś?"},{"type":"line","text":"— Nie — odpowiedział. — Ale pierwszy raz w życiu wiem, czego naprawdę pragnę."},{"type":"line","text":"Matka próbowała go przekonać, że to niemożliwe."},{"type":"line","text":"On jednak nalegał tak długo, aż w końcu zgodziła się pójść do pałacu z darem dla sułtana."},{"type":"line","text":"Do misy włożyli klejnoty z podziemnego ogrodu."},{"type":"line","text":"Te same, które kiedyś Aladyn uważał za kolorowe owoce."},{"type":"line","text":"Gdy sułtan je zobaczył, zaniemówił."},{"type":"line","text":"Nigdy wcześniej nie widział takich kamieni."},{"type":"line","text":"Błyszczały jak zamknięte w szkle zachody słońca."},{"type":"line","text":"Sułtan zgodził się rozważyć prośbę, ale dwór był pełen zazdrości, układów i ludzi, którzy nie chcieli, by ubogi chłopiec sięgnął tak wysoko."},{"type":"line","text":"Aladyn musiał więc udowodnić, że nie jest już tym samym lekkomyślnym chłopcem z targu."},{"type":"line","text":"Dzięki dżinowi zbudował pałac piękniejszy niż wszystkie pałace miasta."},{"type":"line","text":"Miał kolumny z białego marmuru, złote kopuły, ogrody pełne fontann i sale, w których lampy świeciły jak gwiazdy."},{"type":"line","text":"Lecz najważniejsze było to, że Aladyn nie zapomniał o swojej matce."},{"type":"line","text":"Nie wyparł się ubogiego domu."},{"type":"line","text":"Nie udawał, że zawsze był kimś wielkim."},{"type":"line","text":"Uczył się być hojny."},{"type":"line","text":"Uczył się słuchać."},{"type":"line","text":"Uczył się, że bogactwo nie czyni człowieka szlachetnym, jeśli człowiek sam nie wybierze szlachetności."},{"type":"line","text":"W końcu poślubił księżniczkę Badr al-Budur."},{"type":"line","text":"Przez pewien czas wydawało się, że zło zostało daleko za nimi."},{"type":"line","text":"Ale zło, które raz czegoś zapragnie, potrafi czekać."},{"type":"line","text":"Czarnoksiężnik dowiedział się, że Aladyn żyje i że posiada lampę."},{"type":"line","text":"Przybył więc z daleka, przebrany za starego handlarza."},{"type":"line","text":"Chodził ulicami miasta i wołał:"},{"type":"line","text":"— Nowe lampy za stare! Nowe lampy za stare!"},{"type":"line","text":"Ludzie śmiali się z niego."},{"type":"line","text":"Kto wymienia nową lampę na starą?"},{"type":"line","text":"Ale księżniczka, która nie znała tajemnicy lampy, zobaczyła w pałacu starą, pociemniałą lampę Aladyna i pomyślała, że taki przedmiot nie pasuje do pięknych komnat."},{"type":"line","text":"Oddała ją handlarzowi."},{"type":"line","text":"Wzięła nową."},{"type":"line","text":"I wtedy wszystko się zmieniło."},{"type":"line","text":"Czarnoksiężnik potarł lampę i rozkazał dżinowi przenieść cały pałac wraz z księżniczką daleko, za morza i pustynie, do swojej krainy."},{"type":"line","text":"Kiedy Aladyn wrócił, po pałacu nie było śladu."},{"type":"line","text":"Została tylko pusta ziemia."},{"type":"line","text":"Sułtan wpadł w rozpacz i gniew."},{"type":"line","text":"Ludzie szeptali."},{"type":"line","text":"Dwór drżał."},{"type":"line","text":"A Aladyn po raz pierwszy od dawna poczuł się znowu jak chłopiec zamknięty pod ziemią."},{"type":"line","text":"Sam."},{"type":"line","text":"Bezradny."},{"type":"line","text":"Z ciemnością nad głową."},{"type":"line","text":"Wtedy przypomniał sobie o pierścieniu."},{"type":"line","text":"Potarł go."},{"type":"line","text":"Pojawił się sługa pierścienia."},{"type":"line","text":"— Nie mogę sprowadzić pałacu — powiedział duch. — Moc lampy jest większa niż moc pierścienia. Mogę jednak zanieść cię tam, gdzie znajduje się twoja żona."},{"type":"line","text":"— Zrób to — powiedział Aladyn."},{"type":"line","text":"Świat zawirował."},{"type":"line","text":"Wiatr uderzył go w twarz."},{"type":"line","text":"A gdy wszystko ucichło, Aladyn stał pod oknami własnego pałacu, który teraz znajdował się w obcej, ponurej krainie."},{"type":"line","text":"Spotkał księżniczkę potajemnie."},{"type":"line","text":"Opowiedziała mu, co się stało."},{"type":"line","text":"Aladyn nie krzyczał."},{"type":"line","text":"Nie obwiniał jej."},{"type":"line","text":"Wiedział, że tajemnice, których nie wyjawia się tym, których się kocha, mogą stać się drzwiami dla nieszczęścia."},{"type":"line","text":"Razem ułożyli plan."},{"type":"line","text":"Księżniczka miała udawać uprzejmość wobec czarnoksiężnika i podać mu napój usypiający."},{"type":"line","text":"Tak też się stało."},{"type":"line","text":"Czarnoksiężnik, pewny swego zwycięstwa, wypił napój i zapadł w głęboki sen."},{"type":"line","text":"Aladyn odnalazł lampę."},{"type":"line","text":"Potarł ją."},{"type":"line","text":"Dżin pojawił się natychmiast."},{"type":"line","text":"— Czego żądasz?"},{"type":"line","text":"— Przenieś nasz pałac z powrotem do miasta — powiedział Aladyn. — Tam, gdzie jest jego miejsce."},{"type":"line","text":"Dżin skłonił się."},{"type":"line","text":"I zanim pierwszy promień porannego słońca dotknął pustyni, pałac znów stał przed oknami sułtana."},{"type":"line","text":"Miasto obudziło się w zdumieniu."},{"type":"line","text":"Ludzie wybiegali na ulice."},{"type":"line","text":"Sułtan płakał z radości."},{"type":"line","text":"Matka Aladyna dziękowała niebu."},{"type":"line","text":"A księżniczka uśmiechnęła się do męża tak, jak uśmiecha się ktoś, kto wie, że niebezpieczeństwo nie tylko zabiera spokój, lecz czasem przynosi też prawdę."},{"type":"line","text":"Aladyn długo jeszcze posiadał lampę."},{"type":"line","text":"Ale z czasem używał jej coraz rzadziej."},{"type":"line","text":"Nie dlatego, że magia straciła moc."},{"type":"line","text":"Dlatego, że on sam zyskał coś większego."},{"type":"line","text":"Rozum."},{"type":"line","text":"Odwagę."},{"type":"line","text":"Wierność."},{"type":"line","text":"I świadomość, że nie każda rzecz, którą można mieć, jest rzeczą, której naprawdę się potrzebuje."},{"type":"line","text":"A lampa?"},{"type":"line","text":"Podobno przez wiele lat leżała zamknięta w komnacie, do której prowadziły trzy klucze."},{"type":"line","text":"Jeden miał Aladyn."},{"type":"line","text":"Drugi księżniczka."},{"type":"line","text":"Trzeci jego matka."},{"type":"line","text":"Bo wielka moc, jeśli ma służyć dobru, nigdy nie powinna być pilnowana tylko przez jednego człowieka."},{"type":"section","text":"— ZAKOŃCZENIE PODCASTOWE —"},{"type":"line","text":"I tak kończy się dzisiejsza opowieść: „Aladyn i cudowna lampa”."},{"type":"line","text":"To historia o chłopcu, który znalazł rzecz potężniejszą niż wszystko, co znał."},{"type":"line","text":"Ale najważniejsze nie było to, że miał lampę."},{"type":"line","text":"Najważniejsze było to, kim stał się wtedy, gdy mógł poprosić o wszystko."},{"type":"line","text":"Bo magia może spełnić życzenie."},{"type":"line","text":"Ale tylko serce człowieka decyduje, czy to życzenie będzie dobre."},{"type":"line","text":"Jeśli ta historia została z tobą choć na chwilę, zabierz jej mały kawałek do snu."},{"type":"line","text":"Może będzie to obraz podziemnego ogrodu."},{"type":"line","text":"Może stara lampa ukryta w cieniu."},{"type":"line","text":"A może jedno pytanie:"},{"type":"line","text":"gdybyś mógł poprosić o wszystko, o co poprosiłbyś naprawdę?"},{"type":"line","text":"Więcej bajek, legend i tajemniczych opowieści znajdziesz na stronie 3tatata.pl."},{"type":"line","text":"Możesz nas także słuchać na Spotify i oglądać na YouTube."},{"type":"line","text":"Zostaw follow albo subskrypcję, żeby nie przegapić kolejnych historii."},{"type":"line","text":"Dobranoc — i do usłyszenia w następnej bajce."}]},{"id":4,"title":"SZEHEREZADA","tag":"Opowieść","sections":[{"type":"title","text":"SZEHEREZADA"},{"type":"meta","text":"3TaTaTa — Opowieści z dalekich krain"},{"type":"section","text":"— WSTĘP DO ODCINKA —"},{"type":"line","text":"Posłuchaj uważnie."},{"type":"line","text":"Są słowa lekkie jak piórko."},{"type":"line","text":"Są słowa ostre jak nóż."},{"type":"line","text":"Są słowa, które potrafią kogoś rozśmieszyć, uspokoić albo przytulić, choć nie mają rąk."},{"type":"line","text":"Ale są też takie słowa, które potrafią ocalić życie."},{"type":"line","text":"Dzisiaj opowiem ci o dziewczynie, która nie miała miecza, armii ani zaklętej lampy."},{"type":"line","text":"Miała tylko głos."},{"type":"line","text":"Miała mądrość."},{"type":"line","text":"I miała odwagę, żeby mówić wtedy, gdy wszyscy inni bali się nawet oddychać."},{"type":"line","text":"Nazywała się Szeherezada."},{"type":"line","text":"A jej największą bronią była opowieść."},{"type":"section","text":"— SZEHEREZADA —"},{"type":"line","text":"Dawno temu, w dalekim królestwie, gdzie pałace miały kopuły lśniące jak księżyc, a ogrody pachniały różami, granatami i ciepłym pyłem pustyni, panował król Szahrijar."},{"type":"line","text":"Był potężny."},{"type":"line","text":"Miał skarby, których nie dało się policzyć."},{"type":"line","text":"Miał straże przy każdej bramie, konie szybsze niż wiatr i złote sale, w których lampy płonęły przez całą noc."},{"type":"line","text":"Ludzie kłaniali mu się nisko."},{"type":"line","text":"Kupcy szeptali jego imię z szacunkiem."},{"type":"line","text":"Wojownicy drżeli przed jego gniewem."},{"type":"line","text":"A jednak król Szahrijar był nieszczęśliwy."},{"type":"line","text":"W jego sercu mieszkała rana, której nie było widać."},{"type":"line","text":"Pewnego dnia ktoś bardzo bliski zdradził jego zaufanie. Od tamtej chwili król przestał wierzyć ludziom. Przestał wierzyć w dobroć, przyjaźń i miłość. Uznał, że skoro jedna osoba go zraniła, wszyscy ludzie są tacy sami."},{"type":"line","text":"A kiedy człowiek z wielką władzą przestaje ufać światu, jego smutek może stać się niebezpieczny dla innych."},{"type":"line","text":"Tak właśnie stało się z królem."},{"type":"line","text":"W pałacu zapadł strach."},{"type":"line","text":"Służba chodziła bezszelestnie."},{"type":"line","text":"Muzyka ucichła."},{"type":"line","text":"Ptaki w złotych klatkach śpiewały ciszej, jakby i one czuły, że nad królestwem zawisł cień."},{"type":"line","text":"Ludzie przestali opowiadać sobie żarty na targu."},{"type":"line","text":"Matki przytulały córki mocniej niż dawniej."},{"type":"line","text":"Ojcowie patrzyli na bramy pałacu z lękiem."},{"type":"line","text":"Bo król, zaślepiony bólem, zaczął podejmować decyzje okrutne i niesprawiedliwe."},{"type":"line","text":"W tym samym królestwie mieszkała córka wielkiego wezyra."},{"type":"line","text":"Nazywała się Szeherezada."},{"type":"line","text":"Była młoda, ale nie lekkomyślna."},{"type":"line","text":"Piękna, ale jej największym darem nie była uroda."},{"type":"line","text":"Największym darem Szeherezady był umysł."},{"type":"line","text":"Czytała księgi, których inni nawet nie otwierali."},{"type":"line","text":"Znała dzieje dawnych królów, legendy kupców, przygody żeglarzy, opowieści pustynnych wędrowców i bajki przekazywane szeptem przez stare kobiety przy gasnących lampach."},{"type":"line","text":"Pamiętała historie o dżinach zamkniętych w butelkach."},{"type":"line","text":"O rybakach, którzy znaleźli więcej, niż szukali."},{"type":"line","text":"O zaczarowanych koniach, dalekich wyspach, tajemnych ogrodach i ludziach, którzy uczyli się mądrości dopiero wtedy, gdy stracili wszystko."},{"type":"line","text":"Ale Szeherezada nie tylko znała opowieści."},{"type":"line","text":"Ona rozumiała, po co istnieją."},{"type":"line","text":"Wiedziała, że dobra historia potrafi wejść do serca ciszej niż rada."},{"type":"line","text":"Potrafi pokazać prawdę tak, żeby człowiek sam ją zobaczył."},{"type":"line","text":"Potrafi zmiękczyć gniew, rozproszyć lęk i otworzyć drzwi tam, gdzie wcześniej była tylko ściana."},{"type":"line","text":"Pewnego wieczoru Szeherezada przyszła do ojca."},{"type":"line","text":"Wezyr siedział przy niskim stole, pochylony nad dokumentami. Na jego twarzy leżało zmęczenie, jak cień długiego dnia."},{"type":"line","text":"— Ojcze — powiedziała spokojnie Szeherezada — chcę pójść do pałacu."},{"type":"line","text":"Wezyr podniósł głowę."},{"type":"line","text":"Przez chwilę patrzył na córkę tak, jakby nie zrozumiał słów."},{"type":"line","text":"— Nie — powiedział w końcu."},{"type":"line","text":"Jedno krótkie słowo."},{"type":"line","text":"Twarde jak zamknięta brama."},{"type":"line","text":"— Ojcze..."},{"type":"line","text":"— Nie — powtórzył. — Nawet nie kończ. Wiem, o czym myślisz. I zabraniam ci."},{"type":"line","text":"Szeherezada usiadła naprzeciwko niego."},{"type":"line","text":"Nie krzyczała."},{"type":"line","text":"Nie płakała."},{"type":"line","text":"Nie próbowała przekonać go pośpiechem."},{"type":"line","text":"— Jeśli nikt nic nie zrobi, strach będzie trwał dalej — powiedziała. — Każdego dnia ktoś będzie cierpiał. Każdej nocy ktoś będzie płakał. Czy mamy tylko patrzeć?"},{"type":"line","text":"Wezyr zacisnął dłonie."},{"type":"line","text":"— Jesteś moją córką."},{"type":"line","text":"— Wiem."},{"type":"line","text":"— Jedyną córką."},{"type":"line","text":"— Wiem."},{"type":"line","text":"— A ja mam cię wysłać tam, gdzie może spotkać cię śmierć?"},{"type":"line","text":"Szeherezada spuściła wzrok."},{"type":"line","text":"Nie dlatego, że zwątpiła."},{"type":"line","text":"Dlatego, że rozumiała jego ból."},{"type":"line","text":"— Nie proszę cię, żebyś się nie bał — powiedziała cicho. — Proszę cię tylko, żebyś zaufał temu, czego mnie nauczyłeś. Mądrość nie jest po to, żeby trzymać ją zamkniętą w księgach. Odwaga nie jest po to, żeby mówić o niej przy stole. Czasem trzeba jej użyć."},{"type":"line","text":"Wezyr odwrócił twarz."},{"type":"line","text":"W oknie wisiał cienki sierp księżyca."},{"type":"line","text":"Przez długą chwilę milczeli."},{"type":"line","text":"W końcu ojciec powiedział:"},{"type":"line","text":"— Masz plan."},{"type":"line","text":"To nie było pytanie."},{"type":"line","text":"Szeherezada skinęła głową."},{"type":"line","text":"— Mam."},{"type":"line","text":"— Jaki?"},{"type":"line","text":"— Będę opowiadać."},{"type":"line","text":"Wezyr spojrzał na nią zdumiony."},{"type":"line","text":"— Opowiadać?"},{"type":"line","text":"— Tak."},{"type":"line","text":"— Córko, król nie potrzebuje bajek."},{"type":"line","text":"— Właśnie dlatego ich potrzebuje — odpowiedziała Szeherezada. — Bo zapomniał, że ludzie nie są tylko winą i zdradą. Są też wyborem, żalem, nauką, miłosierdziem i zmianą. Nie przyjmie tego jako pouczenia. Ale może przyjmie to jako historię."},{"type":"line","text":"Ojciec zamknął oczy."},{"type":"line","text":"Nie chciał się zgodzić."},{"type":"line","text":"Ale znał swoją córkę."},{"type":"line","text":"Wiedział, że jej łagodny głos nie oznacza słabości."},{"type":"line","text":"Wiedział, że kiedy Szeherezada podjęła decyzję z głębi serca, była trudniejsza do zatrzymania niż rzeka po deszczu."},{"type":"line","text":"Następnej nocy Szeherezada znalazła się w pałacu."},{"type":"line","text":"Sale były ogromne i zimne."},{"type":"line","text":"Marmurowe kolumny wspierały sufity malowane w gwiazdy."},{"type":"line","text":"W powietrzu unosił się zapach kadzidła, różanej wody i czegoś niewidzialnego — może strachu, który przez długi czas wsiąkał w ściany."},{"type":"line","text":"Król Szahrijar siedział na tronie."},{"type":"line","text":"Był ubrany w szaty bogatsze niż sny biednych ludzi."},{"type":"line","text":"Ale jego oczy były zmęczone."},{"type":"line","text":"Nie stare."},{"type":"line","text":"Zmęczone."},{"type":"line","text":"Patrzył na Szeherezadę jak na kogoś, kto już dawno postanowił nie wierzyć nikomu."},{"type":"line","text":"— Nie boisz się? — zapytał."},{"type":"line","text":"Szeherezada skłoniła głowę."},{"type":"line","text":"— Boję się, panie."},{"type":"line","text":"Król uniósł brwi."},{"type":"line","text":"— Mówisz to bez wstydu."},{"type":"line","text":"— Bo strach nie jest wstydem — odpowiedziała. — Wstydem jest pozwolić, żeby strach decydował za nas."},{"type":"line","text":"Król przez chwilę milczał."},{"type":"line","text":"Nie spodziewał się takiej odpowiedzi."},{"type":"line","text":"W pałacu nikt nie mówił do niego w ten sposób — spokojnie, ale bez drżenia w każdym słowie."},{"type":"line","text":"Szeherezada poprosiła, by mogła pożegnać się z młodszą siostrą, Dunjazadą."},{"type":"line","text":"Król pozwolił."},{"type":"line","text":"Dunjazada przyszła nocą, blada i zapłakana. Usiadła obok siostry, trzymając jej dłoń tak mocno, jakby mogła zatrzymać ją przy życiu samym uściskiem."},{"type":"line","text":"Wtedy Dunjazada, zgodnie z planem, powiedziała:"},{"type":"line","text":"— Siostro, jeśli to twoja ostatnia noc, opowiedz mi jeszcze jedną historię. Tak jak dawniej."},{"type":"line","text":"Szeherezada spojrzała na króla."},{"type":"line","text":"— Panie, czy pozwolisz?"},{"type":"line","text":"Szahrijar wzruszył ramionami."},{"type":"line","text":"— Opowiadaj, jeśli chcesz."},{"type":"line","text":"Nie wiedział jeszcze, że właśnie otworzył drzwi, których nie da się zamknąć siłą."},{"type":"line","text":"Szeherezada zaczęła."},{"type":"line","text":"Jej głos był spokojny."},{"type":"line","text":"Nie za głośny."},{"type":"line","text":"Nie za cichy."},{"type":"line","text":"Taki, który sprawia, że człowiek odruchowo przestaje się spieszyć."},{"type":"line","text":"Opowiedziała historię kupca, który wyruszył przez pustynię i spotkał tajemniczego starca."},{"type":"line","text":"Potem historię rybaka, który wyłowił zapieczętowaną butlę."},{"type":"line","text":"Potem historię księcia, który szukał lekarstwa dla ojca, ale znalazł coś znacznie trudniejszego: prawdę o sobie."},{"type":"line","text":"Król słuchał."},{"type":"line","text":"Na początku obojętnie."},{"type":"line","text":"Potem uważniej."},{"type":"line","text":"Potem tak, jak słucha ktoś, kto nie chce przyznać, że zapomniał oddychać."},{"type":"line","text":"Szeherezada wiedziała, co robi."},{"type":"line","text":"Każda historia prowadziła do następnej."},{"type":"line","text":"Każda miała w sobie pytanie."},{"type":"line","text":"Każda kończyła się w takim miejscu, że serce samo prosiło o dalszy ciąg."},{"type":"line","text":"A kiedy za oknami pałacu niebo zaczęło jaśnieć, Szeherezada przerwała."},{"type":"line","text":"— Co było dalej? — zapytał król."},{"type":"line","text":"W jego głosie po raz pierwszy od dawna nie było rozkazu."},{"type":"line","text":"Była ciekawość."},{"type":"line","text":"— Dalej? — Szeherezada spuściła oczy. — Dalej opowiem, jeśli pan pozwoli mi mówić następnej nocy."},{"type":"line","text":"Król patrzył na nią długo."},{"type":"line","text":"Bardzo długo."},{"type":"line","text":"Potem skinął głową."},{"type":"line","text":"— Dobrze. Jutro dokończysz."},{"type":"line","text":"Tak minęła pierwsza noc."},{"type":"line","text":"Potem druga."},{"type":"line","text":"Trzecia."},{"type":"line","text":"Dziesiąta."},{"type":"line","text":"Setna."},{"type":"line","text":"Szeherezada opowiadała o ludziach mądrych i głupich, odważnych i tchórzliwych, dobrych i takich, którzy dopiero uczyli się dobra."},{"type":"line","text":"Opowiadała o potworach, które czasem miały ludzkie twarze."},{"type":"line","text":"O królach, którzy rozumieli za późno."},{"type":"line","text":"O biedakach bogatszych sercem niż całe pałace."},{"type":"line","text":"O dżinach, które trzeba było przechytrzyć."},{"type":"line","text":"O kobietach mądrzejszych niż wojownicy."},{"type":"line","text":"O dzieciach, które mówiły prawdę, gdy dorośli bali się ją wypowiedzieć."},{"type":"line","text":"Król słuchał."},{"type":"line","text":"Każdej nocy."},{"type":"line","text":"A coś w nim powoli się zmieniało."},{"type":"line","text":"Nie od razu."},{"type":"line","text":"Serce zranione i zamknięte nie otwiera się jak okno w ciepły dzień."},{"type":"line","text":"Najpierw tylko drgnęło."},{"type":"line","text":"Potem pękła w nim maleńka szczelina."},{"type":"line","text":"Potem przez tę szczelinę zaczęło wpadać światło."},{"type":"line","text":"Jednej nocy król zapytał:"},{"type":"line","text":"— Czy naprawdę wierzysz, że człowiek może się zmienić?"},{"type":"line","text":"Szeherezada nie odpowiedziała od razu."},{"type":"line","text":"Wiedziała, że to pytanie nie dotyczy tylko bohaterów jej opowieści."},{"type":"line","text":"— Wierzę — powiedziała w końcu. — Ale tylko wtedy, gdy człowiek przestanie udawać, że jego ból daje mu prawo krzywdzić innych."},{"type":"line","text":"Król odwrócił wzrok."},{"type":"line","text":"To zdanie zostało w sali długo po tym, jak przebrzmiało."},{"type":"line","text":"Innej nocy zapytał:"},{"type":"line","text":"— Czy opowieści są prawdziwe?"},{"type":"line","text":"Szeherezada uśmiechnęła się lekko."},{"type":"line","text":"— Nie wszystkie wydarzyły się tak, jak je opowiadam. Ale każda niesie prawdę. Czasem wymyślona historia mówi o człowieku więcej niż kronika."},{"type":"line","text":"Król milczał."},{"type":"line","text":"A potem, po raz pierwszy od bardzo dawna, poprosił:"},{"type":"line","text":"— Opowiedz jeszcze."},{"type":"line","text":"Mijały miesiące."},{"type":"line","text":"Pałac zaczął się zmieniać."},{"type":"line","text":"Najpierw wróciła muzyka."},{"type":"line","text":"Cicha, ostrożna, jak ptak, który nie wie, czy może usiąść na parapecie."},{"type":"line","text":"Potem w kuchniach znowu rozbrzmiał śmiech."},{"type":"line","text":"Potem strażnicy zaczęli rozmawiać półgłosem."},{"type":"line","text":"Potem ludzie na targu przestali patrzeć w stronę pałacu z takim lękiem."},{"type":"line","text":"Nie dlatego, że wszystko zostało zapomniane."},{"type":"line","text":"Nie."},{"type":"line","text":"Prawdziwe rany nie znikają dlatego, że ktoś opowie piękną historię."},{"type":"line","text":"Ale opowieść może sprawić, że człowiek spojrzy na ranę inaczej."},{"type":"line","text":"Może przestać rozdrapywać ją w ciemności."},{"type":"line","text":"Może pozwolić jej się goić."},{"type":"line","text":"Nadeszła tysiąc pierwsza noc."},{"type":"line","text":"W pałacu było cicho."},{"type":"line","text":"Nie była to jednak cisza strachu."},{"type":"line","text":"Była to cisza oczekiwania."},{"type":"line","text":"Szeherezada siedziała naprzeciwko króla, a jej siostra Dunjazada obok niej, tak jak pierwszej nocy."},{"type":"line","text":"Król Szahrijar wyglądał inaczej niż wtedy."},{"type":"line","text":"Nadal
