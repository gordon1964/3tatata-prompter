u, które świeci tylko dla ciebie. Prawdziwe światło pokazuje drogę także innym. Po trzecie: gdy perła zapyta, czego pragniesz, nie odpowiadaj od razu."},{"type":"line","text":"— Perła pyta?"},{"type":"line","text":"Kobieta nie odpowiedziała."},{"type":"line","text":"Zeszła ze skały ku wodzie."},{"type":"line","text":"Fala podniosła się delikatnie i zakryła jej stopy."},{"type":"line","text":"Przez chwilę wyglądało, jakby kobieta była częścią morza."},{"type":"line","text":"Potem zniknęła."},{"type":"line","text":"Tarik siedział długo, nie wiedząc, czy naprawdę ją spotkał."},{"type":"line","text":"Rano w osadzie zawrzało."},{"type":"line","text":"Trzech nurków Safwana wypłynęło przed świtem i wróciło bez perły."},{"type":"line","text":"Jeden miał krwawiące ucho."},{"type":"line","text":"Drugi drżał z zimna, choć dzień był gorący."},{"type":"line","text":"Trzeci nie chciał mówić, co zobaczył pod wodą."},{"type":"line","text":"— Tam na dole jest ciemność, która patrzy — powtarzał tylko."},{"type":"line","text":"Safwan nie rezygnował."},{"type":"line","text":"— Jutro spróbujemy dalej."},{"type":"line","text":"Tego samego dnia Samira zachorowała."},{"type":"line","text":"Najpierw próbowała to ukryć."},{"type":"line","text":"Jak każda matka, która nie chce martwić dziecka."},{"type":"line","text":"Ale wieczorem miała gorączkę, a ręce drżały jej tak mocno, że nie mogła utrzymać kubka."},{"type":"line","text":"Stara zielarka z Miny obejrzała ją i westchnęła."},{"type":"line","text":"— Potrzebne lekarstwo z miasta. Drogie."},{"type":"line","text":"— Jak drogie? — spytał Tarik."},{"type":"line","text":"Zielarka podała kwotę."},{"type":"line","text":"Dla bogatego kupca niewielką."},{"type":"line","text":"Dla nich prawie niemożliwą."},{"type":"line","text":"Tarik poczuł, jak świat zwęża się do jednego punktu."},{"type":"line","text":"Perła."},{"type":"line","text":"Nagroda."},{"type":"line","text":"Lekarstwo."},{"type":"line","text":"Tej nocy poszedł do Safwana."},{"type":"line","text":"— Popłynę z tobą — powiedział."},{"type":"line","text":"Kupiec spojrzał na niego uważnie."},{"type":"line","text":"— A matka?"},{"type":"line","text":"— Nie wie."},{"type":"line","text":"— To nie jest dobre."},{"type":"line","text":"— Ona umrze, jeśli nie zdobędę pieniędzy."},{"type":"line","text":"Safwan przez chwilę milczał."},{"type":"line","text":"Nie był człowiekiem całkiem złym."},{"type":"line","text":"Ale był kupcem, a wielka nagroda potrafi uciszyć wiele wątpliwości."},{"type":"line","text":"— Wypłyniemy przed świtem — powiedział. — Jeśli wrócisz z perłą, dostaniesz część złota od razu."},{"type":"line","text":"Tarik wrócił do domu."},{"type":"line","text":"Matka spała niespokojnie."},{"type":"line","text":"Chłopiec usiadł obok niej."},{"type":"line","text":"— Przepraszam — wyszeptał."},{"type":"line","text":"Przed świtem był już na łodzi Safwana."},{"type":"line","text":"Morze było gładkie, ale nienaturalnie ciemne."},{"type":"line","text":"Jakby pod powierzchnią ktoś rozlał atrament."},{"type":"line","text":"Płynęli długo."},{"type":"line","text":"Minęli znane łowiska."},{"type":"line","text":"Minęli skały, na których zwykle siadały ptaki."},{"type":"line","text":"Minęli miejsce, gdzie woda zmieniała kolor z błękitnego na granatowy."},{"type":"line","text":"Wreszcie dotarli tam, gdzie zaczynało się Morze Ciemności."},{"type":"line","text":"Nie było granicy z piany ani ściany mgły."},{"type":"line","text":"Po prostu w pewnym momencie woda stała się czarna."},{"type":"line","text":"Nie odbijała nieba."},{"type":"line","text":"Nie odbijała twarzy."},{"type":"line","text":"Wyglądała, jakby nie miała dna."},{"type":"line","text":"Jeden z rybaków przeżegnał się po swojemu."},{"type":"line","text":"Safwan podał Tarikowi linę."},{"type":"line","text":"— Przywiążemy cię. Zanurkujesz, ile zdołasz. Jeśli szarpniesz trzy razy, wyciągniemy cię."},{"type":"line","text":"Tarik skinął głową."},{"type":"line","text":"Włożył do ust mały kawałek drewna, żeby łatwiej utrzymać oddech przed zanurzeniem."},{"type":"line","text":"Serce waliło mu mocno."},{"type":"line","text":"Przypomniał sobie słowa kobiety ze skały."},{"type":"line","text":"Nie schodź w głębinę z gniewem."},{"type":"line","text":"Tarik zamknął oczy."},{"type":"line","text":"Próbował odsunąć złość."},{"type":"line","text":"Na biedę."},{"type":"line","text":"Na chorobę."},{"type":"line","text":"Na morze, które zabrało ojca."},{"type":"line","text":"Nie zniknęła całkiem."},{"type":"line","text":"Ale pod nią znalazł coś głębszego."},{"type":"line","text":"Miłość do matki."},{"type":"line","text":"I właśnie z tym zanurzył się w wodę."},{"type":"line","text":"Pierwsze uderzenie zimna było tak silne, że omal nie wypuścił powietrza."},{"type":"line","text":"Woda Morza Ciemności była lodowata."},{"type":"line","text":"Nie jak zwykłe morze."},{"type":"line","text":"Jak cień."},{"type":"line","text":"Tarik płynął w dół."},{"type":"line","text":"Światło nad nim malało."},{"type":"line","text":"Łódź stała się rozmazaną plamą."},{"type":"line","text":"Potem zniknęła."},{"type":"line","text":"Ciemność otoczyła go ze wszystkich stron."},{"type":"line","text":"Nie widział własnych dłoni."},{"type":"line","text":"Ale czuł prąd."},{"type":"line","text":"Delikatny."},{"type":"line","text":"Prowadzący w dół i lekko na wschód."},{"type":"line","text":"Płynął za nim."},{"type":"line","text":"W uszach dudniło mu serce."},{"type":"line","text":"Płuca zaczynały prosić o powietrze."},{"type":"line","text":"Nagle w ciemności pojawiło się światło."},{"type":"line","text":"Małe."},{"type":"line","text":"Zielonkawe."},{"type":"line","text":"Tarik pomyślał, że to perła."},{"type":"line","text":"Popłynął ku niemu."},{"type":"line","text":"Światło oddalało się powoli, jakby chciało, żeby za nim podążał."},{"type":"line","text":"Wtedy przypomniał sobie drugą radę:"},{"type":"line","text":"Nie ufaj światłu, które świeci tylko dla ciebie."},{"type":"line","text":"Tarik zatrzymał się."},{"type":"line","text":"Rozejrzał się, choć nic nie widział."},{"type":"line","text":"Światło wciąż migało."},{"type":"line","text":"Piękne."},{"type":"line","text":"Kuszące."},{"type":"line","text":"Tylko dla niego."},{"type":"line","text":"Chłopiec odwrócił się od niego z ogromnym wysiłkiem."},{"type":"line","text":"W tej samej chwili zielony blask zgasł, a obok jego twarzy przemknęło coś długiego i bladego, z zębami cienkimi jak igły."},{"type":"line","text":"Tarik zadrżał."},{"type":"line","text":"Gdyby popłynął dalej, nie wróciłby."},{"type":"line","text":"Lina przy pasie napięła się lekko."},{"type":"line","text":"Ludzie na górze pewnie bali się, że zszedł za głęboko."},{"type":"line","text":"Tarik miał mało czasu."},{"type":"line","text":"Wtedy poczuł pod palcami skałę."},{"type":"line","text":"Dno."},{"type":"line","text":"A właściwie zbocze podwodnej szczeliny."},{"type":"line","text":"Przesuwał dłonią po kamieniu."},{"type":"line","text":"Nagle zobaczył drugi blask."},{"type":"line","text":"Inny."},{"type":"line","text":"Nie świecił przed nim."},{"type":"line","text":"Świecił wokół."},{"type":"line","text":"Słabo, ale równomiernie, rozjaśniając kawałek dna, kamienie, wodorosty i małe ryby chowające się w szczelinach."},{"type":"line","text":"Prawdziwe światło pokazuje drogę także innym."},{"type":"line","text":"Tarik popłynął ku niemu."},{"type":"line","text":"W głębokiej rozpadlinie leżała muszla."},{"type":"line","text":"Była ogromna, większa niż skrzynia na ryby."},{"type":"line","text":"Jej brzegi porastały ciemne korale."},{"type":"line","text":"Muszla była uchylona."},{"type":"line","text":"W środku spoczywała perła."},{"type":"line","text":"Czarna."},{"type":"line","text":"Gładka."},{"type":"line","text":"Lśniąca od środka, jak noc, która ukryła w sobie gwiazdę."},{"type":"line","text":"Tarik wyciągnął rękę."},{"type":"line","text":"Gdy dotknął perły, ciemność zniknęła."},{"type":"line","text":"Nie naprawdę."},{"type":"line","text":"Nadal był pod wodą."},{"type":"line","text":"Nadal brakowało mu powietrza."},{"type":"line","text":"Ale w jego głowie rozległ się głos."},{"type":"line","text":"Nie kobiecy."},{"type":"line","text":"Nie męski."},{"type":"line","text":"Stary jak odpływ i przypływ."},{"type":"line","text":"Czego pragniesz?"},{"type":"line","text":"Tarik prawie odpowiedział od razu."},{"type":"line","text":"Złota."},{"type":"line","text":"Lekarstwa."},{"type":"line","text":"Życia dla matki."},{"type":"line","text":"Ale przypomniał sobie trzecią radę."},{"type":"line","text":"Gdy perła zapyta, czego pragniesz, nie odpowiadaj od razu."},{"type":"line","text":"Więc milczał."},{"type":"line","text":"Choć płuca paliły."},{"type":"line","text":"Choć serce krzyczało."},{"type":"line","text":"Milczał."},{"type":"line","text":"I wtedy zobaczył obrazy."},{"type":"line","text":"Zobaczył siebie wracającego z perłą."},{"type":"line","text":"Safwan odbierający mu ją i płynący do sułtana."},{"type":"line","text":"Matkę otrzymującą lekarstwo."},{"type":"line","text":"Ich dom pełen złota."},{"type":"line","text":"A potem ludzi przybywających po kolejne perły."},{"type":"line","text":"Łodzie na Morzu Ciemności."},{"type":"line","text":"Nurkowie schodzący w głębinę."},{"type":"line","text":"Niektórzy wracający."},{"type":"line","text":"Inni nie."},{"type":"line","text":"Muszle rozbijane dla skarbów."},{"type":"line","text":"Ciemna woda mętniejąca."},{"type":"line","text":"Stare prądy budzące się z gniewem."},{"type":"line","text":"Morze, które zabiera nie jednego ojca, ale całe osady."},{"type":"line","text":"Tarik zrozumiał."},{"type":"line","text":"Perła mogła spełnić życzenie."},{"type":"line","text":"Ale jeśli wyniesie ją na powierzchnię, ludzie nigdy nie przestaną jej szukać."},{"type":"line","text":"Chciwość jest głębiną bez dna."},{"type":"line","text":"Głos zapytał ponownie:"},{"type":"line","text":"Czego pragniesz?"},{"type":"line","text":"Tarik odpowiedział w myślach:"},{"type":"line","text":"Chcę, żeby moja matka żyła. Ale nie chcę, żeby przez moje pragnienie morze musiało pożreć innych."},{"type":"line","text":"Perła rozbłysła."},{"type":"line","text":"Ciepło przeszło przez jego dłoń."},{"type":"line","text":"Potem muszla zamknęła się powoli."},{"type":"line","text":"Nie przytrzasnęła mu palców."},{"type":"line","text":"Po prostu zabrała perłę z powrotem."},{"type":"line","text":"Tarik poczuł w dłoni coś małego."},{"type":"line","text":"Nie perłę."},{"type":"line","text":"Odłamek muszli, czarny i gładki, z cienką linią światła pośrodku."},{"type":"line","text":"Głos powiedział:"},{"type":"line","text":"Nie wyniosłeś skarbu. Wyniosłeś odpowiedź."},{"type":"line","text":"Wtedy lina szarpnęła mocno."},{"type":"line","text":"Raz."},{"type":"line","text":"Drugi."},{"type":"line","text":"Trzeci."},{"type":"line","text":"Ludzie na łodzi zaczęli go wyciągać."},{"type":"line","text":"Tarik tracił oddech."},{"type":"line","text":"Ciemność gęstniała."},{"type":"line","text":"Przez chwilę zobaczył twarz ojca."},{"type":"line","text":"Nie wiedział, czy to wspomnienie, czy sen głębiny."},{"type":"line","text":"Ojciec uśmiechał się spokojnie."},{"type":"line","text":"Potem chłopiec wynurzył się gwałtownie."},{"type":"line","text":"Zaczerpnął powietrza tak łapczywie, jakby pił życie."},{"type":"line","text":"Wciągnięto go na pokład."},{"type":"line","text":"Kasłał, drżał, nie mógł mówić."},{"type":"line","text":"Safwan uklęknął przy nim."},{"type":"line","text":"— Masz ją? Masz perłę?"},{"type":"line","text":"Tarik otworzył dłoń."},{"type":"line","text":"Leżał na niej tylko czarny odłamek muszli."},{"type":"line","text":"Kupiec zbladł ze złości."},{"type":"line","text":"— To wszystko?"},{"type":"line","text":"Chłopiec skinął głową."},{"type":"line","text":"— Perła zostaje na dnie."},{"type":"line","text":"— Głupi chłopcze! Wiesz, co straciłeś?"},{"type":"line","text":"Tarik spojrzał na niego zmęczonymi oczami."},{"type":"line","text":"— Wiem, co ocaliłem."},{"type":"line","text":"Safwan chciał krzyczeć, ale morze wokół łodzi nagle poruszyło się dziwnie."},{"type":"line","text":"Nie falą."},{"type":"line","text":"Oddechem."},{"type":"line","text":"Cała czarna powierzchnia uniosła się powoli, jakby coś ogromnego pod spodem przesunęło się w śnie."},{"type":"line","text":"Kupiec zamilkł."},{"type":"line","text":"— Wracamy — powiedział jeden z rybaków. — Natychmiast."},{"type":"line","text":"Nikt nie zaprotestował."},{"type":"line","text":"Droga powrotna była długa."},{"type":"line","text":"Tarik siedział owinięty kocem i ściskał odłamek muszli."},{"type":"line","text":"Bał się wrócić do matki bez złota."},{"type":"line","text":"Bez lekarstwa."},{"type":"line","text":"Bez niczego."},{"type":"line","text":"Kiedy dotarli do Miny, pobiegł do domu."},{"type":"line","text":"Samira leżała na posłaniu."},{"type":"line","text":"Oddychała płytko."},{"type":"line","text":"Zielarka siedziała obok niej i przecierała jej czoło wilgotną chustą."},{"type":"line","text":"Tarik uklęknął."},{"type":"line","text":"— Nie przyniosłem perły — wyszeptał. — Przepraszam."},{"type":"line","text":"Matka otworzyła oczy z trudem."},{"type":"line","text":"— Wróciłeś?"},{"type":"line","text":"— Tak."},{"type":"line","text":"— Więc przyniosłeś więcej, niż prosiłam."},{"type":"line","text":"Chłopiec rozpłakał się."},{"type":"line","text":"Wtedy czarny odłamek muszli w jego dłoni rozgrzał się delikatnie."},{"type":"line","text":"Nie jasno."},{"type":"line","text":"Nie gwałtownie."},{"type":"line","text":"Jak kamień ogrzany słońcem."},{"type":"line","text":"Zielarka pochyliła się."},{"type":"line","text":"— Co to?"},{"type":"line","text":"— Odpowiedź — powiedział Tarik, nie wiedząc, skąd zna to słowo."},{"type":"line","text":"Staruszka wzięła odłamek, zanurzyła go w misce z wodą i zamieszała."},{"type":"line","text":"Woda nabrała lekkiego, srebrnego połysku."},{"type":"line","text":"— Daj jej pić — powiedziała cicho."},{"type":"line","text":"Samira wypiła kilka łyków."},{"type":"line","text":"Potem zasnęła."},{"type":"line","text":"Nie od razu cudownie ozdrowiała."},{"type":"line","text":"To nie była taka magia."},{"type":"line","text":"Ale gorączka zaczęła spadać."},{"type":"line","text":"Następnego dnia mogła usiąść."},{"type":"line","text":"Trzeciego zjadła trochę zupy."},{"type":"line","text":"Po tygodniu wyszła przed dom i usiadła w słońcu."},{"type":"line","text":"Tarik zrozumiał, że Morze Ciemności nie odmówiło mu pomocy."},{"type":"line","text":"Odmówiło mu tylko skarbu, który mógł zniszczyć innych."},{"type":"line","text":"Safwan opuścił Minę w złym humorze."},{"type":"line","text":"Nie dostał perły."},{"type":"line","text":"Nie dostał nagrody."},{"type":"line","text":"Ale zanim odpłynął, spojrzał jeszcze raz na czarną wodę daleko za zatoką i nie powiedział już ani słowa o kolejnej wyprawie."},{"type":"line","text":"Wieść o Tariku rozeszła się po osadzie."},{"type":"line","text":"Niektórzy wierzyli mu od razu."},{"type":"line","text":"Inni mówili, że chłopiec przestraszył się głębiny i wymyślił opowieść."},{"type":"line","text":"Tarik nie kłócił się."},{"type":"line","text":"Nie musiał."},{"type":"line","text":"Czasem prawda nie potrzebuje, by wszyscy w nią wierzyli."},{"type":"line","text":"Wystarczy, że zmienia tego, kto ją przeżył."},{"type":"line","text":"Odłamek muszli został w domu Samiry."},{"type":"line","text":"Zielarka używała go bardzo rzadko."},{"type":"line","text":"Nie leczył wszystkiego."},{"type":"line","text":"Nie spełniał zachcianek."},{"type":"line","text":"Pomagał tylko wtedy, gdy prośba była czysta, a człowiek gotów był oddać coś z siebie: czas, troskę, odwagę albo przebaczenie."},{"type":"line","text":"Po latach Tarik został nurkiem."},{"type":"line","text":"Nie takim, który szuka skarbów dla bogaczy."},{"type":"line","text":"Zanurzał się, by naprawiać sieci, wydobywać zgubione kotwice, ratować ludzi i uczyć młodszych, że morze nie jest skrzynią z klejnotami."},{"type":"line","text":"Jest światem."},{"type":"line","text":"A do świata nie schodzi się jak złodziej."},{"type":"line","text":"Schodzi się jak gość."},{"type":"line","text":"Czasem wieczorami siadał na tej samej skale, na której spotkał tajemniczą kobietę."},{"type":"line","text":"Nigdy więcej jej nie zobaczył."},{"type":"line","text":"Ale kiedy morze było spokojne, słyszał czasem śpiew."},{"type":"line","text":"Daleki."},{"type":"line","text":"Cichy."},{"type":"line","text":"Jakby głębina pamiętała, że pewien chłopiec dotknął największej perły świata i jej nie zabrał."},{"type":"line","text":"A gdy dzieci z Miny pytały:"},{"type":"line","text":"— Czy perła naprawdę spełnia życzenia?"},{"type":"line","text":"Tarik odpowiadał:"},{"type":"line","text":"— Tak. Ale najpierw sprawdza, czy twoje życzenie nie skrzywdzi kogoś, kogo nie widzisz."},{"type":"line","text":"— A co jest na dnie Morza Ciemności? — pytały dalej."},{"type":"line","text":"Tarik patrzył wtedy na horyzont."},{"type":"line","text":"— Cisza. Stare prądy. I skarby, które powinny zostać tam, gdzie są."},{"type":"line","text":"Dzieci nie zawsze były zadowolone z takiej odpowiedzi."},{"type":"line","text":"Wolałyby smoki, pałace z koralu i skrzynie pełne złota."},{"type":"line","text":"Ale kiedy dorastały, zaczynały rozumieć."},{"type":"line","text":"Nie każdy skarb jest po to, żeby go zabrać."},{"type":"line","text":"Nie każda głębia jest po to, żeby ją pokonać."},{"type":"line","text":"I nie każde życzenie jest dobre tylko dlatego, że pochodzi z serca."},{"type":"line","text":"Czasem serce musi nauczyć się widzieć dalej niż własny ból."},{"type":"line","text":"Dopiero wtedy może naprawdę prosić."},{"type":"section","text":"— ZAKOŃCZENIE PODCASTOWE —"},{"type":"line","text":"I tak kończy się dzisiejsza opowieść: „Perła z dna Morza Ciemności”."},{"type":"line","text":"To historia o chłopcu, który zszedł głębiej, niż powinien, ale wrócił mądrzejszy, niż był."},{"type":"line","text":"O perle, która mogła spełnić życzenie."},{"type":"line","text":"O morzu, które nie było wrogiem."},{"type":"line","text":"I o tym, że czasem największą odwagą nie jest zdobyć skarb."},{"type":"line","text":"Czasem największą odwagą jest zostawić go tam, gdzie nikogo nie skrzywdzi."},{"type":"line","text":"Jeśli ta historia została z tobą choć na chwilę, zabierz jej mały kawałek do snu."},{"type":"line","text":"Może będzie to czarna perła lśniąca w głębinie."},{"type":"line","text":"Może chłopiec wynurzający się z ciemnej wody."},{"type":"line","text":"A może jedno zdanie:"},{"type":"line","text":"nie wszystko, co można zdobyć, trzeba zabrać."},{"type":"line","text":"Więcej bajek, legend i tajemniczych opowieści znajdziesz na stronie 3tatata.pl."},{"type":"line","text":"Możesz nas także słuchać na Spotify i oglądać na YouTube."},{"type":"line","text":"Zostaw follow albo subskrypcję, żeby nie przegapić kolejnych historii."},{"type":"line","text":"Dobranoc — i do usłyszenia w następnej bajce."}]},{"id":15,"title":"KARAWANA BEZ ŚLADÓW","tag":"Opowieść","sections":[{"type":"title","text":"KARAWANA BEZ ŚLADÓW"},{"type":"meta","text":"3TaTaTa — Opowieści z dalekich krain"},{"type":"section","text":"— WSTĘP DO ODCINKA —"},{"type":"line","text":"Na pustyni wszystko zostawia ślad."},{"type":"line","text":"Stopa człowieka."},{"type":"line","text":"Kopyto wielbłąda."},{"type":"line","text":"Koło wozu."},{"type":"line","text":"Nawet mała jaszczurka, która przebiegnie o świcie po chłodnym piasku, zapisuje za sobą cienką linię."},{"type":"line","text":"Ale dawno temu wśród wędrowców krążyła opowieść o karawanie, która nie zostawiała śladów."},{"type":"line","text":"Pojawiała się tylko nocą."},{"type":"line","text":"Szła powoli między wydmami."},{"type":"line","text":"Jej wielbłądy miały srebrne dzwoneczki, ale nie poruszały piasku."},{"type":"line","text":"Jej przewodnik nigdy nie pokazywał twarzy."},{"type":"line","text":"A kto poszedł za nią, nie trafiał tam, dokąd chciał."},{"type":"line","text":"Trafiał tam, dokąd najbardziej bał się dotrzeć."},{"type":"line","text":"Dzisiaj opowiem ci historię chłopca, który spotkał karawanę bez śladów."},{"type":"line","text":"I zrozumiał, że czasem najtrudniejsza droga prowadzi nie przez pustynię, ale przez własne serce."},{"type":"section","text":"— KARAWANA BEZ ŚLADÓW —"},{"type":"line","text":"Dawno temu, w małym mieście na granicy pustyni, mieszkał chłopiec imieniem Nabil."},{"type":"line","text":"Miasto nazywało się Darun."},{"type":"line","text":"Leżało tam, gdzie kończyły się ogrody daktylowe, a zaczynał bezkres piasku."},{"type":"line","text":"Rano było pełne kurzu, nawoływań kupców i zapachu gorącego chleba."},{"type":"line","text":"Wieczorem cichło powoli, jakby cały dzień składał swoje hałasy do skrzyni i zamykał ją na noc."},{"type":"line","text":"Nabil miał trzynaście lat."},{"type":"line","text":"Był szybki, sprytny i lubił udawać, że niczego się nie boi."},{"type":"line","text":"Wspinał się na mury, zeskakiwał z dachów, drażnił wielbłądy, ścigał się z innymi chłopcami i pierwszy zgłaszał się do każdej zabawy, jeśli tylko mogła skończyć się siniakiem albo pochwałą."},{"type":"line","text":"Ludzie mówili:"},{"type":"line","text":"— Ten Nabil ma odwagę."},{"type":"line","text":"Nabil lubił to słyszeć."},{"type":"line","text":"Nosił te słowa w sobie jak błyszczący nóż za pasem."},{"type":"line","text":"Ale była jedna rzecz, której bał się naprawdę."},{"type":"line","text":"Nie skorpionów."},{"type":"line","text":"Nie ciemności."},{"type":"line","text":"Nie burz piaskowych."},{"type":"line","text":"Bał się przeprosić."},{"type":"line","text":"Rok wcześniej wydarzyło się coś, o czym prawie nikt już nie mówił głośno."},{"type":"line","text":"Nabil miał przyjaciela imieniem Idris."},{"type":"line","text":"Byli nierozłączni."},{"type":"line","text":"Razem łowili jaszczurki w suchych korytach rzek, razem uciekali przed nauczycielem rachunków, razem marzyli, że kiedy dorosną, poprowadzą największą karawanę świata."},{"type":"line","text":"Pewnego dnia pokłócili się przy starej studni."},{"type":"line","text":"O co?"},{"type":"line","text":"O drobiazg."},{"type":"line","text":"O drewniany kompas zrobiony przez ojca Idrisa."},{"type":"line","text":"Nabil chciał go pożyczyć."},{"type":"line","text":"Idris nie chciał dać."},{"type":"line","text":"Słowo pociągnęło za sobą następne słowo."},{"type":"line","text":"Gniew za gniew."},{"type":"line","text":"W końcu Nabil powiedział coś okrutnego."},{"type":"line","text":"— Twój ojciec i tak robi same bezużyteczne rzeczy."},{"type":"line","text":"Idris zbladł."},{"type":"line","text":"Ojciec Idrisa był stolarzem, człowiekiem cichym i dobrym, który od miesięcy chorował. Drewniany kompas był jednym z ostatnich przedmiotów, jakie wykonał własnymi rękami."},{"type":"line","text":"Idris nic nie odpowiedział."},{"type":"line","text":"Po prostu odszedł."},{"type":"line","text":"Tydzień później jego ojciec zmarł."},{"type":"line","text":"Nabil chciał pójść do Idrisa."},{"type":"line","text":"Chciał powiedzieć, że żałuje."},{"type":"line","text":"Że nie myślał."},{"type":"line","text":"Że słowa wyskoczyły z niego jak kamienie spod kopyt."},{"type":"line","text":"Ale każdy dzień odkładał na następny."},{"type":"line","text":"A im dłużej czekał, tym trudniej było podejść do drzwi przyjaciela."},{"type":"line","text":"W końcu Idris przestał z nim rozmawiać."},{"type":"line","text":"Nabil udawał, że mu nie zależy."},{"type":"line","text":"Śmiał się głośniej."},{"type":"line","text":"Biegał szybciej."},{"type":"line","text":"Robił rzeczy coraz odważniejsze."},{"type":"line","text":"Ale w środku nosił mały, twardy kamień wstydu."},{"type":"line","text":"Nie pokazywał go nikomu."},{"type":"line","text":"Nawet sobie."},{"type":"line","text":"Pewnego wieczoru do Darun przybył stary wędrowiec."},{"type":"line","text":"Nie miał towarów."},{"type":"line","text":"Nie miał wielbłądów."},{"type":"line","text":"Niósł tylko kij, mały bukłak i płaszcz tak wypłowiały od słońca, że trudno było powiedzieć, jaki miał kiedyś kolor."},{"type":"line","text":"Usiadł przy fontannie na głównym placu."},{"type":"line","text":"Dzieci od razu go otoczyły, bo wędrowcy często mieli dobre historie."},{"type":"line","text":"— Opowiedz coś — poprosił jeden z chłopców."},{"type":"line","text":"Stary człowiek spojrzał na nich spod gęstych brwi."},{"type":"line","text":"— O czym?"},{"type":"line","text":"— O dżinach!"},{"type":"line","text":"— O smokach!"},{"type":"line","text":"— O ukrytym skarbie!"},{"type":"line","text":"Wędrowiec uśmiechnął się krzywo."},{"type":"line","text":"— Skarbów najbardziej boją się ci, którzy nie wiedzą, co już zgubili."},{"type":"line","text":"Dzieci nie zrozumiały, ale zabrzmiało to tajemniczo, więc przysunęły się bliżej."},{"type":"line","text":"— Słyszeliście o karawanie bez śladów? — zapytał starzec."},{"type":"line","text":"Kilka dzieci pokręciło głowami."},{"type":"line","text":"Nabil prychnął."},{"type":"line","text":"— Każda karawana zostawia ślady."},{"type":"line","text":"— Każda zwykła — odparł wędrowiec."},{"type":"line","text":"— A ta niby nie?"},{"type":"line","text":"— Nie. Jej wielbłądy idą po piasku jak po wodzie. Dzwonki przy siodłach dźwięczą, ale wydmy pozostają gładkie. Pojawia się tym, którzy bardzo czegoś unikają."},{"type":"line","text":"Nabil skrzyżował ramiona."},{"type":"line","text":"— I co robi?"},{"type":"line","text":"— Prowadzi ich."},{"type":"line","text":"— Dokąd?"},{"type":"line","text":"Stary wędrowiec spojrzał prosto na niego."},{"type":"line","text":"— Tam, gdzie najtrudniej im pójść samemu."},{"type":"line","text":"Przez chwilę Nabil poczuł, jak kamień wstydu w jego piersi porusza się nieprzyjemnie."},{"type":"line","text":"Odwrócił wzrok."},{"type":"line","text":"— Bajanie — powiedział."},{"type":"line","text":"Wędrowiec nie obraził się."},{"type":"line","text":"— Możliwe. Pustynia lubi bajania. Czasem używa ich, żeby powiedzieć prawdę ludziom, którzy nie chcą słuchać prostych słów."},{"type":"line","text":"Tej nocy Nabil nie mógł zasnąć."},{"type":"line","text":"W domu było gorąco."},{"type":"line","text":"Matka oddychała spokojnie w sąsiednim pomieszczeniu."},{"type":"line","text":"Ojciec, który pracował jako garbarz, wrócił zmęczony i spał tak głęboko, że nie obudziłby go nawet osioł śpiewający pod oknem."},{"type":"line","text":"Nabil przewracał się z boku na bok."},{"type":"line","text":"W końcu wstał i wyszedł na dach."},{"type":"line","text":"Nad miastem świeciły gwiazdy."},{"type":"line","text":"Za murami leżała pustynia."},{"type":"line","text":"Cicha."},{"type":"line","text":"Srebrna."},{"type":"line","text":"Daleka."},{"type":"line","text":"Wtedy usłyszał dzwoneczki."},{"type":"line","text":"Ciche."},{"type":"line","text":"Równe."},{"type":"line","text":"Nie z miasta."},{"type":"line","text":"Z pustyni."},{"type":"line","text":"Nabil podszedł do krawędzi dachu."},{"type":"line","text":"Za bramą, między wydmami, szła karawana."},{"type":"line","text":"Kilka wielbłądów poruszało się powoli w świetle księżyca. Na ich grzbietach leżały ciemne juki, a przy uprzężach wisiały małe srebrne dzwonki."},{"type":"line","text":"Na czele szedł przewodnik w długim płaszczu."},{"type":"line","text":"Twarz miał zakrytą."},{"type":"line","text":"Karawana była wyraźna."},{"type":"line","text":"A jednak gdy Nabil spojrzał na piasek pod jej stopami, zobaczył, że wydmy pozostają gładkie."},{"type":"line","text":"Żadnych śladów."},{"type":"line","text":"Chłopiec poczuł, jak serce zaczyna bić szybciej."},{"type":"line","text":"Mógł wrócić do łóżka."},{"type":"line","text":"Mógł powiedzieć sobie, że to sen."},{"type":"line","text":"Mógł zamknąć oczy."},{"type":"line","text":"Ale Nabil robił odważne rzeczy."},{"type":"line","text":"A przynajmniej bardzo chciał tak o sobie myśleć."},{"type":"line","text":"Zbiegł po schodach, wymknął się z domu, przeszedł przez małą furtkę w murze i ruszył za karawaną."},{"type":"line","text":"Noc była chłodna."},{"type":"line","text":"Piasek pod stopami miał temperaturę kamienia trzymanego długo w cieniu."},{"type":"line","text":"Karawana szła powoli, ale Nabil, choć biegł, nie mógł jej dogonić."},{"type":"line","text":"Była zawsze trochę przed nim."},{"type":"line","text":"Na tyle blisko, by ją widzieć."},{"type":"line","text":"Na tyle daleko, by musiał iść dalej."},{"type":"line","text":"— Hej! — zawołał. — Zaczekajcie!"},{"type":"line","text":"Dzwonki odpowiedziały cichym brzękiem."},{"type":"line","text":"Przewodnik nie odwrócił głowy."},{"type":"line","text":"Nabil szedł coraz głębiej w pustynię."},{"type":"line","text":"Po pewnym czasie miasto zniknęło za wydmami."},{"type":"line","text":"Chłopiec zatrzymał się i obejrzał."},{"type":"line","text":"Nie widział murów."},{"type":"line","text":"Nie widział świateł."},{"type":"line","text":"Nie widział drogi powrotnej."},{"type":"line","text":"Wtedy poczuł pierwszy prawdziwy strach."},{"type":"line","text":"Nie taki przyjemny, który pojawia się, gdy zeskakuje się z dachu na kupę siana."},{"type":"line","text":"Tylko ten chłodny."},{"type":"line","text":"Ten, który mówi: poszedłeś za daleko."},{"type":"line","text":"Karawana zatrzymała się."},{"type":"line","text":"Przewodnik odwrócił się powoli."},{"type":"line","text":"Nie odsłonił twarzy."},{"type":"line","text":"— Dlaczego idziesz za nami? — zapytał."},{"type":"line","text":"Jego głos był cichy, ale Nabil usłyszał go wyraźnie, jakby ktoś powiedział słowa tuż obok jego ucha."},{"type":"line","text":"— Bo... bo chciałem zobaczyć, czy jesteście prawdziwi."},{"type":"line","text":"— I co zobaczyłeś?"},{"type":"line","text":"Nabil przełknął ślinę."},{"type":"line","text":"— Nie wiem."},{"type":"line","text":"— Dobra odpowiedź."},{"type":"line","text":"— Dokąd idziecie?"},{"type":"line","text":"— Tam, dokąd ty nie chcesz iść."},{"type":"line","text":"Chłopiec zmarszczył brwi."},{"type":"line","text":"— Ja? Ja nie chcę nigdzie iść. Wracam do domu."},{"type":"line","text":"Przewodnik wskazał dłonią za siebie."},{"type":"line","text":"Nabil odwrócił się."},{"type":"line","text":"Tam, gdzie przed chwilą była tylko pustynia, zobaczył ulicę."},{"type":"line","text":"Nie wydmę."},{"type":"line","text":"Nie drogę z piasku."},{"type":"line","text":"Ulicę z Darun."},{"type":"line","text":"Tę, która prowadziła do domu Idrisa."},{"type":"line","text":"Nabil cofnął się gwałtownie."},{"type":"line","text":"— Nie."},{"type":"line","text":"Przewodnik milczał."},{"type":"line","text":"Ulica leżała przed nim niemożliwa i prawdziwa."},{"type":"line","text":"Były tam znane mury, krzywe drzwi, stara donica z suchą miętą i okno, w którym kiedyś Idris stawiał drewniane zabawki wykonane przez ojca."},{"type":"line","text":"— Nie pójdę tam — powiedział Nabil."},{"type":"line","text":"— Wiem — odparł przewodnik. — Dlatego przyszliśmy."},{"type":"line","text":"Nabil poczuł złość."},{"type":"line","text":"Łatwiejszą niż strach."},{"type":"line","text":"— Nie macie prawa!"},{"type":"line","text":"— My nie mamy praw ani rozkazów. Jesteśmy drogą dla tych, którzy zgubili własną."},{"type":"line","text":"— Ja niczego nie zgubiłem."},{"type":"line","text":"Przewodnik przechylił głowę."},{"type":"line","text":"— Czyżby?"},{"type":"line","text":"Z piasku pod stopami Nabila uniosły się obrazy."},{"type":"line","text":"Nie jak dym."},{"type":"line","text":"Bardziej jak wspomnienia, które ktoś wyjął z jego środka i powiesił w powietrzu."},{"type":"line","text":"Zobaczył siebie i Idrisa przy studni."},{"type":"line","text":"Zobaczył drewniany kompas."},{"type":"line","text":"Usłyszał własny głos:"},{"type":"line","text":"„Twój ojciec i tak robi same bezużyteczne rzeczy”."},{"type":"line","text":"Słowa zabrzmiały gorzej niż wtedy."},{"type":"line","text":"Bo teraz nie były osłonięte gniewem."},{"type":"line","text":"Były nagie."},{"type":"line","text":"Brzydkie."},{"type":"line","text":"Małe."},{"type":"line","text":"Nabil zakrył uszy, ale to nic nie dało."},{"type":"line","text":"— Przestańcie!"},{"type":"line","text":"Obraz zniknął."},{"type":"line","text":"Przewodnik powiedział:"},{"type":"line","text":"— Odwaga nie polega na tym, że niczego się nie boisz. To byłaby głupota albo brak wyobraźni. Odwaga zaczyna się wtedy, gdy boisz się bardzo, ale idziesz tam, gdzie powinieneś."},{"type":"line","text":"— Nie umiem — wyszeptał Nabil."},{"type":"line","text":"To były najprawdziwsze słowa, jakie wypowiedział od dawna."},{"type":"line","text":"Przewodnik wskazał na jednego z wielbłądów."},{"type":"line","text":"— Wsiądź."},{"type":"line","text":"— Dokąd mnie zabierzecie?"},{"type":"line","text":"— Najpierw do miejsc, w których próbowałeś schować prawdę."},{"type":"line","text":"Nabil nie chciał."},{"type":"line","text":"Ale jeszcze bardziej nie chciał zostać sam pośrodku niemożliwej pustyni."},{"type":"line","text":"Wsiadł na wielbłąda."},{"type":"line","text":"Zwierzę ruszyło bezszelestnie."},{"type":"line","text":"Karawana poszła dalej."},{"type":"line","text":"Świat wokół nich zaczął się zmieniać."},{"type":"line","text":"Pustynia raz była pustynią, a raz wspomnieniem."},{"type":"line","text":"Najpierw dotarli do miejsca, gdzie Nabil po raz pierwszy zobaczył Idrisa po pogrzebie jego ojca."},{"type":"line","text":"Idris siedział wtedy pod ścianą warsztatu, trzymając drewniany kompas w dłoniach."},{"type":"line","text":"Nabil przeszedł drugą stroną ulicy."},{"type":"line","text":"Udawał, że go nie widzi."},{"type":"line","text":"Wspomnienie powtórzyło się przed nim."},{"type":"line","text":"Nabil zobaczył własne kroki."},{"type":"line","text":"Szybkie."},{"type":"line","text":"Tchórzliwe."},{"type":"line","text":"— Nie chciałem mu przeszkadzać — powiedział cicho."},{"type":"line","text":"Przewodnik nie odpowiedział."},{"type":"line","text":"Obraz zatrzymał się na twarzy Idrisa, który podniósł wzrok akurat wtedy, gdy Nabil odchodził."},{"type":"line","text":"Nie było w niej gniewu."},{"type":"line","text":"Była samotność."},{"type":"line","text":"Nabil spuścił głowę."},{"type":"line","text":"Karawana ruszyła dalej."},{"type":"line","text":"Potem zobaczył dzień, w którym Idris przyszedł na plac, a inni chłopcy zaprosili Nabila do gry."},{"type":"line","text":"Nabil zauważył przyjaciela, ale powiedział głośno:"},{"type":"line","text":"— Niech nie gra z nami. Pewnie zaraz się obrazi."},{"type":"line","text":"Chłopcy zaśmiali się."},{"type":"line","text":"Idris odszedł."},{"type":"line","text":"Wtedy Nabil czuł się silny."},{"type":"line","text":"Teraz poczuł się mały."},{"type":"line","text":"Bardzo mały."},{"type":"line","text":"— Chciałem, żeby inni nie zauważyli, że się boję — wyszeptał."},{"type":"line","text":"— Zauważyli — powiedział przewodnik."},{"type":"line","text":"Nabil podniósł wzrok."},{"type":"line","text":"— Co?"},{"type":"line","text":"— Może nie oni. Ale ty zauważyłeś. I od tego czasu próbujesz uciec przed kimś, kto zna prawdę."},{"type":"line","text":"— Przed Idrisem?"},{"type":"line","text":"— Przed sobą."},{"type":"line","text":"Karawana szła dalej."},{"type":"line","text":"W końcu dotarli do miejsca, którego Nabil nie znał."},{"type":"line","text":"Była to mała izba, oświetlona lampką oliwną."},{"type":"line","text":"Idris siedział przy stole."},{"type":"line","text":"Przed nim leżał drewniany kompas ojca, pęknięty na pół."},{"type":"line","text":"Chłopiec próbował go naprawić, ale ręce mu drżały."},{"type":"line","text":"Jego matka spała w drugim kącie izby, zmęczona płaczem."},{"type":"line","text":"Idris szeptał do siebie:"},{"type":"line","text":"— To nie jest bezużyteczne. Nie jest."},{"type":"line","text":"Nabil poczuł, jak coś w nim pęka."},{"type":"line","text":"Nie wiedział, że Idris tak bardzo przejął się jego słowami."},{"type":"line","text":"Nie wiedział, że jedno zdanie może zostać w człowieku tak długo."},{"type":"line","text":"— Ja nie chciałem — powiedział, a łzy pojawiły mu się w oczach. — Nie chciałem, żeby tak było."},{"type":"line","text":"Przewodnik stanął obok niego."},{"type":"line","text":"— Większość ran zaczyna się od czegoś, czego ktoś „nie chciał”. Dlatego przeprosiny nie są po to, żeby udowodnić, że nie chciałeś. Są po to, żeby uznać, że mimo wszystko zraniłeś."},{"type":"line","text":"Nabil płakał już naprawdę."},{"type":"line","text":"Nie głośno."},{"type":"line","text":"Nie teatralnie."},{"type":"line","text":"Po prostu tak, jak płacze ktoś, kto za długo trzymał w środku twardy kamień i nagle zobaczył, że to wcale nie kamień, tylko rana."},{"type":"line","text":"— Czy mogę to naprawić? — zapytał."},{"type":"line","text":"— Nie wszystko."},{"type":"line","text":"— To po co przepraszać?"},{"type":"line","text":"— Bo przeprosiny nie cofają czasu. One otwierają drzwi, przez które prawda może wejść do środka. A czasem za prawdą wchodzi też przebaczenie. Ale nie zawsze. I nie od razu."},{"type":"line","text":"Nabil otarł twarz rękawem."},{"type":"line","text":"— Boję się."},{"type":"line","text":"— Wreszcie mówisz jak ktoś odważny — powiedział przewodnik."},{"type":"line","text":"Karawana zatrzymała się."},{"type":"line","text":"Przed nimi znów pojawiła się ulica prowadząca do domu Idrisa."},{"type":"line","text":"Tym razem nie była wspomnieniem."},{"type":"line","text":"Nie była obrazem z piasku."},{"type":"line","text":"Była prawdziwa."},{"type":"line","text":"Nabil poznał chłód poranka, zapach piekarni z rogu i krzyk koguta z sąsiedniego podwórza."},{"type":"line","text":"— To Darun — wyszeptał."},{"type":"line","text":"Przewodnik skinął głową."},{"type":"line","text":"— Świt."},{"type":"line","text":"Nabil odwrócił się."},{"type":"line","text":"Karawana stała za nim, ale już blakła."},{"type":"line","text":"Wielbłądy robiły się przezroczyste jak mgła."},{"type":"line","text":"Dzwonki dźwięczały coraz ciszej."},{"type":"line","text":"— Zaczekaj! — zawołał. — Kim jesteście?"},{"type":"line","text":"Przewodnik przez chwilę milczał."},{"type":"line","text":"Potem odsłonił twarz."},{"type":"line","text":"A raczej coś, co powinno być twarzą."},{"type":"line","text":"Nie było tam jednak oczu, nosa ani ust."},{"type":"line","text":"Było niebo pełne gwiazd."},{"type":"line","text":"— Jesteśmy drogą, którą ludzie odkładają na później — powiedział."},{"type":"line","text":"Potem karawana zniknęła."},{"type":"line","text":"Piasek na ulicy był gładki."},{"type":"line","text":"Żadnych śladów."},{"type":"line","text":"Nabil stał sam przed domem Idrisa."},{"type":"line","text":"Mógł odejść."},{"type":"line","text":"Jeszcze mógł."},{"type":"line","text":"Nikt by nie wiedział."},{"type":"line","text":"Mógł wrócić do łóżka i powiedzieć sobie, że wszystko było snem."},{"type":"line","text":"Ale w piersi nie miał już twardego kamienia."},{"type":"line","text":"Miał pustą przestrzeń."},{"type":"line","text":"Bolała, ale była prawdziwa."},{"type":"line","text":"Zapukał."},{"type":"line","text":"Raz."},{"type":"line","text":"Cicho."},{"type":"line","text":"Nikt nie otworzył."},{"type":"line","text":"Zapukał drugi raz."},{"type":"line","text":"Drzwi uchyliły się."},{"type":"line","text":"Stanęła w nich matka Idrisa."},{"type":"line","text":"Była szczuplejsza niż dawniej."},{"type":"line","text":"Jej twarz miała zmęczenie, którego Nabil wcześniej nie chciał widzieć."},{"type":"line","text":"— Nabil? — zapytała zaskoczona."},{"type":"line","text":"Chłopiec spuścił głowę."},{"type":"line","text":"— Czy mogę porozmawiać z Idrisem?"},{"type":"line","text":"Kobieta patrzyła na niego przez chwilę."},{"type":"line","text":"Potem odsunęła się."},{"type":"line","text":"Idris siedział przy stole."},{"type":"line","text":"Przed nim leżał drewniany kompas, sklejony niezgrabnie, ale starannie."},{"type":"line","text":"Kiedy zobaczył Nabila, zesztywniał."},{"type":"line","text":"— Czego chcesz?"},{"type":"line","text":"Nabil miał przygotowane różne zdania."},{"type":"line","text":"Wymyślał je wiele razy."},{"type":"line","text":"„Nie miałem tego na myśli”."},{"type":"line","text":"„Byłem zły”."},{"type":"line","text":"„Ty też nie chciałeś pożyczyć kompasu”."},{"type":"line","text":"„To było dawno”."},{"type":"line","text":"Teraz każde z nich brzmiało jak ucieczka."},{"type":"line","text":"Powiedział więc tylko:"},{"type":"line","text":"— Przepraszam."},{"type":"line","text":"Idris patrzył na niego bez słowa."},{"type":"line","text":"Nabil mówił dalej, choć głos mu drżał:"},{"type":"line","text":"— Powiedziałem coś okrutnego o twoim ojcu. To nie była prawda. Byłem zły i chciałem cię zranić. A potem bałem się przyjść, więc udawałem, że nic się nie stało. Wiem, że to nie naprawi wszystkiego. Ale chciałem powiedzieć, że żałuję."},{"type":"line","text":"W izbie zrobiło się bardzo cicho."},{"type":"line","text":"Matka Idrisa stała przy drzwiach, ale nie wtrącała się."},{"type":"line","text":"Idris spojrzał na kompas."},{"type":"line","text":"Potem na Nabila."},{"type":"line","text":"— Bardzo mnie zraniłeś — powiedział."},{"type":"line","text":"Nabil skinął głową."},{"type":"line","text":"— Wiem."},{"type":"line","text":"— Nie tylko wtedy. Potem też, kiedy udawałeś, że mnie nie widzisz."},{"type":"line","text":"— Wiem."},{"type":"line","text":"— I kiedy śmiałeś się ze mną przy innych."},{"type":"line","text":"— Wiem."},{"type":"line","text":"Idris zacisnął palce na brzegu stołu."},{"type":"line","text":"— Nie wiem, czy chcę znów być twoim przyjacielem."},{"type":"line","text":"Nabil poczuł ukłucie w sercu, ale nie zaprotestował."},{"type":"line","text":"— Rozumiem."},{"type":"line","text":"To było trudne."},{"type":"line","text":"Bardzo trudne."},{"type":"line","text":"Bo część niego chciała, żeby przeprosiny działały jak zaklęcie: wypowiadasz słowo i wszystko wraca."},{"type":"line","text":"Ale prawdziwe serca nie są drzwiami na sprężynie."},{"type":"line","text":"Nie otwierają się tylko dlatego, że ktoś zapukał."},{"type":"line","text":"Idris wziął drewniany kompas i położył go na stole między nimi."},{"type":"line","text":"— Mój ojciec zrobił go, kiedy byłem mały — powiedział. — Nie pokazuje północy dobrze. Igła się zacina. Ale on mówił, że to nie szkodzi, bo czasem człowiek nie potrzebuje kompasu do kierunku, tylko do pamiętania, że kierunek jest ważny."},{"type":"line","text":"Nabil spojrzał na kompas."},{"type":"line","text":"Mały."},{"type":"line","text":"Drewniany."},{"type":"line","text":"Pęknięty."},{"type":"line","text":"Nieidealny."},{"type":"line","text":"I wcale nie bezużyteczny."},{"type":"line","text":"— Twój ojciec miał rację — powiedział."},{"type":"line","text":"Idris przez chwilę milczał."},{"type":"line","text":"— Możesz zostać. Ale nie wiem, co dalej."},{"type":"line","text":"Nabil poczuł, jak w pustej przestrzeni po kamieniu pojawia się coś małego."},{"type":"line","text":"Nie radość."},{"type":"line","text":"Jeszcze nie."},{"type":"line","text":"Może nadzieja."},{"type":"line","text":"— To wystarczy — odparł."},{"type":"line","text":"Przez następne dni Nabil nie próbował przyspieszać przebaczenia."},{"type":"line","text":"Nie zachowywał się tak, jakby jedno „przepraszam” wymazało rok milczenia."},{"type":"line","text":"Przychodził czasem do Idrisa."},{"type":"line","text":"Pomagał nosić drewno."},{"type":"line","text":"Siedział obok, kiedy Idris naprawiał drobne rzeczy po ojcu."},{"type":"line","text":"Czasem rozmawiali."},{"type":"line","text":"Czasem milczeli."},{"type":"line","text":"Czasem było niezręcznie."},{"type":"line","text":"Ale niezręczna prawda była lepsza niż wygodne udawanie."},{"type":"line","text":"Pewnego popołudnia Idris zapytał:"},{"type":"line","text":"— Gdzie byłeś tamtej nocy? Przed świtem miałeś na butach piasek, jakbyś przeszedł pół pustyni."},{"type":"line","text":"Nabil zawahał się."},{"type":"line","text":"Potem opowiedział mu o karawanie bez śladów."},{"type":"line","text":"O przewodniku z twarzą pełną gwiazd."},{"type":"line","text":"O wspomnieniach."},{"type":"line","text":"O drodze, która prowadzi tam, dokąd człowiek boi się pójść."},{"type":"line","text":"Idris słuchał długo."},{"type":"line","text":"— Wymyślasz? — zapytał w końcu."},{"type":"line","text":"— Nie wiem — powiedział Nabil. — Może pustynia wymyśliła to za mnie."},{"type":"line","text":"Idris uśmiechnął się po raz pierwszy od bardzo dawna."},{"type":"line","text":"Mało."},{"type":"line","text":"Prawie niewidocznie."},{"type":"line","text":"Ale naprawdę."},{"type":"line","text":"Kilka tygodni później chłopcy poszli razem do starej studni."},{"type":"line","text":"Tej samej, przy której zaczęła się ich kłótnia."},{"type":"line","text":"Idris trzymał drewniany kompas."},{"type":"line","text":"— Nadal się zacina — powiedział."},{"type":"line","text":"— Może trzeba go naprawić."},{"type":"line","text":"— Może. A może taki ma być."},{"type":"line","text":"Usiedli na murku studni."},{"type":"line","text":"Przez chwilę patrzyli na pustynię."},{"type":"line","text":"Wiatr przesuwał piasek za bramą miasta."},{"type":"line","text":"Nabil pomyślał o karawanie."},{"type":"line","text":"Nie widział jej więcej."},{"type":"line","text":"Ale czasem nocą, gdy miał zrobić coś trudnego i szukał wymówki, wydawało mu się, że słyszy dalekie dzwoneczki."},{"type":"line","text":"Ciche."},{"type":"line","text":"Srebrne."},{"type":"line","text":"Przypominające, że najtrudniejsza droga rzadko jest najdłuższa."},{"type":"line","text":"Najczęściej zaczyna się od kilku kroków do czyichś drzwi."},{"type":"line","text":"Z czasem Nabil i Idris znów zaczęli rozmawiać jak dawniej."},{"type":"line","text":"Nie tak samo."},{"type":"line","text":"Nie da się wrócić dokładnie do tego, co było."},{"type":"line","text":"Ale czasem coś naprawione staje się uważniejsze niż coś, co nigdy nie pękło."},{"type":"line","text":"Ich przyjaźń miała już ślad."},{"type":"line","text":"Bliznę."},{"type":"line","text":"Ale była prawdziwa."},{"type":"line","text":"A drewniany kompas?"},{"type":"line","text":"Idris pewnego dnia dał go Nabilowi na chwilę."},{"type":"line","text":"— Możesz potrzymać — powiedział."},{"type":"line","text":"Nabil wziął go ostrożnie, jakby trzymał ptaka."},{"type":"line","text":"— Dziękuję."},{"type":"line","text":"— Tylko nie mów, że jest bezużyteczny."},{"type":"line","text":"— Nigdy więcej."},{"type":"line","text":"Kompas rzeczywiście nie wskazywał północy dobrze."},{"type":"line","text":"Igła drżała, zacinała się i czasem obracała w zupełnie dziwną stronę."},{"type":"line","text":"Ale kiedy Nabil trzymał go w dłoni, wiedział, gdzie powinien iść."},{"type":"line","text":"Nie dlatego, że kompas pokazywał drogę przez pustynię."},{"type":"line","text":"Dlatego, że przypominał mu o drodze, której nie wolno odkładać zbyt długo."},{"type":"line","text":"Po latach, gdy Nabil został przewodnikiem karawan, ludzie mówili o nim:"},{"type":"line","text":"— Ten człowiek jest odważny."},{"type":"line","text":"Ale Nabil nie uśmiechał się już wtedy tak dumnie jak w dzieciństwie."},{"type":"line","text":"Wiedział, że odwaga to nie tylko wejść na wysoką skałę albo przejść przez burzę piaskową."},{"type":"line","text":"Odwaga to także wrócić do kogoś, kogo się zraniło."},{"type":"line","text":"Powiedzieć prawdę."},{"type":"line","text":"Przyjąć, że przebaczenie nie należy się na rozkaz."},{"type":"line","text":"I zostać, nawet jeśli cisza po przeprosinach jest trudniejsza niż pustynia nocą."},{"type":"line","text":"Czasem, kiedy prowadził ludzi przez wydmy, widział w oddali karawanę."},{"type":"line","text":"Srebrne dzwonki."},{"type":"line","text":"Ciemne wielbłądy."},{"type":"line","text":"Przewodnik w długim płaszczu."},{"type":"line","text":"Ale gdy podchodził bliżej, nie było nikogo."},{"type":"line","text":"Tylko gładki piasek."},{"type":"line","text":"Bez śladów."},{"type":"line","text":"Wtedy Nabil zatrzymywał swoją karawanę i pytał podróżnych:"},{"type":"line","text":"— Czy jest ktoś, do kogo boicie się wrócić?"},{"type":"line","text":"Ludzie śmiali się nerwowo."},{"type":"line","text":"Niektórzy udawali, że nie rozumieją."},{"type":"line","text":"Ale czasem ktoś milkł."},{"type":"line","text":"Patrzył w piasek."},{"type":"line","text":"A potem, po zakończonej podróży, szedł nie na targ, nie do gospody, nie do domu pełnego wygody."},{"type":"line","text":"Szedł zapukać do drzwi, które omijał od dawna."},{"type":"line","text":"I wtedy, bardzo daleko, na granicy słyszenia, dzwoniły srebrne dzwoneczki."},{"type":"section","text":"— ZAKOŃCZENIE PODCASTOWE —"},{"type":"line","text":"I tak kończy się dzisiejsza opowieść: „Karawana bez śladów”."},{"type":"line","text":"To historia o chłopcu, który udawał, że niczego się nie boi, dopóki pustynia nie pokazała mu prawdy."},{"type":"line","text":"O przyjaźni, którą zraniło jedno okrutne zdanie."},{"type":"line","text":"I o przeprosinach, które nie cofają czasu, ale mogą otworzyć drogę dalej."},{"type":"line","text":"Jeśli ta historia została z tobą choć na chwilę, zabierz jej mały kawałek do snu."},{"type":"line","text":"Może będzie to srebrny dźwięk dzwoneczków."},{"type":"line","text":"Może karawana idąca po piasku bez śladów."},{"type":"line","text":"A może jedno zdanie:"},{"type":"line","text":"czasem najodważniejszy krok prowadzi do drzwi, których od dawna unikasz."},{"type":"line","text":"Więcej bajek, legend i tajemniczych opowieści znajdziesz na stronie 3tatata.pl."},{"type":"line","text":"Możesz nas także słuchać na Spotify i oglądać na YouTube."},{"type":"line","text":"Zostaw follow albo subskrypcję, żeby nie przegapić kolejnych historii."},{"type":"line","text":"Dobranoc — i do usłyszenia w następnej bajce."}]},{"id":16,"title":"OSTATNIA OPOWIEŚĆ SZEHEREZADY","tag":"Opowieść","sections":[{"type":"title","text":"OSTATNIA OPOWIEŚĆ SZEHEREZADY"},{"type":"meta","text":"3TaTaTa — Opowieści z dalekich krain"},{"type":"section","text":"— WSTĘP DO ODCINKA —"},{"type":"line","text":"Każda opowieść kiedyś się kończy."},{"type":"line","text":"Nawet ta najdłuższa."},{"type":"line","text":"Nawet taka, która trwa tysiąc i jedną noc."},{"type":"line","text":"Ale są zakończenia, które nie zamykają drzwi."},{"type":"line","text":"Są takie, które zostawiają w nich małą szczelinę światła."},{"type":"line","text":"Bo dobra historia nie znika, kiedy narrator przestaje mówić."},{"type":"line","text":"Zostaje w człowieku."},{"type":"line","text":"Czasem jako obraz."},{"type":"line","text":"Czasem jako zdanie."},{"type":"line","text":"Czasem jako pytanie, które wraca po wielu latach."},{"type":"line","text":"Dzisiaj wrócimy do Szeherezady."},{"type":"line","text":"Tej samej, która ocaliła życie słowem."},{"type":"line","text":"Tej, która opowiadała królowi historie przez tysiąc i jedną noc."},{"type":"line","text":"Ale tej nocy opowie coś, czego nie znał nikt."},{"type":"line","text":"Swoją ostatnią opowieść."},{"type":"section","text":"— OSTATNIA OPOWIEŚĆ SZEHEREZADY —"},{"type":"line","text":"Minęło wiele lat od nocy, w której Szeherezada po raz pierwszy usiadła przed królem Szahrijarem i zaczęła opowiadać."},{"type":"line","text":"Wiele lat od chwili, gdy jej głos, cichy i spokojny, wszedł do pałacu pełnego strachu jak pierwsze światło wchodzi do zamkniętej komnaty."},{"type":"line","text":"Królestwo nie było już takie samo."},{"type":"line","text":"Dawniej ludzie mijali pałac szybko, ze spuszczonym wzrokiem."},{"type":"line","text":"Dawniej na targach rozmawiano półgłosem, a matki przytulały córki z lękiem, którego nie trzeba było tłumaczyć."},{"type":"line","text":"Dawniej muzyka w pałacu brzmiała rzadko, jakby bała się odbić od zimnych ścian."},{"type":"line","text":"Teraz w ogrodach znów śpiewały ptaki."},{"type":"line","text":"W kuchniach słychać było śmiech."},{"type":"line","text":"Na dziedzińcach dzieci biegały między kolumnami, a strażnicy udawali surowych tylko do chwili, gdy któreś z dzieci nie pociągnęło ich za szatę."},{"type":"line","text":"Król Szahrijar zmienił się."},{"type":"line","text":"Nie od razu."},{"type":"line","text":"Nie jednego dnia."},{"type":"line","text":"Nie dlatego, że usłyszał jedną piękną bajkę i nagle stał się człowiekiem bez winy."},{"type":"line","text":"Prawdziwa zmiana rzadko przychodzi jak piorun."},{"type":"line","text":"Częściej jest jak woda kapiąca na kamień."},{"type":"line","text":"Noc po nocy."},{"type":"line","text":"Słowo po słowie."},{"type":"line","text":"Opowieść po opowieści."},{"type":"line","text":"Król nauczył się słuchać."},{"type":"line","text":"A to było dla niego trudniejsze niż rządzenie."},{"type":"line","text":"Bo rządzić można rozkazem."},{"type":"line","text":"Słuchać trzeba sercem."},{"type":"line","text":"Szeherezada została królową."},{"type":"line","text":"Ludzie ją kochali, ale ona nigdy nie pozwoliła, by miłość tłumu zamieniła się w pychę."},{"type":"line","text":"Nadal chodziła do biblioteki."},{"type":"line","text":"Nadal rozmawiała ze służącymi."},{"type":"line","text":"Nadal siadała czasem przy oknie i patrzyła w noc, jakby gdzieś między gwiazdami słyszała początek kolejnej historii."},{"type":"line","text":"Jej młodsza siostra, Dunjazada, często ją odwiedzała."},{"type":"line","text":"To ona pierwszej nocy poprosiła:"},{"type":"line","text":"— Siostro, opowiedz mi jeszcze jedną historię."},{"type":"line","text":"I właśnie od tego prostego zdania zaczęło się wszystko."},{"type":"line","text":"Pewnego wieczoru, wiele lat później, w pałacu odbywała się wielka uczta."},{"type":"line","text":"Przybyli kupcy z dalekich krain, uczeni, poeci, podróżnicy, dyplomaci i ludzie, którzy twierdzili, że widzieli cuda tak dziwne, iż nawet baśnie rumieniłyby się z zazdrości."},{"type":"line","text":"Jeden mówił o mieście, które pojawia się pod czerwonym księżycem."},{"type":"line","text":"Inny o karawanie, która nie zostawia śladów."},{"type":"line","text":"Ktoś wspominał o dziewczynce słyszącej piasek."},{"type":"line","text":"Ktoś inny przysiągł, że widział lampę, w której nie mieszkał żaden dżin, a mimo to zmieniała ludzkie życie."},{"type":"line","text":"Szeherezada słuchała tych historii z uśmiechem."},{"type":"line","text":"Wiedziała, że opowieści są jak ptaki."},{"type":"line","text":"Nie zostają tam, gdzie się urodziły."},{"type":"line","text":"Przelatują z ust do ust, z miasta do miasta, z pokolenia na pokolenie."},{"type":"line","text":"Czasem gubią pióro."},{"type":"line","text":"Czasem zmieniają kolor."},{"type":"line","text":"Czasem wracają do człowieka tak odmienione, że trudno je rozpoznać."},{"type":"line","text":"Ale jeśli w środku niosą prawdę, nadal są żywe."},{"type":"line","text":"Pod koniec uczty król Szahrijar wstał."},{"type":"line","text":"Nie był już młodym, gniewnym władcą z dawnych nocy."},{"type":"line","text":"W jego brodzie lśniły srebrne nitki."},{"type":"line","text":"W oczach miał zmęczenie, ale też łagodność, której kiedyś nikt by się po nim nie spodziewał."},{"type":"line","text":"Uniósł puchar."},{"type":"line","text":"— Dziś — powiedział — mija wiele lat od chwili, gdy królowa Szeherezada ocaliła nasze królestwo swoim głosem. Nie mieczem. Nie armią. Nie strachem. Głosem."},{"type":"line","text":"W sali zapadła cisza."},{"type":"line","text":"— Przez tysiąc i jedną noc słuchałem historii — mówił król dalej. — A każda z nich odbierała mojemu sercu jedną kroplę trucizny. Dziś proszę cię, Szeherezado, jeśli zechcesz, opowiedz nam jeszcze jedną historię."},{"type":"line","text":"Wszyscy spojrzeli na królową."},{"type":"line","text":"Dunjazada, siedząca niedaleko, uśmiechnęła się lekko."},{"type":"line","text":"Ten uśmiech był wspomnieniem tamtej pierwszej nocy."},{"type":"line","text":"Szeherezada przez chwilę milczała."},{"type":"line","text":"Nie dlatego, że nie miała historii."},{"type":"line","text":"Miała ich więcej, niż człowiek mógłby spisać w ciągu życia."},{"type":"line","text":"Milczała, bo wiedziała, że ta jedna powinna być inna."},{"type":"line","text":"Wstała powoli."},{"type":"line","text":"Jej szata była ciemnoniebieska, wyszywana drobnymi srebrnymi nićmi. Wyglądała jak nocne niebo tuż przed świtem."},{"type":"line","text":"— Dobrze — powiedziała. — Opowiem wam ostatnią historię."},{"type":"line","text":"W sali poruszył się szmer."},{"type":"line","text":"Ostatnią?"},{"type":"line","text":"Szeherezada uśmiechnęła się spokojnie."},{"type":"line","text":"— Nie dlatego, że potem nie będzie już opowieści. Dlatego, że ta opowieść mówi o tym, skąd one przychodzą."},{"type":"line","text":"Usiadła na podwyższeniu, ale nie na tronie."},{"type":"line","text":"Nigdy nie lubiła opowiadać z tronu."},{"type":"line","text":"Tron jest dobry do rozkazów."},{"type":"line","text":"Opowieść woli miejsce bliżej ludzi."},{"type":"line","text":"Zaczęła."},{"type":"line","text":"Dawno temu, zanim na świecie powstały wielkie pałace, zanim spisano pierwsze kroniki i zanim ludzie nauczyli się liczyć wszystkie gwiazdy, istniała kraina ukryta między snem a jawą."},{"type":"line","text":"Nie można było do niej dotrzeć konno."},{"type":"line","text":"Nie prowadził tam statek."},{"type":"line","text":"Nie wskazywał jej kompas."},{"type":"line","text":"Nazywała się Kraina Nienazwanych Historii."},{"type":"line","text":"W tej krainie mieszkały opowieści, których nikt jeszcze nie opowiedział."},{"type":"line","text":"Były tam małe bajki, lekkie jak motyle."},{"type":"line","text":"Były legendy ciężkie jak kamienne bramy."},{"type":"line","text":"Były historie smutne, które chodziły powoli, owinięte szarym płaszczem."},{"type":"line","text":"Były historie wesołe, skaczące po dachach jak koty."},{"type":"line","text":"Były opowieści o dzieciach, które gubiły drogę."},{"type":"line","text":"O królach, którzy musieli nauczyć się pokory."},{"type":"line","text":"O rybakach, kupcach, dżinach, koniach z hebanu, złotych ptakach, czarnych perłach i księgach, które nie chciały otwierać się tam, gdzie kazano."},{"type":"line","text":"Każda historia czekała na swojego człowieka."},{"type":"line","text":"Bo opowieść nie może wejść na świat sama."},{"type":"line","text":"Potrzebuje ust, które ją wypowiedzą."},{"type":"line","text":"Potrzebuje ucha, które jej wysłucha."},{"type":"line","text":"Potrzebuje serca, w którym znajdzie miejsce."},{"type":"line","text":"W samym środku Krainy Nienazwanych Historii stała studnia."},{"type":"line","text":"Nie z kamienia."},{"type":"line","text":"Nie z cegły."},{"type":"line","text":"Z ciszy."},{"type":"line","text":"Była tak głęboka, że gdy ktoś wrzucał do niej pytanie, odpowiedź wracała dopiero po wielu latach."},{"type":"line","text":"Przy tej studni mieszkała stara kobieta."},{"type":"line","text":"Nikt nie znał jej imienia."},{"type":"line","text":"Niektórzy mówili, że była pierwszą narratorką świata."},{"type":"line","text":"Inni, że była pamięcią wszystkich matek, ojców, babek i dziadków, którzy kiedykolwiek opowiadali coś dziecku przed snem."},{"type":"line","text":"Kobieta miała włosy białe jak mleko, dłonie ciepłe jak chleb i oczy, w których mieszkały tysiące ognisk."},{"type":"line","text":"Każdego wieczoru przychodziły do niej opowieści."},{"type":"line","text":"— Czy to już czas? — pytały."},{"type":"line","text":"Stara kobieta słuchała ich uważnie."},{"type":"line","text":"Jednej mówiła:"},{"type":"line","text":"— Jeszcze nie. Człowiek, który ma cię wypowiedzieć, nie nauczył się jeszcze straty."},{"type":"line","text":"Drugiej:"},{"type":"line","text":"— Jeszcze nie. Dziecko, które ma cię usłyszeć, musi najpierw przestać bać się ciemności."},{"type":"line","text":"Trzeciej:"},{"type":"line","text":"— Jeszcze nie. Król, do którego trafisz, ma serce zamknięte zbyt mocno. Poczekaj, aż pojawi się pierwsza szczelina."},{"type":"line","text":"Opowieści czekały."},{"type":"line","text":"Niektóre krótko."},{"type":"line","text":"Inne całe wieki."},{"type":"line","text":"Bo prawdziwa historia nie spieszy się."},{"type":"line","text":"W tej samej krainie żyła też jedna mała opowieść."},{"type":"line","text":"Była zupełnie niepozorna."},{"type":"line","text":"Nie miała jeszcze bohaterów."},{"type":"line","text":"Nie miała zakończenia."},{"type":"line","text":"Nie miała nawet pewności, czy jest bajką, legendą, czy tylko szeptem."},{"type":"line","text":"Inne historie bywały z niej trochę dumne."},{"type":"line","text":"— Ja będę o królu i wielkiej bitwie — mówiła jedna."},{"type":"line","text":"— Ja o smoku i zaklętym jeziorze — mówiła druga."},{"type":"line","text":"— Ja o dżinie, który spełnia życzenia — chwaliła się trzecia."},{"type":"line","text":"Mała opowieść milczała."},{"type":"line","text":"Nie wiedziała, o czym jest."},{"type":"line","text":"Pewnego dnia podeszła do starej kobiety przy studni."},{"type":"line","text":"— Czy ja też kiedyś trafię do ludzi? — zapytała."},{"type":"line","text":"Kobieta spojrzała na nią łagodnie."},{"type":"line","text":"— Tak."},{"type":"line","text":"— Ale ja nie mam nic wielkiego. Nie mam smoka. Nie mam skarbu. Nie mam wojny ani zaklęcia."},{"type":"line","text":"— To dobrze — powiedziała kobieta."},{"type":"line","text":"Mała opowieść zdziwiła się."},{"type":"line","text":"— Dobrze?"},{"type":"line","text":"— Najtrudniejsze historie często nie zaczynają się od smoka. Zaczynają się od jednego człowieka, który boi się powiedzieć prawdę."},{"type":"line","text":"Mała opowieść pomyślała o tym długo."},{"type":"line","text":"— A do kogo trafię?"},{"type":"line","text":"Stara kobieta pochyliła się nad studnią ciszy."},{"type":"line","text":"Wrzuciła do niej pytanie."},{"type":"line","text":"Czekały."},{"type":"line","text":"Długo."},{"type":"line","text":"Tak długo, że nad krainą zdążyły przemknąć sny wielu śpiących ludzi."},{"type":"line","text":"W końcu ze studni dobiegła odpowiedź."},{"type":"line","text":"Nie słowo."},{"type":"line","text":"Obraz."},{"type":"line","text":"Pałac."},{"type":"line","text":"Zimne sale."},{"type":"line","text":"Król siedzący samotnie na tronie."},{"type":"line","text":"Dziewczyna o mądrych oczach, która idzie ku niemu, choć boi się bardzo."},{"type":"line","text":"Mała opowieść zadrżała."},{"type":"line","text":"— To straszne miejsce."},{"type":"line","text":"— Tak — powiedziała stara kobieta."},{"type":"line","text":"— Czy mam ją ocalić?"},{"type":"line","text":"— Nie sama. Żadna opowieść nie ocala nikogo sama. Ona musi cię wypowiedzieć. On musi cię usłyszeć. A potem prawda musi znaleźć sobie drogę."},{"type":"line","text":"— A jeśli on nie usłyszy?"},{"type":"line","text":"Stara kobieta pogładziła małą opowieść po niewidzialnej głowie."},{"type":"line","text":"— Wtedy spróbujesz stać się początkiem następnej."},{"type":"line","text":"Mała opowieść bała się."},{"type":"line","text":"Ale gdy nadszedł czas, wyszła z Krainy Nienazwanych Historii."},{"type":"line","text":"Przeleciała przez sen dziewczyny."},{"type":"line","text":"Usiadła na jej języku jak ptak."},{"type":"line","text":"I tej nocy, w pałacu pełnym strachu, Szeherezada zaczęła mówić."},{"type":"line","text":"Kiedy król usłyszał pierwszą historię, nie zmienił się od razu."},{"type":"line","text":"Mała opowieść poczuła smutek."},{"type":"line","text":"„Nie wystarczyłam” — pomyślała."},{"type":"line","text":"Ale wtedy przyszła druga opowieść."},{"type":"line","text":"Potem trzecia."},{"type":"line","text":"Potem setna."},{"type":"line","text":"Potem tysięczna."},{"type":"line","text":"Każda z nich przynosiła coś małego."},{"type":"line","text":"Jedna ciekawość."},{"type":"line","text":"Druga litość."},{"type":"line","text":"Trzecia wspomnienie."},{"type":"line","text":"Czwarta wstyd."},{"type":"line","text":"Piąta pytanie."},{"type":"line","text":"Szósta łzę, której król nie chciał pokazać."},{"type":"line","text":"I tak, kropla po kropli, kamień w jego sercu zaczął pękać."},{"type":"line","text":"Mała opowieść zrozumiała wtedy, że nie musiała być jedyna."},{"type":"line","text":"Musiała tylko zacząć."},{"type":"line","text":"Szeherezada przerwała."},{"type":"line","text":"W sali panowała absolutna cisza."},{"type":"line","text":"Nikt nie poruszył kielichem."},{"type":"line","text":"Nikt nie kaszlnął."},{"type":"line","text":"Nawet lampy zdawały się płonąć spokojniej."},{"type":"line","text":"Król Szahrijar patrzył na nią uważnie."},{"type":"line","text":"— Czy ta mała opowieść była pierwszą, którą mi opowiedziałaś? — zapytał."},{"type":"line","text":"Szeherezada uśmiechnęła się delikatnie."},{"type":"line","text":"— Może."},{"type":"line","text":"— A może jesteś nią ty?"},{"type":"line","text":"Królowa nie odpowiedziała od razu."},{"type":"line","text":"— Każdy, kto opowiada z odwagą, staje się trochę opowieścią — powiedziała. — A każdy, kto słucha naprawdę, pozwala jej żyć dalej."},{"type":"line","text":"Dunjazada miała łzy w oczach."},{"type":"line","text":"— Siostro — powiedziała cicho — czy naprawdę istnieje Kraina Nienazwanych Historii?"},{"type":"line","text":"Szeherezada spojrzała na wszystkich obecnych."},{"type":"line","text":"Na poetów, kupców, uczonych, służących, strażników i dzieci siedzące przy poduszkach."},{"type":"line","text":"— Oczywiście — powiedziała. — Ale nie szukajcie jej na mapach. Ona jest tam, gdzie człowiek milknie na chwilę i pyta sam siebie: jaką prawdę próbuję zrozumieć?"},{"type":"line","text":"Jeden z poetów skłonił głowę."},{"type":"line","text":"— Królowo, czy to znaczy, że każda historia musi uczyć?"},{"type":"line","text":"— Nie — odpowiedziała Szeherezada. — Historia może bawić. Może straszyć trochę, ale bez okrucieństwa. Może kołysać do snu. Może rozpalać wyobraźnię. Ale dobra historia zawsze zostawia w człowieku małe światło. Czasem tak małe, że zauważa się je dopiero w ciemności."},{"type":"line","text":"Młody chłopiec, syn jednego z kucharzy, który zakradł się na ucztę i siedział za kolumną, odezwał się nagle:"},{"type":"line","text":"— A co się dzieje z opowieścią, gdy wszyscy o niej zapomną?"},{"type":"line","text":"Niektórzy dorośli chcieli go uciszyć, ale Szeherezada podniosła rękę."},{"type":"line","text":"— To bardzo ważne pytanie."},{"type":"line","text":"Chłopiec zaczerwienił się."},{"type":"line","text":"Królowa odpowiedziała:"},{"type":"line","text":"— Opowieść, o której wszyscy zapomną, wraca do studni ciszy. Czeka tam cierpliwie, aż ktoś znowu będzie jej potrzebował. Czasem wraca po stu latach. Czasem w innym języku. Czasem pod innym tytułem. Ale jeśli niesie prawdę, nie umiera całkiem."},{"type":"line","text":"Król Szahrijar wstał powoli."},{"type":"line","text":"Zszedł z podwyższenia i stanął przed Szeherezadą."},{"type":"line","text":"— Przez wiele lat myślałem, że to ty ocaliłaś mnie opowieściami — powiedział. — Dziś rozumiem, że dałaś mi coś trudniejszego. Nie gotowe ocalenie, ale drogę, którą musiałem przejść sam."},{"type":"line","text":"— Tak właśnie działają opowieści — odparła Szeherezada. — Nie idą za człowieka. Idą obok."},{"type":"line","text":"Król spojrzał na zgromadzonych."},{"type":"line","text":"— Od dziś w naszym pałacu powstanie Dom Opowieści. Nie tylko dla uczonych i poetów. Dla każdego. Dla dzieci, rybaków, kupców, matek, żołnierzy, ogrodników i wędrowców. Każdy, kto nosi w sobie historię, będzie mógł ją tam opowiedzieć."},{"type":"line","text":"W sali rozległ się szmer zachwytu."},{"type":"line","text":"Ale Szeherezada uniosła dłoń."},{"type":"line","text":"— Pamiętajcie tylko o jednym — powiedziała. — Opowieści są potężne. Mogą leczyć, ale mogą też ranić. Mogą dodawać odwagi, ale mogą też siać strach. Dlatego trzeba opowiadać odpowiedzialnie."},{"type":"line","text":"— Jak? — zapytał ktoś z końca sali."},{"type":"line","text":"Szeherezada odpowiedziała spokojnie:"},{"type":"line","text":"— Nie opowiadaj tak, by odebrać komuś człowieczeństwo. Nie opowiadaj kłamstwa tylko dlatego, że brzmi ciekawiej niż prawda. Nie strasz dziecka tak, by bało się świata. Daj mu tajemnicę, ale zostaw też drogę do światła."},{"type":"line","text":"Te słowa zapamiętano."},{"type":"line","text":"Bardziej niż ucztę."},{"type":"line","text":"Bardziej niż muzykę."},{"type":"line","text":"Bardziej niż złote lampy, które płonęły tamtej nocy do świtu."},{"type":"line","text":"W kolejnych miesiącach w pałacu naprawdę powstał Dom Opowieści."},{"type":"line","text":"Nie był największą budowlą w mieście."},{"type":"line","text":"Nie miał najwyższej kopuły."},{"type":"line","text":"Ale zawsze było w nim światło."},{"type":"line","text":"Na ścianach zawieszono mapy dalekich krain."},{"type":"line","text":"Na półkach leżały księgi, zwoje i puste karty dla tych, którzy dopiero mieli coś spisać."},{"type":"line","text":"Na środku znajdował się okrąg poduszek, bo Szeherezada uważała, że opowieści najlepiej czują się tam, gdzie ludzie widzą swoje twarze."},{"type":"line","text":"Przychodzili tam różni ludzie."},{"type":"line","text":"Stary rybak opowiedział o dżinie, którego uwolnił z butli, ale który sam musiał nauczyć się wdzięczności."},{"type":"line","text":"Młody kupiec opowiedział o studni na pustyni, która oddawała ludziom ich niewypowiedziane prawdy."},{"type":"line","text":"Dziewczynka opowiedziała o piasku, który pamiętał rzekę."},{"type":"line","text":"Nurek opowiedział o perle, której nie wolno było zabrać z dna morza."},{"type":"line","text":"Chłopiec opowiedział o karawanie bez śladów."},{"type":"line","text":"A każda historia, choć inna, niosła w sobie to samo ciche pytanie:"},{"type":"line","text":"co zrobisz z tym, co teraz wiesz?"},{"type":"line","text":"Szeherezada czasem siadała z tyłu i słuchała."},{"type":"line","text":"Nie poprawiała."},{"type":"line","text":"Nie przerywała."},{"type":"line","text":"Nie mówiła: „Ja opowiedziałabym to lepiej”."},{"type":"line","text":"Bo wiedziała, że opowieść, gdy trafi do świata, nie należy już tylko do tego, kto wypowiedział ją pierwszy."},{"type":"line","text":"Należy też do tych, którzy niosą ją dalej."},{"type":"line","text":"Pewnej nocy, gdy była już bardzo stara, Szeherezada poszła sama do ogrodu."},{"type":"line","text":"Księżyc wisiał nad pałacem."},{"type":"line","text":"Nie czerwony."},{"type":"line","text":"Nie złoty."},{"type":"line","text":"Zwyczajny, srebrny i spokojny."},{"type":"line","text":"Król Szahrijar odszedł z tego świata kilka lat wcześniej jako człowiek, który do końca życia próbował naprawiać to, co kiedyś zniszczył."},{"type":"line","text":"Dunjazada także była już siwowłosa, ale nadal śmiała się tak, jakby w środku zachowała dziewczynkę z pierwszej nocy."},{"type":"line","text":"Szeherezada usiadła przy fontannie."},{"type":"line","text":"Woda pluskała cicho."},{"type":"line","text":"Zamknęła oczy."},{"type":"line","text":"I wtedy usłyszała głos."},{"type":"line","text":"Nie z pałacu."},{"type":"line","text":"Nie z ogrodu."},{"type":"line","text":"Z bardzo daleka."},{"type":"line","text":"Jakby ktoś mówił ze studni ciszy."},{"type":"line","text":"— Czy to już koniec? — zapytała mała opowieść."},{"type":"line","text":"Szeherezada uśmiechnęła się."},{"type":"line","text":"— Nie — odpowiedziała. — Teraz będą mówić inni."},{"type":"line","text":"— A ty?"},{"type":"line","text":"— Ja będę słuchać."},{"type":"line","text":"Wiatr poruszył liśćmi."},{"type":"line","text":"Woda w fontannie zamigotała."},{"type":"line","text":"Przez krótką chwilę Szeherezadzie wydawało się, że widzi przed sobą Krainę Nienazwanych Historii."},{"type":"line","text":"Studnię z ciszy."},{"type":"line","text":"Starą kobietę o oczach pełnych ognisk."},{"type":"line","text":"I tysiące opowieści czekających cierpliwie, aż ktoś na świecie będzie ich potrzebował."},{"type":"line","text":"Potem obraz zniknął."},{"type":"line","text":"Został tylko ogród."},{"type":"line","text":"Księżyc."},{"type":"line","text":"I spokojny oddech nocy."},{"type":"line","text":"Następnego ranka Szeherezada poprosiła, by przyniesiono jej pustą księgę."},{"type":"line","text":"Na pierwszej stronie napisała:"},{"type":"line","text":"„Niech każda historia, którą tu zapiszecie, niesie choć jedną kroplę światła”."},{"type":"line","text":"Potem oddała księgę dzieciom z Domu Opowieści."},{"type":"line","text":"Nie poetom."},{"type":"line","text":"Nie uczonym."},{"type":"line","text":"Dzieciom."},{"type":"line","text":"Bo to one najlepiej wiedzą, kiedy historia jest prawdziwa w środku."},{"type":"line","text":"Nawet jeśli mówi o dżinach, latających koniach i miastach, których nie ma na mapie."},{"type":"line","text":"Podobno ta księga istnieje do dziś."},{"type":"line","text":"Może w dalekim pałacu."},{"type":"line","text":"Może w starej bibliotece."},{"type":"line","text":"A może wcale nie ma jej w jednym miejscu."},{"type":"line","text":"Może każda osoba, która opowiada komuś dobrą historię, dopisuje do niej jedną niewidzialną stronę."},{"type":"line","text":"Może ty też kiedyś dopiszesz swoją."},{"type":"line","text":"Wystarczy, że opowiesz coś tak, by po drugiej stronie ktoś poczuł się mniej sam."},{"type":"section","text":"— ZAKOŃCZENIE PODCASTOWE —"},{"type":"line","text":"I tak kończy się dzisiejsza opowieść: „Ostatnia opowieść Szeherezady”."},{"type":"line","text":"To historia o tym, że bajki nie są tylko ucieczką od świata."},{"type":"line","text":"Czasem są drogą z powrotem do tego, co w świecie najważniejsze."},{"type":"line","text":"Do odwagi."},{"type":"line","text":"Do prawdy."},{"type":"line","text":"Do współczucia."},{"type":"line","text":"Do światła."},{"type":"line","text":"Jeśli ta historia została z tobą choć na chwilę, zabierz jej mały kawałek do snu."},{"type":"line","text":"Może będzie to Kraina Nienazwanych Historii."},{"type":"line","text":"Może studnia z ciszy."},{"type":"line","text":"Może Dom Opowieści pełen dzieci i lamp."},{"type":"line","text":"A może jedno zdanie:"},{"type":"line","text":"dobra historia nie kończy się tam, gdzie milknie głos narratora."},{"type":"line","text":"Ona idzie dalej w tym, kto jej wysłuchał."},{"type":"line","text":"Więcej bajek, legend i tajemniczych opowieści znajdziesz na stronie 3tatata.pl."},{"type":"line","text":"Możesz nas także słuchać na Spotify i oglądać na YouTube."},{"type":"line","text":"Zostaw follow albo subskrypcję, żeby nie przegapić kolejnych historii."},{"type":"line","text":"Dobranoc — i do usłyszenia w następnej bajce."}]},{"id":17,"title":"OUTRO SERII","tag":"Outro serii","sections":[{"type":"title","text":"OUTRO SERII"},{"type":"meta","text":"3TaTaTa — Opowieści z dalekich krain"},{"type":"line","text":"I tak kończy się nasza podróż przez „Opowieści z dalekich krain”."},{"type":"line","text":"Przeszliśmy razem przez gorące pustynie, ciemne morza, pałace kalifów, tajemnicze biblioteki, ukryte miasta i miejsca, których nie znajdziesz na żadnej mapie."},{"type":"line","text":"Spotkaliśmy Sindbada, który wiedział, że każda blizna może być historią."},{"type":"line","text":"Rybaka, który uwolnił dżina, ale zamiast wszystkiego poprosił tylko o tyle, ile trzeba."},{"type":"line","text":"Aladyna, który odkrył, że magia bez mądrości może stać się pułapką."},{"type":"line","text":"Szeherezadę, która pokazała, że słowo potrafi być silniejsze niż strach."},{"type":"line","text":"Złotego ptaka, karawanę bez śladów, dziewczynkę słyszącą piasek, księgę przewracającą własne strony i perłę, której nie wolno było zabrać z głębiny."},{"type":"line","text":"Każda z tych historii była inna."},{"type":"line","text":"Jedna pachniała piaskiem."},{"type":"line","text":"Druga solą morza."},{"type":"line","text":"Trzecia starym papierem."},{"type":"line","text":"Czwarta światłem lampy w małym domu."},{"type":"line","text":"Ale wszystkie mówiły o tym samym:"},{"type":"line","text":"że odwaga nie zawsze krzyczy,"},{"type":"line","text":"mądrość nie zawsze mieszka w pałacu,"},{"type":"line","text":"a największe skarby często nie błyszczą złotem."},{"type":"line","text":"Czasem skarbem jest prawda."},{"type":"line","text":"Czasem przebaczenie."},{"type":"line","text":"Czasem umiejętność słuchania."},{"type":"line","text":"A czasem decyzja, żeby zostawić coś tam, gdzie nikogo nie skrzywdzi."},{"type":"line","text":"Jeśli któraś z tych opowieści została z tobą choć na chwilę, pozwól jej iść dalej."},{"type":"line","text":"Może wróci do ciebie kiedyś w ciszy."},{"type":"line","text":"Może przypomni się przed snem."},{"type":"line","text":"A może podpowie ci coś ważnego wtedy, gdy będziesz tego najbardziej potrzebować."},{"type":"line","text":"To jednak nie koniec naszych tajemniczych podróży."},{"type":"line","text":"Bo teraz z dalekich pustyń, mórz i pałaców wracamy bliżej."},{"type":"line","text":"Do miejsca, gdzie historia nie zawsze była bajką."},{"type":"line","text":"Do grodu, w którym kamień, flaga, herb i stare mury pamiętają więcej, niż mogłoby się wydawać."},{"type":"line","text":"Już w kolejnej serii zaprosimy cię do świata pod tytułem:"},{"type":"line","text":"„Prawdziwe Historie Grodu Białego Orła”."},{"type":"line","text":"Będą to opowieści o miejscach, ludziach, znakach i wydarzeniach, które mogły wydarzyć się naprawdę."},{"type":"line","text":"Trochę historyczne."},{"type":"line","text":"Trochę tajemnicze."},{"type":"line","text":"Trochę dumne."},{"type":"line","text":"I pełne pytań, na które warto szukać odpowiedzi."},{"type":"line","text":"Bo czasem najciekawsze historie nie leżą za siedmioma pustyniami."},{"type":"line","text":"Czasem są dużo bliżej."},{"type":"line","text":"W herbie."},{"type":"line","text":"W starym grodzie."},{"type":"line","text":"W legendzie przekazywanej z ust do ust."},{"type":"line","text":"W białym orle, który od wieków patrzy z wysokości i pamięta więcej, niż mówi."},{"type":"line","text":"Dziękujemy, że byliście z nami w serii „Opowieści z dalekich krain”."},{"type":"line","text":"Zostańcie z 3TATATA.PL."},{"type":"line","text":"Przed nami nowa podróż."},{"type":"line","text":"Nowa tajemnica."},{"type":"line","text":"I nowe historie, które już czekają, żeby ktoś je opowiedział."},{"type":"line","text":"Do usłyszenia w serii:"},{"type":"line","text":"„Prawdziwe Historie Grodu Białego Orła”."}]}];

let allStories = [...STORIES];
let currentStory = null;
let isPlaying = false;
let scrollPos = 0;
let speed = 2;
let rafId = null;
let lastTime = null;
let fontSizes = [18, 22, 26, 32, 40];
let fontIdx = 1;

function renderMenu() {
  const list = document.getElementById('story-list');
  list.innerHTML = '';
  allStories.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'story-item';
    const num = i < 10 ? String(i).padStart(2, '0') : String(i);
    el.innerHTML = `<span class="story-num">${num}</span><span class="story-item-title">${s.title}</span><span class="story-item-tag">${s.tag || ''}</span>`;
    el.addEventListener('click', () => openStory(i));
    list.appendChild(el);
  });
}

function openStory(idx) {
  currentStory = allStories[idx];
  document.getElementById('story-label').textContent = currentStory.title;
  document.getElementById('menu-screen').style.display = 'none';
  document.getElementById('prompter-screen').classList.add('active');
  renderStory();
  resetScroll();
}

function renderStory() {
  const inner = document.getElementById('scroll-inner');
  inner.innerHTML = '';
  currentStory.sections.forEach(sec => {
    const el = document.createElement('span');
    if (sec.type === 'title') { el.className = 'line-title'; el.textContent = sec.text; }
    else if (sec.type === 'meta') { el.className = 'line-meta'; el.textContent = sec.text; }
    else if (sec.type === 'section') { el.className = 'line-section'; el.textContent = sec.text; }
    else if (sec.type === 'line') { el.className = 'line-text'; el.textContent = sec.text; }
    else if (sec.type === 'sep') { el.className = 'line-sep'; }
    inner.appendChild(el);
  });
  applyFont();
}

function goBack() {
  stopPlay();
  document.getElementById('prompter-screen').classList.remove('active');
  document.getElementById('menu-screen').style.display = '';
}

function startPlay() {
  if (isPlaying) return;
  isPlaying = true; lastTime = null;
  rafId = requestAnimationFrame(scrollStep);
  updatePlayBtn();
}
function stopPlay() {
  if (!isPlaying) return;
  isPlaying = false;
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  lastTime = null; updatePlayBtn();
}
function togglePlay() { isPlaying ? stopPlay() : startPlay(); }

function scrollStep(ts) {
  if (!isPlaying) return;
  if (lastTime === null) lastTime = ts;
