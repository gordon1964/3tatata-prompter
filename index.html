  {
    "id": 11,
    "title": "Calineczka",
    "tag": "Baśń — Andersen · 3TATATA",
    "sections": [
      {
        "type": "title",
        "text": "Calineczka"
      },
      {
        "type": "meta",
        "text": "3TATATA · Na podstawie baśni Hansa Christiana Andersena"
      },
      {
        "type": "section",
        "text": "— INTRO —"
      },
      {
        "type": "line",
        "text": "3TATATA prezentuje."
      },
      {
        "type": "line",
        "text": "Calineczka."
      },
      {
        "type": "line",
        "text": "Na podstawie baśni Hansa Christiana Andersena."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i Adaptacja 3TATATA."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OPOWIEŚĆ —"
      },
      {
        "type": "line",
        "text": "Była sobie raz pewna kobieta,"
      },
      {
        "type": "line",
        "text": "która bardzo pragnęła mieć dziecko."
      },
      {
        "type": "line",
        "text": "Marzyła tylko o tym,"
      },
      {
        "type": "line",
        "text": "by w jej domu pojawił się ktoś mały i ukochany."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Pewnego dnia poszła do starej, mądrej kobiety"
      },
      {
        "type": "line",
        "text": "i opowiedziała jej o swoim marzeniu."
      },
      {
        "type": "line",
        "text": "Staruszka podała jej maleńkie ziarenko jęczmienia."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "— To nie jest zwyczajne ziarenko —"
      },
      {
        "type": "line",
        "text": "powiedziała cicho."
      },
      {
        "type": "line",
        "text": "— Posadź je w doniczce,"
      },
      {
        "type": "line",
        "text": "podlewaj troskliwie i cierpliwie czekaj."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Kobieta wsadziła ziarenko do miękkiej ziemi"
      },
      {
        "type": "line",
        "text": "i postawiła doniczkę na parapecie."
      },
      {
        "type": "line",
        "text": "Każdego ranka zaglądała do niej z nadzieją."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Aż pewnego poranka z ziemi wyrósł delikatny pęd,"
      },
      {
        "type": "line",
        "text": "a na nim pojawił się piękny pąk,"
      },
      {
        "type": "line",
        "text": "czerwony jak poranne niebo."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Kobieta pochyliła się i pocałowała jego płatki."
      },
      {
        "type": "line",
        "text": "W tej samej chwili kwiat otworzył się cichutko."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "A pośrodku, gdzie kryje się serce kwiatu,"
      },
      {
        "type": "line",
        "text": "siedziała śliczna maleńka dziewczynka."
      },
      {
        "type": "line",
        "text": "Była drobna i delikatna,"
      },
      {
        "type": "line",
        "text": "nie większa od ludzkiego kciuka."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "— Jaka ty jesteś maleńka —"
      },
      {
        "type": "line",
        "text": "szepnęła kobieta z zachwytem."
      },
      {
        "type": "line",
        "text": "— Będziesz miała na imię Calineczka."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Pokochała ją od razu."
      },
      {
        "type": "line",
        "text": "Z łupiny orzecha zrobiła jej kołyskę,"
      },
      {
        "type": "line",
        "text": "z miękkich płatków ułożyła posłanie,"
      },
      {
        "type": "line",
        "text": "a za kołderkę służył pachnący płatek róży."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "W dzień Calineczka bawiła się na stole,"
      },
      {
        "type": "line",
        "text": "pływała na tulipanowym płatku"
      },
      {
        "type": "line",
        "text": "i śmiała się cicho."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Lecz pewnej nocy, kiedy spała spokojnie,"
      },
      {
        "type": "line",
        "text": "przez otwarte okno wskoczyła"
      },
      {
        "type": "line",
        "text": "wielka, mokra ropucha."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "— To będzie idealna żona dla mojego syna —"
      },
      {
        "type": "line",
        "text": "zachrypiała i porwała Calineczkę."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Kiedy Calineczka się obudziła,"
      },
      {
        "type": "line",
        "text": "wokół widziała tylko wodę."
      },
      {
        "type": "line",
        "text": "Liść kołysał się lekko,"
      },
      {
        "type": "line",
        "text": "a brzeg był bardzo daleko."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Rybki usłyszały jej smutny płacz"
      },
      {
        "type": "line",
        "text": "i postanowiły jej pomóc."
      },
      {
        "type": "line",
        "text": "Podgryzły łodygę lilii"
      },
      {
        "type": "line",
        "text": "i liść popłynął daleko od ropuchy."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Lecz wkrótce wielki chrabąszcz"
      },
      {
        "type": "line",
        "text": "chwycił Calineczkę i uniósł na drzewo."
      },
      {
        "type": "line",
        "text": "Inne chrabąszcze oglądały ją ze wszystkich stron:"
      },
      {
        "type": "line",
        "text": "— Ma tylko dwie nogi."
      },
      {
        "type": "line",
        "text": "— Nie ma czułków."
      },
      {
        "type": "line",
        "text": "— Jest za delikatna."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "W końcu zostawił ją samą na stokrotce"
      },
      {
        "type": "line",
        "text": "i odleciał."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Lato było ciepłe,"
      },
      {
        "type": "line",
        "text": "a świat pełen traw i kwiatów."
      },
      {
        "type": "line",
        "text": "Calineczka żywiła się nektarem"
      },
      {
        "type": "line",
        "text": "i spała pod płatkami polnych kwiatów."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Tak mijały dni, aż przyszła jesień."
      },
      {
        "type": "line",
        "text": "Wiatr stał się chłodny,"
      },
      {
        "type": "line",
        "text": "kwiaty zwiędły."
      },
      {
        "type": "line",
        "text": "Dla tak małej istoty zima była groźna."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Drżąc z zimna, Calineczka wędrowała przez pole,"
      },
      {
        "type": "line",
        "text": "aż natrafiła na norkę polnej myszy."
      },
      {
        "type": "line",
        "text": "Mysz pozwoliła jej zostać na zimę."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Za ścianą mieszkał bogaty kret."
      },
      {
        "type": "line",
        "text": "Był poważny, milczący i dumny."
      },
      {
        "type": "line",
        "text": "Nie lubił słońca, kwiatów ani śpiewu ptaków."
      },
      {
        "type": "line",
        "text": "Postanowił, że Calineczka zostanie jego żoną."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Lecz serce Calineczki ścisnęło się z lęku."
      },
      {
        "type": "line",
        "text": "Nie chciała żyć pod ziemią,"
      },
      {
        "type": "line",
        "text": "z dala od światła i nieba."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Pewnego dnia w podziemnym korytarzu"
      },
      {
        "type": "line",
        "text": "zobaczyli małą jaskółkę."
      },
      {
        "type": "line",
        "text": "Leżała nieruchomo, zmarznięta i wyczerpana."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "— Martwa — powiedział kret obojętnie."
      },
      {
        "type": "line",
        "text": "— Ptaki są bezużyteczne."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Lecz kiedy wszyscy odeszli,"
      },
      {
        "type": "line",
        "text": "Calineczka wróciła do jaskółki."
      },
      {
        "type": "line",
        "text": "Okryła ją puchem, ogrzała, przyniosła wodę"
      },
      {
        "type": "line",
        "text": "i czuwała, aż ptak poruszył skrzydłem."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Jaskółka żyła."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Przez całą zimę Calineczka"
      },
      {
        "type": "line",
        "text": "opiekowała się nią w sekrecie."
      },
      {
        "type": "line",
        "text": "A kiedy przyszła wiosna,"
      },
      {
        "type": "line",
        "text": "jaskółka odzyskała siły."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "— Dziękuję ci, dobra dziewczynko —"
      },
      {
        "type": "line",
        "text": "powiedziała jaskółka."
      },
      {
        "type": "line",
        "text": "— Chodź ze mną. Polecimy daleko stąd."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Calineczka spojrzała na ciemną norę,"
      },
      {
        "type": "line",
        "text": "na podziemne tunele kreta,"
      },
      {
        "type": "line",
        "text": "a potem na promień światła"
      },
      {
        "type": "line",
        "text": "wpadający przez wąski otwór."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "— Tak — szepnęła. — Zabierz mnie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Usiadła na grzbiecie jaskółki"
      },
      {
        "type": "line",
        "text": "i ptak wzbił się wysoko."
      },
      {
        "type": "line",
        "text": "Lecieli ponad polami, lasami i jeziorami."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "W końcu dotarli do ciepłej krainy,"
      },
      {
        "type": "line",
        "text": "gdzie powietrze pachniało miodem i kwiatami,"
      },
      {
        "type": "line",
        "text": "a słońce było łagodne jak ciepła dłoń."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Jaskółka usiadła przy wielkim białym kwiecie."
      },
      {
        "type": "line",
        "text": "W jego wnętrzu stał maleńki człowiek,"
      },
      {
        "type": "line",
        "text": "lekki i piękny jak promień światła."
      },
      {
        "type": "line",
        "text": "Był królem kwiatów."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "— Jesteś najpiękniejszą dziewczynką,"
      },
      {
        "type": "line",
        "text": "jaką widziałem —"
      },
      {
        "type": "line",
        "text": "powiedział, kłaniając się z zachwytem."
      },
      {
        "type": "line",
        "text": "— Czy zechcesz zostać królową kwiatów?"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Calineczka rozejrzała się wokół."
      },
      {
        "type": "line",
        "text": "To miejsce było pełne światła, barw i ciepła."
      },
      {
        "type": "line",
        "text": "Było dokładnie takie,"
      },
      {
        "type": "line",
        "text": "o jakim marzyło jej serce."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "— Tak — odpowiedziała cicho."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Wtedy z każdego kwiatu wyszły maleńkie istoty"
      },
      {
        "type": "line",
        "text": "i przyniosły jej suknię z płatków"
      },
      {
        "type": "line",
        "text": "oraz subtelne skrzydła."
      },
      {
        "type": "line",
        "text": "A król kwiatów powiedział,"
      },
      {
        "type": "line",
        "text": "że od tej pory będzie nazywać się Maja."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "I tak Calineczka odnalazła swój dom."
      },
      {
        "type": "line",
        "text": "Po długiej drodze pełnej smutku i nadziei"
      },
      {
        "type": "line",
        "text": "trafiła w miejsce,"
      },
      {
        "type": "line",
        "text": "gdzie wszystko było łagodne, jasne i dobre."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "A jaskółka, siedząc wysoko na gałęzi,"
      },
      {
        "type": "line",
        "text": "śpiewała o jej losie"
      },
      {
        "type": "line",
        "text": "najpiękniejszą pieśń, jaką tylko znała."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OUTRO —"
      },
      {
        "type": "line",
        "text": "To była Calineczka."
      },
      {
        "type": "line",
        "text": "Na podstawie baśni Hansa Christiana Andersena."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i Adaptacja 3TATATA."
      },
      {
        "type": "line",
        "text": "Dobranoc."
      }
    ]
  },
  {
    "id": 12,
    "title": "Śpiąca Królewna",
    "tag": "Baśń — Andersen · 3TATATA",
    "sections": [
      {
        "type": "title",
        "text": "Śpiąca Królewna"
      },
      {
        "type": "meta",
        "text": "3TATATA · Na podstawie baśni Hansa Christiana Andersena"
      },
      {
        "type": "section",
        "text": "— INTRO —"
      },
      {
        "type": "line",
        "text": "3TATATA prezentuje."
      },
      {
        "type": "line",
        "text": "Śpiąca Królewna."
      },
      {
        "type": "line",
        "text": "Na podstawie baśni Hansa Christiana Andersena."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i Adaptacja 3TATATA."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OPOWIEŚĆ —"
      },
      {
        "type": "line",
        "text": "Dawno temu żył król i królowa,"
      },
      {
        "type": "line",
        "text": "którzy bardzo pragnęli mieć dziecko."
      },
      {
        "type": "line",
        "text": "Mijały lata, a ich pałac,"
      },
      {
        "type": "line",
        "text": "choć piękny i pełen światła,"
      },
      {
        "type": "line",
        "text": "wciąż pozostawał cichy."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Wreszcie ich marzenie się spełniło."
      },
      {
        "type": "line",
        "text": "Urodziła się córka tak śliczna,"
      },
      {
        "type": "line",
        "text": "że całe królestwo mówiło tylko o niej."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Na jej cześć wyprawiono wielką ucztę."
      },
      {
        "type": "line",
        "text": "Zaproszono dwanaście wróżek,"
      },
      {
        "type": "line",
        "text": "by obdarowały księżniczkę darami."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Lecz wróżek było trzynaście."
      },
      {
        "type": "line",
        "text": "Trzynastej nie zaproszono —"
      },
      {
        "type": "line",
        "text": "bo w skarbcu było tylko dwanaście złotych nakryć."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Jedna życzyła księżniczce dobroci."
      },
      {
        "type": "line",
        "text": "Druga wdzięku. Trzecia mądrości."
      },
      {
        "type": "line",
        "text": "Następne zdrowia, łagodności i odwagi."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Lecz zanim ostatnia dobra wróżka"
      },
      {
        "type": "line",
        "text": "zdążyła przemówić,"
      },
      {
        "type": "line",
        "text": "drzwi sali otworzyły się z hukiem."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "W progu stanęła trzynasta wróżka."
      },
      {
        "type": "line",
        "text": "Jej twarz była chłodna i surowa."
      },
      {
        "type": "line",
        "text": "W jej oczach tlił się gniew, który nie wygasł."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Podeszła ku kołysce i powiedziała:"
      },
      {
        "type": "line",
        "text": "— Gdy królewna skończy piętnaście lat,"
      },
      {
        "type": "line",
        "text": "ukłuje się wrzecionem i padnie martwa."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "W sali zapadła głęboka cisza."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Wtedy wystąpiła dwunasta wróżka."
      },
      {
        "type": "line",
        "text": "— Królewna nie umrze —"
      },
      {
        "type": "line",
        "text": "powiedziała cicho."
      },
      {
        "type": "line",
        "text": "— Zapadnie tylko w głęboki sen,"
      },
      {
        "type": "line",
        "text": "który potrwa sto lat."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Król kazał usunąć z całego królestwa"
      },
      {
        "type": "line",
        "text": "wszystkie wrzeciona."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "A królewna rosła."
      },
      {
        "type": "line",
        "text": "Była dobra, pogodna i łagodna."
      },
      {
        "type": "line",
        "text": "Kiedy się uśmiechała,"
      },
      {
        "type": "line",
        "text": "ludzie na moment zapominali o troskach."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Nadszedł dzień piętnastych urodzin królewny."
      },
      {
        "type": "line",
        "text": "Ciekawa świata jak nigdy wcześniej,"
      },
      {
        "type": "line",
        "text": "postanowiła sama przejść się po zamku."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Szła przez długie korytarze,"
      },
      {
        "type": "line",
        "text": "zaglądała do komnat."
      },
      {
        "type": "line",
        "text": "W końcu odnalazła wąskie schody"
      },
      {
        "type": "line",
        "text": "prowadzące do starej wieżyczki."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Drzwi były zamknięte, lecz klucz tkwił w zamku."
      },
      {
        "type": "line",
        "text": "Królewna przekręciła go i weszła."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "W maleńkim pokoiku siedziała stara kobieta."
      },
      {
        "type": "line",
        "text": "Nie wiedziała nic o zakazie"
      },
      {
        "type": "line",
        "text": "i spokojnie przędła len na wrzecionie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "— Dzień dobry, babciu — powiedziała królewna."
      },
      {
        "type": "line",
        "text": "— Co robisz?"
      },
      {
        "type": "line",
        "text": "— Przędę. Chcesz spróbować?"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Królewna nigdy wcześniej nie widziała wrzeciona."
      },
      {
        "type": "line",
        "text": "Zaciekawiona wyciągnęła rękę."
      },
      {
        "type": "line",
        "text": "W tej samej chwili ukłuła się."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Ledwie poczuła drobne ukłucie,"
      },
      {
        "type": "line",
        "text": "opadły jej powieki."
      },
      {
        "type": "line",
        "text": "Królewna zapadła w głęboki sen."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "A wraz z nią zasnął cały pałac."
      },
      {
        "type": "line",
        "text": "Zasnęli dworzanie, zasnęli strażnicy."
      },
      {
        "type": "line",
        "text": "Konie pochyliły łby. Psy ucichły."
      },
      {
        "type": "line",
        "text": "Ogień na palenisku przygasł."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Wokół zamku zaczął rosnąć cierniowy żywopłot."
      },
      {
        "type": "line",
        "text": "Rósł coraz wyżej i gęściej,"
      },
      {
        "type": "line",
        "text": "aż zasłonił mury i wieże."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Wielu książąt próbowało"
      },
      {
        "type": "line",
        "text": "przebić się przez ciernie."
      },
      {
        "type": "line",
        "text": "Lecz nikt nie mógł przejść."
      },
      {
        "type": "line",
        "text": "A zamek wciąż spał."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Sto lat płynęło cicho,"
      },
      {
        "type": "line",
        "text": "jak sen, w którym nie czuje się czasu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Pewnego dnia przybył młody książę."
      },
      {
        "type": "line",
        "text": "Kiedy zbliżył się do żywopłotu,"
      },
      {
        "type": "line",
        "text": "ciernie rozsunęły się łagodnie,"
      },
      {
        "type": "line",
        "text": "przemieniając w kwitnącą drogę."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Wszedł do środka."
      },
      {
        "type": "line",
        "text": "Wszystko było tak ciche,"
      },
      {
        "type": "line",
        "text": "jakby świat wstrzymał oddech."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "W salach spała służba,"
      },
      {
        "type": "line",
        "text": "na schodach drzemał dwór."
      },
      {
        "type": "line",
        "text": "Książę szedł dalej,"
      },
      {
        "type": "line",
        "text": "aż wspiął się na wieżyczkę"
      },
      {
        "type": "line",
        "text": "i odnalazł mały pokój."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Tam, na posłaniu, spała królewna."
      },
      {
        "type": "line",
        "text": "Była tak piękna i spokojna,"
      },
      {
        "type": "line",
        "text": "jakby zasnęła zaledwie przed chwilą."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Książę pochylił się nad nią"
      },
      {
        "type": "line",
        "text": "i pocałował ją delikatnie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "W tej samej chwili minęło sto lat."
      },
      {
        "type": "line",
        "text": "Królewna otworzyła oczy."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Spojrzała na księcia łagodnie, bez lęku,"
      },
      {
        "type": "line",
        "text": "jakby znała go od dawna"
      },
      {
        "type": "line",
        "text": "z najpiękniejszego snu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Wraz z nią obudził się cały pałac."
      },
      {
        "type": "line",
        "text": "Konie zarżały, psy zaszczekały."
      },
      {
        "type": "line",
        "text": "Ogień znów rozbłysł na paleniskach."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Wkrótce odbyło się wesele."
      },
      {
        "type": "line",
        "text": "A zamek, który przez sto lat spał"
      },
      {
        "type": "line",
        "text": "ukryty za cierniami,"
      },
      {
        "type": "line",
        "text": "znów napełnił się muzyką, światłem i ciepłem."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "I tak żyli długo i szczęśliwie."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OUTRO —"
      },
      {
        "type": "line",
        "text": "To była Śpiąca Królewna."
      },
      {
        "type": "line",
        "text": "Na podstawie baśni Hansa Christiana Andersena."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i Adaptacja 3TATATA."
      },
      {
        "type": "line",
        "text": "Dobranoc."
      }
    ]
  },
  {
    "id": 13,
    "title": "Syrenka Warszawska",
    "tag": "Legenda polska",
    "sections": [
      {
        "type": "title",
        "text": "Syrenka Warszawska"
      },
      {
        "type": "meta",
        "text": "3TaTaTa · Legenda polska"
      },
      {
        "type": "section",
        "text": "— INTRO —"
      },
      {
        "type": "line",
        "text": "3TaTaTa prezentuje."
      },
      {
        "type": "line",
        "text": "Syrenka Warszawska."
      },
      {
        "type": "line",
        "text": "Na podstawie klasycznej polskiej legendy."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i opracowanie — 3TaTaTa."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OPOWIEŚĆ —"
      },
      {
        "type": "line",
        "text": "Dawno temu, gdy Wisła płynęła szeroko i spokojnie,"
      },
      {
        "type": "line",
        "text": "w miejscu dzisiejszej Warszawy"
      },
      {
        "type": "line",
        "text": "nie było jeszcze wielkiego miasta."
      },
      {
        "type": "line",
        "text": "Były tylko rybackie chaty, drewniane pomosty"
      },
      {
        "type": "line",
        "text": "i ogniska rozświetlające wieczorami ciemność nad wodą."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Pewnego wieczoru, gdy mgła zaczęła unosić się nad wodą,"
      },
      {
        "type": "line",
        "text": "rybacy ukryli się wśród trzcin i czekali."
      },
      {
        "type": "line",
        "text": "Z głębi wynurzyła się postać"
      },
      {
        "type": "line",
        "text": "dziewczyny o długich, jasnych włosach,"
      },
      {
        "type": "line",
        "text": "a zamiast nóg miała srebrzysty rybi ogon."
      },
      {
        "type": "line",
        "text": "Była to syrena."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Jej głos był miękki, czysty i przejmująco piękny."
      },
      {
        "type": "line",
        "text": "W tej melodii było coś dobrego,"
      },
      {
        "type": "line",
        "text": "coś tęsknego i coś tak pięknego,"
      },
      {
        "type": "line",
        "text": "że nikt nie miał odwagi się poruszyć."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Syrena uwalniała ryby z sieci rybaków."
      },
      {
        "type": "line",
        "text": "Robiła to delikatnie,"
      },
      {
        "type": "line",
        "text": "jakby chciała ocalić każde małe życie."
      },
      {
        "type": "line",
        "text": "W jej ruchach nie było gniewu."
      },
      {
        "type": "line",
        "text": "Była tylko troska o rzekę i jej stworzenia."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Pewnego dnia chciwy handlarz"
      },
      {
        "type": "line",
        "text": "zastawił na nią podstępną pułapkę."
      },
      {
        "type": "line",
        "text": "Zarzucił na nią ciężką sieć,"
      },
      {
        "type": "line",
        "text": "wyciągnął ją na brzeg"
      },
      {
        "type": "line",
        "text": "i zamknął w drewnianej szopie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Kiedy mieszkańcy osady dowiedzieli się, co zrobił,"
      },
      {
        "type": "line",
        "text": "ogarnął ich gniew."
      },
      {
        "type": "line",
        "text": "Zebrali kilku towarzyszy i uwolnili syrenę."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Kiedy tylko dotknęła wody,"
      },
      {
        "type": "line",
        "text": "syrena uniosła się lekko ponad falami."
      },
      {
        "type": "line",
        "text": "W jednej dłoni trzymała miecz,"
      },
      {
        "type": "line",
        "text": "w drugiej okrągłą tarczę."
      },
      {
        "type": "line",
        "text": "Jej twarz była odważna, dumna"
      },
      {
        "type": "line",
        "text": "i gotowa do obrony tych,"
      },
      {
        "type": "line",
        "text": "którzy okazali jej serce."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Powiedziała, że od tej pory"
      },
      {
        "type": "line",
        "text": "będzie strzec ludzi mieszkających nad Wisłą."
      },
      {
        "type": "line",
        "text": "Będzie czuwać nad ich domami,"
      },
      {
        "type": "line",
        "text": "łodziami, rodzinami"
      },
      {
        "type": "line",
        "text": "i nad samym miastem,"
      },
      {
        "type": "line",
        "text": "które kiedyś tutaj wyrośnie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "I właśnie dlatego Syrenka Warszawska"
      },
      {
        "type": "line",
        "text": "do dziś jest jednym z najważniejszych"
      },
      {
        "type": "line",
        "text": "symboli stolicy —"
      },
      {
        "type": "line",
        "text": "znakiem odwagi, wolności"
      },
      {
        "type": "line",
        "text": "i wierności temu, co naprawdę ważne."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OUTRO —"
      },
      {
        "type": "line",
        "text": "To była Syrenka Warszawska."
      },
      {
        "type": "line",
        "text": "Na podstawie klasycznej polskiej legendy."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i opracowanie — 3TaTaTa."
      },
      {
        "type": "line",
        "text": "Dobranoc."
      }
    ]
  },
  {
    "id": 14,
    "title": "Brzydkie Kaczątko",
    "tag": "Baśń — Andersen · 3TATATA",
    "sections": [
      {
        "type": "title",
        "text": "Brzydkie Kaczątko"
      },
      {
        "type": "meta",
        "text": "3TATATA · Na podstawie baśni Hansa Christiana Andersena"
      },
      {
        "type": "section",
        "text": "— INTRO —"
      },
      {
        "type": "line",
        "text": "3TATATA prezentuje."
      },
      {
        "type": "line",
        "text": "Brzydkie Kaczątko."
      },
      {
        "type": "line",
        "text": "Na podstawie baśni Hansa Christiana Andersena."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i Adaptacja 3TATATA."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OPOWIEŚĆ —"
      },
      {
        "type": "line",
        "text": "Było lato."
      },
      {
        "type": "line",
        "text": "Zboże stało wysokie i złote,"
      },
      {
        "type": "line",
        "text": "owies kołysał się lekko na wietrze."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Nad stawem, pośród zielonych liści łopianu,"
      },
      {
        "type": "line",
        "text": "kaczka siedziała cierpliwie na gnieździe."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Jedno po drugim pękały białe skorupki,"
      },
      {
        "type": "line",
        "text": "a z nich wychylały się małe, żółte kaczątka."
      },
      {
        "type": "line",
        "text": "Rozglądały się po świecie z zaciekawieniem."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Tylko jedno jajko wciąż leżało nieruchomo."
      },
      {
        "type": "line",
        "text": "Było największe ze wszystkich."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "W końcu i ono pękło."
      },
      {
        "type": "line",
        "text": "Ze środka wyszło pisklę"
      },
      {
        "type": "line",
        "text": "większe od rodzeństwa,"
      },
      {
        "type": "line",
        "text": "szare, niezdarne i dziwnie poważne."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "— Ależ ty jesteś duże — mruknęła kaczka."
      },
      {
        "type": "line",
        "text": "— I zupełnie nie podobne do reszty."
      },
      {
        "type": "line",
        "text": "Zobaczmy jutro, jak radzisz sobie w wodzie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Nazajutrz szare kaczątko wskoczyło do stawu"
      },
      {
        "type": "line",
        "text": "i popłynęło równie lekko jak reszta."
      },
      {
        "type": "line",
        "text": "— No proszę — powiedziała matka."
      },
      {
        "type": "line",
        "text": "— To jednak moje dziecko."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Lecz gdy wrócili na podwórze,"
      },
      {
        "type": "line",
        "text": "zaczęły się kłopoty."
      },
      {
        "type": "line",
        "text": "Kury, kaczki, gęsi —"
      },
      {
        "type": "line",
        "text": "wszystkie przyglądały się szaremu pisklęciu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "— Jakie ono brzydkie — gdakały kury."
      },
      {
        "type": "line",
        "text": "— Jakie wielkie i niezgrabne — syczały gęsi."
      },
      {
        "type": "line",
        "text": "— Nie pasuje tutaj — mruczały stare kaczki."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Nawet rodzeństwo zaczęło odsuwać się na bok."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Brzydkie kaczątko schylało głowę"
      },
      {
        "type": "line",
        "text": "i odchodziło w najcichszy kąt podwórza."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Pewnego wieczoru postanowiło odejść."
      },
      {
        "type": "line",
        "text": "Przecisnęło się przez dziurę w płocie"
      },
      {
        "type": "line",
        "text": "i pobiegło przed siebie,"
      },
      {
        "type": "line",
        "text": "aż dotarło do dzikiego bagna."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Tam spotkało dzikie kaczki."
      },
      {
        "type": "line",
        "text": "— Jesteś bardzo brzydkie — powiedziały."
      },
      {
        "type": "line",
        "text": "— Możesz tu zostać,"
      },
      {
        "type": "line",
        "text": "bylebyś nie chciało żenić się z kimś z naszej rodziny."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Pewnego dnia nad bagnem rozległ się huk."
      },
      {
        "type": "line",
        "text": "Nadlecieli myśliwi."
      },
      {
        "type": "line",
        "text": "Brzydkie kaczątko ze strachu"
      },
      {
        "type": "line",
        "text": "przywarło do ziemi i zamknęło oczy."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Wielki pies stanął tuż obok niego."
      },
      {
        "type": "line",
        "text": "Spojrzał, obnażył zęby,"
      },
      {
        "type": "line",
        "text": "ale po chwili pobiegł dalej."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "— Nawet pies nie chciał mnie tknąć —"
      },
      {
        "type": "line",
        "text": "pomyślało kaczątko."
      },
      {
        "type": "line",
        "text": "— Widocznie jestem tak brzydkie,"
      },
      {
        "type": "line",
        "text": "że nikomu nie jestem potrzebne."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Pewnego wieczoru zobaczyło na niebie"
      },
      {
        "type": "line",
        "text": "wielkie, piękne ptaki o długich szyjach."
      },
      {
        "type": "line",
        "text": "Ich lot był spokojny, mocny i królewski."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Kaczątko patrzyło za nimi jak zaczarowane."
      },
      {
        "type": "line",
        "text": "Serce zabiło mu szybciej."
      },
      {
        "type": "line",
        "text": "Wyciągnęło szyję ku górze"
      },
      {
        "type": "line",
        "text": "i wydało z siebie dziwny dźwięk,"
      },
      {
        "type": "line",
        "text": "którego samo nie rozumiało."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Zima była ciężka."
      },
      {
        "type": "line",
        "text": "Kaczątko pływało w małej przerębli."
      },
      {
        "type": "line",
        "text": "Z każdym dniem otwór robił się coraz mniejszy."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Pewnego ranka opadło z sił."
      },
      {
        "type": "line",
        "text": "Wtedy zauważył je chłop z pobliskiej chaty."
      },
      {
        "type": "line",
        "text": "Wziął je pod pachę i zaniósł do domu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Kaczątko bardzo się przestraszyło."
      },
      {
        "type": "line",
        "text": "Kiedy próbowało uciekać,"
      },
      {
        "type": "line",
        "text": "wpadło do mleka, potem do maselnicy,"
      },
      {
        "type": "line",
        "text": "a na końcu prosto w mąkę."
      },
      {
        "type": "line",
        "text": "Wybiegło przez otwarte drzwi na mróz."
      },
      {
        "type": "line",
        "text": "I znów było samo."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Przetrwało zimę w sitowiu,"
      },
      {
        "type": "line",
        "text": "skulone, ciche i bardzo zmęczone."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Ale z czasem śnieg zaczął topnieć."
      },
      {
        "type": "line",
        "text": "Na gałęziach pojawiły się pierwsze pąki."
      },
      {
        "type": "line",
        "text": "Nadchodziła wiosna."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Kaczątko poczuło w skrzydłach nową siłę."
      },
      {
        "type": "line",
        "text": "Wzbiło się w powietrze i leciało długo,"
      },
      {
        "type": "line",
        "text": "aż dotarło do ogrodu pełnego światła."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Na tafli stawu płynęły trzy białe ptaki."
      },
      {
        "type": "line",
        "text": "Były to te same niezwykłe stworzenia,"
      },
      {
        "type": "line",
        "text": "które jesienią widziało na niebie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Kaczątko zsunęło się na wodę"
      },
      {
        "type": "line",
        "text": "i popłynęło ku nim."
      },
      {
        "type": "line",
        "text": "Schyliło głowę, oczekując uderzenia."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Lecz w tej samej chwili"
      },
      {
        "type": "line",
        "text": "zobaczyło w wodzie własne odbicie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Nie było już ciężkim, szarym pisklęciem."
      },
      {
        "type": "line",
        "text": "W tafli stawu ujrzało"
      },
      {
        "type": "line",
        "text": "smukłego, białego łabędzia."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Tak długo było wyśmiewane,"
      },
      {
        "type": "line",
        "text": "tak długo żyło w chłodzie i samotności,"
      },
      {
        "type": "line",
        "text": "że nie zauważyło, kiedy wyrosły mu"
      },
      {
        "type": "line",
        "text": "śnieżne pióra i piękna, długa szyja."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Trzy łabędzie podpłynęły do niego łagodnie"
      },
      {
        "type": "line",
        "text": "i dotknęły go dziobami,"
      },
      {
        "type": "line",
        "text": "jakby witały kogoś bliskiego."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "— Patrzcie! Jest nowy łabędź! I jaki piękny! —"
      },
      {
        "type": "line",
        "text": "zawołały dzieci na brzegu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Młody łabędź czuł tylko wdzięczność"
      },
      {
        "type": "line",
        "text": "i ciche zdumienie,"
      },
      {
        "type": "line",
        "text": "że po tylu smutkach"
      },
      {
        "type": "line",
        "text": "przyszła wreszcie chwila spokoju."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "I płynął dalej po jasnej wodzie,"
      },
      {
        "type": "line",
        "text": "lekki i spokojny,"
      },
      {
        "type": "line",
        "text": "wśród swoich."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OUTRO —"
      },
      {
        "type": "line",
        "text": "To było Brzydkie Kaczątko."
      },
      {
        "type": "line",
        "text": "Na podstawie baśni Hansa Christiana Andersena."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i Adaptacja 3TATATA."
      },
      {
        "type": "line",
        "text": "Dobranoc."
      }
    ]
  },
  {
    "id": 15,
    "title": "Choinka",
    "tag": "Baśń — Andersen · 3TATATA",
    "sections": [
      {
        "type": "title",
        "text": "Choinka"
      },
      {
        "type": "meta",
        "text": "3TATATA · Na podstawie baśni Hansa Christiana Andersena"
      },
      {
        "type": "section",
        "text": "— INTRO —"
      },
      {
        "type": "line",
        "text": "3TATATA prezentuje."
      },
      {
        "type": "line",
        "text": "Choinka."
      },
      {
        "type": "line",
        "text": "Na podstawie baśni Hansa Christiana Andersena."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i Adaptacja 3TATATA."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OPOWIEŚĆ —"
      },
      {
        "type": "line",
        "text": "Głęboko w lesie,"
      },
      {
        "type": "line",
        "text": "tam gdzie promienie słońca spływały po mchu,"
      },
      {
        "type": "line",
        "text": "rosła mała choinka."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Stała wśród starszych drzew,"
      },
      {
        "type": "line",
        "text": "ale ona sama nie potrafiła"
      },
      {
        "type": "line",
        "text": "cieszyć się tym, co miała."
      },
      {
        "type": "line",
        "text": "Wciąż myślała o tym, by urosnąć szybciej."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "— Och, gdybym była już duża —"
      },
      {
        "type": "line",
        "text": "wzdychała w duchu."
      },
      {
        "type": "line",
        "text": "— Wtedy dopiero zaczęłoby się prawdziwe życie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Stare świerki szumiały łagodnie,"
      },
      {
        "type": "line",
        "text": "jakby chciały jej powiedzieć,"
      },
      {
        "type": "line",
        "text": "że życie dzieje się właśnie teraz."
      },
      {
        "type": "line",
        "text": "Ale młoda choinka nie umiała tego pojąć."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Pewien wróbel opowiedział jej pewnego ranka:"
      },
      {
        "type": "line",
        "text": "— Widziałem takie drzewa w oknach domów."
      },
      {
        "type": "line",
        "text": "Ozdabiano je świecami, złotem i gwiazdami."
      },
      {
        "type": "line",
        "text": "Wszyscy patrzyli na nie z zachwytem."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Serce choinki zadrżało."
      },
      {
        "type": "line",
        "text": "— Tego właśnie chcę —"
      },
      {
        "type": "line",
        "text": "Chcę wejść do domu, do światła i blasku."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Pewnego chłodnego ranka do lasu przybyli ludzie."
      },
      {
        "type": "line",
        "text": "— Ta będzie idealna — powiedział jeden z nich."
      },
      {
        "type": "line",
        "text": "— Jest zgrabna i równa."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Choinka poczuła strach i dumę zarazem."
      },
      {
        "type": "line",
        "text": "Ostrze siekiery uderzyło w pień."
      },
      {
        "type": "line",
        "text": "Po chwili ziemia zniknęła spod jej korzeni."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Wnet wniesiono ją do ciepłego domu."
      },
      {
        "type": "line",
        "text": "Pachniało ciastem, woskiem i pomarańczami."
      },
      {
        "type": "line",
        "text": "Dzieci biegały z radością."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "— Ach, więc to jest to —"
      },
      {
        "type": "line",
        "text": "pomyślała choinka."
      },
      {
        "type": "line",
        "text": "— To właśnie miało być moje prawdziwe życie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Na gałązkach zawisły ozdoby i łańcuchy."
      },
      {
        "type": "line",
        "text": "Na samym czubku umieszczono gwiazdę,"
      },
      {
        "type": "line",
        "text": "która lśniła najjaśniej ze wszystkiego."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Wieczorem zapalono światła."
      },
      {
        "type": "line",
        "text": "Pokój rozjaśnił się złotym blaskiem."
      },
      {
        "type": "line",
        "text": "Dzieci klasnęły w dłonie,"
      },
      {
        "type": "line",
        "text": "śmiały się i tańczyły wokół niej."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Choinka czuła, że spełniło się wszystko,"
      },
      {
        "type": "line",
        "text": "o czym marzyła."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Ale ta chwila trwała krótko."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Następnego dnia świece już nie płonęły."
      },
      {
        "type": "line",
        "text": "Potem zdjęto z niej ozdoby."
      },
      {
        "type": "line",
        "text": "Choinka czekała,"
      },
      {
        "type": "line",
        "text": "przekonana, że wróci blask i zachwyt."
      },
      {
        "type": "line",
        "text": "Lecz nikt nie wrócił."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Wyniesiono ją na strych."
      },
      {
        "type": "line",
        "text": "Było tam ciemno, chłodno i cicho."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Choinka stała sama."
      },
      {
        "type": "line",
        "text": "Teraz miała dużo czasu na myślenie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Wspominała las —"
      },
      {
        "type": "line",
        "text": "zapach mokrej ziemi, śpiew ptaków,"
      },
      {
        "type": "line",
        "text": "śnieg osiadający na gałązkach."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Po raz pierwszy zrozumiała,"
      },
      {
        "type": "line",
        "text": "jak wiele miała i jak mało z tego widziała."
      },
      {
        "type": "line",
        "text": "Gdy była w lesie, chciała być gdzie indziej."
      },
      {
        "type": "line",
        "text": "Gdy trafiła do blasku,"
      },
      {
        "type": "line",
        "text": "sądziła, że potrwa wiecznie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "W końcu wyniesiono ją ze strychu na podwórze."
      },
      {
        "type": "line",
        "text": "Była sucha, krucha i zmęczona."
      },
      {
        "type": "line",
        "text": "Ludzie połamali jej gałęzie i wrzucili do ognia."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Płomień objął drewno szybko."
      },
      {
        "type": "line",
        "text": "A choinka, znikając w cieple i iskrach,"
      },
      {
        "type": "line",
        "text": "myślała o lesie."
      },
      {
        "type": "line",
        "text": "O słońcu między gałęziami."
      },
      {
        "type": "line",
        "text": "O ptakach. O śniegu."
      },
      {
        "type": "line",
        "text": "O wszystkim, czego kiedyś nie umiała docenić."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "I może właśnie w tej ostatniej chwili"
      },
      {
        "type": "line",
        "text": "zrozumiała najwięcej:"
      },
      {
        "type": "line",
        "text": "że szczęście nie zawsze czeka daleko przed nami."
      },
      {
        "type": "line",
        "text": "Czasem stoi tuż obok, ciche i zwyczajne."
      },
      {
        "type": "line",
        "text": "Trzeba tylko umieć je zauważyć,"
      },
      {
        "type": "line",
        "text": "zanim minie."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OUTRO —"
      },
      {
        "type": "line",
        "text": "To była Choinka."
      },
      {
        "type": "line",
        "text": "Na podstawie baśni Hansa Christiana Andersena."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i Adaptacja 3TATATA."
      },
      {
        "type": "line",
        "text": "Dobranoc."
      }
    ]
  },
  {
    "id": 16,
    "title": "Dzielny Cynowy Żołnierzyk",
    "tag": "Baśń — Andersen · 3TATATA",
    "sections": [
      {
        "type": "title",
        "text": "Dzielny Cynowy Żołnierzyk"
      },
      {
        "type": "meta",
        "text": "3TATATA · Na podstawie baśni Hansa Christiana Andersena"
      },
      {
        "type": "section",
        "text": "— INTRO —"
      },
      {
        "type": "line",
        "text": "3TATATA prezentuje."
      },
      {
        "type": "line",
        "text": "Dzielny Cynowy Żołnierzyk."
      },
      {
        "type": "line",
        "text": "Na podstawie baśni Hansa Christiana Andersena."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i Adaptacja 3TATATA."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OPOWIEŚĆ —"
      },
      {
        "type": "line",
        "text": "W pewnym pokoju stało pudełko"
      },
      {
        "type": "line",
        "text": "z dwudziestoma pięcioma cynowymi żołnierzykami."
      },
      {
        "type": "line",
        "text": "Wszyscy byli prości, dumni, wyprostowani."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "A jednak jeden z nich różnił się od pozostałych."
      },
      {
        "type": "line",
        "text": "Miał tylko jedną nogę."
      },
      {
        "type": "line",
        "text": "Odlano go jako ostatniego"
      },
      {
        "type": "line",
        "text": "i cyny starczyło już tylko na tyle."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Stał jednak równie prosto jak inni."
      },
      {
        "type": "line",
        "text": "Wiedział, że nie wolno mu się chwiać."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Obok zabawek stała śliczna tancerka z papieru."
      },
      {
        "type": "line",
        "text": "Stała na jednej nodze,"
      },
      {
        "type": "line",
        "text": "lekka jak płatek i jasna jak poranek."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Cynowy żołnierzyk spojrzał na nią"
      },
      {
        "type": "line",
        "text": "i od razu pomyślał,"
      },
      {
        "type": "line",
        "text": "że nigdy nie widział nikogo równie delikatnego."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Ponieważ tancerka stała na jednej nodze,"
      },
      {
        "type": "line",
        "text": "wydało mu się, że i ona ma tylko jedną."
      },
      {
        "type": "line",
        "text": "— Jest taka jak ja — pomyślał."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Nie powiedział tego głośno,"
      },
      {
        "type": "line",
        "text": "bo cynowi żołnierze nie mówią o uczuciach."
      },
      {
        "type": "line",
        "text": "Ale od tej chwili patrzył tylko na nią."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Nagle z pudełka wyskoczył czarny diabełek."
      },
      {
        "type": "line",
        "text": "— Cynowy żołnierzyku —"
      },
      {
        "type": "line",
        "text": "nie patrz tam, gdzie nie trzeba."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Ale żołnierzyk stał prosto i patrzył dalej."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Nad ranem żołnierzyk wypadł przez okno"
      },
      {
        "type": "line",
        "text": "prosto na bruk."
      },
      {
        "type": "line",
        "text": "Dwaj chłopcy zrobili mu łódkę z gazety"
      },
      {
        "type": "line",
        "text": "i puścili ją do rynsztoka."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Cynowy żołnierzyk nie drżał."
      },
      {
        "type": "line",
        "text": "Choć łódka kołysała się gwałtownie,"
      },
      {
        "type": "line",
        "text": "stał prosto, jak przystało na żołnierza."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Łódka wpłynęła do ciemnego kanału."
      },
      {
        "type": "line",
        "text": "Z mroku wypłynął wielki szczur kanałowy."
      },
      {
        "type": "line",
        "text": "— Paszport! Kto pozwolił ci tu płynąć?"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Żołnierzyk milczał."
      },
      {
        "type": "line",
        "text": "Łódka płynęła dalej."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Nagle kanał się skończył."
      },
      {
        "type": "line",
        "text": "Łódka wypadła do większego strumienia."
      },
      {
        "type": "line",
        "text": "Papier nasiąkał z każdą chwilą."
      },
      {
        "type": "line",
        "text": "W końcu łódka rozpadła się,"
      },
      {
        "type": "line",
        "text": "a wielka ryba połknęła żołnierzyka."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "W brzuchu ryby panowała cisza i ciemność."
      },
      {
        "type": "line",
        "text": "Żołnierzyk trwał nieruchomo,"
      },
      {
        "type": "line",
        "text": "zachowując godność w każdej sytuacji."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Ryba została złowiona i sprzedana."
      },
      {
        "type": "line",
        "text": "Gdy ją rozcięto,"
      },
      {
        "type": "line",
        "text": "kucharka zawołała ze zdumieniem:"
      },
      {
        "type": "line",
        "text": "— Co tu robi ten żołnierzyk?"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Wytarła go i zaniosła do pokoju dzieci."
      },
      {
        "type": "line",
        "text": "A tam, w tym samym pokoju,"
      },
      {
        "type": "line",
        "text": "przy tym samym zamku,"
      },
      {
        "type": "line",
        "text": "znów stała tancerka."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Żołnierzyk wrócił dokładnie tam, skąd wyruszył."
      },
      {
        "type": "line",
        "text": "Po wodzie, kanale i brzuchu ryby"
      },
      {
        "type": "line",
        "text": "znów ją zobaczył."
      },
      {
        "type": "line",
        "text": "I może właśnie wtedy był najszczęśliwszy."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Nie zdążył jednak nacieszyć się chwilą."
      },
      {
        "type": "line",
        "text": "Nagle jedno z dzieci"
      },
      {
        "type": "line",
        "text": "wrzuciło go prosto do pieca."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "W piecu płonął jasny ogień."
      },
      {
        "type": "line",
        "text": "Gorąco było ogromne."
      },
      {
        "type": "line",
        "text": "Mimo to cynowy żołnierzyk stał prosto."
      },
      {
        "type": "line",
        "text": "Oczy skierował ku tancerce."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "W tej samej chwili przeciąg"
      },
      {
        "type": "line",
        "text": "porwał papierową tancerkę."
      },
      {
        "type": "line",
        "text": "Pofrunęła prosto do pieca,"
      },
      {
        "type": "line",
        "text": "obok żołnierzyka."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Przez krótką chwilę byli razem pośród ognia."
      },
      {
        "type": "line",
        "text": "Potem płomień pochłonął ją całą."
      },
      {
        "type": "line",
        "text": "Żołnierzyk topniał wolniej."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Kiedy nazajutrz sprzątano piec,"
      },
      {
        "type": "line",
        "text": "znaleziono tylko małe cynowe serce."
      },
      {
        "type": "line",
        "text": "Po tancerce pozostała czarna cekinowa ozdoba."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Tak zakończyła się historia"
      },
      {
        "type": "line",
        "text": "dzielnego cynowego żołnierzyka —"
      },
      {
        "type": "line",
        "text": "małego, cichego i wiernego."
      },
      {
        "type": "line",
        "text": "Nie mówił wiele, nie skarżył się na los"
      },
      {
        "type": "line",
        "text": "i nie cofnął się przed niczym na swej drodze."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OUTRO —"
      },
      {
        "type": "line",
        "text": "To był Dzielny Cynowy Żołnierzyk."
      },
      {
        "type": "line",
        "text": "Na podstawie baśni Hansa Christiana Andersena."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i Adaptacja 3TATATA."
      },
      {
        "type": "line",
        "text": "Dobranoc."
      }
    ]
  },
  {
    "id": 17,
    "title": "Księżniczka na Ziarnku Grochu",
    "tag": "Baśń — Andersen · 3TATATA",
    "sections": [
      {
        "type": "title",
        "text": "Księżniczka na Ziarnku Grochu"
      },
      {
        "type": "meta",
        "text": "3TATATA · Na podstawie baśni Hansa Christiana Andersena"
      },
      {
        "type": "section",
        "text": "— INTRO —"
      },
      {
        "type": "line",
        "text": "3TATATA prezentuje."
      },
      {
        "type": "line",
        "text": "Księżniczka na Ziarnku Grochu."
      },
      {
        "type": "line",
        "text": "Na podstawie baśni Hansa Christiana Andersena."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i Adaptacja 3TATATA."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OPOWIEŚĆ —"
      },
      {
        "type": "line",
        "text": "Pewnego razu żył książę,"
      },
      {
        "type": "line",
        "text": "który bardzo chciał się ożenić."
      },
      {
        "type": "line",
        "text": "Pragnął znaleźć prawdziwą księżniczkę —"
      },
      {
        "type": "line",
        "text": "taką, w której sercu będzie dobroć i szczerość."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Jeździł po wielu krajach,"
      },
      {
        "type": "line",
        "text": "odwiedzał pałace, zamki i miasta."
      },
      {
        "type": "line",
        "text": "Lecz za każdym razem coś budziło jego wątpliwości."
      },
      {
        "type": "line",
        "text": "W końcu wrócił do domu smutny i zamyślony."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Pewnej nocy rozpętała się straszliwa burza."
      },
      {
        "type": "line",
        "text": "Wiatr uderzał w okiennice,"
      },
      {
        "type": "line",
        "text": "deszcz lał się strumieniami."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Właśnie wtedy ktoś zapukał do bramy."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Na dziedzińcu stała młoda dziewczyna."
      },
      {
        "type": "line",
        "text": "Była przemoczona do suchej nitki."
      },
      {
        "type": "line",
        "text": "Mimo to stała prosto i spokojnie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "— Jestem księżniczką —"
      },
      {
        "type": "line",
        "text": "powiedziała cicho."
      },
      {
        "type": "line",
        "text": "— Proszę o schronienie na tę noc."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Gdy gościni ogrzała się przy ogniu,"
      },
      {
        "type": "line",
        "text": "królowa postanowiła ją sprawdzić."
      },
      {
        "type": "line",
        "text": "Nie powiedziała o tym nikomu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Udała się do komnaty gościnnej"
      },
      {
        "type": "line",
        "text": "i na samym spodzie łóżka"
      },
      {
        "type": "line",
        "text": "położyła maleńkie ziarnko grochu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Potem kazała przynieść materace —"
      },
      {
        "type": "line",
        "text": "jeden po drugim."
      },
      {
        "type": "line",
        "text": "Złożyły się w miękką wieżę."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Ale sen nie przychodził łatwo."
      },
      {
        "type": "line",
        "text": "Coś wyraźnie dziewczynie przeszkadzało."
      },
      {
        "type": "line",
        "text": "Nie potrafiła znaleźć wygodnej pozycji."
      },
      {
        "type": "line",
        "text": "Noc dłużyła się niemiłosiernie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Rankiem królowa zapytała łagodnie:"
      },
      {
        "type": "line",
        "text": "— Jak minęła ci noc?"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Dziewczyna westchnęła cicho."
      },
      {
        "type": "line",
        "text": "— Łóżko wyglądało pięknie,"
      },
      {
        "type": "line",
        "text": "ale prawie wcale nie mogłam spać."
      },
      {
        "type": "line",
        "text": "Czułam, jakby pod materacami było coś twardego."
      },
      {
        "type": "line",
        "text": "Mam całe boki obolałe."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Na te słowa królowa uśmiechnęła się lekko."
      },
      {
        "type": "line",
        "text": "Już wiedziała wszystko, co chciała wiedzieć."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Bo tylko prawdziwa księżniczka,"
      },
      {
        "type": "line",
        "text": "obdarzona wyjątkową wrażliwością,"
      },
      {
        "type": "line",
        "text": "mogła wyczuć ziarnko grochu"
      },
      {
        "type": "line",
        "text": "ukryte pod tyloma materacami."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Książę zobaczył, że dziewczyna"
      },
      {
        "type": "line",
        "text": "była spokojna, skromna i prawdomówna."
      },
      {
        "type": "line",
        "text": "Powiedziała po prostu to, co czuła."
      },
      {
        "type": "line",
        "text": "A to wydało mu się cenniejsze niż wszystko inne."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Wkrótce odbyło się wesele."
      },
      {
        "type": "line",
        "text": "Cały zamek wypełnił się śmiechem i światłem."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Mówi się, że ziarnko grochu"
      },
      {
        "type": "line",
        "text": "przechowywano potem bardzo długo jako pamiątkę."
      },
      {
        "type": "line",
        "text": "I kto wie — być może nadal spoczywa gdzieś za szkłem,"
      },
      {
        "type": "line",
        "text": "przypominając, że o wielkich sprawach"
      },
      {
        "type": "line",
        "text": "decyduje czasem coś maleńkiego."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "A książę i księżniczka żyli szczęśliwie,"
      },
      {
        "type": "line",
        "text": "otoczeni spokojem i życzliwością."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OUTRO —"
      },
      {
        "type": "line",
        "text": "To była Księżniczka na Ziarnku Grochu."
      },
      {
        "type": "line",
        "text": "Na podstawie baśni Hansa Christiana Andersena."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i Adaptacja 3TATATA."
      },
      {
        "type": "line",
        "text": "Dobranoc."
      }
    ]
  },
  {
    "id": 18,
    "title": "Słowik",
    "tag": "Baśń — Andersen · 3TATATA",
    "sections": [
      {
        "type": "title",
        "text": "Słowik"
      },
      {
        "type": "meta",
        "text": "3TATATA · Na podstawie baśni Hansa Christiana Andersena"
      },
      {
        "type": "section",
        "text": "— INTRO —"
      },
      {
        "type": "line",
        "text": "3TATATA prezentuje."
      },
      {
        "type": "line",
        "text": "Słowik."
      },
      {
        "type": "line",
        "text": "Na podstawie baśni Hansa Christiana Andersena."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i Adaptacja 3TATATA."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OPOWIEŚĆ —"
      },
      {
        "type": "line",
        "text": "Dawno temu w odległych Chinach"
      },
      {
        "type": "line",
        "text": "stał pałac cesarza."
      },
      {
        "type": "line",
        "text": "W lesie za pałacem"
      },
      {
        "type": "line",
        "text": "mieszkał mały, niepozorny słowik."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Nie miał złotych piór ani bogatego upierzenia."
      },
      {
        "type": "line",
        "text": "Był szary i drobny."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Ale gdy tylko zaczynał śpiewać,"
      },
      {
        "type": "line",
        "text": "cały świat milkł."
      },
      {
        "type": "line",
        "text": "Rybacy zatrzymywali łodzie."
      },
      {
        "type": "line",
        "text": "Zmęczeni ludzie czuli,"
      },
      {
        "type": "line",
        "text": "że na sercu robi im się lżej."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Pewnego dnia cesarz otrzymał wielką księgę."
      },
      {
        "type": "line",
        "text": "Opisywano w niej jego państwo."
      },
      {
        "type": "line",
        "text": "Lecz najbardziej zachwycano się"
      },
      {
        "type": "line",
        "text": "małym słowikiem z cesarskiego lasu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Cesarz nigdy wcześniej o nim nie słyszał."
      },
      {
        "type": "line",
        "text": "Kazał go natychmiast sprowadzić na dwór."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Nikt nie potrafił wskazać słowika,"
      },
      {
        "type": "line",
        "text": "aż w końcu spotkano ubogą kuchenną dziewczynę."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "— Ja znam tego ptaszka —"
      },
      {
        "type": "line",
        "text": "powiedziała cicho."
      },
      {
        "type": "line",
        "text": "— Śpiewa każdej nocy w lesie."
      },
      {
        "type": "line",
        "text": "Kiedy go słucham, mam wrażenie,"
      },
      {
        "type": "line",
        "text": "jakby ktoś mówił do mnie łagodnie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Tego samego wieczoru sprowadzono słowika."
      },
      {
        "type": "line",
        "text": "Gdy zaczął śpiewać,"
      },
      {
        "type": "line",
        "text": "dźwięk jego pieśni popłynął po sali"
      },
      {
        "type": "line",
        "text": "tak czysto i miękko,"
      },
      {
        "type": "line",
        "text": "że wielu ludziom napłynęły łzy do oczu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "— Największą nagrodą —"
      },
      {
        "type": "line",
        "text": "powiedział słowik —"
      },
      {
        "type": "line",
        "text": "były łzy cesarza."
      },
      {
        "type": "line",
        "text": "One świadczyły,"
      },
      {
        "type": "line",
        "text": "że pieśń trafiła do serca."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Od tej chwili słowik został na dworze."
      },
      {
        "type": "line",
        "text": "Miał własną złotą klateczkę."
      },
      {
        "type": "line",
        "text": "Lecz wolny ptak nie czuł się szczęśliwy."
      },
      {
        "type": "line",
        "text": "Najbardziej kochał las i nocne powietrze."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Pewnego dnia na dwór przybył niezwykły prezent —"
      },
      {
        "type": "line",
        "text": "sztuczny ptak ze złota i srebra."
      },
      {
        "type": "line",
        "text": "Gdy go nakręcano, śpiewał tę samą melodię,"
      },
      {
        "type": "line",
        "text": "zawsze równą i przewidywalną."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Dworzanie zachwycili się od razu."
      },
      {
        "type": "line",
        "text": "Wkrótce cały dwór wolał sztucznego ptaka."
      },
      {
        "type": "line",
        "text": "Niewielu zauważyło, kiedy prawdziwy słowik"
      },
      {
        "type": "line",
        "text": "odleciał przez otwarte okno."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Minęły lata."
      },
      {
        "type": "line",
        "text": "Mechaniczny ptak zaczął się zużywać."
      },
      {
        "type": "line",
        "text": "Jego pieśń stawała się coraz słabsza."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Aż pewnej nocy cesarz ciężko zachorował."
      },
      {
        "type": "line",
        "text": "Leżał sam w wielkim łożu,"
      },
      {
        "type": "line",
        "text": "blady i wyczerpany."
      },
      {
        "type": "line",
        "text": "Mechaniczny ptak milczał."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Cesarzowi wydawało się,"
      },
      {
        "type": "line",
        "text": "że zbliża się sama Śmierć."
      },
      {
        "type": "line",
        "text": "Była cicha i cierpliwa."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "I wtedy, właśnie wtedy,"
      },
      {
        "type": "line",
        "text": "na gałęzi za oknem usiadł słowik."
      },
      {
        "type": "line",
        "text": "Usłyszał o chorobie cesarza"
      },
      {
        "type": "line",
        "text": "i przyleciał z lasu, choć nikt go nie wzywał."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Zaczął śpiewać cicho, miękko i czysto."
      },
      {
        "type": "line",
        "text": "Jego pieśń była jak świeże powietrze po burzy,"
      },
      {
        "type": "line",
        "text": "jak wspomnienie wiosny."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Śmierć zatrzymała się i zaczęła słuchać."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Słowik śpiewał o spokojnych ogrodach,"
      },
      {
        "type": "line",
        "text": "o porannej rosie,"
      },
      {
        "type": "line",
        "text": "o ludziach, którzy płaczą"
      },
      {
        "type": "line",
        "text": "i znów odnajdują nadzieję."
      },
      {
        "type": "line",
        "text": "Zimny cień zaczął się cofać."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Cesarz zasnął głęboko"
      },
      {
        "type": "line",
        "text": "i po raz pierwszy od wielu dni"
      },
      {
        "type": "line",
        "text": "odetchnął spokojnie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "— Wybacz mi — wyszeptał cesarz."
      },
      {
        "type": "line",
        "text": "— Wolałem złoto od twojej prawdziwej pieśni."
      },
      {
        "type": "line",
        "text": "Odpłaciłem ci niewdzięcznością,"
      },
      {
        "type": "line",
        "text": "a jednak wróciłeś, by mnie ocalić."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Słowik odpowiedział, że pieśń jest najpiękniejsza,"
      },
      {
        "type": "line",
        "text": "gdy może nieść ulgę smutnemu sercu."
      },
      {
        "type": "line",
        "text": "Nie chce mieszkać w klatce."
      },
      {
        "type": "line",
        "text": "Woli przylatywać, kiedy sam uzna to za dobre."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Cesarz obiecał,"
      },
