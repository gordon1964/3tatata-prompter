<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="3TaTaTa Prompter">
<title>3TaTaTa Teleprompter</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --text: #f0ede6;
    --accent: #c8a96e;
    --accent2: #7eb8c9;
    --dim: #3a3a3a;
    --panel: #111111;
    --border: #222222;
    --speed: 60px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Serif Display', Georgia, serif;
    height: 100%;
    overflow: hidden;
    touch-action: manipulation;
  }

  /* ======= MENU SCREEN ======= */
  #menu-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center;
    padding: 60px 40px 40px;
    overflow-y: auto;
    z-index: 100;
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .menu-title {
    font-size: clamp(36px, 8vw, 64px);
    color: var(--text);
    text-align: center;
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .menu-subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.2em;
    color: #666;
    text-transform: uppercase;
    margin-bottom: 50px;
  }

  .story-list {
    width: 100%;
    max-width: 700px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .story-item {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 20px 24px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s ease;
    text-decoration: none;
    color: inherit;
  }

  .story-item:active {
    background: #1a1a1a;
    border-color: var(--accent);
    transform: scale(0.99);
  }

  .story-num {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    min-width: 28px;
    letter-spacing: 0.05em;
  }

  .story-info { flex: 1; }

  .story-name {
    font-size: 18px;
    color: var(--text);
    margin-bottom: 3px;
    line-height: 1.2;
  }

  .story-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #555;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .story-arrow {
    color: #333;
    font-size: 20px;
    transition: color 0.15s;
  }

  .story-item:active .story-arrow { color: var(--accent); }

  /* ======= PROMPTER SCREEN ======= */
  #prompter-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: none;
    flex-direction: column;
  }

  /* TOP BAR */
  #top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 56px;
    background: linear-gradient(to bottom, rgba(10,10,10,1) 70%, rgba(10,10,10,0));
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 50;
  }

  #back-btn {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.15em;
    color: #555;
    text-transform: uppercase;
    background: none; border: none;
    cursor: pointer;
    padding: 10px 0;
    display: flex; align-items: center; gap: 8px;
  }
  #back-btn:active { color: var(--accent); }

  #story-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: #444;
    text-transform: uppercase;
    text-align: center;
    flex: 1;
    padding: 0 20px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #font-btn {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: #555;
    background: none; border: none;
    cursor: pointer;
    padding: 10px 0;
    letter-spacing: 0.1em;
  }
  #font-btn:active { color: var(--accent); }

  /* SCROLL CONTAINER */
  #scroll-container {
    flex: 1;
    overflow: hidden;
    position: relative;
    cursor: pointer;
  }

  #scroll-inner {
    padding: 80px 5vw 70vh;
    will-change: transform;
  }

  /* Reading guide line */
  #guide-line {
    position: fixed;
    top: 38%;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--accent) 20%, var(--accent) 80%, transparent);
    opacity: 0.25;
    pointer-events: none;
    z-index: 10;
  }

  /* Top/bottom fade */
  #scroll-container::before,
  #scroll-container::after {
    content: '';
    position: fixed;
    left: 0; right: 0;
    height: 120px;
    pointer-events: none;
    z-index: 5;
  }
  #scroll-container::before {
    top: 56px;
    background: linear-gradient(to bottom, var(--bg), transparent);
  }
  #scroll-container::after {
    bottom: 80px;
    background: linear-gradient(to top, var(--bg), transparent);
  }

  /* TEXT STYLING */
  .prompt-title {
    font-size: clamp(22px, 5vw, 36px);
    color: var(--accent);
    text-align: center;
    margin-bottom: 8px;
    line-height: 1.2;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .prompt-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #444;
    text-align: center;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 60px;
  }

  .prompt-section {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    text-align: center;
    margin: 40px 0 20px;
    opacity: 0.7;
  }

  .prompt-line {
    font-size: clamp(28px, 5.5vw, 52px);
    text-align: center;
    line-height: 1.45;
    color: var(--text);
    padding: 8px 0;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .prompt-sep {
    text-align: center;
    color: var(--dim);
    font-size: 18px;
    padding: 24px 0;
    letter-spacing: 0.5em;
  }

  /* CONTROLS BAR */
  #controls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    background: linear-gradient(to top, rgba(10,10,10,1) 80%, transparent);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 0 24px;
    z-index: 50;
  }

  .ctrl-group {
    display: flex;
    align-items: center;
    gap: 0;
    background: #161616;
    border: 1px solid #222;
    border-radius: 8px;
    overflow: hidden;
  }

  .ctrl-btn {
    background: none;
    border: none;
    color: #777;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 12px 18px;
    cursor: pointer;
    transition: all 0.1s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    min-width: 56px;
    border-right: 1px solid #1e1e1e;
  }
  .ctrl-btn:last-child { border-right: none; }
  .ctrl-btn:active { background: #1e1e1e; color: var(--accent); }
  .ctrl-btn .icon { font-size: 18px; line-height: 1; }
  .ctrl-btn .label { font-size: 9px; opacity: 0.6; letter-spacing: 0.15em; }

  #play-btn .icon { font-size: 22px; }
  #play-btn { color: var(--text); }
  #play-btn.playing .icon::before { content: '⏸'; }
  #play-btn:not(.playing) .icon::before { content: '▶'; }
  #play-btn .icon::before { }

  /* Speed display */
  #speed-display {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    min-width: 36px;
    text-align: center;
  }

  /* FONT SIZE control */
  .font-size-sm { --line-fs: clamp(20px, 4vw, 38px); }
  .font-size-md { --line-fs: clamp(28px, 5.5vw, 52px); }
  .font-size-lg { --line-fs: clamp(36px, 7vw, 68px); }
  .font-size-xl { --line-fs: clamp(44px, 9vw, 86px); }

  .font-size-sm .prompt-line  { font-size: var(--line-fs, clamp(20px,4vw,38px)); }
  .font-size-md .prompt-line  { font-size: var(--line-fs, clamp(28px,5.5vw,52px)); }
  .font-size-lg .prompt-line  { font-size: var(--line-fs, clamp(36px,7vw,68px)); }
  .font-size-xl .prompt-line  { font-size: var(--line-fs, clamp(44px,9vw,86px)); }

  /* Progress bar */
  #progress-bar {
    position: fixed;
    top: 56px; left: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0.4;
    width: 0%;
    z-index: 51;
    transition: width 0.3s ease;
  }

  /* HIDDEN */
  .hidden { display: none !important; }

  /* Touch zones */
  #tap-left, #tap-right {
    position: fixed;
    top: 56px; bottom: 80px;
    width: 30%;
    z-index: 20;
  }
  #tap-left { left: 0; }
  #tap-right { right: 0; }
</style>
</head>
<body>

<!-- MENU -->
<div id="menu-screen">
  <div class="logo">3TaTaTa</div>
  <h1 class="menu-title">Teleprompter</h1>
  <p class="menu-subtitle">Wybierz opowiadanie</p>
  <div class="story-list" id="story-list"></div>
</div>

<!-- PROMPTER -->
<div id="prompter-screen">
  <div id="top-bar">
    <button id="back-btn" onclick="goBack()">← MENU</button>
    <div id="story-label"></div>
    <button id="font-btn" onclick="cycleFont()">Aa</button>
  </div>

  <div id="progress-bar"></div>
  <div id="guide-line"></div>

  <div id="scroll-container" onclick="togglePlay()">
    <div id="scroll-inner"></div>
  </div>

  <div id="tap-left" onclick="slowDown(); event.stopPropagation();"></div>
  <div id="tap-right" onclick="speedUp(); event.stopPropagation();"></div>

  <div id="controls" onclick="event.stopPropagation()">
    <div class="ctrl-group">
      <button class="ctrl-btn" onclick="slowDown()">
        <span class="icon">−</span>
        <span class="label">WOLNIEJ</span>
      </button>
      <button class="ctrl-btn" id="play-btn" onclick="togglePlay()">
        <span class="icon"></span>
        <span class="label">PLAY</span>
      </button>
      <button class="ctrl-btn" onclick="speedUp()">
        <span class="icon">+</span>
        <span class="label">SZYBCIEJ</span>
      </button>
      <button class="ctrl-btn" onclick="resetScroll()">
        <span class="icon">↩</span>
        <span class="label">RESET</span>
      </button>
    </div>
  </div>
</div>

<script>
// ===================== STORIES DATA =====================
const STORIES = [
  {

    "title": "Intro / Outro",
    "tag": "Szablon",
    "sections": [
      {"type":"title","text":"Intro i Outro"},
      {"type":"meta","text":"3TaTaTa — Szablon"},
      {"type":"section","text":"— INTRO —"},
      {"type":"line","text":"3TaTaTa prezentuje."},
      {"type":"line","text":"[Tytuł opowiadania]."},
      {"type":"line","text":"Na podstawie klasycznej legendy / baśni."},
      {"type":"line","text":"Tłumaczenie i opracowanie — 3TaTaTa."},
      {"type":"sep"},

  },
  {
    "id": 1,
    "title": "Legenda o Skarbniku",
    "tag": "Legenda śląska",
    "sections": [
      {"type":"title","text":"Legenda o Skarbniku"},
      {"type":"meta","text":"3TaTaTa · Legenda śląska"},
      {"type":"section","text":"— INTRO —"},
      {"type":"line","text":"3TaTaTa prezentuje."},
      {"type":"line","text":"Legenda o Skarbniku."},
      {"type":"line","text":"Na podstawie klasycznej śląskiej legendy."},
      {"type":"line","text":"Tłumaczenie i opracowanie — 3TaTaTa."},
      {"type":"sep"},
      {"type":"section","text":"— OPOWIEŚĆ —"},
      {"type":"line","text":"Dawno temu, kiedy na Śląsku od"},
      {"type":"line","text":"świtu do nocy pracowały kopalnie, a"},
      {"type":"line","text":"ziemia dudniła od uderzeń kilofów i"},
      {"type":"line","text":"stukotu wozów, górnicy opowiadali sobie o"},
      {"type":"line","text":"niezwykłym duchu podziemi."},
      {"type":"line","text":"Nazywali go Skarbnikiem."},
      {"type":"sep"},
      {"type":"line","text":"Mówili o nim z szacunkiem, a"},
      {"type":"line","text":"czasem nawet z lękiem."},
      {"type":"line","text":"Jedni twierdzili, że był strażnikiem ukrytych"},
      {"type":"line","text":"bogactw ziemi."},
      {"type":"line","text":"Inni, że opiekunem uczciwych górników."},
      {"type":"line","text":"Jeszcze inni szeptali, że potrafi karać"},
      {"type":"line","text":"chciwych, lekkomyślnych i tych, którzy w"},

      {"type":"sep"},
      {"type":"line","text":"Skarbnik nie pokazywał się każdemu."},
      {"type":"line","text":"Najczęściej widzieli go ci, którzy schodzili"},
      {"type":"line","text":"pod ziemię z czystym sumieniem i"},
      {"type":"line","text":"sercem wolnym od pychy."},
      {"type":"line","text":"Miał postać małego, siwego górnika."},
      {"type":"line","text":"Nosił roboczy kubrak, skórzany pas i"},

      {"type":"line","text":"Czasem pojawiał się nagle na końcu"},
      {"type":"line","text":"korytarza."},
      {"type":"line","text":"Czasem tylko jego kroki rozlegały się"},
      {"type":"line","text":"w ciemności."},
      {"type":"line","text":"A czasem ktoś czuł, że nie"},
      {"type":"line","text":"jest sam, choć wokół nie było"},
      {"type":"line","text":"nikogo."},
      {"type":"sep"},
      {"type":"line","text":"W jednej z kopalń pracował młody"},
      {"type":"line","text":"górnik imieniem Jonek."},
      {"type":"line","text":"Był silny, odważny i bardzo chciał"},
      {"type":"line","text":"się wykazać."},
      {"type":"line","text":"Miał dobre serce, ale bywał uparty."},
      {"type":"line","text":"Kiedy starsi górnicy opowiadali o Skarbniku,"},
      {"type":"line","text":"Jonek uśmiechał się pod nosem."},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"To tylko stare gadanie —"},
      {"type":"line","text":"mówił."},
      {"type":"line","text":"—"},
      {"type":"line","text":"W kopalni trzeba mieć mocne ręce,"},

      {"type":"sep"},
      {"type":"line","text":"Stary sztygar patrzył na niego wtedy"},

      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Pod ziemią nie wszystko da się"},

      {"type":"line","text":"Są rzeczy, które trzeba umieć uszanować."},
      {"type":"sep"},
      {"type":"line","text":"Pewnego dnia Jonek wraz z innymi"},

      {"type":"line","text":"Powietrze było ciężkie, wilgotne i ciepłe."},
      {"type":"line","text":"Wąskie chodniki ciągnęły się w mroku"},

      {"type":"line","text":"Tylko lampy rozcinały ciemność słabymi kręgami"},

      {"type":"sep"},
      {"type":"line","text":"Praca trwała od wielu godzin."},

      {"type":"line","text":"Wydawało mu się, że z jego"},

      {"type":"sep"},

      {"type":"line","text":"Po dłuższej chwili zobaczył w oddali"},
      {"type":"line","text":"światła innych górników."},
      {"type":"line","text":"Usłyszał wołania i tupot biegnących ludzi."},
      {"type":"line","text":"Kiedy wybiegł z niebezpiecznego korytarza, koledzy"},
      {"type":"line","text":"chwycili go za ramiona."},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Gdzieś ty był, Jonku?"},
      {"type":"line","text":"Szukaliśmy cię!"},
      {"type":"line","text":"—"},
      {"type":"line","text":"zawołał sztygar."},
      {"type":"line","text":"—"},
      {"type":"line","text":"Jeszcze chwila i strop całkiem by"},
      {"type":"line","text":"się zawalił."},
      {"type":"sep"},
      {"type":"line","text":"Jonek obejrzał się za siebie."},
      {"type":"line","text":"Chciał pokazać wszystkim siwego górnika z"},
      {"type":"line","text":"lampą."},
      {"type":"line","text":"Ale za nim nie było nikogo."},
      {"type":"line","text":"Korytarz tonął w mroku, jakby nikt"},
      {"type":"line","text":"przed chwilą nim nie szedł."},
      {"type":"sep"},
      {"type":"line","text":"Tego dnia Jonek nic już nie"},
      {"type":"line","text":"powiedział."},
      {"type":"line","text":"Dopiero wieczorem, kiedy wyjechał na powierzchnię"},
      {"type":"line","text":"i poczuł na twarzy chłodne powietrze,"},
      {"type":"line","text":"długo patrzył w niebo."},
      {"type":"line","text":"Wiedział już, że pod ziemią nie"},
      {"type":"line","text":"jest się panem wszystkiego."},
      {"type":"line","text":"Że są miejsca, w których trzeba"},
      {"type":"line","text":"zachować nie tylko odwagę, ale także"},
      {"type":"line","text":"pokorę."},
      {"type":"sep"},
      {"type":"line","text":"Od tej pory nigdy więcej nie"},
      {"type":"line","text":"śmiał się z dawnych opowieści."},
      {"type":"line","text":"Szanował kopalnię, słuchał starszych i nie"},
      {"type":"line","text":"oddalał się samowolnie od towarzyszy."},
      {"type":"line","text":"A gdy młodsi górnicy zaczynali żartować"},
      {"type":"line","text":"ze Skarbnika, Jonek mówił tylko jedno:"},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Lepiej pracować uczciwie i z rozwagą."},
      {"type":"line","text":"Bo w ciemności ktoś czasem patrzy,"},
      {"type":"line","text":"czy człowiek pamięta, kim jest."},
      {"type":"sep"},
      {"type":"line","text":"I tak w śląskich kopalniach jeszcze"},
      {"type":"line","text":"przez długie lata opowiadano o Skarbniku"},
      {"type":"line","text":"—"},
      {"type":"line","text":"strażniku podziemi."},
      {"type":"line","text":"Jedni mówili, że ostrzegał przed tąpnięciem."},
      {"type":"line","text":"Inni, że prowadził zagubionych do bezpiecznego"},
      {"type":"line","text":"wyjścia."},
      {"type":"line","text":"A wszyscy zgodnie wierzyli, że pomaga"},
      {"type":"line","text":"tym, którzy szanują pracę, ziemię i"},
      {"type":"line","text":"drugiego człowieka."},
      {"type":"sep"},
      {"type":"line","text":"Dlatego do dziś, kiedy mówi się"},
      {"type":"line","text":"na Śląsku o dawnych kopalnianych opowieściach,"},
      {"type":"line","text":"imię Skarbnika wypowiada się cicho, z"},
      {"type":"line","text":"powagą i z szacunkiem."},
      {"type":"sep"},
      {"type":"section","text":"— OUTRO —"},
      {"type":"line","text":"To była Legenda o Skarbniku."},
      {"type":"line","text":"Na podstawie klasycznej śląskiej legendy."},
      {"type":"line","text":"Tłumaczenie i opracowanie — 3TaTaTa."},
      {"type":"line","text":"Dobranoc."}
    ]
  },
  {
    "id": 2,
    "title": "Legenda o Smoku Wawelskim",
    "tag": "Legenda polska",
    "sections": [
      {"type":"title","text":"Legenda o Smoku Wawelskim"},
      {"type":"meta","text":"3TaTaTa · Legenda polska"},
      {"type":"section","text":"— INTRO —"},
      {"type":"line","text":"3TaTaTa prezentuje."},
      {"type":"line","text":"Legenda o Smoku Wawelskim."},
      {"type":"line","text":"Na podstawie klasycznej polskiej legendy."},
      {"type":"line","text":"Tłumaczenie i opracowanie — 3TaTaTa."},
      {"type":"sep"},
      {"type":"section","text":"— OPOWIEŚĆ —"},
      {"type":"line","text":"Dawno, dawno temu, kiedy Kraków był"},
      {"type":"line","text":"jeszcze młodym grodem, nad brzegiem Wisły"},
      {"type":"line","text":"wznosiło się wzgórze wawelskie."},
      {"type":"line","text":"Zamek nie był wtedy tak wielki"},
      {"type":"line","text":"i dostojny jak dziś, lecz już"},
      {"type":"line","text":"z daleka budził szacunek."},
      {"type":"sep"},
      {"type":"line","text":"W jego murach mieszkał mądry król Krak,"},
      {"type":"line","text":"który troszczył się o swój lud"},
      {"type":"line","text":"i chciał, by wszystkim żyło się spokojnie."},
      {"type":"line","text":"U stóp wzgórza rozciągały się domy rzemieślników,"},
      {"type":"line","text":"kramy kupców i wąskie uliczki"},
      {"type":"line","text":"pachnące drewnem, chlebem oraz dymem z palenisk."},
      {"type":"sep"},
      {"type":"line","text":"Lecz nad tym wszystkim wisiał cień strachu."},
      {"type":"line","text":"W ciemnej pieczarze pod Wawelem"},
      {"type":"line","text":"mieszkał bowiem smok."},
      {"type":"sep"},
      {"type":"line","text":"Był ogromny, ciężki i straszliwy."},
      {"type":"line","text":"Miał łuski twarde jak zbroja,"},
      {"type":"line","text":"ślepia żarzące się niczym rozpalone węgle"},
      {"type":"line","text":"i oddech tak gorący,"},
      {"type":"line","text":"że wysuszał trawę, gdy tylko bestia"},
      {"type":"line","text":"wysunęła łeb z jamy."},
      {"type":"sep"},
      {"type":"line","text":"Smok wychodził nocą albo o świcie."},
      {"type":"line","text":"Schodził ku pastwiskom, porywał bydło,"},
      {"type":"line","text":"roztrącał zagrody i budził grozę samym rykiem."},
      {"type":"line","text":"Zdarzało się, że ludzie barykadowali drzwi"},
      {"type":"line","text":"i gasili światła,"},
      {"type":"line","text":"byle tylko potwór ominął ich dom."},
      {"type":"sep"},
      {"type":"line","text":"Król Krak długo szukał sposobu,"},
      {"type":"line","text":"by uwolnić miasto od nieszczęścia."},
      {"type":"line","text":"Wysyłał dzielnych wojów z oszczepami i tarczami,"},
      {"type":"line","text":"ale żaden nie wracał z pieczary zwycięsko."},
      {"type":"line","text":"Jedni tracili odwagę na sam widok bestii,"},
      {"type":"line","text":"inni padali od ognia i potężnych pazurów."},
      {"type":"line","text":"Smok zdawał się niezwyciężony."},
      {"type":"sep"},
      {"type":"line","text":"Wreszcie w całym grodzie ogłoszono,"},
      {"type":"line","text":"że ten, kto pokona smoka,"},
      {"type":"line","text":"zostanie sowicie nagrodzony"},
      {"type":"line","text":"i na zawsze zapisze się w pamięci Krakowa."},
      {"type":"sep"},
      {"type":"line","text":"Przybywali rycerze z dalekich stron."},
      {"type":"line","text":"Jedni pysznili się błyszczącą zbroją,"},
      {"type":"line","text":"inni przynosili cudowne miecze,"},
      {"type":"line","text":"a jeszcze inni przechwalali się,"},
      {"type":"line","text":"że pokonali już niejednego potwora."},
      {"type":"line","text":"Lecz gdy przychodziła chwila próby,"},
      {"type":"line","text":"odwaga szybko ich opuszczała."},
      {"type":"line","text":"Ludzie tracili nadzieję."},
      {"type":"sep"},
      {"type":"line","text":"I właśnie wtedy pojawił się ktoś,"},
      {"type":"line","text":"po kim mało kto spodziewałby się"},
      {"type":"line","text":"wielkiego czynu."},
      {"type":"sep"},
      {"type":"line","text":"Był nim młody szewczyk,"},
      {"type":"line","text":"często nazywany Skubą."},
      {"type":"line","text":"Nie nosił zbroi,"},
      {"type":"line","text":"nie miał miecza wysadzanego drogimi kamieniami"},
      {"type":"line","text":"i nie otaczał go blask wielkiej sławy."},
      {"type":"sep"},
      {"type":"line","text":"Miał za to bystre oczy,"},
      {"type":"line","text":"cierpliwość i rozum."},
      {"type":"line","text":"Na co dzień siedział przy warsztacie,"},
      {"type":"line","text":"szył buty, naprawiał skórzane pasy"},
      {"type":"line","text":"i uważnie słuchał opowieści ludzi."},
      {"type":"sep"},
      {"type":"line","text":"Wiedział, że sama siła nie zawsze wystarcza"},
      {"type":"line","text":"tam, gdzie potrzeba sprytu."},
      {"type":"line","text":"Skuba długo rozmyślał o smoku."},
      {"type":"line","text":"Nie zastanawiał się, jak z nim walczyć mieczem,"},
      {"type":"line","text":"lecz jak sprawić,"},
      {"type":"line","text":"by potwór sam sprowadził na siebie zgubę."},
      {"type":"sep"},
      {"type":"line","text":"W końcu pewnego wieczoru poprosił o posłuchanie u króla."},
      {"type":"line","text":"Gdy stanął przed władcą,"},
      {"type":"line","text":"wielu dworzan spoglądało na niego z niedowierzaniem."},
      {"type":"sep"},
      {"type":"line","text":"Skuba powiedział, że nie prosi o miecze"},
      {"type":"line","text":"ani zastępy wojów."},
      {"type":"line","text":"Potrzebuje tylko owcy, siarki, smoły"},
      {"type":"line","text":"i odrobiny czasu."},
      {"type":"sep"},
      {"type":"line","text":"Król skinął głową"},
      {"type":"line","text":"i rozkazał dać młodzieńcowi wszystko,"},
      {"type":"line","text":"czego ten potrzebował."},
      {"type":"sep"},
      {"type":"line","text":"Jeszcze tej samej nocy szewczyk"},
      {"type":"line","text":"starannie wypchał owcę siarką i smołą."},
      {"type":"line","text":"Kiedy praca była skończona,"},
      {"type":"line","text":"zaniósł przynętę w pobliże smoczej jamy"},
      {"type":"line","text":"i położył ją tam,"},
      {"type":"line","text":"gdzie bestia łatwo mogła ją znaleźć."},
      {"type":"line","text":"Potem ukrył się w bezpiecznym miejscu"},
      {"type":"line","text":"i czekał."},
      {"type":"sep"},
      {"type":"line","text":"Noc była cicha."},
      {"type":"line","text":"Nad Wisłą unosiła się mgła,"},
      {"type":"line","text":"a wzgórze wawelskie wyglądało jak ciemna strażnica"},
      {"type":"line","text":"nad śpiącym grodem."},
      {"type":"sep"},
      {"type":"line","text":"W końcu z jamy dobiegł ciężki szelest,"},
      {"type":"line","text":"potem głuchy pomruk"},
      {"type":"line","text":"i wreszcie ukazał się smok."},
      {"type":"line","text":"Bestia zwęszyła owcę od razu."},
      {"type":"line","text":"Nie podejrzewając podstępu,"},
      {"type":"line","text":"pożarła ją łapczywie w kilku kęsach."},
      {"type":"sep"},
      {"type":"line","text":"Siarka i smoła zrobiły swoje."},
      {"type":"line","text":"W brzuchu potwora rozlał się straszliwy żar."},
      {"type":"sep"},
      {"type":"line","text":"Smok ryknął tak głośno,"},
      {"type":"line","text":"że echo odbiło się od murów"},
      {"type":"line","text":"i obudziło pół Krakowa."},
      {"type":"line","text":"Zaczął miotać się po wzgórzu,"},
      {"type":"line","text":"drapać ziemię pazurami i biec ku rzece,"},
      {"type":"line","text":"bo tylko woda mogła ugasić"},
      {"type":"line","text":"wewnętrzny ogień."},
      {"type":"sep"},
      {"type":"line","text":"Dopadł Wisły i pił."},
      {"type":"line","text":"Pił zachłannie, długo i bez opamiętania."},
      {"type":"line","text":"Im więcej pił, tym bardziej chciało mu się pić."},
      {"type":"line","text":"Ogień w brzuchu był nie do zniesienia."},
      {"type":"sep"},
      {"type":"line","text":"Pił tak długo,"},
      {"type":"line","text":"aż jego brzuch stał się wielki i napięty."},
      {"type":"line","text":"Aż wreszcie rozległ się potężny huk."},
      {"type":"line","text":"Smok pękł."},
      {"type":"sep"},
      {"type":"line","text":"W jednej chwili zniknęła groza,"},
      {"type":"line","text":"która przez tyle lat wisiała nad miastem."},
      {"type":"sep"},
      {"type":"line","text":"Rankiem mieszkańcy wyszli z domów ostrożnie,"},
      {"type":"line","text":"jeszcze niepewni, czy to naprawdę koniec."},
      {"type":"line","text":"Kiedy jednak zobaczyli, że smocza jama opustoszała,"},
      {"type":"line","text":"radość ogarnęła cały gród."},
      {"type":"sep"},
      {"type":"line","text":"Król Krak kazał sprowadzić Skubę na zamek."},
      {"type":"line","text":"Tym razem nikt nie patrzył na niego"},
      {"type":"line","text":"z pobłażaniem."},
      {"type":"line","text":"Wszyscy widzieli w nim bohatera."},
      {"type":"sep"},
      {"type":"line","text":"Bo choć szewczyk nie ruszył na smoka"},
      {"type":"line","text":"z mieczem w dłoni,"},
      {"type":"line","text":"to właśnie on okazał się prawdziwie dzielny."},
      {"type":"line","text":"Czasem spryt i spokój"},
      {"type":"line","text":"znaczą więcej niż siła ramion."},
      {"type":"sep"},
      {"type":"line","text":"I dlatego do dziś,"},
      {"type":"line","text":"gdy ktoś wspomina Kraków,"},
      {"type":"line","text":"bardzo często zaraz potem pojawia się ta legenda."},
      {"type":"line","text":"Legenda o Smoku Wawelskim —"},
      {"type":"line","text":"przypomnienie, że nawet największy strach"},
      {"type":"line","text":"można pokonać odwagą, cierpliwością i mądrym planem."},
      {"type":"sep"},
      {"type":"section","text":"— OUTRO —"},
      {"type":"line","text":"To była Legenda o Smoku Wawelskim."},
      {"type":"line","text":"Na podstawie klasycznej polskiej legendy."},
      {"type":"line","text":"Tłumaczenie i opracowanie — 3TaTaTa."},
      {"type":"line","text":"Dobranoc."}
    ]
  },
  {
    "id": 3,
    "title": "Legenda o Ondraszku",
    "tag": "Legenda śląska",
    "sections": [
      {"type":"title","text":"Legenda o Ondraszku"},
      {"type":"meta","text":"3TaTaTa · Legenda śląska"},
      {"type":"section","text":"— INTRO —"},
      {"type":"line","text":"3TaTaTa prezentuje."},
      {"type":"line","text":"Legenda o Ondraszku."},
      {"type":"line","text":"Na podstawie klasycznej śląskiej legendy."},
      {"type":"line","text":"Tłumaczenie i opracowanie — 3TaTaTa."},
      {"type":"sep"},
      {"type":"section","text":"— OPOWIEŚĆ —"},
      {"type":"line","text":"Dawno temu, wysoko w Beskidach, między"},
      {"type":"line","text":"ciemnymi lasami, stromymi ścieżkami i pasterskimi"},
      {"type":"line","text":"halami, ludzie opowiadali o młodym zbójniku,"},
      {"type":"line","text":"którego imię znał niemal każdy."},
      {"type":"line","text":"Nazywał się Ondraszek."},
      {"type":"sep"},
      {"type":"line","text":"Mówiono, że Ondraszek był szybki jak"},
      {"type":"line","text":"wiatr w górach, czujny jak wilk"},
      {"type":"line","text":"i odważny jak nikt inny."},
      {"type":"sep"},
      {"type":"line","text":"Lecz najwięcej opowiadano o tym, że"},
      {"type":"line","text":"Ondraszek nie napadał na biednych."},
      {"type":"line","text":"Mówiono więc, że to zbójnik, ale"},
      {"type":"line","text":"sprawiedliwy."},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Jeśli silny zabiera słabym ostatni kawałek"},
      {"type":"line","text":"chleba, to ktoś musi mu przypomnieć,"},
      {"type":"line","text":"że na świecie istnieje jeszcze sprawiedliwość."},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Lepiej żyć krótko, ale po swojemu"},
      {"type":"line","text":"—"},
      {"type":"line","text":"niż długo i w hańbie."},
      {"type":"sep"},
      {"type":"line","text":"W sercach wielu ludzi Ondraszek nie został"},
      {"type":"line","text":"zwykłym zbójnikiem."},
      {"type":"line","text":"Stał się symbolem odwagi, wolności i"},
      {"type":"line","text":"sprzeciwu wobec krzywdy."},
      {"type":"sep"},
      {"type":"section","text":"— OUTRO —"},
      {"type":"line","text":"To była Legenda o Ondraszku."},
      {"type":"line","text":"Na podstawie klasycznej śląskiej legendy."},
      {"type":"line","text":"Tłumaczenie i opracowanie — 3TaTaTa."},
      {"type":"line","text":"Dobranoc."}
    ]
  },
  {
    "id": 4,
    "title": "Legenda o Utopku",
    "tag": "Legenda śląska",
    "sections": [
      {"type":"title","text":"Legenda o Utopku"},
      {"type":"meta","text":"3TaTaTa · Legenda śląska"},
      {"type":"section","text":"— INTRO —"},
      {"type":"line","text":"3TaTaTa prezentuje."},
      {"type":"line","text":"Legenda o Utopku."},
      {"type":"line","text":"Na podstawie klasycznej śląskiej legendy."},
      {"type":"line","text":"Tłumaczenie i opracowanie — 3TaTaTa."},
      {"type":"sep"},
      {"type":"section","text":"— OPOWIEŚĆ —"},
      {"type":"line","text":"Dawno temu, gdy nad śląskimi stawami"},
      {"type":"line","text":"częściej niż dziś snuły się mgły,"},
      {"type":"line","text":"ludzie opowiadali sobie o Utopku."},
      {"type":"line","text":"Nie był on człowiekiem ani zwyczajnym"},
      {"type":"line","text":"zwierzęciem."},
      {"type":"line","text":"Mówiono, że to duch wody —"},
      {"type":"line","text":"stary jak bagna, cichy jak głębina"},
      {"type":"line","text":"i nieprzewidywalny jak nurt po wielkiej"},
      {"type":"line","text":"burzy."},
      {"type":"sep"},
      {"type":"line","text":"Bo Utopek, jak głosiła legenda, nie"},
      {"type":"line","text":"szkodził każdemu."},
      {"type":"line","text":"Bywał groźny dla pyszałków, dla tych,"},
      {"type":"line","text":"którzy z wody szydzili."},
      {"type":"line","text":"Lecz wobec ludzi pokornych i uczciwych"},
      {"type":"line","text":"potrafił być jedynie przestrogą."},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Daruj —"},
      {"type":"line","text":"wyszeptał Jędrek."},
      {"type":"line","text":"—"},
      {"type":"line","text":"Nie chciałem szydzić."},
      {"type":"line","text":"Daruj."},
      {"type":"sep"},
      {"type":"line","text":"Od tamtej nocy Jędrek zmienił się"},
      {"type":"line","text":"nie do poznania."},
      {"type":"line","text":"Mówił, że nad wodą można spotkać"},
      {"type":"line","text":"coś starszego od ludzkiej pychy."},
      {"type":"sep"},
      {"type":"line","text":"Nad śląską wodą trzeba zachować pokorę."},
      {"type":"line","text":"Bo tam, gdzie człowiek widzi tylko"},
      {"type":"line","text":"ciemną taflę, ktoś inny może właśnie"},
      {"type":"line","text":"patrzeć z głębiny."},
      {"type":"sep"},
      {"type":"section","text":"— OUTRO —"},
      {"type":"line","text":"To była Legenda o Utopku."},
      {"type":"line","text":"Na podstawie klasycznej śląskiej legendy."},
      {"type":"line","text":"Tłumaczenie i opracowanie — 3TaTaTa."},
      {"type":"line","text":"Dobranoc."}
    ]
  },
  {
    "id": 5,
    "title": "Kopciuszek",
    "tag": "Baśń klasyczna",
    "sections": [
      {"type":"title","text":"Kopciuszek"},
      {"type":"meta","text":"3TaTaTa · Baśń klasyczna"},
      {"type":"section","text":"— INTRO —"},
      {"type":"line","text":"3TaTaTa prezentuje."},
      {"type":"line","text":"Kopciuszek."},
      {"type":"line","text":"Na podstawie klasycznej baśni."},
      {"type":"line","text":"Tłumaczenie i opracowanie — 3TaTaTa."},
      {"type":"sep"},
      {"type":"section","text":"— OPOWIEŚĆ —"},
      {"type":"line","text":"Dawno temu, w dużym domu stojącym"},
      {"type":"line","text":"na skraju miasta, mieszkała dobra i"},
      {"type":"line","text":"łagodna dziewczynka."},
      {"type":"line","text":"Jej dzieciństwo nie trwało jednak długo"},
      {"type":"line","text":"w szczęściu."},
      {"type":"line","text":"Najpierw straciła matkę, a po kilku"},
      {"type":"line","text":"latach także ojca."},
      {"type":"sep"},
      {"type":"line","text":"Ponieważ często była ubrudzona sadzą i"},
      {"type":"line","text":"popiołem, siostry zaczęły przezywać ją Kopciuszkiem."},
      {"type":"line","text":"Pozostawała cierpliwa, cicha i uprzejma."},
      {"type":"line","text":"Miała bowiem w sobie coś, czego"},
      {"type":"line","text":"nie miały ani jej siostry, ani"},
      {"type":"line","text":"sama macocha —"},
      {"type":"line","text":"prawdziwą dobroć."},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Ty?"},
      {"type":"line","text":"W sadzy i z popiołem na"},
      {"type":"line","text":"rękach?"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Kto wpuściłby cię na królewski bal?"},
      {"type":"line","text":"Zostań tutaj."},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Nie płacz, moje dziecko —"},
      {"type":"line","text":"powiedziała wróżka."},
      {"type":"line","text":"—"},
      {"type":"line","text":"Pojedziesz na bal."},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Pamiętaj —"},
      {"type":"line","text":"rzekła —"},
      {"type":"line","text":"czar przestanie działać o północy."},
      {"type":"line","text":"Musisz wrócić przed ostatnim uderzeniem dzwonu."},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Czy ja także mogę spróbować?"},
      {"type":"sep"},
      {"type":"line","text":"Pantofelek podano Kopciuszkowi."},
      {"type":"line","text":"Dziewczyna usiadła, wsunęła stopę —"},
      {"type":"line","text":"i bucik pasował idealnie."},
      {"type":"sep"},
      {"type":"line","text":"Mówi się, że Kopciuszek nie nosił"},
      {"type":"line","text":"w sercu urazy."},
      {"type":"line","text":"W tym właśnie tkwiła jego siła."},
      {"type":"line","text":"Dobroć może być cicha i skromna,"},
      {"type":"line","text":"lecz ma w sobie większą moc"},
      {"type":"line","text":"niż pycha, szyderstwo i chłód."},
      {"type":"sep"},
      {"type":"section","text":"— OUTRO —"},
      {"type":"line","text":"To był Kopciuszek."},
      {"type":"line","text":"Na podstawie klasycznej baśni."},
      {"type":"line","text":"Tłumaczenie i opracowanie — 3TaTaTa."},
      {"type":"line","text":"Dobranoc."}
    ]
  },
  {
    "id": 6,
    "title": "Bazyliszek",
    "tag": "Legenda polska",
    "sections": [
      {"type":"title","text":"Bazyliszek"},
      {"type":"meta","text":"3TaTaTa · Legenda polska"},
      {"type":"section","text":"— INTRO —"},
      {"type":"line","text":"3TaTaTa prezentuje."},
      {"type":"line","text":"Bazyliszek."},
      {"type":"line","text":"Na podstawie klasycznej polskiej legendy."},
      {"type":"line","text":"Tłumaczenie i opracowanie — 3TaTaTa."},
      {"type":"sep"},
      {"type":"section","text":"— OPOWIEŚĆ —"},
      {"type":"line","text":"Dawno temu, w starej Warszawie,"},
      {"type":"line","text":"szeptano o potworze,"},
      {"type":"line","text":"którego lepiej było nie szukać."},
      {"type":"line","text":"Mówiono, że głęboko pod miastem,"},
      {"type":"line","text":"w ciemnych piwnicach, mieszka Bazyliszek —"},
      {"type":"line","text":"stwór tak straszny,"},
      {"type":"line","text":"że jeden jego wzrok zamieniał ludzi w kamień."},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Pójdę tam —"},
      {"type":"line","text":"powiedział czeladnik."},
      {"type":"line","text":"—"},
      {"type":"line","text":"Jeśli dziewczyna jeszcze żyje, trzeba ją"},
      {"type":"line","text":"odnaleźć."},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Nie patrz mu prosto w oczy"},
      {"type":"line","text":"—"},
      {"type":"line","text":"ostrzegł stary rzemieślnik."},
      {"type":"line","text":"—"},
      {"type":"line","text":"Niech sam spotka własne spojrzenie."},
      {"type":"sep"},
      {"type":"line","text":"Bazyliszek zesztywniał."},
      {"type":"line","text":"Jego łuski pociemniały, ciało skamieniało"},
      {"type":"line","text":"i po kilku oddechach"},
      {"type":"line","text":"w miejscu żywego stwora stał już"},
      {"type":"line","text":"tylko kamienny posąg —"},
      {"type":"line","text":"zimny, martwy i bezsilny."},
      {"type":"sep"},
      {"type":"line","text":"Nie zwyciężył bowiem siłą, lecz odwagą,"},
      {"type":"line","text":"sprytem i spokojem w chwili największego"},
      {"type":"line","text":"zagrożenia."},
      {"type":"sep"},
      {"type":"section","text":"— OUTRO —"},
      {"type":"line","text":"To była Legenda o Bazyliszku."},
      {"type":"line","text":"Na podstawie klasycznej polskiej legendy."},
      {"type":"line","text":"Tłumaczenie i opracowanie — 3TaTaTa."},
      {"type":"line","text":"Dobranoc."}
    ]
  },
  {
    "id": 7,
    "title": "GieKSik i BazalBub",
    "tag": "Opowieść o przyjaźni",
    "sections": [
      {"type":"title","text":"GieKSik i BazalBub"},
      {"type":"meta","text":"3TaTaTa · Opowieść o przyjaźni"},
      {"type":"section","text":"— INTRO —"},
      {"type":"line","text":"3TaTaTa prezentuje."},
      {"type":"line","text":"GieKSik i BazalBub."},
      {"type":"line","text":"Opowieść o przyjaźni, pamięci i braterstwie."},
      {"type":"line","text":"Tekst i opracowanie — 3TaTaTa."},
      {"type":"sep"},
      {"type":"section","text":"— OPOWIEŚĆ —"},
      {"type":"line","text":"Dawno temu, tam gdzie ziemia była"},
      {"type":"line","text":"czarna od węgla, a wieczorne niebo"},
      {"type":"line","text":"rozświetlały ognie hut i lampy w"},
      {"type":"line","text":"oknach, istniały dwa miasta."},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Prawdziwa przyjaźń nie rodzi się z"},
      {"type":"line","text":"przypadku."},
      {"type":"line","text":"Rodzi się z podobnych serc."},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Trzydzieści lat temu powstała przyjaźń."},
      {"type":"line","text":"Dziś stała się legendą."},
      {"type":"line","text":"A legenda, którą nosi się w"},
      {"type":"line","text":"sercu, nigdy nie umiera."},
      {"type":"sep"},
      {"type":"line","text":"Bo prawdziwa przyjaźń, ta największa, nie"},
      {"type":"line","text":"kończy się nigdy."},
      {"type":"line","text":"Ona tylko z roku na rok"},
      {"type":"line","text":"staje się piękniejszą bajką."},
      {"type":"sep"},
      {"type":"section","text":"— OUTRO —"},
      {"type":"line","text":"To była opowieść o GieKSiku i BazalBubie."},
      {"type":"line","text":"Tekst i opracowanie — 3TaTaTa."},
      {"type":"line","text":"Dobranoc."}
    ]
  },
  {
    "id": 8,
    "title": "Klara i telefon do taty",
    "tag": "Opowiadanie",
    "sections": [
      {"type":"title","text":"Klara i telefon do taty"},
      {"type":"meta","text":"3TaTaTa · Opowiadanie"},
      {"type":"section","text":"— INTRO —"},
      {"type":"line","text":"3TaTaTa prezentuje."},
      {"type":"line","text":"Klara i telefon do taty."},
      {"type":"line","text":"Tekst i opracowanie — 3TaTaTa."},
      {"type":"sep"},
      {"type":"section","text":"— OPOWIEŚĆ —"},
      {"type":"line","text":"Klara miała siedem lat i od"},
      {"type":"line","text":"samego rana czuła w brzuchu coś"},
      {"type":"line","text":"dziwnego."},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Tato… —"},
      {"type":"line","text":"powiedziała bardzo cicho."},
      {"type":"line","text":"—"},
      {"type":"line","text":"Ja… ja nie chcę tu być."},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Dobrze, że dzwonisz —"},
      {"type":"line","text":"odpowiedział tata łagodnie."},
      {"type":"line","text":"—"},
      {"type":"line","text":"Już jadę."},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Jestem z ciebie dumny, że zadzwoniłaś"},
      {"type":"line","text":"i powiedziałaś, jak się czujesz."},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Klaro."},
      {"type":"line","text":"Jestem dumny nie z tego, że"},
      {"type":"line","text":"zawsze sobie radzisz."},
      {"type":"line","text":"Jestem dumny z tego, że mówisz"},
      {"type":"line","text":"prawdę."},
      {"type":"line","text":"Nawet wtedy, kiedy się boisz."},
      {"type":"sep"},
      {"type":"line","text":"Czasem dzielność to wejść do pokoju"},
      {"type":"line","text":"pełnego obcych głosów."},
      {"type":"line","text":"A czasem dzielność to wyjąć telefon"},
      {"type":"line","text":"drżącą ręką i zadzwonić do taty."},
      {"type":"sep"},
      {"type":"section","text":"— OUTRO —"},
      {"type":"line","text":"To była opowieść Klara i telefon do taty."},
      {"type":"line","text":"Tekst i opracowanie — 3TaTaTa."},
      {"type":"line","text":"Dobranoc."}
    ]
  },
  {
    "id": 9,
    "title": "Lech, Czech i Rus",
    "tag": "Legenda polska",
    "sections": [
      {"type":"title","text":"Lech, Czech i Rus"},
      {"type":"meta","text":"3TaTaTa · Legenda polska"},
      {"type":"section","text":"— INTRO —"},
      {"type":"line","text":"3TaTaTa prezentuje."},
      {"type":"line","text":"Legenda o Lechu, Czechu i Rusie."},
      {"type":"line","text":"Na podstawie klasycznej polskiej legendy."},
      {"type":"line","text":"Tłumaczenie i opracowanie — 3TaTaTa."},
      {"type":"sep"},
      {"type":"section","text":"— OPOWIEŚĆ —"},
      {"type":"line","text":"Dawno, bardzo dawno temu żyło trzech braci."},
      {"type":"line","text":"Nazywali się Lech, Czech i Rus."},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"To jest miejsce dla nas —"},
      {"type":"line","text":"powiedział Lech cicho, ale pewnie."},
      {"type":"line","text":"—"},
      {"type":"line","text":"Tu zbudujemy nasz gród."},
      {"type":"line","text":"Ten biały orzeł będzie odtąd naszym"},
      {"type":"line","text":"znakiem, symbolem siły, odwagi i wolności."},
      {"type":"line","text":"A to miejsce nazwiemy Gnieznem."},
      {"type":"sep"},
      {"type":"line","text":"Właśnie dlatego biały orzeł stał się"},
      {"type":"line","text":"symbolem ziemi Lecha,"},
      {"type":"line","text":"a później całego polskiego narodu."},
      {"type":"sep"},
      {"type":"section","text":"— OUTRO —"},
      {"type":"line","text":"To była Legenda o Lechu, Czechu i Rusie."},
      {"type":"line","text":"Na podstawie klasycznej polskiej legendy."},
      {"type":"line","text":"Tłumaczenie i opracowanie — 3TaTaTa."},
      {"type":"line","text":"Dobranoc."}
    ]
  },
  {
    "id": 10,
    "title": "Wars i Sawa",
    "tag": "Legenda polska",
    "sections": [
      {"type":"title","text":"Wars i Sawa"},
      {"type":"meta","text":"3TaTaTa · Legenda polska"},
      {"type":"section","text":"— INTRO —"},
      {"type":"line","text":"3TaTaTa prezentuje."},
      {"type":"line","text":"Legenda o Warsie i Sawie."},
      {"type":"line","text":"Na podstawie klasycznej polskiej legendy."},
      {"type":"line","text":"Tłumaczenie i opracowanie — 3TaTaTa."},
      {"type":"sep"},
      {"type":"section","text":"— OPOWIEŚĆ —"},
      {"type":"line","text":"Dawno temu, nad szeroką Wisłą,"},
      {"type":"line","text":"nad jej brzegiem mieszkał młody rybak"},
      {"type":"line","text":"o imieniu Wars."},
      {"type":"sep"},
      {"type":"line","text":"Między nimi rosło uczucie ciche, dobre"},
      {"type":"line","text":"i prawdziwe."},
      {"type":"sep"},
      {"type":"line","text":"Mówiono, że miejsce to wyrastało z"},
      {"type":"line","text":"odwagi Warsa i z mądrości Sawy."},
      {"type":"line","text":"Jedno dawało siłę, drugie serce."},
      {"type":"sep"},
      {"type":"line","text":"W końcu zaczęto mówić, że to"},
      {"type":"line","text":"właśnie od ich imion wzięła się"},
      {"type":"line","text":"nazwa miasta —"},
      {"type":"line","text":"Warszawa."},
      {"type":"sep"},
      {"type":"section","text":"— OUTRO —"},
      {"type":"line","text":"To była Legenda o Warsie i Sawie."},
      {"type":"line","text":"Na podstawie klasycznej polskiej legendy."},
      {"type":"line","text":"Tłumaczenie i opracowanie — 3TaTaTa."},
      {"type":"line","text":"Dobranoc."}
    ]
  },
  {
    "id": 11,
    "title": "Calineczka",
    "tag": "Baśń — Andersen",
    "sections": [
      {"type":"title","text":"Calineczka"},
      {"type":"meta","text":"3TaTaTa · Na podstawie baśni Andersena"},
      {"type":"section","text":"— INTRO —"},
      {"type":"line","text":"3TaTaTa prezentuje."},
      {"type":"line","text":"Calineczka."},
      {"type":"line","text":"Na podstawie baśni Hansa Christiana Andersena."},
      {"type":"line","text":"Tłumaczenie i opracowanie — 3TaTaTa."},
      {"type":"sep"},
      {"type":"section","text":"— OPOWIEŚĆ —"},
      {"type":"line","text":"Dawno, dawno temu żyła kobieta,"},
      {"type":"line","text":"która bardzo pragnęła mieć dziecko."},
      {"type":"line","text":"Nie wiedziała jednak, jak spełnić swoje"},
      {"type":"line","text":"marzenie."},
      {"type":"sep"},
      {"type":"line","text":"Pewnego dnia poszła do dobrej czarodziejki"},
      {"type":"line","text":"i powiedziała:"},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Tak bardzo chciałabym mieć choć maleńkie"},
      {"type":"line","text":"dziecko."},
      {"type":"line","text":"Czy możesz mi pomóc?"},
      {"type":"sep"},
      {"type":"line","text":"Czarodziejka uśmiechnęła się łagodnie,"},
      {"type":"line","text":"podała jej ziarenko jęczmienia i rzekła:"},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"To nie jest zwyczajne ziarenko."},
      {"type":"line","text":"Zasadź je w doniczce,"},
      {"type":"line","text":"a potem cierpliwie czekaj."},
      {"type":"sep"},
      {"type":"line","text":"Kobieta wróciła do domu i zrobiła"},
      {"type":"line","text":"dokładnie tak, jak jej powiedziano."},
      {"type":"line","text":"Wsadziła ziarenko do ziemi, podlała je"},
      {"type":"line","text":"i postawiła doniczkę na oknie."},
      {"type":"line","text":"Ledwie minęło kilka dni,"},
      {"type":"line","text":"a z ziemi wyrósł piękny, duży kwiat,"},
      {"type":"line","text":"podobny trochę do tulipana."},
      {"type":"sep"},
      {"type":"line","text":"Jego płatki były jeszcze zamknięte,"},
      {"type":"line","text":"jakby ukrywały jakiś sekret."},
      {"type":"line","text":"Kobieta pochyliła się nad nim"},
      {"type":"line","text":"i lekko pocałowała kwiat."},
      {"type":"line","text":"W tej samej chwili płatki rozchyliły się szeroko."},
      {"type":"line","text":"W samym środku, na zielonym słupku kwiatu,"},
      {"type":"line","text":"siedziała maleńka dziewczynka."},
      {"type":"line","text":"Była śliczna i delikatna."},
      {"type":"line","text":"Nie miała więcej niż długość ludzkiego kciuka."},
      {"type":"line","text":"Dlatego nazwano ją Calineczką."},
      {"type":"sep"},
      {"type":"line","text":"Kobieta bardzo ją pokochała."},
      {"type":"line","text":"Z łupinki orzecha zrobiła jej kołyskę."},
      {"type":"line","text":"Materacykiem były niebieskie fiołki,"},
      {"type":"line","text":"a kocykiem płatek czerwonej róży."},
      {"type":"line","text":"W dzień Calineczka bawiła się na stole."},
      {"type":"line","text":"Na wodzie pływał szeroki liść tulipana"},
      {"type":"line","text":"i właśnie na nim siadała Calineczka."},
      {"type":"line","text":"Za pomocą dwóch końskich włosów"},
      {"type":"line","text":"wiosłowała z jednego brzegu miski na drugi."},
      {"type":"line","text":"Wyglądało to prześlicznie."},
      {"type":"sep"},
      {"type":"line","text":"Ale pewnej nocy wydarzyło się coś strasznego."},
      {"type":"line","text":"Przez rozbitą szybę do pokoju wskoczyła"},
      {"type":"line","text":"wielka, brzydka ropucha."},
      {"type":"sep"},
      {"type":"line","text":"Ropucha zajrzała do łupinki orzecha,"},
      {"type":"line","text":"gdzie spała Calineczka, i mruknęła:"},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"To byłaby doskonała żona dla mojego syna."},
      {"type":"sep"},
      {"type":"line","text":"Chwyciła łupinkę wraz ze śpiącą dziewczynką"},
      {"type":"line","text":"i wyskoczyła przez okno do ogrodu."},
      {"type":"sep"},
      {"type":"line","text":"Syn był równie brzydki jak matka."},
      {"type":"line","text":"Miał wielkie oczy i tylko potrafił mruczeć:"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Brekekeke… brek… brek…"},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Ciszej —"},
      {"type":"line","text":"syknęła ropucha."},
      {"type":"line","text":"—"},
      {"type":"line","text":"Jeszcze się obudzi."},
      {"type":"line","text":"Ucieknie nam."},
      {"type":"line","text":"Położymy ją na liściu lilii wodnej,"},
      {"type":"line","text":"na środku strumienia."},
      {"type":"sep"},
      {"type":"line","text":"Kiedy rankiem słońce wzeszło,"},
      {"type":"line","text":"Calineczka się obudziła."},
      {"type":"line","text":"Rozejrzała się dookoła i od razu zaczęła płakać."},
      {"type":"line","text":"Wszędzie wokół była tylko woda."},
      {"type":"line","text":"Nie było jak wrócić na brzeg."},
      {"type":"sep"},
      {"type":"line","text":"Tymczasem małe rybki pływające pod liściem"},
      {"type":"line","text":"usłyszały płacz Calineczki."},
      {"type":"line","text":"Wynurzyły główki z wody i zrobiło im się jej bardzo żal."},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Nie, nie może zostać z tą okropną ropuchą —"},
      {"type":"line","text":"powiedziały."},
      {"type":"sep"},
      {"type":"line","text":"Podpłynęły do zielonej łodygi,"},
      {"type":"line","text":"która trzymała liść, i przegryzły ją zębami."},
      {"type":"line","text":"Liść oderwał się i popłynął z prądem"},
      {"type":"line","text":"daleko, daleko od brzegu."},
      {"type":"sep"},
      {"type":"line","text":"Calineczka bała się, ale czuła też ulgę."},
      {"type":"line","text":"Siedziała na liściu jak w małej łódce"},
      {"type":"line","text":"i płynęła przez świat."},
      {"type":"sep"},
      {"type":"line","text":"Niedługo potem obok przepłynął duży chrabąszcz."},
      {"type":"line","text":"Zobaczył dziewczynkę, objął ją w pas"},
      {"type":"line","text":"swoimi nóżkami i uniósł wysoko na drzewo."},
      {"type":"sep"},
      {"type":"line","text":"Wkrótce przyszły inne chrabąszcze."},
      {"type":"line","text":"Obejrzały Calineczkę bardzo dokładnie."},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Ma tylko dwie nogi —"},
      {"type":"line","text":"powiedział jeden."},
      {"type":"line","text":"—"},
      {"type":"line","text":"Jakie ma cienkie biodra —"},
      {"type":"line","text":"dodał drugi."},
      {"type":"line","text":"—"},
      {"type":"line","text":"Nie ma czułków —"},
      {"type":"line","text":"zauważył trzeci."},
      {"type":"line","text":"—"},
      {"type":"line","text":"Jest po prostu brzydka —"},
      {"type":"line","text":"stwierdziły samice chrabąszczy."},
      {"type":"sep"},
      {"type":"line","text":"I chrabąszcz zostawił ją samą na stokrotce."},
      {"type":"line","text":"Calineczka znów zaczęła płakać."},
      {"type":"line","text":"Było jej przykro, że uznano ją za brzydką."},
      {"type":"sep"},
      {"type":"line","text":"Mimo to żyła dalej."},
      {"type":"line","text":"Przez całe lato mieszkała w lesie."},
      {"type":"line","text":"Uplotła sobie łóżeczko z trawy,"},
      {"type":"line","text":"zawieszone pod dużym liściem."},
      {"type":"line","text":"Piła rosę z kwiatów i jadła słodki pyłek."},
      {"type":"sep"},
      {"type":"line","text":"Tak minęło lato, a potem jesień."},
      {"type":"line","text":"Wszystkie ptaki odleciały."},
      {"type":"line","text":"Kwiaty zwiędły."},
      {"type":"line","text":"Zrobiło się zimno."},
      {"type":"line","text":"Ubranko Calineczki było już cienkie i podarte."},
      {"type":"line","text":"Trzęsła się z zimna i głodu."},
      {"type":"sep"},
      {"type":"line","text":"W końcu dotarła do norki myszy polnej."},
      {"type":"line","text":"Mysz mieszkała ciepło i dostatnio."},
      {"type":"line","text":"Kiedy zobaczyła przemarzniętą Calineczkę,"},
      {"type":"line","text":"ulitowała się nad nią."},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Wejdź do środka —"},
      {"type":"line","text":"powiedziała."},
      {"type":"line","text":"—"},
      {"type":"line","text":"Ogrzej się i zjedz coś."},
      {"type":"sep"},
      {"type":"line","text":"Calineczka była bardzo wdzięczna."},
      {"type":"line","text":"Przez całą zimę mieszkała u myszy."},
      {"type":"line","text":"Pomagała jej sprzątać, opowiadała bajki"},
      {"type":"line","text":"i dbała o porządek."},
      {"type":"sep"},
      {"type":"line","text":"Pewnego dnia mysz powiedziała:"},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Będziemy mieli gościa."},
      {"type":"line","text":"Od czasu do czasu odwiedza mnie mój sąsiad, kret."},
      {"type":"line","text":"To bardzo bogaty i uczony pan."},
      {"type":"line","text":"Gdybyś została jego żoną, byłoby ci dobrze."},
      {"type":"sep"},
      {"type":"line","text":"Kret był poważny, czarny i bardzo dumny."},
      {"type":"line","text":"Nie lubił słońca ani kwiatów."},
      {"type":"line","text":"Mówił o nich z pogardą,"},
      {"type":"line","text":"bo nigdy ich naprawdę nie widział."},
      {"type":"sep"},
      {"type":"line","text":"Kret postanowił się z Calineczką ożenić."},
      {"type":"line","text":"Ale Calineczka nie była szczęśliwa."},
      {"type":"line","text":"Nie chciała żyć całe życie pod ziemią,"},
      {"type":"line","text":"z dala od słońca, nieba i ptasiego śpiewu."},
      {"type":"sep"},
      {"type":"line","text":"Pewnego dnia kret pokazał im martwą jaskółkę"},
      {"type":"line","text":"leżącą w podziemnym korytarzu."},
      {"type":"line","text":"Kret popchnął ją łapą i powiedział:"},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Ptaki są żałosne."},
      {"type":"line","text":"Całe ich życie to śpiew i bieda."},
      {"type":"line","text":"Dobrze, że ja nie urodziłem się ptakiem."},
      {"type":"sep"},
      {"type":"line","text":"Ale Calineczce zrobiło się bardzo smutno."},
      {"type":"line","text":"Kiedy mysz i kret odeszli,"},
      {"type":"line","text":"wróciła do jaskółki sama."},
      {"type":"line","text":"Rozsunęła miękkie pióra i położyła ucho"},
      {"type":"line","text":"przy jej piersi."},
      {"type":"line","text":"Wydawało jej się, że słyszy słabiutkie bicie serca."},
      {"type":"line","text":"Ptak nie był martwy."},
      {"type":"line","text":"Był tylko zamarznięty i wycieńczony."},
      {"type":"sep"},
      {"type":"line","text":"Calineczka od razu postanowiła mu pomóc."},
      {"type":"line","text":"Przez całą zimę potajemnie opiekowała się jaskółką."},
      {"type":"line","text":"Przynosiła jej miękkie źdźbła trawy,"},
      {"type":"line","text":"ogrzewała ją swoim ciałem"},
      {"type":"line","text":"i dawała wodę z płatków kwiatów."},
      {"type":"line","text":"Powoli ptak odzyskiwał siły."},
      {"type":"sep"},
      {"type":"line","text":"Kiedy przyszła wiosna i słońce ogrzało ziemię,"},
      {"type":"line","text":"jaskółka otworzyła oczy."},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Uratowałaś mi życie —"},
      {"type":"line","text":"powiedziała cicho."},
      {"type":"line","text":"—"},
      {"type":"line","text":"Nigdy ci tego nie zapomnę."},
      {"type":"sep"},
      {"type":"line","text":"Gdy ziemia zmiękła od ciepła,"},
      {"type":"line","text":"jaskółka wyfrunęła przez otwór na powierzchnię."},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Chodź ze mną —"},
      {"type":"line","text":"powiedziała do Calineczki."},
      {"type":"line","text":"—"},
      {"type":"line","text":"Usiądź na moich plecach."},
      {"type":"line","text":"Polecimy daleko stąd, do ciepłych krajów."},
      {"type":"sep"},
      {"type":"line","text":"Ale Calineczka spojrzała na mysią norkę"},
      {"type":"line","text":"i odpowiedziała:"},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Nie mogę."},
      {"type":"line","text":"Mysz była dla mnie dobra."},
      {"type":"line","text":"Zasmuciłaby się."},
      {"type":"sep"},
      {"type":"line","text":"Jaskółka odleciała sama."},
      {"type":"sep"},
      {"type":"line","text":"Minęło lato."},
      {"type":"line","text":"Mysz znów zaczęła mówić o ślubie z kretem."},
      {"type":"line","text":"Dziewczynka była coraz smutniejsza."},
      {"type":"sep"},
      {"type":"line","text":"W dniu, kiedy miała pożegnać słońce"},
      {"type":"line","text":"przed zejściem pod ziemię na zawsze,"},
      {"type":"line","text":"wyszła przed norę."},
      {"type":"line","text":"Calineczka spojrzała w niebo i wyszeptała:"},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Żegnaj, jasne słońce."},
      {"type":"line","text":"Żegnajcie, kwiaty."},
      {"type":"line","text":"Żegnaj, wolny świecie."},
      {"type":"sep"},
      {"type":"line","text":"Wtedy nad jej głową rozległ się znajomy śpiew."},
      {"type":"line","text":"To była jaskółka."},
      {"type":"line","text":"Zobaczyła Calineczkę, usłyszała o ślubie z kretem"},
      {"type":"line","text":"i zawołała:"},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Chodź ze mną teraz."},
      {"type":"line","text":"Nadchodzi zima."},
      {"type":"line","text":"Polecimy daleko, tam gdzie słońce świeci cieplej,"},
      {"type":"line","text":"a kwiaty kwitną przez cały rok."},
      {"type":"sep"},
      {"type":"line","text":"Tym razem Calineczka nie zawahała się ani chwili."},
      {"type":"line","text":"Usiadła na grzbiecie jaskółki,"},
      {"type":"line","text":"a ptak wzbił się wysoko w niebo."},
      {"type":"sep"},
      {"type":"line","text":"Leciały nad lasami, nad morzami i nad górami."},
      {"type":"line","text":"Wkrótce dotarły do cudownej krainy,"},
      {"type":"line","text":"gdzie rosły winorośle, pachniały kwiaty"},
      {"type":"line","text":"i świeciło łagodne słońce."},
      {"type":"sep"},
      {"type":"line","text":"Pośród tej krainy stał biały marmurowy pałac,"},
      {"type":"line","text":"a w jego pobliżu rosły najpiękniejsze kwiaty."},
      {"type":"line","text":"Jaskółka usiadła przy jednym z nich."},
      {"type":"line","text":"W samym środku kwiatu siedział maleńki człowiek."},
      {"type":"line","text":"Był delikatny i piękny jak z baśni."},
      {"type":"line","text":"Na ramionach miał przezroczyste skrzydła,"},
      {"type":"line","text":"a na głowie złotą koronę."},
      {"type":"line","text":"Był królem kwiatów."},
      {"type":"sep"},
      {"type":"line","text":"Gdy zobaczył Calineczkę,"},
      {"type":"line","text":"zachwycił się nią od pierwszego spojrzenia."},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Jesteś najpiękniejsza ze wszystkich —"},
      {"type":"line","text":"powiedział."},
      {"type":"line","text":"—"},
      {"type":"line","text":"Czy zostaniesz moją królową?"},
      {"type":"sep"},
      {"type":"line","text":"Calineczka zarumieniła się i uśmiechnęła."},
      {"type":"line","text":"Tu, wśród słońca, kwiatów i wolności,"},
      {"type":"line","text":"jej serce było szczęśliwe."},
      {"type":"line","text":"Zgodziła się."},
      {"type":"sep"},
      {"type":"line","text":"Wtedy z każdego kwiatu wyszli mali ludzie"},
      {"type":"line","text":"i małe dziewczynki."},
      {"type":"line","text":"Przynieśli jej dary."},
      {"type":"line","text":"Najpiękniejszym prezentem była para delikatnych skrzydeł,"},
      {"type":"line","text":"które przypięto jej do pleców."},
      {"type":"sep"},
      {"type":"line","text":"A król kwiatów nadał jej nowe imię."},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Nie będziesz już nazywać się Calineczka —"},
      {"type":"line","text":"powiedział —"},
      {"type":"line","text":"bo to imię nie pasuje do królowej kwiatów."},
      {"type":"line","text":"Będziesz miała piękne imię: Maja."},
      {"type":"sep"},
      {"type":"line","text":"Jaskółka siedziała nad nimi w gnieździe"},
      {"type":"line","text":"i śpiewała najpiękniej, jak tylko umiała."},
      {"type":"sep"},
      {"type":"line","text":"Tak jednak kończą się najpiękniejsze historie."},
      {"type":"line","text":"Ci, którzy byli dobrzy, odważni"},
      {"type":"line","text":"i wierni swojemu sercu,"},
      {"type":"line","text":"odnajdują w końcu własne miejsce na świecie."},
      {"type":"line","text":"I tak Calineczka, maleńka dziewczynka z kwiatu,"},
      {"type":"line","text":"odnalazła dom, światło i szczęście."},
      {"type":"sep"},
      {"type":"section","text":"— OUTRO —"},
      {"type":"line","text":"To była Calineczka."},
      {"type":"line","text":"Na podstawie baśni Andersena."},
      {"type":"line","text":"Tłumaczenie i opracowanie — 3TaTaTa."},
      {"type":"line","text":"Dobranoc."}
    ]
  },
  {
    "id": 12,
    "title": "Śpiąca Królewna",
    "tag": "Baśń — Perrault",
    "sections": [
      {"type":"title","text":"Śpiąca Królewna"},
      {"type":"meta","text":"3TaTaTa · Na podstawie baśni Perraulta"},
      {"type":"section","text":"— INTRO —"},
      {"type":"line","text":"3TaTaTa prezentuje."},
      {"type":"line","text":"Śpiąca Królewna."},
      {"type":"line","text":"Na podstawie klasycznej baśni Charlesa Perraulta."},
      {"type":"line","text":"Tłumaczenie i opracowanie — 3TaTaTa."},
      {"type":"sep"},
      {"type":"section","text":"— OPOWIEŚĆ —"},
      {"type":"line","text":"Dawno temu żyli król i królowa,"},
      {"type":"line","text":"którzy mieli wszystko, czego mogli zapragnąć."},
      {"type":"line","text":"Jednego tylko brakowało w ich szczęściu."},
      {"type":"line","text":"Bardzo pragnęli dziecka."},
      {"type":"sep"},
      {"type":"line","text":"W całym królestwie rozbrzmiały dzwony —"},
      {"type":"line","text":"w pałacu przyszła na świat królewna."},
      {"type":"line","text":"Była zdrowa, piękna i tak delikatna,"},
      {"type":"line","text":"że wszyscy mówili o niej z zachwytem."},
      {"type":"sep"},
      {"type":"line","text":"Król postanowił urządzić wielką ucztę."},
      {"type":"line","text":"Zaproszono siedem wróżek,"},
      {"type":"line","text":"które miały obdarzyć dziecko najlepszymi darami."},
      {"type":"line","text":"Każda z nich niosła coś cennego:"},
      {"type":"line","text":"wdzięk, dobroć, mądrość, odwagę,"},
      {"type":"line","text":"pogodę ducha, łagodność i wewnętrzne światło."},
      {"type":"sep"},
      {"type":"line","text":"Lecz zapomniano o jeszcze jednej wróżce —"},
      {"type":"line","text":"bardzo starej, mieszkającej samotnie w odległej wieży."},
      {"type":"sep"},
      {"type":"line","text":"Stara wróżka podeszła do kołyski i"},
      {"type":"line","text":"powiedziała głosem ostrym jak szkło:"},
      {"type":"line","text":"gdy królewna dorośnie,"},
      {"type":"line","text":"ukłuje się wrzecionem i umrze."},
      {"type":"sep"},
      {"type":"line","text":"Na szczęście siódma wróżka"},
      {"type":"line","text":"nie zdążyła jeszcze wypowiedzieć swojego daru."},
      {"type":"line","text":"Królewna nie umrze."},
      {"type":"line","text":"Zapadnie tylko w głęboki sen,"},
      {"type":"line","text":"który potrwa sto lat."},
      {"type":"line","text":"A po wielu latach przybędzie ktoś,"},
      {"type":"line","text":"kto przebudzi cały pałac."},
      {"type":"sep"},
      {"type":"line","text":"Lata mijały, a królewna rosła jak wiosenny kwiat."},
      {"type":"line","text":"Była dobra dla służby, uprzejma dla poddanych"},
      {"type":"line","text":"i miała serce tak otwarte,"},
      {"type":"line","text":"że wszyscy lgnęli do niej bez lęku."},
      {"type":"sep"},
      {"type":"line","text":"W dniu swoich szesnastych urodzin"},
      {"type":"line","text":"dotarła do małych drzwiczek ukrytych w najstarszej wieży."},
      {"type":"line","text":"Za nimi siedziała staruszka i przędła wełnę."},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Co pani robi? —"},
      {"type":"line","text":"zapytała."},
      {"type":"line","text":"Królewna, ciekawa wszystkiego,"},
      {"type":"line","text":"poprosiła, by mogła spróbować."},
      {"type":"line","text":"Ledwie dotknęła wrzeciona,"},
      {"type":"line","text":"ukłuła się w palec."},
      {"type":"line","text":"To wystarczyło."},
      {"type":"sep"},
      {"type":"line","text":"Upadła lekko na łoże i zamknęła oczy."},
      {"type":"line","text":"W tej samej chwili czar rozszedł się"},
      {"type":"line","text":"po całym pałacu."},
      {"type":"line","text":"Zasnęli strażnicy, damy w komnatach,"},
      {"type":"line","text":"kucharze, konie i psy."},
      {"type":"line","text":"Nawet ogień na paleniskach znieruchomiał."},
      {"type":"sep"},
      {"type":"line","text":"Wokół zamku zaczęły rosnąć ciernie,"},
      {"type":"line","text":"jeżyny i gęsty las."},
      {"type":"line","text":"Z roku na rok kolczaste gałęzie"},
      {"type":"line","text":"splatały się coraz ciaśniej,"},
      {"type":"line","text":"aż ukryły wieże przed wzrokiem ludzi."},
      {"type":"sep"},
      {"type":"line","text":"Minęło wiele lat."},
      {"type":"line","text":"Zamek ze śpiącą królewną stał się legendą."},
      {"type":"sep"},
      {"type":"line","text":"W końcu, gdy niemal dokładnie minęło sto lat,"},
      {"type":"line","text":"do tych stron przybył młody książę."},
      {"type":"line","text":"Kiedy książę zbliżył się do cierni,"},
      {"type":"line","text":"gęsty mur kolczastych gałęzi rozsunął się sam,"},
      {"type":"line","text":"tworząc wąską ścieżkę."},
      {"type":"sep"},
      {"type":"line","text":"Tam, na łożu pod baldachimem, spała królewna."},
      {"type":"line","text":"Wyglądała jak marzenie,"},
      {"type":"line","text":"które czekało cierpliwie sto lat"},
      {"type":"line","text":"na właściwy moment."},
      {"type":"sep"},
      {"type":"line","text":"Książę zbliżył się, uklęknął przy niej"},
      {"type":"line","text":"i pochylił głowę z szacunkiem."},
      {"type":"line","text":"W tej właśnie chwili sen dobiegł końca."},
      {"type":"line","text":"Królewna otworzyła oczy."},
      {"type":"sep"},
      {"type":"line","text":"—"},
      {"type":"line","text":"Czy to już poranek? —"},
      {"type":"line","text":"zapytała cicho."},
      {"type":"line","text":"Książę uśmiechnął się i odpowiedział, że tak —"},
      {"type":"line","text":"poranek, na który czekało całe królestwo."},
      {"type":"sep"},
      {"type":"line","text":"W jednej chwili przebudził się cały pałac."},
      {"type":"line","text":"Ogień znów zatańczył w kominkach,"},
      {"type":"line","text":"kucharze wrócili do pracy,"},
      {"type":"line","text":"a po korytarzach popłynął gwar,"},
      {"type":"line","text":"jakby minęła zaledwie jedna noc, a nie sto lat."},
      {"type":"sep"},
      {"type":"line","text":"Nawet najdłuższa noc nie trwa wiecznie."},
      {"type":"line","text":"Czasem trzeba przejść przez ciernie, ciszę"},
      {"type":"line","text":"i oczekiwanie,"},
      {"type":"line","text":"by dotrzeć do chwili,"},
      {"type":"line","text":"w której wszystko znów budzi się do życia."},
      {"type":"sep"},
      {"type":"line","text":"Kiedy więc wieczorem świat cichnie,"},
      {"type":"line","text":"warto pamiętać,"},
      {"type":"line","text":"że po każdej nocy przychodzi poranek."},
      {"type":"line","text":"A po każdej opowieści —"},
      {"type":"line","text":"dobry sen."},
      {"type":"sep"},
      {"type":"section","text":"— OUTRO —"},
      {"type":"line","text":"To była Śpiąca Królewna."},
      {"type":"line","text":"Na podstawie baśni Charlesa Perraulta."},
      {"type":"line","text":"Tłumaczenie i opracowanie — 3TaTaTa."},
      {"type":"line","text":"Dobranoc."}
    ]
  },

    "sections": [
      {"type":"title","text":"Syrenka Warszawska"},
      {"type":"meta","text":"3TaTaTa · Legenda polska"},
      {"type":"section","text":"— INTRO —"},
      {"type":"line","text":"3TaTaTa prezentuje."},
      {"type":"line","text":"Syrenka Warszawska."},
      {"type":"line","text":"Na podstawie klasycznej polskiej legendy."},
      {"type":"line","text":"Tłumaczenie i opracowanie — 3TaTaTa."},
      {"type":"sep"},
      {"type":"section","text":"— OPOWIEŚĆ —"},
      {"type":"line","text":"Dawno temu, gdy Wisła płynęła szeroko i spokojnie,"},
      {"type":"line","text":"w miejscu dzisiejszej Warszawy"},
      {"type":"line","text":"nie było jeszcze wielkiego miasta."},
      {"type":"line","text":"Były tylko rybackie chaty, drewniane pomosty"},
      {"type":"line","text":"i ogniska rozświetlające wieczorami ciemność nad wodą."},
      {"type":"sep"},
      {"type":"line","text":"Pewnego wieczoru, gdy mgła zaczęła unosić się nad wodą,"},
      {"type":"line","text":"rybacy ukryli się wśród trzcin i czekali."},
      {"type":"line","text":"Z głębi wynurzyła się postać"},
      {"type":"line","text":"dziewczyny o długich, jasnych włosach,"},
      {"type":"line","text":"a zamiast nóg miała srebrzysty rybi ogon."},
      {"type":"line","text":"Była to syrena."},
      {"type":"sep"},
      {"type":"line","text":"Jej głos był miękki, czysty i przejmująco piękny."},
      {"type":"line","text":"W tej melodii było coś dobrego,"},
      {"type":"line","text":"coś tęsknego i coś tak pięknego,"},
      {"type":"line","text":"że nikt nie miał odwagi się poruszyć."},
      {"type":"sep"},
      {"type":"line","text":"Syrena uwalniała ryby z sieci rybaków."},
      {"type":"line","text":"Robiła to delikatnie,"},
      {"type":"line","text":"jakby chciała ocalić każde małe życie."},
      {"type":"line","text":"W jej ruchach nie było gniewu."},
      {"type":"line","text":"Była tylko troska o rzekę i jej stworzenia."},
      {"type":"sep"},
      {"type":"line","text":"Pewnego dnia chciwy handlarz"},
      {"type":"line","text":"zastawił na nią podstępną pułapkę."},
      {"type":"line","text":"Zarzucił na nią ciężką sieć,"},
      {"type":"line","text":"wyciągnął ją na brzeg"},
      {"type":"line","text":"i zamknął w drewnianej szopie."},
      {"type":"sep"},
      {"type":"line","text":"Kiedy mieszkańcy osady dowiedzieli się, co zrobił,"},
      {"type":"line","text":"ogarnął ich gniew."},
      {"type":"line","text":"Zebrali kilku towarzyszy i uwolnili syrenę."},
      {"type":"sep"},
      {"type":"line","text":"Kiedy tylko dotknęła wody,"},
      {"type":"line","text":"syrena uniosła się lekko ponad falami."},
      {"type":"line","text":"W jednej dłoni trzymała miecz,"},
      {"type":"line","text":"w drugiej okrągłą tarczę."},
      {"type":"line","text":"Jej twarz była odważna, dumna"},
      {"type":"line","text":"i gotowa do obrony tych,"},
      {"type":"line","text":"którzy okazali jej serce."},
      {"type":"sep"},
      {"type":"line","text":"Powiedziała, że od tej pory"},
      {"type":"line","text":"będzie strzec ludzi mieszkających nad Wisłą."},
      {"type":"line","text":"Będzie czuwać nad ich domami,"},
      {"type":"line","text":"łodziami, rodzinami"},
      {"type":"line","text":"i nad samym miastem,"},
      {"type":"line","text":"które kiedyś tutaj wyrośnie."},
      {"type":"sep"},
      {"type":"line","text":"I właśnie dlatego Syrenka Warszawska"},
      {"type":"line","text":"do dziś jest jednym z najważniejszych"},
      {"type":"line","text":"symboli stolicy —"},
      {"type":"line","text":"znakiem odwagi, wolności"},
      {"type":"line","text":"i wierności temu, co naprawdę ważne."},
      {"type":"sep"},
      {"type":"section","text":"— OUTRO —"},
      {"type":"line","text":"To była Syrenka Warszawska."},
      {"type":"line","text":"Na podstawie klasycznej polskiej legendy."},
      {"type":"line","text":"Tłumaczenie i opracowanie — 3TaTaTa."},
      {"type":"line","text":"Dobranoc."}
    ]
  }
];
