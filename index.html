  const dt = ts - lastTime; lastTime = ts;
  scrollPos += speed * (dt / 1000) * 60;
  const container = document.getElementById('scroll-container');
  const maxScroll = container.scrollHeight - container.clientHeight;
  scrollPos = Math.min(scrollPos, maxScroll);
  container.scrollTop = Math.floor(scrollPos);
  updateProgress(scrollPos / maxScroll);
  updateActiveLine();
  if (scrollPos >= maxScroll) { stopPlay(); return; }
  rafId = requestAnimationFrame(scrollStep);
}

function resetScroll() {
  stopPlay(); scrollPos = 0;
  document.getElementById('scroll-container').scrollTop = 0;
  updateProgress(0);
}

function speedUp()  { speed = Math.min(speed + 0.5, 20); syncSpeedInput(); }
function slowDown() { speed = Math.max(speed - 0.5, 0.1); syncSpeedInput(); }
function syncSpeedInput() { document.getElementById('speed-input').value = Math.round(speed * 10) / 10; }
function onSpeedInput() { const v = parseFloat(document.getElementById('speed-input').value); if (!isNaN(v)) speed = Math.max(0.1, Math.min(20, v)); }

function cycleFont() { fontIdx = (fontIdx + 1) % fontSizes.length; document.getElementById('font-input').value = fontSizes[fontIdx]; applyFont(); }
function onFontInput() { const v = parseInt(document.getElementById('font-input').value); if (!isNaN(v) && v >= 8 && v <= 80) document.querySelectorAll('.line-text').forEach(el => el.style.fontSize = v + 'px'); }
function applyFont() { const size = fontSizes[fontIdx]; document.getElementById('font-input').value = size; document.querySelectorAll('.line-text').forEach(el => el.style.fontSize = size + 'px'); }

function updatePlayBtn() {
  document.getElementById('play-icon').textContent = isPlaying ? '⏸' : '▶';
  document.getElementById('play-label').textContent = isPlaying ? 'PAUZA' : 'PLAY';
  document.getElementById('play-btn').classList.toggle('playing', isPlaying);
}
function updateProgress(r) { document.getElementById('progress-bar').style.width = (r * 100) + '%'; }
function updateActiveLine() {
  const container = document.getElementById('scroll-container');
  const midY = container.getBoundingClientRect().top + container.clientHeight / 2;
  document.querySelectorAll('.line-text').forEach(el => {
    const r = el.getBoundingClientRect();
    el.classList.toggle('active', r.top < midY && r.bottom > midY);
  });
}

function loadGitHubConfig() {
  const saved = localStorage.getItem('gh_config');
  if (saved) { const c = JSON.parse(saved); document.getElementById('gh-user').value = c.user || ''; document.getElementById('gh-repo').value = c.repo || ''; document.getElementById('gh-path').value = c.path || ''; }
}
async function syncFromGitHub() {
  const user = document.getElementById('gh-user').value.trim();
  const repo = document.getElementById('gh-repo').value.trim();
  const path = document.getElementById('gh-path').value.trim();
  const status = document.getElementById('sync-status');
  if (!user || !repo) { status.textContent = '⚠ Podaj użytkownika i repozytorium.'; return; }
  localStorage.setItem('gh_config', JSON.stringify({user, repo, path}));
  status.textContent = '⏳ Pobieranie…';
  const apiPath = path ? `contents/${path}` : 'contents';
  try {
    const res = await fetch(`https://api.github.com/repos/${user}/${repo}/${apiPath}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const files = await res.json();
    const txtFiles = files.filter(f => f.name.endsWith('.txt') || f.name.endsWith('.md'));
    if (!txtFiles.length) { status.textContent = '⚠ Brak plików .txt / .md.'; return; }
    status.textContent = `⏳ Pobieranie ${txtFiles.length} pliku/plików…`;
    const fetched = [];
    for (const f of txtFiles) {
      const r = await fetch(f.download_url);
      const text = await r.text();
      fetched.push(parseTextFile(text, f.name.replace(/\.\w+$/, '')));
    }
    allStories = [...STORIES, ...fetched];
    renderMenu();
    status.textContent = `✓ Zsynchronizowano ${fetched.length} bajek.`;
  } catch(e) { status.textContent = `✗ Błąd: ${e.message}`; }
}
function parseTextFile(text, filename) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l);
  const sections = [{type:'title', text: lines[0] || filename}, {type:'meta', text:'3TaTaTa — z GitHub'}];
  for (let i = 1; i < lines.length; i++) {
    const l = lines[i];
    if (l.startsWith('#') || l.startsWith('—') || l.startsWith('--')) sections.push({type:'section', text: l.replace(/^#+\s*/, '')});
    else if (l === '---' || l === '***') sections.push({type:'sep'});
    else sections.push({type:'line', text: l});
  }
  return { id: 100 + Math.random(), title: lines[0] || filename, tag: 'GitHub', sections };
}

loadGitHubConfig();
renderMenu();
</script>
