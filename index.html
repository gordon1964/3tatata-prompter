        "text": "lasy, mokradła i spokojne łąki."
      },
      {
        "type": "line",
        "text": "Rzeka płynęła wolno, dostojnie i srebrzyła"
      },
      {
        "type": "line",
        "text": "się w blasku słońca."
      },
      {
        "type": "line",
        "text": "Nad jej brzegiem mieszkał młody rybak"
      },
      {
        "type": "line",
        "text": "o imieniu Wars."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Wars był człowiekiem pracowitym, uczciwym i"
      },
      {
        "type": "line",
        "text": "pogodnym."
      },
      {
        "type": "line",
        "text": "Każdego ranka wypływał na rzekę niewielką"
      },
      {
        "type": "line",
        "text": "łodzią, zarzucał sieci i wracał z"
      },
      {
        "type": "line",
        "text": "połowu wtedy, gdy niebo zaczynało przybierać"
      },
      {
        "type": "line",
        "text": "złote i różowe barwy."
      },
      {
        "type": "line",
        "text": "Znał Wisłę jak własną dłoń."
      },
      {
        "type": "line",
        "text": "Wiedział, gdzie nurt jest szybki, a"
      },
      {
        "type": "line",
        "text": "gdzie spokojny."
      },
      {
        "type": "line",
        "text": "Wiedział też, kiedy rzeka jest łagodna,"
      },
      {
        "type": "line",
        "text": "a kiedy lepiej okazać jej szacunek"
      },
      {
        "type": "line",
        "text": "i cierpliwość."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Ludzie z pobliskich osad lubili Warsa."
      },
      {
        "type": "line",
        "text": "Zawsze dzielił się tym, co miał,"
      },
      {
        "type": "line",
        "text": "nikogo nie zostawiał bez pomocy i"
      },
      {
        "type": "line",
        "text": "nigdy nie odmawiał dobrego słowa."
      },
      {
        "type": "line",
        "text": "Mimo to często czuł, że w"
      },
      {
        "type": "line",
        "text": "jego sercu jest jeszcze miejsce na"
      },
      {
        "type": "line",
        "text": "coś, czego nie umiał nazwać."
      },
      {
        "type": "line",
        "text": "Jakby los przygotował dla niego spotkanie,"
      },
      {
        "type": "line",
        "text": "które miało odmienić całe jego życie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Pewnego wieczoru, gdy mgła zaczęła unosić"
      },
      {
        "type": "line",
        "text": "się nad wodą, a ostatnie promienie"
      },
      {
        "type": "line",
        "text": "słońca tańczyły po powierzchni rzeki, Wars"
      },
      {
        "type": "line",
        "text": "usłyszał śpiew."
      },
      {
        "type": "line",
        "text": "Nie był to śpiew ptaka ani"
      },
      {
        "type": "line",
        "text": "człowieka."
      },
      {
        "type": "line",
        "text": "Brzmiał lekko, miękko i tajemniczo, jakby"
      },
      {
        "type": "line",
        "text": "sama Wisła opowiadała starą baśń."
      },
      {
        "type": "line",
        "text": "Rybak odłożył wiosło i rozejrzał się"
      },
      {
        "type": "line",
        "text": "uważnie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Na początku nikogo nie zobaczył."
      },
      {
        "type": "line",
        "text": "Tylko fale poruszały się delikatnie przy"
      },
      {
        "type": "line",
        "text": "burcie łodzi."
      },
      {
        "type": "line",
        "text": "Lecz po chwili śpiew rozległ się"
      },
      {
        "type": "line",
        "text": "znowu."
      },
      {
        "type": "line",
        "text": "Wars popłynął za tym głosem, aż"
      },
      {
        "type": "line",
        "text": "dotarł do miejsca, gdzie rzeka rozszerzała"
      },
      {
        "type": "line",
        "text": "się i tworzyła spokojną zatokę."
      },
      {
        "type": "line",
        "text": "Tam, pośród sitowia i srebrzystej wody,"
      },
      {
        "type": "line",
        "text": "ujrzał niezwykłą postać."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Była to młoda dziewczyna o długich"
      },
      {
        "type": "line",
        "text": "włosach i jasnym spojrzeniu."
      },
      {
        "type": "line",
        "text": "Siedziała na kamieniu przy brzegu, a"
      },
      {
        "type": "line",
        "text": "jej pieśń była tak piękna, że"
      },
      {
        "type": "line",
        "text": "nawet wiatr ucichł, jakby chciał jej"
      },
      {
        "type": "line",
        "text": "posłuchać."
      },
      {
        "type": "line",
        "text": "W legendach opowiada się różnie o"
      },
      {
        "type": "line",
        "text": "Sawie —"
      },
      {
        "type": "line",
        "text": "jedni mówili, że była córką tej"
      },
      {
        "type": "line",
        "text": "ziemi, inni, że wodną opiekunką Wisły,"
      },
      {
        "type": "line",
        "text": "a jeszcze inni, że syreną, która"
      },
      {
        "type": "line",
        "text": "potrafiła przybierać ludzką postać."
      },
      {
        "type": "line",
        "text": "Wars wiedział tylko jedno: nigdy wcześniej"
      },
      {
        "type": "line",
        "text": "nie widział nikogo tak niezwykłego."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Dziewczyna spojrzała na niego bez lęku"
      },
      {
        "type": "line",
        "text": "i uśmiechnęła się łagodnie."
      },
      {
        "type": "line",
        "text": "Nazywała się Sawa."
      },
      {
        "type": "line",
        "text": "Rozmawiali długo, jakby znali się od"
      },
      {
        "type": "line",
        "text": "wielu lat."
      },
      {
        "type": "line",
        "text": "Opowiadała o rzece, o zwierzętach mieszkających"
      },
      {
        "type": "line",
        "text": "w trzcinach, o świetle księżyca odbijającym"
      },
      {
        "type": "line",
        "text": "się w wodzie i o tym,"
      },
      {
        "type": "line",
        "text": "jak ważne jest, by człowiek żył"
      },
      {
        "type": "line",
        "text": "w zgodzie z naturą."
      },
      {
        "type": "line",
        "text": "Wars słuchał jej jak zaczarowany."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Od tego dnia zaczął wracać w"
      },
      {
        "type": "line",
        "text": "to miejsce coraz częściej."
      },
      {
        "type": "line",
        "text": "Każde spotkanie z Sawą napełniało go"
      },
      {
        "type": "line",
        "text": "spokojem i radością."
      },
      {
        "type": "line",
        "text": "Rozmawiali o prostych sprawach, o marzeniach,"
      },
      {
        "type": "line",
        "text": "o ludziach i o przyszłości."
      },
      {
        "type": "line",
        "text": "Im częściej się widywali, tym mocniej"
      },
      {
        "type": "line",
        "text": "czuli, że są sobie bliscy."
      },
      {
        "type": "line",
        "text": "Między nimi rosło uczucie ciche, dobre"
      },
      {
        "type": "line",
        "text": "i prawdziwe."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Nie wszystkim jednak podobało się to"
      },
      {
        "type": "line",
        "text": "szczęście."
      },
      {
        "type": "line",
        "text": "Według starej legendy wieść o niezwykłej"
      },
      {
        "type": "line",
        "text": "dziewczynie dotarła do chciwego księcia, który"
      },
      {
        "type": "line",
        "text": "władał okolicą."
      },
      {
        "type": "line",
        "text": "Gdy usłyszał o Sawie i o"
      },
      {
        "type": "line",
        "text": "jej niezwykłej urodzie, zapragnął ją schwytać"
      },
      {
        "type": "line",
        "text": "i zatrzymać tylko dla siebie."
      },
      {
        "type": "line",
        "text": "Nie interesowało go jej serce ani"
      },
      {
        "type": "line",
        "text": "wolność."
      },
      {
        "type": "line",
        "text": "Chciał posiadać to, co piękne, jak"
      },
      {
        "type": "line",
        "text": "kolejny skarb w swojej komnacie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Pewnej nocy wysłał swoich ludzi nad"
      },
      {
        "type": "line",
        "text": "rzekę."
      },
      {
        "type": "line",
        "text": "Kazano im schwytać Sawę i przyprowadzić"
      },
      {
        "type": "line",
        "text": "ją do grodu."
      },
      {
        "type": "line",
        "text": "Lecz Wisła nie lubi pychy ani"
      },
      {
        "type": "line",
        "text": "przemocy."
      },
      {
        "type": "line",
        "text": "Kiedy słudzy zakradli się do zatoki,"
      },
      {
        "type": "line",
        "text": "zerwał się silny wiatr."
      },
      {
        "type": "line",
        "text": "Woda wezbrała, łodzie zaczęły kołysać się"
      },
      {
        "type": "line",
        "text": "gwałtownie, a mgła zgęstniała tak bardzo,"
      },
      {
        "type": "line",
        "text": "że nie widzieli nawet własnych dłoni."
      },
      {
        "type": "line",
        "text": "Wars, który dowiedział się o planie"
      },
      {
        "type": "line",
        "text": "księcia, popłynął, by ostrzec Sawę."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Sawa nie uciekła ze strachu."
      },
      {
        "type": "line",
        "text": "Stanęła przy brzegu dumna i spokojna."
      },
      {
        "type": "line",
        "text": "Jej głos popłynął nad wodą, mocny"
      },
      {
        "type": "line",
        "text": "i jasny."
      },
      {
        "type": "line",
        "text": "Pieśń była inna niż wcześniej —"
      },
      {
        "type": "line",
        "text": "nie tylko piękna, ale też pełna"
      },
      {
        "type": "line",
        "text": "siły."
      },
      {
        "type": "line",
        "text": "Fale uderzyły o łodzie napastników, sieci"
      },
      {
        "type": "line",
        "text": "zaplątały się między wiosłami, a ludzie"
      },
      {
        "type": "line",
        "text": "księcia w popłochu uciekli z powrotem"
      },
      {
        "type": "line",
        "text": "na ląd."
      },
      {
        "type": "line",
        "text": "Zrozumieli, że nie wolno podnosić ręki"
      },
      {
        "type": "line",
        "text": "na to, co należy do rzeki"
      },
      {
        "type": "line",
        "text": "i tej ziemi."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Po tej nocy Wars i Sawa"
      },
      {
        "type": "line",
        "text": "wiedzieli już, że ich losy połączyły"
      },
      {
        "type": "line",
        "text": "się na zawsze."
      },
      {
        "type": "line",
        "text": "Postanowili zostać razem nad Wisłą i"
      },
      {
        "type": "line",
        "text": "stworzyć miejsce gościnne, bezpieczne i pełne"
      },
      {
        "type": "line",
        "text": "życzliwości dla tych, którzy będą tędy"
      },
      {
        "type": "line",
        "text": "wędrować."
      },
      {
        "type": "line",
        "text": "Z czasem wokół ich domu zaczęli"
      },
      {
        "type": "line",
        "text": "osiedlać się inni ludzie: rybacy, rzemieślnicy,"
      },
      {
        "type": "line",
        "text": "kupcy i podróżni."
      },
      {
        "type": "line",
        "text": "Powstała osada, która rosła z roku"
      },
      {
        "type": "line",
        "text": "na rok."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Mówiono, że miejsce to wyrastało z"
      },
      {
        "type": "line",
        "text": "odwagi Warsa i z mądrości Sawy."
      },
      {
        "type": "line",
        "text": "Jedno dawało siłę, drugie serce."
      },
      {
        "type": "line",
        "text": "Jedno chroniło ludzi przed niebezpieczeństwem, drugie"
      },
      {
        "type": "line",
        "text": "przypominało, że dom buduje się nie"
      },
      {
        "type": "line",
        "text": "tylko z drewna i kamienia, lecz"
      },
      {
        "type": "line",
        "text": "także z dobroci, zaufania i wspólnoty."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Z biegiem lat osada nad Wisłą"
      },
      {
        "type": "line",
        "text": "stawała się coraz ważniejsza."
      },
      {
        "type": "line",
        "text": "Przybywali do niej nowi mieszkańcy, a"
      },
      {
        "type": "line",
        "text": "pamięć o Warsie i Sawie przechodziła"
      },
      {
        "type": "line",
        "text": "z ust do ust."
      },
      {
        "type": "line",
        "text": "W końcu zaczęto mówić, że to"
      },
      {
        "type": "line",
        "text": "właśnie od ich imion wzięła się"
      },
      {
        "type": "line",
        "text": "nazwa miasta —"
      },
      {
        "type": "line",
        "text": "Warszawa."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "A kiedy wieczorem Wisła błyszczy srebrzyście,"
      },
      {
        "type": "line",
        "text": "a nad wodą niesie się cichy"
      },
      {
        "type": "line",
        "text": "szum, niektórzy mówią, że wciąż można"
      },
      {
        "type": "line",
        "text": "usłyszeć dawną pieśń Sawy."
      },
      {
        "type": "line",
        "text": "A jeśli ktoś ma dobre serce"
      },
      {
        "type": "line",
        "text": "i umie słuchać uważnie, być może"
      },
      {
        "type": "line",
        "text": "odnajdzie w niej odrobinę tej samej"
      },
      {
        "type": "line",
        "text": "nadziei, od której zaczęła się legenda"
      },
      {
        "type": "line",
        "text": "o Warsie i Sawie."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OUTRO —"
      },
      {
        "type": "line",
        "text": "To była Legenda o Warsie i Sawie."
      },
      {
        "type": "line",
        "text": "Na podstawie klasycznej polskiej legendy."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i opracowanie — 3TaTaTa."
      },
      {
        "type": "line",
        "text": "Dobranoc."
      }
    ]
  },
  {
    "id": 10,
    "title": "Calineczka",
    "tag": "Baśń — Andersen",
    "sections": [
      {
        "type": "title",
        "text": "Calineczka"
      },
      {
        "type": "meta",
        "text": "3TaTaTa · Na podstawie baśni Andersena"
      },
      {
        "type": "section",
        "text": "— INTRO —"
      },
      {
        "type": "line",
        "text": "3TaTaTa prezentuje."
      },
      {
        "type": "line",
        "text": "Calineczka."
      },
      {
        "type": "line",
        "text": "Na podstawie baśni Hansa Christiana Andersena."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i opracowanie — 3TaTaTa."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OPOWIEŚĆ —"
      },
      {
        "type": "line",
        "text": "Dawno, dawno temu żyła kobieta, która"
      },
      {
        "type": "line",
        "text": "bardzo pragnęła mieć dziecko."
      },
      {
        "type": "line",
        "text": "Nie wiedziała jednak, jak spełnić swoje"
      },
      {
        "type": "line",
        "text": "marzenie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Pewnego dnia poszła do dobrej czarodziejki"
      },
      {
        "type": "line",
        "text": "i powiedziała:"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Tak bardzo chciałabym mieć choć maleńkie"
      },
      {
        "type": "line",
        "text": "dziecko."
      },
      {
        "type": "line",
        "text": "Czy możesz mi pomóc?"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Czarodziejka uśmiechnęła się łagodnie, podała jej"
      },
      {
        "type": "line",
        "text": "ziarenko jęczmienia i rzekła:"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "To nie jest zwyczajne ziarenko."
      },
      {
        "type": "line",
        "text": "Zasadź je w doniczce, a potem"
      },
      {
        "type": "line",
        "text": "cierpliwie czekaj."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Kobieta podziękowała, wróciła do domu i"
      },
      {
        "type": "line",
        "text": "zrobiła dokładnie tak, jak jej powiedziano."
      },
      {
        "type": "line",
        "text": "Wsadziła ziarenko do ziemi, podlała je"
      },
      {
        "type": "line",
        "text": "i postawiła doniczkę na oknie."
      },
      {
        "type": "line",
        "text": "Ledwie minęło kilka dni, a z"
      },
      {
        "type": "line",
        "text": "ziemi wyrósł piękny, duży kwiat, podobny"
      },
      {
        "type": "line",
        "text": "trochę do tulipana."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Jego płatki były jeszcze zamknięte, jakby"
      },
      {
        "type": "line",
        "text": "ukrywały jakiś sekret."
      },
      {
        "type": "line",
        "text": "Kobieta pochyliła się nad nim i"
      },
      {
        "type": "line",
        "text": "lekko pocałowała kwiat."
      },
      {
        "type": "line",
        "text": "W tej samej chwili płatki rozchyliły"
      },
      {
        "type": "line",
        "text": "się szeroko."
      },
      {
        "type": "line",
        "text": "W samym środku, na zielonym słupku"
      },
      {
        "type": "line",
        "text": "kwiatu, siedziała maleńka dziewczynka."
      },
      {
        "type": "line",
        "text": "Była śliczna i delikatna."
      },
      {
        "type": "line",
        "text": "Nie miała więcej niż długość ludzkiego"
      },
      {
        "type": "line",
        "text": "kciuka."
      },
      {
        "type": "line",
        "text": "Dlatego nazwano ją Calineczką."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Kobieta bardzo ją pokochała."
      },
      {
        "type": "line",
        "text": "Z łupinki orzecha zrobiła jej kołyskę."
      },
      {
        "type": "line",
        "text": "Materacykiem były niebieskie fiołki, a kocykiem"
      },
      {
        "type": "line",
        "text": "płatek czerwonej róży."
      },
      {
        "type": "line",
        "text": "W dzień Calineczka bawiła się na"
      },
      {
        "type": "line",
        "text": "stole."
      },
      {
        "type": "line",
        "text": "Stała tam miska z wodą, a"
      },
      {
        "type": "line",
        "text": "po jej brzegach leżały kwiaty."
      },
      {
        "type": "line",
        "text": "Na wodzie pływał szeroki liść tulipana"
      },
      {
        "type": "line",
        "text": "i właśnie na nim siadała Calineczka."
      },
      {
        "type": "line",
        "text": "Za pomocą dwóch końskich włosów wiosłowała"
      },
      {
        "type": "line",
        "text": "z jednego brzegu miski na drugi."
      },
      {
        "type": "line",
        "text": "Wyglądało to prześlicznie."
      },
      {
        "type": "line",
        "text": "Potrafiła też śpiewać tak cicho i"
      },
      {
        "type": "line",
        "text": "słodko, że każdy, kto ją usłyszał,"
      },
      {
        "type": "line",
        "text": "zatrzymywał się z zachwytu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Ale pewnej nocy wydarzyło się coś"
      },
      {
        "type": "line",
        "text": "strasznego."
      },
      {
        "type": "line",
        "text": "Przez rozbitą szybę do pokoju wskoczyła"
      },
      {
        "type": "line",
        "text": "wielka, brzydka ropucha."
      },
      {
        "type": "line",
        "text": "Była mokra, ciężka i odrażająca."
      },
      {
        "type": "line",
        "text": "Ropucha podeszła do stołu, zajrzała do"
      },
      {
        "type": "line",
        "text": "łupinki orzecha, gdzie spała Calineczka, i"
      },
      {
        "type": "line",
        "text": "mruknęła:"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "To byłaby doskonała żona dla mojego"
      },
      {
        "type": "line",
        "text": "syna."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Chwyciła łupinkę wraz ze śpiącą dziewczynką"
      },
      {
        "type": "line",
        "text": "i wyskoczyła przez okno do ogrodu."
      },
      {
        "type": "line",
        "text": "Tam, obok szerokiego strumienia, było błotniste"
      },
      {
        "type": "line",
        "text": "bagno, gdzie mieszkała ropucha wraz ze"
      },
      {
        "type": "line",
        "text": "swoim synem."
      },
      {
        "type": "line",
        "text": "Syn był równie brzydki jak matka."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Ropucha położyła Calineczkę na wielkim liściu"
      },
      {
        "type": "line",
        "text": "na środku strumienia."
      },
      {
        "type": "line",
        "text": "Kiedy rankiem słońce wzeszło, Calineczka się"
      },
      {
        "type": "line",
        "text": "obudziła."
      },
      {
        "type": "line",
        "text": "Rozejrzała się dookoła i od razu"
      },
      {
        "type": "line",
        "text": "zaczęła płakać."
      },
      {
        "type": "line",
        "text": "Wszędzie wokół była tylko woda."
      },
      {
        "type": "line",
        "text": "Nie było jak wrócić na brzeg."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Tymczasem małe rybki pływające pod liściem"
      },
      {
        "type": "line",
        "text": "usłyszały płacz Calineczki."
      },
      {
        "type": "line",
        "text": "Wynurzyły główki z wody, spojrzały na"
      },
      {
        "type": "line",
        "text": "nią i zrobiło im się jej"
      },
      {
        "type": "line",
        "text": "bardzo żal."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Nie, nie może zostać z tą"
      },
      {
        "type": "line",
        "text": "okropną ropuchą —"
      },
      {
        "type": "line",
        "text": "powiedziały."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Podpłynęły do zielonej łodygi, która trzymała"
      },
      {
        "type": "line",
        "text": "liść, i przegryzły ją zębami."
      },
      {
        "type": "line",
        "text": "Liść oderwał się i popłynął z"
      },
      {
        "type": "line",
        "text": "prądem daleko, daleko od brzegu."
      },
      {
        "type": "line",
        "text": "Calineczka odpływała coraz dalej, a ropucha"
      },
      {
        "type": "line",
        "text": "nie mogła jej dogonić."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Dziewczynka bała się, ale czuła też"
      },
      {
        "type": "line",
        "text": "ulgę."
      },
      {
        "type": "line",
        "text": "Siedziała na liściu jak w małej"
      },
      {
        "type": "line",
        "text": "łódce i płynęła przez świat."
      },
      {
        "type": "line",
        "text": "Ptaki śpiewały nad nią, słońce świeciło,"
      },
      {
        "type": "line",
        "text": "a wiatr delikatnie poruszał wodą."
      },
      {
        "type": "line",
        "text": "Nagle nadleciał piękny biały motyl."
      },
      {
        "type": "line",
        "text": "Krążył wokół niej tak długo, aż"
      },
      {
        "type": "line",
        "text": "w końcu usiadł na liściu."
      },
      {
        "type": "line",
        "text": "Calineczka bardzo się ucieszyła, bo nie"
      },
      {
        "type": "line",
        "text": "była już sama."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Niedługo potem obok przepłynął duży chrabąszcz."
      },
      {
        "type": "line",
        "text": "Zobaczył dziewczynkę, objął ją w pas"
      },
      {
        "type": "line",
        "text": "swoimi nóżkami i uniósł wysoko na"
      },
      {
        "type": "line",
        "text": "drzewo."
      },
      {
        "type": "line",
        "text": "Liść popłynął dalej, a motyl odfrunął."
      },
      {
        "type": "line",
        "text": "Calineczka bardzo się przestraszyła."
      },
      {
        "type": "line",
        "text": "Ale chrabąszcz był z siebie ogromnie"
      },
      {
        "type": "line",
        "text": "zadowolony."
      },
      {
        "type": "line",
        "text": "Posadził ją na zielonym liściu, dał"
      },
      {
        "type": "line",
        "text": "jej miodu z kwiatów i powiedział,"
      },
      {
        "type": "line",
        "text": "że jest śliczna."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Wkrótce przyszły inne chrabąszcze."
      },
      {
        "type": "line",
        "text": "Obejrzały Calineczkę bardzo dokładnie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Ma tylko dwie nogi —"
      },
      {
        "type": "line",
        "text": "powiedział jeden."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Jakie ma cienkie biodra —"
      },
      {
        "type": "line",
        "text": "dodał drugi."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Nie ma czułków —"
      },
      {
        "type": "line",
        "text": "zauważył trzeci."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Jest po prostu brzydka —"
      },
      {
        "type": "line",
        "text": "stwierdziły samice chrabąszczy."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "I chrabąszcz zostawił ją samą na"
      },
      {
        "type": "line",
        "text": "stokrotce."
      },
      {
        "type": "line",
        "text": "Calineczka znów zaczęła płakać."
      },
      {
        "type": "line",
        "text": "Było jej przykro, że uznano ją"
      },
      {
        "type": "line",
        "text": "za brzydką."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Mimo to żyła dalej."
      },
      {
        "type": "line",
        "text": "Przez całe lato mieszkała w lesie."
      },
      {
        "type": "line",
        "text": "Uplotła sobie łóżeczko z trawy, zawieszone"
      },
      {
        "type": "line",
        "text": "pod dużym liściem, żeby nie padał"
      },
      {
        "type": "line",
        "text": "na nią deszcz."
      },
      {
        "type": "line",
        "text": "Piła rosę z kwiatów i jadła"
      },
      {
        "type": "line",
        "text": "słodki pyłek."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Tak minęło lato, a potem jesień."
      },
      {
        "type": "line",
        "text": "Wszystkie ptaki odleciały."
      },
      {
        "type": "line",
        "text": "Kwiaty zwiędły."
      },
      {
        "type": "line",
        "text": "Liście opadły z drzew."
      },
      {
        "type": "line",
        "text": "Zrobiło się zimno."
      },
      {
        "type": "line",
        "text": "Ubranko Calineczki było już cienkie i"
      },
      {
        "type": "line",
        "text": "podarte."
      },
      {
        "type": "line",
        "text": "Trzęsła się z zimna i głodu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "W końcu dotarła do norki myszy"
      },
      {
        "type": "line",
        "text": "polnej."
      },
      {
        "type": "line",
        "text": "Mysz mieszkała ciepło i dostatnio."
      },
      {
        "type": "line",
        "text": "Miała pełną spiżarnię z ziarnem, schludny"
      },
      {
        "type": "line",
        "text": "dom i lubiła porządek."
      },
      {
        "type": "line",
        "text": "Kiedy zobaczyła przemarzniętą Calineczkę, ulitowała się"
      },
      {
        "type": "line",
        "text": "nad nią."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Wejdź do środka —"
      },
      {
        "type": "line",
        "text": "powiedziała."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Ogrzej się i zjedz coś."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Calineczka była bardzo wdzięczna."
      },
      {
        "type": "line",
        "text": "Przez całą zimę mieszkała u myszy."
      },
      {
        "type": "line",
        "text": "Pomagała jej sprzątać, opowiadała bajki i"
      },
      {
        "type": "line",
        "text": "dbała o porządek."
      },
      {
        "type": "line",
        "text": "Mysz była z niej zadowolona."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Pewnego dnia powiedziała: —"
      },
      {
        "type": "line",
        "text": "Będziemy mieli gościa."
      },
      {
        "type": "line",
        "text": "Od czasu do czasu odwiedza mnie"
      },
      {
        "type": "line",
        "text": "mój sąsiad, kret."
      },
      {
        "type": "line",
        "text": "To bardzo bogaty i uczony pan."
      },
      {
        "type": "line",
        "text": "Ma wielki dom pod ziemią i"
      },
      {
        "type": "line",
        "text": "nosi aksamitne futro."
      },
      {
        "type": "line",
        "text": "Gdybyś została jego żoną, byłoby ci"
      },
      {
        "type": "line",
        "text": "dobrze."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Kret był poważny, czarny i bardzo"
      },
      {
        "type": "line",
        "text": "dumny."
      },
      {
        "type": "line",
        "text": "Nie lubił słońca ani kwiatów."
      },
      {
        "type": "line",
        "text": "Mówił o nich z pogardą, bo"
      },
      {
        "type": "line",
        "text": "nigdy ich naprawdę nie widział."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Kret postanowił się z Calineczką ożenić."
      },
      {
        "type": "line",
        "text": "Ale Calineczka nie była szczęśliwa."
      },
      {
        "type": "line",
        "text": "Nie chciała żyć całe życie pod"
      },
      {
        "type": "line",
        "text": "ziemią, z dala od słońca, nieba"
      },
      {
        "type": "line",
        "text": "i ptasiego śpiewu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Pewnego dnia kret zaprosił mysz i"
      },
      {
        "type": "line",
        "text": "Calineczkę, aby przeszły z nim podziemnym"
      },
      {
        "type": "line",
        "text": "korytarzem."
      },
      {
        "type": "line",
        "text": "Po drodze leżała martwa jaskółka."
      },
      {
        "type": "line",
        "text": "Kret popchnął go łapą i powiedział:"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Ptaki są żałosne."
      },
      {
        "type": "line",
        "text": "Całe ich życie to śpiew i"
      },
      {
        "type": "line",
        "text": "bieda."
      },
      {
        "type": "line",
        "text": "Dobrze, że ja nie urodziłem się"
      },
      {
        "type": "line",
        "text": "ptakiem."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Ale Calineczce zrobiło się bardzo smutno."
      },
      {
        "type": "line",
        "text": "Kiedy mysz i kret odeszli, wróciła"
      },
      {
        "type": "line",
        "text": "do jaskółki sama."
      },
      {
        "type": "line",
        "text": "Rozsunęła miękkie pióra i położyła ucho"
      },
      {
        "type": "line",
        "text": "przy jej piersi."
      },
      {
        "type": "line",
        "text": "Wydawało jej się, że słyszy słabiutkie"
      },
      {
        "type": "line",
        "text": "bicie serca."
      },
      {
        "type": "line",
        "text": "Ptak nie był martwy."
      },
      {
        "type": "line",
        "text": "Był tylko zamarznięty i wycieńczony."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Calineczka od razu postanowiła mu pomóc."
      },
      {
        "type": "line",
        "text": "Przez całą zimę potajemnie opiekowała się"
      },
      {
        "type": "line",
        "text": "jaskółką."
      },
      {
        "type": "line",
        "text": "Przynosiła jej miękkie źdźbła trawy, ogrzewała"
      },
      {
        "type": "line",
        "text": "ją swoim ciałem i dawała wodę"
      },
      {
        "type": "line",
        "text": "z płatków kwiatów."
      },
      {
        "type": "line",
        "text": "Powoli ptak odzyskiwał siły."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Kiedy przyszła wiosna i słońce ogrzało"
      },
      {
        "type": "line",
        "text": "ziemię, jaskółka otworzyła oczy."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Uratowałaś mi życie —"
      },
      {
        "type": "line",
        "text": "powiedziała cicho."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Nigdy ci tego nie zapomnę."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Gdy ziemia zmiękła od ciepła, jaskółka"
      },
      {
        "type": "line",
        "text": "wyfrunęła przez otwór na powierzchnię."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Chodź ze mną —"
      },
      {
        "type": "line",
        "text": "powiedziała do Calineczki."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Usiądź na moich plecach."
      },
      {
        "type": "line",
        "text": "Polecimy daleko stąd, do ciepłych krajów."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Tym razem Calineczka nie zawahała się"
      },
      {
        "type": "line",
        "text": "ani chwili."
      },
      {
        "type": "line",
        "text": "Usiadła na grzbiecie jaskółki, a ptak"
      },
      {
        "type": "line",
        "text": "wzbił się wysoko w niebo."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Leciały nad lasami, nad morzami i"
      },
      {
        "type": "line",
        "text": "nad górami."
      },
      {
        "type": "line",
        "text": "Im dalej na południe, tym cieplej"
      },
      {
        "type": "line",
        "text": "robiło się w powietrzu."
      },
      {
        "type": "line",
        "text": "Wkrótce dotarły do cudownej krainy, gdzie"
      },
      {
        "type": "line",
        "text": "rosły winorośle, pachniały kwiaty i świeciło"
      },
      {
        "type": "line",
        "text": "łagodne słońce."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Pośród tej krainy stał biały marmurowy"
      },
      {
        "type": "line",
        "text": "pałac, a w jego pobliżu rosły"
      },
      {
        "type": "line",
        "text": "najpiękniejsze kwiaty."
      },
      {
        "type": "line",
        "text": "Jaskółka usiadła przy jednym z nich."
      },
      {
        "type": "line",
        "text": "W samym środku kwiatu siedział maleńki"
      },
      {
        "type": "line",
        "text": "człowiek."
      },
      {
        "type": "line",
        "text": "Był delikatny i piękny jak z"
      },
      {
        "type": "line",
        "text": "baśni."
      },
      {
        "type": "line",
        "text": "Na ramionach miał przezroczyste skrzydła, a"
      },
      {
        "type": "line",
        "text": "na głowie złotą koronę."
      },
      {
        "type": "line",
        "text": "Był królem kwiatów."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Gdy zobaczył Calineczkę, zachwycił się nią"
      },
      {
        "type": "line",
        "text": "od pierwszego spojrzenia."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Jesteś najpiękniejsza ze wszystkich —"
      },
      {
        "type": "line",
        "text": "powiedział."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Czy zostaniesz moją królową?"
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Calineczka zarumieniła się i uśmiechnęła."
      },
      {
        "type": "line",
        "text": "Tu, wśród słońca, kwiatów i wolności,"
      },
      {
        "type": "line",
        "text": "jej serce było szczęśliwe."
      },
      {
        "type": "line",
        "text": "Zgodziła się."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Wtedy z każdego kwiatu wyszli mali"
      },
      {
        "type": "line",
        "text": "ludzie i małe dziewczynki."
      },
      {
        "type": "line",
        "text": "Przynieśli jej dary."
      },
      {
        "type": "line",
        "text": "Najpiękniejszym prezentem była para delikatnych skrzydeł,"
      },
      {
        "type": "line",
        "text": "które przypięto jej do pleców, aby"
      },
      {
        "type": "line",
        "text": "mogła przelatywać z kwiatu na kwiat."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "A król kwiatów nadał jej nowe"
      },
      {
        "type": "line",
        "text": "imię."
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Nie będziesz już nazywać się Calineczka"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "powiedział —"
      },
      {
        "type": "line",
        "text": "bo to imię nie pasuje do"
      },
      {
        "type": "line",
        "text": "królowej kwiatów."
      },
      {
        "type": "line",
        "text": "Będziesz miała piękne imię: Maja."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Jaskółka siedziała nad nimi w gnieździe"
      },
      {
        "type": "line",
        "text": "i śpiewała najpiękniej, jak tylko umiała."
      },
      {
        "type": "line",
        "text": "Ale w głębi małego ptasiego serca"
      },
      {
        "type": "line",
        "text": "było też trochę smutku, bo bardzo"
      },
      {
        "type": "line",
        "text": "pokochała Calineczkę i trudno jej było"
      },
      {
        "type": "line",
        "text": "się z nią rozstać."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Tak jednak kończą się najpiękniejsze historie."
      },
      {
        "type": "line",
        "text": "Ci, którzy byli dobrzy, odważni i"
      },
      {
        "type": "line",
        "text": "wierni swojemu sercu, odnajdują w końcu"
      },
      {
        "type": "line",
        "text": "własne miejsce na świecie."
      },
      {
        "type": "line",
        "text": "I tak Calineczka, maleńka dziewczynka z"
      },
      {
        "type": "line",
        "text": "kwiatu, odnalazła dom, światło i szczęście."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OUTRO —"
      },
      {
        "type": "line",
        "text": "To była Calineczka."
      },
      {
        "type": "line",
        "text": "Na podstawie baśni Andersena."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i opracowanie — 3TaTaTa."
      },
      {
        "type": "line",
        "text": "Dobranoc."
      }
    ]
  },
  {
    "id": 11,
    "title": "Śpiąca Królewna",
    "tag": "Baśń — Perrault",
    "sections": [
      {
        "type": "title",
        "text": "Śpiąca Królewna"
      },
      {
        "type": "meta",
        "text": "3TaTaTa · Na podstawie baśni Perraulta"
      },
      {
        "type": "section",
        "text": "— INTRO —"
      },
      {
        "type": "line",
        "text": "3TaTaTa prezentuje."
      },
      {
        "type": "line",
        "text": "Śpiąca Królewna."
      },
      {
        "type": "line",
        "text": "Na podstawie klasycznej baśni Charlesa Perraulta."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i opracowanie — 3TaTaTa."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OPOWIEŚĆ —"
      },
      {
        "type": "line",
        "text": "Dawno temu żyli król i królowa,"
      },
      {
        "type": "line",
        "text": "którzy mieli wszystko, czego mogli zapragnąć"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "piękny pałac, wiernych poddanych, ogrody pełne"
      },
      {
        "type": "line",
        "text": "kwiatów i sale lśniące złotem."
      },
      {
        "type": "line",
        "text": "Jednego tylko brakowało w ich szczęściu."
      },
      {
        "type": "line",
        "text": "Bardzo pragnęli dziecka."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Minęły lata, aż pewnego dnia ich"
      },
      {
        "type": "line",
        "text": "życzenie wreszcie się spełniło."
      },
      {
        "type": "line",
        "text": "W całym królestwie rozbrzmiały dzwony, a"
      },
      {
        "type": "line",
        "text": "posłańcy ruszyli w świat z radosną"
      },
      {
        "type": "line",
        "text": "nowiną —"
      },
      {
        "type": "line",
        "text": "w pałacu przyszła na świat królewna."
      },
      {
        "type": "line",
        "text": "Była zdrowa, piękna i tak delikatna,"
      },
      {
        "type": "line",
        "text": "że wszyscy mówili o niej z"
      },
      {
        "type": "line",
        "text": "zachwytem."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Król postanowił urządzić wielką ucztę na"
      },
      {
        "type": "line",
        "text": "cześć córki."
      },
      {
        "type": "line",
        "text": "Zaproszono książąt, damy dworu, uczonych, rycerzy"
      },
      {
        "type": "line",
        "text": "i siedem wróżek, które miały obdarzyć"
      },
      {
        "type": "line",
        "text": "dziecko najlepszymi darami."
      },
      {
        "type": "line",
        "text": "Każda z nich niosła coś cennego:"
      },
      {
        "type": "line",
        "text": "wdzięk, dobroć, mądrość, odwagę, pogodę ducha,"
      },
      {
        "type": "line",
        "text": "łagodność i wewnętrzne światło, dzięki któremu"
      },
      {
        "type": "line",
        "text": "człowiek umie rozjaśniać świat wokół siebie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "W sali biesiadnej przygotowano najwspanialsze miejsca,"
      },
      {
        "type": "line",
        "text": "lecz w całym zamieszaniu zapomniano o"
      },
      {
        "type": "line",
        "text": "jeszcze jednej wróżce —"
      },
      {
        "type": "line",
        "text": "bardzo starej, mieszkającej samotnie w odległej"
      },
      {
        "type": "line",
        "text": "wieży."
      },
      {
        "type": "line",
        "text": "Nie zaproszono jej nie dlatego, że"
      },
      {
        "type": "line",
        "text": "chciano ją urazić, lecz dlatego, że"
      },
      {
        "type": "line",
        "text": "od dawna nikt jej nie widział"
      },
      {
        "type": "line",
        "text": "i wielu sądziło, że już nie"
      },
      {
        "type": "line",
        "text": "żyje."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "I właśnie wtedy, gdy ucztę rozpoczynano,"
      },
      {
        "type": "line",
        "text": "ciężkie drzwi otworzyły się z hukiem."
      },
      {
        "type": "line",
        "text": "Do sali weszła zapomniana wróżka."
      },
      {
        "type": "line",
        "text": "Jej suknia była ciemna jak noc,"
      },
      {
        "type": "line",
        "text": "a spojrzenie chłodne i dumne."
      },
      {
        "type": "line",
        "text": "Wszyscy umilkli."
      },
      {
        "type": "line",
        "text": "Król kazał natychmiast przygotować dla niej"
      },
      {
        "type": "line",
        "text": "miejsce, ale było już za późno,"
      },
      {
        "type": "line",
        "text": "by naprawić zniewagę, którą poczuła."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Stara wróżka podeszła do kołyski i"
      },
      {
        "type": "line",
        "text": "powiedziała głosem ostrym jak szkło: gdy"
      },
      {
        "type": "line",
        "text": "królewna dorośnie, ukłuje się wrzecionem i"
      },
      {
        "type": "line",
        "text": "umrze."
      },
      {
        "type": "line",
        "text": "W sali rozległ się szmer przerażenia."
      },
      {
        "type": "line",
        "text": "Królowa zbladła, a król ścisnął poręcz"
      },
      {
        "type": "line",
        "text": "tronu tak mocno, że aż pobielały"
      },
      {
        "type": "line",
        "text": "mu dłonie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Na szczęście siódma wróżka nie zdążyła"
      },
      {
        "type": "line",
        "text": "jeszcze wypowiedzieć swojego daru."
      },
      {
        "type": "line",
        "text": "Zbliżyła się do dziecka i rzekła"
      },
      {
        "type": "line",
        "text": "łagodnie, że nie zdoła całkowicie odwrócić"
      },
      {
        "type": "line",
        "text": "czaru, ale może go osłabić."
      },
      {
        "type": "line",
        "text": "Królewna nie umrze."
      },
      {
        "type": "line",
        "text": "Zapadnie tylko w głęboki sen, który"
      },
      {
        "type": "line",
        "text": "potrwa sto lat."
      },
      {
        "type": "line",
        "text": "Razem z nią zasną ci, którzy"
      },
      {
        "type": "line",
        "text": "ją kochają, a po wielu latach"
      },
      {
        "type": "line",
        "text": "przybędzie ktoś, kto przebudzi cały pałac."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Król, chcąc ocalić córkę za wszelką"
      },
      {
        "type": "line",
        "text": "cenę, rozkazał zebrać w całym królestwie"
      },
      {
        "type": "line",
        "text": "wszystkie kołowrotki, wrzeciona i przęślice."
      },
      {
        "type": "line",
        "text": "Nakazał je spalić albo ukryć tak"
      },
      {
        "type": "line",
        "text": "głęboko, by nikt już nigdy ich"
      },
      {
        "type": "line",
        "text": "nie zobaczył."
      },
      {
        "type": "line",
        "text": "Wydawało się, że tym sposobem oszuka"
      },
      {
        "type": "line",
        "text": "zły los."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Lata mijały, a królewna rosła jak"
      },
      {
        "type": "line",
        "text": "wiosenny kwiat."
      },
      {
        "type": "line",
        "text": "Była dobra dla służby, uprzejma dla"
      },
      {
        "type": "line",
        "text": "poddanych i miała serce tak otwarte,"
      },
      {
        "type": "line",
        "text": "że wszyscy lgnęli do niej bez"
      },
      {
        "type": "line",
        "text": "lęku."
      },
      {
        "type": "line",
        "text": "Uczyła się śpiewu, tańca, czytania i"
      },
      {
        "type": "line",
        "text": "jazdy konnej, lecz najbardziej lubiła wędrować"
      },
      {
        "type": "line",
        "text": "po ogrodach i zadawać pytania o"
      },
      {
        "type": "line",
        "text": "świat."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "W dniu swoich szesnastych urodzin obudziła"
      },
      {
        "type": "line",
        "text": "się wcześnie i poczuła nieodpartą chęć,"
      },
      {
        "type": "line",
        "text": "by samotnie przejść się po pałacu."
      },
      {
        "type": "line",
        "text": "Korytarze były ciche, schody puste, a"
      },
      {
        "type": "line",
        "text": "światło wpadające przez wysokie okna kładło"
      },
      {
        "type": "line",
        "text": "na posadzkach jasne pasy."
      },
      {
        "type": "line",
        "text": "Królewna wspinała się coraz wyżej i"
      },
      {
        "type": "line",
        "text": "wyżej, aż dotarła do małych drzwiczek"
      },
      {
        "type": "line",
        "text": "ukrytych w najstarszej wieży."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Za nimi znajdował się ciasny pokoik,"
      },
      {
        "type": "line",
        "text": "którego dotąd nigdy nie widziała."
      },
      {
        "type": "line",
        "text": "Przy oknie siedziała staruszka i przędła"
      },
      {
        "type": "line",
        "text": "wełnę."
      },
      {
        "type": "line",
        "text": "Nie wiedziała nic o królewskim zakazie,"
      },
      {
        "type": "line",
        "text": "bo od lat żyła z dala"
      },
      {
        "type": "line",
        "text": "od dworu."
      },
      {
        "type": "line",
        "text": "Królewna z zachwytem patrzyła, jak wrzeciono"
      },
      {
        "type": "line",
        "text": "obraca się w palcach kobiety."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Co pani robi?"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "zapytała."
      },
      {
        "type": "line",
        "text": "Staruszka uśmiechnęła się i odpowiedziała, że"
      },
      {
        "type": "line",
        "text": "przędzie nić."
      },
      {
        "type": "line",
        "text": "Królewna, ciekawa wszystkiego, poprosiła, by mogła"
      },
      {
        "type": "line",
        "text": "spróbować."
      },
      {
        "type": "line",
        "text": "Ledwie dotknęła wrzeciona, ukłuła się w"
      },
      {
        "type": "line",
        "text": "palec."
      },
      {
        "type": "line",
        "text": "To wystarczyło."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Upadła lekko na przygotowane obok łoże"
      },
      {
        "type": "line",
        "text": "i zamknęła oczy."
      },
      {
        "type": "line",
        "text": "Nie było w tym gwałtowności ani"
      },
      {
        "type": "line",
        "text": "bólu."
      },
      {
        "type": "line",
        "text": "Wyglądała tak, jakby po prostu zasnęła"
      },
      {
        "type": "line",
        "text": "po długim, pogodnym dniu."
      },
      {
        "type": "line",
        "text": "W tej samej chwili czar rozszedł"
      },
      {
        "type": "line",
        "text": "się po całym pałacu."
      },
      {
        "type": "line",
        "text": "Zasnęli strażnicy przy bramie, damy w"
      },
      {
        "type": "line",
        "text": "komnatach, kucharze w kuchni, konie w"
      },
      {
        "type": "line",
        "text": "stajniach i psy na dziedzińcu."
      },
      {
        "type": "line",
        "text": "Nawet ogień na paleniskach jakby znieruchomiał"
      },
      {
        "type": "line",
        "text": "w bezruchu."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Król i królowa, uprzedzeni przez wróżkę,"
      },
      {
        "type": "line",
        "text": "wiedzieli, że taki dzień nadejdzie."
      },
      {
        "type": "line",
        "text": "Z bólem serca pożegnali śpiącą córkę."
      },
      {
        "type": "line",
        "text": "Ucałowali ją w czoło i opuścili"
      },
      {
        "type": "line",
        "text": "pałac, by nie przeszkadzać spełniać się"
      },
      {
        "type": "line",
        "text": "przeznaczeniu."
      },
      {
        "type": "line",
        "text": "Wokół zamku zaczęły rosnąć ciernie, jeżyny"
      },
      {
        "type": "line",
        "text": "i gęsty las."
      },
      {
        "type": "line",
        "text": "Z roku na rok kolczaste gałęzie"
      },
      {
        "type": "line",
        "text": "splatały się coraz ciaśniej, aż ukryły"
      },
      {
        "type": "line",
        "text": "wieże przed wzrokiem ludzi."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Minęło wiele lat."
      },
      {
        "type": "line",
        "text": "Królowie umierali, dzieci dorastały, zmieniały się"
      },
      {
        "type": "line",
        "text": "stroje, pieśni i obyczaje."
      },
      {
        "type": "line",
        "text": "Zamek ze śpiącą królewną stał się"
      },
      {
        "type": "line",
        "text": "legendą."
      },
      {
        "type": "line",
        "text": "Jedni mówili, że za cierniami ukryto"
      },
      {
        "type": "line",
        "text": "skarb."
      },
      {
        "type": "line",
        "text": "Inni szeptali, że w środku mieszka"
      },
      {
        "type": "line",
        "text": "duch."
      },
      {
        "type": "line",
        "text": "Jeszcze inni twierdzili, że nikt, kto"
      },
      {
        "type": "line",
        "text": "spróbuje przejść przez gąszcz, już nie"
      },
      {
        "type": "line",
        "text": "wróci."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Wiele razy młodzi śmiałkowie próbowali dostać"
      },
      {
        "type": "line",
        "text": "się do zamku, lecz kolce raniły"
      },
      {
        "type": "line",
        "text": "ich dłonie, gałęzie zamykały drogę, a"
      },
      {
        "type": "line",
        "text": "las nie chciał ich przepuścić."
      },
      {
        "type": "line",
        "text": "Czar działał dalej, cierpliwy i nieugięty,"
      },
      {
        "type": "line",
        "text": "jakby czekał na właściwą godzinę."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "W końcu, gdy niemal dokładnie minęło"
      },
      {
        "type": "line",
        "text": "sto lat, do tych stron przybył"
      },
      {
        "type": "line",
        "text": "młody książę."
      },
      {
        "type": "line",
        "text": "Usłyszał od starego człowieka opowieść o"
      },
      {
        "type": "line",
        "text": "zamku, w którym śpi królewna piękniejsza"
      },
      {
        "type": "line",
        "text": "od poranka."
      },
      {
        "type": "line",
        "text": "Nie śmiał się z tej historii."
      },
      {
        "type": "line",
        "text": "Przeciwnie —"
      },
      {
        "type": "line",
        "text": "słuchał tak uważnie, jakby rozpoznawał w"
      },
      {
        "type": "line",
        "text": "niej obietnicę dawno przeznaczoną właśnie dla"
      },
      {
        "type": "line",
        "text": "niego."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Kiedy książę zbliżył się do cierni,"
      },
      {
        "type": "line",
        "text": "stało się coś niezwykłego."
      },
      {
        "type": "line",
        "text": "Gęsty mur kolczastych gałęzi rozsunął się"
      },
      {
        "type": "line",
        "text": "sam, tworząc wąską ścieżkę."
      },
      {
        "type": "line",
        "text": "Las, który przez całe stulecie nie"
      },
      {
        "type": "line",
        "text": "wpuszczał nikogo, teraz ustępował przed nim"
      },
      {
        "type": "line",
        "text": "cicho i łagodnie."
      },
      {
        "type": "line",
        "text": "Książę szedł powoli, wśród nieruchomych drzew"
      },
      {
        "type": "line",
        "text": "i ciszy tak głębokiej, że słyszał"
      },
      {
        "type": "line",
        "text": "własny oddech."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Wszedł na dziedziniec i ujrzał śpiących"
      },
      {
        "type": "line",
        "text": "strażników."
      },
      {
        "type": "line",
        "text": "Konie spały z opuszczonymi łbami, psy"
      },
      {
        "type": "line",
        "text": "leżały przy schodach, a w pałacu"
      },
      {
        "type": "line",
        "text": "wszyscy trwali w tej samej chwili,"
      },
      {
        "type": "line",
        "text": "w której dopadł ich czar."
      },
      {
        "type": "line",
        "text": "Książę przechodził przez sale pełne zastygłego"
      },
      {
        "type": "line",
        "text": "życia, aż dotarł do komnaty na"
      },
      {
        "type": "line",
        "text": "szczycie wieży."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Tam, na łożu pod baldachimem, spała"
      },
      {
        "type": "line",
        "text": "królewna."
      },
      {
        "type": "line",
        "text": "Jej twarz była spokojna, policzki świeże,"
      },
      {
        "type": "line",
        "text": "a długie rzęsy rzucały delikatny cień."
      },
      {
        "type": "line",
        "text": "Nie wyglądała jak ktoś uwięziony przez"
      },
      {
        "type": "line",
        "text": "czar."
      },
      {
        "type": "line",
        "text": "Wyglądała jak marzenie, które czekało cierpliwie"
      },
      {
        "type": "line",
        "text": "sto lat na właściwy moment."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Książę zbliżył się, uklęknął przy niej"
      },
      {
        "type": "line",
        "text": "i pochylił głowę z szacunkiem."
      },
      {
        "type": "line",
        "text": "W tej właśnie chwili sen dobiegł"
      },
      {
        "type": "line",
        "text": "końca."
      },
      {
        "type": "line",
        "text": "Królewna otworzyła oczy i spojrzała na"
      },
      {
        "type": "line",
        "text": "niego tak, jakby widziała go już"
      },
      {
        "type": "line",
        "text": "kiedyś w swoim najpiękniejszym śnie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "Czy to już poranek?"
      },
      {
        "type": "line",
        "text": "—"
      },
      {
        "type": "line",
        "text": "zapytała cicho."
      },
      {
        "type": "line",
        "text": "Książę uśmiechnął się i odpowiedział, że"
      },
      {
        "type": "line",
        "text": "tak —"
      },
      {
        "type": "line",
        "text": "poranek, na który czekało całe królestwo."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "W jednej chwili przebudził się cały"
      },
      {
        "type": "line",
        "text": "pałac."
      },
      {
        "type": "line",
        "text": "Ogień znów zatańczył w kominkach, kucharze"
      },
      {
        "type": "line",
        "text": "wrócili do pracy, strażnicy chwycili za"
      },
      {
        "type": "line",
        "text": "halabardy, a w stajniach zarżały konie."
      },
      {
        "type": "line",
        "text": "Psy zaszczekały, zegary ruszyły, a po"
      },
      {
        "type": "line",
        "text": "korytarzach popłynął gwar, jakby minęła zaledwie"
      },
      {
        "type": "line",
        "text": "jedna noc, a nie sto lat."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Radość była wielka."
      },
      {
        "type": "line",
        "text": "Wkrótce urządzono wesele, o którym mówiono"
      },
      {
        "type": "line",
        "text": "przez długie lata."
      },
      {
        "type": "line",
        "text": "Sala balowa rozbłysła światłem świec, muzyka"
      },
      {
        "type": "line",
        "text": "niosła się przez ogrody, a ludzie"
      },
      {
        "type": "line",
        "text": "śmiali się, tańczyli i dziękowali losowi,"
      },
      {
        "type": "line",
        "text": "że po tak długim śnie przyszło"
      },
      {
        "type": "line",
        "text": "przebudzenie."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Mówi się, że królewna i książę"
      },
      {
        "type": "line",
        "text": "żyli długo i szczęśliwie."
      },
      {
        "type": "line",
        "text": "Lecz najpiękniejsze w tej historii jest"
      },
      {
        "type": "line",
        "text": "może nie samo zakończenie, lecz to,"
      },
      {
        "type": "line",
        "text": "że nawet najdłuższa noc nie trwa"
      },
      {
        "type": "line",
        "text": "wiecznie."
      },
      {
        "type": "line",
        "text": "Czasem trzeba przejść przez ciernie, ciszę"
      },
      {
        "type": "line",
        "text": "i oczekiwanie, by dotrzeć do chwili,"
      },
      {
        "type": "line",
        "text": "w której wszystko znów budzi się"
      },
      {
        "type": "line",
        "text": "do życia."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Kiedy więc wieczorem świat cichnie, a"
      },
      {
        "type": "line",
        "text": "w oknach gaśnie światło, warto pamiętać,"
      },
      {
        "type": "line",
        "text": "że po każdej nocy przychodzi poranek."
      },
      {
        "type": "line",
        "text": "A po każdej opowieści —"
      },
      {
        "type": "line",
        "text": "dobry sen."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OUTRO —"
      },
      {
        "type": "line",
        "text": "To była Śpiąca Królewna."
      },
      {
        "type": "line",
        "text": "Na podstawie baśni Charlesa Perraulta."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i opracowanie — 3TaTaTa."
      },
      {
        "type": "line",
        "text": "Dobranoc."
      }
    ]

        "text": "— INTRO —"

      {
        "type": "line",
        "text": "3TaTaTa prezentuje."
      },
      {
        "type": "line",
        "text": "Syrenka Warszawska."
      },
      {
        "type": "line",
        "text": "Na podstawie klasycznej polskiej legendy."
      },
      {
        "type": "line",
        "text": "Tłumaczenie i opracowanie — 3TaTaTa."
      },
      {
        "type": "sep"
      },
      {
        "type": "section",
        "text": "— OPOWIEŚĆ —"
      },
      {
        "type": "line",
        "text": "Dawno temu, gdy Wisła płynęła szeroko"
      },
      {
        "type": "line",
        "text": "i spokojnie, a na jej brzegach"
      },
      {
        "type": "line",
        "text": "rosły gęste lasy, w miejscu dzisiejszej"
      },
      {
        "type": "line",
        "text": "Warszawy nie było jeszcze wielkiego miasta."
      },
      {
        "type": "line",
        "text": "Były tylko rybackie chaty, drewniane pomosty"
      },
      {
        "type": "line",
        "text": "i ogniska rozświetlające wieczorami ciemność nad"
      },
      {
        "type": "line",
        "text": "wodą."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "W jednej z takich osad mieszkali"
      },
      {
        "type": "line",
        "text": "rybacy."
      },
      {
        "type": "line",
        "text": "Każdego ranka wypływali łodziami na rzekę,"
      },
      {
        "type": "line",
        "text": "zarzucali sieci i wracali z połowem,"
      },
      {
        "type": "line",
        "text": "który dawał chleb ich rodzinom."
      },
      {
        "type": "line",
        "text": "Znali Wisłę jak własne dłonie."
      },
      {
        "type": "line",
        "text": "Wiedzieli, gdzie nurt jest spokojny, gdzie"
      },
      {
        "type": "line",
        "text": "woda robi się głęboka i gdzie"
      },
      {
        "type": "line",
        "text": "najlepiej szukać ryb."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "A jednak od pewnego czasu działo"
      },
      {
        "type": "line",
        "text": "się coś dziwnego."
      },
      {
        "type": "line",
        "text": "Sieci coraz częściej wracały puste."
      },
      {
        "type": "line",
        "text": "Czasem były splątane, czasem porwane, a"
      },
      {
        "type": "line",
        "text": "czasem wyglądały tak, jakby ktoś umyślnie"
      },
      {
        "type": "line",
        "text": "wypuścił z nich wszystkie ryby."
      },
      {
        "type": "line",
        "text": "Rybacy nie potrafili tego zrozumieć."
      },
      {
        "type": "line",
        "text": "Jedni mówili, że to sprawka silnego"
      },
      {
        "type": "line",
        "text": "nurtu."
      },
      {
        "type": "line",
        "text": "Inni, że wielkiej ryby albo rzecznego"

      {
        "type": "line",
        "text": "ducha."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Wieczorami siadali przy ogniu i długo"

      {
        "type": "line",
        "text": "o tym rozmawiali."
      },
      {
        "type": "line",
        "text": "Im mniej było połowu, tym większy"
      },
      {
        "type": "line",
        "text": "niepokój zaglądał do chat."
      },
      {
        "type": "line",
        "text": "W końcu kilku najodważniejszych postanowiło sprawdzić,"

      {
        "type": "line",
        "text": "co dzieje się na rzece po"

        "type": "line",

      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Tej nocy księżyc odbijał się w"

        "text": "wodzie jak srebrna moneta."

      {
        "type": "line",
        "text": "Rybacy ukryli się wśród trzcin i"

        "type": "line",
        "text": "czekali w ciszy."

      {
        "type": "line",
        "text": "Wisła szemrała cicho, wiatr poruszał sitowiem,"
      },
      {
        "type": "line",
        "text": "a z oddali słychać było tylko"
      },
      {
        "type": "line",
        "text": "plusk fal uderzających o brzeg."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Nagle na środku rzeki pojawił się"
      },
      {
        "type": "line",
        "text": "blask."
      },
      {
        "type": "line",
        "text": "Nie był to blask ognia ani"
      },
      {
        "type": "line",
        "text": "gwiazd."
      },
      {
        "type": "line",
        "text": "Wydawało się, że sama woda zaczęła"

      {
        "type": "line",
        "text": "świecić."

      {
        "type": "line",
        "text": "Z głębi wynurzyła się postać tak"

      {
        "type": "line",
        "text": "niezwykła, że wszystkim zamarł oddech."
      },
      {
        "type": "line",
        "text": "Była to dziewczyna o długich, jasnych"

      {
        "type": "line",
        "text": "włosach, które połyskiwały w księżycowym świetle."
      },
      {
        "type": "line",
        "text": "Jej twarz była łagodna i piękna,"
      },
      {
        "type": "line",
        "text": "a zamiast nóg miała srebrzysty rybi"

      {
        "type": "line",
        "text": "ogon."

        "type": "sep"

        "type": "line",
        "text": "Była to syrena."

        "type": "sep"

        "type": "line",
        "text": "Usiadła na kamieniu wystającym z wody"

        "type": "line",
        "text": "Rybacy słuchali oczarowani."

      {
        "type": "line",
        "text": "W tej melodii było coś dobrego,"

        "type": "line",
        "text": "coś tęsknego i coś tak pięknego,"

        "type": "line",
        "text": "że nikt nie miał odwagi się"

        "type": "line",
        "text": "poruszyć."

      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Dopiero po chwili zauważyli, że to"

      {
        "type": "line",
        "text": "właśnie syrena uwalnia ryby z ich"

      {
        "type": "line",
        "text": "sieci."
      },
      {
        "type": "line",
        "text": "Robiła to delikatnie, jakby chciała ocalić"

      {
        "type": "line",
        "text": "każde małe życie, które wpadło w"

      {
        "type": "line",
        "text": "ludzką pułapkę."
      },
      {
        "type": "line",
        "text": "Nie czyniła tego ze złości."
      },
      {
        "type": "line",
        "text": "W jej ruchach nie było gniewu."
      },
      {
        "type": "line",
        "text": "Była tylko troska o rzekę i"
      },
      {
        "type": "line",
        "text": "o stworzenia, które w niej żyły."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Rybacy wrócili do osady odmienieni."
      },
      {
        "type": "line",
        "text": "Nie opowiadali już o straszydle ani"
      },
      {
        "type": "line",
        "text": "złym duchu."
      },
      {
        "type": "line",
        "text": "Mówili o istocie pięknej i tajemniczej,"
      },
      {
        "type": "line",
        "text": "która mieszka w Wiśle."
      },
      {
        "type": "line",
        "text": "Jedni bali się jej, inni chcieli"

        "type": "line",

        "type": "line",

        "type": "sep"
      },
      {
        "type": "line",
        "text": "Od tej pory wieść o syrenie"

      {
        "type": "line",
        "text": "zaczęła się rozchodzić coraz dalej."

      {
        "type": "line",
        "text": "Mówiono o niej w chatach, na"

        "type": "line",
        "text": "targach i w sąsiednich wsiach."
      },
      {
        "type": "line",
        "text": "Ludzie chcieli usłyszeć jej śpiew i"

        "type": "line",
        "text": "ujrzeć błysk jej ogona nad wodą."
      },
      {
        "type": "line",
        "text": "Dla jednych była znakiem szczęścia."
      },
      {
        "type": "line",
        "text": "Dla innych zagadką, której nie umieli"

      {
        "type": "line",
        "text": "wytłumaczyć."

        "type": "sep"
      },
      {
        "type": "line",
        "text": "Pewnego dnia do osady przybył chciwy"

      {

      {

      },
      {
        "type": "line",
        "text": "Pomyślał tylko o zysku."
      },
      {
        "type": "line",
        "text": "Uznał, że jeśli schwyta tak niezwykłe"
      },
      {
        "type": "line",
        "text": "stworzenie, będzie pokazywał je za pieniądze"
      },
      {
        "type": "line",
        "text": "i szybko się wzbogaci."
      },
      {
        "type": "sep"
      },
      {
        "type": "line",
        "text": "Przez kilka dni śledził brzeg rzeki,"
      },
      {
        "type": "line",
        "text": "wypatrując chwili, kiedy syrena wynurzy się"

      {
        "type": "line",
        "text": "z wody."
      },
      {
        "type": "line",
        "text": "W końcu zastawił na nią podstępną"
      },
      {
        "type": "line",
        "text": "pułapkę."
      },
